<!--
  Speeder — Multiplex Plugin for PseudoChaser
  Tentative strategy: longs whichever ticker's order-flow is running most extreme relative to
  the rest of the market right now — fast or slow, whichever this bot is configured for (Speed
  Mode: Fast / Slow / Auto, default Fast). "Extreme" is not a fixed number of seconds — every
  scan, the whole known sample of per-ticker order intervals (avg ms between recent trades) is
  split at the median into a fast half and a slow half, and a ticker only qualifies if its own
  average is past that half's own mean (a stricter cut than merely landing in that half). The
  split recomputes every scan from Ashfall's full OC cycle history (deduplicated to each
  ticker's latest reading), so the threshold continuously adapts to current market conditions
  instead of drifting stale.

  Speed Mode: Auto switches between Fast and Slow by market regime, same mechanism as
  Multi-Indicator's Auto Liquidation Presence — see _sdcEffectiveMode()/_sdcAutoHalted() and
  their twins in MultiIndicator-Chaser.html for the full logic (Ashfall's aggregate liq skew
  and/or the partner bot's drawdown state, via Cross Broadcast).

  This is a "multiplex" plugin: it borrows Ashfall's existing Order Count Surveillance
  (_ocFetchBatch, _afOcCycleHistory, _liqLastBatchSyms) by calling/reading it directly, the same
  way Multi-Indicator does — it never wraps or reassigns any of Ashfall's own methods. Requires
  Ashfall with OC Surveillance enabled; if Ashfall isn't loaded at all, this plugin logs a
  warning and stays inactive rather than erroring.

  PseudoChaser only ever opens longs, so this variant only ever trades long — Speed Mode picks
  which extreme (fast/slow) triggers that long, it does not change the side. See
  Speeder-Winter for the short counterpart (same fast/slow toggle, always shorts).

  Load via Plugin Manager in PseudoChaser's config panel.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const VERSION = '1.3.0';
  // Below this many distinct tickers in the accumulated sample, a median half-split mean is too
  // noisy to trust as an adaptive threshold — wait for more data instead of firing on it.
  const MIN_SAMPLE = 10;

  window.__BotPlugin = {
    id:        'speeder-chaser',
    name:      'Speeder',
    version:   VERSION,
    targetBot: 'pseudochaser',
    after:     ['ashfall-chaser'],
    before:    [],
    conflicts: [],
    requires:  ['ashfall-chaser'],
    touches:   ['init', 'runScan'],

    // Accordion header icon is the bot's own default plugin symbol (♨ Chaser / ❄ Winter, matching
    // MIW/MIC and Permafrost/Ashfall), not a plugin-specific glyph — this should be the default
    // convention for multiplex plugins generally, so a user can tell at a glance which bot a
    // given accordion belongs to. The ON/OFF pill's accent color is still Speeder's own (violet).
    css: `
      .sdc-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .sdc-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .sdc-tab.on { border-color:rgba(167,139,250,.6); color:#a78bfa; background:rgba(167,139,250,.08); }
      .sdc-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
    `,

    slots: {
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Speeder</span>
              <span x-show="cfg.sdcEnabled" style="font-size:8px;padding:1px 5px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);border-radius:2px;color:#a78bfa;letter-spacing:1px">ON</span>
              <span x-show="!cfg.sdcEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.sdcEnabled=!cfg.sdcEnabled;persist()}">
              <div class="tog-t" :class="cfg.sdcEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Speeder Mode</div>
                <div class="sdc-hint">Longs one ticker per scan whose order interval is well past the current fast/slow-half average — tentative strategy, no long-term validation yet.</div>
              </div>
            </label>
            <div x-show="cfg.sdcEnabled" style="margin-top:8px">
              <div class="lbl" style="margin-bottom:4px">Speed Mode</div>
              <div style="display:flex;gap:4px">
                <button class="sdc-tab" :class="(cfg.sdcMode??'fast')==='fast'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcMode='fast';persist()}">Fast</button>
                <button class="sdc-tab" :class="(cfg.sdcMode??'fast')==='slow'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcMode='slow';persist()}">Slow</button>
                <button class="sdc-tab" :class="(cfg.sdcMode??'fast')==='auto'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcMode='auto';persist()}">Auto</button>
              </div>
              <div class="sdc-hint">Fast longs busiest flow, Slow longs quietest. Auto regime-switches — see README.</div>
              <div x-show="(cfg.sdcMode??'fast')==='auto'" style="margin-top:8px;padding:6px 8px;background:rgba(167,139,250,.04);border:1px solid rgba(167,139,250,.15);border-radius:3px">
                <div class="lbl" style="margin-bottom:4px">Base</div>
                <div style="display:flex;gap:4px;flex-wrap:wrap">
                  <button class="sdc-tab" :class="(cfg.sdcAutoBase??'fast-sliq')==='fast-sliq'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcAutoBase='fast-sliq';cfg.sdcAutoCurrentBase='fast-sliq';persist()}">Fast 🥵^</button>
                  <button class="sdc-tab" :class="(cfg.sdcAutoBase??'fast-sliq')==='fast-bliq'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcAutoBase='fast-bliq';cfg.sdcAutoCurrentBase='fast-bliq';persist()}">Fast 🥶^</button>
                  <button class="sdc-tab" :class="(cfg.sdcAutoBase??'fast-sliq')==='slow-bliq'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcAutoBase='slow-bliq';cfg.sdcAutoCurrentBase='slow-bliq';persist()}">Slow 🥶^</button>
                  <button class="sdc-tab" :class="(cfg.sdcAutoBase??'fast-sliq')==='slow-sliq'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcAutoBase='slow-sliq';cfg.sdcAutoCurrentBase='slow-sliq';persist()}">Slow 🥵^</button>
                </div>
                <div class="sdc-hint">Which mode runs when the ^-marked regime is dominant — the other regime gets the other mode.</div>
                <div class="lbl" style="margin-top:8px;margin-bottom:4px">Trigger</div>
                <div style="display:flex;gap:4px">
                  <button class="sdc-tab" :class="(cfg.sdcAutoTrigger??'skew')==='skew'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcAutoTrigger='skew';persist()}">Only-Skew</button>
                  <button class="sdc-tab" :class="(cfg.sdcAutoTrigger??'skew')==='drawdown'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcAutoTrigger='drawdown';persist()}">Only-Drawdown</button>
                  <button class="sdc-tab" :class="(cfg.sdcAutoTrigger??'skew')==='both'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcAutoTrigger='both';persist()}">Both</button>
                </div>
                <div class="sdc-hint">See README for Trigger and Mixed Mode details.</div>
                <div class="sdc-hint" style="margin-top:4px" x-text="(()=>{ const halted=_sdcAutoHalted(); if(halted) return 'Currently: entries halted (mixed regime)'; return 'Currently resolving to: '+_sdcEffectiveMode(); })()"></div>
              </div>
            </div>
            <div x-show="cfg.sdcEnabled" style="margin-top:8px;padding:6px 8px;background:rgba(167,139,250,.04);border:1px solid rgba(167,139,250,.15);border-radius:3px;font-family:var(--mono);font-size:8.5px;color:var(--text-lo)">
              <template x-if="_sdcSplit">
                <span>Sample: <b x-text="_sdcSplit.n"></b> tickers · <b x-text="_sdcEffectiveMode()"></b>-half mean <b x-text="((_sdcEffectiveMode()==='fast'?_sdcSplit.fastMean:_sdcSplit.slowMean)/1000).toFixed(1)+'s'"></b></span>
              </template>
              <template x-if="!_sdcSplit">
                <span x-text="_sdcPrereqOk ? 'Accumulating sample — needs more OC history to build a stable split.' : '⚠ Ashfall not loaded — inactive.'"></span>
              </template>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit = def.init;
      const _origScan = def.runScan;

      return Object.assign({}, def, {

        _sdcSplit: null,
        _sdcLastActedAt: 0,
        _sdcPrereqOk: false,

        async init() {
          await _origInit.call(this);
          this._sdcPrereqOk = typeof this._ocFetchBatch === 'function';
          if (!this._sdcPrereqOk) {
            this.log('[SDC] ⚠️ Speeder requires Ashfall (Order Count Surveillance) — plugin inactive.', 'warn');
          } else if (!this.cfg.afOcEnabled) {
            this.log(`[SDC] 💡 Speeder loaded but Ashfall's OC Surveillance is off — enable it for Speeder to receive data.`, 'info');
          }
          if (this.cfg.sdcEnabled           === undefined) this.cfg.sdcEnabled           = true;
          if (this.cfg.sdcMode              === undefined) this.cfg.sdcMode              = 'fast';
          if (this.cfg.sdcAutoBase          === undefined) this.cfg.sdcAutoBase          = 'fast-sliq';
          if (this.cfg.sdcAutoCurrentBase   === undefined) this.cfg.sdcAutoCurrentBase   = this.cfg.sdcAutoBase;
          if (this.cfg.sdcLastPartnerDrawdownTs === undefined) this.cfg.sdcLastPartnerDrawdownTs = 0;
          if (this.cfg.sdcAutoTrigger       === undefined) this.cfg.sdcAutoTrigger       = 'skew';
          if (this.cfg.sdcReentryBlockMode  === undefined) this.cfg.sdcReentryBlockMode  = 'both';
          this.registerRoleBadge?.(item => {
            if (!item || !item._spd) return null;
            const secs     = item._spdAvgMs  != null ? (item._spdAvgMs / 1000).toFixed(1) + 's' : '?';
            const meanSecs = item._spdMean   != null ? (item._spdMean / 1000).toFixed(1) + 's' : '?';
            const modeStr  = item._spdMode === 'slow' ? 'slow' : 'fast';
            return `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(167,139,250,.45);color:#a78bfa;background:rgba(167,139,250,.10)" title="Speeder: order interval ${secs} vs ${modeStr}-half mean ${meanSecs} (n=${item._spdSampleN ?? '?'})">Speed</span>`;
          });
          const _modeRaw = this.cfg.sdcMode ?? 'fast';
          const _modeStr = _modeRaw === 'auto' ? `auto (initial ${this.cfg.sdcAutoBase ?? 'fast-sliq'}, current ${this.cfg.sdcAutoCurrentBase || this.cfg.sdcAutoBase}, trigger ${this.cfg.sdcAutoTrigger ?? 'skew'}) → ${this._sdcEffectiveMode()}` : _modeRaw;
          this.log(`[SDC] Speeder v${VERSION} loaded — ${this.cfg.sdcEnabled ? 'enabled' : 'disabled'} | mode: ${_modeStr}${this._sdcPrereqOk ? '' : ' (INACTIVE — missing Ashfall)'}`, 'info');
        },

        async runScan() {
          await _origScan.call(this);
          await this._sdcRunScan();
        },

        // Deduplicates Ashfall's rolling OC cycle history down to each ticker's single latest
        // reading, then splits the whole known sample at the median into a fast half and a slow
        // half. Recomputed from scratch every scan — no accumulation of its own — so it always
        // reflects whatever's currently in Ashfall's history window.
        _sdcComputeSplit() {
          const hist = this._afOcCycleHistory || [];
          const latest = {};
          for (const cycle of hist) {
            for (const r of (cycle.results || [])) {
              if (!r?.sym || r.avgMs == null) continue;
              const prev = latest[r.sym];
              if (!prev || cycle.ts > prev.ts) latest[r.sym] = { avgMs: r.avgMs, ts: cycle.ts };
            }
          }
          const entries = Object.values(latest);
          if (entries.length < MIN_SAMPLE) { this._sdcSplit = null; return null; }
          const sorted = [...entries].sort((a, b) => a.avgMs - b.avgMs);
          const mid  = Math.floor(sorted.length / 2);
          const mean = arr => arr.reduce((s, r) => s + r.avgMs, 0) / arr.length;
          const split = { latestMap: latest, fastMean: mean(sorted.slice(0, mid)), slowMean: mean(sorted.slice(mid)), n: sorted.length };
          this._sdcSplit = split;
          return split;
        },

        _sdcNormalizeAutoBase(base) {
          const [mode, anchor] = String(base || this.cfg.sdcAutoBase || 'fast-sliq').split('-');
          return `${mode === 'slow' ? 'slow' : 'fast'}-${anchor === 'bliq' ? 'bliq' : 'sliq'}`;
        },

        _sdcOppositeAutoBase(base) {
          const [mode, anchor] = this._sdcNormalizeAutoBase(base).split('-');
          return `${mode === 'fast' ? 'slow' : 'fast'}-${anchor}`;
        },

        _sdcApplyAutoBase(base, reason = 'update') {
          if ((this.cfg.sdcMode ?? 'fast') !== 'auto') return false;
          const next = this._sdcNormalizeAutoBase(base);
          if (this.cfg.sdcAutoCurrentBase === next) return false;
          this.cfg.sdcAutoCurrentBase = next;
          if (typeof this.persist === 'function') this.persist();
          this.log(`[SDC] Speeder current base → ${next} (${reason}).`, 'warn');
          return true;
        },

        _sdcSwitchAutoBaseAfterDrawdown() {
          return this._sdcApplyAutoBase(this._sdcOppositeAutoBase(this.cfg.sdcAutoCurrentBase || this.cfg.sdcAutoBase), 'own drawdown');
        },

        _sdcApplyPartnerDrawdownAutoBase(evt) {
          if (!evt || evt.kind !== 'ddh-start') return false;
          if ((this.cfg.sdcMode ?? 'fast') !== 'auto') return false;
          if (this.cfg.sdcLastPartnerDrawdownTs >= evt.ts) return false;
          const partnerBase = evt.speedCurrentBase || evt.speedBase;
          if (!partnerBase && evt.speedMode !== 'fast' && evt.speedMode !== 'slow') return false;
          const [, ownAnchor] = this._sdcNormalizeAutoBase(this.cfg.sdcAutoCurrentBase || this.cfg.sdcAutoBase).split('-');
          const next = partnerBase ? this._sdcNormalizeAutoBase(partnerBase) : `${evt.speedMode}-${ownAnchor}`;
          this.cfg.sdcLastPartnerDrawdownTs = evt.ts;
          const changed = this._sdcApplyAutoBase(next, `partner drawdown @ ${new Date(evt.ts).toLocaleTimeString()}`);
          if (!changed && typeof this.persist === 'function') this.persist();
          return changed;
        },

        // Resolves Speed Mode to an actual 'fast'/'slow' — every reader should call this, not
        // cfg.sdcMode directly, so 'auto' resolves identically everywhere. Same mechanism as
        // MultiIndicator's Auto Presence (see MultiIndicator-Chaser.html's
        // _micEffectivePresenceMode): Base is stored as "{mode}-{anchor}" (e.g. 'fast-sliq' =
        // "Fast 🥵^") — the anchor names which regime (sliq/bliq dominant, per Ashfall's
        // aggregate skew) uses the named mode; the opposite regime gets the opposite mode.
        // Only-Drawdown (a partner halt) also flips, per the Trigger setting. A mixed regime
        // with no drawdown flip resolves to Base's own named mode when Ashfall's Mixed Mode is
        // "Continue".
        _sdcEffectiveMode() {
          const raw = this.cfg.sdcMode ?? 'fast';
          if (raw !== 'auto') return raw;
          const [baseMode, baseAnchor] = this._sdcNormalizeAutoBase(this.cfg.sdcAutoCurrentBase || this.cfg.sdcAutoBase || 'fast-sliq').split('-');
          const trigger = this.cfg.sdcAutoTrigger ?? 'skew';
          let flip = false;
          if (trigger !== 'drawdown') {
            const bliqDom = !!this._afIsBliqDominant?.();
            const sliqDom = !!this._afIsSliqDominant?.();
            if (baseAnchor === 'sliq' && bliqDom) flip = true;
            else if (baseAnchor === 'bliq' && sliqDom) flip = true;
          }
          if (trigger !== 'skew' && this._afPartnerHalted?.()) flip = true;
          return flip ? (baseMode === 'fast' ? 'slow' : 'fast') : baseMode;
        },

        // True only when Auto mode has nothing decisive to act on — see
        // _micAutoPresenceHalted's twin in MultiIndicator-Chaser.html for the full reasoning.
        _sdcAutoHalted() {
          if ((this.cfg.sdcMode ?? 'fast') !== 'auto') return false;
          if ((this.cfg.ashPresenceMixedMode ?? 'continue') !== 'halt') return false;
          const trigger = this.cfg.sdcAutoTrigger ?? 'skew';
          if (trigger === 'drawdown') return false;
          const decisive = !!this._afIsBliqDominant?.() || !!this._afIsSliqDominant?.();
          if (decisive) return false;
          if (trigger === 'both' && this._afPartnerHalted?.()) return false;
          return true;
        },

        _sdcIsReentryBlocked(sym) {
          const g = this._tickerGraylist?.[sym];
          if (!g || !(g.ts > 0)) return false;
          const ttl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3600000;
          if (Date.now() - g.ts >= ttl) return false;
          if ((this.cfg.sdcReentryBlockMode ?? 'both') === 'losers') return g.isWin === false;
          return true;
        },

        async _sdcRunScan() {
          if (!this.cfg.sdcEnabled || !this._sdcPrereqOk) return;
          const halted = !!(this._isDrawdownHalted?.() || this._isGainsLocked?.() || this._sdcAutoHalted());
          if (halted) return;

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;
          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._sdcLastActedAt) return;

          const activeSyms = new Set((this.positions || []).map(p => p.symbol));
          const basePool = allTickers.filter(t =>
            t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
            && parseFloat(t.lastPrice || 0) >= 0.001
            && !activeSyms.has(t.symbol)
            && !(this._isSymbolBanned?.(t.symbol))
            && !this._sdcIsReentryBlocked(t.symbol)
          );
          if (!basePool.length) { this._sdcLastActedAt = freshAt; return; }

          // OC batch coordination mirrors MultiIndicator's liq-priority-then-random-fill approach
          // (same sizing as Ashfall's Liq Batch Size), duplicated here rather than reused from
          // MIC since Speeder must work whether or not MultiIndicator is loaded.
          const ocCap   = this.cfg.ashLiqBatchSize ?? 25;
          const liqSyms = this._liqLastBatchSyms || [];
          const liqSet  = new Set(liqSyms);
          const fillSyms = basePool.map(t => t.symbol).filter(s => !liqSet.has(s));
          for (let i = fillSyms.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fillSyms[i], fillSyms[j]] = [fillSyms[j], fillSyms[i]];
          }
          const ocSyms = liqSyms.concat(fillSyms).slice(0, ocCap);
          await this._ocFetchBatch(ocSyms);

          this._sdcLastActedAt = freshAt;

          const split = this._sdcComputeSplit();
          if (!split) return;

          const mode = this._sdcEffectiveMode();
          const poolSyms  = new Set(basePool.map(t => t.symbol));
          const tickerMap = new Map(basePool.map(t => [t.symbol, t]));
          const qualifiers = Object.entries(split.latestMap)
            .filter(([sym]) => poolSyms.has(sym))
            .filter(([, r]) => mode === 'fast' ? r.avgMs < split.fastMean : r.avgMs > split.slowMean)
            .sort((a, b) => mode === 'fast' ? a[1].avgMs - b[1].avgMs : b[1].avgMs - a[1].avgMs);
          if (!qualifiers.length) return;

          const [sym, r] = qualifiers[0];
          await this._sdcOpen(tickerMap.get(sym), r.avgMs, split, mode);
        },

        async _sdcOpen(t, avgMs, split, mode) {
          if (!t) return;
          const price = parseFloat(t.lastPrice || 0);
          if (!price) return;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const pos = await this.pseudoOpenLong({ symbol: t.symbol, price, change, fundingRate: fr, _spd: true });
          if (pos) {
            const mean = mode === 'fast' ? split.fastMean : split.slowMean;
            pos._spd        = true;
            pos._spdAvgMs   = avgMs;
            pos._spdMean    = mean;
            pos._spdMode    = mode;
            pos._spdSampleN = split.n;
            if (typeof this.persist === 'function') this.persist();
            this.log(`[SDC] ⚡ Speeder — ${t.symbol}: order interval ${(avgMs / 1000).toFixed(1)}s vs ${mode}-half mean ${(mean / 1000).toFixed(1)}s (n=${split.n})`, 'success');
          }
        },

      });
    },
  };
})();
</script>
