<!--
  Speeder — Multiplex Plugin for PseudoChaser
  Tentative strategy: longs whichever ticker's order-flow is running most extreme relative to
  the rest of the market right now — fast or slow, whichever this bot is configured for (Speed
  Mode: Fast / Slow / Both, default Fast). "Extreme" is not a fixed number of seconds — every
  scan, the whole known sample of per-ticker order intervals (avg ms between recent trades) is
  split at the median into a fast half and a slow half, and a ticker only qualifies if its own
  average is past that half's own mean (a stricter cut than merely landing in that half). The
  split recomputes every scan from Ashfall's full OC cycle history (deduplicated to each
  ticker's latest reading), so the threshold continuously adapts to current market conditions
  instead of drifting stale. Both runs the fast and slow reads independently each scan — each can
  open its own ticker — rather than picking one side up front.

  Slot Blocking (sdcSlotBlockEnabled): Speeder has no criteria of its own to score, so it reads
  Multi-Indicator/Ashfall's shared scorecard (micCollapsedSlotRanks) as an external validity
  signal instead. If the live-liq criteria (sliq/bliq/msliq/mbliq) are collectively a loss beyond
  sdcSlotBlockPct% of base margin, the fast read pauses; if 0-Liq is, the slow read pauses. This
  is what actually mediates Both mode in practice — both reads run, but only the one(s) whose
  scorecard is currently healthy produce entries. No manual clear needed — the block lifts once
  the score recovers. See _sdcIsModeBlocked()/_sdcActiveModes().

  This is a "multiplex" plugin: it borrows Ashfall's existing Order Count Surveillance
  (_ocFetchBatch, _afOcCycleHistory, _liqLastBatchSyms) by calling/reading it directly, the same
  way Multi-Indicator does — it never wraps or reassigns any of Ashfall's own methods. Requires
  Ashfall with OC Surveillance enabled; if Ashfall isn't loaded at all, this plugin logs a
  warning and stays inactive rather than erroring.

  PseudoChaser only ever opens longs, so this variant only ever trades long — Speed Mode picks
  which extreme(s) (fast/slow) trigger that long, it does not change the side. See
  Speeder-Winter for the short counterpart (same fast/slow/both toggle, always shorts).

  Load via Plugin Manager in PseudoChaser's config panel.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const VERSION = '1.5.1';
  window.__BotPlugin = {
    id:        'speeder-chaser',
    name:      'Speeder',
    version:   VERSION,
    targetBot: 'pseudochaser',
    after:     ['ashfall-chaser'],
    before:    [],
    conflicts: [],
    requires:  ['ashfall-chaser'],
    touches:   ['init', 'runScan'],

    // Accordion header icon is the bot's own default plugin symbol (♨ Chaser / ❄ Winter, matching
    // MIW/MIC and Permafrost/Ashfall), not a plugin-specific glyph — this should be the default
    // convention for multiplex plugins generally, so a user can tell at a glance which bot a
    // given accordion belongs to. The ON/OFF pill's accent color is still Speeder's own (violet).
    css: `
      .sdc-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .sdc-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .sdc-tab.on { border-color:rgba(167,139,250,.6); color:#a78bfa; background:rgba(167,139,250,.08); }
      .sdc-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
    `,

    slots: {
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Speeder</span>
              <span x-show="cfg.sdcEnabled" style="font-size:8px;padding:1px 5px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);border-radius:2px;color:#a78bfa;letter-spacing:1px">ON</span>
              <span x-show="!cfg.sdcEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.sdcEnabled=!cfg.sdcEnabled;persist()}">
              <div class="tog-t" :class="cfg.sdcEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Speeder Mode</div>
                <div class="sdc-hint">Longs one ticker per scan whose order interval is well past the current fast/slow-half average — tentative strategy, no long-term validation yet.</div>
              </div>
            </label>
            <div x-show="cfg.sdcEnabled" style="margin-top:8px">
              <div class="lbl" style="margin-bottom:4px">Speed Mode</div>
              <div style="display:flex;gap:4px">
                <button class="sdc-tab" :class="(cfg.sdcMode??'fast')==='fast'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcMode='fast';persist()}">Fast</button>
                <button class="sdc-tab" :class="(cfg.sdcMode??'fast')==='slow'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcMode='slow';persist()}">Slow</button>
                <button class="sdc-tab" :class="(cfg.sdcMode??'fast')==='both'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdcMode='both';persist()}">Both</button>
              </div>
              <div class="sdc-hint">Fast longs busiest flow, Slow longs quietest. Both runs each independently — up to one long per side per scan.</div>
              <div style="margin-top:8px">
                <div class="lbl">Min Split Tickers <b x-text="(cfg.sdcMinSplitTickers??6)"></b></div>
                <input type="range" min="2" max="25" step="1" x-model.number="cfg.sdcMinSplitTickers" @change="persist()">
                <div class="sdc-hint">Speeder needs at least this many unique OC-sampled tickers before it can divide the sample into fast/slow halves.</div>
              </div>
              <div style="margin-top:8px">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.sdcSlotBlockEnabled=!cfg.sdcSlotBlockEnabled;persist()}">
                  <div class="tog-t" :class="cfg.sdcSlotBlockEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Slot Blocking</div>
                    <div class="sdc-hint">Pauses the fast read when live-liq criteria (sliq/bliq/msliq/mbliq) are collectively a loss beyond <span x-text="-(cfg.sdcSlotBlockPct??25)"></span>% of base margin, or the slow read when 0-Liq is. This is what mediates Both mode — reads Multi-Indicator/Ashfall's scorecard, auto-clears once it recovers.</div>
                  </div>
                </label>
                <div x-show="cfg.sdcSlotBlockEnabled" style="margin-top:4px;margin-left:2px">
                  <input type="range" min="5" max="100" step="5" x-model.number="cfg.sdcSlotBlockPct" :disabled="cfgLocked" @change="persist()">
                  <div class="sdc-hint">Threshold: <span x-text="-(cfg.sdcSlotBlockPct??25)"></span>% of base margin.</div>
                </div>
              </div>
            </div>
            <div x-show="cfg.sdcEnabled" style="margin-top:8px;padding:6px 8px;background:rgba(167,139,250,.04);border:1px solid rgba(167,139,250,.15);border-radius:3px;font-family:var(--mono);font-size:8.5px;color:var(--text-lo)">
              <template x-if="_sdcSplit">
                <span>Sample: <b x-text="_sdcSplit.n"></b> tickers · fast-half mean <b x-text="(_sdcSplit.fastMean/1000).toFixed(1)+'s'"></b> · slow-half mean <b x-text="(_sdcSplit.slowMean/1000).toFixed(1)+'s'"></b></span>
              </template>
              <template x-if="!_sdcSplit">
                <span x-text="_sdcPrereqOk ? _sdcSplitStatusText() : '⚠ Ashfall not loaded — inactive.'"></span>
              </template>
              <div x-show="cfg.sdcSlotBlockEnabled">
                <template x-for="m in _sdcActiveModes()" :key="m">
                  <div x-show="_sdcIsModeBlocked(m)" style="color:rgba(255,120,120,.85);margin-top:2px" x-text="'⛔ '+(m==='fast'?'Fast':'Slow')+' blocked — scorecard read is a loss beyond threshold.'"></div>
                </template>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit = def.init;
      const _origScan = def.runScan;

      return Object.assign({}, def, {

        _sdcSplit: null,
        _sdcLastActedAt: 0,
        _sdcPrereqOk: false,

        async init() {
          await _origInit.call(this);
          this._sdcPrereqOk = typeof this._ocFetchBatch === 'function';
          if (!this._sdcPrereqOk) {
            this.log('[SDC] ⚠️ Speeder requires Ashfall (Order Count Surveillance) — plugin inactive.', 'warn');
          } else if (!this.cfg.afOcEnabled) {
            this.log(`[SDC] 💡 Speeder loaded but Ashfall's OC Surveillance is off — enable it for Speeder to receive data.`, 'info');
          }
          if (this.cfg.sdcEnabled           === undefined) this.cfg.sdcEnabled           = true;
          if (this.cfg.sdcMode              === undefined) this.cfg.sdcMode              = 'fast';
          if (this.cfg.sdcMode === 'auto') {
            const preserved = (this.cfg.sdcAutoCurrentBase || this.cfg.sdcAutoBase || 'fast-sliq').split('-')[0];
            this.cfg.sdcMode = preserved === 'slow' ? 'slow' : 'fast';
            this.log(`[SDC] Auto Speed Mode removed — migrated to ${this.cfg.sdcMode === 'slow' ? 'Slow' : 'Fast'}.`, 'warn');
          }
          if (this.cfg.sdcSlotBlockEnabled  === undefined) this.cfg.sdcSlotBlockEnabled  = true;
          if (this.cfg.sdcSlotBlockPct      === undefined) this.cfg.sdcSlotBlockPct      = 25;
          if (this.cfg.sdcMinSplitTickers   === undefined) this.cfg.sdcMinSplitTickers   = 6;
          if (this.cfg.sdcReentryBlockMode  === undefined) this.cfg.sdcReentryBlockMode  = 'both';
          this.registerRoleBadge?.(item => {
            if (!item || !item._spd) return null;
            const secs     = item._spdAvgMs  != null ? (item._spdAvgMs / 1000).toFixed(1) + 's' : '?';
            const meanSecs = item._spdMean   != null ? (item._spdMean / 1000).toFixed(1) + 's' : '?';
            const modeStr  = item._spdMode === 'slow' ? 'slow' : 'fast';
            const label    = modeStr === 'fast' ? 'Fast' : 'Slow';
            return `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(167,139,250,.45);color:#a78bfa;background:rgba(167,139,250,.10)" title="Speeder: order interval ${secs} vs ${modeStr}-half mean ${meanSecs} (n=${item._spdSampleN ?? '?'})">${label}</span>`;
          });
          this.log(`[SDC] Speeder v${VERSION} loaded — ${this.cfg.sdcEnabled ? 'enabled' : 'disabled'} | mode: ${this.cfg.sdcMode ?? 'fast'}${this._sdcPrereqOk ? '' : ' (INACTIVE — missing Ashfall)'}`, 'info');
        },

        async runScan() {
          await _origScan.call(this);
          await this._sdcRunScan();
        },

        _sdcSplitStatusText() {
          const hist = this._afOcCycleHistory || [];
          const syms = new Set();
          for (const cycle of hist) for (const r of (cycle.results || [])) if (r?.sym && r.avgMs != null) syms.add(r.sym);
          const have = syms.size;
          const need = Math.max(2, this.cfg.sdcMinSplitTickers ?? 6);
          return `Accumulating sample — ${have}/${need} unique OC tickers available for fast/slow split.`;
        },

        // Deduplicates Ashfall's rolling OC cycle history down to each ticker's single latest
        // reading, then splits the whole known sample at the median into a fast half and a slow
        // half. Recomputed from scratch every scan — no accumulation of its own — so it always
        // reflects whatever's currently in Ashfall's history window.
        _sdcComputeSplit() {
          const hist = this._afOcCycleHistory || [];
          const latest = {};
          for (const cycle of hist) {
            for (const r of (cycle.results || [])) {
              if (!r?.sym || r.avgMs == null) continue;
              const prev = latest[r.sym];
              if (!prev || cycle.ts > prev.ts) latest[r.sym] = { avgMs: r.avgMs, ts: cycle.ts };
            }
          }
          const entries = Object.values(latest);
          const minSample = Math.max(2, this.cfg.sdcMinSplitTickers ?? 6);
          if (entries.length < minSample) { this._sdcSplit = null; return null; }
          const sorted = [...entries].sort((a, b) => a.avgMs - b.avgMs);
          const mid  = Math.floor(sorted.length / 2);
          const mean = arr => arr.reduce((s, r) => s + r.avgMs, 0) / arr.length;
          const split = { latestMap: latest, fastMean: mean(sorted.slice(0, mid)), slowMean: mean(sorted.slice(mid)), n: sorted.length };
          this._sdcSplit = split;
          return split;
        },

        // Fast/Slow run just their own read; Both runs both independently, each gated by its own
        // Slot Blocking check — every reader should call this, not cfg.sdcMode directly.
        _sdcActiveModes() {
          const m = this.cfg.sdcMode ?? 'fast';
          return m === 'both' ? ['fast', 'slow'] : [m];
        },

        // Speeder has no criteria of its own to score, so it reads Multi-Indicator/Ashfall's
        // shared scorecard (micCollapsedSlotRanks) as an external validity signal instead. Fast
        // pauses when the live-liq criteria are collectively a loss beyond threshold; Slow pauses
        // when 0-Liq is. No manual clear needed — the block lifts once the score recovers.
        _sdcIsModeBlocked(mode) {
          if (!this.cfg.sdcSlotBlockEnabled) return false;
          const ranks = this.micCollapsedSlotRanks || {};
          const score = c => (ranks[c] ?? 0) + (ranks[c + '+'] ?? 0) + (ranks[c + '-'] ?? 0);
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const threshold  = baseMargin * ((this.cfg.sdcSlotBlockPct ?? 25) / 100);
          if (mode === 'fast') {
            const liveScore = ['sliq', 'bliq', 'msliq', 'mbliq'].reduce((s, t) => s + score(t), 0);
            return liveScore <= -threshold;
          }
          return score('0liq') <= -threshold;
        },

        _sdcIsReentryBlocked(sym) {
          const g = this._tickerGraylist?.[sym];
          if (!g || !(g.ts > 0)) return false;
          const ttl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3600000;
          if (Date.now() - g.ts >= ttl) return false;
          if ((this.cfg.sdcReentryBlockMode ?? 'both') === 'losers') return g.isWin === false;
          return true;
        },

        async _sdcRunScan() {
          if (!this.cfg.sdcEnabled || !this._sdcPrereqOk) return;
          const halted = !!(this._isDrawdownHalted?.() || this._isGainsLocked?.());
          if (halted) return;

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;
          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._sdcLastActedAt) return;

          const activeSyms = new Set((this.positions || []).map(p => p.symbol));
          const basePool = allTickers.filter(t =>
            t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
            && parseFloat(t.lastPrice || 0) >= 0.001
            && !activeSyms.has(t.symbol)
            && !(this._isSymbolBanned?.(t.symbol))
            && !this._sdcIsReentryBlocked(t.symbol)
          );
          if (!basePool.length) { this._sdcLastActedAt = freshAt; return; }

          // OC batch coordination mirrors MultiIndicator's liq-priority-then-random-fill approach
          // (same sizing as Ashfall's Liq Batch Size), duplicated here rather than reused from
          // MIC since Speeder must work whether or not MultiIndicator is loaded.
          const ocCap   = this.cfg.ashLiqBatchSize ?? 25;
          const liqSyms = this._liqLastBatchSyms || [];
          const liqSet  = new Set(liqSyms);
          const fillSyms = basePool.map(t => t.symbol).filter(s => !liqSet.has(s));
          for (let i = fillSyms.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fillSyms[i], fillSyms[j]] = [fillSyms[j], fillSyms[i]];
          }
          const ocSyms = liqSyms.concat(fillSyms).slice(0, ocCap);
          await this._ocFetchBatch(ocSyms);

          this._sdcLastActedAt = freshAt;

          const split = this._sdcComputeSplit();
          if (!split) return;

          const poolSyms  = new Set(basePool.map(t => t.symbol));
          const tickerMap = new Map(basePool.map(t => [t.symbol, t]));
          // Both mode runs the fast and slow reads independently — each can open its own ticker
          // this scan. takenSyms keeps the second pass from also picking whatever the first pass
          // just opened, in the rare case a small sample lets one ticker qualify for both halves.
          const takenSyms = new Set();
          for (const mode of this._sdcActiveModes()) {
            if (this._sdcIsModeBlocked(mode)) continue;
            const qualifiers = Object.entries(split.latestMap)
              .filter(([sym]) => poolSyms.has(sym) && !takenSyms.has(sym))
              .filter(([, r]) => mode === 'fast' ? r.avgMs < split.fastMean : r.avgMs > split.slowMean)
              .sort((a, b) => mode === 'fast' ? a[1].avgMs - b[1].avgMs : b[1].avgMs - a[1].avgMs);
            if (!qualifiers.length) continue;
            const [sym, r] = qualifiers[0];
            takenSyms.add(sym);
            await this._sdcOpen(tickerMap.get(sym), r.avgMs, split, mode);
          }
        },

        async _sdcOpen(t, avgMs, split, mode) {
          if (!t) return;
          const price = parseFloat(t.lastPrice || 0);
          if (!price) return;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const pos = await this.pseudoOpenLong({ symbol: t.symbol, price, change, fundingRate: fr, _spd: true });
          if (pos) {
            const mean = mode === 'fast' ? split.fastMean : split.slowMean;
            pos._spd        = true;
            pos._spdAvgMs   = avgMs;
            pos._spdMean    = mean;
            pos._spdMode    = mode;
            pos._spdSampleN = split.n;
            if (typeof this.persist === 'function') this.persist();
            this.log(`[SDC] ⚡ Speeder — ${t.symbol}: order interval ${(avgMs / 1000).toFixed(1)}s vs ${mode}-half mean ${(mean / 1000).toFixed(1)}s (n=${split.n})`, 'success');
          }
        },

      });
    },
  };
})();
</script>
