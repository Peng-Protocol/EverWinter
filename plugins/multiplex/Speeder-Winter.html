<!--
  Speeder — Multiplex Plugin for PseudoWinter
  Tentative strategy: shorts whichever ticker's order-flow is running most extreme relative to
  the rest of the market right now — fast or slow, whichever this bot is configured for (Speed
  Mode: Fast / Slow / Both, default Slow). "Extreme" is not a fixed number of seconds — every
  scan, the whole known sample of per-ticker order intervals (avg ms between recent trades) is
  split at the median into a fast half and a slow half, and a ticker only qualifies if its own
  average is past that half's own mean (a stricter cut than merely landing in that half). The
  split recomputes every scan from Permafrost's full OC cycle history (deduplicated to each
  ticker's latest reading), so the threshold continuously adapts to current market conditions
  instead of drifting stale. Both runs the fast and slow reads independently each scan — each can
  open its own ticker — rather than picking one side up front.

  Slot Blocking (sdwSlotBlockEnabled): Speeder has no criteria of its own to score, so it reads
  Multi-Indicator/Permafrost's shared scorecard (miwCollapsedSlotRanks) as an external validity
  signal instead. If the live-liq criteria (sliq/bliq/msliq/mbliq) are collectively a loss beyond
  sdwSlotBlockPct% of base margin, the fast read pauses; if 0-Liq is, the slow read pauses. This
  is what actually mediates Both mode in practice — both reads run, but only the one(s) whose
  scorecard is currently healthy produce entries. No manual clear needed — the block lifts once
  the score recovers. See _sdwIsModeBlocked()/_sdwActiveModes().

  This is a "multiplex" plugin: it borrows Permafrost's existing Order Count Surveillance
  (_ocFetchBatch, _pfOcCycleHistory, _liqLastBatchSyms) by calling/reading it directly, the same
  way Multi-Indicator does — it never wraps or reassigns any of Permafrost's own methods.
  Requires Permafrost with OC Surveillance enabled; if Permafrost isn't loaded at all, this
  plugin logs a warning and stays inactive rather than erroring.

  PseudoWinter only ever opens shorts, so this variant only ever trades short — Speed Mode picks
  which extreme(s) (fast/slow) trigger that short, it does not change the side. See
  Speeder-Chaser for the long counterpart (same fast/slow/both toggle, always longs).

  Load via Plugin Manager in PseudoWinter's config panel.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const VERSION = '1.5.1';
  window.__BotPlugin = {
    id:        'speeder-winter',
    name:      'Speeder',
    version:   VERSION,
    targetBot: 'pseudowinter',
    after:     ['permafrost-winter'],
    before:    [],
    conflicts: [],
    requires:  ['permafrost-winter'],
    touches:   ['init', 'runScan'],

    // Accordion header icon is the bot's own default plugin symbol (♨ Chaser / ❄ Winter, matching
    // MIW/MIC and Permafrost/Ashfall), not a plugin-specific glyph — this should be the default
    // convention for multiplex plugins generally, so a user can tell at a glance which bot a
    // given accordion belongs to. The ON/OFF pill's accent color is still Speeder's own (violet).
    css: `
      .sdw-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .sdw-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .sdw-tab.on { border-color:rgba(167,139,250,.6); color:#a78bfa; background:rgba(167,139,250,.08); }
      .sdw-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
    `,

    slots: {
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Speeder</span>
              <span x-show="cfg.sdwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);border-radius:2px;color:#a78bfa;letter-spacing:1px">ON</span>
              <span x-show="!cfg.sdwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.sdwEnabled=!cfg.sdwEnabled;persist()}">
              <div class="tog-t" :class="cfg.sdwEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Speeder Mode</div>
                <div class="sdw-hint">Shorts one ticker per scan whose order interval is well past the current fast/slow-half average — tentative strategy, no long-term validation yet.</div>
              </div>
            </label>
            <div x-show="cfg.sdwEnabled" style="margin-top:8px">
              <div class="lbl" style="margin-bottom:4px">Speed Mode</div>
              <div style="display:flex;gap:4px">
                <button class="sdw-tab" :class="(cfg.sdwMode??'slow')==='fast'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdwMode='fast';persist()}">Fast</button>
                <button class="sdw-tab" :class="(cfg.sdwMode??'slow')==='slow'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdwMode='slow';persist()}">Slow</button>
                <button class="sdw-tab" :class="(cfg.sdwMode??'slow')==='both'?'on':''" @click.prevent="if(!cfgLocked){cfg.sdwMode='both';persist()}">Both</button>
              </div>
              <div class="sdw-hint">Fast shorts busiest flow, Slow shorts quietest. Both runs each independently — up to one short per side per scan.</div>
              <div style="margin-top:8px">
                <div class="lbl">Min Split Tickers <b x-text="(cfg.sdwMinSplitTickers??6)"></b></div>
                <input type="range" min="2" max="25" step="1" x-model.number="cfg.sdwMinSplitTickers" @change="persist()">
                <div class="sdw-hint">Speeder needs at least this many unique OC-sampled tickers before it can divide the sample into fast/slow halves.</div>
              </div>
              <div style="margin-top:8px">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.sdwSlotBlockEnabled=!cfg.sdwSlotBlockEnabled;persist()}">
                  <div class="tog-t" :class="cfg.sdwSlotBlockEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Slot Blocking</div>
                    <div class="sdw-hint">Pauses the fast read when live-liq criteria (sliq/bliq/msliq/mbliq) are collectively a loss beyond <span x-text="-(cfg.sdwSlotBlockPct??25)"></span>% of base margin, or the slow read when 0-Liq is. This is what mediates Both mode — reads Multi-Indicator/Permafrost's scorecard, auto-clears once it recovers.</div>
                  </div>
                </label>
                <div x-show="cfg.sdwSlotBlockEnabled" style="margin-top:4px;margin-left:2px">
                  <input type="range" min="5" max="100" step="5" x-model.number="cfg.sdwSlotBlockPct" :disabled="cfgLocked" @change="persist()">
                  <div class="sdw-hint">Threshold: <span x-text="-(cfg.sdwSlotBlockPct??25)"></span>% of base margin.</div>
                </div>
              </div>
            </div>
            <div x-show="cfg.sdwEnabled" style="margin-top:8px;padding:6px 8px;background:rgba(167,139,250,.04);border:1px solid rgba(167,139,250,.15);border-radius:3px;font-family:var(--mono);font-size:8.5px;color:var(--text-lo)">
              <template x-if="_sdwSplit">
                <span>Sample: <b x-text="_sdwSplit.n"></b> tickers · fast-half mean <b x-text="(_sdwSplit.fastMean/1000).toFixed(1)+'s'"></b> · slow-half mean <b x-text="(_sdwSplit.slowMean/1000).toFixed(1)+'s'"></b></span>
              </template>
              <template x-if="!_sdwSplit">
                <span x-text="_sdwPrereqOk ? _sdwSplitStatusText() : '⚠ Permafrost not loaded — inactive.'"></span>
              </template>
              <div x-show="cfg.sdwSlotBlockEnabled">
                <template x-for="m in _sdwActiveModes()" :key="m">
                  <div x-show="_sdwIsModeBlocked(m)" style="color:rgba(255,120,120,.85);margin-top:2px" x-text="'⛔ '+(m==='fast'?'Fast':'Slow')+' blocked — scorecard read is a loss beyond threshold.'"></div>
                </template>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit = def.init;
      const _origScan = def.runScan;

      return Object.assign({}, def, {

        _sdwSplit: null,
        _sdwLastActedAt: 0,
        _sdwPrereqOk: false,

        async init() {
          await _origInit.call(this);
          this._sdwPrereqOk = typeof this._ocFetchBatch === 'function';
          if (!this._sdwPrereqOk) {
            this.log('[SDW] ⚠️ Speeder requires Permafrost (Order Count Surveillance) — plugin inactive.', 'warn');
          } else if (!this.cfg.pfOcEnabled) {
            this.log(`[SDW] 💡 Speeder loaded but Permafrost's OC Surveillance is off — enable it for Speeder to receive data.`, 'info');
          }
          if (this.cfg.sdwEnabled           === undefined) this.cfg.sdwEnabled           = true;
          if (this.cfg.sdwMode              === undefined) this.cfg.sdwMode              = 'slow';
          if (this.cfg.sdwMode === 'auto') {
            const preserved = (this.cfg.sdwAutoCurrentBase || this.cfg.sdwAutoBase || 'slow-sliq').split('-')[0];
            this.cfg.sdwMode = preserved === 'fast' ? 'fast' : 'slow';
            this.log(`[SDW] Auto Speed Mode removed — migrated to ${this.cfg.sdwMode === 'fast' ? 'Fast' : 'Slow'}.`, 'warn');
          }
          if (this.cfg.sdwSlotBlockEnabled  === undefined) this.cfg.sdwSlotBlockEnabled  = true;
          if (this.cfg.sdwSlotBlockPct      === undefined) this.cfg.sdwSlotBlockPct      = 25;
          if (this.cfg.sdwMinSplitTickers   === undefined) this.cfg.sdwMinSplitTickers   = 6;
          if (this.cfg.sdwReentryBlockMode  === undefined) this.cfg.sdwReentryBlockMode  = 'both';
          this.registerRoleBadge?.(item => {
            if (!item || !item._spd) return null;
            const secs     = item._spdAvgMs  != null ? (item._spdAvgMs / 1000).toFixed(1) + 's' : '?';
            const meanSecs = item._spdMean   != null ? (item._spdMean / 1000).toFixed(1) + 's' : '?';
            const modeStr  = item._spdMode === 'fast' ? 'fast' : 'slow';
            const label    = modeStr === 'fast' ? 'Fast' : 'Slow';
            return `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(167,139,250,.45);color:#a78bfa;background:rgba(167,139,250,.10)" title="Speeder: order interval ${secs} vs ${modeStr}-half mean ${meanSecs} (n=${item._spdSampleN ?? '?'})">${label}</span>`;
          });
          this.log(`[SDW] Speeder v${VERSION} loaded — ${this.cfg.sdwEnabled ? 'enabled' : 'disabled'} | mode: ${this.cfg.sdwMode ?? 'slow'}${this._sdwPrereqOk ? '' : ' (INACTIVE — missing Permafrost)'}`, 'info');
        },

        async runScan() {
          await _origScan.call(this);
          await this._sdwRunScan();
        },

        _sdwSplitStatusText() {
          const hist = this._pfOcCycleHistory || [];
          const syms = new Set();
          for (const cycle of hist) for (const r of (cycle.results || [])) if (r?.sym && r.avgMs != null) syms.add(r.sym);
          const have = syms.size;
          const need = Math.max(2, this.cfg.sdwMinSplitTickers ?? 6);
          return `Accumulating sample — ${have}/${need} unique OC tickers available for fast/slow split.`;
        },

        // Deduplicates Permafrost's rolling OC cycle history down to each ticker's single latest
        // reading, then splits the whole known sample at the median into a fast half and a slow
        // half. Recomputed from scratch every scan — no accumulation of its own — so it always
        // reflects whatever's currently in Permafrost's history window.
        _sdwComputeSplit() {
          const hist = this._pfOcCycleHistory || [];
          const latest = {};
          for (const cycle of hist) {
            for (const r of (cycle.results || [])) {
              if (!r?.sym || r.avgMs == null) continue;
              const prev = latest[r.sym];
              if (!prev || cycle.ts > prev.ts) latest[r.sym] = { avgMs: r.avgMs, ts: cycle.ts };
            }
          }
          const entries = Object.values(latest);
          const minSample = Math.max(2, this.cfg.sdwMinSplitTickers ?? 6);
          if (entries.length < minSample) { this._sdwSplit = null; return null; }
          const sorted = [...entries].sort((a, b) => a.avgMs - b.avgMs);
          const mid  = Math.floor(sorted.length / 2);
          const mean = arr => arr.reduce((s, r) => s + r.avgMs, 0) / arr.length;
          const split = { latestMap: latest, fastMean: mean(sorted.slice(0, mid)), slowMean: mean(sorted.slice(mid)), n: sorted.length };
          this._sdwSplit = split;
          return split;
        },

        // Fast/Slow run just their own read; Both runs both independently, each gated by its own
        // Slot Blocking check — every reader should call this, not cfg.sdwMode directly.
        _sdwActiveModes() {
          const m = this.cfg.sdwMode ?? 'slow';
          return m === 'both' ? ['fast', 'slow'] : [m];
        },

        // Speeder has no criteria of its own to score, so it reads Multi-Indicator/Permafrost's
        // shared scorecard (miwCollapsedSlotRanks) as an external validity signal instead. Fast
        // pauses when the live-liq criteria are collectively a loss beyond threshold; Slow pauses
        // when 0-Liq is. No manual clear needed — the block lifts once the score recovers.
        _sdwIsModeBlocked(mode) {
          if (!this.cfg.sdwSlotBlockEnabled) return false;
          const ranks = this.miwCollapsedSlotRanks || {};
          const score = c => (ranks[c] ?? 0) + (ranks[c + '+'] ?? 0) + (ranks[c + '-'] ?? 0);
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const threshold  = baseMargin * ((this.cfg.sdwSlotBlockPct ?? 25) / 100);
          if (mode === 'fast') {
            const liveScore = ['sliq', 'bliq', 'msliq', 'mbliq'].reduce((s, t) => s + score(t), 0);
            return liveScore <= -threshold;
          }
          return score('0liq') <= -threshold;
        },

        _sdwIsReentryBlocked(sym) {
          const g = this._tickerGraylist?.[sym];
          if (!g || !(g.ts > 0)) return false;
          const ttl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3600000;
          if (Date.now() - g.ts >= ttl) return false;
          if ((this.cfg.sdwReentryBlockMode ?? 'both') === 'losers') return g.isWin === false;
          return true;
        },

        async _sdwRunScan() {
          if (!this.cfg.sdwEnabled || !this._sdwPrereqOk) return;
          const halted = !!(this._isDrawdownHalted?.() || this._isGainsLocked?.());
          if (halted) return;

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;
          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._sdwLastActedAt) return;

          const activeSyms = new Set((this.positions || []).map(p => p.symbol));
          const basePool = allTickers.filter(t =>
            t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
            && parseFloat(t.lastPrice || 0) >= 0.001
            && !activeSyms.has(t.symbol)
            && !(this._isSymbolBanned?.(t.symbol))
            && !this._sdwIsReentryBlocked(t.symbol)
          );
          if (!basePool.length) { this._sdwLastActedAt = freshAt; return; }

          // OC batch coordination mirrors MultiIndicator's liq-priority-then-random-fill approach
          // (same sizing as Permafrost's Liq Batch Size), duplicated here rather than reused from
          // MIW since Speeder must work whether or not MultiIndicator is loaded.
          const ocCap   = this.cfg.pfLiqBatchSize ?? 25;
          const liqSyms = this._liqLastBatchSyms || [];
          const liqSet  = new Set(liqSyms);
          const fillSyms = basePool.map(t => t.symbol).filter(s => !liqSet.has(s));
          for (let i = fillSyms.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fillSyms[i], fillSyms[j]] = [fillSyms[j], fillSyms[i]];
          }
          const ocSyms = liqSyms.concat(fillSyms).slice(0, ocCap);
          await this._ocFetchBatch(ocSyms);

          this._sdwLastActedAt = freshAt;

          const split = this._sdwComputeSplit();
          if (!split) return;

          const poolSyms  = new Set(basePool.map(t => t.symbol));
          const tickerMap = new Map(basePool.map(t => [t.symbol, t]));
          // Both mode runs the fast and slow reads independently — each can open its own ticker
          // this scan. takenSyms keeps the second pass from also picking whatever the first pass
          // just opened, in the rare case a small sample lets one ticker qualify for both halves.
          const takenSyms = new Set();
          for (const mode of this._sdwActiveModes()) {
            if (this._sdwIsModeBlocked(mode)) continue;
            const qualifiers = Object.entries(split.latestMap)
              .filter(([sym]) => poolSyms.has(sym) && !takenSyms.has(sym))
              .filter(([, r]) => mode === 'fast' ? r.avgMs < split.fastMean : r.avgMs > split.slowMean)
              .sort((a, b) => mode === 'fast' ? a[1].avgMs - b[1].avgMs : b[1].avgMs - a[1].avgMs);
            if (!qualifiers.length) continue;
            const [sym, r] = qualifiers[0];
            takenSyms.add(sym);
            await this._sdwOpen(tickerMap.get(sym), r.avgMs, split, mode);
          }
        },

        async _sdwOpen(t, avgMs, split, mode) {
          if (!t) return;
          const price = parseFloat(t.lastPrice || 0);
          if (!price) return;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const pos = await this.pseudoOpenShort({ symbol: t.symbol, price, change, fundingRate: fr, _spd: true });
          if (pos) {
            const mean = mode === 'fast' ? split.fastMean : split.slowMean;
            pos._spd        = true;
            pos._spdAvgMs   = avgMs;
            pos._spdMean    = mean;
            pos._spdMode    = mode;
            pos._spdSampleN = split.n;
            if (typeof this.persist === 'function') this.persist();
            this.log(`[SDW] ⚡ Speeder — ${t.symbol}: order interval ${(avgMs / 1000).toFixed(1)}s vs ${mode}-half mean ${(mean / 1000).toFixed(1)}s (n=${split.n})`, 'success');
          }
        },

      });
    },
  };
})();
</script>
