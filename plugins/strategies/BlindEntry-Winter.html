<!--
  Blind-Entry Strategy Plugin for PseudoWinter
  Control-group entry filter — the only gate is |24h change| >= threshold. No RSI, no
  funding rate, no volume ratio, no candle pattern, no liquidation data, no order-flow data
  ever decides which ticker gets picked. Purpose is to measure whether Multi-Indicator's
  criteria/scorecard entry gate actually adds expectancy over the exit machinery alone —
  see docs/blind-entry-plan.md for the full design rationale.

  Position management ports directly from Multi-Indicator: Cascade, Sacrifice (+ rolling
  variant), a halving multiplier on both thresholds, and a Share Cap so this doesn't
  monopolize the position pool if another strategy plugin is ever loaded alongside it.
  Substitution does not apply — there is no score to rank a new candidate against.

  Each opened position is tagged with three sign-only, untiered pseudo-criteria — +24h/-24h,
  +fund/-fund, +ocs/-ocs — recorded purely so Permafrost's Scorecard has something to bucket.
  These never gate entry: every candidate that clears the threshold gets one of each pair
  regardless of which side it lands on. OC data for the +ocs/-ocs tag is batch-fetched for
  the already-selected random sample each cycle — pure data collection, never a filter; a
  candidate still enters even if its OC fetch comes back empty, just without that one tag.

  Load via Plugin Manager in PseudoWinter's config panel. Do not load alongside
  Multi-Indicator-Winter unless intentionally running both (they'll compete for the same
  position pool via their respective Share Caps).
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const VERSION = '1.0.3';

  // +24h/-24h/+fund/-fund reuse Multi-Indicator-Winter's own emoji for visual consistency where
  // the same criterion already has one — fund is app-relative (short book): +fund (longs paying)
  // is good carry for shorts (🤑), -fund (shorts paying) is bad for shorts (💸), same as MIW.
  // +ocs/-ocs reuse Permafrost's single ocs symbol (🔭) since MIC/MIW have no sign-specific one.
  const CRIT_EMOJI = { '+24h': '⬆️', '-24h': '⬇️', '+fund': '🤑', '-fund': '💸', '+ocs': '🔭', '-ocs': '🔭' };

  window.__BotPlugin = {
    id:        'blindentry-winter',
    name:      'Blind-Entry (Winter)',
    version:   VERSION,
    targetBot: 'pseudowinter',
    after:     ['permafrost-winter'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan'],

    css: `
      .bew-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.bewEnabled"> + Blind</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Blind-Entry</span>
              <span x-show="cfg.bewEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.35);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.bewEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.bewEnabled=!cfg.bewEnabled;persist()}">
              <div class="tog-t" :class="cfg.bewEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Blind-Entry Mode</div>
                <div class="bew-hint">Shorts any ticker whose 24h change clears the threshold, in either direction — no other signal decides entry. Control group for Multi-Indicator.</div>
              </div>
            </label>
            <div x-show="cfg.bewEnabled" style="margin-top:8px">
              <div class="lbl">Change Threshold <b x-text="(cfg.bewChangePct??6)+'%'"></b></div>
              <input type="range" min="1" max="30" step="1" x-model.number="cfg.bewChangePct" :disabled="cfgLocked" @change="persist()">
              <div class="bew-hint">Minimum absolute 24h price change to qualify. Direction doesn't matter — only magnitude.</div>

              <div class="lbl" style="margin-top:8px">Candidates per Cycle <b x-text="cfg.bewPerCycle??12"></b></div>
              <input type="range" min="1" max="30" step="1" x-model.number="cfg.bewPerCycle" :disabled="cfgLocked" @change="persist()">
              <div class="bew-hint">Randomly sampled from qualifying tickers each scan, bounded by remaining slots. No ranking.</div>

              <div class="lbl" style="margin-top:8px">Re-entry Cooldown <b x-text="(cfg.bewReentryCooldownHrs??1)+'h'"></b></div>
              <input type="range" min="0" max="24" step="1" x-model.number="cfg.bewReentryCooldownHrs" :disabled="cfgLocked" @change="persist()">
              <div class="bew-hint">Minimum time after any close before the same symbol can be re-entered.</div>

              <div class="bew-hint" style="margin-top:8px;padding:6px 8px;background:rgba(96,210,255,.04);border:1px solid rgba(96,210,255,.12);border-radius:3px">Every opened position is tagged +24h/-24h, +fund/-fund, +ocs/-ocs — recorded for the Scorecard only, never used to gate entry.</div>

              <div class="lbl" style="margin-top:10px">Management</div>
              <label class="tog" style="margin-top:4px" @click.prevent="if(!cfgLocked){cfg.bewCascadeEnabled=!cfg.bewCascadeEnabled;persist()}">
                <div class="tog-t" :class="cfg.bewCascadeEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Cascade</div>
                  <div class="bew-hint">Closes the whole Blind-Entry book at once when its collective unrealized PnL crosses +<span x-text="cfg.bewCascadePct??25"></span>% of base margin.</div>
                </div>
              </label>
              <div x-show="cfg.bewCascadeEnabled" style="margin-top:4px;margin-left:2px">
                <input type="range" min="5" max="100" step="5" x-model.number="cfg.bewCascadePct" :disabled="cfgLocked" @change="persist()">
              </div>

              <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.bewSacrificeEnabled=!cfg.bewSacrificeEnabled;persist()}">
                <div class="tog-t" :class="cfg.bewSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Sacrifice</div>
                  <div class="bew-hint">Mirror of Cascade: closes when collective unrealized PnL crosses -<span x-text="cfg.bewSacrificePct??25"></span>% of base margin.</div>
                </div>
              </label>
              <div x-show="cfg.bewSacrificeEnabled" style="margin-top:4px;margin-left:2px">
                <input type="range" min="5" max="100" step="5" x-model.number="cfg.bewSacrificePct" :disabled="cfgLocked" @change="persist()">
              </div>
              <label class="tog" style="margin-top:6px;margin-left:12px" @click.prevent="if(!cfgLocked){cfg.bewRollingSacrificeEnabled=!cfg.bewRollingSacrificeEnabled;persist()}">
                <div class="tog-t" :class="cfg.bewRollingSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                <span class="tog-l" style="font-size:9px">Rolling (close oldest only, not whole book)</span>
              </label>

              <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.bewHalvingEnabled=!cfg.bewHalvingEnabled;persist()}">
                <div class="tog-t" :class="cfg.bewHalvingEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Halving</div>
                  <div class="bew-hint">Cascade/Sacrifice thresholds shrink exponentially the longer the oldest Blind-Entry position has been open — half-life <span x-text="cfg.bewHalvingHours??0.5"></span>h.</div>
                </div>
              </label>
              <div x-show="cfg.bewHalvingEnabled" style="margin-top:4px;margin-left:2px">
                <input type="range" min="0.25" max="6" step="0.25" x-model.number="cfg.bewHalvingHours" :disabled="cfgLocked" @change="persist()">
              </div>

              <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.bewShareCapEnabled=!cfg.bewShareCapEnabled;persist()}">
                <div class="tog-t" :class="cfg.bewShareCapEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Share Cap</div>
                  <div class="bew-hint">Caps Blind-Entry to at most <span x-text="cfg.bewShareCapPct??100"></span>% of Max Positions, so it doesn't monopolize the book if another strategy plugin is also loaded.</div>
                </div>
              </label>
              <div x-show="cfg.bewShareCapEnabled" style="margin-top:4px;margin-left:2px">
                <input type="range" min="5" max="100" step="5" x-model.number="cfg.bewShareCapPct" :disabled="cfgLocked" @change="persist()">
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit = def.init;
      const _origScan = def.runScan;

      return Object.assign({}, def, {

        async init() {
          await _origInit.call(this);
          if (this.cfg.bewEnabled                 === undefined) this.cfg.bewEnabled                 = false;
          if (this.cfg.bewChangePct                === undefined) this.cfg.bewChangePct                = 6;
          if (this.cfg.bewPerCycle                 === undefined) this.cfg.bewPerCycle                 = 12;
          if (this.cfg.bewReentryCooldownHrs       === undefined) this.cfg.bewReentryCooldownHrs       = 1;
          if (this.cfg.bewCascadeEnabled           === undefined) this.cfg.bewCascadeEnabled           = true;
          if (this.cfg.bewCascadePct               === undefined) this.cfg.bewCascadePct               = 25;
          if (this.cfg.bewSacrificeEnabled         === undefined) this.cfg.bewSacrificeEnabled         = true;
          if (this.cfg.bewSacrificePct             === undefined) this.cfg.bewSacrificePct             = 25;
          if (this.cfg.bewRollingSacrificeEnabled  === undefined) this.cfg.bewRollingSacrificeEnabled  = true;
          if (this.cfg.bewHalvingEnabled           === undefined) this.cfg.bewHalvingEnabled           = true;
          if (this.cfg.bewHalvingHours             === undefined) this.cfg.bewHalvingHours             = 0.5;
          if (this.cfg.bewShareCapEnabled          === undefined) this.cfg.bewShareCapEnabled          = true;
          if (this.cfg.bewShareCapPct              === undefined) this.cfg.bewShareCapPct              = 100;
          if (this.cfg.bewOcScanCap                === undefined) this.cfg.bewOcScanCap                = 20;

          this.registerRoleBadge?.(item => {
            if (!item || !item._bew) return null;
            const crits = item._bewCriteria || [];
            const emoji = crits.map(c => CRIT_EMOJI[c] || '').join('');
            const title = crits.length ? 'Blind: ' + crits.join(' + ') : 'Blind-Entry';
            return `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(96,210,255,.45);color:var(--ice);background:rgba(96,210,255,.10)" title="${title}">${emoji || 'Blind'}</span>`;
          });
          this.log(`[BEW] Blind-Entry (Winter) v${VERSION} loaded — ${this.cfg.bewEnabled ? 'enabled' : 'disabled'} | threshold ${this.cfg.bewChangePct}% | ${this.cfg.bewPerCycle}/cycle`, 'info');
        },

        _bewHalvingMultiplier() {
          if (!this.cfg.bewHalvingEnabled) return 1;
          const pos = (this.positions || []).filter(p => p._bew);
          if (!pos.length) return 1;
          const oldest = pos.reduce((m, p) => Math.min(m, p.openedAt || Date.now()), Date.now());
          return Math.pow(0.5, (Date.now() - oldest) / ((this.cfg.bewHalvingHours ?? 0.5) * 3600000));
        },

        async _bewCheckCascade() {
          if (!this.cfg.bewCascadeEnabled) return;
          const bewPositions = (this.positions || []).filter(p => p._bew);
          if (!bewPositions.length) return;
          const totalUPnL  = bewPositions.reduce((s, p) => s + (p.upnl || 0), 0);
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const halvMul    = this._bewHalvingMultiplier();
          const threshold  = baseMargin * ((this.cfg.bewCascadePct ?? 25) / 100) * halvMul;
          if (totalUPnL >= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            this.log(`[BEW] 🌊 Cascade triggered — collective uPnL +${totalUPnL.toFixed(4)} ≥ ${threshold.toFixed(4)} USDT (${this.cfg.bewCascadePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) — bailing ${bewPositions.length} position(s)`, 'info');
            this._logBatchBegin?.();
            try {
              for (const pos of bewPositions) {
                await this.pseudoClosePosition(pos, 'cascade');
              }
            } finally { this._logBatchEnd?.('[BEW] 🌊 Cascade roll-up'); }
          }
        },

        async _bewCheckSacrifice() {
          if (!this.cfg.bewSacrificeEnabled) return;
          const bewPositions = (this.positions || []).filter(p => p._bew);
          if (!bewPositions.length) return;
          const totalUPnL  = bewPositions.reduce((s, p) => s + (p.upnl || 0), 0);
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const halvMul    = this._bewHalvingMultiplier();
          const threshold  = -(baseMargin * ((this.cfg.bewSacrificePct ?? 25) / 100) * halvMul);
          if (totalUPnL <= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            if (this.cfg.bewRollingSacrificeEnabled) {
              const oldest = bewPositions.reduce((a, b) => (a.openedAt || 0) <= (b.openedAt || 0) ? a : b);
              this.log(`[BEW] 🩸 Rolling sacrifice — uPnL ${totalUPnL.toFixed(4)} ≤ ${threshold.toFixed(4)} USDT (${this.cfg.bewSacrificePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) — closing oldest: ${oldest.symbol}`, 'info');
              await this.pseudoClosePosition(oldest, 'sacrifice');
            } else {
              this.log(`[BEW] 🩸 Sacrifice triggered — collective uPnL ${totalUPnL.toFixed(4)} ≤ ${threshold.toFixed(4)} USDT (${this.cfg.bewSacrificePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) — bailing ${bewPositions.length} position(s)`, 'info');
              this._logBatchBegin?.();
              try {
                for (const pos of bewPositions) {
                  await this.pseudoClosePosition(pos, 'sacrifice');
                }
              } finally { this._logBatchEnd?.('[BEW] 🩸 Sacrifice roll-up'); }
            }
          }
        },

        async runScan() {
          await this._bewCheckCascade();
          await this._bewCheckSacrifice();
          const tsBefore = this._lastAllTickersAt || 0;
          await _origScan.call(this);
          if ((this._lastAllTickersAt || 0) === tsBefore && tsBefore === (this._bewLastActedAt || 0)) {
            this._bewLastActedAt = 0;
          }
          await this._bewRunScan();
        },

        async _bewRunScan() {
          if (!this.cfg.bewEnabled) return;
          // Halt is checked below, right before opening — not here. Candidate sampling and
          // the OC batch fetch must still run while halted so Permafrost's OC surveillance
          // keeps getting fed; only the actual position entry is what a halt should block.

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;
          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._bewLastActedAt) return;

          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.bewShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.bewShareCapPct ?? 100) / 100)));
            const bewCount = (this.positions || []).filter(p => p._bew).length;
            headroom = Math.min(headroom, capSlots - bewCount);
          }
          if (headroom < 1) { this._bewLastActedAt = freshAt; return; }

          const activeSyms = new Set((this.positions || []).map(p => p.symbol));
          // Unscoped by strategy, on purpose — mirrors Psycho Mode's reentryCooldownHrs, which
          // blocks re-entry on any recent close of that symbol regardless of who closed it.
          const cooldownMs = (this.cfg.bewReentryCooldownHrs ?? 1) * 3600000;
          const recentlyClosed = cooldownMs > 0
            ? new Set((this.closedTrades || []).filter(r => Date.now() - (r.closedAt || 0) < cooldownMs).map(r => r.symbol))
            : new Set();

          const threshold = this.cfg.bewChangePct ?? 6;
          let pool = allTickers.filter(t =>
            t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
            && parseFloat(t.lastPrice || 0) >= 0.001
            && !activeSyms.has(t.symbol)
            && !(this._isSymbolBanned?.(t.symbol))
            && !recentlyClosed.has(t.symbol)
            && Math.abs(parseFloat(t.price24hPcnt || 0) * 100) >= threshold
          );

          // Fisher-Yates shuffle, take a bounded random sample — this is the entire selection
          // step. No ranking, no scoring: a score is exactly what this plugin must not have.
          for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
          }
          // Sample size is NOT capped by headroom — OC surveillance is meant to observe the
          // full candidate pool regardless of how many slots are actually free to open (a
          // near-full book would otherwise starve the OC sample down to a handful of tickers).
          // The open loop below is what enforces headroom/maxPos on actual entries.
          const take   = this.cfg.bewPerCycle ?? 12;
          const sample = pool.slice(0, take);
          if (!sample.length) { this._bewLastActedAt = freshAt; return; }

          // OC data is batch-fetched for the already-selected sample only — pure data
          // collection for the +ocs/-ocs tag, never a filter on who's in the sample. Runs
          // regardless of drawdown/gains-lock halt — only opening positions is halted below.
          if (this.cfg.pfOcEnabled) {
            const ocCap = this.cfg.bewOcScanCap ?? 20;
            await this._ocFetchBatch?.(sample.slice(0, ocCap).map(t => t.symbol));
          }

          if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) { this._bewLastActedAt = freshAt; return; }

          let opened = 0;
          for (const t of sample) {
            if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) break;
            // Share Cap used to be enforced for free by the sample itself never exceeding
            // headroom — now that the sample is sized independently for OC breadth, it has
            // to be re-checked here, per open, since bewCount changes as this loop runs.
            if (this.cfg.bewShareCapEnabled ?? true) {
              const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.bewShareCapPct ?? 100) / 100)));
              const bewCount = (this.positions || []).filter(p => p._bew).length;
              if (bewCount >= capSlots) break;
            }
            if (await this._bewOpen(t)) opened++;
          }
          this._bewLastActedAt = freshAt;
          if (opened) this.log(`[BEW] ⚡ Blind scan — opened ${opened}/${sample.length} candidates (threshold ${threshold}%)`, 'info');
        },

        async _bewOpen(t) {
          const sym   = t.symbol;
          const price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;

          const lenBefore = (this.positions || []).length;
          await this.pseudoOpenShort({ symbol: sym, price, change, fundingRate: fr });
          if ((this.positions?.length ?? 0) <= lenBefore) return false;

          const pos = this.positions[this.positions.length - 1];
          pos._bew = true;
          const _ocR = this.pfOcResults?.[sym];
          const crits = [ change >= 0 ? '+24h' : '-24h', fr >= 0 ? '+fund' : '-fund' ];
          if (_ocR && (_ocR.bc + _ocR.sc) > 0) crits.push(_ocR.bc >= _ocR.sc ? '+ocs' : '-ocs');
          pos._bewCriteria = crits;
          if (typeof this.persist === 'function') this.persist();
          return true;
        },

      });
    },
  };
})();
</script>
