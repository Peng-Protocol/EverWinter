<!--
  Fund Chasing Strategy Plugin for PseudoWinter
  Short tickers with elevated funding rates.

  Standard mode: positive funding (longs pay shorts) — collect carry.
  Structure-aware mode: when Permafrost reads a bearish market lean,
  flips to the opposite gate — targets tickers with deeply negative
  funding (shorts paying longs). These are coins where longs are
  positioned against the bearish trend and are at elevated risk of
  collapsing as the meta-structure asserts itself.

  The entry pool is drawn exclusively from the host's bulk ticker cache
  (_lastAllTickers). The plugin tracks the cache timestamp and only
  fires entries once per fresh fetch — it will not re-scan the same
  cached snapshot twice, so the effective re-scan interval matches the
  host's bulk ticker cooldown (default 3h).

  TP, SL, and all exit logic use the host's binary mode settings.
  Drawdown throttle and gains lock gate all entries.

  Load via Plugin Manager in PseudoWinter's config panel.
  Load AFTER EverWinter if using live trading — see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  window.__BotPlugin = {
    id:        'fundchasing-winter',
    name:      'Fund Chasing (Winter)',
    version:   '1.1.0',
    targetBot: 'pseudowinter',
    after:     ['everwinter', 'permafrost-winter'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan', 'pseudoClosePosition'],

    css: `
      .fcw-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.fcwEnabled"> + FundChase</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Fund Chasing</span>
              <span x-show="cfg.fcwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.fcwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.fcwEnabled=!cfg.fcwEnabled;persist()}">
              <div class="tog-t" :class="cfg.fcwEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Fund Chasing Mode</div>
                <div class="fcw-hint">Short tickers with elevated positive funding rates — longs pay shorts every interval, embedding carry into the position. Only fires on a fresh bulk ticker fetch (≈ every 3h). TP / SL use the host binary mode settings.</div>
              </div>
            </label>
            <div x-show="cfg.fcwEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Min Funding Rate <b x-text="(cfg.fcwFrMin??0.1).toFixed(2)+'%'"></b></div>
                <input type="range" min="0.01" max="1" step="0.01" x-model.number="cfg.fcwFrMin" @change="persist()">
                <div class="fcw-hint">Enter a short when the ticker's current funding rate is ≥ this value. Higher threshold = fewer, stronger-signal entries.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Max Entries / Cycle <b x-text="(cfg.fcwPicks??3)"></b></div>
                <input type="range" min="1" max="10" step="1" x-model.number="cfg.fcwPicks" @change="persist()">
                <div class="fcw-hint">Tickers are ranked by funding rate descending (highest-paying first). Entries open until this limit, max positions, or a halt.</div>
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.fcwShareCapEnabled=!(cfg.fcwShareCapEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.fcwShareCapEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Position Share Cap</div>
                  <div class="fcw-hint">Prevents Fund Chasing from filling all slots, reserving headroom for other strategies.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.fcwShareCapEnabled??true" style="margin-top:8px">
                <div class="lbl">Max Share <b x-text="(cfg.fcwShareCapPct??50)+'% ('+Math.max(1,Math.floor((cfg.maxPos??5)*((cfg.fcwShareCapPct??50)/100)))+' of '+(cfg.maxPos??5)+' slots)'"></b></div>
                <input type="range" min="10" max="100" step="5" x-model.number="cfg.fcwShareCapPct" @change="persist()">
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.fcwStructureAwareEnabled=!(cfg.fcwStructureAwareEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.fcwStructureAwareEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Structure Awareness</div>
                  <div class="fcw-hint">When Permafrost reads a bearish market lean, flips to the opposite gate — targets tickers with deeply negative funding (shorts paying longs). These coins are positioned against the trend and likely to collapse. Falls back to standard gate when Permafrost is not loaded or structure is neutral/bullish.</div>
                </div>
              </label>
              <div x-show="cfg.fcwStructureAwareEnabled??true" class="fcw-hint" style="margin-top:5px;padding:4px 6px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:2px" x-text="(pfStatus != null) ? '🧊 Permafrost connected — lean ' + (pfStatus.lean??0).toFixed(2) + ' → ' + ((pfStatus.lean??0) < 0 ? 'bearish · reversed gate active' : 'neutral/bullish · standard gate') : '⚠ Permafrost not loaded — standard gate always used'"></div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;

      return Object.assign({}, def, {

        async init() {
          await _origInit.call(this);
          if (this.cfg.fcwEnabled                === undefined) this.cfg.fcwEnabled                = false;
          if (this.cfg.fcwFrMin                  === undefined) this.cfg.fcwFrMin                  = 0.1;
          if (this.cfg.fcwPicks                  === undefined) this.cfg.fcwPicks                  = 3;
          if (this.cfg.fcwShareCapEnabled        === undefined) this.cfg.fcwShareCapEnabled        = true;
          if (this.cfg.fcwShareCapPct            === undefined) this.cfg.fcwShareCapPct            = 50;
          if (this.cfg.fcwStructureAwareEnabled  === undefined) this.cfg.fcwStructureAwareEnabled  = true;
          this.registerRoleBadge?.(item => (item && item._fcw)
            ? `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(96,210,255,.45);color:var(--ice);background:rgba(96,210,255,.10)">💰 FUND</span>`
            : null);
          this.log(`[FCW] Fund Chasing (Winter) v1.1.0 loaded — ${this.cfg.fcwEnabled ? 'enabled' : 'disabled'} | FR ≥ ${(this.cfg.fcwFrMin ?? 0.1).toFixed(2)}% | ${this.cfg.fcwPicks}/cycle | structure-aware ${(this.cfg.fcwStructureAwareEnabled ?? true) ? 'on' : 'off'}`, 'info');
        },

        async runScan() {
          await _origScan.call(this);
          await this._fcwRunScan();
        },

        async _fcwRunScan() {
          if (!this.cfg.fcwEnabled) return;
          if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) {
            this.log(`[FCW] 💰 Skipped — ${this._isGainsLocked?.() ? 'gains lock' : 'drawdown halt'} active`, 'info');
            return;
          }
          if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) return;

          // Only act on a fresh bulk ticker fetch — skip if the cache timestamp
          // hasn't advanced since the last time we processed entries.
          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._fcwLastActedAt) return;

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;

          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.fcwShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.fcwShareCapPct ?? 50) / 100)));
            const fcwCount = (this.positions || []).filter(p => p._fcw).length;
            headroom = Math.min(headroom, capSlots - fcwCount);
            if (headroom < 1) {
              this.log(`[FCW] 💰 Share cap reached — no slots reserved for Fund Chasing`, 'info');
              this._fcwLastActedAt = freshAt;
              return;
            }
          }
          const picks = Math.min(Math.max(1, Math.round(this.cfg.fcwPicks ?? 3)), headroom);

          const frMin      = this.cfg.fcwFrMin ?? 0.1;
          const activeSyms = new Set((this.positions || []).map(p => p.symbol));

          // Structure awareness: when Permafrost reads a bearish lean, flip to the
          // opposite funding gate — coins where shorts are paying (trapped longs) are
          // at elevated collapse risk when the bearish meta-structure asserts itself.
          const _pfLean     = (this.cfg.fcwStructureAwareEnabled ?? true) ? (this.pfStatus?.lean ?? null) : null;
          const bearishMode = _pfLean !== null && _pfLean < 0;

          const pool = allTickers
            .filter(t =>
              t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
              && parseFloat(t.lastPrice || 0) >= 0.001
              && t.fundingRate != null
              && (bearishMode
                ? parseFloat(t.fundingRate) * 100 <= -frMin   // reversed gate: shorts paying
                : parseFloat(t.fundingRate) * 100 >= frMin)   // standard gate: longs paying
              && !activeSyms.has(t.symbol)
              && !(this._isSymbolBanned?.(t.symbol)))
            .sort((a, b) => bearishMode
              ? parseFloat(a.fundingRate || 0) - parseFloat(b.fundingRate || 0)   // most negative first
              : parseFloat(b.fundingRate || 0) - parseFloat(a.fundingRate || 0)); // most positive first

          this._fcwLastActedAt = freshAt;

          const gateDesc = bearishMode
            ? `FR ≤ −${frMin.toFixed(2)}% [bearish structure, lean ${_pfLean.toFixed(2)}]`
            : `FR ≥ ${frMin.toFixed(2)}%${_pfLean !== null ? ' [neutral/bullish structure]' : ''}`;

          if (!pool.length) {
            this.log(`[FCW] 💰 No tickers with ${gateDesc} in fresh snapshot`, 'info');
            return;
          }

          let opened = 0;
          this._logBatchBegin?.();
          try {
            for (const t of pool) {
              if (opened >= picks) break;
              if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) break;
              if (await this._fcwOpen(t)) opened++;
            }
          } finally { this._logBatchEnd?.('[FCW] 💰 Entry roll-up'); }
          this.log(`[FCW] 💰 ${pool.length} tickers ${gateDesc} — ${opened}/${picks} opened`, 'info');
        },

        async _fcwOpen(t) {
          const sym    = t.symbol;
          const price  = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const lenBefore = (this.positions || []).length;
          await this.pseudoOpenShort({ symbol: sym, price, change, fundingRate: fr, _fcw: true });
          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._fcw = true;
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const isFcw   = pos._fcw === true;
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if (isFcw && (this.closedTrades?.length ?? 0) > prevLen) {
            this.closedTrades[0]._fcw = true;
            this.persist?.();
            this.renderTradeFeed?.();
          }
        },
      });
    },
  };
})();
</script>
