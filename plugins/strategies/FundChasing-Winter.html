<!--
  Fund Chasing Strategy Plugin for PseudoWinter
  Short tickers with elevated funding rates.

  Standard mode: positive funding (longs pay shorts) — collect carry.
  Structure-aware mode: when Permafrost reads a bearish market lean,
  flips to the opposite gate — targets tickers with deeply negative
  funding (shorts paying longs). These are coins where longs are
  positioned against the bearish trend and are at elevated risk of
  collapsing as the meta-structure asserts itself.

  The entry pool is drawn exclusively from the host's bulk ticker cache
  (_lastAllTickers). The plugin tracks the cache timestamp and only
  fires entries once per fresh fetch — it will not re-scan the same
  cached snapshot twice, so the effective re-scan interval matches the
  host's bulk ticker cooldown (default 3h).

  TP, SL, and all exit logic use the host's binary mode settings.
  Drawdown throttle and gains lock gate all entries.

  Load via Plugin Manager in PseudoWinter's config panel.
  Load AFTER EverWinter if using live trading — see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  window.__BotPlugin = {
    id:        'fundchasing-winter',
    name:      'Fund Chasing (Winter)',
    version:   '1.2.0',
    targetBot: 'pseudowinter',
    after:     ['everwinter', 'permafrost-winter'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan', 'pseudoClosePosition'],

    css: `
      .fcw-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.fcwEnabled"> + FundChase</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Fund Chasing</span>
              <span x-show="cfg.fcwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.fcwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.fcwEnabled=!cfg.fcwEnabled;persist()}">
              <div class="tog-t" :class="cfg.fcwEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Fund Chasing Mode</div>
                <div class="fcw-hint">Short tickers based on the active funding × structure gate — collect carry or target capitulation plays. Only fires once per fresh bulk ticker fetch. TP / SL use the host binary mode settings.</div>
              </div>
            </label>
            <div x-show="cfg.fcwEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Funding Threshold <b x-text="'±'+(cfg.fcwFrThreshold??0.1).toFixed(2)+'%'"></b></div>
                <input type="range" min="0.01" max="1" step="0.01" x-model.number="cfg.fcwFrThreshold" @change="persist()">
                <div class="fcw-hint">+fund gate fires when FR ≥ threshold; -fund gate fires when FR ≤ −threshold. Higher value = fewer, stronger-signal entries.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Max Entries / Cycle <b x-text="(cfg.fcwPicks??3)"></b></div>
                <input type="range" min="1" max="10" step="1" x-model.number="cfg.fcwPicks" @change="persist()">
                <div class="fcw-hint">Tickers are ranked by funding rate descending (highest-paying first). Entries open until this limit, max positions, or a halt.</div>
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.fcwShareCapEnabled=!(cfg.fcwShareCapEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.fcwShareCapEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Position Share Cap</div>
                  <div class="fcw-hint">Prevents Fund Chasing from filling all slots, reserving headroom for other strategies.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.fcwShareCapEnabled??true" style="margin-top:8px">
                <div class="lbl">Max Share <b x-text="(cfg.fcwShareCapPct??50)+'% ('+Math.max(1,Math.floor((cfg.maxPos??5)*((cfg.fcwShareCapPct??50)/100)))+' of '+(cfg.maxPos??5)+' slots)'"></b></div>
                <input type="range" min="10" max="100" step="5" x-model.number="cfg.fcwShareCapPct" @change="persist()">
              </div>
              <div style="margin-top:10px">
                <div class="lbl" style="margin-bottom:4px">Entry Gates <span style="font-size:9px;font-weight:normal;color:var(--text-lo)">(fund × structure)</span></div>
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px">
                  <button @click.prevent="if(!cfgLocked){cfg.fcwGatePosFundBull=!(cfg.fcwGatePosFundBull??false);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.fcwGatePosFundBull??false)?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.12)':'border-color:var(--border);color:var(--text-lo)'">+fund<br>+bull</button>
                  <button @click.prevent="if(!cfgLocked){cfg.fcwGatePosFundBear=!(cfg.fcwGatePosFundBear??true);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.fcwGatePosFundBear??true)?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.12)':'border-color:var(--border);color:var(--text-lo)'">+fund<br>+bear</button>
                  <button @click.prevent="if(!cfgLocked){cfg.fcwGateNegFundBull=!(cfg.fcwGateNegFundBull??true);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.fcwGateNegFundBull??true)?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.12)':'border-color:var(--border);color:var(--text-lo)'">-fund<br>+bull</button>
                  <button @click.prevent="if(!cfgLocked){cfg.fcwGateNegFundBear=!(cfg.fcwGateNegFundBear??false);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.fcwGateNegFundBear??false)?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.12)':'border-color:var(--border);color:var(--text-lo)'">-fund<br>+bear</button>
                </div>
                <div class="fcw-hint" style="margin-top:4px" x-text="(()=>{ const lean=pfStatus?.lean??null; if(lean===null) return '⚠ No Permafrost — fires on funding direction from any enabled gate'; return (lean>0?'↑ Bullish':'↓ Bearish')+' lean ('+lean.toFixed(2)+') — matching gates active'; })()"></div>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;

      return Object.assign({}, def, {

        async init() {
          await _origInit.call(this);
          if (this.cfg.fcwEnabled         === undefined) this.cfg.fcwEnabled         = false;
          if (this.cfg.fcwPicks           === undefined) this.cfg.fcwPicks           = 3;
          if (this.cfg.fcwShareCapEnabled === undefined) this.cfg.fcwShareCapEnabled = true;
          if (this.cfg.fcwShareCapPct     === undefined) this.cfg.fcwShareCapPct     = 50;
          // v1.2: fcwFrMin → fcwFrThreshold (magnitude); gate bar replaces structure-aware toggle
          if (this.cfg.fcwFrThreshold     === undefined)
            this.cfg.fcwFrThreshold = this.cfg.fcwFrMin ?? 0.1;
          if (this.cfg.fcwGatePosFundBull === undefined) this.cfg.fcwGatePosFundBull = false;
          if (this.cfg.fcwGatePosFundBear === undefined) this.cfg.fcwGatePosFundBear = true;
          if (this.cfg.fcwGateNegFundBull === undefined) this.cfg.fcwGateNegFundBull = true;
          if (this.cfg.fcwGateNegFundBear === undefined) this.cfg.fcwGateNegFundBear = false;
          this.registerRoleBadge?.(item => (item && item._fcw)
            ? `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(96,210,255,.45);color:var(--ice);background:rgba(96,210,255,.10)">💰 FUND</span>`
            : null);
          this.log(`[FCW] Fund Chasing (Winter) v1.2.0 loaded — ${this.cfg.fcwEnabled ? 'enabled' : 'disabled'} | ±${(this.cfg.fcwFrThreshold ?? 0.1).toFixed(2)}% threshold | ${this.cfg.fcwPicks}/cycle | gates: ${[this.cfg.fcwGatePosFundBull?'+F+B':null,this.cfg.fcwGatePosFundBear?'+F-B':null,this.cfg.fcwGateNegFundBull?'-F+B':null,this.cfg.fcwGateNegFundBear?'-F-B':null].filter(Boolean).join(',')||'none'}`, 'info');
        },

        async runScan() {
          await _origScan.call(this);
          await this._fcwRunScan();
        },

        async _fcwRunScan() {
          if (!this.cfg.fcwEnabled) return;
          if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) {
            this.log(`[FCW] 💰 Skipped — ${this._isGainsLocked?.() ? 'gains lock' : 'drawdown halt'} active`, 'info');
            return;
          }
          if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) return;

          // Only act on a fresh bulk ticker fetch — skip if the cache timestamp
          // hasn't advanced since the last time we processed entries.
          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._fcwLastActedAt) return;

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;

          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.fcwShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.fcwShareCapPct ?? 50) / 100)));
            const fcwCount = (this.positions || []).filter(p => p._fcw).length;
            headroom = Math.min(headroom, capSlots - fcwCount);
            if (headroom < 1) {
              this.log(`[FCW] 💰 Share cap reached — no slots reserved for Fund Chasing`, 'info');
              this._fcwLastActedAt = freshAt;
              return;
            }
          }
          const picks = Math.min(Math.max(1, Math.round(this.cfg.fcwPicks ?? 3)), headroom);

          const frThreshold = this.cfg.fcwFrThreshold ?? 0.1;
          const activeSyms  = new Set((this.positions || []).map(p => p.symbol));

          // Gate selection: each (funding direction × market structure) combo is independently
          // togglable. When Permafrost lean is available, only gates matching current structure fire.
          // When unavailable, fires on funding direction from any enabled gate.
          const _pfLean      = this.pfStatus?.lean ?? null;
          const hasStructure = _pfLean !== null;
          const isBullish    = hasStructure && _pfLean > 0;
          const isBearish    = hasStructure && _pfLean < 0;

          const gPosFundBull = this.cfg.fcwGatePosFundBull ?? false;
          const gPosFundBear = this.cfg.fcwGatePosFundBear ?? true;
          const gNegFundBull = this.cfg.fcwGateNegFundBull ?? true;
          const gNegFundBear = this.cfg.fcwGateNegFundBear ?? false;

          const usePosFund = hasStructure
            ? (isBullish && gPosFundBull) || (isBearish && gPosFundBear)
            : gPosFundBull || gPosFundBear;
          const useNegFund = hasStructure
            ? (isBullish && gNegFundBull) || (isBearish && gNegFundBear)
            : gNegFundBull || gNegFundBear;

          if (!usePosFund && !useNegFund) {
            this._fcwLastActedAt = freshAt;
            this.log(`[FCW] 💰 No gate active for current structure (lean ${_pfLean?.toFixed(2) ?? 'n/a'}) — skipping`, 'info');
            return;
          }

          const pool = allTickers
            .filter(t => {
              if (!t.symbol.endsWith('USDT') || t.symbol === 'BTCUSDT') return false;
              if (parseFloat(t.lastPrice || 0) < 0.001) return false;
              if (t.fundingRate == null) return false;
              const fr = parseFloat(t.fundingRate) * 100;
              return ((usePosFund && fr >= frThreshold) || (useNegFund && fr <= -frThreshold))
                && !activeSyms.has(t.symbol) && !(this._isSymbolBanned?.(t.symbol));
            })
            .sort((a, b) => {
              const frA = parseFloat(a.fundingRate || 0);
              const frB = parseFloat(b.fundingRate || 0);
              if (usePosFund && !useNegFund) return frB - frA;  // most positive first
              if (useNegFund && !usePosFund) return frA - frB;  // most negative first
              return Math.abs(frB) - Math.abs(frA);             // highest magnitude first
            });

          this._fcwLastActedAt = freshAt;

          const structLabel = hasStructure ? ` [${isBullish ? '↑bull' : isBearish ? '↓bear' : 'neutral'} ${_pfLean.toFixed(2)}]` : '';
          const gateDesc = `${usePosFund ? '+fund' : ''}${usePosFund && useNegFund ? '/' : ''}${useNegFund ? '-fund' : ''} ±${frThreshold.toFixed(2)}%${structLabel}`;

          if (!pool.length) {
            this.log(`[FCW] 💰 No tickers with ${gateDesc} in fresh snapshot`, 'info');
            return;
          }

          let opened = 0;
          this._logBatchBegin?.();
          try {
            for (const t of pool) {
              if (opened >= picks) break;
              if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) break;
              if (await this._fcwOpen(t)) opened++;
            }
          } finally { this._logBatchEnd?.('[FCW] 💰 Entry roll-up'); }
          this.log(`[FCW] 💰 ${pool.length} tickers ${gateDesc} — ${opened}/${picks} opened`, 'info');
        },

        async _fcwOpen(t) {
          const sym    = t.symbol;
          const price  = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const lenBefore = (this.positions || []).length;
          await this.pseudoOpenShort({ symbol: sym, price, change, fundingRate: fr, _fcw: true });
          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._fcw = true;
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const isFcw   = pos._fcw === true;
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if (isFcw && (this.closedTrades?.length ?? 0) > prevLen) {
            this.closedTrades[0]._fcw = true;
            this.persist?.();
            this.renderTradeFeed?.();
          }
        },
      });
    },
  };
})();
</script>
