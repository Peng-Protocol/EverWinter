<!--
  Firestorm Strategy Plugin for PseudoChaser
  Random scattershot longs — a bet on the market at large.

  Each scan cycle picks N random tickers whose |24h change| clears a
  configurable baseline and longs them with a fixed SL / far TP, force-closing
  any survivor after 12 hours. The TP slider is the buffered (EV) value like the
  general-settings TP UI — functional TP = slider ÷ Profit Offset buffer (default
  105% buffered → 70% functional at +50%). The barrier geometry (functional TP
  70% / SL 18% default) means a single TP win covers ~3.9 SL losses; the edge comes from firing only
  when the broad market drifts the bot's way. When Ashfall is loaded and its
  climate profile has sufficient evidence, a hostile reading defers the cycle.

  Entries are subject to the host's drawdown throttle and gains lock, and to
  Ashfall governance of those halts when it is loaded.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const HOLD_MS          = 12 * 3600 * 1000; // force-close survivors after 12h
  const CLIMATE_MIN_MASS = 6;                // evidence mass required to honor an Ashfall reading
  const CLIMATE_STALE_MS = 2 * 3600 * 1000;  // ignore readings older than this

  window.__BotPlugin = {
    id:        'firestorm-chaser',
    name:      'Firestorm (Chaser)',
    version:   '1.2.1',
    targetBot: 'pseudochaser',
    after:     ['sunchaser', 'ashfall-chaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan', 'pseudoWatchPositions', 'pseudoClosePosition', 'renderTradeFeed'],

    css: `
      .fst-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.firestormEnabled"> + Firestorm</span>`,
      'pos-card-badges': `<span x-show="p._firestorm" style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(255,150,80,.45);color:#ff9650;background:rgba(255,150,80,.10)">🔥 FIRE</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>🔥 Firestorm</span>
              <span x-show="cfg.firestormEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.firestormEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.firestormEnabled=!cfg.firestormEnabled;persist()}">
              <div class="tog-t" :class="cfg.firestormEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Firestorm Mode</div>
                <div class="fst-hint">Random scattershot longs across big 24h movers — a bet on the market at large. Survivors force-close after 12h. Defers when Ashfall reads a hostile climate.</div>
              </div>
            </label>
            <div x-show="cfg.firestormEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Baseline 24h Δ <b x-text="(cfg.firestormBaselinePct??6).toFixed(1)+'%'"></b></div>
                <input type="range" min="1" max="20" step="0.5" x-model.number="cfg.firestormBaselinePct" @change="persist()">
                <div class="fst-hint">A ticker qualifies when its 24h change exceeds this in either direction; picks alternate between gainers and losers so each cycle spans both sides.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Picks / Cycle <b x-text="(cfg.firestormPicks??3)"></b></div>
                <input type="range" min="1" max="10" step="1" x-model.number="cfg.firestormPicks" @change="persist()">
                <div class="fst-hint">Random tickers longed per scan cycle, until max positions or a halt.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Stop Loss <b x-text="(cfg.firestormSlPct??18)+'%'"></b></div>
                <input type="range" min="5" max="50" step="1" x-model.number="cfg.firestormSlPct" @change="persist()">
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Take Profit <b x-text="(cfg.firestormTpPct??105)+'% → '+((cfg.firestormTpPct??105)/(1+(Math.max(-99,cfg.laggardProfitOffset??50)/100))).toFixed(1)+'%'"></b></div>
                <input type="range" min="20" max="300" step="5" x-model.number="cfg.firestormTpPct" @change="persist()">
                <div class="fst-hint">Buffered (EV) target; a debt-free position closes at the functional TP = slider ÷ buffer (Profit Offset). One functional win covers ~<span x-text="(((cfg.firestormTpPct??105)/(1+(Math.max(-99,cfg.laggardProfitOffset??50)/100)))/(cfg.firestormSlPct??18)).toFixed(1)"></span> stop-loss exits.</div>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origScan  = def.runScan;
      const _origWatch = def.pseudoWatchPositions;
      const _origClose = def.pseudoClosePosition;
      const _origRender = def.renderTradeFeed;

      return Object.assign({}, def, {

        _fstDeferLogged: false,

        async init() {
          await _origInit.call(this);
          if (this.cfg.firestormEnabled     === undefined) this.cfg.firestormEnabled     = false;
          if (this.cfg.firestormBaselinePct === undefined) this.cfg.firestormBaselinePct = 6;
          if (this.cfg.firestormSlPct       === undefined) this.cfg.firestormSlPct       = 18;
          if (this.cfg.firestormPicks       === undefined) this.cfg.firestormPicks       = 3;
          // v1.1: TP slider is now the buffered (EV) value like the general-settings TP UI.
          // One-time migration resets pre-buffer (functional) values to the new default.
          if (this.cfg.firestormTpBuffered !== true) {
            this.cfg.firestormTpBuffered = true;
            this.cfg.firestormTpPct = 105;
            if (typeof this.persist === 'function') this.persist();
          }
          // Backfill the role-badge override on positions opened before v1.2.1
          for (const p of this.positions || []) if (p._firestorm) p._roleBadgeOverride = true;
          const _fstFuncTp = (this.cfg.firestormTpPct ?? 105) / this._buffMul();
          this.log(`[FST] Firestorm (Chaser) v1.2.1 loaded — ${this.cfg.firestormEnabled ? 'enabled' : 'disabled'} | baseline ${(this.cfg.firestormBaselinePct ?? 6).toFixed(1)}% | SL ${this.cfg.firestormSlPct}% / TP ${this.cfg.firestormTpPct}% buffered (${_fstFuncTp.toFixed(1)}% functional) | ${this.cfg.firestormPicks}/cycle`, 'info');
        },

        // Ashfall climate reading, when present and evidenced. null = no opinion.
        _fstClimate() {
          const st = this.afStatus;
          if (!st || !st.at || (Date.now() - st.at) > CLIMATE_STALE_MS) return null;
          if ((st.mass || 0) < CLIMATE_MIN_MASS || st.score === null || st.score === undefined) return null;
          return st.score;
        },

        async runScan() {
          await _origScan.call(this);
          await this._fstRunScan();
        },

        async _fstRunScan() {
          if (!this.cfg.firestormEnabled) return;
          if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) return;
          if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) return;

          const climate = this._fstClimate();
          if (climate !== null && climate < 0) {
            if (!this._fstDeferLogged) {
              this._fstDeferLogged = true;
              this.log(`[FST] 🔥 Hostile climate (score ${climate.toFixed(2)}) — Firestorm deferred`, 'info');
            }
            return;
          }
          this._fstDeferLogged = false;

          let opened = 0, poolSize = 0, poolG = 0, poolL = 0;
          const picks = Math.max(1, Math.round(this.cfg.firestormPicks ?? 3));
          try {
            // Reuse the host scan's bulk ticker response when fresh
            let allTickers;
            if (this._lastAllTickers?.length && (Date.now() - (this._lastAllTickersAt || 0)) < 60000) {
              allTickers = this._lastAllTickers;
            } else {
              const tr = await fetch(`${this.base}/v5/market/tickers?category=linear`);
              const td = await tr.json();
              if (td.retCode !== 0) {
                this.log(`[FST] Scan: ticker fetch error — retCode ${td.retCode} ${td.retMsg || ''}`.trim(), 'warn');
                return;
              }
              allTickers = td.result?.list || [];
            }

            const baseline   = this.cfg.firestormBaselinePct ?? 6;
            const activeSyms = new Set((this.positions || []).map(p => p.symbol));
            const pool = allTickers.filter(t =>
              t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
              && parseFloat(t.lastPrice || 0) >= 0.001
              && Math.abs(parseFloat(t.price24hPcnt || 0) * 100) >= baseline
              && !activeSyms.has(t.symbol)
              && !(this._isSymbolBanned?.(t.symbol)));
            poolSize = pool.length;

            // Draw alternately from gainers (≥ +baseline) and losers (≤ −baseline) so a
            // cycle's picks span both sides of the move, not just whichever dominates.
            const gainers = pool.filter(t => parseFloat(t.price24hPcnt || 0) > 0);
            const losers  = pool.filter(t => parseFloat(t.price24hPcnt || 0) < 0);
            poolG = gainers.length; poolL = losers.length;
            let tried = 0;
            let side  = Math.random() < 0.5 ? 0 : 1;
            while ((gainers.length || losers.length) && opened < picks && tried < picks * 3
                   && (this.positions?.length ?? 0) < (this.cfg.maxPos ?? 5)) {
              let src = side === 0 ? gainers : losers;
              if (!src.length) src = side === 0 ? losers : gainers;
              const t = src.splice(Math.floor(Math.random() * src.length), 1)[0];
              side = 1 - side;
              tried++;
              if (await this._fstOpen(t)) opened++;
            }
          } catch(e) {
            this.log('[FST] Scan error: ' + e.message, 'warn');
            return;
          }
          this.log(`[FST] 🔥 Scattershot: ${poolSize} movers ≥±${(this.cfg.firestormBaselinePct ?? 6).toFixed(1)}% (${poolG}▲/${poolL}▼) — ${opened}/${picks} opened${climate !== null ? ` | climate ${climate.toFixed(2)}` : ''}`, 'info');
        },

        // Open one scatter long. The host (sim and live) reads binary TP/SL from cfg
        // at open time, so the firestorm values are swapped in around the call. The TP
        // slider is the buffered (EV) value — passed straight through as binaryTpPct;
        // the host derives the functional TP as slider ÷ _buffMul.
        async _fstOpen(t) {
          const sym   = t.symbol;
          const price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const rsi6  = (await this.fetchRSI(sym, 6))  ?? 50;
          const rsi12 = (await this.fetchRSI(sym, 12)) ?? 50;
          const rsi24 = (await this.fetchRSI(sym, 24)) ?? 50;

          // Suppress main lock-in bumps — scatter entries are not signal trades
          const _gbump  = this.gainerLockInBump;
          const _gsbump = this.gainerStratLockInBump;
          this.gainerLockInBump      = () => {};
          this.gainerStratLockInBump = () => {};

          const _pb = {
            be: this.cfg.binaryModeEnabled,
            tp: this.cfg.binaryTpPct,
            sl: this.cfg.binarySlPct,
          };
          this.cfg.binaryModeEnabled = true;
          this.cfg.binaryTpPct = this.cfg.firestormTpPct ?? 105;
          this.cfg.binarySlPct = this.cfg.firestormSlPct ?? 18;

          const lenBefore = (this.positions || []).length;
          try {
            await this.pseudoOpenShort({ symbol: sym, price, change, rsi6, rsi12, rsi24, _firestorm: true });
          } finally {
            this.cfg.binaryModeEnabled = _pb.be;
            this.cfg.binaryTpPct       = _pb.tp;
            this.cfg.binarySlPct       = _pb.sl;
            this.gainerLockInBump      = _gbump;
            this.gainerStratLockInBump = _gsbump;
            if (typeof this.persist === 'function') this.persist(); // re-save restored cfg
          }

          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._firestorm         = true;
            pos._slPctOverride     = this.cfg.firestormSlPct ?? 18; // keeps the watcher's SL drift-correction on our value
            pos._roleBadgeOverride = true; // suppress the host's gainer/loser role badge — the FIRE badge takes its place
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        // Authoritative exits for scatter positions: functional-ROI TP/SL plus the 12h
        // force-close. The host enforces TP/SL too (exchange-native in live mode); this
        // wrap guarantees the configured levels regardless of EDa adjustments or the
        // sim/live TP-buffer asymmetry. Manages existing positions even when disabled.
        async pseudoWatchPositions() {
          await _origWatch.call(this);
          const now = Date.now();
          // Slider is buffered; the watcher enforces the functional ROI (slider ÷ buffer).
          const tp  = (this.cfg.firestormTpPct ?? 105) / this._buffMul();
          const sl  = this.cfg.firestormSlPct ?? 18;
          for (const pos of [...(this.positions || [])]) {
            if (!pos._firestorm) continue;
            if (!this.positions.find(x => x.id === pos.id)) continue; // closed earlier this pass
            const roi = pos.margin > 0 ? ((pos.upnl || 0) / pos.margin) * 100 : 0;
            if (roi >= tp) {
              this.log(`[FST] 🔥 ${pos.symbol.replace('USDT','')}: TP — ROI ${roi.toFixed(1)}% ≥ ${tp.toFixed(1)}% (functional)`, 'success');
              await this.pseudoClosePosition(pos, 'tp', pos.markPrice);
              continue;
            }
            if (roi <= -sl) {
              this.log(`[FST] 🔥 ${pos.symbol.replace('USDT','')}: SL — ROI ${roi.toFixed(1)}% ≤ −${sl}%`, 'warn');
              await this.pseudoClosePosition(pos, 'sl', pos.markPrice);
              continue;
            }
            if (now - (pos.openedAt || now) >= HOLD_MS) {
              this.log(`[FST] 🔥 ${pos.symbol.replace('USDT','')}: 12h up — force close @ ROI ${roi.toFixed(1)}%`, 'info');
              await this.pseudoClosePosition(pos, 'firestorm-12h', pos.markPrice);
            }
          }
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const isFst   = pos._firestorm === true;
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          // Carry the stamp onto the newly prepended closed trade record
          if (isFst && (this.closedTrades?.length ?? 0) > prevLen) {
            this.closedTrades[0]._firestorm = true;
          }
        },

        renderTradeFeed() {
          _origRender.call(this);
          if (!this.closedTrades?.some(t => t._firestorm)) return;
          const el = document.getElementById('pw-trade-feed');
          if (!el) return;
          const sorted = this.closedTrades
            .filter(t => t.reason !== 'period-rollup')
            .sort((a, b) => (b.closedAt || 0) - (a.closedAt || 0));
          const cards = el.querySelectorAll(':scope > div');
          sorted.forEach((t, idx) => {
            if (!t._firestorm || !cards[idx]) return;
            const badge = document.createElement('span');
            badge.style.cssText = 'font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(255,150,80,.45);color:#ff9650;background:rgba(255,150,80,.10)';
            badge.textContent = 'FST';
            const headFlex = cards[idx].querySelector('div[style*="display:flex"]');
            if (headFlex) headFlex.appendChild(badge);
          });
        },
      });
    },
  };
})();
</script>
