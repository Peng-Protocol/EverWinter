<!--
  Firestorm Strategy Plugin for PseudoChaser
  Random scattershot longs — a bet on the market at large.

  Each scan cycle picks N random tickers whose |24h change| clears a
  configurable baseline and longs them using the host's binary TP/SL, force-closing
  any survivor after 12 hours. The edge comes from firing only when the broad
  market drifts the bot's way. Drawdown throttle and gains lock gate all entries;
  Ashfall governs those halts when loaded.

  Cascade (on by default): once collective uPnL across all open positions
  reaches the TP target (slider% × base margin), every position is bailed for
  net profit — feeding the gains lock and seeding Ashfall data.

  Entries are subject to the host's drawdown throttle and gains lock, and to
  Ashfall governance of those halts when it is loaded.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const HOLD_MS          = 12 * 3600 * 1000; // force-close survivors after 12h

  window.__BotPlugin = {
    id:        'firestorm-chaser',
    name:      'Firestorm (Chaser)',
    version:   '1.7.0',
    targetBot: 'pseudochaser',
    after:     ['sunchaser', 'ashfall-chaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan', 'pseudoWatchPositions', 'pseudoClosePosition'],

    css: `
      .fst-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; } /* hint text: one sentence max */
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.firestormEnabled"> + Firestorm</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Firestorm</span>
              <span x-show="cfg.firestormEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.firestormEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.firestormEnabled=!cfg.firestormEnabled;persist()}">
              <div class="tog-t" :class="cfg.firestormEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Firestorm Mode</div>
                <div class="fst-hint">Random scattershot longs across big 24h movers; survivors force-close after 12h.</div>
              </div>
            </label>
            <div x-show="cfg.firestormEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Baseline 24h Δ <b x-text="(cfg.firestormBaselinePct??6).toFixed(1)+'%'"></b></div>
                <input type="range" min="1" max="20" step="0.5" x-model.number="cfg.firestormBaselinePct" @change="persist()">
                <div class="fst-hint">Qualifies tickers with |24h Δ| ≥ baseline; gates below filter by change direction and vol/mcap.</div>
              </div>
              <div style="margin-top:10px">
                <div class="lbl" style="margin-bottom:4px">Entry Gates <span style="font-size:9px;font-weight:normal;color:var(--text-lo)">(24h Δ × vol/mcap)</span></div>
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px">
                  <button @click.prevent="if(!cfgLocked){cfg.firestormGatePosAbove=!(cfg.firestormGatePosAbove??true);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.firestormGatePosAbove??true)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'">↑<br>&gt;10%</button>
                  <button @click.prevent="if(!cfgLocked){cfg.firestormGatePosBelow=!(cfg.firestormGatePosBelow??false);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.firestormGatePosBelow??false)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'">↑<br>&lt;10%</button>
                  <button @click.prevent="if(!cfgLocked){cfg.firestormGateNegBelow=!(cfg.firestormGateNegBelow??false);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.firestormGateNegBelow??false)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'">↓<br>&lt;10%</button>
                  <button @click.prevent="if(!cfgLocked){cfg.firestormGateNegAbove=!(cfg.firestormGateNegAbove??false);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.firestormGateNegAbove??false)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'">↓<br>&gt;10%</button>
                </div>
                <div class="fst-hint" style="margin-top:4px">Ticker qualifies when its change direction and vol/mcap ratio match any active gate.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Picks / Cycle <b x-text="(cfg.firestormPicks??3)"></b></div>
                <input type="range" min="1" max="10" step="1" x-model.number="cfg.firestormPicks" @change="persist()">
                <div class="fst-hint">Random tickers longed per scan cycle, until max positions or a halt.</div>
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.firestormShareCapEnabled=!(cfg.firestormShareCapEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.firestormShareCapEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Position Share Cap</div>
                  <div class="fst-hint">Keeps Firestorm from crowding out regular entries by capping its share of Max Concurrent Positions.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.firestormShareCapEnabled??true" style="margin-top:8px">
                <div class="lbl">Max Share <b x-text="(cfg.firestormShareCapPct??50)+'% ('+Math.max(1,Math.floor((cfg.maxPos??5)*((cfg.firestormShareCapPct??50)/100)))+' of '+(cfg.maxPos??5)+' slots)'"></b></div>
                <input type="range" min="10" max="100" step="5" x-model.number="cfg.firestormShareCapPct" @change="persist()">
                <div class="fst-hint">Firestorm holds at most this % of max positions; the remaining slots stay reserved for regular entries.</div>
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.firestormCascadeEnabled=!(cfg.firestormCascadeEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.firestormCascadeEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Cascade</div>
                  <div class="fst-hint">Bails all positions when collective uPnL hits the host's TP target ($<span x-text="(((cfg.binaryTpPct??18)/100)*((cfg.minNotional||6)/(cfg.leverage||6))).toFixed(2)"></span> at current settings).</div>
                </div>
              </label>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origScan  = def.runScan;
      const _origWatch = def.pseudoWatchPositions;
      const _origClose = def.pseudoClosePosition;

      return Object.assign({}, def, {


        async init() {
          await _origInit.call(this);
          if (this.cfg.firestormEnabled     === undefined) this.cfg.firestormEnabled     = false;
          if (this.cfg.firestormBaselinePct === undefined) this.cfg.firestormBaselinePct = 6;
          if (this.cfg.firestormPicks       === undefined) this.cfg.firestormPicks       = 3;
          if (this.cfg.firestormCascadeEnabled === undefined) this.cfg.firestormCascadeEnabled = true;
          if (this.cfg.firestormShareCapEnabled === undefined) this.cfg.firestormShareCapEnabled = true;
          if (this.cfg.firestormShareCapPct     === undefined) this.cfg.firestormShareCapPct     = 50;
          if (this.cfg.firestormGatePosAbove === undefined) this.cfg.firestormGatePosAbove = true;
          if (this.cfg.firestormGatePosBelow === undefined) this.cfg.firestormGatePosBelow = false;
          if (this.cfg.firestormGateNegBelow === undefined) this.cfg.firestormGateNegBelow = false;
          if (this.cfg.firestormGateNegAbove === undefined) this.cfg.firestormGateNegAbove = false;
          // Render the 🔥 FIRE role badge for any Firestorm position or closed trade.
          this.registerRoleBadge?.(item => (item && item._firestorm)
            ? `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(255,150,80,.45);color:#ff9650;background:rgba(255,150,80,.10)">🔥 FIRE</span>`
            : null);
          this.log(`[FST] Firestorm (Chaser) v1.7.0 loaded — ${this.cfg.firestormEnabled ? 'enabled' : 'disabled'} | baseline ${(this.cfg.firestormBaselinePct ?? 6).toFixed(1)}% | host TP/SL | ${this.cfg.firestormPicks}/cycle | cascade ${(this.cfg.firestormCascadeEnabled ?? true) ? 'on' : 'off'}`, 'info');
        },

        async runScan() {
          await _origScan.call(this);
          await this._fstRunScan();
        },

        async _fstRunScan() {
          if (!this.cfg.firestormEnabled) return;
          if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) {
            this.log(`[FST] 🔥 Scatter skipped — ${this._isGainsLocked?.() ? 'gains lock' : 'drawdown halt / PLK'} active`, 'info');
            return;
          }
          if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) return;

          let opened = 0, poolSize = 0, poolFiltered = 0;
          // Picks are capped at remaining position headroom — at 9/10 only one more opens.
          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          // Share cap — Firestorm holds at most firestormShareCapPct% of maxPos so scatter
          // entries can't crowd out regular entries. Default on at 50%.
          if (this.cfg.firestormShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.firestormShareCapPct ?? 50) / 100)));
            const fstCount = (this.positions || []).filter(p => p._firestorm).length;
            headroom = Math.min(headroom, capSlots - fstCount);
            if (headroom < 1) {
              if (!this._fstCapLogged) {
                this._fstCapLogged = true;
                this.log(`[FST] 🔥 Share cap reached (${fstCount}/${capSlots} scatter slots of ${this.cfg.maxPos ?? 5} max) — leaving room for regular entries`, 'info');
              }
              return;
            }
          }
          this._fstCapLogged = false;
          const picks = Math.min(Math.max(1, Math.round(this.cfg.firestormPicks ?? 3)), headroom);
          if (picks < 1) return;
          const gatePosAbove = this.cfg.firestormGatePosAbove ?? true;
          const gatePosBelow = this.cfg.firestormGatePosBelow ?? false;
          const gateNegBelow = this.cfg.firestormGateNegBelow ?? false;
          const gateNegAbove = this.cfg.firestormGateNegAbove ?? false;
          try {
            // Use host cache — 24h change % is stale-safe across the bulk ticker cooldown window
            let allTickers;
            if (this._lastAllTickers?.length) {
              allTickers = this._lastAllTickers;
            } else {
              const tr = await fetch(`${this.base}/v5/market/tickers?category=linear`);
              const td = await tr.json();
              if (td.retCode !== 0) {
                this.log(`[FST] Scan: ticker fetch error — retCode ${td.retCode} ${td.retMsg || ''}`.trim(), 'warn');
                return;
              }
              allTickers = td.result?.list || [];
              this._lastAllTickers   = allTickers;
              this._lastAllTickersAt = Date.now();
            }

            const baseline   = this.cfg.firestormBaselinePct ?? 6;
            const activeSyms = new Set((this.positions || []).map(p => p.symbol));
            const pool = allTickers.filter(t =>
              t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
              && parseFloat(t.lastPrice || 0) >= 0.001
              && Math.abs(parseFloat(t.price24hPcnt || 0) * 100) >= baseline
              && !activeSyms.has(t.symbol)
              && !(this._isSymbolBanned?.(t.symbol)));
            poolSize = pool.length;

            // Sort baseline movers by 24h turnover desc; inspect up to 10 for vol/mcap ratio.
            // Mcaps are pre-fetched in a 2-call batch (coins/list + simple/price) before the loop.
            const sorted  = [...pool].sort((a, b) => parseFloat(b.turnover24h || 0) - parseFloat(a.turnover24h || 0));
            const inspect = sorted.slice(0, 10);
            await this._fstPrefetchMcaps(inspect.map(t => t.symbol.replace(/USDT$/i, '').toLowerCase()));
            const longPool = [];
            for (const t of inspect) {
              const mcap = this._fstGetMcapSync(t.symbol.replace(/USDT$/i, '').toLowerCase());
              if (!mcap) continue;
              const ratio  = parseFloat(t.turnover24h || 0) / mcap;
              const chgPos = parseFloat(t.price24hPcnt || 0) > 0;
              const above  = ratio > 0.10;
              if ((chgPos && above && gatePosAbove) || (chgPos && !above && gatePosBelow) ||
                  (!chgPos && !above && gateNegBelow) || (!chgPos && above && gateNegAbove)) longPool.push(t);
            }
            poolFiltered = longPool.length;
            const activeGates = [gatePosAbove?'↑>10%':null,gatePosBelow?'↑<10%':null,gateNegBelow?'↓<10%':null,gateNegAbove?'↓>10%':null].filter(Boolean).join(',');
            if (!poolFiltered) {
              this.log(`[FST] 🔥 Scattershot: ${poolSize} movers ≥±${(this.cfg.firestormBaselinePct ?? 6).toFixed(1)}%, checked ${inspect.length} by turnover — none matched gates [${activeGates||'none'}]`, 'info');
              return;
            }
            const candidates = [...longPool];
            let tried = 0;
            this._logBatchBegin?.();
            try {
              while (candidates.length && opened < picks && tried < picks * 3
                     && (this.positions?.length ?? 0) < (this.cfg.maxPos ?? 5)) {
                const idx = Math.floor(Math.random() * candidates.length);
                const t   = candidates.splice(idx, 1)[0];
                tried++;
                if (await this._fstOpen(t)) opened++;
              }
            } finally { this._logBatchEnd?.('[FST] 🔥 Entry roll-up'); }
          } catch(e) {
            this.log('[FST] Scan error: ' + e.message, 'warn');
            return;
          }
          this.log(`[FST] 🔥 Scattershot: ${poolSize} movers ≥±${(this.cfg.firestormBaselinePct ?? 6).toFixed(1)}%, ${poolFiltered} matched gates [${activeGates||'none'}] — ${opened}/${picks} opened`, 'info');
        },

        // Pre-fetches mcaps for a batch of base symbols in 2 API calls:
        //   1. window.__cgCoinList — /coins/list, fetched once per page session, shared across plugins
        //   2. /simple/price?ids=A,B,C — one batch call for all uncached IDs
        async _fstPrefetchMcaps(bases) {
          if (!this._fstCoinIdCache) this._fstCoinIdCache = {};
          if (!this._fstMcapCache)   this._fstMcapCache   = {};
          const now = Date.now();
          const unknown = bases.filter(b => this._fstCoinIdCache[b] === undefined);
          if (unknown.length) {
            if (!window.__cgCoinList) {
              // Restore from localStorage if fresh (24h TTL)
              try {
                const s = JSON.parse(localStorage.getItem('__cgCoinList') || 'null');
                if (s?.list?.length && Date.now() - s.ts < 86_400_000) window.__cgCoinList = s.list;
              } catch(e) {}
            }
            if (!window.__cgCoinList) {
              try {
                const r = await fetch('https://api.coingecko.com/api/v3/coins/list?include_platform=false');
                if (r.ok) {
                  window.__cgCoinList = await r.json();
                  try { localStorage.setItem('__cgCoinList', JSON.stringify({ list: window.__cgCoinList, ts: Date.now() })); } catch(e) {}
                }
              } catch(e) { /* will result in cache misses */ }
            }
            if (window.__cgCoinList) {
              for (const base of unknown) {
                const hit = window.__cgCoinList.find(c => c.symbol === base);
                this._fstCoinIdCache[base] = hit?.id || '';
              }
            }
          }
          const ids = [...new Set(
            bases.map(b => this._fstCoinIdCache[b]).filter(id => {
              if (!id) return false;
              const c = this._fstMcapCache[id];
              return !c || now - c.ts >= 3_600_000;
            })
          )];
          if (!ids.length) return;
          try {
            const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=usd&include_market_cap=true`);
            if (r.ok) {
              const d = await r.json();
              for (const id of ids) {
                const mcap = d?.[id]?.usd_market_cap;
                if (mcap) this._fstMcapCache[id] = { mcap, ts: now };
              }
            }
          } catch(e) { /* silent — inspect loop will skip nulls */ }
        },

        _fstGetMcapSync(base) {
          const id = this._fstCoinIdCache?.[base];
          if (!id) return null;
          const c = this._fstMcapCache?.[id];
          return (c && Date.now() - c.ts < 3_600_000) ? c.mcap : null;
        },

        // Open one scatter long using the host's configured binary TP/SL. Binary mode
        // is forced on for the open call so the host's binaryTpPct/binarySlPct apply
        // without any per-plugin override.
        async _fstOpen(t) {
          const sym   = t.symbol;
          const price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const rsi6  = (await this.fetchRSI(sym, 6))  ?? 50;
          const rsi12 = (await this.fetchRSI(sym, 12)) ?? 50;
          const rsi24 = (await this.fetchRSI(sym, 24)) ?? 50;

          const _prevBinaryEnabled = this.cfg.binaryModeEnabled;
          this.cfg.binaryModeEnabled = true;

          const lenBefore = (this.positions || []).length;
          try {
            await this.pseudoOpenLong({ symbol: sym, price, change, rsi6, rsi12, rsi24, _firestorm: true });
          } finally {
            this.cfg.binaryModeEnabled = _prevBinaryEnabled;
            if (typeof this.persist === 'function') this.persist();
          }

          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._firestorm = true; // host renders the 🔥 FIRE role badge via the registered renderer
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        // Authoritative exits for scatter positions: functional-ROI TP/SL plus the 12h
        // force-close. The host enforces TP/SL too (exchange-native in live mode); this
        // wrap guarantees the configured levels regardless of EDa adjustments or the
        // sim/live TP-buffer asymmetry. Manages existing positions even when disabled.
        async pseudoWatchPositions() {
          await _origWatch.call(this);
          // Cascade — bail the whole book for net profit once collective uPnL clears the
          // TP target (slider% × base margin). Feeds the gains lock and seeds Ashfall data.
          if (this.cfg.firestormEnabled && (this.cfg.firestormCascadeEnabled ?? true)
              && !this._fstCascading && (this.positions?.length ?? 0) > 0) {
            const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
            const target     = ((this.cfg.binaryTpPct ?? 18) / 100) * baseMargin;
            const collective = this.positions.reduce((s, p) => s + (p.upnl || 0), 0);
            if (collective >= target) {
              this._fstCascading = true;
              try {
                this.log(`[FST] 🔥 Cascade — collective uPnL $${collective.toFixed(2)} ≥ target $${target.toFixed(2)} (${this.cfg.binaryTpPct ?? 18}% of $${baseMargin.toFixed(2)} base margin) — bailing ${this.positions.length} position(s) for net profit`, 'success');
                this._logBatchBegin?.();
                try {
                  for (const pos of [...this.positions]) {
                    await this.pseudoClosePosition(pos, 'cascade', pos.markPrice);
                  }
                } finally { this._logBatchEnd?.('[FST] 🔥 Cascade roll-up'); }
              } finally { this._fstCascading = false; }
              return;
            }
          }
          const now = Date.now();
          const tp  = this.cfg.binaryTpPct ?? 18;
          const sl  = this.cfg.binarySlPct ?? 18;
          this._logBatchBegin?.();
          try {
            for (const pos of [...(this.positions || [])]) {
              if (!pos._firestorm) continue;
              if (!this.positions.find(x => x.id === pos.id)) continue; // closed earlier this pass
              const roi = pos.margin > 0 ? ((pos.upnl || 0) / pos.margin) * 100 : 0;
              if (roi >= tp) {
                this.log(`[FST] 🔥 ${pos.symbol.replace('USDT','')}: TP — ROI ${roi.toFixed(1)}% ≥ ${tp.toFixed(1)}% (buffered)`, 'success');
                await this.pseudoClosePosition(pos, 'tp', pos.markPrice);
                continue;
              }
              if (roi <= -sl) {
                this.log(`[FST] 🔥 ${pos.symbol.replace('USDT','')}: SL — ROI ${roi.toFixed(1)}% ≤ −${sl}%`, 'warn');
                await this.pseudoClosePosition(pos, 'sl', pos.markPrice);
                continue;
              }
              if (now - (pos.openedAt || now) >= HOLD_MS) {
                this.log(`[FST] 🔥 ${pos.symbol.replace('USDT','')}: 12h up — force close @ ROI ${roi.toFixed(1)}%`, 'info');
                await this.pseudoClosePosition(pos, 'firestorm-12h', pos.markPrice);
              }
            }
          } finally { this._logBatchEnd?.('[FST] 🔥 Exit roll-up'); }
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const isFst   = pos._firestorm === true;
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          // Carry the stamp onto the newly prepended closed trade record. The host
          // persists and renders the feed inside the original close — before this
          // stamp exists — so re-persist and repaint or the FIRE badge never shows.
          if (isFst && (this.closedTrades?.length ?? 0) > prevLen) {
            // Stamp the closed-trade record so the host renders the 🔥 FIRE role
            // badge, then repaint (the host already rendered the feed inside
            // the original close, before this stamp).
            this.closedTrades[0]._firestorm = true;
            this.persist?.();
            this.renderTradeFeed();
          }
        },
      });
    },
  };
})();
</script>
