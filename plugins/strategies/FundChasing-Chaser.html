<!--
  Fund Chasing Strategy Plugin for PseudoChaser
  Long tickers with elevated funding rates (from the shorts' perspective).

  Standard mode: negative funding (shorts pay longs) — collect carry.
  Structure-aware mode: when Ashfall reads a bullish market lean, flips
  to the opposite gate — targets tickers with high positive funding
  (longs paying shorts). These are coins where shorts are positioned
  against the bullish trend and are at elevated risk of being squeezed
  as the meta-structure asserts itself.

  The entry pool is drawn exclusively from the host's bulk ticker cache
  (_lastAllTickers). The plugin tracks the cache timestamp and only
  fires entries once per fresh fetch — it will not re-scan the same
  cached snapshot twice, so the effective re-scan interval matches the
  host's bulk ticker cooldown (default 3h).

  TP, SL, and all exit logic use the host's binary mode settings.
  Drawdown throttle and gains lock gate all entries.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  window.__BotPlugin = {
    id:        'fundchasing-chaser',
    name:      'Fund Chasing (Chaser)',
    version:   '1.2.0',
    targetBot: 'pseudochaser',
    after:     ['sunchaser', 'ashfall-chaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan', 'pseudoClosePosition'],

    css: `
      .fcc-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; } /* hint text: one sentence max */
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.fccEnabled"> + FundChase</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Fund Chasing</span>
              <span x-show="cfg.fccEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.fccEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.fccEnabled=!cfg.fccEnabled;persist()}">
              <div class="tog-t" :class="cfg.fccEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Fund Chasing Mode</div>
                <div class="fcc-hint">Longs tickers matching the active fund×structure gate; fires once per bulk ticker fetch using host TP/SL settings.</div>
              </div>
            </label>
            <div x-show="cfg.fccEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Funding Threshold <b x-text="'±'+(cfg.fccFrThreshold??0.1).toFixed(2)+'%'"></b></div>
                <input type="range" min="0.01" max="1" step="0.01" x-model.number="cfg.fccFrThreshold" @change="persist()">
                <div class="fcc-hint">+fund gate fires when FR ≥ threshold; -fund gate fires when FR ≤ −threshold. Higher value = fewer, stronger-signal entries.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Max Entries / Cycle <b x-text="(cfg.fccPicks??3)"></b></div>
                <input type="range" min="1" max="10" step="1" x-model.number="cfg.fccPicks" @change="persist()">
                <div class="fcc-hint">Ranked by most-negative funding first; entries open until this limit, max positions, or a halt.</div>
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.fccShareCapEnabled=!(cfg.fccShareCapEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.fccShareCapEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Position Share Cap</div>
                  <div class="fcc-hint">Prevents Fund Chasing from filling all slots, reserving headroom for other strategies.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.fccShareCapEnabled??true" style="margin-top:8px">
                <div class="lbl">Max Share <b x-text="(cfg.fccShareCapPct??50)+'% ('+Math.max(1,Math.floor((cfg.maxPos??5)*((cfg.fccShareCapPct??50)/100)))+' of '+(cfg.maxPos??5)+' slots)'"></b></div>
                <input type="range" min="10" max="100" step="5" x-model.number="cfg.fccShareCapPct" @change="persist()">
              </div>
              <div style="margin-top:10px">
                <div class="lbl" style="margin-bottom:4px">Entry Gates <span style="font-size:9px;font-weight:normal;color:var(--text-lo)">(fund × structure)</span></div>
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px">
                  <button @click.prevent="if(!cfgLocked){cfg.fccGatePosFundBull=!(cfg.fccGatePosFundBull??true);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.fccGatePosFundBull??true)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo)'">+fund<br>+bull</button>
                  <button @click.prevent="if(!cfgLocked){cfg.fccGatePosFundBear=!(cfg.fccGatePosFundBear??false);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.fccGatePosFundBear??false)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo)'">+fund<br>+bear</button>
                  <button @click.prevent="if(!cfgLocked){cfg.fccGateNegFundBull=!(cfg.fccGateNegFundBull??false);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.fccGateNegFundBull??false)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo)'">-fund<br>+bull</button>
                  <button @click.prevent="if(!cfgLocked){cfg.fccGateNegFundBear=!(cfg.fccGateNegFundBear??true);persist()}" style="padding:6px 2px;font-size:9px;font-family:var(--mono);border-radius:2px;border:1px solid;text-align:center;cursor:pointer;line-height:1.5;background:none" :style="(cfg.fccGateNegFundBear??true)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo)'">-fund<br>+bear</button>
                </div>
                <div class="fcc-hint" style="margin-top:4px" x-text="(()=>{ const lean=afStatus?.lean??null; if(lean===null) return '⚠ No Ashfall — fires on funding direction from any enabled gate'; return (lean>0?'↑ Bullish':'↓ Bearish')+' lean ('+lean.toFixed(2)+') — matching gates active'; })()"></div>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;

      return Object.assign({}, def, {

        async init() {
          await _origInit.call(this);
          if (this.cfg.fccEnabled         === undefined) this.cfg.fccEnabled         = false;
          if (this.cfg.fccPicks           === undefined) this.cfg.fccPicks           = 3;
          if (this.cfg.fccShareCapEnabled === undefined) this.cfg.fccShareCapEnabled = true;
          if (this.cfg.fccShareCapPct     === undefined) this.cfg.fccShareCapPct     = 50;
          // v1.2: fccFrMax (negative) → fccFrThreshold (positive magnitude); gate bar replaces structure-aware toggle
          if (this.cfg.fccFrThreshold     === undefined)
            this.cfg.fccFrThreshold = this.cfg.fccFrMax != null ? Math.abs(this.cfg.fccFrMax) : 0.1;
          if (this.cfg.fccGatePosFundBull === undefined) this.cfg.fccGatePosFundBull = true;
          if (this.cfg.fccGatePosFundBear === undefined) this.cfg.fccGatePosFundBear = false;
          if (this.cfg.fccGateNegFundBull === undefined) this.cfg.fccGateNegFundBull = false;
          if (this.cfg.fccGateNegFundBear === undefined) this.cfg.fccGateNegFundBear = true;
          this.registerRoleBadge?.(item => (item && item._fcc)
            ? `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(255,150,80,.45);color:#ff9650;background:rgba(255,150,80,.10)">💰 FUND</span>`
            : null);
          this.log(`[FCC] Fund Chasing (Chaser) v1.2.0 loaded — ${this.cfg.fccEnabled ? 'enabled' : 'disabled'} | ±${(this.cfg.fccFrThreshold ?? 0.1).toFixed(2)}% threshold | ${this.cfg.fccPicks}/cycle | gates: ${[this.cfg.fccGatePosFundBull?'+F+B':null,this.cfg.fccGatePosFundBear?'+F-B':null,this.cfg.fccGateNegFundBull?'-F+B':null,this.cfg.fccGateNegFundBear?'-F-B':null].filter(Boolean).join(',')||'none'}`, 'info');
        },

        async runScan() {
          await _origScan.call(this);
          await this._fccRunScan();
        },

        async _fccRunScan() {
          if (!this.cfg.fccEnabled) return;
          if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) {
            this.log(`[FCC] 💰 Skipped — ${this._isGainsLocked?.() ? 'gains lock' : 'drawdown halt'} active`, 'info');
            return;
          }
          if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) return;

          // Only act on a fresh bulk ticker fetch — skip if the cache timestamp
          // hasn't advanced since the last time we processed entries.
          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._fccLastActedAt) return;

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;

          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.fccShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.fccShareCapPct ?? 50) / 100)));
            const fccCount = (this.positions || []).filter(p => p._fcc).length;
            headroom = Math.min(headroom, capSlots - fccCount);
            if (headroom < 1) {
              this.log(`[FCC] 💰 Share cap reached — no slots reserved for Fund Chasing`, 'info');
              this._fccLastActedAt = freshAt;
              return;
            }
          }
          const picks = Math.min(Math.max(1, Math.round(this.cfg.fccPicks ?? 3)), headroom);

          const frThreshold = this.cfg.fccFrThreshold ?? 0.1;
          const activeSyms  = new Set((this.positions || []).map(p => p.symbol));

          // Gate selection: each (funding direction × market structure) combo is independently
          // togglable. When Ashfall lean is available, only gates matching current structure fire.
          // When unavailable, fires on funding direction from any enabled gate.
          const _afLean      = this.afStatus?.lean ?? null;
          const hasStructure = _afLean !== null;
          const isBullish    = hasStructure && _afLean > 0;
          const isBearish    = hasStructure && _afLean < 0;

          const gPosFundBull = this.cfg.fccGatePosFundBull ?? true;
          const gPosFundBear = this.cfg.fccGatePosFundBear ?? false;
          const gNegFundBull = this.cfg.fccGateNegFundBull ?? false;
          const gNegFundBear = this.cfg.fccGateNegFundBear ?? true;

          const usePosFund = hasStructure
            ? (isBullish && gPosFundBull) || (isBearish && gPosFundBear)
            : gPosFundBull || gPosFundBear;
          const useNegFund = hasStructure
            ? (isBullish && gNegFundBull) || (isBearish && gNegFundBear)
            : gNegFundBull || gNegFundBear;

          if (!usePosFund && !useNegFund) {
            this._fccLastActedAt = freshAt;
            this.log(`[FCC] 💰 No gate active for current structure (lean ${_afLean?.toFixed(2) ?? 'n/a'}) — skipping`, 'info');
            return;
          }

          const pool = allTickers
            .filter(t => {
              if (!t.symbol.endsWith('USDT') || t.symbol === 'BTCUSDT') return false;
              if (parseFloat(t.lastPrice || 0) < 0.001) return false;
              if (t.fundingRate == null) return false;
              const fr = parseFloat(t.fundingRate) * 100;
              return ((usePosFund && fr >= frThreshold) || (useNegFund && fr <= -frThreshold))
                && !activeSyms.has(t.symbol) && !(this._isSymbolBanned?.(t.symbol));
            })
            .sort((a, b) => {
              const frA = parseFloat(a.fundingRate || 0);
              const frB = parseFloat(b.fundingRate || 0);
              if (usePosFund && !useNegFund) return frB - frA;  // most positive first
              if (useNegFund && !usePosFund) return frA - frB;  // most negative first
              return Math.abs(frB) - Math.abs(frA);             // highest magnitude first
            });

          this._fccLastActedAt = freshAt;

          const structLabel = hasStructure ? ` [${isBullish ? '↑bull' : isBearish ? '↓bear' : 'neutral'} ${_afLean.toFixed(2)}]` : '';
          const gateDesc = `${usePosFund ? '+fund' : ''}${usePosFund && useNegFund ? '/' : ''}${useNegFund ? '-fund' : ''} ±${frThreshold.toFixed(2)}%${structLabel}`;

          if (!pool.length) {
            this.log(`[FCC] 💰 No tickers with ${gateDesc} in fresh snapshot`, 'info');
            return;
          }

          let opened = 0;
          this._logBatchBegin?.();
          try {
            for (const t of pool) {
              if (opened >= picks) break;
              if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) break;
              if (await this._fccOpen(t)) opened++;
            }
          } finally { this._logBatchEnd?.('[FCC] 💰 Entry roll-up'); }
          this.log(`[FCC] 💰 ${pool.length} tickers ${gateDesc} — ${opened}/${picks} opened`, 'info');
        },

        async _fccOpen(t) {
          const sym    = t.symbol;
          const price  = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const lenBefore = (this.positions || []).length;
          await this.pseudoOpenLong({ symbol: sym, price, change, fundingRate: fr, _fcc: true });
          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._fcc = true;
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const isFcc   = pos._fcc === true;
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if (isFcc && (this.closedTrades?.length ?? 0) > prevLen) {
            this.closedTrades[0]._fcc = true;
            this.persist?.();
            this.renderTradeFeed?.();
          }
        },
      });
    },
  };
})();
</script>
