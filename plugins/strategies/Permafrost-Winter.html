<!--
  Permafrost Strategy Plugin for PseudoWinter
  Self-calibrating halt governor: replaces the fixed 12h drawdown-throttle /
  gains-lock timers with a learned market-structure profile.

  Every halt event records the market structure (gainer/loser skew + breadth)
  at the moment it fired — drawdown events mark hostile climate, gains-lock
  events mark favorable climate. Scan cycles add weaker PnL-labeled samples
  between those anchors. While halted, structure is re-sampled on a slow
  timer. Halts run the stock 12h horizon by default. Only a *strong* historical
  bias (large |score| backed by enough evidence mass) changes that: it can hold
  the halt past 12h up to a hard cap (24h — the extreme case) while structure
  stays hostile, or "thaw" it early (as soon as 1h) once structure scores
  favorably. Without a strong bias the lock is never lifted early — it just
  serves its 12h. A thin profile falls back to the stock 12h timer too.

  PLK (preemptive lock, on by default): proactive rather than reactive — when
  a routine structure check reads a climate that is historically bad (score at
  or below the PLK trigger, with sufficient evidence), entries lock before any
  PnL damage occurs. A PLK rides the drawdown gate so every entry choke point
  respects it, and surfaces as a "PLK" countdown pill on the topbar (click to
  lift manually). Its duration scales with the strength of the historical bias
  up to the hard cap — an arbitrary span like 3h 20m — and it also lifts early
  once structure clears the thaw score under a strong bias. A real drawdown/
  gains-lock halt supersedes an active PLK. After a PLK ends, a dynamic cooldown
  equal to that lock's own duration must pass before another can engage — no
  back-to-back preemptive locks.

  Structure trajectory ("the wave"): a reading is judged in the context of what
  preceded it, not in isolation. The recent path of the structure lean is tracked
  and plotted in the accordion, and its direction folds into an inherent bull⇄bear
  oscillation prior — so a mildly-bearish tape that is turning up reads negative
  (don't short into the start of a pump). Learned history stays primary; the
  inherent wave only takes the helm when the profile is thin.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation, so the same logic powers Ashfall on PseudoChaser.

  Load via Plugin Manager in PseudoWinter's config panel.
  Load AFTER EverWinter if using live trading — see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const PFR_KEY        = '__permafrost_winter_v1';
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old scars fade
  const EVENT_W        = 10;                   // halt events are strong anchors
  const SAMPLE_W       = 1;                    // cycle samples are weak fill
  const MIN_MASS       = 6;                    // effective evidence mass required to override the timer
  const STRONG_MASS    = 12;                   // evidence mass for a *strong* historical bias (2× MIN_MASS)
  const STRONG_SCORE   = 0.30;                 // |score| at/above which the bias counts as strong
  const DEFAULT_HALT_MS = 12 * 3600 * 1000;    // stock 12h horizon — the floor unless strong history says otherwise
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never thaw before 1h (only reachable under a strong bias)
  const LABEL_WINDOW   = 6 * 3600 * 1000;      // samples are labeled by the realized PnL that followed
  const EVENTS_CAP     = 200;
  const SAMPLES_CAP    = 1000;
  const PNL_LOG_TTL    = 24 * 3600 * 1000;

  // ── Structure trajectory ("the wave") ──
  // A reading isn't just where the market is now — it's where it came from. We
  // track the recent path of the structure lean and read its direction, then
  // fold an *inherent* oscillation prior (markets swing strongly bullish ⇄
  // strongly bearish) into the decision. History stays primary; the inherent
  // wave only takes the helm when the learned profile is thin.
  const WAVE_TTL_MS    = 7 * 24 * 3600 * 1000; // wave retains as much structure history as we have, up to ~a week
  const WAVE_CAP       = 2000;              // hard cap on stored wave points
  const WAVE_MIN_PTS   = 3;                 // readings needed before a trajectory is meaningful
  const W_LEAN         = 0.6;               // inherent-score weight on the current structure level
  const W_SLOPE        = 0.4;               // inherent-score weight on the trajectory (where it's heading)
  const SLOPE_REF      = 0.3;               // lean change over the window that counts as full-scale
  const DIR            = -1;                // PseudoWinter shorts → favourable structure is bearish/falling

  window.__BotPlugin = {
    id:        'permafrost-winter',
    name:      'Permafrost (Winter)',
    version:   '1.6.0',
    targetBot: 'pseudowinter',
    after:     ['everwinter'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition', '_checkDrawdownThrottle', '_checkGainsLock', 'activateManualHalt'],

    css: `
      .pfr-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .pfr-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.permafrostEnabled"> + Permafrost</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Permafrost</span>
              <span x-show="cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.permafrostEnabled=!cfg.permafrostEnabled;persist()}">
              <div class="tog-t" :class="cfg.permafrostEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Permafrost Mode</div>
                <div class="pfr-hint">Learns which market climates trigger drawdowns vs gains locks, then thaws halts when structure leaves the hostile zone instead of waiting out the clock. Thin profile = stock 12h behavior.</div>
              </div>
            </label>
            <div x-show="cfg.permafrostEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Thaw Score <b x-text="(cfg.permafrostThawScore??0).toFixed(2)"></b></div>
                <input type="range" min="-0.5" max="0.5" step="0.05" x-model.number="cfg.permafrostThawScore" @change="persist()">
                <div class="pfr-hint">Profile score (−1 hostile … +1 favorable) the current structure must reach to lift a halt early. 0 = at least neutral history nearby.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Strong Bias Score <b x-text="'±'+(cfg.permafrostStrongScore??0.30).toFixed(2)"></b></div>
                <input type="range" min="0.10" max="0.60" step="0.05" x-model.number="cfg.permafrostStrongScore" @change="persist()">
                <div class="pfr-hint">|score| at/above which the history counts as a <em>strong bias</em> (also needs evidence mass ≥ 12). Default 12h halts only stretch toward the hard cap, or thaw early, when the bias is this strong — otherwise 12h prevails and the lock is never lifted early.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Hard Cap <b x-text="(cfg.permafrostCapHours??24)+'h'"></b></div>
                <input type="range" min="12" max="48" step="1" x-model.number="cfg.permafrostCapHours" @change="persist()">
                <div class="pfr-hint">Maximum halt duration under a strong historical bias (the extreme case). Without one, halts run the default 12h. Resumes regardless once reached — stale scars must be re-tested.</div>
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.permafrostPlkEnabled=!(cfg.permafrostPlkEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.permafrostPlkEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Preemptive Lock (PLK)</div>
                  <div class="pfr-hint">Proactive rather than reactive: when a routine structure check reads a climate that is historically bad (score at or below the trigger, with sufficient evidence), entries lock preemptively — before any PnL damage. The lock's duration scales with the strength of the bias, up to the Hard Cap (arbitrary, e.g. 3h 20m). Lifts early when structure clears the Thaw Score under a strong bias, when its duration elapses, or manually from the topbar pill.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.permafrostPlkEnabled??true" style="margin-top:8px">
                <div class="lbl">PLK Trigger Score <b x-text="(cfg.permafrostPlkScore??-0.15).toFixed(2)"></b></div>
                <input type="range" min="-0.5" max="-0.05" step="0.05" x-model.number="cfg.permafrostPlkScore" @change="persist()">
                <div class="pfr-hint">Profile score at or below which the preemptive lock engages. Closer to 0 = more cautious (locks earlier); more negative = only the worst climates trigger it.</div>
              </div>
              <div class="g" x-show="cfg.permafrostPlkEnabled??true" style="margin-top:8px">
                <div class="lbl">PLK Cooldown <b>dynamic</b></div>
                <div class="pfr-hint">After a preemptive lock ends, the next one can't engage until the same span as the last lock has passed (it matches that lock's duration) — no back-to-back locks. Last lock: <span x-text="pfPlkLastDurationMs>0?(Math.floor(pfPlkLastDurationMs/3600000)+'h '+String(Math.round((pfPlkLastDurationMs%3600000)/60000)).padStart(2,'0')+'m'):'—'"></span>.</div>
              </div>
              <div class="g" x-show="cfg.permafrostEnabled" style="margin-top:10px">
                <div class="lbl">Structure Wave <b x-text="(()=>{ void tick; const s=pfStatus.slope??0; return s>0.05?'rising ▲':s<-0.05?'falling ▼':'steady ▬'; })()"></b></div>
                <div x-html="_pfWaveSvg()" style="margin-top:4px;border:1px solid rgba(96,210,255,.15);border-radius:3px;background:rgba(96,210,255,.03)"></div>
                <div class="pfr-hint">Path of the market's structure lean (bull ↑ / bear ↓), retained for as long as there is data — up to ~a week. The plugin reads where the wave is <em>heading</em>, not just where it is — folding an inherent bull⇄bear oscillation in as a fallback so it won't short into the start of a pump. History stays primary when the profile is rich.</div>
                <div class="lbl" style="margin-top:8px">Slope Window <b x-text="(cfg.permafrostSlopeWindowHours??6)+'h'"></b></div>
                <input type="range" min="1" max="24" step="1" x-model.number="cfg.permafrostSlopeWindowHours" @change="persist()">
                <div class="pfr-hint">Timeframe for the directional comparison — "turning bullish/bearish" means the avg lean over the last N hours has shifted vs the N hours before it. Default 6h; raise to 12h for a slower, less reactive signal.</div>
              </div>
              <div class="pfr-stat" style="margin-top:10px;padding:8px 10px;background:rgba(96,210,255,.05);border:1px solid rgba(96,210,255,.15);border-radius:3px">
                <div>PROFILE — <span x-text="(pfEvents||[]).filter(e=>e.kind==='drawdown').length"></span> drawdown / <span x-text="(pfEvents||[]).filter(e=>e.kind==='gainslock').length"></span> gains-lock events, <span x-text="(pfSamples||[]).filter(s=>s.label!==null).length"></span> labeled samples</div>
                <div x-show="pfStatus.at">READING — skew <span x-text="(pfStatus.skew??0).toFixed(2)"></span> | breadth <span x-text="(pfStatus.breadth??0).toFixed(2)"></span> | score <span x-text="pfStatus.score===null?'—':pfStatus.score.toFixed(2)"></span> | mass <span x-text="pfStatus.mass.toFixed(1)"></span></div>
                <div x-show="pfStatus.at">STRUCTURE — lean <span x-text="(pfStatus.lean??0).toFixed(2)"></span> | slope <span x-text="(pfStatus.slope>=0?'+':'')+(pfStatus.slope??0).toFixed(2)"></span> | effective <span x-text="pfStatus.eff===null||pfStatus.eff===undefined?'—':((pfStatus.eff>=0?'+':'')+pfStatus.eff.toFixed(2))"></span> for shorts</div>
                <div x-show="pfHalt && pfHalt.kind!=='plk'" style="color:var(--ice)">HALT — <span x-text="pfHalt?.kind"></span> (<span x-text="pfHalt?.strong?'strong bias — up to '+(cfg.permafrostCapHours??24)+'h / early thaw':pfHalt?.informed?'default 12h':'timer fallback'"></span>) <span x-text="(()=>{ void tick; return pfHalt? Math.floor((Date.now()-pfHalt.at)/3600000)+'h elapsed':''; })()"></span></div>
                <div x-show="pfHalt && pfHalt.kind==='plk'" style="color:var(--ice);display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <span x-text="(()=>{ void tick; if(!pfHalt||!pfHalt.until) return 'PLK active'; const rem=Math.max(0,pfHalt.until-Date.now()); const h=Math.floor(rem/3600000); const m=Math.floor((rem%3600000)/60000); const s=Math.floor((rem%60000)/1000); return 'PLK'+(pfHalt.strong?' (strong)':'')+' — '+h+'h '+String(m).padStart(2,'0')+'m '+String(s).padStart(2,'0')+'s left'; })()"></span>
                  <button @click="_pfLiftPlk()" style="font-family:var(--mono);font-size:9px;padding:2px 8px;border:1px solid rgba(96,210,255,.5);border-radius:2px;background:none;color:var(--ice);cursor:pointer;letter-spacing:.5px">Lift PLK</button>
                </div>
                <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
                  <button @click="pfExport()" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(96,210,255,.4);border-radius:2px;background:none;color:var(--ice);cursor:pointer;letter-spacing:.5px">Export</button>
                  <button @click="if(confirm('Import will replace your current events, samples, and wave history. This cannot be undone — export first if you want to keep the existing profile.\n\nContinue?')){document.getElementById('pfr-import-file').click()}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(96,210,255,.4);border-radius:2px;background:none;color:var(--ice);cursor:pointer;letter-spacing:.5px">Import</button>
                  <input type="file" id="pfr-import-file" accept=".json" style="display:none" @change="pfImport($event)">
                  <button @click="if(!cfgLocked&&confirm('Clear all Permafrost events, samples, PnL log, and wave history?\n\nThis cannot be undone.')){pfEvents=[];pfSamples=[];pfPnl=[];pfWave=[];persist();log('[PFR] Profile cleared.','warn')}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.4);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Profile</button>
                </div>
              </div>
            </div>
            <div x-data="{ dzOpen:false }" style="margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:8px">
              <button @click="dzOpen=!dzOpen" style="font-family:var(--mono);font-size:9px;padding:2px 8px;border:1px solid rgba(255,69,96,.25);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px;display:flex;align-items:center;gap:4px"><span x-text="dzOpen?'▾':'▸'"></span>&nbsp;Danger Zone</button>
              <div x-show="dzOpen" x-transition.opacity style="margin-top:6px;padding:8px;background:rgba(255,69,96,.04);border:1px solid rgba(255,69,96,.18);border-radius:3px">
                <button @click="if(!cfgLocked&&confirm('Wipe ALL Permafrost plugin data from browser storage?\n\nThis clears events, samples, wave history, halt state, and the storage key itself — nothing will remain. Export first if you want to preserve the profile.\n\nThis cannot be undone.')){localStorage.removeItem('__permafrost_winter_v1');pfEvents=[];pfSamples=[];pfPnl=[];pfWave=[];pfHalt=null;pfPlkLastLift=0;pfPlkLastDurationMs=0;persist();log('[PFR] Plugin state cleared from storage.','warn')}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Plugin State</button>
                <div class="pfr-hint" style="margin-top:4px">Wipes all Permafrost data from browser storage — events, samples, wave history, and halt state. Also clears the storage key so no orphaned data lingers if the plugin is removed. Export first if you want to preserve the profile.</div>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origPers  = def.persist;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;
      const _origDD    = def._checkDrawdownThrottle;
      const _origGL    = def._checkGainsLock;
      const _origMH    = def.activateManualHalt;
      const _origIsDD  = def._isDrawdownHalted;
      const _origIsGL  = def._isGainsLocked;

      // Slow sampler handle lives outside the Alpine proxy (see Timer architecture)
      let _pfrTimer = null;

      return Object.assign({}, def, {

        pfEvents:  [],   // { ts, kind:'drawdown'|'gainslock', skew, breadth, gCount, lCount, gSum, lSum }
        pfSamples: [],   // { ts, skew, breadth, label } — label null until the 6h window resolves
        pfPnl:     [],   // { ts, pnl } — plugin-owned closed-trade log for sample labeling
        pfWave:    [],   // { ts, lean } — structure-lean trajectory, retained up to ~a week (the "wave")
        pfHalt:    null, // { kind, at, informed, strong, until?, durMs? } while a halt is being governed (until/durMs are PLK-only)
        pfPlkLastLift: 0, // when the last PLK ended — gates the (dynamic) PLK cooldown
        pfPlkLastDurationMs: 0, // duration of the last PLK — the cooldown matches it
        pfStatus:  { skew: null, breadth: null, score: null, mass: 0, lean: 0, slope: 0, inherent: 0, eff: null, at: 0 },

        async init() {
          await _origInit.call(this);
          if (this.cfg.permafrostEnabled   === undefined) this.cfg.permafrostEnabled   = false;
          if (this.cfg.permafrostThawScore === undefined) this.cfg.permafrostThawScore = 0;
          if (this.cfg.permafrostStrongScore === undefined) this.cfg.permafrostStrongScore = STRONG_SCORE;
          if (this.cfg.permafrostCapHours  === undefined) this.cfg.permafrostCapHours  = 24;
          if (this.cfg.permafrostPlkEnabled === undefined) this.cfg.permafrostPlkEnabled = true;
          if (this.cfg.permafrostPlkScore   === undefined) this.cfg.permafrostPlkScore   = -0.15;
          if (this.cfg.permafrostPlkCooldownHours === undefined) this.cfg.permafrostPlkCooldownHours = 24;
          if (this.cfg.permafrostSlopeWindowHours === undefined) this.cfg.permafrostSlopeWindowHours = 6;
          try {
            const raw = localStorage.getItem(PFR_KEY);
            if (raw) {
              const s = JSON.parse(raw);
              if (Array.isArray(s.events))  this.pfEvents  = s.events.slice(-EVENTS_CAP);
              if (Array.isArray(s.samples)) this.pfSamples = s.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(s.pnl))     this.pfPnl     = s.pnl.filter(e => Date.now() - e.ts < PNL_LOG_TTL);
              if (Array.isArray(s.wave))    this.pfWave    = s.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              if (s.halt && s.halt.at) this.pfHalt = s.halt;
              if (typeof s.plkLastLift === 'number') this.pfPlkLastLift = s.plkLastLift;
              if (typeof s.plkLastDurationMs === 'number') this.pfPlkLastDurationMs = s.plkLastDurationMs;
            }
          } catch(e) {}
          // Drop a stale governed-halt record if the underlying halt is gone (manual clear, expiry).
          // A PLK has no backing host timer — it expires on its own scaled duration instead.
          if (this.pfHalt?.kind === 'plk') {
            if (!this.pfHalt.until || Date.now() >= this.pfHalt.until) {
              this.pfPlkLastDurationMs = this.pfHalt.until ? (this.pfHalt.until - this.pfHalt.at) : this.pfPlkLastDurationMs;
              this.pfHalt = null; this.pfPlkLastLift = Date.now();
            }
          } else if (this.pfHalt && !_origIsDD.call(this) && !_origIsGL.call(this)) this.pfHalt = null;
          if (this.pfHalt) this._pfEnsureSampler();
          this.log(`[PFR] Permafrost (Winter) v1.6.0 loaded — ${this.cfg.permafrostEnabled ? 'enabled' : 'disabled'} | ${this.pfEvents.length} events, ${this.pfSamples.length} samples on record`, 'info');
        },

        // ── PLK (preemptive lock) — proactive halt on historically bad structure ──
        _pfPlkActive() {
          if (!this.cfg.permafrostEnabled || !(this.cfg.permafrostPlkEnabled ?? true)) return false;
          return this.pfHalt?.kind === 'plk';
        },

        // PLK duration scales with the strength of the effective read (|eff|, which
        // already blends learned history with the inherent structure wave), as a
        // fraction of the hard cap. Floored at 1h, capped at the hard cap — so it
        // lands on arbitrary values like 3h 20m, never a fixed block.
        _pfPlkDurationMs(eff) {
          const capMs    = (this.cfg.permafrostCapHours ?? 24) * 3600 * 1000;
          const strength = Math.min(1, Math.abs(eff || 0));
          return Math.min(capMs, Math.max(MIN_HALT_MS, Math.round(strength * capMs)));
        },

        // Remaining ms on the active PLK (0 if none) — read by the host's deferral logs
        _plkRemainingMs() {
          if (this.pfHalt?.kind !== 'plk' || !this.pfHalt.until) return 0;
          return Math.max(0, this.pfHalt.until - Date.now());
        },

        // Topbar pill for an active PLK — labelled "PLK" with a live countdown and
        // click-to-lift, instead of the host's drawdown (DDT) pill.
        _extraStatusPills() {
          if (!this._pfPlkActive() || !this.pfHalt?.until) return [];
          void this.tick;
          const rem = Math.max(0, this.pfHalt.until - Date.now());
          const s   = Math.floor(rem / 1000);
          const remStr = `${Math.floor(s/3600)}h ${String(Math.floor((s%3600)/60)).padStart(2,'0')}m ${String(s%60).padStart(2,'0')}s`;
          return [{
            pip:        'warn',
            pipStyle:   'background:var(--ice)',
            label:      `PLK ${remStr}`,
            labelStyle: 'color:var(--ice)',
            border:     'border-color:rgba(96,210,255,.45);background:rgba(96,210,255,.06)',
            title:      `Preemptive lock active — entries locked for ${remStr}. Click to lift.`,
            action:     () => this._pfLiftPlk(),
          }];
        },

        // Manual PLK lift — clears the lock and starts the dynamic cooldown (which
        // matches the duration this lock was set for).
        _pfLiftPlk() {
          if (this.pfHalt?.kind !== 'plk') return;
          this.pfPlkLastDurationMs = Math.max(0, (this.pfHalt.until || Date.now()) - this.pfHalt.at);
          this.pfPlkLastLift = Date.now();
          this.pfHalt = null;
          this._pfStopSampler();
          this.log('[PFR] 🔓 PLK lifted manually — new entries re-enabled', 'warn');
          this.persist();
        },

        // PLK rides the drawdown gate: every entry choke point (host scans and
        // plugins) that respects the drawdown halt respects a preemptive lock too.
        _isDrawdownHalted() {
          return _origIsDD.call(this) || this._pfPlkActive();
        },

        persist() {
          _origPers.call(this);
          try {
            localStorage.setItem(PFR_KEY, JSON.stringify({
              events: this.pfEvents, samples: this.pfSamples, pnl: this.pfPnl, wave: this.pfWave, halt: this.pfHalt, plkLastLift: this.pfPlkLastLift, plkLastDurationMs: this.pfPlkLastDurationMs,
            }));
          } catch(e) {}
        },

        // ── Market structure reading — full ticker universe, not the curated pools ──
        async _pfFetchStructure() {
          try {
            // Reuse the host scan's bulk ticker response when fresh (slow-tick
            // sampling during halts falls back to fetching — scans don't run then)
            let list;
            if (this._lastAllTickers?.length && (Date.now() - (this._lastAllTickersAt || 0)) < 60000) {
              list = this._lastAllTickers;
            } else {
              const r = await fetch(`${this.base}/v5/market/tickers?category=linear`);
              const d = await r.json();
              if (d.retCode !== 0) return null;
              list = d.result?.list || [];
            }
            let gSum = 0, lSum = 0, gCount = 0, lCount = 0;
            for (const t of list) {
              if (!t.symbol.endsWith('USDT') || t.symbol === 'BTCUSDT') continue;
              if (parseFloat(t.lastPrice || 0) < 0.001) continue;
              const ch = parseFloat(t.price24hPcnt || 0) * 100;
              if (ch > 0)      { gSum += ch; gCount++; }
              else if (ch < 0) { lSum += Math.abs(ch); lCount++; }
            }
            const sumT   = gSum + lSum, cntT = gCount + lCount;
            return {
              ts: Date.now(),
              skew:    sumT > 0 ? (gSum - lSum) / sumT : 0,
              breadth: cntT > 0 ? (gCount - lCount) / cntT : 0,
              gCount, lCount,
              gSum: +gSum.toFixed(1), lSum: +lSum.toFixed(1),
            };
          } catch(e) { return null; }
        },

        // ── Human-readable structure + historical-bias phrasing for the activity log ──
        // Intensity ranges over mildly / moderately / strongly bullish (or bearish). The
        // tiers are entirely relative to this installation's own history: thresholds are
        // the 25th / 50th / 80th percentiles of |lean| across recorded events + samples,
        // so they shift as the profile collects more data. Fixed fallbacks
        // (0.08 / 0.20 / 0.40) apply until at least 30 readings are on record.
        _pfDescribe(reading, score, mass) {
          const lean = (reading.skew + reading.breadth) / 2;
          const hist = [...this.pfEvents, ...this.pfSamples]
            .map(x => Math.abs((x.skew + x.breadth) / 2))
            .sort((a, b) => a - b);
          const q = p => hist[Math.min(hist.length - 1, Math.floor(p * hist.length))];
          const [tFlat, tModerate, tStrong] = hist.length >= 30 ? [q(0.25), q(0.5), q(0.8)] : [0.08, 0.20, 0.40];
          const mag    = Math.abs(lean);
          const adverb = mag >= tStrong ? 'strongly ' : mag >= tModerate ? 'moderately ' : 'mildly ';
          const struct = mag <= tFlat ? 'mixed/flat' : `${adverb}${lean > 0 ? 'bullish' : 'bearish'}`;
          const slope  = this._pfTrajectory().slope;
          const trend  = slope > 0.05 ? ', rising (turning bullish)' : slope < -0.05 ? ', falling (turning bearish)' : ', steady';
          const desc   = `${struct}${trend} (skew ${reading.skew.toFixed(2)}, breadth ${reading.breadth.toFixed(2)}, ${reading.gCount}▲/${reading.lCount}▼)`;
          const inherent = this._pfInherent(lean, slope);
          const eff      = this._pfEffectiveScore(score, mass, inherent);
          let bias;
          if (score === null || mass < MIN_MASS) bias = `thin history (mass ${mass.toFixed(1)} < ${MIN_MASS}) — leaning on inherent structure (${eff >= 0 ? '+' : ''}${eff.toFixed(2)} for shorts)`;
          else if (score >= 0.15)  bias = `historically good for shorts (score +${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else if (score <= -0.15) bias = `historically bad for shorts (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else                     bias = `historically neutral for shorts (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          if (score !== null && mass >= MIN_MASS && Math.abs(eff - score) >= 0.1) bias += ` | structure shifts the effective read to ${eff >= 0 ? '+' : ''}${eff.toFixed(2)}`;
          return { desc, bias, eff };
        },

        // ── Hostility score: kernel-weighted, recency-decayed vote of past events
        // and labeled samples near the given reading. score ∈ [−1,1]; mass = evidence weight.
        _pfScore(reading) {
          const now = Date.now();
          let num = 0, mass = 0;
          const tally = (skew, breadth, label, w, ts) => {
            const ds = reading.skew - skew, db = reading.breadth - breadth;
            const k  = Math.exp(-(ds * ds + db * db) / (2 * KERNEL_H * KERNEL_H));
            const dec = Math.pow(0.5, (now - ts) / HALF_LIFE_MS);
            num  += w * label * k * dec;
            mass += w * k * dec;
          };
          for (const e of this.pfEvents) tally(e.skew, e.breadth, e.kind === 'drawdown' ? -1 : 1, EVENT_W, e.ts);
          for (const s of this.pfSamples) { if (s.label !== null) tally(s.skew, s.breadth, s.label, SAMPLE_W, s.ts); }
          return { score: mass > 0 ? num / mass : null, mass };
        },

        // ── The wave: recent path of the structure lean (oldest → newest) ──
        // lean = (skew + breadth) / 2 ∈ [−1,1]: +1 strongly bullish, −1 strongly bearish.
        _pfWaveSeries() {
          const cut = Date.now() - WAVE_TTL_MS;
          return this.pfWave.filter(p => p.ts >= cut);
        },

        // Append a structure-lean point to the wave and prune by age / cap. Kept
        // separate from pfSamples (which get pruned for scoring) so the wave
        // retains the full trajectory for as long as we have data, up to ~a week.
        _pfPushWave(reading) {
          this.pfWave.push({ ts: reading.ts, lean: +(((reading.skew + reading.breadth) / 2)).toFixed(4) });
          const cut = Date.now() - WAVE_TTL_MS;
          if (this.pfWave.length && this.pfWave[0].ts < cut) this.pfWave = this.pfWave.filter(p => p.ts >= cut);
          if (this.pfWave.length > WAVE_CAP) this.pfWave = this.pfWave.slice(-WAVE_CAP);
        },

        // Current lean plus its trajectory (slope = avg lean over last N hours − avg lean N–2N hours ago).
        // Using a fixed time window (cfg.permafrostSlopeWindowHours, default 6h) so "turning bullish/bearish"
        // always reflects the same timeframe regardless of how much wave history has accumulated.
        // slope > 0 → drifting bullish; slope < 0 → drifting bearish.
        _pfTrajectory() {
          const wave = this._pfWaveSeries();
          const n    = wave.length;
          const lean = n ? wave[n - 1].lean : (((this.pfStatus.skew ?? 0) + (this.pfStatus.breadth ?? 0)) / 2);
          if (n < WAVE_MIN_PTS) return { lean, slope: 0, n };
          const winMs     = (this.cfg.permafrostSlopeWindowHours ?? 6) * 3600 * 1000;
          const now       = Date.now();
          const recentPts = wave.filter(p => p.ts >= now - winMs);
          const olderPts  = wave.filter(p => p.ts >= now - 2 * winMs && p.ts < now - winMs);
          if (!recentPts.length || !olderPts.length) return { lean, slope: 0, n };
          const recent = recentPts.reduce((a, p) => a + p.lean, 0) / recentPts.length;
          const older  = olderPts.reduce((a, p) => a + p.lean, 0) / olderPts.length;
          return { lean, slope: recent - older, n };
        },

        // Inherent favourability for this bot's direction (DIR), from the wave alone:
        // a short bot likes bearish *and* falling structure; longing likes bullish/rising.
        // The slope term is what stops us shorting into the start of a pump (mildly
        // bearish but turning up) or longing into the start of a dump.
        _pfInherent(lean, slope) {
          const slopeN = Math.max(-1, Math.min(1, (slope || 0) / SLOPE_REF));
          return Math.max(-1, Math.min(1, DIR * (W_LEAN * (lean || 0) + W_SLOPE * slopeN)));
        },

        // Effective score: learned history is primary, the inherent wave is the
        // fallback — blended by how much evidence the profile actually has.
        _pfEffectiveScore(score, mass, inherent) {
          const massFrac = Math.max(0, Math.min(1, (mass || 0) / STRONG_MASS));
          return score === null ? inherent : massFrac * score + (1 - massFrac) * inherent;
        },

        // Inline SVG wave plot — time-based 1-week window, bins data into pixel columns so
        // the chart compacts automatically as history grows (no index stretching).
        _pfWaveSvg() {
          void this.tick;
          const wave = this._pfWaveSeries();
          const W = 260, H = 64, pad = 6;
          const y = lean => pad + ((1 - lean) / 2) * (H - 2 * pad);
          const mid = y(0);
          const placeholder = `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block"><line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="rgba(255,255,255,.15)" stroke-dasharray="3 3"/><text x="${W/2}" y="${H/2+3}" fill="rgba(255,255,255,.35)" font-size="9" font-family="monospace" text-anchor="middle">gathering structure history…</text></svg>`;
          if (wave.length < 2) return placeholder;
          const now = Date.now();
          const tMin = now - WAVE_TTL_MS;
          const plotW = W - 2 * pad;
          const BINS = Math.floor(plotW);
          const bins = new Array(BINS).fill(null).map(() => ({ sum: 0, n: 0 }));
          for (const p of wave) {
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            bins[bi].sum += p.lean; bins[bi].n++;
          }
          const pts = [];
          for (let i = 0; i < BINS; i++) {
            if (!bins[i].n) continue;
            pts.push({ x: pad + i + 0.5, lean: bins[i].sum / bins[i].n });
          }
          if (pts.length < 2) return placeholder;
          const cur = pts[pts.length - 1].lean;
          const col = cur > 0.05 ? 'var(--profit)' : cur < -0.05 ? 'var(--short)' : 'var(--ice)';
          const polyPts = pts.map(p => `${p.x.toFixed(1)},${y(p.lean).toFixed(1)}`).join(' ');
          const cx = pts[pts.length - 1].x, cy = y(cur);
          return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block">`
            + `<line x1="0" y1="${pad}" x2="${W}" y2="${pad}" stroke="rgba(0,229,160,.12)"/>`
            + `<line x1="0" y1="${(H-pad).toFixed(1)}" x2="${W}" y2="${(H-pad).toFixed(1)}" stroke="rgba(255,69,96,.12)"/>`
            + `<line x1="0" y1="${mid.toFixed(1)}" x2="${W}" y2="${mid.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-dasharray="3 3"/>`
            + `<polyline points="${polyPts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>`
            + `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="${col}"/>`
            + `<text x="2" y="${pad+7}" fill="rgba(0,229,160,.5)" font-size="8" font-family="monospace">bull</text>`
            + `<text x="2" y="${(H-pad-1).toFixed(1)}" fill="rgba(255,69,96,.5)" font-size="8" font-family="monospace">bear</text>`
            + `</svg>`;
        },

        // ── Label samples whose 6h window has resolved; drop windows with no closed trades ──
        _pfStampSamples() {
          const now = Date.now();
          const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          this.pfSamples = this.pfSamples.filter(s => {
            if (s.label !== null || now - s.ts < LABEL_WINDOW) return true;
            const trades = this.pfPnl.filter(p => p.ts > s.ts && p.ts <= s.ts + LABEL_WINDOW);
            if (!trades.length) return false; // nothing closed — no evidence either way
            const pnl = trades.reduce((a, p) => a + p.pnl, 0);
            s.label = Math.max(-1, Math.min(1, pnl / entryMargin));
            return true;
          });
          if (this.pfSamples.length > SAMPLES_CAP) this.pfSamples = this.pfSamples.slice(-SAMPLES_CAP);
        },

        _pfAddSample(reading) {
          this._pfStampSamples();
          this.pfSamples.push({ ts: reading.ts, skew: reading.skew, breadth: reading.breadth, label: null });
          this._pfPushWave(reading);
          const { score, mass } = this._pfScore(reading);
          const { lean, slope } = this._pfTrajectory();
          const inherent = this._pfInherent(lean, slope);
          const eff = this._pfEffectiveScore(score, mass, inherent);
          this.pfStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, lean, slope, inherent, eff, at: reading.ts };
        },

        // ── Halt event: record the climate, decide informed cap vs timer fallback ──
        async _pfOnHaltTriggered(kind) {
          const reading = await this._pfFetchStructure();
          if (!reading) { this.pfHalt = { kind, at: Date.now(), informed: false }; this.persist(); return; }
          this.pfEvents.push({ ts: reading.ts, kind, skew: reading.skew, breadth: reading.breadth, gCount: reading.gCount, lCount: reading.lCount, gSum: reading.gSum, lSum: reading.lSum });
          if (this.pfEvents.length > EVENTS_CAP) this.pfEvents = this.pfEvents.slice(-EVENTS_CAP);
          this._pfPushWave(reading);
          const { score, mass } = this._pfScore(reading);
          const lean     = (reading.skew + reading.breadth) / 2;
          const slope    = this._pfTrajectory().slope;
          const inherent = this._pfInherent(lean, slope);
          const eff      = this._pfEffectiveScore(score, mass, inherent);
          this.pfStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, lean, slope, inherent, eff, at: reading.ts };
          const informed = mass >= MIN_MASS;
          const strong   = mass >= STRONG_MASS && score !== null && Math.abs(score) >= (this.cfg.permafrostStrongScore ?? STRONG_SCORE);
          // The stock 12h horizon is the default. Only a *strong* historical bias
          // extends the halt toward the 24h hard cap (and unlocks early thaw); a
          // merely-informed profile rides the host's 12h timer unchanged.
          if (strong) {
            const capUntil = reading.ts + (this.cfg.permafrostCapHours ?? 24) * 3600 * 1000;
            if (kind === 'drawdown') this._drawdownHaltUntil = capUntil;
            else                     this._gainsLockHaltUntil = capUntil;
          }
          if (this.pfHalt?.kind === 'plk') this.pfPlkLastLift = Date.now(); // superseded PLK still starts the cooldown
          this.pfHalt = { kind, at: reading.ts, informed, strong };
          const _d = this._pfDescribe(reading, score, mass);
          this.log(`[PFR] 🧊 ${kind === 'drawdown' ? 'Drawdown' : 'Gains lock'} activated — market structure is ${_d.desc} | ${_d.bias} → ${strong ? `strong historical bias — profile-governed (may extend to the ${this.cfg.permafrostCapHours ?? 24}h cap or thaw early)` : informed ? 'default 12h halt — early thaw needs a strong bias' : 'profile too thin — stock 12h timer'}`, 'warn');
          this._pfEnsureSampler();
          this.persist();
        },

        _pfEnsureSampler() {
          if (_pfrTimer) return;
          const iv = Math.max(3600 * 1000, 4 * (this.cfg.scanMins || 15) * 60 * 1000);
          _pfrTimer = setInterval(() => this._pfSamplerTick(), iv);
        },

        _pfStopSampler() {
          if (_pfrTimer) { clearInterval(_pfrTimer); _pfrTimer = null; }
        },

        async _pfSamplerTick() {
          const ddActive = _origIsDD.call(this), glActive = this._isGainsLocked();
          const isPlk    = this.pfHalt?.kind === 'plk';
          if (!this.cfg.permafrostEnabled || !this.pfHalt || (!isPlk && !ddActive && !glActive)) {
            this.pfHalt = null; this._pfStopSampler(); this.persist(); return;
          }
          const reading = await this._pfFetchStructure();
          if (!reading) return;
          this._pfAddSample(reading);
          const { score, mass, eff } = this.pfStatus;
          const elapsed = Date.now() - this.pfHalt.at;
          const strong  = mass >= STRONG_MASS && score !== null && Math.abs(score) >= (this.cfg.permafrostStrongScore ?? STRONG_SCORE);
          // Early thaw is reserved for a strong historical bias — without one, the
          // lock is never lifted arbitrarily; it simply runs its 12h horizon. For
          // drawdown/gains-lock that horizon is the host's own timer; PLK has none,
          // so it self-caps below. The thaw compares the *effective* read (history +
          // structure trajectory) so we don't lift straight into a reversal.
          if (strong && elapsed >= MIN_HALT_MS && (eff ?? score) >= (this.cfg.permafrostThawScore ?? 0)) {
            const kind = this.pfHalt.kind;
            if      (kind === 'drawdown')  { this._drawdownHaltUntil = null; this._drawdownWindow = []; }
            else if (kind === 'gainslock') { this._gainsLockHaltUntil = null; this._gainsWindow = []; }
            // 'plk' has no host timer to clear — dropping pfHalt lifts it; record its
            // duration so the cooldown matches it
            if (kind === 'plk') { this.pfPlkLastDurationMs = Math.max(0, (this.pfHalt.until || Date.now()) - this.pfHalt.at); this.pfPlkLastLift = Date.now(); }
            this.pfHalt = null;
            this._pfStopSampler();
            this.log(`[PFR] 🌊 Thaw — strong bias cleared the ${kind} zone after ${(elapsed / 3600000).toFixed(1)}h (score ${score.toFixed(2)} ≥ ${(this.cfg.permafrostThawScore ?? 0).toFixed(2)}, mass ${mass.toFixed(1)}) — new entries re-enabled`, 'success');
          } else if (isPlk && Date.now() >= (this.pfHalt.until || 0)) {
            // PLK duration elapsed — the lock's strength-scaled run is over
            this.pfPlkLastDurationMs = Math.max(0, (this.pfHalt.until || Date.now()) - this.pfHalt.at);
            this.pfPlkLastLift = Date.now(); // start the re-trigger cooldown (matches this duration)
            this.pfHalt = null;
            this._pfStopSampler();
            this.log(`[PFR] 🛑 PLK duration elapsed after ${(elapsed / 3600000).toFixed(1)}h — preemptive lock lifted for re-test`, 'warn');
          } else {
            const _d = this._pfDescribe(reading, score, mass);
            this.log(`[PFR] 🧊 Halt check (${(elapsed / 3600000).toFixed(1)}h elapsed) — market is ${_d.desc} | ${_d.bias} — holding`, 'info');
          }
          this.persist();
        },

        pfExport() {
          const blob = new Blob([JSON.stringify({ exportedAt: Date.now(), events: this.pfEvents, samples: this.pfSamples, wave: this.pfWave }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `permafrost-winter-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
        },

        pfImport(e) {
          const file = e.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const d = JSON.parse(ev.target.result);
              if (Array.isArray(d.events))  this.pfEvents  = d.events.slice(-EVENTS_CAP);
              if (Array.isArray(d.samples)) this.pfSamples = d.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(d.wave))    this.pfWave    = d.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              this.persist();
              this.log(`[PFR] Profile imported — ${this.pfEvents.length} events, ${this.pfSamples.length} samples, ${this.pfWave.length} wave points`, 'info');
            } catch(err) {
              this.log('[PFR] Import failed — file could not be parsed as a valid Permafrost profile', 'warn');
            }
            e.target.value = '';
          };
          reader.readAsText(file);
        },

        async runScan() {
          await _origScan.call(this);
          if (!this.cfg.permafrostEnabled) return;
          this._pfFetchStructure().then(r => {
            if (!r) return;
            this._pfAddSample(r);
            const { score, mass, eff } = this.pfStatus;
            const _d = this._pfDescribe(r, score, mass);
            this.log(`[PFR] 🧊 Routine market structure check — market is ${_d.desc} | ${_d.bias}`, 'info');
            // PLK — proactive rather than reactive: when the *effective* read (learned
            // history primary, the inherent structure wave as fallback) is bad for the
            // bot's direction, lock entries preemptively before PnL damage. This is
            // what keeps us from shorting into the start of a pump — a mildly bearish
            // tape that is turning up reads negative once the trajectory is folded in.
            // Duration scales with the strength of that read; the re-trigger cooldown
            // matches the last lock's duration so locks can't fire back to back.
            const _plkCooldownMs = this.pfPlkLastDurationMs > 0
              ? this.pfPlkLastDurationMs
              : (this.cfg.permafrostPlkCooldownHours ?? 24) * 3600 * 1000;
            const _plkTrip = (this.cfg.permafrostPlkScore ?? -0.15);
            if ((this.cfg.permafrostPlkEnabled ?? true) && !this.pfHalt
                && Date.now() - (this.pfPlkLastLift || 0) >= _plkCooldownMs
                && !_origIsDD.call(this) && !_origIsGL.call(this)
                && eff !== null && eff !== undefined && eff <= _plkTrip) {
              const plkStrong = mass >= STRONG_MASS && score !== null && Math.abs(score) >= (this.cfg.permafrostStrongScore ?? STRONG_SCORE);
              const durMs = this._pfPlkDurationMs(eff);
              const now   = Date.now();
              this.pfHalt = { kind: 'plk', at: now, until: now + durMs, durMs, informed: mass >= MIN_MASS, strong: plkStrong };
              const _dh = Math.floor(durMs / 3600000), _dm = Math.round((durMs % 3600000) / 60000);
              const _src = mass >= MIN_MASS ? `history+structure read ${eff.toFixed(2)}` : `inherent structure read ${eff.toFixed(2)} (thin history)`;
              this.log(`[PFR] 🛑 PLK — ${_d.desc} is bad for shorts (${_src} ≤ ${_plkTrip.toFixed(2)}) — preemptive lock engaged for ${_dh}h ${String(_dm).padStart(2,'0')}m${plkStrong ? ' (strong bias)' : ''}; cooldown will match`, 'warn');
              this._pfEnsureSampler();
            }
            this.persist();
          }).catch(() => {});
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if ((this.closedTrades?.length ?? 0) > prevLen) {
            // totalPnl (incl. funding) is what the base feeds its halt windows
            const t   = this.closedTrades[0];
            const pnl = t?.totalPnl ?? t?.pnl;
            if (typeof pnl === 'number') {
              const now = Date.now();
              this.pfPnl.push({ ts: now, pnl });
              this.pfPnl = this.pfPnl.filter(e => now - e.ts < PNL_LOG_TTL);
            }
          }
        },

        _checkDrawdownThrottle() {
          // Compare the host's own gate — the wrapped one reads true under a PLK
          const prevActive = _origIsDD.call(this);
          _origDD.call(this);
          if (!this.cfg.permafrostEnabled) return;
          if (!prevActive && _origIsDD.call(this)) {
            // A real drawdown halt supersedes an active PLK (kind is overwritten)
            this._pfOnHaltTriggered('drawdown').catch(() => {});
          }
        },

        _checkGainsLock() {
          const prevActive = this._isGainsLocked();
          _origGL.call(this);
          if (!this.cfg.permafrostEnabled) return;
          if (!prevActive && this._isGainsLocked()) {
            this._pfOnHaltTriggered('gainslock').catch(() => {});
          }
        },

        activateManualHalt() {
          _origMH.call(this);
          if (!this.cfg.permafrostEnabled) return;
          this._pfOnHaltTriggered('drawdown').catch(() => {});
        },
      });
    },
  };
})();
</script>
