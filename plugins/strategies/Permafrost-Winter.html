<!--
  Permafrost Strategy Plugin for PseudoWinter
  Self-calibrating halt governor: replaces the fixed 12h drawdown-throttle /
  gains-lock timers with a learned market-structure profile.

  Every halt event records the market structure (gainer/loser skew + breadth)
  at the moment it fired — drawdown events mark hostile climate, gains-lock
  events mark favorable climate. Scan cycles add weaker PnL-labeled samples
  between those anchors. While halted, structure is re-sampled on a slow
  timer and the halt "thaws" early once current structure scores favorably
  against the profile — or holds past 12h (up to a hard cap) while it stays
  hostile. With a thin profile the plugin defers to the stock 12h timer.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation, so the same logic powers Ashfall on PseudoChaser.

  Load via Plugin Manager in PseudoWinter's config panel.
  Load AFTER EverWinter if using live trading — see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const PFR_KEY        = '__permafrost_winter_v1';
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old scars fade
  const EVENT_W        = 10;                   // halt events are strong anchors
  const SAMPLE_W       = 1;                    // cycle samples are weak fill
  const MIN_MASS       = 6;                    // effective evidence mass required to override the timer
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never thaw before 1h
  const LABEL_WINDOW   = 6 * 3600 * 1000;      // samples are labeled by the realized PnL that followed
  const EVENTS_CAP     = 200;
  const SAMPLES_CAP    = 1000;
  const PNL_LOG_TTL    = 24 * 3600 * 1000;

  window.__BotPlugin = {
    id:        'permafrost-winter',
    name:      'Permafrost (Winter)',
    version:   '1.1.0',
    targetBot: 'pseudowinter',
    after:     ['everwinter'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition', '_checkDrawdownThrottle', '_checkGainsLock'],

    css: `
      .pfr-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .pfr-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.permafrostEnabled"> + Permafrost</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Permafrost</span>
              <span x-show="cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.permafrostEnabled=!cfg.permafrostEnabled;persist()}">
              <div class="tog-t" :class="cfg.permafrostEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Permafrost Mode</div>
                <div class="pfr-hint">Learns which market climates trigger drawdowns vs gains locks, then thaws halts when structure leaves the hostile zone instead of waiting out the clock. Thin profile = stock 12h behavior.</div>
              </div>
            </label>
            <div x-show="cfg.permafrostEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Thaw Score <b x-text="(cfg.permafrostThawScore??0).toFixed(2)"></b></div>
                <input type="range" min="-0.5" max="0.5" step="0.05" x-model.number="cfg.permafrostThawScore" @change="persist()">
                <div class="pfr-hint">Profile score (−1 hostile … +1 favorable) the current structure must reach to lift a halt early. 0 = at least neutral history nearby.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Hard Cap <b x-text="(cfg.permafrostCapHours??24)+'h'"></b></div>
                <input type="range" min="12" max="48" step="1" x-model.number="cfg.permafrostCapHours" @change="persist()">
                <div class="pfr-hint">Maximum informed-halt duration. Resumes regardless once reached — stale scars must be re-tested.</div>
              </div>
              <div class="pfr-stat" style="margin-top:10px;padding:8px 10px;background:rgba(96,210,255,.05);border:1px solid rgba(96,210,255,.15);border-radius:3px">
                <div>PROFILE — <span x-text="(pfEvents||[]).filter(e=>e.kind==='drawdown').length"></span> drawdown / <span x-text="(pfEvents||[]).filter(e=>e.kind==='gainslock').length"></span> gains-lock events, <span x-text="(pfSamples||[]).filter(s=>s.label!==null).length"></span> labeled samples</div>
                <div x-show="pfStatus.at">READING — skew <span x-text="(pfStatus.skew??0).toFixed(2)"></span> | breadth <span x-text="(pfStatus.breadth??0).toFixed(2)"></span> | score <span x-text="pfStatus.score===null?'—':pfStatus.score.toFixed(2)"></span> | mass <span x-text="pfStatus.mass.toFixed(1)"></span></div>
                <div x-show="pfHalt" style="color:var(--ice)">HALT — <span x-text="pfHalt?.kind"></span> (<span x-text="pfHalt?.informed?'profile-governed':'timer fallback'"></span>) <span x-text="(()=>{ void tick; return pfHalt? Math.floor((Date.now()-pfHalt.at)/3600000)+'h elapsed':''; })()"></span></div>
                <div style="margin-top:6px;display:flex;gap:8px">
                  <button @click="pfExport()" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(96,210,255,.4);border-radius:2px;background:none;color:var(--ice);cursor:pointer;letter-spacing:.5px">Export</button>
                  <button @click="if(!cfgLocked){pfEvents=[];pfSamples=[];pfPnl=[];persist();log('[PFR] Profile cleared.','warn')}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.4);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Profile</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origPers  = def.persist;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;
      const _origDD    = def._checkDrawdownThrottle;
      const _origGL    = def._checkGainsLock;

      // Slow sampler handle lives outside the Alpine proxy (see Timer architecture)
      let _pfrTimer = null;

      return Object.assign({}, def, {

        pfEvents:  [],   // { ts, kind:'drawdown'|'gainslock', skew, breadth, gCount, lCount, gSum, lSum }
        pfSamples: [],   // { ts, skew, breadth, label } — label null until the 6h window resolves
        pfPnl:     [],   // { ts, pnl } — plugin-owned closed-trade log for sample labeling
        pfHalt:    null, // { kind, at, informed } while a halt is being governed
        pfStatus:  { skew: null, breadth: null, score: null, mass: 0, at: 0 },

        async init() {
          await _origInit.call(this);
          if (this.cfg.permafrostEnabled   === undefined) this.cfg.permafrostEnabled   = false;
          if (this.cfg.permafrostThawScore === undefined) this.cfg.permafrostThawScore = 0;
          if (this.cfg.permafrostCapHours  === undefined) this.cfg.permafrostCapHours  = 24;
          try {
            const raw = localStorage.getItem(PFR_KEY);
            if (raw) {
              const s = JSON.parse(raw);
              if (Array.isArray(s.events))  this.pfEvents  = s.events.slice(-EVENTS_CAP);
              if (Array.isArray(s.samples)) this.pfSamples = s.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(s.pnl))     this.pfPnl     = s.pnl.filter(e => Date.now() - e.ts < PNL_LOG_TTL);
              if (s.halt && s.halt.at) this.pfHalt = s.halt;
            }
          } catch(e) {}
          // Drop a stale governed-halt record if the underlying halt is gone (manual clear, expiry)
          if (this.pfHalt && !this._isDrawdownHalted() && !this._isGainsLocked()) this.pfHalt = null;
          if (this.pfHalt) this._pfEnsureSampler();
          this.log(`[PFR] Permafrost (Winter) v1.1.0 loaded — ${this.cfg.permafrostEnabled ? 'enabled' : 'disabled'} | ${this.pfEvents.length} events, ${this.pfSamples.length} samples on record`, 'info');
        },

        persist() {
          _origPers.call(this);
          try {
            localStorage.setItem(PFR_KEY, JSON.stringify({
              events: this.pfEvents, samples: this.pfSamples, pnl: this.pfPnl, halt: this.pfHalt,
            }));
          } catch(e) {}
        },

        // ── Market structure reading — full ticker universe, not the curated pools ──
        async _pfFetchStructure() {
          try {
            // Reuse the host scan's bulk ticker response when fresh (slow-tick
            // sampling during halts falls back to fetching — scans don't run then)
            let list;
            if (this._lastAllTickers?.length && (Date.now() - (this._lastAllTickersAt || 0)) < 60000) {
              list = this._lastAllTickers;
            } else {
              const r = await fetch(`${this.base}/v5/market/tickers?category=linear`);
              const d = await r.json();
              if (d.retCode !== 0) return null;
              list = d.result?.list || [];
            }
            let gSum = 0, lSum = 0, gCount = 0, lCount = 0;
            for (const t of list) {
              if (!t.symbol.endsWith('USDT') || t.symbol === 'BTCUSDT') continue;
              if (parseFloat(t.lastPrice || 0) < 0.001) continue;
              const ch = parseFloat(t.price24hPcnt || 0) * 100;
              if (ch > 0)      { gSum += ch; gCount++; }
              else if (ch < 0) { lSum += Math.abs(ch); lCount++; }
            }
            const sumT   = gSum + lSum, cntT = gCount + lCount;
            return {
              ts: Date.now(),
              skew:    sumT > 0 ? (gSum - lSum) / sumT : 0,
              breadth: cntT > 0 ? (gCount - lCount) / cntT : 0,
              gCount, lCount,
              gSum: +gSum.toFixed(1), lSum: +lSum.toFixed(1),
            };
          } catch(e) { return null; }
        },

        // ── Human-readable structure + historical-bias phrasing for the activity log ──
        _pfDescribe(reading, score, mass) {
          const lean   = (reading.skew + reading.breadth) / 2;
          const adverb = Math.abs(lean) > 0.4 ? 'strongly ' : '';
          const struct = lean > 0.08 ? `${adverb}bullish` : lean < -0.08 ? `${adverb}bearish` : 'mixed/flat';
          const desc   = `${struct} (skew ${reading.skew.toFixed(2)}, breadth ${reading.breadth.toFixed(2)}, ${reading.gCount}▲/${reading.lCount}▼)`;
          let bias;
          if (score === null || mass < MIN_MASS) bias = `no historical bias noted (evidence mass ${mass.toFixed(1)} < ${MIN_MASS})`;
          else if (score >= 0.15)  bias = `this is historically good for shorts (score +${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else if (score <= -0.15) bias = `this is historically bad for shorts (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else                     bias = `historically neutral for shorts (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          return { desc, bias };
        },

        // ── Hostility score: kernel-weighted, recency-decayed vote of past events
        // and labeled samples near the given reading. score ∈ [−1,1]; mass = evidence weight.
        _pfScore(reading) {
          const now = Date.now();
          let num = 0, mass = 0;
          const tally = (skew, breadth, label, w, ts) => {
            const ds = reading.skew - skew, db = reading.breadth - breadth;
            const k  = Math.exp(-(ds * ds + db * db) / (2 * KERNEL_H * KERNEL_H));
            const dec = Math.pow(0.5, (now - ts) / HALF_LIFE_MS);
            num  += w * label * k * dec;
            mass += w * k * dec;
          };
          for (const e of this.pfEvents) tally(e.skew, e.breadth, e.kind === 'drawdown' ? -1 : 1, EVENT_W, e.ts);
          for (const s of this.pfSamples) { if (s.label !== null) tally(s.skew, s.breadth, s.label, SAMPLE_W, s.ts); }
          return { score: mass > 0 ? num / mass : null, mass };
        },

        // ── Label samples whose 6h window has resolved; drop windows with no closed trades ──
        _pfStampSamples() {
          const now = Date.now();
          const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          this.pfSamples = this.pfSamples.filter(s => {
            if (s.label !== null || now - s.ts < LABEL_WINDOW) return true;
            const trades = this.pfPnl.filter(p => p.ts > s.ts && p.ts <= s.ts + LABEL_WINDOW);
            if (!trades.length) return false; // nothing closed — no evidence either way
            const pnl = trades.reduce((a, p) => a + p.pnl, 0);
            s.label = Math.max(-1, Math.min(1, pnl / entryMargin));
            return true;
          });
          if (this.pfSamples.length > SAMPLES_CAP) this.pfSamples = this.pfSamples.slice(-SAMPLES_CAP);
        },

        _pfAddSample(reading) {
          this._pfStampSamples();
          this.pfSamples.push({ ts: reading.ts, skew: reading.skew, breadth: reading.breadth, label: null });
          const { score, mass } = this._pfScore(reading);
          this.pfStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, at: reading.ts };
        },

        // ── Halt event: record the climate, decide informed cap vs timer fallback ──
        async _pfOnHaltTriggered(kind) {
          const reading = await this._pfFetchStructure();
          if (!reading) { this.pfHalt = { kind, at: Date.now(), informed: false }; this.persist(); return; }
          this.pfEvents.push({ ts: reading.ts, kind, skew: reading.skew, breadth: reading.breadth, gCount: reading.gCount, lCount: reading.lCount, gSum: reading.gSum, lSum: reading.lSum });
          if (this.pfEvents.length > EVENTS_CAP) this.pfEvents = this.pfEvents.slice(-EVENTS_CAP);
          const { score, mass } = this._pfScore(reading);
          this.pfStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, at: reading.ts };
          const informed = mass >= MIN_MASS;
          if (informed) {
            // Enough evidence to govern: extend to the hard cap; thaw lifts it early
            const capUntil = reading.ts + (this.cfg.permafrostCapHours ?? 24) * 3600 * 1000;
            if (kind === 'drawdown') this._drawdownHaltUntil = capUntil;
            else                     this._gainsLockHaltUntil = capUntil;
          }
          this.pfHalt = { kind, at: reading.ts, informed };
          const _d = this._pfDescribe(reading, score, mass);
          this.log(`[PFR] 🧊 ${kind === 'drawdown' ? 'Drawdown' : 'Gains lock'} activated — market structure is ${_d.desc} | ${_d.bias} → ${informed ? 'profile-governed halt, thaws when structure clears' : 'profile too thin — stock 12h timer'}`, 'warn');
          this._pfEnsureSampler();
          this.persist();
        },

        _pfEnsureSampler() {
          if (_pfrTimer) return;
          const iv = Math.max(3600 * 1000, 4 * (this.cfg.scanMins || 15) * 60 * 1000);
          _pfrTimer = setInterval(() => this._pfSamplerTick(), iv);
        },

        _pfStopSampler() {
          if (_pfrTimer) { clearInterval(_pfrTimer); _pfrTimer = null; }
        },

        async _pfSamplerTick() {
          const ddActive = this._isDrawdownHalted(), glActive = this._isGainsLocked();
          if (!this.cfg.permafrostEnabled || !this.pfHalt || (!ddActive && !glActive)) {
            this.pfHalt = null; this._pfStopSampler(); this.persist(); return;
          }
          const reading = await this._pfFetchStructure();
          if (!reading) return;
          this._pfAddSample(reading);
          const { score, mass } = this.pfStatus;
          const elapsed = Date.now() - this.pfHalt.at;
          if (elapsed >= MIN_HALT_MS && mass >= MIN_MASS && score !== null && score >= (this.cfg.permafrostThawScore ?? 0)) {
            const kind = this.pfHalt.kind;
            if (kind === 'drawdown') { this._drawdownHaltUntil = null; this._drawdownWindow = []; }
            else                     { this._gainsLockHaltUntil = null; this._gainsWindow = []; }
            this.pfHalt = null;
            this._pfStopSampler();
            this.log(`[PFR] 🌊 Thaw — structure cleared the ${kind} zone after ${(elapsed / 3600000).toFixed(1)}h (score ${score.toFixed(2)} ≥ ${(this.cfg.permafrostThawScore ?? 0).toFixed(2)}, mass ${mass.toFixed(1)}) — new entries re-enabled`, 'success');
          } else {
            const _d = this._pfDescribe(reading, score, mass);
            this.log(`[PFR] 🧊 Halt check (${(elapsed / 3600000).toFixed(1)}h elapsed) — market is ${_d.desc} | ${_d.bias} — holding`, 'info');
          }
          this.persist();
        },

        pfExport() {
          const blob = new Blob([JSON.stringify({ exportedAt: Date.now(), events: this.pfEvents, samples: this.pfSamples }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `permafrost-winter-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
        },

        async runScan() {
          await _origScan.call(this);
          if (!this.cfg.permafrostEnabled) return;
          this._pfFetchStructure().then(r => {
            if (!r) return;
            this._pfAddSample(r);
            const { score, mass } = this.pfStatus;
            const _d = this._pfDescribe(r, score, mass);
            this.log(`[PFR] 🧊 Routine market structure check — market is ${_d.desc} | ${_d.bias}`, 'info');
            this.persist();
          }).catch(() => {});
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if ((this.closedTrades?.length ?? 0) > prevLen) {
            // totalPnl (incl. funding) is what the base feeds its halt windows
            const t   = this.closedTrades[0];
            const pnl = t?.totalPnl ?? t?.pnl;
            if (typeof pnl === 'number') {
              const now = Date.now();
              this.pfPnl.push({ ts: now, pnl });
              this.pfPnl = this.pfPnl.filter(e => now - e.ts < PNL_LOG_TTL);
            }
          }
        },

        _checkDrawdownThrottle() {
          const prevActive = this._isDrawdownHalted();
          _origDD.call(this);
          if (!this.cfg.permafrostEnabled) return;
          if (!prevActive && this._isDrawdownHalted()) {
            this._pfOnHaltTriggered('drawdown').catch(() => {});
          }
        },

        _checkGainsLock() {
          const prevActive = this._isGainsLocked();
          _origGL.call(this);
          if (!this.cfg.permafrostEnabled) return;
          if (!prevActive && this._isGainsLocked()) {
            this._pfOnHaltTriggered('gainslock').catch(() => {});
          }
        },
      });
    },
  };
})();
</script>
