<!--
  Multi-Indicator Strategy Plugin for PseudoChaser
  Slot-based entry filter combining fund rate, 24hr price direction, and vol/mcap signals.

  Each "slot" is an AND-condition over any combination of twelve criteria:
    fund   — tiered funding rate (fund>N longs paying, fund<-N shorts paying)
    +24h   — ticker's 24hr price change is positive
    -24h   — ticker's 24hr price change is negative
    vm     — tiered vol/mcap ratio (vm>N high participation)
    lsa    — tiered 1h sell spike above avg (lsa>N)
    lba    — tiered 1h buy spike above avg (lba>N)
    rasl   — tiered 1h low-vol red candle (rasl>N)
    rabl   — tiered 1h low-vol green candle (rabl>N)
    sliq   — sell-liquidation depth gate (≥70% sell dominance)
    bliq   — buy-liquidation depth gate (≥70% buy dominance)
    msliq  — mixed sell-liq: sell majority but buy ≥30%
    mbliq  — mixed buy-liq: buy majority but sell ≥30%
    iot    — tiered OI vs Turnover ratio
    iom    — tiered OI vs MCap ratio

  A ticker qualifies for entry if it satisfies ALL criteria in ANY slot. Slots that contain
  a vol/mcap criterion trigger a CoinGecko market cap lookup via the shared window.__cgCoinList
  cache; fund and 24h criteria run entirely from the host's bulk ticker cache.

  Entry pool fires once per fresh bulk ticker fetch (_lastAllTickersAt) — will not re-scan
  the same cached snapshot twice. TP, SL, and all exit logic use the host's settings.
  Drawdown throttle and gains lock gate all entries.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const VERSION       = '1.24.1';
  const DEFAULT_SLOTS = [['fund<-1','+24h','vm>10'],['fund>1','-24h','vm<10']];
  const MIC_HIST_KEY  = '__mic_hist_batches';

  // Per-criterion emoji for position badges. Fund emoji is app-relative:
  // -fund = shorts paying = good carry for longs (🤑), bad for shorts (💸).
  // +fund = longs paying = bad for longs (💸), good for shorts (🤑).
  const CRIT_EMOJI = { '+24h': '⬆️', '-24h': '⬇️', 'fund': '💰', 'vm': '🔊', 'sliq': '🥵', 'bliq': '🥶', 'msliq': '💦', 'mbliq': '🌨️', 'iot': '🎲', 'iom': '🧲' };
  const CRIT_DESC  = { 'fund': 'Fund (tiered funding rate)', '+24h': '+24h (up on day)', '-24h': '-24h (down on day)', 'vm': 'V/M (vol/mcap ratio)', 'lsa': 'LSA (1h sell spike)', 'lba': 'LBA (1h buy spike)', 'rasl': 'R-ASL (1h low-vol red)', 'rabl': 'R-ABL (1h low-vol green)', 'sliq': 'S-Liq (Sell-Liquidation: sell side ≥70% dominant)', 'bliq': 'B-Liq (Buy-Liquidation: buy side ≥70% dominant)', 'msliq': 'mS-Liq (Mixed Sell-Liq: sell majority, buy ≥30%)', 'mbliq': 'mB-Liq (Mixed Buy-Liq: buy majority, sell ≥30%)', 'iot': 'IO/T (OI vs Turnover — conviction/stickiness)', 'iom': 'IO/M (OI vs MCap — leverage concentration)' };

  const critEmoji = c => {
    if (/^fund/.test(c)) { const s = c.slice(4); const num = parseFloat(s.replace(/^[<>]/,'')); return (num < 0 ? '🤑' : '💸') + s; }
    if (/^vm/.test(c)) return '🔊' + c.slice(2);
    if (/^lsa/.test(c)) return '🟥' + c.slice(3);
    if (/^lba/.test(c)) return '🟩' + c.slice(3);
    if (/^rasl/.test(c)) return '🔴' + c.slice(4);
    if (/^rabl/.test(c)) return '🟢' + c.slice(4);
    if (/^msliq/.test(c)) return '💦' + c.slice(5);
    if (/^mbliq/.test(c)) return '🌨️' + c.slice(5);
    if (/^sliq/.test(c)) return '🥵' + c.slice(4);
    if (/^bliq/.test(c)) return '🥶' + c.slice(4);
    if (/^iot/.test(c)) return '🎲' + c.slice(3);
    if (/^iom/.test(c)) return '🧲' + c.slice(3);
    return CRIT_EMOJI[c] || '';
  };
  const critLabel = c => {
    const fM = c.match(/^fund([<>])(-?\d+)$/);
    if (fM) return 'Fund ' + fM[1] + fM[2];
    const fA = c.match(/^fund([+-]-?\d*)$/);
    if (fA) return 'Fund t' + fA[1];
    if (c === 'fund') return 'Fund';
    const vM = c.match(/^vm([<>])(\d+)$/);
    if (vM) return 'V/M ' + vM[1] + vM[2];
    const vA = c.match(/^vm([+-]\d+)$/);
    if (vA) return 'V/M t' + vA[1];
    if (c === 'vm') return 'V/M';
    const kM = c.match(/^(lsa|lba|rasl|rabl)([<>])(\d+)$/);
    if (kM) return kM[1].toUpperCase().replace('RASL','R-ASL').replace('RABL','R-ABL') + ' ' + kM[2] + kM[3];
    const kA = c.match(/^(lsa|lba|rasl|rabl)([+-]\d+)$/);
    if (kA) return kA[1].toUpperCase().replace('RASL','R-ASL').replace('RABL','R-ABL') + ' t' + kA[2];
    if (c === 'lsa') return 'LSA'; if (c === 'lba') return 'LBA';
    if (c === 'rasl') return 'R-ASL'; if (c === 'rabl') return 'R-ABL';
    const m = c.match(/^(m?sliq|m?bliq)([<>])([+-]?\d+)$/);
    if (m) return (m[1] === 'sliq' ? 'S-Liq' : m[1] === 'bliq' ? 'B-Liq' : m[1] === 'msliq' ? 'mS-Liq' : 'mB-Liq') + ' ' + m[2] + m[3];
    const n = c.match(/^(m?sliq|m?bliq)([+-]\d+)$/);
    if (n) return (n[1] === 'sliq' ? 'S-Liq' : n[1] === 'bliq' ? 'B-Liq' : n[1] === 'msliq' ? 'mS-Liq' : 'mB-Liq') + ' ' + n[2];
    if (c === 'sliq') return 'S-Liq'; if (c === 'bliq') return 'B-Liq';
    if (c === 'msliq') return 'mS-Liq'; if (c === 'mbliq') return 'mB-Liq';
    const o = c.match(/^(iot|iom)([<>])(\d+)$/);
    if (o) return (o[1] === 'iot' ? 'IO/T' : 'IO/M') + ' ' + o[2] + o[3];
    const p = c.match(/^(iot|iom)([+-]\d+)$/);
    if (p) return (p[1] === 'iot' ? 'IO/T' : 'IO/M') + ' t' + p[2];
    if (c === 'iot') return 'IO/T'; if (c === 'iom') return 'IO/M';
    return CRIT_DESC[c] || c;
  };

  window.__BotPlugin = {
    id:        'multiindicator-chaser',
    name:      'Multi-Indicator (Chaser)',
    version:   VERSION,
    targetBot: 'pseudochaser',
    after:     ['sunchaser', 'ashfall-chaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan'],

    css: `
      .mic-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .mic-slot { display:inline-flex; flex-direction:column; align-items:center; gap:3px; padding:6px 5px; border-radius:3px; border:1px solid; cursor:pointer; min-width:52px; font-size:9px; font-family:var(--mono); text-align:center; transition:border-color .15s,background .15s; }
      .mic-crit { font-size:8px; padding:1px 4px; border-radius:2px; background:rgba(255,150,80,.12); border:1px solid rgba(255,150,80,.3); color:#ff9650; white-space:nowrap; }
      .mic-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
      .mic-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .mic-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .mic-tab.on { border-color:rgba(255,150,80,.6); color:#ff9650; background:rgba(255,150,80,.08); }
      .mic-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .mic-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.micEnabled"> + Multi</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false, tE: false, tX: false, tF: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Multi-Indicator</span>
              <span x-show="cfg.micEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.micEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.micEnabled=!cfg.micEnabled;persist()}">
              <div class="tog-t" :class="cfg.micEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Multi-Indicator Mode</div>
                <div class="mic-hint">Longs tickers matching any active entry slot; fires once per bulk ticker fetch using host TP/SL settings.</div>
              </div>
            </label>
            <div x-show="cfg.micEnabled" style="margin-top:8px">
              <div class="mic-tabs">
                <button class="mic-tab" :class="tE?'on':''" @click="tE=!tE">ENTRY</button>
                <button class="mic-tab" :class="tX?'on':''" @click="tX=!tX">EXIT</button>
                <button class="mic-tab" :class="tF?'on':''" @click="tF=!tF">FADE</button>
              </div>

              <!-- Entry Zone -->
              <div class="mic-zone" x-show="tE">
                <!-- Entry Slots -->
                <div>
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                    <div class="lbl" style="margin-bottom:0">Entry Slots</div>
                    <label class="tog" style="font-size:9px" @click="if(!cfgLocked){cfg.micAutoSlots=!cfg.micAutoSlots;persist()}">
                      <div class="tog-t" :class="cfg.micAutoSlots?'on':''"><div class="tog-k"></div></div>
                      <span class="tog-l">Auto</span>
                    </label>
                  </div>

                  <!-- Auto slots controls -->
                  <div x-show="cfg.micAutoSlots" style="margin-bottom:8px;padding:6px 8px;background:rgba(255,150,80,.04);border:1px solid rgba(255,150,80,.12);border-radius:3px">
                    <div class="lbl">Criteria per Slot <b x-text="cfg.micAutoSlotSize??2"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'— '+(()=>{const n=cfg.micAutoSlotSize??2,k=14-(cfg.micAutoSlotExclude||[]).length;if(k<n)return 0;let r=1;for(let i=0;i<n;i++)r=r*(k-i)/(i+1);return Math.round(r)})()+' base slots (tiers add more)'"></span></div>
                    <input type="range" min="1" max="5" step="1" x-model.number="cfg.micAutoSlotSize" @change="persist()">
                    <div class="lbl" style="margin-top:5px;margin-bottom:3px">Exclude from Auto</div>
                    <div style="display:flex;flex-wrap:wrap;gap:3px">
                      <template x-for="c in ['fund','+24h','-24h','vm','lsa','lba','rasl','rabl','sliq','bliq','msliq','mbliq','iot','iom']" :key="c">
                        <button @click.prevent="if(!cfgLocked){ const ex=(cfg.micAutoSlotExclude||[]).slice(); const i=ex.indexOf(c); if(i>=0) ex.splice(i,1); else ex.push(c); cfg.micAutoSlotExclude=ex; persist(); }"
                                :style="'font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;cursor:pointer;border:1px solid;' + ((cfg.micAutoSlotExclude||[]).includes(c) ? 'border-color:rgba(255,80,80,.5);background:rgba(255,80,80,.15);color:rgba(255,80,80,.8)' : 'border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--text-lo)')"
                                x-text="c.replace('fund','Fund').replace('vm','V/M').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL').replace('sliq','S-Liq').replace('bliq','B-Liq').replace('iot','IO/T').replace('iom','IO/M')">
                        </button>
                      </template>
                    </div>
                    <div class="mic-hint" style="margin-top:4px">Excluded criteria are omitted from all auto combos and scorecard scoring. Manual slots are preserved when Auto is off. Tiered criteria (Fund, V/M, spike, IO/T, IO/M) record a tier value at entry — each distinct tier produces a separate scorecard key, so the actual scored variety exceeds the base slot count shown above.</div>
                    <div x-show="Object.keys(micBlockedSlots||{}).length" class="mic-hint" style="margin-top:3px" x-text="Object.values(micBlockedSlots||{}).filter(v=>v==='blocked').length+' slot(s) blocked — matched tickers graylisted for '+(cfg.micBlockedSlotCooldownHours??6)+'h'"></div>
                  </div>

                  <!-- Manual slot builder — hidden when Auto is on -->
                  <div x-show="!cfg.micAutoSlots">
                    <div class="mic-hint" style="margin-bottom:6px;color:var(--text-lo)">(click slot to edit · click criteria to toggle)</div>

                    <!-- Criteria picker — visible when a slot is selected -->
                    <div x-show="cfg.micActiveSlot !== null && cfg.micActiveSlot !== undefined && cfg.micActiveSlot < (cfg.micSlots||[]).length"
                         x-data="{ liqFocus: null, liqDir: '>', liqVal: 2, ratioFocus: null, ratioDir: '>', ratioTier: 5, gateFocus: null, gateDir: '>', gateTier: 1 }"
                         @click.outside="liqFocus = null; ratioFocus = null; gateFocus = null"
                         style="display:flex;gap:3px;flex-wrap:wrap;align-items:center;margin-bottom:7px;padding:6px 7px;background:rgba(255,255,255,.04);border-radius:3px;border:1px solid rgba(255,255,255,.08)">
                      <span style="font-size:9px;color:var(--text-lo);margin-right:2px">Slot <span x-text="(cfg.micActiveSlot??0)+1"></span>:</span>
                      <template x-for="c in ['fund','+24h','-24h','vm','lsa','lba','rasl','rabl','sliq','bliq','msliq','mbliq','iot','iom']" :key="c">
                        <button class="mic-opt"
                          @click.prevent="if(!cfgLocked){
                            if(c==='sliq'||c==='bliq'||c==='msliq'||c==='mbliq'){
                              liqFocus=(liqFocus===c?null:c); ratioFocus=null; gateFocus=null;
                              if(liqFocus){ const ex=(cfg.micSlots?.[cfg.micActiveSlot]||[]).find(x=>x.startsWith(c)); if(ex){ const m=ex.match(/^(?:m?sliq|m?bliq)([<>])([+-]?\d+)$/); if(m){liqDir=m[1];liqVal=parseInt(m[2],10)} } }
                            } else if(c==='iot'||c==='iom'){
                              ratioFocus=(ratioFocus===c?null:c); liqFocus=null; gateFocus=null;
                              if(ratioFocus){ const ex=(cfg.micSlots?.[cfg.micActiveSlot]||[]).find(x=>x.startsWith(c)); if(ex){ const m=ex.match(/^(?:iot|iom)([<>])(\d+)$/); if(m){ratioDir=m[1];ratioTier=parseInt(m[2],10)} } }
                            } else if(c==='fund'||c==='vm'||c==='lsa'||c==='lba'||c==='rasl'||c==='rabl'){
                              gateFocus=(gateFocus===c?null:c); liqFocus=null; ratioFocus=null;
                              if(gateFocus){ const ex=(cfg.micSlots?.[cfg.micActiveSlot]||[]).find(x=>x.startsWith(c)); if(ex){ const m=ex.match(/^(?:fund|vm|lsa|lba|rasl|rabl)([<>])(-?\d+)$/); if(m){gateDir=m[1];gateTier=parseInt(m[2],10)} } else { gateDir='>'; gateTier=c==='fund'?1:c==='vm'?10:25; } }
                            } else { liqFocus=null; ratioFocus=null; gateFocus=null; _micToggle(cfg.micActiveSlot, c) }
                          }"
                          :style="(c==='sliq'||c==='bliq'||c==='msliq'||c==='mbliq') ? (liqFocus===c ? 'border-color:rgba(255,150,80,.8);color:#ff9650;background:rgba(255,150,80,.25)' : (cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(c)) ? 'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent') : (c==='iot'||c==='iom') ? (ratioFocus===c ? 'border-color:rgba(255,150,80,.8);color:#ff9650;background:rgba(255,150,80,.25)' : (cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(c)) ? 'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent') : (c==='fund'||c==='vm'||c==='lsa'||c==='lba'||c==='rasl'||c==='rabl') ? (gateFocus===c ? 'border-color:rgba(255,150,80,.8);color:#ff9650;background:rgba(255,150,80,.25)' : (cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(c)) ? 'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent') : ((cfg.micSlots?.[cfg.micActiveSlot]||[]).includes(c) ? 'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent')"
                          x-text="c.replace('fund','Fund').replace('vm','V/M').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL').replace('sliq','S-Liq').replace('bliq','B-Liq').replace('iot','IO/T').replace('iom','IO/M')">
                        </button>
                      </template>
                      <!-- Liq depth config panel -->
                      <div x-show="liqFocus !== null" style="width:100%;margin-top:6px;padding:5px 7px;background:rgba(255,150,80,.06);border:1px solid rgba(255,150,80,.2);border-radius:3px">
                        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                          <span style="font-size:9px;color:var(--text-lo)" x-text="({'sliq':'S-Liq','bliq':'B-Liq','msliq':'mS-Liq','mbliq':'mB-Liq'}[liqFocus]||liqFocus)+' depth'"></span>
                          <button @click.prevent="liqDir=(liqDir==='>'?'<':'>')"
                            style="font-family:var(--mono);font-size:9px;padding:1px 6px;background:rgba(255,150,80,.1);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;cursor:pointer"
                            x-text="liqDir"></button>
                          <input type="range" min="-25" max="25" step="1" x-model.number="liqVal" style="flex:1;min-width:60px">
                          <span style="font-size:9px;color:#ff9650;min-width:24px;text-align:right" x-text="(liqVal>=0?'+':'')+liqVal"></span>
                          <button @click.prevent="if(!cfgLocked&&liqFocus){ const slots=(cfg.micSlots||[]).map(s=>[...s]); const si=cfg.micActiveSlot; if(!slots[si]) return; const existIdx=slots[si].findIndex(x=>x.startsWith(liqFocus)); if(existIdx!==-1){ slots[si].splice(existIdx,1); } else { slots[si].push(liqFocus+liqDir+(liqVal>=0?'+':'')+liqVal); } cfg.micSlots=slots; persist?.(); }"
                            :style="(cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(liqFocus??'__')) ? 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.4);color:rgba(255,100,100,.9)' : 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,150,80,.1);border:1px solid rgba(255,150,80,.35);color:#ff9650'"
                            x-text="(cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(liqFocus??'__')) ? 'Remove' : 'Add'">
                          </button>
                        </div>
                      </div>
                      <!-- IO/T and IO/M tier config panel -->
                      <div x-show="ratioFocus !== null" style="width:100%;margin-top:6px;padding:5px 7px;background:rgba(255,150,80,.06);border:1px solid rgba(255,150,80,.2);border-radius:3px">
                        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                          <span style="font-size:9px;color:var(--text-lo)" x-text="(ratioFocus==='iot'?'IO/T':'IO/M')+' tier'"></span>
                          <button @click.prevent="ratioDir=(ratioDir==='>'?'<':'>')"
                            style="font-family:var(--mono);font-size:9px;padding:1px 6px;background:rgba(255,150,80,.1);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;cursor:pointer"
                            x-text="ratioDir"></button>
                          <input type="range" min="0" max="500" step="1" x-model.number="ratioTier" style="flex:1;min-width:60px">
                          <span style="font-size:9px;color:#ff9650;min-width:52px;text-align:right" x-text="ratioTier+' (≈'+(ratioTier*(ratioFocus==='iot'?(cfg.micIotStep??1):(cfg.micIomStep??1))/100).toFixed(2)+')'"></span>
                          <button @click.prevent="if(!cfgLocked&&ratioFocus){ const slots=(cfg.micSlots||[]).map(s=>[...s]); const si=cfg.micActiveSlot; if(!slots[si]) return; const existIdx=slots[si].findIndex(x=>x.startsWith(ratioFocus)); if(existIdx!==-1){ slots[si].splice(existIdx,1); } else { slots[si].push(ratioFocus+ratioDir+ratioTier); } cfg.micSlots=slots; persist?.(); }"
                            :style="(cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(ratioFocus??'__')) ? 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.4);color:rgba(255,100,100,.9)' : 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,150,80,.1);border:1px solid rgba(255,150,80,.35);color:#ff9650'"
                            x-text="(cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(ratioFocus??'__')) ? 'Remove' : 'Add'">
                          </button>
                        </div>
                      </div>
                      <!-- Fund/VM/Spike gate config panel -->
                      <div x-show="gateFocus !== null" style="width:100%;margin-top:6px;padding:5px 7px;background:rgba(255,150,80,.06);border:1px solid rgba(255,150,80,.2);border-radius:3px">

                          <button @click.prevent="if(!cfgLocked&&gateFocus){ const slots=(cfg.micSlots||[]).map(s=>[...s]); const si=cfg.micActiveSlot; if(!slots[si]) return; const existIdx=slots[si].findIndex(x=>x.startsWith(gateFocus)); if(existIdx!==-1){ slots[si].splice(existIdx,1); } else { slots[si].push(gateFocus+gateDir+gateTier); } cfg.micSlots=slots; persist?.(); }"

                            x-text="(cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(gateFocus??'__')) ? 'Remove' : 'Add'">
                          </button>
                        </div>
                      </div>
                    </div>

                    <!-- Slot blocks -->
                    <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:flex-start">

                    </div>
                    <div class="mic-hint" style="margin-top:5px">Each slot is an AND-gate — a ticker must meet every criterion in the slot. Any matching slot qualifies the ticker for entry. Vol/mcap criteria compute market cap from CoinPaprika supply × Bybit price. LSA/LBA/R-ASL/R-ABL fetch the last completed 1h kline per ticker.</div>
                    <div class="mic-hint" style="margin-top:5px;line-height:1.8">Badge key: 💸/🤑 Fund · ⬆️ +24h · ⬇️ -24h · 🔊 V/M · 🟥 LSA · 🟩 LBA · 🔴 R-ASL · 🟢 R-ABL · 🥵 S-Liq · 🥶 B-Liq · 💦 mS-Liq · 🌨️ mB-Liq · 🎲 IO/T · 🧲 IO/M — click any tiered criterion to configure gate</div>
                  </div><!-- end manual builder -->
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">Kline Scan Cap <b x-text="(cfg.micKlineScanCap??50)"></b> tickers</div>
                    <input type="range" min="10" max="500" step="10" x-model.number="cfg.micKlineScanCap" @change="persist()">

                        <span style="font-size:9px;color:var(--text-lo);min-width:52px">🔊 V/M</span>
                        <input type="number" class="inp" min="0.1" max="10" step="0.1" x-model.number="cfg.micVmStep" @change="persist()" style="width:60px">
                        <span style="font-size:9px;color:var(--text-lo)">% / tier</span>
                      </div>
                      <div style="display:flex;align-items:center;gap:6px">
                        <span style="font-size:9px;color:var(--text-lo);min-width:52px">🟥 Spike</span>
                        <input type="number" class="inp" min="0.1" max="10" step="0.1" x-model.number="cfg.micSpikeStep" @change="persist()" style="width:60px">
                        <span style="font-size:9px;color:var(--text-lo)">% / tier</span>
                      </div>
                      <div style="display:flex;align-items:center;gap:6px">
                        <span style="font-size:9px;color:var(--text-lo);min-width:52px">🎲 IO/T</span>

                        <span style="font-size:9px;color:var(--text-lo)">% / tier</span>
                      </div>
                      <div style="display:flex;align-items:center;gap:6px">
                        <span style="font-size:9px;color:var(--text-lo);min-width:52px">🧲 IO/M</span>
                        <input type="number" class="inp" min="0.1" max="10" step="0.1" x-model.number="cfg.micIomStep" @change="persist()" style="width:60px">
                        <span style="font-size:9px;color:var(--text-lo)">% / tier</span>
                      </div>
                    </div>
                    <div class="mic-hint" style="margin-top:3px">Tier = floor(value / step). "lsa>25" at 1% step means spike ≥ 25% above average.</div>
                  </div>
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">Blocked Slot Cooldown <b x-text="(cfg.micBlockedSlotCooldownHours??6)+'h'"></b></div>

                    <div class="mic-hint">Tickers matching a blocked slot are graylisted for this duration.</div>
                  </div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.micRequireLiqData=!cfg.micRequireLiqData;persist()}">

                    <div class="mic-hint">Max age of supply data in scan cycles before a ticker is excluded.</div>
                  </div>

                  </div>
                </div><!-- end entry slots section -->
              </div><!-- end entry zone -->

              <!-- Exit Zone -->
              <div class="mic-zone" x-show="tX">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.micCascadeEnabled=!cfg.micCascadeEnabled;persist()}">
                  <div class="tog-t" :class="cfg.micCascadeEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Cascade Exit</div>
                    <div class="mic-hint">Bails all MIC positions when their collective unrealized profit reaches a % of total base margin.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.micCascadeEnabled" style="margin-top:8px">
                  <div class="lbl">Trigger at <b x-text="(cfg.micCascadePct??25)+'% of base margin'"></b></div>
                  <input type="range" min="5" max="200" step="5" x-model.number="cfg.micCascadePct" @change="persist()">
                  <div class="mic-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._mic); const margin=pos.reduce((s,p)=>s+(p.margin||0),0); const upnl=pos.reduce((s,p)=>s+(p.upnl||0),0); const avg=pos.length?margin/pos.length:0; const halvMul=cfg.micHalvingEnabled&&pos.length?Math.pow(0.5,(Date.now()-pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()))/((cfg.micHalvingHours??3)*3600000)):1; const thr=avg*((cfg.micCascadePct??25)/100)*halvMul; return pos.length ? 'Active: '+pos.length+' pos · avg margin '+avg.toFixed(4)+' · uPnL '+(upnl>=0?'+':'')+upnl.toFixed(4)+' · trigger @ +'+(thr).toFixed(4)+(halvMul<0.999?' (×'+halvMul.toFixed(2)+')':'')+' USDT' : 'No active MIC positions.'; })()"></div>
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.micSacrificeEnabled=!cfg.micSacrificeEnabled;persist()}">
                  <div class="tog-t" :class="cfg.micSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Sacrifice Exit</div>
                    <div class="mic-hint">Bails all MIC positions when their collective unrealized loss reaches a % of avg base margin.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.micSacrificeEnabled" style="margin-top:8px">
                  <div class="lbl">Trigger at <b x-text="'-'+(cfg.micSacrificePct??25)+'% of base margin'"></b></div>
                  <input type="range" min="5" max="200" step="5" x-model.number="cfg.micSacrificePct" @change="persist()">
                  <div class="mic-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._mic); const margin=pos.reduce((s,p)=>s+(p.margin||0),0); const upnl=pos.reduce((s,p)=>s+(p.upnl||0),0); const avg=pos.length?margin/pos.length:0; const halvMul=cfg.micHalvingEnabled&&pos.length?Math.pow(0.5,(Date.now()-pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()))/((cfg.micHalvingHours??3)*3600000)):1; const thr=avg*((cfg.micSacrificePct??25)/100)*halvMul; return pos.length ? 'Active: '+pos.length+' pos · avg margin '+avg.toFixed(4)+' · uPnL '+(upnl>=0?'+':'')+upnl.toFixed(4)+' · trigger @ -'+(thr).toFixed(4)+(halvMul<0.999?' (×'+halvMul.toFixed(2)+')':'')+' USDT' : 'No active MIC positions.'; })()"></div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.micRollingSacrificeEnabled=!cfg.micRollingSacrificeEnabled;persist()}">
                    <div class="tog-t" :class="cfg.micRollingSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Rolling Window</div>
                      <div class="mic-hint">On trigger: close oldest position only instead of bailing all.</div>
                    </div>
                  </label>
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.micHalvingEnabled=!cfg.micHalvingEnabled;persist()}">
                  <div class="tog-t" :class="cfg.micHalvingEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Target Halving</div>
                    <div class="mic-hint">Halves the cascade/sacrifice trigger threshold once per interval, based on the age of the oldest MIC position — the longer they're held, the easier the collective exit fires.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.micHalvingEnabled" style="margin-top:8px">
                  <div class="lbl">Halving Interval <b x-text="(h=>(h<1?Math.round(h*60)+'m':h%1===0?h+'h':Math.floor(h)+'h '+Math.round((h%1)*60)+'m'))(cfg.micHalvingHours??3)"></b></div>
                  <input type="number" class="inp" min="0.1" max="24" step="0.1" x-model.number="cfg.micHalvingHours" @change="persist()" style="width:80px">
                  <div class="mic-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._mic); if(!pos.length) return 'No active MIC positions.'; const oldest=pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()); const ageMs=Date.now()-oldest; const halvMs=(cfg.micHalvingHours??3)*3600000; const mul=Math.pow(0.5,ageMs/halvMs); const h=Math.floor(ageMs/3600000); const m=Math.floor((ageMs%3600000)/60000); return 'Oldest: '+h+'h '+String(m).padStart(2,'0')+'m old → ×'+mul.toFixed(3)+' on trigger'; })()"></div>
                </div>
              </div><!-- end exit zone -->

              <!-- Fade Zone -->
              <div class="mic-zone" x-show="tF">

                      <label class="tog" @click.prevent="if(!cfgLocked){cfg.micFadeLiqEnabled=!cfg.micFadeLiqEnabled;persist()}">
                        <div class="tog-t" :class="cfg.micFadeLiqEnabled?'on':''"><div class="tog-k"></div></div>

                      </label>
                      <label class="tog" @click.prevent="if(!cfgLocked){cfg.micFadeFundEnabled=!cfg.micFadeFundEnabled;persist()}">
                        <div class="tog-t" :class="cfg.micFadeFundEnabled?'on':''"><div class="tog-k"></div></div>

                      </label>
                    </div>
                    <div class="mic-hint" style="margin-top:3px">Structure: bearish% of kline momentum (adverse for longs). Liq: S-Liq% when AF scorecard shows S-Liq historically bad. Funding: dominant rate direction% when scorecard shows it historically bad. Average of contributing signals forms the combined score.</div>

                    <div class="mic-hint" x-text="(()=>{ if(!_micFadeInfo) return 'No fade data yet.'; const {combined,contributions,threshold}=_micFadeInfo; const parts=contributions.map(c=>c.name+':'+c.score.toFixed(0)+'%').join(' '); return 'Combined: '+combined.toFixed(0)+'% ['+parts+'] — trigger @ '+threshold+'%'+(combined>=threshold?' ⚡':''); })()"></div>
                  </div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.micFadeBlockEntries=!cfg.micFadeBlockEntries;persist()}">
                    <div class="tog-t" :class="cfg.micFadeBlockEntries?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Block Entries on Adverse Score</div>
                      <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
                        <div class="mic-hint" style="margin-top:0">Blocks new MIC entries when combined adverse score ≥ threshold. Lifts each scan cycle when conditions clear.</div>
                        <span x-show="cfg.micFadeBlockEntries && _micFadeBlocked" style="flex-shrink:0;font-family:var(--mono);font-size:7.5px;padding:1px 5px;border-radius:2px;background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.45);color:rgba(255,80,80,.9);letter-spacing:.5px">⛔ BLOCKING</span>
                      </div>
                    </div>
                  </label>
                </div>
                <div class="g" style="margin-top:10px">
                  <div class="lbl">Liq Result Max Age <b x-text="(cfg.micLiqResultMaxCycles??2)+' cycles'"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'('+((cfg.micLiqResultMaxCycles??2)*(cfg.scanMins??15))+' min)'"></span></div>
                  <input type="range" min="1" max="10" step="1" x-model.number="cfg.micLiqResultMaxCycles" @change="persist()">
                  <div class="mic-hint">S-Liq / B-Liq slot criteria reject results older than this many scan cycles.</div>
                </div>
                <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)">
                  <label class="tog" @click.prevent="if(!cfgLocked){cfg.micHistScoringEnabled=!cfg.micHistScoringEnabled;persist()}">

                      <div class="tog-l">Historical Scoring</div>
                      <div class="mic-hint">Simulates 1h-candle outcomes for pool matches and writes them to the AF scorecard as historical entries.</div>

              const t = tickerMap[sym];

        async _micRunScan() {

            }

              const kline = this._micGetKlineSync(t.symbol);
              if (!kline) return false;
              const avgHourly = parseFloat(t.volume24h || 0) / 24;

              const sRaw = r.sLiqRaw || 0, bRaw = r.bLiqRaw || 0;

              const sPct = sRaw / total, bPct = bRaw / total;
              let pass = false;
              if (/^sliq/.test(c))  pass = sPct >= 0.70;
              else if (/^bliq/.test(c))  pass = bPct >= 0.70;
              else if (/^msliq/.test(c)) pass = sPct > bPct && bPct >= 0.30;
              else if (/^mbliq/.test(c)) pass = bPct > sPct && sPct >= 0.30;
              if (!pass) return false;

              const step = this.cfg.micIotStep ?? 1;

              const iotM = c.match(/^iot([<>])(\d+)$/);

            }

          const pool = basePool
            .map(t => {

              const fr       = parseFloat(t.fundingRate || 0) * 100;

                if (/^mbliq/.test(c)) { const d = _liqR?.bDepth ?? 0; return `mbliq${d >= 0 ? '+' : ''}${d}`; }
                if (/^sliq/.test(c)) { const d = _liqR?.sDepth ?? 0; return `sliq${d >= 0 ? '+' : ''}${d}`; }

                const _tier   = c => { const m = c.match(/([+-]?\d+)$/); return m ? Math.abs(parseInt(m[1], 10)) : 0; };

          if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) return;

          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.micShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.micShareCapPct ?? 100) / 100)));
            const micCount = (this.positions || []).filter(p => p._mic).length;
            headroom = Math.min(headroom, capSlots - micCount);
            if (headroom < 1) {
              this.log('[MIC] 💡 Share cap reached — no slots available', 'info');
              return;
            }
          }
          const picks = Math.min(Math.max(1, Math.round(this.cfg.micPicks ?? 5)), headroom);

          if (!pool.length) {

            const fundStep = this.cfg.micFundStep ?? 0.25;
            const posFund  = basePool.filter(t => parseFloat(t.fundingRate||0)*100 >= fundStep).length;
            const negFund  = basePool.filter(t => parseFloat(t.fundingRate||0)*100 <= -fundStep).length;
            const up24h    = basePool.filter(t => parseFloat(t.price24hPcnt || 0) > 0).length;
            const mcapHits  = Object.keys(mcapMap).length;
            const klineHits = needsKline ? Object.keys(this._micKlineCache||{}).length : 0;
            const mcapNote  = needsMcap  ? ` mcap:${mcapHits}/${basePool.length}`  : '';
            const klineNote = needsKline ? ` kline:${klineHits}/${basePool.length}` : '';
            const liqNote   = this.cfg.micRequireLiqData ? ` liq-only:${basePool.length}surveilled` : '';
            this.log(`[MIC] 💡 No tickers matched — pool:${basePool.length} fund+:${posFund} fund-:${negFund} +24h:${up24h}${mcapNote}${klineNote}${liqNote}`, 'info');
            return;
          }

          const maxPos     = this.cfg.maxPos ?? 5;
          const slotOpened = new Array(slots.length).fill(0);

          let opened = 0, attempted = 0, blocked = 0;
          this._logBatchBegin?.();
          try {
            for (const { t, criteria, slotIdx } of pool) {
              if (opened >= picks) break;
              if ((this.positions?.length ?? 0) >= maxPos) break;
              attempted++;
              if (await this._micOpen(t, criteria, slotIdx)) { opened++; slotOpened[slotIdx]++; }
              else { blocked++; }
            }
          } finally { this._logBatchEnd?.('[MIC] 💡 Entry roll-up'); }
          const _micBlockNote = blocked ? `, ${blocked} blocked (qty/lev)` : '';
          const openedParts   = slotOpened.map((n, i) => n > 0 ? (n > 1 ? `s${i+1}(${n})` : `s${i+1}`) : null).filter(Boolean);
          const openedNote    = openedParts.length ? ` via ${openedParts.join(' ')}` : '';
          this.log(`[MIC] 💡 ${pool.length} qualified — ${opened} opened${_micBlockNote}${openedNote}`, 'info');
        },

        async _micOpen(t, criteria, slotIdx) {
          const sym   = t.symbol;
          let price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          const _liqR = this._liqResults?.[sym];
          const _annotCrit = (criteria || []).map(c => {
            if (/^sliq/.test(c)) { const d = _liqR?.sDepth ?? 0; return `sliq${d >= 0 ? '+' : ''}${d}`; }
            if (/^bliq/.test(c)) { const d = _liqR?.bDepth ?? 0; return `bliq${d >= 0 ? '+' : ''}${d}`; }
            if (/^iot/.test(c)) { const oi = parseFloat(t.openInterestValue || 0); const tv = parseFloat(t.turnover24h || 0); const step = this.cfg.micIotStep ?? 1; return `iot+${tv > 0 ? Math.floor(oi / tv * 100 / step) : 0}`; }
            if (/^iom/.test(c)) { const oi = parseFloat(t.openInterestValue || 0); const mc = this._micGetMcapSync(t.symbol.replace(/USDT$/i, '').toLowerCase(), parseFloat(t.lastPrice || 0)) || 0; const step = this.cfg.micIomStep ?? 1; return `iom+${mc > 0 ? Math.floor(oi / mc * 100 / step) : 0}`; }
            if (/^fund/.test(c)) { const step = this.cfg.micFundStep ?? 0.25; const fr_ = parseFloat(t.fundingRate||0)*100; const tier = Math.floor(fr_/step); return `fund${tier>=0?'+':''}${tier}`; }
            if (/^vm/.test(c)) { const mc = this._micGetMcapSync(t.symbol.replace(/USDT$/i,'').toLowerCase(), parseFloat(t.lastPrice || 0))||0; const tv = parseFloat(t.turnover24h||0); const step = this.cfg.micVmStep ?? 1; const tier = mc > 0 ? Math.floor(tv/mc*100/step) : 0; return `vm+${tier}`; }
            if (/^(lsa|lba|rasl|rabl)/.test(c)) { const base = c.match(/^(lsa|lba|rasl|rabl)/)[1]; const kl = this._micGetKlineSync(t.symbol); const avg = parseFloat(t.volume24h||0)/24; const step = this.cfg.micSpikeStep ?? 1; let tier = 0; if (kl && avg > 0) { const mult = kl.volume/avg; const isAbove = base==='lsa'||base==='lba'; tier = Math.max(0, Math.floor((isAbove?mult-1:1-mult)*100/step)); } return `${base}+${tier}`; }
            return c;
          });
          const slotKey = [..._annotCrit].sort().join(',');
          if (slotKey && (this.micBlockedSlots || {})[slotKey] === 'blocked') {
            this._micSlotGraylist = this._micSlotGraylist || {};
            this._micSlotGraylist[sym] = Date.now();
            this.log(`[MIC] ⛔ Blocked slot at open — graylisting ${sym} 6h`, 'warn');
            return false;
          }
          try {
            const r  = await fetch(`${this.base}/v5/market/tickers?category=linear&symbol=${sym}`);
            const d  = await r.json();
            const lp = parseFloat(d?.result?.list?.[0]?.lastPrice);
            if (lp > 0) price = lp;
          } catch(e) {}
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const lenBefore = (this.positions || []).length;
          await this.pseudoOpenLong({ symbol: sym, price, change, fundingRate: fr, _mic: true });
          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._mic = true;
            pos._micSlotIdx  = slotIdx ?? 0;
            const _liqR = this._liqResults?.[sym];
            pos._micCriteria = (criteria || []).map(c => {
              if (/^sliq/.test(c)) { const d = _liqR?.sDepth ?? 0; return `sliq${d >= 0 ? '+' : ''}${d}`; }
              if (/^bliq/.test(c)) { const d = _liqR?.bDepth ?? 0; return `bliq${d >= 0 ? '+' : ''}${d}`; }
              if (/^iot/.test(c)) { const oi = parseFloat(t.openInterestValue || 0); const tv = parseFloat(t.turnover24h || 0); const step = this.cfg.micIotStep ?? 1; return `iot+${tv > 0 ? Math.floor(oi / tv * 100 / step) : 0}`; }
              if (/^iom/.test(c)) { const oi = parseFloat(t.openInterestValue || 0); const mc = this._micGetMcapSync(t.symbol.replace(/USDT$/i, '').toLowerCase(), parseFloat(t.lastPrice || 0)) || 0; const step = this.cfg.micIomStep ?? 1; return `iom+${mc > 0 ? Math.floor(oi / mc * 100 / step) : 0}`; }
              if (/^fund/.test(c)) { const step = this.cfg.micFundStep ?? 0.25; const fr_ = parseFloat(t.fundingRate||0)*100; const tier = Math.floor(fr_/step); return `fund${tier>=0?'+':''}${tier}`; }
              if (/^vm/.test(c)) { const mc = this._micGetMcapSync(t.symbol.replace(/USDT$/i,'').toLowerCase(), parseFloat(t.lastPrice || 0))||0; const tv = parseFloat(t.turnover24h||0); const step = this.cfg.micVmStep ?? 1; const tier = mc > 0 ? Math.floor(tv/mc*100/step) : 0; return `vm+${tier}`; }
              if (/^(lsa|lba|rasl|rabl)/.test(c)) { const base = c.match(/^(lsa|lba|rasl|rabl)/)[1]; const kl = this._micGetKlineSync(t.symbol); const avg = parseFloat(t.volume24h||0)/24; const step = this.cfg.micSpikeStep ?? 1; let tier = 0; if (kl && avg > 0) { const mult = kl.volume/avg; const isAbove = base==='lsa'||base==='lba'; tier = Math.max(0, Math.floor((isAbove?mult-1:1-mult)*100/step)); } return `${base}+${tier}`; }
              return c;
            });
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        // Supply cache via CoinPaprika (no API key). ID list cached 24h in localStorage (__cpCoinList).
        // Supply cache: CP coin id → { supply, ts } (24h TTL). Shared with partner via 'cpSupply' key.
        // DexScreener cache: base → { mcap, dsPrice, ts } (CG_TTL). Shared with partner via 'dsMcap' key.
        async _micPrefetchMcaps(bases) {
          if (!this._micCoinIdCache)  this._micCoinIdCache  = {};
          if (!this._micMcapCache)    this._micMcapCache    = {};
          if (!this._micCpIdCache)    this._micCpIdCache    = {};
          if (!this._micSupplyCache)  this._micSupplyCache  = {};
          if (!this._micDsCache)      this._micDsCache      = {};
          const now        = Date.now();
          const CG_TTL     = (this.cfg.bulkTickerCooldownHours ?? 1) * 3_600_000;
          const SUPPLY_TTL = 86_400_000;

          // ── CoinGecko primary ──────────────────────────────────────────
          const cgUnknown = bases.filter(b => this._micCoinIdCache[b] === undefined);
          if (cgUnknown.length) {
            if (!window.__cgCoinList) {
              try {
                const s = JSON.parse(localStorage.getItem('__cgCoinList') || 'null');
                if (s?.list?.length && now - s.ts < 86_400_000) window.__cgCoinList = s.list;
              } catch(e) {}
            }
            if (!window.__cgCoinList) {
              try {
                const r = await fetch('https://api.coingecko.com/api/v3/coins/list?include_platform=false');
                if (r.ok) {
                  window.__cgCoinList = await r.json();
                  try { localStorage.setItem('__cgCoinList', JSON.stringify({ list: window.__cgCoinList, ts: now })); } catch(e) {}
                }
              } catch(e) {}
            }
            if (window.__cgCoinList) {
              for (const base of cgUnknown) {
                const hit = window.__cgCoinList.find(c => c.symbol === base);
                this._micCoinIdCache[base] = hit?.id || '';
              }
            }
          }

          // Seed CG mcap from shared (partner already price-validated)
          const sharedMcap = this._sharedRead('mcap');
          if (sharedMcap?.data) {
            for (const [id, entry] of Object.entries(sharedMcap.data)) {
              if (entry?.mcap && (now - (entry.ts || 0)) < CG_TTL && !this._micMcapCache[id]) {
                this._micMcapCache[id] = { mcap: entry.mcap, cgPrice: entry.cgPrice, ts: entry.ts };
              }
            }
          }

          const cgIds = [...new Set(bases.map(b => this._micCoinIdCache[b]).filter(id => {
            if (!id) return false;
            const c = this._micMcapCache[id];
            return !c || now - c.ts >= CG_TTL;
          }))];

          if (cgIds.length) {
            try {
              const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${cgIds.join(',')}&vs_currencies=usd&include_market_cap=true`);
              if (r.ok) {
                const d = await r.json();
                const _patch = {};
                for (const id of cgIds) {
                  const mcap  = d?.[id]?.usd_market_cap;
                  const price = d?.[id]?.usd;
                  if (mcap) {
                    this._micMcapCache[id] = { mcap, cgPrice: price, ts: now };
                    _patch[id] = { mcap, cgPrice: price, ts: now };
                  }
                }
                if (Object.keys(_patch).length) this._sharedMerge('mcap', _patch);
              }
            } catch(e) {}
          }

          // ── CoinPaprika fallback for CG misses ────────────────────────
          const cgMissBases = bases.filter(b => {
            const id = this._micCoinIdCache[b];
            return !id || !this._micMcapCache[id];
          });

          if (cgMissBases.length) {
            if (!window.__cpCoinList) {
              try {
                const s = JSON.parse(localStorage.getItem('__cpCoinList') || 'null');
                if (s?.list?.length && now - s.ts < SUPPLY_TTL) window.__cpCoinList = s.list;
              } catch(e) {}
            }
            if (!window.__cpCoinList) {
              try {
                const r = await fetch('https://api.coinpaprika.com/v1/coins');
                if (r.ok) {
                  window.__cpCoinList = await r.json();
                  try { localStorage.setItem('__cpCoinList', JSON.stringify({ list: window.__cpCoinList, ts: now })); } catch(e) {}
                }
              } catch(e) {}
            }

            // Seed CP supply from shared
            const sharedSupply = this._sharedRead('cpSupply');
            if (sharedSupply?.data) {
              for (const [id, entry] of Object.entries(sharedSupply.data)) {
                if (entry?.supply && (now - (entry.ts || 0)) < SUPPLY_TTL && !this._micSupplyCache[id]) {
                  this._micSupplyCache[id] = { supply: entry.supply, cpPrice: entry.cpPrice, ts: entry.ts };
                }
              }
            }

            const cpUnknown = cgMissBases.filter(b => this._micCpIdCache[b] === undefined);
            if (cpUnknown.length && window.__cpCoinList) {
              for (const base of cpUnknown) {
                const candidates = window.__cpCoinList.filter(c => c.symbol?.toLowerCase() === base);
                const active = candidates.filter(c => c.is_active);
                const pool = active.length ? active : candidates;
                const hit = pool.reduce((best, c) => (!best || (c.rank > 0 && (best.rank <= 0 || c.rank < best.rank))) ? c : best, null);
                this._micCpIdCache[base] = hit?.id || '';
              }
            }

            const cpStale = [...new Set(cgMissBases.map(b => this._micCpIdCache[b]).filter(id => {
              if (!id) return false;
              const c = this._micSupplyCache[id];
              return !c || now - c.ts >= SUPPLY_TTL;
            }))];

            const _cpPatch = {};
            for (const id of cpStale) {
              try {
                const r = await fetch(`https://api.coinpaprika.com/v1/tickers/${id}?quotes=USD`);
                if (r.ok) {
                  const d = await r.json();
                  const supply  = d?.circulating_supply;
                  const cpPrice = d?.quotes?.USD?.price;
                  if (supply) {
                    this._micSupplyCache[id] = { supply, cpPrice, ts: now };
                    _cpPatch[id] = { supply, cpPrice, ts: now };
                  }
                }
              } catch(e) {}
            }
            if (Object.keys(_cpPatch).length) this._sharedMerge('cpSupply', _cpPatch);
          }

          // ── DexScreener fallback for CG+CP misses ─────────────────────
          const cpMissBases = bases.filter(b => {
            const cgId = this._micCoinIdCache[b];
            if (cgId && this._micMcapCache[cgId]) return false;
            const cpId = this._micCpIdCache[b];
            return !cpId || !this._micSupplyCache[cpId];
          });

          if (cpMissBases.length) {
            const sharedDs = this._sharedRead('dsMcap');
            if (sharedDs?.data) {
              for (const [base, entry] of Object.entries(sharedDs.data)) {
                if ((now - (entry.ts || 0)) < CG_TTL && !this._micDsCache[base]) {
                  this._micDsCache[base] = entry;
                }
              }
            }

            const dsStale = cpMissBases.filter(b => {
              const c = this._micDsCache[b];
              return !c || now - c.ts >= CG_TTL;
            });

            const _dsPatch = {};
            for (const base of dsStale) {
              try {
                const r = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${encodeURIComponent(base)}`);
                if (r.ok) {
                  const d = await r.json();
                  const pairs = (d?.pairs || []).filter(p => p.baseToken?.symbol?.toLowerCase() === base);
                  let entry = { mcap: null, dsPrice: null, ts: now };
                  for (const p of pairs) {
                    const dsPrice = parseFloat(p.priceUsd || 0);
                    const mcap    = p.marketCap;
                    if (mcap && dsPrice) { entry = { mcap, dsPrice, ts: now }; break; }
                  }
                  this._micDsCache[base] = entry;
                  _dsPatch[base] = entry;
                }
              } catch(e) {}
            }
            if (Object.keys(_dsPatch).length) this._sharedMerge('dsMcap', _dsPatch);
          }
        },

        _micGetMcapSync(base, price) {
          const ok = src => !price || !src || Math.abs(src - price) / price <= 0.10;
          const cgId = this._micCoinIdCache?.[base];
          if (cgId) {
            const c = this._micMcapCache?.[cgId];
            if (c && ok(c.cgPrice)) return c.mcap;
          }
          const cpId = this._micCpIdCache?.[base];
          if (cpId) {
            const c = this._micSupplyCache?.[cpId];
            if (c?.supply && price > 0 && ok(c.cpPrice)) return c.supply * price;
          }
          const ds = this._micDsCache?.[base];
          if (ds?.mcap && ok(ds.dsPrice)) return ds.mcap;
          return null;
        },

        _micGenerateCombos(size) {
          const exclude = new Set(this.cfg.micAutoSlotExclude || []);
          const all = ['fund','+24h','-24h','vm','lsa','lba','rasl','rabl','sliq','bliq','msliq','mbliq','iot','iom'].filter(c => !exclude.has(c));
          const result = [];
          const pick = (start, current) => {
            if (current.length === size) { result.push([...current]); return; }
            for (let i = start; i < all.length; i++) {
              current.push(all[i]);
              pick(i + 1, current);
              current.pop();
            }
          };
          pick(0, []);
          return result;
        },

        _micEffectiveSlots() {
          const raw = this.cfg.micAutoSlots
            ? this._micGenerateCombos(this.cfg.micAutoSlotSize ?? 2)
            : (this.cfg.micSlots || []).filter(s => s.length > 0);
          const blocks = this.micBlockedSlots || {};
          const filtered = Object.keys(blocks).length ? raw.filter(s => !blocks[[...s].sort().join(',')]) : raw;
          if (this.cfg.afCollapsedRanks || this.cfg.afCollapsedSort) {
            const ranks = this.micCollapsedSlotRanks || {};
            if (!Object.keys(ranks).length) return filtered;
            const getRank = c => {
              if (/^sliq/.test(c)) return (ranks['sliq+'] ?? 0) + (ranks['sliq-'] ?? 0);
              if (/^bliq/.test(c)) return (ranks['bliq+'] ?? 0) + (ranks['bliq-'] ?? 0);
              if (c === '+fund') return ranks['fund>'] ?? 0;
              if (c === '-fund') return ranks['fund<'] ?? 0;
              return ranks[c.replace(/-?\d+$/, '')] ?? 0;
            };
            return filtered.slice().sort((a, b) => {
              const sa = a.reduce((s, c) => s + getRank(c), 0);
              const sb = b.reduce((s, c) => s + getRank(c), 0);
              return sb - sa;
            });
          }
          const ranks = this.micSlotRanks || {};
          if (!Object.keys(ranks).length) return filtered;
          return filtered.slice().sort((a, b) => {
            const ka = [...a].sort().join(','), kb = [...b].sort().join(',');
            const ra = ranks[ka] ?? 0, rb = ranks[kb] ?? 0;
            return rb - ra;
          });
        },

        _micLogHistMatches(pool) {
          if (!this.cfg.micHistScoringEnabled || !pool.length) return;
          const now = Date.now();
          const toleranceMs = (this.cfg.micHistToleranceMins ?? 20) * 60 * 1000;
          const targetHourStart = Math.ceil((now + toleranceMs) / 3_600_000) * 3_600_000;
          for (const entry of pool) {
            const dedupeKey = `${entry.t.symbol}:${entry.annotKey}:${targetHourStart}`;
            if (!this._micHistPending[dedupeKey]) {
              this._micHistPending[dedupeKey] = {
                symbol: entry.t.symbol,
                annotCrits: entry.annotCrits,
                targetHourStart,
              };
            }
          }
        },

        async _micSequestrFetch() {
          if (!this.cfg.micHistScoringEnabled) return;
          const cap = this.cfg.micKlineScanCap ?? 50;
          const budget = Math.floor(cap * ((this.cfg.micHistSequestrPct ?? 50) / 100));
          if (!budget) { this._micSequestrUsed = 0; return; }
          const now = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const seen = new Set();
          const syms = [];
          for (const entry of Object.values(this._micHistPending)) {
            if (entry.targetHourStart !== lastHourStart) continue;
            if (now < entry.targetHourStart + 3_600_000) continue;
            if (!seen.has(entry.symbol)) { seen.add(entry.symbol); syms.push(entry.symbol); }
            if (syms.length >= budget) break;
          }
          this._micSequestrUsed = syms.length;
          if (!syms.length) return;
          await this._micPrefetchKlines(syms);
        },

        async _micProcessHistMatches() {
          if (!this.cfg.micHistScoringEnabled) return;
          const now = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const MAX_AGE_MS = 24 * 3_600_000;
          const toProcess = [];
          for (const [key, entry] of Object.entries(this._micHistPending)) {
            if (now - entry.targetHourStart > MAX_AGE_MS) { delete this._micHistPending[key]; continue; }
            if (now >= entry.targetHourStart + 3_600_000) toProcess.push({ key, entry });
          }
          if (!toProcess.length) return;

          this._micHistBatchId = (this._micHistBatchId % 99) + 1;
          const _batchId = this._micHistBatchId;
          const _uniqueSyms = [...new Set(toProcess.map(x => x.entry.symbol))];
          this.log(`[MIC] 📊 Hist-score batch #${_batchId} begun — ${toProcess.length} entr${toProcess.length === 1 ? 'y' : 'ies'} across ${_uniqueSyms.length} symbol${_uniqueSyms.length === 1 ? '' : 's'}`, 'info');

          const tpPct  = (this.cfg.binaryTpPct ?? 18) / 100;
          const slPct  = (this.cfg.binarySlPct ?? 18) / 100;
          const lev    = this.cfg.leverage ?? 6;
          const margin = (this.cfg.minNotional ?? 6) / lev;
          let wrote = 0;

          // MIC = LONG: TP when price rises, SL when price falls
          const _resolve = (open, high, low, close) => {
            const hitTp = high >= open * (1 + tpPct / lev);
            const hitSl = low  <= open * (1 - slPct / lev);
            if (hitTp && hitSl) return -margin * slPct;
            if (hitTp)          return  margin * tpPct;
            if (hitSl)          return -margin * slPct;
            return margin * (close - open) / open * lev;
          };

          // Cache-first: resolve entries targeting the most recently completed candle without a fetch
          const toFetch = [];
          for (const x of toProcess) {
            if (x.entry.targetHourStart === lastHourStart) {
              const cached = this._micKlineCache?.[x.entry.symbol];
              if (cached?.candleStart === lastHourStart) {
                this._afScoreWrite?.(x.entry.annotCrits, _resolve(cached.open, cached.high, cached.low, cached.close), true);
                delete this._micHistPending[x.key];
                wrote++;
                continue;
              }
            }
            toFetch.push(x);
          }

          if (toFetch.length) {
            const bySymbol = {};
            for (const x of toFetch) {
              if (!bySymbol[x.entry.symbol]) bySymbol[x.entry.symbol] = [];
              bySymbol[x.entry.symbol].push(x);
            }
            const CONC = 5;
            const symbols = Object.keys(bySymbol);
            for (let i = 0; i < symbols.length; i += CONC) {
              await Promise.all(symbols.slice(i, i + CONC).map(async sym => {
                const entries = bySymbol[sym];
                const oldestTs  = Math.min(...entries.map(x => x.entry.targetHourStart));
                const hoursBack = Math.min(Math.ceil((now - oldestTs) / 3_600_000) + 2, 200);
                try {
                  const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=${hoursBack}`);
                  if (!r.ok) return;
                  const d = await r.json();
                  const list = d?.result?.list;
                  if (!list) return;
                  const candleMap = {};
                  for (const c of list) candleMap[parseInt(c[0])] = c;
                  for (const { key, entry } of entries) {
                    const c = candleMap[entry.targetHourStart];
                    if (!c) { delete this._micHistPending[key]; continue; }
                    this._afScoreWrite?.(entry.annotCrits, _resolve(parseFloat(c[1]), parseFloat(c[2]), parseFloat(c[3]), parseFloat(c[4])), true);
                    delete this._micHistPending[key];
                    wrote++;
                  }
                } catch(_) {}
              }));
            }
          }

          this.log(`[MIC] 📊 Hist-score batch #${_batchId} done — ${wrote} written`, 'info');
          if (wrote) {
            this._afScoreBuild?.();
            if (!this.micHistBatches) this.micHistBatches = [];
            this.micHistBatches.push({ id: _batchId, ts: now, wrote, total: toProcess.length });
            if (this.micHistBatches.length > 25) this.micHistBatches.splice(0, this.micHistBatches.length - 25);
            this.persist?.();
          }
        },

        async _micPrefetchKlines(symbols) {
          const now           = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const scanMs        = (this.cfg.scanMins || 15) * 60 * 1000;
          const sharedKlines  = this._sharedRead('klines_1h_last');
          const seedCache = {};
          if (sharedKlines?.data) {
            for (const sym of symbols) {
              const e = sharedKlines.data[sym];
              if (e && e.candleStart >= lastHourStart && e.ts && (now - e.ts) < scanMs) seedCache[sym] = e;
            }
          }
          this._micKlineCache = { ...seedCache };
          const toFetch = symbols.filter(sym => !seedCache[sym]);
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                this._micKlineCache[sym] = {
                  candleStart: parseInt(candle[0]),
                  open:   parseFloat(candle[1]),
                  high:   parseFloat(candle[2]),
                  low:    parseFloat(candle[3]),
                  close:  parseFloat(candle[4]),
                  volume: parseFloat(candle[5]),
                  ts: now,
                };
              } catch(e) {}
            }));
          }
          const patch = {};
          for (const sym of toFetch) { if (this._micKlineCache[sym]) patch[sym] = this._micKlineCache[sym]; }
          if (Object.keys(patch).length) this._sharedMerge('klines_1h_last', patch);
        },

        _micGetKlineSync(symbol) {
          return this._micKlineCache?.[symbol] || null;
        },

      });
    },
  };
})();
</script>
