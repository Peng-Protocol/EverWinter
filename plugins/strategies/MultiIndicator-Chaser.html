<!--
  Multi-Indicator Strategy Plugin for PseudoChaser
  Slot-based entry filter combining fund rate, 24hr price direction, and vol/mcap signals.

  Each "slot" is an AND-condition over any combination of six criteria:
    +fund  — funding rate ≥ threshold (longs paying shorts)
    -fund  — funding rate ≤ −threshold (shorts paying longs)
    +24h   — ticker's 24hr price change is positive
    -24h   — ticker's 24hr price change is negative
    >10%   — 24hr turnover exceeds 10% of market cap (high participation)
    <10%   — 24hr turnover is below 10% of market cap (low relative participation)

  A ticker qualifies for entry if it satisfies ALL criteria in ANY slot. Slots that contain
  a vol/mcap criterion trigger a CoinGecko market cap lookup via the shared window.__cgCoinList
  cache; fund and 24h criteria run entirely from the host's bulk ticker cache.

  Entry pool fires once per fresh bulk ticker fetch (_lastAllTickersAt) — will not re-scan
  the same cached snapshot twice. TP, SL, and all exit logic use the host's settings.
  Drawdown throttle and gains lock gate all entries.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const DEFAULT_SLOTS = [['-fund','+24h','>10pct'],['+fund','-24h','<10pct']];

  // Per-criterion emoji for position badges. Fund emoji is app-relative:
  // -fund = shorts paying = good carry for longs (🤑), bad for shorts (💸).
  // +fund = longs paying = bad for longs (💸), good for shorts (🤑).
  const CRIT_EMOJI = { '+fund': '💸', '-fund': '🤑', '+24h': '⬆️', '-24h': '⬇️', '>10pct': '🔊', '<10pct': '🔉', 'lsa': '🟥', 'lba': '🟩', 'rasl': '🔴', 'rabl': '🟢' };
  const CRIT_DESC  = { '+fund': '+fund (longs paying)', '-fund': '-fund (shorts paying)', '+24h': '+24h (up on day)', '-24h': '-24h (down on day)', '>10pct': '>10% vol/mcap', '<10pct': '<10% vol/mcap', 'lsa': 'LSA (1h sell spike)', 'lba': 'LBA (1h buy spike)', 'rasl': 'R-ASL (1h low-vol red)', 'rabl': 'R-ABL (1h low-vol green)' };

  window.__BotPlugin = {
    id:        'multiindicator-chaser',
    name:      'Multi-Indicator (Chaser)',
    version:   '1.4.0',
    targetBot: 'pseudochaser',
    after:     ['sunchaser', 'ashfall-chaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan', 'pseudoClosePosition'],

    css: `
      .mic-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .mic-slot { display:inline-flex; flex-direction:column; align-items:center; gap:3px; padding:6px 5px; border-radius:3px; border:1px solid; cursor:pointer; min-width:52px; font-size:9px; font-family:var(--mono); text-align:center; transition:border-color .15s,background .15s; }
      .mic-crit { font-size:8px; padding:1px 4px; border-radius:2px; background:rgba(255,150,80,.12); border:1px solid rgba(255,150,80,.3); color:#ff9650; white-space:nowrap; }
      .mic-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.micEnabled"> + Multi</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Multi-Indicator</span>
              <span x-show="cfg.micEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.micEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.micEnabled=!cfg.micEnabled;persist()}">
              <div class="tog-t" :class="cfg.micEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Multi-Indicator Mode</div>
                <div class="mic-hint">Longs tickers matching any active entry slot; fires once per bulk ticker fetch using host TP/SL settings.</div>
              </div>
            </label>
            <div x-show="cfg.micEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Funding Threshold <b x-text="'±'+(cfg.micFrThreshold??0.1).toFixed(2)+'%'"></b></div>
                <input type="range" min="0.01" max="1" step="0.01" x-model.number="cfg.micFrThreshold" @change="persist()">
                <div class="mic-hint">Applies to +fund and -fund criteria: fires when |FR| ≥ this threshold.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Max Entries / Cycle <b x-text="(cfg.micPicks??3)"></b></div>
                <input type="range" min="1" max="10" step="1" x-model.number="cfg.micPicks" @change="persist()">
                <div class="mic-hint">Split equally across slots (slot order first, then |FR|); earlier slots get the extra pick when picks don't divide evenly.</div>
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.micShareCapEnabled=!(cfg.micShareCapEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.micShareCapEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Position Share Cap</div>
                  <div class="mic-hint">Reserves position headroom for other strategy plugins running alongside this one.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.micShareCapEnabled??true" style="margin-top:8px">
                <div class="lbl">Max Share <b x-text="(cfg.micShareCapPct??50)+'% ('+Math.max(1,Math.floor((cfg.maxPos??5)*((cfg.micShareCapPct??50)/100)))+' of '+(cfg.maxPos??5)+' slots)'"></b></div>
                <input type="range" min="10" max="100" step="5" x-model.number="cfg.micShareCapPct" @change="persist()">
              </div>

              <!-- Cascade -->
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.micCascadeEnabled=!cfg.micCascadeEnabled;persist()}">
                <div class="tog-t" :class="cfg.micCascadeEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Cascade Exit</div>
                  <div class="mic-hint">Bails all MIC positions when their collective unrealized profit reaches a % of total base margin.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.micCascadeEnabled" style="margin-top:8px">
                <div class="lbl">Trigger at <b x-text="(cfg.micCascadePct??25)+'% of base margin'"></b></div>
                <input type="range" min="5" max="200" step="5" x-model.number="cfg.micCascadePct" @change="persist()">
                <div class="mic-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._mic); const margin=pos.reduce((s,p)=>s+(p.margin||0),0); const upnl=pos.reduce((s,p)=>s+(p.upnl||0),0); const avg=pos.length?margin/pos.length:0; const halvMul=cfg.micHalvingEnabled&&pos.length?Math.pow(0.5,(Date.now()-pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()))/((cfg.micHalvingHours??3)*3600000)):1; const thr=avg*((cfg.micCascadePct??25)/100)*halvMul; return pos.length ? 'Active: '+pos.length+' pos · avg margin '+avg.toFixed(4)+' · uPnL '+(upnl>=0?'+':'')+upnl.toFixed(4)+' · trigger @ +'+(thr).toFixed(4)+(halvMul<0.999?' (×'+halvMul.toFixed(2)+')':'')+' USDT' : 'No active MIC positions.'; })()"></div>
              </div>

              <!-- Sacrifice -->
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.micSacrificeEnabled=!cfg.micSacrificeEnabled;persist()}">
                <div class="tog-t" :class="cfg.micSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Sacrifice Exit</div>
                  <div class="mic-hint">Bails all MIC positions when their collective unrealized loss reaches a % of avg base margin.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.micSacrificeEnabled" style="margin-top:8px">
                <div class="lbl">Trigger at <b x-text="'-'+(cfg.micSacrificePct??25)+'% of base margin'"></b></div>
                <input type="range" min="5" max="200" step="5" x-model.number="cfg.micSacrificePct" @change="persist()">
                <div class="mic-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._mic); const margin=pos.reduce((s,p)=>s+(p.margin||0),0); const upnl=pos.reduce((s,p)=>s+(p.upnl||0),0); const avg=pos.length?margin/pos.length:0; const halvMul=cfg.micHalvingEnabled&&pos.length?Math.pow(0.5,(Date.now()-pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()))/((cfg.micHalvingHours??3)*3600000)):1; const thr=avg*((cfg.micSacrificePct??25)/100)*halvMul; return pos.length ? 'Active: '+pos.length+' pos · avg margin '+avg.toFixed(4)+' · uPnL '+(upnl>=0?'+':'')+upnl.toFixed(4)+' · trigger @ -'+(thr).toFixed(4)+(halvMul<0.999?' (×'+halvMul.toFixed(2)+')':'')+' USDT' : 'No active MIC positions.'; })()"></div>
              </div>

              <!-- Halving -->
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.micHalvingEnabled=!cfg.micHalvingEnabled;persist()}">
                <div class="tog-t" :class="cfg.micHalvingEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Target Halving</div>
                  <div class="mic-hint">Halves the cascade/sacrifice trigger threshold once per interval, based on the age of the oldest MIC position — the longer they're held, the easier the collective exit fires.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.micHalvingEnabled" style="margin-top:8px">
                <div class="lbl">Halving Interval <b x-text="(cfg.micHalvingHours??3)+'h'"></b></div>
                <input type="range" min="1" max="24" step="1" x-model.number="cfg.micHalvingHours" @change="persist()">
                <div class="mic-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._mic); if(!pos.length) return 'No active MIC positions.'; const oldest=pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()); const ageMs=Date.now()-oldest; const halvMs=(cfg.micHalvingHours??3)*3600000; const mul=Math.pow(0.5,ageMs/halvMs); const h=Math.floor(ageMs/3600000); const m=Math.floor((ageMs%3600000)/60000); return 'Oldest: '+h+'h '+String(m).padStart(2,'0')+'m old → ×'+mul.toFixed(3)+' on trigger'; })()"></div>
              </div>

              <!-- Entry Slots -->
              <div style="margin-top:12px">
                <div class="lbl" style="margin-bottom:6px">Entry Slots <span style="font-size:9px;font-weight:normal;color:var(--text-lo)">(click slot to edit · click criteria to toggle)</span></div>

                <!-- Criteria picker — visible when a slot is selected -->
                <div x-show="cfg.micActiveSlot !== null && cfg.micActiveSlot !== undefined && cfg.micActiveSlot < (cfg.micSlots||[]).length"
                     style="display:flex;gap:3px;flex-wrap:wrap;align-items:center;margin-bottom:7px;padding:6px 7px;background:rgba(255,255,255,.04);border-radius:3px;border:1px solid rgba(255,255,255,.08)">
                  <span style="font-size:9px;color:var(--text-lo);margin-right:2px">Slot <span x-text="(cfg.micActiveSlot??0)+1"></span>:</span>
                  <template x-for="c in ['+fund','-fund','+24h','-24h','>10pct','<10pct','lsa','lba','rasl','rabl']" :key="c">
                    <button class="mic-opt"
                      @click.prevent="if(!cfgLocked) _micToggle(cfg.micActiveSlot, c)"
                      :style="(cfg.micSlots?.[cfg.micActiveSlot]||[]).includes(c) ? 'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent'"
                      x-text="c.replace('>10pct','>10%').replace('<10pct','<10%').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL')">
                    </button>
                  </template>
                </div>

                <!-- Slot blocks -->
                <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:flex-start">
                  <template x-for="(slot, i) in (cfg.micSlots||[])" :key="i">
                    <div class="mic-slot"
                      @click.prevent="if(!cfgLocked){cfg.micActiveSlot=(cfg.micActiveSlot===i?null:i);persist()}"
                      :style="cfg.micActiveSlot===i ? 'border-color:rgba(255,150,80,.7);background:rgba(255,150,80,.07)' : 'border-color:var(--border);background:transparent'">
                      <div style="font-size:8px;color:var(--text-lo)">Slot <span x-text="i+1"></span></div>
                      <div style="display:flex;flex-direction:column;gap:2px;min-height:14px">
                        <template x-for="c in slot" :key="c">
                          <span class="mic-crit" x-text="c.replace('>10pct','>10%').replace('<10pct','<10%').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL')"></span>
                        </template>
                        <span x-show="!slot.length" style="font-size:8px;color:var(--text-lo);font-style:italic">empty</span>
                      </div>
                      <button x-show="!cfgLocked"
                        @click.stop.prevent="_micDelSlot(i)"
                        style="font-size:8px;color:var(--text-lo);background:none;border:none;cursor:pointer;padding:0;margin-top:2px;line-height:1;opacity:.7">✕</button>
                    </div>
                  </template>
                  <button x-show="!cfgLocked"
                    @click.prevent="_micAddSlot()"
                    style="align-self:center;padding:8px 10px;font-size:12px;background:rgba(255,150,80,.06);border:1px dashed rgba(255,150,80,.3);border-radius:3px;color:#ff9650;cursor:pointer">+</button>
                </div>
                <div class="mic-hint" style="margin-top:5px">Each slot is an AND-gate — a ticker must meet every criterion in the slot. Any matching slot qualifies the ticker for entry. Vol/mcap criteria pull market cap from CoinGecko (1h cache). LSA/LBA/R-ASL/R-ABL fetch the last completed 1h kline per ticker.</div>
                <div class="mic-hint" style="margin-top:5px;line-height:1.8">Badge key: 🤑 -fund · 💸 +fund · ⬆️ +24h · ⬇️ -24h · 🔊 &gt;10% vol/mcap · 🔉 &lt;10% vol/mcap · 🟥 LSA · 🟩 LBA · 🔴 R-ASL · 🟢 R-ABL</div>
                <div class="g" x-show="(cfg.micSlots||[]).some(s=>s.includes('lsa')||s.includes('lba')||s.includes('rasl')||s.includes('rabl'))" style="margin-top:8px;padding:7px;background:rgba(255,255,255,.03);border-radius:3px;border:1px solid rgba(255,255,255,.07)">
                  <div class="lbl">1h Vol Bands <b x-text="'LSA/LBA +'+(cfg.micKlineVolMin??25)+'%→+'+(cfg.micKlineVolMax??50)+'% · R-ASL/R-ABL -'+(cfg.micKlineVolMax??50)+'%→-'+(cfg.micKlineVolMin??25)+'% vs 24h avg'"></b></div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:5px">
                    <div>
                      <div class="mic-hint">Min spike</div>
                      <input type="range" min="5" max="100" step="5" x-model.number="cfg.micKlineVolMin" @change="persist()">
                    </div>
                    <div>
                      <div class="mic-hint">Max spike</div>
                      <input type="range" min="10" max="300" step="10" x-model.number="cfg.micKlineVolMax" @change="persist()">
                    </div>
                  </div>
                  <div class="mic-hint" style="margin-top:4px">LSA/R-ASL require red close · LBA/R-ABL require green close · kline cache refreshes each hour</div>
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">Kline Scan Cap <b x-text="(cfg.micKlineScanCap??50)"></b> tickers</div>
                    <input type="range" min="10" max="500" step="10" x-model.number="cfg.micKlineScanCap" @change="persist()">
                    <div class="mic-hint">Random sample of tickers checked for kline criteria per cycle. Limits kline API calls; higher values are more thorough but slower.</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `,
      'stats-eda': `
        <div x-show="cfg.micEnabled" class="sec">
          <div class="sec-ttl">MIC Graylist</div>
          <div x-data="{
            get syms() {
              const ts = _lastAllTickersAt || 0;
              if (!ts || !_micWaitlist) return [];
              return Object.keys(_micWaitlist).filter(s => _micWaitlist[s] === ts);
            }
          }">
            <div x-show="syms.length === 0" style="font-family:var(--mono);font-size:10px;color:var(--text-lo);padding:2px 0">None — all tickers eligible.</div>
            <div x-show="syms.length > 0">
              <div style="font-family:var(--mono);font-size:9.5px;color:var(--text-lo);margin-bottom:5px">Blocked until next bulk fetch:</div>
              <div style="display:flex;flex-wrap:wrap;gap:3px">
                <template x-for="sym in syms" :key="sym">
                  <span style="padding:1px 6px;border-radius:2px;background:rgba(255,150,80,.07);border:1px solid rgba(255,150,80,.3);color:#ff9650;font-family:var(--mono);font-size:9px" x-text="sym.replace('USDT','')"></span>
                </template>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;

      return Object.assign({}, def, {

        async init() {
          await _origInit.call(this);
          if (this.cfg.micEnabled         === undefined) this.cfg.micEnabled         = false;
          if (this.cfg.micPicks           === undefined) this.cfg.micPicks           = 3;
          if (this.cfg.micFrThreshold     === undefined) this.cfg.micFrThreshold     = 0.1;
          if (this.cfg.micShareCapEnabled === undefined) this.cfg.micShareCapEnabled = true;
          if (this.cfg.micShareCapPct     === undefined) this.cfg.micShareCapPct     = 100;
          if (this.cfg.micActiveSlot      === undefined) this.cfg.micActiveSlot      = null;
          if (!Array.isArray(this.cfg.micSlots) || !this.cfg.micSlots.length)
            this.cfg.micSlots = DEFAULT_SLOTS.map(s => [...s]);
          if (!this._micWaitlist) this._micWaitlist = {};
          if (this.cfg.micCascadeEnabled   === undefined) this.cfg.micCascadeEnabled   = false;
          if (this.cfg.micCascadePct       === undefined) this.cfg.micCascadePct       = 25;
          if (this.cfg.micSacrificeEnabled === undefined) this.cfg.micSacrificeEnabled = false;
          if (this.cfg.micSacrificePct     === undefined) this.cfg.micSacrificePct     = 25;
          if (this.cfg.micKlineVolMin      === undefined) this.cfg.micKlineVolMin      = 25;
          if (this.cfg.micKlineVolMax      === undefined) this.cfg.micKlineVolMax      = 50;
          if (this.cfg.micKlineScanCap     === undefined) this.cfg.micKlineScanCap     = 50;
          if (this.cfg.micHalvingEnabled   === undefined) this.cfg.micHalvingEnabled   = false;
          if (this.cfg.micHalvingHours     === undefined) this.cfg.micHalvingHours     = 3;
          this.registerRoleBadge?.(item => {
            if (!item || !item._mic) return null;
            const crits  = item._micCriteria || [];
            const emoji  = crits.map(c => CRIT_EMOJI[c] || c).join('');
            const title  = crits.length ? 'Multi: ' + crits.map(c => CRIT_DESC[c] || c).join(' + ') : 'Multi-Indicator';
            return `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(255,150,80,.45);color:#ff9650;background:rgba(255,150,80,.10)" title="${title}">${emoji || 'Multi'}</span>`;
          });
          this.log(`[MIC] Multi-Indicator (Chaser) v1.4.0 loaded — ${this.cfg.micEnabled ? 'enabled' : 'disabled'} | ${(this.cfg.micSlots||[]).length} slots | ${this.cfg.micPicks}/cycle`, 'info');
          this.renderTradeFeed?.();
          if (this._micExitTimer) clearInterval(this._micExitTimer);
          this._micExitTimer = setInterval(() => { this._micCheckCascade(); this._micCheckSacrifice(); }, 5000);
        },

        _micToggle(i, c) {
          const slots = (this.cfg.micSlots || []).map(s => [...s]);
          if (!slots[i]) return;
          const idx = slots[i].indexOf(c);
          if (idx === -1) slots[i].push(c); else slots[i].splice(idx, 1);
          this.cfg.micSlots = slots;
          this.persist?.();
        },

        _micDelSlot(i) {
          const slots = (this.cfg.micSlots || []).map(s => [...s]);
          slots.splice(i, 1);
          this.cfg.micSlots = slots;
          if (this.cfg.micActiveSlot !== null) {
            if (slots.length === 0) this.cfg.micActiveSlot = null;
            else if (this.cfg.micActiveSlot >= slots.length) this.cfg.micActiveSlot = slots.length - 1;
          }
          this.persist?.();
        },

        _micAddSlot() {
          const slots = (this.cfg.micSlots || []).map(s => [...s]);
          slots.push([]);
          this.cfg.micSlots = slots;
          this.cfg.micActiveSlot = slots.length - 1;
          this.persist?.();
        },

        _micHalvingMultiplier() {
          if (!this.cfg.micHalvingEnabled) return 1;
          const pos = (this.positions || []).filter(p => p._mic);
          if (!pos.length) return 1;
          const oldest = pos.reduce((m, p) => Math.min(m, p.openedAt || Date.now()), Date.now());
          return Math.pow(0.5, (Date.now() - oldest) / ((this.cfg.micHalvingHours ?? 3) * 3600000));
        },

        async _micCheckCascade() {
          if (!this.cfg.micCascadeEnabled) return;
          const micPositions = (this.positions || []).filter(p => p._mic);
          if (!micPositions.length) return;
          const totalMargin = micPositions.reduce((s, p) => s + (p.margin || 0), 0);
          const totalUPnL   = micPositions.reduce((s, p) => s + (p.upnl   || 0), 0);
          const avgMargin   = totalMargin / micPositions.length;
          const halvMul     = this._micHalvingMultiplier();
          const threshold   = avgMargin * ((this.cfg.micCascadePct ?? 25) / 100) * halvMul;
          if (totalUPnL >= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            this.log(`[MIC] 🌊 Cascade triggered — collective uPnL +${totalUPnL.toFixed(4)} ≥ ${threshold.toFixed(4)} USDT (${this.cfg.micCascadePct ?? 25}%${halvNote} of ${avgMargin.toFixed(4)} avg margin × ${micPositions.length} pos) — bailing ${micPositions.length} position(s)`, 'info');
            this._logBatchBegin?.();
            try {
              for (const pos of micPositions) {
                await this.pseudoClosePosition(pos, 'cascade');
              }
            } finally { this._logBatchEnd?.('[MIC] 🌊 Cascade roll-up'); }
          }
        },

        async _micCheckSacrifice() {
          if (!this.cfg.micSacrificeEnabled) return;
          const micPositions = (this.positions || []).filter(p => p._mic);
          if (!micPositions.length) return;
          const totalMargin = micPositions.reduce((s, p) => s + (p.margin || 0), 0);
          const totalUPnL   = micPositions.reduce((s, p) => s + (p.upnl   || 0), 0);
          const avgMargin   = totalMargin / micPositions.length;
          const halvMul     = this._micHalvingMultiplier();
          const threshold   = -(avgMargin * ((this.cfg.micSacrificePct ?? 25) / 100) * halvMul);
          if (totalUPnL <= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            this.log(`[MIC] 🩸 Sacrifice triggered — collective uPnL ${totalUPnL.toFixed(4)} ≤ ${threshold.toFixed(4)} USDT (${this.cfg.micSacrificePct ?? 25}%${halvNote} of ${avgMargin.toFixed(4)} avg margin × ${micPositions.length} pos) — bailing ${micPositions.length} position(s)`, 'info');
            this._logBatchBegin?.();
            try {
              for (const pos of micPositions) {
                await this.pseudoClosePosition(pos, 'sacrifice');
              }
            } finally { this._logBatchEnd?.('[MIC] 🩸 Sacrifice roll-up'); }
          }
        },

        async runScan() {
          await this._micCheckCascade();
          await this._micCheckSacrifice();
          const tsBefore = this._lastAllTickersAt || 0;
          await _origScan.call(this);
          // If _origScan returned without fetching fresh tickers (halt/lock/cache-hit after a
          // halt cleared), _lastAllTickersAt is unchanged. Reset _micLastActedAt so that the
          // next genuine fresh fetch is not silently skipped by the dedup check.
          if ((this._lastAllTickersAt || 0) === tsBefore && tsBefore === (this._micLastActedAt || 0)) {
            this._micLastActedAt = 0;
          }
          await this._micRunScan();
        },

        async _micRunScan() {
          if (!this.cfg.micEnabled) return;
          if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) {
            this.log(`[MIC] 💡 Skipped — ${this._isGainsLocked?.() ? 'gains lock' : 'drawdown halt'} active`, 'info');
            return;
          }
          if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) return;

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;

          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._micLastActedAt) return;

          const slots = (this.cfg.micSlots || []).filter(s => s.length > 0);
          if (!slots.length) {
            this._micLastActedAt = freshAt;
            this.log('[MIC] 💡 No active slots — skipping', 'info');
            return;
          }

          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.micShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.micShareCapPct ?? 50) / 100)));
            const micCount = (this.positions || []).filter(p => p._mic).length;
            headroom = Math.min(headroom, capSlots - micCount);
            if (headroom < 1) {
              this.log('[MIC] 💡 Share cap reached — no slots available', 'info');
              this._micLastActedAt = freshAt;
              return;
            }
          }
          const picks = Math.min(Math.max(1, Math.round(this.cfg.micPicks ?? 3)), headroom);
          const frThreshold = this.cfg.micFrThreshold ?? 0.1;
          const activeSyms  = new Set((this.positions || []).map(p => p.symbol));

          const needsMcap  = slots.some(s => s.includes('>10pct') || s.includes('<10pct'));
          const needsKline = slots.some(s => s.includes('lsa') || s.includes('lba') || s.includes('rasl') || s.includes('rabl'));

          const micWaitlist = this._micWaitlist || {};
          const basePool = allTickers.filter(t =>
            t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
            && parseFloat(t.lastPrice || 0) >= 0.001
            && !activeSyms.has(t.symbol)
            && !(this._isSymbolBanned?.(t.symbol))
            && !(freshAt > 0 && micWaitlist[t.symbol] === freshAt)
          );

          // Resolve market caps for vol/mcap criteria if any slot requires them.
          const mcapMap = {};
          if (needsMcap) {
            const bases = basePool.map(t => t.symbol.replace(/USDT$/i, '').toLowerCase());
            await this._micPrefetchMcaps(bases);
            for (const t of basePool) {
              const mcap = this._micGetMcapSync(t.symbol.replace(/USDT$/i, '').toLowerCase());
              if (mcap) mcapMap[t.symbol] = mcap;
            }
          }

          if (needsKline) {
            const cap = this.cfg.micKlineScanCap ?? 50;
            let klineSyms = basePool.map(t => t.symbol);
            if (klineSyms.length > cap) {
              for (let i = klineSyms.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [klineSyms[i], klineSyms[j]] = [klineSyms[j], klineSyms[i]];
              }
              klineSyms = klineSyms.slice(0, cap);
            }
            await this._micPrefetchKlines(klineSyms);
          }

          // Build pool: for each ticker find the first matching slot and record it.
          // The matched slot's criteria are stamped on the position for dynamic badge rendering.
          const klineVolMin = this.cfg.micKlineVolMin ?? 25;
          const klineVolMax = this.cfg.micKlineVolMax ?? 50;
          const checkCrit = (c, fr, is24hUp, ratio, t) => {
            if (c === '+fund')  return fr >= frThreshold;
            if (c === '-fund')  return fr <= -frThreshold;
            if (c === '+24h')   return is24hUp;
            if (c === '-24h')   return !is24hUp;
            if (c === '>10pct') return ratio !== null && ratio > 0.10;
            if (c === '<10pct') return ratio !== null && ratio < 0.10;
            if (c === 'lsa' || c === 'lba' || c === 'rasl' || c === 'rabl') {
              const kline = this._micGetKlineSync(t.symbol);
              if (!kline) return false;
              const avgHourly = parseFloat(t.volume24h || 0) / 24;
              if (avgHourly <= 0) return false;
              const mult = kline.volume / avgHourly;
              let inBand;
              if (c === 'lsa' || c === 'lba') {
                inBand = mult >= 1 + klineVolMin / 100 && mult <= 1 + klineVolMax / 100;
              } else {
                inBand = mult >= 1 - klineVolMax / 100 && mult <= 1 - klineVolMin / 100;
              }
              if (!inBand) return false;
              return (c === 'lsa' || c === 'rasl') ? kline.close < kline.open : kline.close > kline.open;
            }
            return false;
          };

          const pool = basePool
            .map(t => {
              const fr       = parseFloat(t.fundingRate || 0) * 100;
              const is24hUp  = parseFloat(t.price24hPcnt || 0) > 0;
              const mcap     = mcapMap[t.symbol];
              const ratio    = mcap ? parseFloat(t.turnover24h || 0) / mcap : null;
              const slotIdx  = slots.findIndex(s => s.every(c => checkCrit(c, fr, is24hUp, ratio, t)));
              return slotIdx !== -1 ? { t, criteria: slots[slotIdx], slotIdx } : null;
            })
            .filter(Boolean)
            .sort((a, b) => a.slotIdx - b.slotIdx || Math.abs(parseFloat(b.t.fundingRate || 0)) - Math.abs(parseFloat(a.t.fundingRate || 0)));

          this._micLastActedAt = freshAt;

          if (!pool.length) {
            const slotDesc = slots.map(s => `[${s.join(',')}]`).join(' ');
            const frThresh = frThreshold;
            const posFund  = basePool.filter(t => parseFloat(t.fundingRate || 0) * 100 >= frThresh).length;
            const negFund  = basePool.filter(t => parseFloat(t.fundingRate || 0) * 100 <= -frThresh).length;
            const up24h    = basePool.filter(t => parseFloat(t.price24hPcnt || 0) > 0).length;
            const mcapHits  = Object.keys(mcapMap).length;
            const klineHits = needsKline ? Object.keys(this._micKlineCache||{}).length : 0;
            const mcapNote  = needsMcap  ? ` mcap:${mcapHits}/${basePool.length}`  : '';
            const klineNote = needsKline ? ` kline:${klineHits}/${basePool.length}` : '';
            this.log(`[MIC] 💡 No tickers matched slots ${slotDesc} — pool:${basePool.length} +fund:${posFund} -fund:${negFund} +24h:${up24h}${mcapNote}${klineNote}`, 'info');
            return;
          }

          // Quota per slot = floor(maxPos / slotCount), minimum 1; later slots lose the remainder.
          // Accounts for already-open positions per slot so deferred capacity carries across cycles.
          const maxPos     = this.cfg.maxPos ?? 5;
          const openPerSlot = new Array(slots.length).fill(0);
          for (const p of (this.positions || []).filter(p => p._mic)) {
            const si = p._micSlotIdx ?? 0;
            if (si < slots.length) openPerSlot[si]++;
          }
          const baseQuota  = Math.max(1, Math.floor(maxPos / slots.length));
          const slotQuota  = slots.map((_, i) => Math.max(0, baseQuota - openPerSlot[i]));
          const slotOpened = new Array(slots.length).fill(0);

          let opened = 0, attempted = 0, blocked = 0, slotSkipped = 0;
          this._logBatchBegin?.();
          try {
            for (const { t, criteria, slotIdx } of pool) {
              if (opened >= picks) break;
              if ((this.positions?.length ?? 0) >= maxPos) break;
              if (slotQuota[slotIdx] <= 0) { slotSkipped++; continue; }
              if (slotOpened[slotIdx] >= slotQuota[slotIdx]) { slotSkipped++; continue; }
              attempted++;
              if (await this._micOpen(t, criteria, slotIdx)) { opened++; slotOpened[slotIdx]++; }
              else { blocked++; }
            }
          } finally { this._logBatchEnd?.('[MIC] 💡 Entry roll-up'); }
          const _micBlockNote = blocked     ? `, ${blocked} blocked (qty/lev)`  : '';
          const _micSkipNote  = slotSkipped ? `, ${slotSkipped} slot-skipped`   : '';
          const quotaParts    = slotQuota.map((q, i) => (slotOpened[i] > 0 || q > 0) ? `s${i+1}:${slotOpened[i]}/${q}` : null).filter(Boolean);
          const quotaNote     = quotaParts.length ? ` (quota: ${quotaParts.join(' ')})` : '';
          this.log(`[MIC] 💡 ${pool.length} qualified — ${opened} opened${_micBlockNote}${_micSkipNote}${quotaNote}`, 'info');
        },

        async _micOpen(t, criteria, slotIdx) {
          const sym   = t.symbol;
          const price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const lenBefore = (this.positions || []).length;
          await this.pseudoOpenLong({ symbol: sym, price, change, fundingRate: fr, _mic: true });
          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._mic = true;
            pos._micSlotIdx  = slotIdx ?? 0;
            pos._micCriteria = criteria || [];
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        // Two-level CoinGecko cache shared via window.__cgCoinList (24h TTL, localStorage).
        // ID cache: base symbol → CoinGecko coin id (session-scoped, permanent).
        // Mcap cache: coin id → { mcap, ts } (1h TTL).
        async _micPrefetchMcaps(bases) {
          if (!this._micCoinIdCache) this._micCoinIdCache = {};
          if (!this._micMcapCache)   this._micMcapCache   = {};
          const now     = Date.now();
          const unknown = bases.filter(b => this._micCoinIdCache[b] === undefined);
          if (unknown.length) {
            if (!window.__cgCoinList) {
              try {
                const s = JSON.parse(localStorage.getItem('__cgCoinList') || 'null');
                if (s?.list?.length && Date.now() - s.ts < 86_400_000) window.__cgCoinList = s.list;
              } catch(e) {}
            }
            if (!window.__cgCoinList) {
              try {
                const r = await fetch('https://api.coingecko.com/api/v3/coins/list?include_platform=false');
                if (r.ok) {
                  window.__cgCoinList = await r.json();
                  try { localStorage.setItem('__cgCoinList', JSON.stringify({ list: window.__cgCoinList, ts: Date.now() })); } catch(e) {}
                }
              } catch(e) {}
            }
            if (window.__cgCoinList) {
              for (const base of unknown) {
                const hit = window.__cgCoinList.find(c => c.symbol === base);
                this._micCoinIdCache[base] = hit?.id || '';
              }
            }
          }
          const ids = [...new Set(
            bases.map(b => this._micCoinIdCache[b]).filter(id => {
              if (!id) return false;
              const c = this._micMcapCache[id];
              return !c || now - c.ts >= (this.cfg.bulkTickerCooldownHours ?? 1) * 3_600_000;
            })
          )];
          if (!ids.length) return;
          try {
            const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=usd&include_market_cap=true`);
            if (r.ok) {
              const d = await r.json();
              for (const id of ids) {
                const mcap = d?.[id]?.usd_market_cap;
                if (mcap) this._micMcapCache[id] = { mcap, ts: now };
              }
            }
          } catch(e) {}
        },

        _micGetMcapSync(base) {
          const id = this._micCoinIdCache?.[base];
          if (!id) return null;
          const c = this._micMcapCache?.[id];
          return (c && Date.now() - c.ts < (this.cfg.bulkTickerCooldownHours ?? 1) * 3_600_000) ? c.mcap : null;
        },

        async _micPrefetchKlines(symbols) {
          if (!this._micKlineCache) this._micKlineCache = {};
          const now = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const toFetch = symbols.filter(sym => {
            const c = this._micKlineCache[sym];
            return !c || c.candleStart !== lastHourStart;
          });
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                this._micKlineCache[sym] = {
                  candleStart: parseInt(candle[0]),
                  open:  parseFloat(candle[1]),
                  close: parseFloat(candle[4]),
                  volume: parseFloat(candle[5]),
                };
              } catch(e) {}
            }));
          }
        },

        _micGetKlineSync(symbol) {
          return this._micKlineCache?.[symbol] || null;
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const isMic    = pos._mic === true;
          const criteria = pos._micCriteria;
          const prevLen  = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if (isMic && (this.closedTrades?.length ?? 0) > prevLen) {
            this.closedTrades[0]._mic = true;
            if (criteria) this.closedTrades[0]._micCriteria = criteria;
            // Waitlist: block reopening until the next bulk ticker fetch
            this._micWaitlist = this._micWaitlist || {};
            this._micWaitlist[pos.symbol] = this._lastAllTickersAt || 0;
            this.persist?.();
            this.renderTradeFeed?.();
          }
        },
      });
    },
  };
})();
</script>
