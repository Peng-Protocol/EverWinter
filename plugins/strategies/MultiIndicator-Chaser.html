<!--
  Multi-Indicator Strategy Plugin for PseudoChaser
  Slot-based entry filter built around liquidation presence as the primary, mandatory signal,
  with fund rate, PEC, population-relative volume/OI, candle, and order-flow criteria layered on as secondary
  confirmation. Liquidation Presence (micLiqPresenceModes: any combination of '1' / '0' /
  'past1') selects which of three paths a slot can run under:
    '1'     (Live)   — every slot anchors on exactly one of sliq/bliq/msliq/mbliq, a real
      criterion evaluated the instant a liquidation message crosses the depth threshold
      mid-cycle (see _micOnLiqMessage, registered via Ashfall's registerLiqMessageHook).
      These never resolve from a closed cycle — the data is too temporal to be meaningful an
      hour later — so they no longer appear in the scan-time criteria checker at all.
    '0'     (0-Liq)  — every slot anchors on the 0liq criterion, a real criterion confirmable
      only once a ticker's surveillance cycle closes clean, checked against the full retained
      window of Ashfall's closed liq cycles (_liqCycleHistory, up to micLiqLookbackCycles of
      them) — a ticker only reads 0-Liq if every cycle it appeared in within that window came
      back clean. See _micLiqZeroAcrossWindow.
    'past1' (Past-1) — NOT a criterion. A Past-1 slot has no liquidation criterion in it at all;
      it's built entirely from secondary criteria. Every closed cycle sorts each ticker into
      exactly one of three buckets, independent of sell/buy dominance: liq+ (some side's raw
      turnover cleared its own historical average, i.e. would have fired live), 0-liq (no
      liquidation at all this cycle, across the full retained window), or liq- (real liquidation
      happened, but neither side's turnover cleared its average — too weak to have fired live).
      Past-1 slots match liq- tickers. See _micPast1FreshSymbols, sourced from the same
      closed-batch pool (_micPecPool, populated by registerLiqCloseHook) that feeds PEC. The
      ticker-pool restriction *is* the anchor; there's nothing to tag in the slot or the
      scorecard. A manually-built slot with no liquidation criterion is only valid while 'past1'
      is an active mode — otherwise it's the same mistake it always was (see the anchorless-slot
      warning at startup).

  This is why "every slot must have exactly one liquidation criterion" is no longer quite true:
  '1'/'0' slots do; 'past1' slots deliberately don't. See _micSlotLiqAnchor (returns the
  criterion or null) and _micAutoQualify (the null-anchor case is the Past-1 match).

  Slot Blocking (micSlotBlockEnabled) is a per-criterion loss circuit breaker: if a liq-anchor
  type's collapsed scorecard score (own + partner, see micCollapsedSlotRanks) drops
  beyond micSlotBlockPct% of base margin in loss, new entries carrying that type are blocked —
  continuously re-checked, no manual clear needed. Only applies to '1'/'0' slots (sliq/bliq/
  msliq/mbliq/0liq are real, blockable anchors) — Past-1 slots have no anchor to block on, so
  they're only ever blockable via micSlotBlockTags below. micSlotBlockTags extends the same check to the entry's own PEC and
  VSG tags only — fund and the other secondary criteria are too
  generalized to include here, since blocking on them tends to block nearly every entry off one
  bad stretch. Standalone toggle, independent of Liquidation Presence mode.

  Secondary criteria (fund, PEC 6h/12h/24h, V/A, VSG 6h/12h/24h, Regime, IO/A, OCS, OCX) combine with
  the liq anchor via the same AND-gate slot logic as before. On the live path, anything not
  fetched fresh this cycle (PEC/VSG, OC) is fetched synchronously for just the triggering
  symbol before the slot match is judged — see _micOnLiqMessage.

  Auto Slots always includes the liq anchor as one of the combo's criteria; at size 1 every
  generated slot is bare liquidation with no secondary confirmation. The live depth threshold
  used by Auto Slots is one general value (micLiveDepthThreshold); manual slots keep granular
  per-slot/per-type depth via the existing criteria picker.

  Substitution now considers any held position in the book, not just MIC's own, same as
  Liquid-Diver did. The removed path-A guard no longer shields 0-liq positions from
  live substitutions. The swap itself remains score-gated, not a
  blanket "depth cleared is enough" — one liq type scoring better than another still matters.

  Re-entry Block Mode (micReentryBlockMode: 'both' / 'losers') is ported from Liquid-Diver:
  'losers' lets a symbol that just closed in profit re-trigger immediately.

  Entry pool fires once per fresh bulk ticker fetch (_lastAllTickersAt) — will not re-scan
  the same cached snapshot twice. TP, SL, and all exit logic use the host's settings.
  Drawdown throttle and gains lock gate all entries (including the live liq path).

  Load via Plugin Manager in PseudoChaser's config panel. Requires Ashfall (Liq
  Surveillance on) — liquidation is no longer optional data, it's the entry gate itself.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const VERSION       = '1.66.0';
  // Every default slot anchors on a live liq criterion, matching the default Liquidation
  // Presence modes (default ['1'] — live only). Enabling 0/Past-1 won't retroactively populate
  // 0liq-anchored presets; users building 0-Liq slots do so manually.
  // lsa/lba (high-vol confirmation) retired in favor of VSG's vsgot (Over-Traded) — see VSG.md.
  const DEFAULT_SLOTS = [['sliq','fund<-1','vsgot'],['bliq','va>10','vsgot'],['msliq','fund>1','vsgot'],['mbliq','va<10','vsgot'],['sliq','fund>1','vsgot'],['bliq','fund<-1','vsgot'],['sliq','va>10','vsgot'],['bliq','va<10','vsgot']];
  const MIC_HIST_KEY  = '__mic_hist_batches';
  const LIQ_TYPES     = ['sliq', 'bliq', 'msliq', 'mbliq'];
  // Full secondary criteria list — shared by Auto's minimum-gate qualifier, the Exclude-from-
  // Auto picker, and the Blockable Criteria picker, so all three stay in sync by construction.
  const SECONDARY_CRITS = ['fund','pecob','pecos','pecalpha','pecdelta','pecmomup','pecmomdn','va','vsgot','vsgut','vsgalpha','vsgdelta','vsgmomup','vsgmomdn','regimeslo','regimeblo','regimesmid','regimebmid','regimeshi','regimebhi','ioa','ocs','ocx'];
  // Pre-existing "Include Sign Tags" behavior, preserved as the default selection now that the
  // set is configurable — fund is deliberately NOT included by default (see _micIsEntryBlocked),
  // matching the old hardcoded behavior exactly. Opt fund in manually via the picker.
  // va/ioa are blockable by default (unlike the vm/iot/iom they replace, which never were) —
  // population-relative criteria are a much cleaner signal than the old own-ratio ones.
  const DEFAULT_BLOCKABLE_CRITS = ['vsgot','vsgut','vsgalpha','vsgdelta','vsgmomup','vsgmomdn','pecob','pecos','pecalpha','pecdelta','pecmomup','pecmomdn','va','ioa','regimeslo','regimeblo','regimesmid','regimebmid','regimeshi','regimebhi'];

  // Megacaps excluded from the population pool alongside BTC — their size skews OC/IO/Volume/liq
  // averages the same way BTC would. cfg.megacapExclude is seeded from this default below but is
  // a plain array on cfg (no picker UI) — edit it directly in saved config if the list needs to
  // change. Shared key name with Ashfall's own seed so either plugin can init it first.
  const DEFAULT_MEGACAP_EXCLUDE = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','TRXUSDT','LINKUSDT'];

  // Same formula as Ashfall's calcDepth: % deviation of this side's liquidated $ from the
  // average liquidation size recorded across all history. Depth +1 means 1% above average.
  const calcLiveDepth = (raw, avg) => avg > 0 ? Math.trunc(((raw / avg) - 1) * 100) : 0;

  // Per-criterion emoji for position badges. Fund emoji is app-relative:
  // -fund = shorts paying = good carry for longs (🤑), bad for shorts (💸).
  // +fund = longs paying = bad for longs (💸), good for shorts (🤑).
  const CRIT_EMOJI = { 'pecob': '⬆️', 'pecos': '⬇️', 'pecalpha': '⤵️', 'pecdelta': '⤴️', 'pecmomup': '↗️', 'pecmomdn': '↘️', 'vsgot': '⏫', 'vsgut': '⏬', 'vsgalpha': '🔼', 'vsgdelta': '🔽', 'vsgmomup': '⏩', 'vsgmomdn': '⏪', 'fund': '💰', 'va': '🔊', 'vm': '🔊', 'sliq': '🥵', 'bliq': '🥶', 'msliq': '💦', 'mbliq': '🧊', '0liq': '⚫', 'ioa': '🎲', 'iot': '🎲', 'iom': '🧲', 'ocs': '🔭', 'ocx': '📡', 'regimeslo': '🌤️', 'regimeblo': '🌤️', 'regimesmid': '☁️', 'regimebmid': '☁️', 'regimeshi': '🌪️', 'regimebhi': '🌪️' };
  const CRIT_DESC  = { 'fund': 'Fund (tiered funding rate)', 'pecob': 'PEC Overbought (6h, 12h and 24h all above high threshold)', 'pecos': 'PEC Oversold (6h, 12h and 24h all below low threshold)', 'pecalpha': 'PEC Red Mountain (12h more bullish than both 6h and 24h)', 'pecdelta': 'PEC Green Delta (12h more bearish than both 6h and 24h)', 'pecmomup': 'PEC Bullish Momentum (6h > 12h > 24h — trended up all day)', 'pecmomdn': 'PEC Bearish Momentum (6h < 12h < 24h — trended down all day)', 'va': 'V/A (volume vs. population sample-window average)', 'vm': 'V/M (vol/mcap ratio) — retired, replaced by V/A', 'vsgot': 'VSG Over-Traded (6h, 12h and 24h volume-shape all above high threshold)', 'vsgut': 'VSG Under-Traded (6h, 12h and 24h volume-shape all below low threshold)', 'vsgalpha': 'VSG Volume Mountain (12h volume-shape higher than both 6h and 24h)', 'vsgdelta': 'VSG Volume Trough (12h volume-shape lower than both 6h and 24h)', 'vsgmomup': 'VSG Building Momentum (6h > 12h > 24h — volume building all day)', 'vsgmomdn': 'VSG Fading Momentum (6h < 12h < 24h — volume fading all day)', 'lsa': 'LSA (1h sell spike) — retired, replaced by VSG', 'lba': 'LBA (1h buy spike) — retired, replaced by VSG', 'rasl': 'R-ASL (1h low-vol red) — retired, replaced by VSG', 'rabl': 'R-ABL (1h low-vol green) — retired, replaced by VSG', 'sliq': 'S-Liq (Sell-Liquidation: sell side ≥70% dominant)', 'bliq': 'B-Liq (Buy-Liquidation: buy side ≥70% dominant)', 'msliq': 'mS-Liq (Mixed Sell-Liq: sell majority, buy ≥30%)', 'mbliq': 'mB-Liq (Mixed Buy-Liq: buy majority, sell ≥30%)', '0liq': '0-Liq (no liquidation at all this cycle)', 'ioa': 'IO/A (open interest vs. population sample-window average)', 'iot': 'IO/T (OI vs Turnover) — retired, replaced by IO/A', 'iom': 'IO/M (OI vs MCap) — retired, replaced by IO/A', 'ocs': 'OCS (buy/sell skew %)', 'ocx': 'OCX (% faster/slower than the full-window avg order interval)', 'regimeslo': 'Regime S-Lo (population liq skew, sell-dominant, 50-59%)', 'regimeblo': 'Regime B-Lo (population liq skew, buy-dominant, 50-59%)', 'regimesmid': 'Regime S-Mid (population liq skew, sell-dominant, 60-79%)', 'regimebmid': 'Regime B-Mid (population liq skew, buy-dominant, 60-79%)', 'regimeshi': 'Regime S-Hi (population liq skew, sell-dominant, 80%+)', 'regimebhi': 'Regime B-Hi (population liq skew, buy-dominant, 80%+)' };
  // PEC (Price Effect Coefficient): replaces the old raw +24h/-24h ticker-field boolean. For each
  // of 6h/12h/24h, builds a composite candle from cached klines at cfg.micPecGranularity and scores
  // (Close-Open)/(High-Low) onto a 0-100 scale (50=neutral). Six criteria, all derived from the
  // resulting I_6h/I_12h/I_24h triple:
  //   pecob    — Confluent Overbought: I_6h, I_12h, and I_24h all above micPecThresholdHigh.
  //   pecos    — Confluent Oversold: I_6h, I_12h, and I_24h all below micPecThresholdLow.
  //   pecalpha — Red Mountain: I_12h higher than both I_6h and I_24h (a peak on the middle timeframe).
  //   pecdelta — Green Delta: I_12h lower than both I_6h and I_24h (a trough on the middle timeframe).
  //   pecmomup — Bullish Momentum: I_6h > I_12h > I_24h, a pure upward tilt across the whole day.
  //   pecmomdn — Bearish Momentum: I_6h < I_12h < I_24h, a pure downward tilt across the whole day.
  // (The Bullish/Bearish Reversion pair that used to sit here was retired as redundant with
  // Red Mountain/Green Delta.) pecalpha/pecdelta/pecmomup/pecmomdn only compare the three
  // readings to each other, not to any threshold. Only pecob/pecos gate on
  // High/Low. Every criterion is also tiered with a depth score (micPecDepthStep) reflecting how
  // strongly it's expressed — a clean distance-past-threshold measure for pecob/pecos/momentum,
  // a looser divergence-intensity proxy for Reversion/Mountain/Delta. Only ever
  // computed for tickers whose liq surveillance batch just closed (see _micOnLiqClose /
  // _micPecPool) and are still within micPecFreshCycles — the same
  // universe every liq anchor already requires, so this adds no new fetch scope, just reuses it.
  // BOC/SOC (raw buy/sell fill counts requiring 24h surveillance runway) were considered but scrapped:
  // a 24h watch period only tells you counts at the end of the period, not a meaningful trend, and
  // hardware restarts every ~6h make a reliable 24h runway impractical on this device.

  // VSG (Volume Shape Graph): replaces the old LSA/LBA/R-ASL/R-ABL 1h-vs-24h-avg spike family
  // (see VSG.md). PEC's math applied to volume instead of price — same 6h/12h/24h composite
  // windows, riding PEC's own cache (each cached sub-candle now also carries its volume), so this
  // adds no new fetch path at all; it retires one (_micPrefetchKlines' criteria-scan call site).
  //   vsgot    — Over-Traded: VI_6h, VI_12h, and VI_24h all above micVsgThresholdHigh.
  //   vsgut    — Under-Traded: VI_6h, VI_12h, and VI_24h all below micVsgThresholdLow.
  //   vsgalpha — Volume Mountain: VI_12h higher than both VI_6h and VI_24h (a burst that crested).
  //   vsgdelta — Volume Trough: VI_12h lower than both VI_6h and VI_24h (a lull, picking back up).
  //   vsgmomup — Building Momentum: VI_6h > VI_12h > VI_24h, loudest right now.
  //   vsgmomdn — Fading Momentum: VI_6h < VI_12h < VI_24h, quietest right now.
  // Unlike LSA/LBA/R-ASL/R-ABL, VSG makes no directional claim at all — candle color was always a
  // proxy for order flow, not a measurement of it; sliq/bliq/ocs already measure that directly.
  // Depth-tiered via micVsgDepthStep exactly like PEC. Same liq-fresh scope as PEC (deliberate —
  // see VSG.md's Open Question, decided in favor of the narrow pool).

  const critEmoji = c => {
    if (/^fund/.test(c)) { const s = c.slice(4); const num = parseFloat(s.replace(/^[<>]/,'')); return (num < 0 ? '🤑' : '💸') + s; }
    if (/^va/.test(c)) return '🔊' + c.slice(2);
    if (/^vm/.test(c)) return '🔊' + c.slice(2);
    // Retired (see VSG.md) — kept resolvable so old scorecard/history entries still render.
    if (/^lsa/.test(c)) return '🟥' + c.slice(3);
    if (/^lba/.test(c)) return '🟩' + c.slice(3);
    if (/^rasl/.test(c)) return '🔴' + c.slice(4);
    if (/^rabl/.test(c)) return '🟢' + c.slice(4);
    if (/^msliq/.test(c)) return '💦' + c.slice(5);
    if (/^mbliq/.test(c)) return '🧊' + c.slice(5);
    if (/^sliq/.test(c)) return '🥵' + c.slice(4);
    if (/^bliq/.test(c)) return '🥶' + c.slice(4);
    if (/^ioa/.test(c)) return '🎲' + c.slice(3);
    if (/^iot/.test(c)) return '🎲' + c.slice(3);
    if (/^iom/.test(c)) return '🧲' + c.slice(3);
    if (/^ocs/.test(c)) return '🔭' + c.slice(3);
    if (/^ocx/.test(c)) return '📡' + c.slice(3);
    if (/^pec/.test(c)) { const m = c.match(/^(pec[a-z]+)/); return (CRIT_EMOJI[m ? m[1] : c] || '') + c.replace(/^pec[a-z]+/, ''); }
    if (/^vsg/.test(c)) { const m = c.match(/^(vsg[a-z]+)/); return (CRIT_EMOJI[m ? m[1] : c] || '') + c.replace(/^vsg[a-z]+/, ''); }
    if (/^regime/.test(c)) { const m = c.match(/^(regime[a-z]+)/); return (CRIT_EMOJI[m ? m[1] : c] || '') + c.replace(/^regime[a-z]+/, ''); }
    return CRIT_EMOJI[c] || '';
  };
  const critLabel = c => {
    const fM = c.match(/^fund([<>])(-?\d+)$/);
    if (fM) return 'Fund ' + fM[1] + fM[2];
    const fA = c.match(/^fund([+-]-?\d*)$/);
    if (fA) return 'Fund t' + fA[1];
    if (c === 'fund') return 'Fund';
    const aM = c.match(/^va([<>])(-?\d+)$/);
    if (aM) return 'V/A ' + aM[1] + aM[2];
    const aA = c.match(/^va([+-]-?\d*)$/);
    if (aA) return 'V/A t' + aA[1];
    if (c === 'va') return 'V/A';
    const vM = c.match(/^vm([<>])(\d+)$/);
    if (vM) return 'V/M ' + vM[1] + vM[2];
    const vA = c.match(/^vm([+-]\d+)$/);
    if (vA) return 'V/M t' + vA[1];
    if (c === 'vm') return 'V/M';
    // Retired (see VSG.md) — kept resolvable so old scorecard/history entries and any
    // not-yet-migrated saved slots still render instead of falling through to the raw tag.
    const kM = c.match(/^(lsa|lba|rasl|rabl)([<>])(\d+)$/);
    if (kM) return kM[1].toUpperCase().replace('RASL','R-ASL').replace('RABL','R-ABL') + ' ' + kM[2] + kM[3];
    const kA = c.match(/^(lsa|lba|rasl|rabl)([+-]\d+)$/);
    if (kA) return kA[1].toUpperCase().replace('RASL','R-ASL').replace('RABL','R-ABL') + ' t' + kA[2];
    if (c === 'lsa') return 'LSA'; if (c === 'lba') return 'LBA';
    if (c === 'rasl') return 'R-ASL'; if (c === 'rabl') return 'R-ABL';
    const m = c.match(/^(m?sliq|m?bliq)([<>])([+-]?\d+)$/);
    if (m) return (m[1] === 'sliq' ? 'S-Liq' : m[1] === 'bliq' ? 'B-Liq' : m[1] === 'msliq' ? 'mS-Liq' : 'mB-Liq') + ' ' + m[2] + m[3];
    const n = c.match(/^(m?sliq|m?bliq)([+-]\d+)$/);
    if (n) return (n[1] === 'sliq' ? 'S-Liq' : n[1] === 'bliq' ? 'B-Liq' : n[1] === 'msliq' ? 'mS-Liq' : 'mB-Liq') + ' ' + n[2];
    if (c === 'sliq') return 'S-Liq'; if (c === 'bliq') return 'B-Liq';
    if (c === 'msliq') return 'mS-Liq'; if (c === 'mbliq') return 'mB-Liq';
    if (c === '0liq') return '0-Liq';
    const ioaM = c.match(/^ioa([<>])(-?\d+)$/);
    if (ioaM) return 'IO/A ' + ioaM[1] + ioaM[2];
    const ioaA = c.match(/^ioa([+-]-?\d*)$/);
    if (ioaA) return 'IO/A t' + ioaA[1];
    if (c === 'ioa') return 'IO/A';
    const o = c.match(/^(iot|iom)([<>])(\d+)$/);
    if (o) return (o[1] === 'iot' ? 'IO/T' : 'IO/M') + ' ' + o[2] + o[3];
    const p = c.match(/^(iot|iom)([+-]\d+)$/);
    if (p) return (p[1] === 'iot' ? 'IO/T' : 'IO/M') + ' t' + p[2];
    if (c === 'iot') return 'IO/T'; if (c === 'iom') return 'IO/M';
    const oc = c.match(/^(ocs|ocx)([<>])(-?\d+)$/);
    if (oc) return oc[1].toUpperCase() + ' ' + oc[2] + oc[3];
    const ocT = c.match(/^(ocs|ocx)([+-]\d+)$/);
    if (ocT) return ocT[1].toUpperCase() + ' t' + ocT[2];
    if (c === 'ocs') return 'OCS'; if (c === 'ocx') return 'OCX';
    const PEC_LABEL = { pecob: 'PEC OB', pecos: 'PEC OS', pecalpha: 'PEC Red Mtn', pecdelta: 'PEC Grn Delta', pecmomup: 'PEC Bull-Mom', pecmomdn: 'PEC Bear-Mom' };
    const pM = c.match(/^(pec[a-z]+)([+-]\d+)$/);
    if (pM && PEC_LABEL[pM[1]]) return PEC_LABEL[pM[1]] + ' t' + pM[2];
    if (PEC_LABEL[c]) return PEC_LABEL[c];
    const VSG_LABEL = { vsgot: 'VSG Over-Traded', vsgut: 'VSG Under-Traded', vsgalpha: 'VSG Mountain', vsgdelta: 'VSG Trough', vsgmomup: 'VSG Mom-Up', vsgmomdn: 'VSG Mom-Dn' };
    const vsgM = c.match(/^(vsg[a-z]+)([+-]\d+)$/);
    if (vsgM && VSG_LABEL[vsgM[1]]) return VSG_LABEL[vsgM[1]] + ' t' + vsgM[2];
    if (VSG_LABEL[c]) return VSG_LABEL[c];
    const REGIME_LABEL = { regimeslo: 'Rg S-Lo', regimeblo: 'Rg B-Lo', regimesmid: 'Rg S-Mid', regimebmid: 'Rg B-Mid', regimeshi: 'Rg S-Hi', regimebhi: 'Rg B-Hi' };
    const rgM = c.match(/^(regime[a-z]+)([+-]\d+)$/);
    if (rgM && REGIME_LABEL[rgM[1]]) return REGIME_LABEL[rgM[1]] + ' t' + rgM[2];
    if (REGIME_LABEL[c]) return REGIME_LABEL[c];
    return CRIT_DESC[c] || c;
  };

  window.__BotPlugin = {
    id:        'multiindicator-chaser',
    name:      'Multi-Indicator (Chaser)',
    version:   VERSION,
    targetBot: 'pseudochaser',
    after:     ['sunchaser', 'ashfall-chaser'],
    before:    [],
    conflicts: ['liquiddiver-chaser'],
    requires:  ['ashfall-chaser'],
    touches:   ['init', 'runScan', 'pseudoWatchPositions'],

    css: `
      .mic-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .mic-slot { display:inline-flex; flex-direction:column; align-items:center; gap:3px; padding:6px 5px; border-radius:3px; border:1px solid; cursor:pointer; min-width:52px; font-size:9px; font-family:var(--mono); text-align:center; transition:border-color .15s,background .15s; }
      .mic-crit { font-size:8px; padding:1px 4px; border-radius:2px; background:rgba(255,150,80,.12); border:1px solid rgba(255,150,80,.3); color:#ff9650; white-space:nowrap; }
      .mic-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
      .mic-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .mic-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .mic-tab.on { border-color:rgba(255,150,80,.6); color:#ff9650; background:rgba(255,150,80,.08); }
      .mic-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .mic-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.micEnabled"> + Multi</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false, tE: false, tX: false, tFe: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">

          if (this.cfg.micSacrificePct     === undefined) this.cfg.micSacrificePct     = 25;
          if (this.cfg.micKlineVolMin      === undefined) this.cfg.micKlineVolMin      = 25;
          if (this.cfg.micKlineScanCap     === undefined) this.cfg.micKlineScanCap     = 20;
          if (this.cfg.micHalvingEnabled   === undefined) this.cfg.micHalvingEnabled   = true;
          if (this.cfg.micHalvingHours     === undefined) this.cfg.micHalvingHours     = 0.5;
          if (this.cfg.micSubstitutionEnabled       === undefined) this.cfg.micSubstitutionEnabled       = true;
          if (this.cfg.micSubstitutionMarginPct     === undefined) this.cfg.micSubstitutionMarginPct     = 5;
          if (this.cfg.micSubstitutionMinAgeMins    === undefined) this.cfg.micSubstitutionMinAgeMins    = 10;
          if (this.cfg.micSubstitutionProtectWinners === undefined) this.cfg.micSubstitutionProtectWinners = false;
          if (this.cfg.micLiqLookbackCycles    === undefined) this.cfg.micLiqLookbackCycles    = 25;
          if (!Array.isArray(this.cfg.micLiqPresenceModes)) {
            let _old = this.cfg.micLiqPresenceMode;
            if (_old === undefined) _old = '1';
            if (_old === 'auto') {
              _old = 'both';
              this.log('[MIC] Auto Liquidation Presence removed — migrated to Both.', 'warn');
            }
            this.cfg.micLiqPresenceModes = _old === 'both' ? ['1','0'] : [_old];
            delete this.cfg.micLiqPresenceMode;
          }
          if (this.cfg.micSlotBlockEnabled     === undefined) this.cfg.micSlotBlockEnabled     = true;
          if (this.cfg.micSlotBlockPct         === undefined) this.cfg.micSlotBlockPct         = 25;
          if (this.cfg.micSlotBlockTags        === undefined) this.cfg.micSlotBlockTags        = false;
          if (!Array.isArray(this.cfg.micSlotBlockCriteria)) this.cfg.micSlotBlockCriteria      = [...DEFAULT_BLOCKABLE_CRITS];
          if (this.cfg.micLiveDepthThreshold   === undefined) this.cfg.micLiveDepthThreshold   = 1;
          if (this.cfg.micReentryBlockMode     === undefined) this.cfg.micReentryBlockMode     = 'losers';
          this._micFundSkew       = null;
          this._micVolSkew        = null;
          // V/M, IO/T, IO/M retired in favor of population-relative V/A and IO/A (see
          // _afVolIoWindowAvg) — no mcap fetch machinery to init anymore. One-time cleanup of
          // saved config: strip the retired keys from exclude/blockable lists (defensive — they
          // were never in DEFAULT_BLOCKABLE_CRITS to begin with) and seed va/ioa into the
          // blockable list by default, same as they'd get on a fresh install.
          if (Array.isArray(this.cfg.micAutoSlotExclude) && this.cfg.micAutoSlotExclude.some(c => c==='vm'||c==='iot'||c==='iom')) {
            this.cfg.micAutoSlotExclude = this.cfg.micAutoSlotExclude.filter(c => c!=='vm'&&c!=='iot'&&c!=='iom');
          }
          if (Array.isArray(this.cfg.micSlotBlockCriteria)) {
            let _bc = this.cfg.micSlotBlockCriteria.filter(c => c!=='vm'&&c!=='iot'&&c!=='iom');
            if (!_bc.includes('va'))  _bc = [..._bc, 'va'];
            if (!_bc.includes('ioa')) _bc = [..._bc, 'ioa'];
            // Regime (see Regime.md) — blockable by default from launch, same treatment as va/ioa above.
            for (const _rc of ['regimeslo','regimeblo','regimesmid','regimebmid','regimeshi','regimebhi']) {
              if (!_bc.includes(_rc)) _bc = [..._bc, _rc];
            }
            this.cfg.micSlotBlockCriteria = _bc;
          }
          if (this.cfg.micAutoSlots                  === undefined) this.cfg.micAutoSlots                  = true;
          if (this.cfg.micAutoSlotSize               === undefined) this.cfg.micAutoSlotSize               = 3;
          if (this.cfg.micAutoSlotExclude            === undefined) this.cfg.micAutoSlotExclude            = [];
          if (!Array.isArray(this.cfg.megacapExclude)) this.cfg.megacapExclude = [...DEFAULT_MEGACAP_EXCLUDE];
          if (this.cfg.micForceGeneralCriteria       === undefined) this.cfg.micForceGeneralCriteria       = false;
          if (!this._micOpening) this._micOpening = new Set(); // symbols with an in-flight live-liq open, guards double-fire
          if (this.cfg.micFundStep  === undefined) this.cfg.micFundStep  = 0.25;
          if (this.cfg.micVaStep    === undefined) this.cfg.micVaStep    = 1;
          if (this.cfg.micSpikeStep === undefined) this.cfg.micSpikeStep = 1;
          if (this.cfg.micIoaStep   === undefined) this.cfg.micIoaStep   = 1;
          if (this.cfg.micOcsStep   === undefined) this.cfg.micOcsStep   = 1;
          if (this.cfg.micOcxStep   === undefined) this.cfg.micOcxStep   = 1;
          if (Number(this.cfg.micOcxStep) === 0.1) this.cfg.micOcxStep = 1;
          // Legacy migration: convert old +fund/-fund/>10pct/<10pct/bare lsa/lba/rasl/rabl to tiered form
          {
            const _fundStep   = this.cfg.micFundStep  ?? 0.25;
            const _vmStep     = this.cfg.micVmStep    ?? 1;
            const _spikeStep  = this.cfg.micSpikeStep ?? 1;
            const _frThr      = this.cfg.micFrThreshold ?? 0.1;
            const _volMin     = this.cfg.micKlineVolMin  ?? 25;
            const _vmTier     = Math.max(1, Math.round(10 / _vmStep));
            const _frTier     = Math.max(1, Math.ceil(_frThr / _fundStep));
            const _migCrit = c => {
              if (c === '+fund')   return `fund>${_frTier}`;
              if (c === '-fund')   return `fund<-${_frTier}`;
              if (c === '>10pct')  return `vm>${_vmTier}`;
              if (c === '<10pct')  return `vm<${_vmTier}`;
              if (c === 'lsa')     return `lsa>${_volMin}`;
              if (c === 'lba')     return `lba>${_volMin}`;
              if (c === 'rasl')    return `rasl>${_volMin}`;
              if (c === 'rabl')    return `rabl>${_volMin}`;
              return c;
            };
            const _legacyNames = new Set(['+fund','-fund','>10pct','<10pct','lsa','lba','rasl','rabl']);
            if (Array.isArray(this.cfg.micSlots) && this.cfg.micSlots.some(s => s.some(c => _legacyNames.has(c)))) {
              this.cfg.micSlots = this.cfg.micSlots.map(s => s.map(_migCrit));
              this.persist();
            }
            if (Array.isArray(this.cfg.micAutoSlotExclude) && this.cfg.micAutoSlotExclude.some(c => _legacyNames.has(c))) {
              this.cfg.micAutoSlotExclude = this.cfg.micAutoSlotExclude.map(_migCrit);
              this.persist();
            }
          }
          // V/M, IO/T, IO/M no longer match anything (see the migration above) — a manual slot
          // still referencing them will never qualify. Not auto-rewritten (va/ioa isn't a 1:1
          // semantic substitution), just flagged once so it doesn't silently go dead.
          {
            const _retiredIn = s => s.filter(c => /^(vm|iot|iom)/.test(c));
            const _retiredSlots = (this.cfg.micSlots || []).map((s,i) => ({ i, crits: _retiredIn(s) })).filter(x => x.crits.length);
            if (_retiredSlots.length) this.log(`[MIC] ⚠️ ${_retiredSlots.length} manual slot(s) reference retired criteria (V/M, IO/T, IO/M) and will never match — slot(s) ${_retiredSlots.map(x=>x.i+1).join(', ')}. Replace with V/A / IO/A.`, 'warn');
          }
          // Liquidation is now a mandatory anchor — a manual slot saved before this restructure
          // (or built without one) will never match. Flag it once on load rather than silently.
          if (!this.cfg.micAutoSlots) {
            // Anchorless is only a mistake when 'past1' isn't active — with it active, an
            // anchorless manual slot is a valid Past-1 slot (see header comment).
            const anchorless = (this.cfg.micSlots || []).filter(s => s.length && !this._micSlotLiqAnchor(s)).length;
            if (anchorless && !this._micEffectivePresenceModes().includes('past1')) this.log(`[MIC] ⚠️ ${anchorless} manual slot(s) have no liquidation criterion and will never match — add S-Liq/B-Liq/mS-Liq/mB-Liq/0-Liq to each, or enable the Past-1 presence mode.`, 'warn');
          }
          this.registerRoleBadge?.(item => {
            if (!item || !item._mic) return null;
            const crits  = item._micCriteria || [];
            const emoji  = crits.map(c => critEmoji(c)).join('');
            const title  = crits.length ? 'Multi: ' + crits.map(c => critLabel(c)).join(' + ') : 'Multi-Indicator';
            return `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(255,150,80,.45);color:#ff9650;background:rgba(255,150,80,.10)" title="${title}">${emoji || 'Multi'}</span>`;
          });
          this.registerCloseReason?.('substitution', 'Sub');
          this.registerLiqCloseHook?.((results, batch) => { this._micOnLiqClose(results, batch); });
          this.registerLiqMessageHook?.((batch, sym) => { this._micOnLiqMessage(batch, sym); });
          const _presenceStr = (this.cfg.micLiqPresenceModes || ['1']).join('+');
          this.log(`[MIC] Multi-Indicator (Chaser) v${VERSION} loaded — ${this.cfg.micEnabled ? 'enabled' : 'disabled'} | ${(this.cfg.micSlots||[]).length} slots | ${this.cfg.micPicks}/cycle | presence: ${_presenceStr}`, 'info');
          this.renderTradeFeed?.();
        },

        // Cascade/Sacrifice run on the position watcher (5s, tied to bot.running) rather than
        // the scan clock (5-60min) — collective uPnL can cross either threshold and back well
        // within a single scan interval, and a private setInterval here would keep firing even
        // while the bot is stopped since it isn't tied to the start/stop lifecycle like this is.
        async pseudoWatchPositions() {
          await _origWatch.call(this);
          await this._micCheckCascade();
          await this._micCheckSacrifice();
        },

        _micToggle(i, c) {
          const slots = (this.cfg.micSlots || []).map(s => [...s]);
          if (!slots[i]) return;
          const idx = slots[i].indexOf(c);
          if (idx === -1) slots[i].push(c); else slots[i].splice(idx, 1);
          this.cfg.micSlots = slots;
          this.persist?.();
        },

        _micDelSlot(i) {
          const slots = (this.cfg.micSlots || []).map(s => [...s]);
          slots.splice(i, 1);
          this.cfg.micSlots = slots;
          if (this.cfg.micActiveSlot !== null) {
            if (slots.length === 0) this.cfg.micActiveSlot = null;
            else if (this.cfg.micActiveSlot >= slots.length) this.cfg.micActiveSlot = slots.length - 1;
          }
          this.persist?.();
        },

        _micAddSlot() {
          const slots = (this.cfg.micSlots || []).map(s => [...s]);
          slots.push([]);
          this.cfg.micSlots = slots;
          this.cfg.micActiveSlot = slots.length - 1;
          this.persist?.();
        },

        _micHalvingMultiplier() {
          if (!this.cfg.micHalvingEnabled) return 1;
          const pos = this.positions || [];
          if (!pos.length) return 1;
          const oldest = pos.reduce((m, p) => Math.min(m, p.openedAt || Date.now()), Date.now());
          return Math.pow(0.5, (Date.now() - oldest) / ((this.cfg.micHalvingHours ?? 0.5) * 3600000));
        },

        // Collective uPnL and the resulting bail set both cover every open position, not just
        // MIC's own — a winning position from another strategy should be able to push the
        // portfolio into Cascade the same as a winning MIC position would, and a Sacrifice
        // shouldn't leave an untouched, unrelated position dominating the aggregate afterward.
        async _micCheckCascade() {
          if (!this.cfg.micCascadeEnabled) return;
          const allPositions = this.positions || [];
          if (!allPositions.length) return;
          const totalUPnL   = allPositions.reduce((s, p) => s + (p.upnl || 0), 0);
          const baseMargin  = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const halvMul     = this._micHalvingMultiplier();
          const threshold   = baseMargin * ((this.cfg.micCascadePct ?? 25) / 100) * halvMul;
          if (totalUPnL >= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            this.log(`[MIC] 🌊 Cascade triggered — collective uPnL +${totalUPnL.toFixed(4)} ≥ ${threshold.toFixed(4)} USDT (${this.cfg.micCascadePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) — bailing ${allPositions.length} position(s)`, 'info');
            this._logBatchBegin?.();
            try {
              for (const pos of allPositions) {
                await this.pseudoClosePosition(pos, 'cascade');
              }
            } finally { this._logBatchEnd?.('[MIC] 🌊 Cascade roll-up'); }
          }
        },

        async _micCheckSacrifice() {
          if (!this.cfg.micSacrificeEnabled) return;
          const allPositions = this.positions || [];
          if (!allPositions.length) return;
          const totalUPnL   = allPositions.reduce((s, p) => s + (p.upnl || 0), 0);
          const baseMargin  = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const halvMul     = this._micHalvingMultiplier();
          const threshold   = -(baseMargin * ((this.cfg.micSacrificePct ?? 25) / 100) * halvMul);
          if (totalUPnL <= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            if (this.cfg.micRollingSacrificeEnabled) {
              const oldest = allPositions.reduce((a, b) => (a.openedAt || 0) <= (b.openedAt || 0) ? a : b);
              this.log(`[MIC] 🩸 Rolling sacrifice — uPnL ${totalUPnL.toFixed(4)} ≤ ${threshold.toFixed(4)} USDT (${this.cfg.micSacrificePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) — closing oldest: ${oldest.symbol}`, 'info');
              await this.pseudoClosePosition(oldest, 'sacrifice');
            } else {
              this.log(`[MIC] 🩸 Sacrifice triggered — collective uPnL ${totalUPnL.toFixed(4)} ≤ ${threshold.toFixed(4)} USDT (${this.cfg.micSacrificePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) — bailing ${allPositions.length} position(s)`, 'info');
              this._logBatchBegin?.();
              try {
                for (const pos of allPositions) {
                  await this.pseudoClosePosition(pos, 'sacrifice');
                }
              } finally { this._logBatchEnd?.('[MIC] 🩸 Sacrifice roll-up'); }
            }
          }
        },

        // Only meaningful when Co-Qualifying Penalty is on (Ashfall) — otherwise compositeScore
        // is always 0 for both sides and the margin check never clears, so this is a safe no-op.
        // pool only ever contains 0-liq (path-A) candidates — sliq/bliq/msliq/mbliq are live-only
        // and never appear here (see _micCheckCrit / runScan's checkCrit). Path-A is the
        // higher-conviction read, so unlike the live path's substitution (_micLiveTrySubstitute)
        // there's no path restriction on what it can close — cross-strategy, any held position,
        // same as Liquid-Diver's version. The swap is still score-gated, not automatic.
        async _micTrySubstitute(pool) {
          if (!this.cfg.micSubstitutionEnabled || !pool?.length) return false;
          const now           = Date.now();
          const minAgeMs       = (this.cfg.micSubstitutionMinAgeMins ?? 10) * 60000;
          const protectWinners = this.cfg.micSubstitutionProtectWinners ?? true;
          const baseMargin     = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const marginThreshold = baseMargin * ((this.cfg.micSubstitutionMarginPct ?? 5) / 100);

          const eligible = (this.positions || []).filter(p => {
            if ((now - (p.openedAt || 0)) < minAgeMs) return false;
            if (protectWinners && (p.upnl || 0) > 0) return false;
            return true;
          });
          if (!eligible.length) return false;

          const scoreOf = p => p._mic ? (p._micCompositeScore ?? 0) : (p._micCompositeScore ?? -Infinity);
          eligible.sort((a, b) => scoreOf(a) - scoreOf(b));
          const worst      = eligible[0];
          const worstScore = scoreOf(worst);
          const best       = pool[0];
          if (!best || (best.compositeScore - worstScore) < marginThreshold) return false;

          this.log(`[MIC] 🔁 Substitution — closing ${worst.symbol} (score ${worstScore === -Infinity ? 'n/a' : worstScore.toFixed(4)}) for ${best.t.symbol} (score ${best.compositeScore.toFixed(4)}), Δ${(best.compositeScore - worstScore).toFixed(4)} ≥ ${marginThreshold.toFixed(4)} margin`, 'info');
          await this.pseudoClosePosition(worst, 'substitution');
          return await this._micOpen(best.t, best.criteria, best.slotIdx, best.compositeScore);
        },

        async runScan() {
          const tsBefore = this._lastAllTickersAt || 0;
          await _origScan.call(this);
          // If _origScan returned without fetching fresh tickers (halt/lock/cache-hit after a
          // halt cleared), _lastAllTickersAt is unchanged. Reset _micLastActedAt so that the
          // next genuine fresh fetch is not silently skipped by the dedup check.
          if ((this._lastAllTickersAt || 0) === tsBefore && tsBefore === (this._micLastActedAt || 0)) {
            this._micLastActedAt = 0;
          }
          await this._micRunScan();
        },

        _micComputeSamplingData() {
          // Funding skew — always computed for AF visualization. Population sample used to be
          // "symbols the broad kline-criteria scan touched this cycle" (klineSyms); now that VSG
          // rides PEC's own liq-fresh-pool fetch instead of a broad scan, the PEC cache's key set
          // is the equivalent population.
          const pecSyms = Object.keys(this._micPecCache || {});
          const sharedLiq = this._sharedRead('liqResults');
          const fundCombined = { ...(sharedLiq?.data || {}), ...(this._liqResults || {}) };
          const liqSyms = Object.keys(fundCombined);
          const unionSyms = [...new Set([...pecSyms, ...liqSyms])];
          const tickerMap = {};
          for (const t of (this._lastAllTickers || [])) tickerMap[t.symbol] = t;
          let posCount = 0, negCount = 0;
          for (const sym of unionSyms) {
            const t = tickerMap[sym];
            if (!t) continue;
            const fr = parseFloat(t.fundingRate || 0) * 100;
            if (fr > 0) posCount++;
            else if (fr < 0) negCount++;
          }
          const fundTotal = posCount + negCount;
          if (fundTotal > 0) {
            this._micFundSkew = { negPct: negCount / fundTotal * 100, posPct: posCount / fundTotal * 100, domDir: posCount >= negCount ? 'fund+' : 'fund-', domPct: Math.max(posCount, negCount) / fundTotal * 100 };
          }

          // Volume skew — always computed for AF visualization. Used to read the retired 1h-vs-
          // 24h-avg kline multiplier; now reads VSG's 6h/12h/24h composite index instead (50 =
          // neutral), summed across all three windows per symbol — same population, richer signal.
          let aboveSum = 0, belowSum = 0;
          for (const [sym, p] of Object.entries(this._micPecCache || {})) {
            const t = tickerMap[sym];
            const v = p?.vsg;
            if (!t || !v || v['6h'] == null || v['12h'] == null || v['24h'] == null) continue;
            for (const win of ['6h', '12h', '24h']) {
              const vi = v[win];
              if (vi > 50) aboveSum += (vi - 50) / 50;
              else if (vi < 50) belowSum += (50 - vi) / 50;
            }
          }
          const volTotal = aboveSum + belowSum;
          if (volTotal > 0) {
            this._micVolSkew = { abovePct: aboveSum / volTotal * 100, belowPct: belowSum / volTotal * 100, aboveSum, belowSum };
          }
        },

        _extraStatusPills() {
          return [];
        },

        async _micRunScan() {
          if (!this.cfg.micEnabled) return;
          const _micHalted = !!(this._isDrawdownHalted?.() || this._isGainsLocked?.());
          if (_micHalted) {
            if (!this._micHaltLogged) { this.log(`[MIC] 💡 Halted — ${this._isGainsLocked?.() ? 'gains lock' : 'drawdown halt'} active; hist scoring continues`, 'info'); this._micHaltLogged = true; }
          } else {
            this._micHaltLogged = false;
          }

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;

          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._micLastActedAt) return;

          // Rebuild block state from scorecard immediately before any slot or pool decisions
          this._afScoreBuild?.();

          // Entry slots — Auto mode has no generated slot list any more (see _micAutoQualify);
          // Manual mode keeps its exact combo list as before.
          const autoMode = !!this.cfg.micAutoSlots;
          const slots = autoMode ? [] : this._micEffectiveSlots();
          const hasActiveEntry = autoMode ? this._micAutoActive() : slots.length > 0;

          if (!hasActiveEntry) {
            this._micComputeSamplingData();
            this._micLastActedAt = freshAt;
            this.log('[MIC] 💡 No active slots — skipping', 'info');
            return;
          }

          const activeSyms  = new Set((this.positions || []).map(p => p.symbol));

          const _allLiqResults = { ...((this._sharedRead?.('liqResults'))?.data || {}), ...(this._liqResults || {}) };

          // Criteria pool to scan for data-fetch needs — Auto's non-excluded secondary list, or
          // every criterion actually used across manual slots.
          const _critPool = autoMode
            ? SECONDARY_CRITS.filter(c => !(new Set(this.cfg.micAutoSlotExclude || [])).has(c))
            : [...new Set(slots.flat())];
          const needsVolIo = _critPool.some(c => /^(va|ioa)/.test(c));
          const needsOc    = _critPool.some(c => /^(ocs|ocx)/.test(c));
          const needsPec   = _critPool.some(c => /^(pec|vsg)/.test(c));
          const scanSkip = {
            excluded: { nonUsdt: 0, btc: 0, lowPrice: 0, active: 0, banned: 0, reentry: 0, },
            unmatched: { noScanAnchor: 0, criteria: 0 },
            blocked: 0
          };
          const basePool = [];
          for (const t of allTickers) {
            if (!t?.symbol?.endsWith('USDT')) { scanSkip.excluded.nonUsdt++; continue; }
            if ((this.cfg.megacapExclude || DEFAULT_MEGACAP_EXCLUDE).includes(t.symbol)) { scanSkip.excluded.btc++; continue; }
            if (parseFloat(t.lastPrice || 0) < 0.001) { scanSkip.excluded.lowPrice++; continue; }
            if (activeSyms.has(t.symbol)) { scanSkip.excluded.active++; continue; }
            if (this._isSymbolBanned?.(t.symbol)) { scanSkip.excluded.banned++; continue; }
            if (this._micIsReentryBlocked(t.symbol)) { scanSkip.excluded.reentry++; continue; }
            basePool.push(t);
          };

          // Order Count Surveillance: fetch a fresh sample for this cycle's candidate pool, only
          // when a slot actually uses ocs/ocx. Stateless — no accumulation across cycles, no
          // cross-ticker mean required for OCX. A ticker missing from this sample simply fails
          // the ocs/ocx criterion in checkCrit — it no longer blocks the rest of the pool.
          //
          // Tickers this scan just picked for liq surveillance are always included first, so OC
          // data exists for exactly the tickers a liquidation event might be about to hit (e.g.
          // to look back at order skew/velocity ahead of a liquidation) — not the accumulated set
          // across every still-open, hour-long liq batch, just this cycle's pick. The remaining
          // headroom up to the shared cap (same size as the Liq Batch Size config) is filled with
          // random pool candidates, same as before this coordination existed.
          if ((needsOc || needsVolIo) && this.cfg.afOcEnabled) {
            const ocCap = this.cfg.ashLiqBatchSize ?? 25;
            const liqSyms = this._liqLastBatchSyms || [];
            const liqSet  = new Set(liqSyms);
            let fillSyms = basePool.map(t => t.symbol).filter(s => !liqSet.has(s));
            for (let i = fillSyms.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [fillSyms[i], fillSyms[j]] = [fillSyms[j], fillSyms[i]];
            }
            const ocSyms = liqSyms.concat(fillSyms).slice(0, ocCap);
            // Vol/OI is already on the ticker payload — no fetch needed, just carried into the
            // same tethered cycle history alongside OC (see _ocFetchBatch, Option A design).
            const volIoMap = {};
            for (const t of allTickers) volIoMap[t.symbol] = { vol: parseFloat(t.turnover24h || 0) || null, oi: parseFloat(t.openInterestValue || 0) || null };
            await this._ocFetchBatch(ocSyms, volIoMap, needsOc);
          }
          const _afOcResults = this.afOcResults || {};

          // Criteria-scan kline discovery (the old LSA/LBA/R-ASL/R-ABL random-sample prefetch)
          // is retired — VSG replaces that family and rides PEC's own liq-fresh-pool fetch below
          // instead (see VSG.md). _micPrefetchKlines/_micKlineCache still exist and are still used,

          // PEC only ever fetches for tickers whose liq surveillance batch just closed (see
          // _micOnLiqClose) and are still within micPecFreshCycles — never the general pool.

        // Checks the full retained window of Ashfall's closed liq cycles (_liqCycleHistory,

            vsgmomdn: Math.min(b - a, c - b),

        _micCheckCrit(c, fr, pec, t, ocResults) {

        // Co-Qualifying Penalty scoring for one criterion. Base rank is looked up from the

        // "good vs bad" direction reversal. Shared by the scan-time entry pool (runScan) and the
        // live liq-message path (_micOnLiqMessage).

          else if (/^mbliq/.test(rawC)) base = (ranks['mbliq+'] ?? 0) + (ranks['mbliq-'] ?? 0);
          else if (/^sliq/.test(rawC)) base = (ranks['sliq+'] ?? 0) + (ranks['sliq-'] ?? 0);
          else if (/^bliq/.test(rawC)) base = (ranks['bliq+'] ?? 0) + (ranks['bliq-'] ?? 0);

          // deeper. For a "<" gate (vm<N, iot<N, iom<N, ocx<N), a LOWER tier is further past
          // threshold and deeper — using raw magnitude there would score a barely-qualifying
          // ticker as "deeper" than one that qualifies strongly, which is backwards.
          const annotM = (annotC || '').match(/([+-]?\d+)$/);

          if (/^va/.test(c)) { const val = parseFloat(t.turnover24h || 0); const w = this._afVolIoWindowAvg?.('vol'); const step = this.cfg.micVaStep ?? 1; const tier = (val && w) ? Math.floor(((val - w) / w * 100) / step) : 0; return `va${tier>=0?'+':''}${tier}`; }
          if (/^ioa/.test(c)) { const val = parseFloat(t.openInterestValue || 0); const w = this._afVolIoWindowAvg?.('oi'); const step = this.cfg.micIoaStep ?? 1; const tier = (val && w) ? Math.floor(((val - w) / w * 100) / step) : 0; return `ioa${tier>=0?'+':''}${tier}`; }
          if (/^fund/.test(c)) { const step = this.cfg.micFundStep ?? 0.25; const fr_ = parseFloat(t.fundingRate||0)*100; const tier = Math.floor(fr_/step); return `fund${tier>=0?'+':''}${tier}`; }
          if (/^vsg/.test(c)) { const p = this._micGetPecSync(t.symbol); const v = p?.vsg; if (!v || v['6h']==null || v['12h']==null || v['24h']==null) return `${c}+0`; const step = this.cfg.micVsgDepthStep ?? 5; const high = this.cfg.micVsgThresholdHigh ?? 70; const low = this.cfg.micVsgThresholdLow ?? 30; let depth = 0; if (c==='vsgot') depth = ((v['6h']-high)+(v['12h']-high)+(v['24h']-high))/3; else if (c==='vsgut') depth = ((low-v['6h'])+(low-v['12h'])+(low-v['24h']))/3; else if (c==='vsgalpha') depth = ((v['12h']-v['6h'])+(v['12h']-v['24h']))/2; else if (c==='vsgdelta') depth = ((v['6h']-v['12h'])+(v['24h']-v['12h']))/2; else if (c==='vsgmomup') depth = v['6h']-v['24h']; else if (c==='vsgmomdn') depth = v['24h']-v['6h']; const tier = Math.max(0, Math.floor(depth/step)); return `${c}+${tier}`; }

            const low  = this.cfg.micPecThresholdLow ?? 30;

        // Live liq-message hook — registered via Ashfall's registerLiqMessageHook. Not
        // scan-gated: fires the instant a message crosses this ticker's slot(s) depth threshold.

        // stay on the regular runScan/checkCrit path. Skipped entirely when 'live' isn't an active mode.
        async _micOnLiqMessage(batch, sym) {
          if (!this.cfg.micEnabled) return;
          if (!this._micEffectivePresenceModes().includes('1')) return;
          const halted = !!(this._isDrawdownHalted?.() || this._isGainsLocked?.());
          if (halted) return;
          if (this._isSymbolBanned?.(sym)) return;
          if (!halted && this._micIsReentryBlocked(sym)) return;
          if (this._micOpening.has(sym)) return;
          if ((this.positions || []).some(p => p.symbol === sym)) return;

          const bRaw  = batch.bLiqTurnover?.[sym] || 0;

          // _micPrefetchPec) — a different population than "this symbol just triggered a live
          // entry." Unlike kline/OC below, it had no on-demand fallback here at all, so a
          // live entry could open with fund/OCS/OCX guaranteed but PEC left entirely to chance.

              // depth check is a single general-threshold test, done once — not once per combo.

              const activeSec  = SECONDARY_CRITS.filter(c => !exclude.has(c));
              const needsVsg   = activeSec.some(c => /^vsg/.test(c));
              const needsOc    = activeSec.some(c => /^(ocs|ocx)/.test(c));

              if (needsVsg && !pec) { await this._micPrefetchPec([sym]); pec = this._micGetPecSync(sym); }
              let ocResult = this.afOcResults?.[sym] ?? null;
              if (needsOc && !ocResult && this.cfg.afOcEnabled) ocResult = await this._ocFetchSingle?.(sym) ?? null;
              const ocResultsMap = ocResult ? { [sym]: ocResult } : {};

              // population average comes from the tethered _afOcCycleHistory window.
              const matched = this._micAutoQualify(

                c => this._micAnnotateLiveCrit(c, t, type, depth, ocResultsMap)

              // tickers' checks still need this cycle, and would flood the OC chart's history
              // with a noisy 1-ticker sample (see _ocFetchSingle's own comment).
              let ocResult = this.afOcResults?.[sym] ?? null;
