<!--
  Multi-Indicator Strategy Plugin for PseudoChaser
  Slot-based entry filter combining fund rate, 24hr price direction, and vol/mcap signals.

  Each "slot" is an AND-condition over any combination of six criteria:
    +fund  — funding rate ≥ threshold (longs paying shorts)
    -fund  — funding rate ≤ −threshold (shorts paying longs)
    +24h   — ticker's 24hr price change is positive
    -24h   — ticker's 24hr price change is negative
    >10%   — 24hr turnover exceeds 10% of market cap (high participation)
    <10%   — 24hr turnover is below 10% of market cap (low relative participation)

  A ticker qualifies for entry if it satisfies ALL criteria in ANY slot. Slots that contain
  a vol/mcap criterion trigger a CoinGecko market cap lookup via the shared window.__cgCoinList
  cache; fund and 24h criteria run entirely from the host's bulk ticker cache.

  Entry pool fires once per fresh bulk ticker fetch (_lastAllTickersAt) — will not re-scan
  the same cached snapshot twice. TP, SL, and all exit logic use the host's settings.
  Drawdown throttle and gains lock gate all entries.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const VERSION       = '1.10.2';
  const DEFAULT_SLOTS = [['-fund','+24h','>10pct'],['+fund','-24h','<10pct']];

  // Per-criterion emoji for position badges. Fund emoji is app-relative:
  // -fund = shorts paying = good carry for longs (🤑), bad for shorts (💸).
  // +fund = longs paying = bad for longs (💸), good for shorts (🤑).
  const CRIT_EMOJI = { '+fund': '💸', '-fund': '🤑', '+24h': '⬆️', '-24h': '⬇️', '>10pct': '🔊', '<10pct': '🔉', 'lsa': '🟥', 'lba': '🟩', 'rasl': '🔴', 'rabl': '🟢', 'sliq': '🥵', 'bliq': '🥶' };
  const CRIT_DESC  = { '+fund': '+fund (longs paying)', '-fund': '-fund (shorts paying)', '+24h': '+24h (up on day)', '-24h': '-24h (down on day)', '>10pct': '>10% vol/mcap', '<10pct': '<10% vol/mcap', 'lsa': 'LSA (1h sell spike)', 'lba': 'LBA (1h buy spike)', 'rasl': 'R-ASL (1h low-vol red)', 'rabl': 'R-ABL (1h low-vol green)', 'sliq': 'S-Liq (Sell-Liquidation: short positions liquidated ≥ threshold)', 'bliq': 'B-Liq (Buy-Liquidation: long positions liquidated ≥ threshold)' };

  const critEmoji = c => /^sliq/.test(c) ? '🥵' + c.slice(4) : /^bliq/.test(c) ? '🥶' + c.slice(4) : (CRIT_EMOJI[c] || '');
  const critLabel = c => {
    const m = c.match(/^(sliq|bliq)([<>])([+-]?\d+)$/);
    if (m) return (m[1] === 'sliq' ? 'S-Liq' : 'B-Liq') + ' ' + m[2] + m[3];
    const n = c.match(/^(sliq|bliq)([+-]\d+)$/);
    if (n) return (n[1] === 'sliq' ? 'S-Liq' : 'B-Liq') + ' ' + n[2];
    if (c === 'sliq') return 'S-Liq'; if (c === 'bliq') return 'B-Liq';
    return CRIT_DESC[c] || c;
  };

  window.__BotPlugin = {
    id:        'multiindicator-chaser',
    name:      'Multi-Indicator (Chaser)',
    version:   VERSION,
    targetBot: 'pseudochaser',
    after:     ['sunchaser', 'ashfall-chaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan'],

    css: `
      .mic-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .mic-slot { display:inline-flex; flex-direction:column; align-items:center; gap:3px; padding:6px 5px; border-radius:3px; border:1px solid; cursor:pointer; min-width:52px; font-size:9px; font-family:var(--mono); text-align:center; transition:border-color .15s,background .15s; }
      .mic-crit { font-size:8px; padding:1px 4px; border-radius:2px; background:rgba(255,150,80,.12); border:1px solid rgba(255,150,80,.3); color:#ff9650; white-space:nowrap; }
      .mic-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
      .mic-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .mic-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .mic-tab.on { border-color:rgba(255,150,80,.6); color:#ff9650; background:rgba(255,150,80,.08); }
      .mic-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .mic-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.micEnabled"> + Multi</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false, tE: false, tX: false, tF: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Multi-Indicator</span>
              <span x-show="cfg.micEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.micEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.micEnabled=!cfg.micEnabled;persist()}">
              <div class="tog-t" :class="cfg.micEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Multi-Indicator Mode</div>
                <div class="mic-hint">Longs tickers matching any active entry slot; fires once per bulk ticker fetch using host TP/SL settings.</div>
              </div>
            </label>
            <div x-show="cfg.micEnabled" style="margin-top:8px">
              <div class="mic-tabs">
                <button class="mic-tab" :class="tE?'on':''" @click="tE=!tE">ENTRY</button>
                <button class="mic-tab" :class="tX?'on':''" @click="tX=!tX">EXIT</button>
                <button class="mic-tab" :class="tF?'on':''" @click="tF=!tF">FADE</button>
              </div>

              <!-- Entry Zone -->
              <div class="mic-zone" x-show="tE">
                <!-- Entry Slots -->
                <div>
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                    <div class="lbl" style="margin-bottom:0">Entry Slots</div>
                    <label class="tog" style="font-size:9px" @click="if(!cfgLocked){cfg.micAutoSlots=!cfg.micAutoSlots;persist()}">
                      <div class="tog-t" :class="cfg.micAutoSlots?'on':''"><div class="tog-k"></div></div>
                      <span class="tog-l">Auto</span>
                    </label>
                  </div>

                  <!-- Auto slots controls -->
                  <div x-show="cfg.micAutoSlots" style="margin-bottom:8px;padding:6px 8px;background:rgba(255,150,80,.04);border:1px solid rgba(255,150,80,.12);border-radius:3px">
                    <div class="lbl">Criteria per Slot <b x-text="cfg.micAutoSlotSize??2"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'— '+(()=>{const n=cfg.micAutoSlotSize??2,k=12;let r=1;for(let i=0;i<n;i++)r=r*(k-i)/(i+1);return Math.round(r)})()+' slots'"></span></div>
                    <input type="range" min="1" max="5" step="1" x-model.number="cfg.micAutoSlotSize" @change="persist()">
                    <div class="mic-hint">Generates all combinations of the 12 criteria taken N at a time. Manual slots are preserved and restored when Auto is off.</div>
                    <div x-show="Object.keys(micBlockedSlots||{}).length" class="mic-hint" style="margin-top:3px" x-text="Object.values(micBlockedSlots||{}).filter(v=>v==='blocked').length+' slot(s) blocked — matched tickers graylisted for '+(cfg.micBlockedSlotCooldownHours??6)+'h'"></div>
                  </div>

                  <!-- Manual slot builder — hidden when Auto is on -->
                  <div x-show="!cfg.micAutoSlots">
                    <div class="mic-hint" style="margin-bottom:6px;color:var(--text-lo)">(click slot to edit · click criteria to toggle)</div>

                    <!-- Criteria picker — visible when a slot is selected -->
                    <div x-show="cfg.micActiveSlot !== null && cfg.micActiveSlot !== undefined && cfg.micActiveSlot < (cfg.micSlots||[]).length"
                         x-data="{ liqFocus: null, liqDir: '>', liqVal: 2 }"
                         @click.outside="liqFocus = null"
                         style="display:flex;gap:3px;flex-wrap:wrap;align-items:center;margin-bottom:7px;padding:6px 7px;background:rgba(255,255,255,.04);border-radius:3px;border:1px solid rgba(255,255,255,.08)">
                      <span style="font-size:9px;color:var(--text-lo);margin-right:2px">Slot <span x-text="(cfg.micActiveSlot??0)+1"></span>:</span>
                      <template x-for="c in ['+fund','-fund','+24h','-24h','>10pct','<10pct','lsa','lba','rasl','rabl','sliq','bliq']" :key="c">
                        <button class="mic-opt"
                          @click.prevent="if(!cfgLocked){ if(c==='sliq'||c==='bliq'){ liqFocus=(liqFocus===c?null:c); if(liqFocus){ const ex=(cfg.micSlots?.[cfg.micActiveSlot]||[]).find(x=>x.startsWith(c)); if(ex){ const m=ex.match(/^(?:sliq|bliq)([<>])([+-]?\d+)$/); if(m){liqDir=m[1];liqVal=parseInt(m[2],10)} } } } else { liqFocus=null; _micToggle(cfg.micActiveSlot, c) } }"
                          :style="(c==='sliq'||c==='bliq') ? (liqFocus===c ? 'border-color:rgba(255,150,80,.8);color:#ff9650;background:rgba(255,150,80,.25)' : (cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(c)) ? 'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent') : ((cfg.micSlots?.[cfg.micActiveSlot]||[]).includes(c) ? 'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent')"
                          x-text="c.replace('>10pct','>10%').replace('<10pct','<10%').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL').replace('sliq','S-Liq').replace('bliq','B-Liq')">
                        </button>
                      </template>
                      <!-- Liq depth config panel -->
                      <div x-show="liqFocus !== null" style="width:100%;margin-top:6px;padding:5px 7px;background:rgba(255,150,80,.06);border:1px solid rgba(255,150,80,.2);border-radius:3px">
                        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                          <span style="font-size:9px;color:var(--text-lo)" x-text="(liqFocus==='sliq'?'S-Liq':'B-Liq')+' depth'"></span>
                          <button @click.prevent="liqDir=(liqDir==='>'?'<':'>')"
                            style="font-family:var(--mono);font-size:9px;padding:1px 6px;background:rgba(255,150,80,.1);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;cursor:pointer"
                            x-text="liqDir"></button>
                          <input type="range" min="-25" max="25" step="1" x-model.number="liqVal" style="flex:1;min-width:60px">
                          <span style="font-size:9px;color:#ff9650;min-width:24px;text-align:right" x-text="(liqVal>=0?'+':'')+liqVal"></span>
                          <button @click.prevent="if(!cfgLocked&&liqFocus){ const slots=(cfg.micSlots||[]).map(s=>[...s]); const si=cfg.micActiveSlot; if(!slots[si]) return; const existIdx=slots[si].findIndex(x=>x.startsWith(liqFocus)); if(existIdx!==-1){ slots[si].splice(existIdx,1); } else { slots[si].push(liqFocus+liqDir+(liqVal>=0?'+':'')+liqVal); } cfg.micSlots=slots; persist?.(); }"
                            :style="(cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(liqFocus??'__')) ? 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.4);color:rgba(255,100,100,.9)' : 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,150,80,.1);border:1px solid rgba(255,150,80,.35);color:#ff9650'"
                            x-text="(cfg.micSlots?.[cfg.micActiveSlot]||[]).some(x=>x.startsWith(liqFocus??'__')) ? 'Remove' : 'Add'">
                          </button>
                        </div>
                      </div>
                    </div>

                    <!-- Slot blocks -->
                    <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:flex-start">
                      <template x-for="(slot, i) in (cfg.micSlots||[])" :key="i">
                        <div class="mic-slot"
                          @click.prevent="if(!cfgLocked){cfg.micActiveSlot=(cfg.micActiveSlot===i?null:i);persist()}"
                          :style="(()=>{ const bs=micBlockedSlots[[...slot].sort().join(',')]; return bs==='blocked'?'border-color:rgba(255,80,80,.7);background:rgba(255,80,80,.07)':cfg.micActiveSlot===i?'border-color:rgba(255,150,80,.7);background:rgba(255,150,80,.07)':'border-color:var(--border);background:transparent'; })()">
                          <div style="font-size:8px;color:var(--text-lo)">Slot <span x-text="i+1"></span></div>
                          <div style="display:flex;flex-direction:column;gap:2px;min-height:14px">
                            <template x-for="c in slot" :key="c">
                              <span class="mic-crit" x-text="c.replace('>10pct','>10%').replace('<10pct','<10%').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL').replace('sliq','S-Liq').replace('bliq','B-Liq')"></span>
                            </template>
                            <span x-show="!slot.length" style="font-size:8px;color:var(--text-lo);font-style:italic">empty</span>
                          </div>
                          <div x-show="micBlockedSlots[[...slot].sort().join(',')]==='blocked'" style="font-size:7px;color:rgba(255,80,80,.7);margin-top:2px;line-height:1.2">⛔ blocked</div>
                          <button x-show="!cfgLocked"
                            @click.stop.prevent="_micDelSlot(i)"
                            style="font-size:8px;color:var(--text-lo);background:none;border:none;cursor:pointer;padding:0;margin-top:2px;line-height:1;opacity:.7">✕</button>
                        </div>
                      </template>
                      <button x-show="!cfgLocked"
                        @click.prevent="_micAddSlot()"
                        style="align-self:center;padding:8px 10px;font-size:12px;background:rgba(255,150,80,.06);border:1px dashed rgba(255,150,80,.3);border-radius:3px;color:#ff9650;cursor:pointer">+</button>
                    </div>
                    <div class="mic-hint" style="margin-top:5px">Each slot is an AND-gate — a ticker must meet every criterion in the slot. Any matching slot qualifies the ticker for entry. Vol/mcap criteria pull market cap from CoinGecko (1h cache). LSA/LBA/R-ASL/R-ABL fetch the last completed 1h kline per ticker.</div>
                    <div class="mic-hint" style="margin-top:5px;line-height:1.8">Badge key: 🤑 -fund · 💸 +fund · ⬆️ +24h · ⬇️ -24h · 🔊 &gt;10% vol/mcap · 🔉 &lt;10% vol/mcap · 🟥 LSA · 🟩 LBA · 🔴 R-ASL · 🟢 R-ABL · 🥵 S-Liq · 🥶 B-Liq — click S-Liq/B-Liq to configure depth gate (direction + threshold)</div>
                  </div><!-- end manual builder -->
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">Kline Scan Cap <b x-text="(cfg.micKlineScanCap??50)"></b> tickers</div>
                    <input type="range" min="10" max="500" step="10" x-model.number="cfg.micKlineScanCap" @change="persist()">
                    <div class="mic-hint">Random sample of tickers checked for kline criteria per cycle.</div>
                  </div>
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">Blocked Slot Cooldown <b x-text="(cfg.micBlockedSlotCooldownHours??6)+'h'"></b></div>
                    <input type="number" class="inp" min="0.5" max="48" step="0.5" x-model.number="cfg.micBlockedSlotCooldownHours" @change="persist()" style="width:70px">
                    <div class="mic-hint">Tickers matching a blocked slot are graylisted for this duration.</div>
                  </div>
                </div><!-- end entry slots section -->
              </div><!-- end entry zone -->

              <!-- Exit Zone -->
              <div class="mic-zone" x-show="tX">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.micCascadeEnabled=!cfg.micCascadeEnabled;persist()}">
                  <div class="tog-t" :class="cfg.micCascadeEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Cascade Exit</div>
                    <div class="mic-hint">Bails all MIC positions when their collective unrealized profit reaches a % of total base margin.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.micCascadeEnabled" style="margin-top:8px">
                  <div class="lbl">Trigger at <b x-text="(cfg.micCascadePct??25)+'% of base margin'"></b></div>
                  <input type="range" min="5" max="200" step="5" x-model.number="cfg.micCascadePct" @change="persist()">
                  <div class="mic-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._mic); const margin=pos.reduce((s,p)=>s+(p.margin||0),0); const upnl=pos.reduce((s,p)=>s+(p.upnl||0),0); const avg=pos.length?margin/pos.length:0; const halvMul=cfg.micHalvingEnabled&&pos.length?Math.pow(0.5,(Date.now()-pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()))/((cfg.micHalvingHours??3)*3600000)):1; const thr=avg*((cfg.micCascadePct??25)/100)*halvMul; return pos.length ? 'Active: '+pos.length+' pos · avg margin '+avg.toFixed(4)+' · uPnL '+(upnl>=0?'+':'')+upnl.toFixed(4)+' · trigger @ +'+(thr).toFixed(4)+(halvMul<0.999?' (×'+halvMul.toFixed(2)+')':'')+' USDT' : 'No active MIC positions.'; })()"></div>
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.micSacrificeEnabled=!cfg.micSacrificeEnabled;persist()}">
                  <div class="tog-t" :class="cfg.micSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Sacrifice Exit</div>
                    <div class="mic-hint">Bails all MIC positions when their collective unrealized loss reaches a % of avg base margin.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.micSacrificeEnabled" style="margin-top:8px">
                  <div class="lbl">Trigger at <b x-text="'-'+(cfg.micSacrificePct??25)+'% of base margin'"></b></div>
                  <input type="range" min="5" max="200" step="5" x-model.number="cfg.micSacrificePct" @change="persist()">
                  <div class="mic-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._mic); const margin=pos.reduce((s,p)=>s+(p.margin||0),0); const upnl=pos.reduce((s,p)=>s+(p.upnl||0),0); const avg=pos.length?margin/pos.length:0; const halvMul=cfg.micHalvingEnabled&&pos.length?Math.pow(0.5,(Date.now()-pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()))/((cfg.micHalvingHours??3)*3600000)):1; const thr=avg*((cfg.micSacrificePct??25)/100)*halvMul; return pos.length ? 'Active: '+pos.length+' pos · avg margin '+avg.toFixed(4)+' · uPnL '+(upnl>=0?'+':'')+upnl.toFixed(4)+' · trigger @ -'+(thr).toFixed(4)+(halvMul<0.999?' (×'+halvMul.toFixed(2)+')':'')+' USDT' : 'No active MIC positions.'; })()"></div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.micRollingSacrificeEnabled=!cfg.micRollingSacrificeEnabled;persist()}">
                    <div class="tog-t" :class="cfg.micRollingSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Rolling Window</div>
                      <div class="mic-hint">On trigger: close oldest position only instead of bailing all.</div>
                    </div>
                  </label>
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.micHalvingEnabled=!cfg.micHalvingEnabled;persist()}">
                  <div class="tog-t" :class="cfg.micHalvingEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Target Halving</div>
                    <div class="mic-hint">Halves the cascade/sacrifice trigger threshold once per interval, based on the age of the oldest MIC position — the longer they're held, the easier the collective exit fires.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.micHalvingEnabled" style="margin-top:8px">
                  <div class="lbl">Halving Interval <b x-text="(h=>(h<1?Math.round(h*60)+'m':h%1===0?h+'h':Math.floor(h)+'h '+Math.round((h%1)*60)+'m'))(cfg.micHalvingHours??3)"></b></div>
                  <input type="number" class="inp" min="0.1" max="24" step="0.1" x-model.number="cfg.micHalvingHours" @change="persist()" style="width:80px">
                  <div class="mic-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._mic); if(!pos.length) return 'No active MIC positions.'; const oldest=pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()); const ageMs=Date.now()-oldest; const halvMs=(cfg.micHalvingHours??3)*3600000; const mul=Math.pow(0.5,ageMs/halvMs); const h=Math.floor(ageMs/3600000); const m=Math.floor((ageMs%3600000)/60000); return 'Oldest: '+h+'h '+String(m).padStart(2,'0')+'m old → ×'+mul.toFixed(3)+' on trigger'; })()"></div>
                </div>
              </div><!-- end exit zone -->

              <!-- Fade Zone -->
              <div class="mic-zone" x-show="tF">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.micFadeAwayEnabled=!cfg.micFadeAwayEnabled;persist()}">
                  <div class="tog-t" :class="cfg.micFadeAwayEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Fade Away</div>
                    <div class="mic-hint">Runs every scan cycle using cached klines. If any MIC position is in loss ≥ threshold, fetches fresh klines instead. Bad structure → closes oldest position.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.micFadeAwayEnabled" style="margin-top:8px">

              return Object.values(map).sort((a, b) => a.ts - b.ts).map(g => ({ ts: g.ts, remaining: fmt(ttl - (now - g.ts)), syms: g.syms }));

    transform(def) {
      const _origInit  = def.init;

        micBlockedSlots: {},

        _micFadeAwayLocked: false,

          if (this.cfg.micKlineVolMax      === undefined) this.cfg.micKlineVolMax      = 50;

          if (!this._micSlotGraylist) this._micSlotGraylist = {};
          this.registerRoleBadge?.(item => {

            const emoji  = crits.map(c => critEmoji(c)).join('');

        _micToggle(i, c) {
          const slots = (this.cfg.micSlots || []).map(s => [...s]);
          if (!slots[i]) return;

          this.cfg.micSlots = slots;

        },

        _micDelSlot(i) {

          this.cfg.micSlots = slots;
          if (this.cfg.micActiveSlot !== null) {

        _micAddSlot() {

        _micHalvingMultiplier() {
          if (!this.cfg.micHalvingEnabled) return 1;

          const oldest = pos.reduce((m, p) => Math.min(m, p.openedAt || Date.now()), Date.now());

          const micPositions = (this.positions || []).filter(p => p._mic);
          if (!micPositions.length) return;
          const totalMargin = micPositions.reduce((s, p) => s + (p.margin || 0), 0);
          const totalUPnL   = micPositions.reduce((s, p) => s + (p.upnl   || 0), 0);
          const avgMargin   = totalMargin / micPositions.length;
          const halvMul     = this._micHalvingMultiplier();
          const threshold   = avgMargin * ((this.cfg.micCascadePct ?? 25) / 100) * halvMul;
          if (totalUPnL >= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            this.log(`[MIC] 🌊 Cascade triggered — collective uPnL +${totalUPnL.toFixed(4)} ≥ ${threshold.toFixed(4)} USDT (${this.cfg.micCascadePct ?? 25}%${halvNote} of ${avgMargin.toFixed(4)} avg margin × ${micPositions.length} pos) — bailing ${micPositions.length} position(s)`, 'info');
            this._logBatchBegin?.();
            try {
              for (const pos of micPositions) {
                await this.pseudoClosePosition(pos, 'cascade');
              }

          const micPositions = (this.positions || []).filter(p => p._mic);
          if (!micPositions.length) return;
          const totalMargin = micPositions.reduce((s, p) => s + (p.margin || 0), 0);
          const totalUPnL   = micPositions.reduce((s, p) => s + (p.upnl   || 0), 0);
          const avgMargin   = totalMargin / micPositions.length;
          const halvMul     = this._micHalvingMultiplier();
          const threshold   = -(avgMargin * ((this.cfg.micSacrificePct ?? 25) / 100) * halvMul);
          if (totalUPnL <= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            if (this.cfg.micRollingSacrificeEnabled) {
              const oldest = micPositions.reduce((a, b) => (a.openedAt || 0) <= (b.openedAt || 0) ? a : b);
              this.log(`[MIC] 🩸 Rolling sacrifice — uPnL ${totalUPnL.toFixed(4)} ≤ ${threshold.toFixed(4)} USDT (${this.cfg.micSacrificePct ?? 25}%${halvNote}) — closing oldest: ${oldest.symbol}`, 'info');
              await this.pseudoClosePosition(oldest, 'sacrifice');
            } else {
              this.log(`[MIC] 🩸 Sacrifice triggered — collective uPnL ${totalUPnL.toFixed(4)} ≤ ${threshold.toFixed(4)} USDT (${this.cfg.micSacrificePct ?? 25}%${halvNote} of ${avgMargin.toFixed(4)} avg margin × ${micPositions.length} pos) — bailing ${micPositions.length} position(s)`, 'info');
              this._logBatchBegin?.();
              try {
                for (const pos of micPositions) {
                  await this.pseudoClosePosition(pos, 'sacrifice');
                }
              } finally { this._logBatchEnd?.('[MIC] 🩸 Sacrifice roll-up'); }

          }
        },

        async runScan() {
          this._micFadeAwayLocked = false;
          await this._micCheckFadeAway();
          await this._micCheckLiqFadeAway();
          await this._micCheckCascade();
          await this._micCheckSacrifice();
          const tsBefore = this._lastAllTickersAt || 0;
          await _origScan.call(this);
          // If _origScan returned without fetching fresh tickers (halt/lock/cache-hit after a
          // halt cleared), _lastAllTickersAt is unchanged. Reset _micLastActedAt so that the
          // next genuine fresh fetch is not silently skipped by the dedup check.
          if ((this._lastAllTickersAt || 0) === tsBefore && tsBefore === (this._micLastActedAt || 0)) {

          }
          await this._micRunScan();

        async _micCheckFadeAway() {
          if (!this.cfg.micFadeAwayEnabled) { this._micStructureBlocked = false; return; }
          if (this._micFadeAwayLocked) return;
          const micPositions = (this.positions || []).filter(p => p._mic);
          if (!micPositions.length) { this._micStructureBlocked = false; return; }
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const lossTrig = baseMargin * (this.cfg.micFadeAwayLossPct ?? 25) / 100;
          const inLoss = micPositions.some(p => (p.unrealizedPnl ?? p.uPnl ?? 0) <= -lossTrig);
          const now = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          let faCache;
          if (inLoss) {
            // Position past loss threshold — fresh kline fetch to confirm structure
            const cap = this.cfg.micKlineScanCap ?? 50;
            const allTickers = this._lastAllTickers || [];
            let syms = allTickers
              .filter(t => t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT' && parseFloat(t.lastPrice || 0) >= 0.001)
              .map(t => t.symbol);
            if (syms.length > cap) {
              for (let i = syms.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [syms[i], syms[j]] = [syms[j], syms[i]];
              }
              syms = syms.slice(0, cap);
            }
            if (!syms.length) return;
            faCache = {};
            const CONC = 10;
            for (let i = 0; i < syms.length; i += CONC) {
              await Promise.all(syms.slice(i, i + CONC).map(async sym => {
                try {
                  const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                  if (!r.ok) return;
                  const d = await r.json();
                  const list = d?.result?.list;
                  if (!list || list.length < 2) return;
                  const candle = list[1];
                  faCache[sym] = { candleStart: parseInt(candle[0]), open: parseFloat(candle[1]), close: parseFloat(candle[4]) };
                } catch(e) {}
              }));
            }
          } else {
            // Normal scan path — use cached klines from this cycle
            faCache = this._micKlineCache || {};
          }
          let red = 0, green = 0;
          for (const e of Object.values(faCache)) {
            if (e.candleStart !== lastHourStart) continue;
            if (e.close < e.open) red++;
            else if (e.close > e.open) green++;
          }
          const total = red + green;
          if (!total) return;
          const threshold = (this.cfg.micFadeAwayPct ?? 50) / 100;
          if (red / total >= threshold) {
            if (this.cfg.micFadeAwayBlockEntries) this._micStructureBlocked = true;
            const oldest = micPositions.reduce((a, b) => (a.openedAt || 0) <= (b.openedAt || 0) ? a : b);
            this.log(`[MIC] 🌬 Fade Away — ${red}R/${green}G (${(red / total * 100).toFixed(0)}% bearish ≥ ${this.cfg.micFadeAwayPct ?? 50}%) — closing oldest: ${oldest.symbol}${this.cfg.micFadeAwayBlockEntries ? ' | entries blocked' : ''}`, 'info');
            await this.pseudoClosePosition(oldest, 'sacrifice');
          } else {
            if (this._micStructureBlocked) this.log('[MIC] 🌬 Entry block lifted — structure recovered', 'info');

            this._micFadeAwayLocked = true;
            this.log(`[MIC] 🌬 Fade Away — ${red}R/${green}G — structure ok, locked until next scan`, 'info');
          }
        },

        _micLiqScorecardBias(crit) {
          // Returns 'bad', 'good', or null (no data / tie) by reading AF slot scorecard from localStorage.
          // Counts how many slots containing `crit` are in net profit vs net loss (from Chaser's perspective).
          try {
            const raw = JSON.parse(localStorage.getItem('__everwinter_scorecard_v1') || 'null');
            if (!Array.isArray(raw) || !raw.length) return null;
            const cut = Date.now() - 30 * 24 * 3600 * 1000;
            const map = {};
            for (const r of raw) {
              if (r.ts < cut || !Array.isArray(r.criteria) || !r.criteria.some(c => c === crit || c.startsWith(crit))) continue;
              const key = [...r.criteria].sort().join(',');
              if (!map[key]) map[key] = { totalPnl: 0 };
              const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
              map[key].totalPnl += r.source === 'chaser' ? pnl : -pnl;
            }
            const slots = Object.values(map);
            if (!slots.length) return null;
            let profitSlots = 0, lossSlots = 0;
            for (const s of slots) {
              if (s.totalPnl > 0) profitSlots++;
              else if (s.totalPnl < 0) lossSlots++;
            }
            if (lossSlots > profitSlots) return 'bad';
            if (profitSlots > lossSlots) return 'good';
            return null;
          } catch(_) { return null; }
        },

        async _micCheckLiqFadeAway() {
          if (!this.cfg.micLiqFadeEnabled) { this._micLiqBlocked = false; return; }
          const sharedLiq = this._sharedRead('liqResults');
          const combined = { ...(sharedLiq?.data || {}), ...(this._liqResults || {}) };
          const results = Object.values(combined);
          if (!results.length) return;
          let totalS = 0, totalB = 0;
          for (const r of results) { totalS += r.sLiqRaw || 0; totalB += r.bLiqRaw || 0; }
          const total = totalS + totalB;
          if (!total) return;
          const threshold = (this.cfg.micLiqFadePct ?? 50) / 100;
          this._micLiqBias = this._micLiqScorecardBias('sliq');
          if (totalS / total >= threshold) {
            if (this._micLiqBias !== 'bad') {
              // S-Liq dominant but no bad history — don't trigger
              if (this._micLiqBlocked) this.log(`[MIC] 🥵 Liq block not triggered — S-Liq historically ${this._micLiqBias === 'good' ? 'good' : 'unknown (no scorecard data)'}`, 'info');
              this._micLiqBlocked = false;
              return;
            }
            if (this.cfg.micLiqFadeBlockEntries) this._micLiqBlocked = true;
            const micPositions = (this.positions || []).filter(p => p._mic);
            if (micPositions.length) {
              const oldest = micPositions.reduce((a, b) => (a.openedAt || 0) <= (b.openedAt || 0) ? a : b);
              this.log(`[MIC] 🥵 Liq Fade Away — S-Liq ${(totalS / total * 100).toFixed(0)}% ≥ ${this.cfg.micLiqFadePct ?? 50}% (historically bad) — closing oldest: ${oldest.symbol}${this.cfg.micLiqFadeBlockEntries ? ' | entries blocked' : ''}`, 'info');
              await this.pseudoClosePosition(oldest, 'sacrifice');
            }
          } else {
            if (this._micLiqBlocked) this.log('[MIC] 🥵 Liq Fade Away — block lifted', 'info');
            this._micLiqBlocked = false;
          }
        },

        async _micRunScan() {
          if (!this.cfg.micEnabled) return;
          if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) {
            this.log(`[MIC] 💡 Skipped — ${this._isGainsLocked?.() ? 'gains lock' : 'drawdown halt'} active`, 'info');
            return;
          }
          if (this._micStructureBlocked) {
            this.log('[MIC] 🌬 Entries blocked — bad market structure', 'info');
            return;
          }
          if (this._micLiqBlocked) {
            this.log('[MIC] 🥵 Entries blocked — bad liq structure', 'info');
            return;
          }

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;

          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._micLastActedAt) return;

          // Non-blocked entry slots
          const slots = this._micEffectiveSlots();

          // Blocked slots — scanned to graylist matching tickers, never used for entry
          const blockedSlotKeys = new Set(
            Object.entries(this.micBlockedSlots || {})
              .filter(([, v]) => v === 'blocked')
              .map(([k]) => k)
          );
          const allRawSlots = this.cfg.micAutoSlots
            ? this._micGenerateCombos(this.cfg.micAutoSlotSize ?? 2)
            : (this.cfg.micSlots || []).filter(s => s.length > 0);
          const blockedSlots = blockedSlotKeys.size
            ? allRawSlots.filter(s => blockedSlotKeys.has([...s].sort().join(',')))
            : [];

          if (!slots.length && !blockedSlots.length) {
            this._micLastActedAt = freshAt;
            this.log('[MIC] 💡 No active slots — skipping', 'info');
            return;
          }

          const frThreshold = this.cfg.micFrThreshold ?? 0.1;
          const activeSyms  = new Set((this.positions || []).map(p => p.symbol));

          // Include blocked slots when deciding whether to prefetch mcap/klines
          const allSlots   = [...slots, ...blockedSlots];
          const needsMcap  = allSlots.some(s => s.includes('>10pct') || s.includes('<10pct'));
          const needsKline = allSlots.some(s => s.includes('lsa') || s.includes('lba') || s.includes('rasl') || s.includes('rabl'));

          const _glNow = Date.now();
          const _glTtl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3_600_000;
          const _slTtl = (this.cfg.micBlockedSlotCooldownHours ?? 6) * 3_600_000;
          if (!this._micSlotGraylist) this._micSlotGraylist = {};
          const basePool = allTickers.filter(t =>
            t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
            && parseFloat(t.lastPrice || 0) >= 0.001
            && !activeSyms.has(t.symbol)
            && !(this._isSymbolBanned?.(t.symbol))
            && !((this._tickerGraylist?.[t.symbol] ?? 0) > 0 && _glNow - this._tickerGraylist[t.symbol] < _glTtl)
            && !((this._micSlotGraylist[t.symbol] ?? 0) > 0 && _glNow - this._micSlotGraylist[t.symbol] < _slTtl)
          );

          // Resolve market caps for vol/mcap criteria if any slot requires them.
          const mcapMap = {};
          if (needsMcap) {
            const bases = basePool.map(t => t.symbol.replace(/USDT$/i, '').toLowerCase());
            await this._micPrefetchMcaps(bases);
            for (const t of basePool) {
              const mcap = this._micGetMcapSync(t.symbol.replace(/USDT$/i, '').toLowerCase());
              if (mcap) mcapMap[t.symbol] = mcap;
            }
          }

          if (needsKline) {
            const cap = this.cfg.micKlineScanCap ?? 50;
            let klineSyms = basePool.map(t => t.symbol);
            if (klineSyms.length > cap) {
              for (let i = klineSyms.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [klineSyms[i], klineSyms[j]] = [klineSyms[j], klineSyms[i]];
              }
              klineSyms = klineSyms.slice(0, cap);
            }
            await this._micPrefetchKlines(klineSyms);
          }

          const klineVolMin = this.cfg.micKlineVolMin ?? 25;
          const klineVolMax = this.cfg.micKlineVolMax ?? 50;
          const checkCrit = (c, fr, is24hUp, ratio, t) => {
            if (c === '+fund')  return fr >= frThreshold;
            if (c === '-fund')  return fr <= -frThreshold;
            if (c === '+24h')   return is24hUp;
            if (c === '-24h')   return !is24hUp;
            if (c === '>10pct') return ratio !== null && ratio > 0.10;
            if (c === '<10pct') return ratio !== null && ratio < 0.10;
            if (c === 'lsa' || c === 'lba' || c === 'rasl' || c === 'rabl') {
              const kline = this._micGetKlineSync(t.symbol);
              if (!kline) return false;
              const avgHourly = parseFloat(t.volume24h || 0) / 24;
              if (avgHourly <= 0) return false;
              const mult = kline.volume / avgHourly;
              let inBand;
              if (c === 'lsa' || c === 'lba') {
                inBand = mult >= 1 + klineVolMin / 100 && mult <= 1 + klineVolMax / 100;
              } else {
                inBand = mult >= 1 - klineVolMax / 100 && mult <= 1 - klineVolMin / 100;
              }
              if (!inBand) return false;
              return (c === 'lsa' || c === 'rasl') ? kline.close < kline.open : kline.close > kline.open;
            }
            if (/^sliq/.test(c) || /^bliq/.test(c)) {
              const kind = c.startsWith('sliq') ? 'sliq' : 'bliq';
              const r = this._liqResults?.[t.symbol];
              if (!r) return false;
              const pct = kind === 'sliq' ? r.sLiqPct : r.bLiqPct;
              if (pct < (this.cfg.ashLiqThresholdPct ?? 50)) return false;
              const liqM = c.match(/^(?:sliq|bliq)([<>])([+-]?\d+)$/);
              if (!liqM) return true;
              const depth = kind === 'sliq' ? (r.sDepth ?? 0) : (r.bDepth ?? 0);
              return liqM[1] === '>' ? depth >= parseInt(liqM[2], 10) : depth <= parseInt(liqM[2], 10);
            }
            return false;
          };

          // Blocked slot scan: graylist tickers that match any blocked slot
          if (blockedSlots.length) {
            let newlyGraylisted = 0;
            for (const t of basePool) {
              const fr      = parseFloat(t.fundingRate || 0) * 100;
              const is24hUp = parseFloat(t.price24hPcnt || 0) > 0;
              const mcap    = mcapMap[t.symbol];
              const ratio   = mcap ? parseFloat(t.turnover24h || 0) / mcap : null;
              if (blockedSlots.some(s => s.every(c => checkCrit(c, fr, is24hUp, ratio, t)))) {
                this._micSlotGraylist[t.symbol] = _glNow;
                newlyGraylisted++;
              }
            }
            if (newlyGraylisted) this.log(`[MIC] ⛔ ${newlyGraylisted} ticker(s) graylisted for ${this.cfg.micBlockedSlotCooldownHours ?? 6}h (blocked slot match)`, 'info');
          }

          this._micLastActedAt = freshAt;

          // Entry logic only runs when there are non-blocked slots and capacity
          if (!slots.length) return;
          if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) return;

          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.micShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.micShareCapPct ?? 100) / 100)));
            const micCount = (this.positions || []).filter(p => p._mic).length;
            headroom = Math.min(headroom, capSlots - micCount);
            if (headroom < 1) {
              this.log('[MIC] 💡 Share cap reached — no slots available', 'info');
              return;
            }
          }
          const picks = Math.min(Math.max(1, Math.round(this.cfg.micPicks ?? 5)), headroom);

          // Build pool: non-blocked slots only, excluding newly slot-graylisted tickers
          const pool = basePool
            .map(t => {
              if ((this._micSlotGraylist[t.symbol] ?? 0) > 0 && _glNow - this._micSlotGraylist[t.symbol] < _slTtl) return null;
              const fr       = parseFloat(t.fundingRate || 0) * 100;
              const is24hUp  = parseFloat(t.price24hPcnt || 0) > 0;
              const mcap     = mcapMap[t.symbol];
              const ratio    = mcap ? parseFloat(t.turnover24h || 0) / mcap : null;
              const slotIdx  = slots.findIndex(s => s.every(c => checkCrit(c, fr, is24hUp, ratio, t)));
              return slotIdx !== -1 ? { t, criteria: slots[slotIdx], slotIdx } : null;
            })
            .filter(Boolean)
            .sort((a, b) => a.slotIdx - b.slotIdx || Math.abs(parseFloat(b.t.fundingRate || 0)) - Math.abs(parseFloat(a.t.fundingRate || 0)));

          if (!pool.length) {
            const slotDesc = slots.map(s => `[${s.join(',')}]`).join(' ');
            const posFund  = basePool.filter(t => parseFloat(t.fundingRate || 0) * 100 >= frThreshold).length;
            const negFund  = basePool.filter(t => parseFloat(t.fundingRate || 0) * 100 <= -frThreshold).length;
            const up24h    = basePool.filter(t => parseFloat(t.price24hPcnt || 0) > 0).length;
            const mcapHits  = Object.keys(mcapMap).length;
            const klineHits = needsKline ? Object.keys(this._micKlineCache||{}).length : 0;
            const mcapNote  = needsMcap  ? ` mcap:${mcapHits}/${basePool.length}`  : '';
            const klineNote = needsKline ? ` kline:${klineHits}/${basePool.length}` : '';
            this.log(`[MIC] 💡 No tickers matched slots ${slotDesc} — pool:${basePool.length} +fund:${posFund} -fund:${negFund} +24h:${up24h}${mcapNote}${klineNote}`, 'info');
            return;
          }

          // Quota per slot = floor(maxPos / slotCount), minimum 1; later slots lose the remainder.
          // Accounts for already-open positions per slot so deferred capacity carries across cycles.
          const maxPos     = this.cfg.maxPos ?? 5;
          const openPerSlot = new Array(slots.length).fill(0);
          for (const p of (this.positions || []).filter(p => p._mic)) {
            const si = p._micSlotIdx ?? 0;
            if (si < slots.length) openPerSlot[si]++;
          }
          const baseQuota  = Math.max(1, Math.floor(maxPos / slots.length));
          const slotQuota  = slots.map((_, i) => Math.max(0, baseQuota - openPerSlot[i]));
          const slotOpened = new Array(slots.length).fill(0);

          let opened = 0, attempted = 0, blocked = 0, slotSkipped = 0;
          this._logBatchBegin?.();
          try {
            for (const { t, criteria, slotIdx } of pool) {
              if (opened >= picks) break;
              if ((this.positions?.length ?? 0) >= maxPos) break;
              if (slotQuota[slotIdx] <= 0) { slotSkipped++; continue; }
              if (slotOpened[slotIdx] >= slotQuota[slotIdx]) { slotSkipped++; continue; }
              attempted++;
              if (await this._micOpen(t, criteria, slotIdx)) { opened++; slotOpened[slotIdx]++; }
              else { blocked++; }
            }
          } finally { this._logBatchEnd?.('[MIC] 💡 Entry roll-up'); }
          const _micBlockNote = blocked     ? `, ${blocked} blocked (qty/lev)`  : '';
          const _micSkipNote  = slotSkipped ? `, ${slotSkipped} slot-skipped`   : '';
          const openedParts   = slotOpened.map((n, i) => n > 0 ? (n > 1 ? `s${i+1}(${n})` : `s${i+1}`) : null).filter(Boolean);
          const openedNote    = openedParts.length ? ` via ${openedParts.join(' ')}` : '';
          this.log(`[MIC] 💡 ${pool.length} qualified — ${opened} opened${_micBlockNote}${_micSkipNote}${openedNote}`, 'info');
        },

        async _micOpen(t, criteria, slotIdx) {
          const sym   = t.symbol;
          let price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          try {
            const r  = await fetch(`${this.base}/v5/market/tickers?category=linear&symbol=${sym}`);
            const d  = await r.json();
            const lp = parseFloat(d?.result?.list?.[0]?.lastPrice);
            if (lp > 0) price = lp;
          } catch(e) {}
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const lenBefore = (this.positions || []).length;
          await this.pseudoOpenLong({ symbol: sym, price, change, fundingRate: fr, _mic: true });
          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._mic = true;
            pos._micSlotIdx  = slotIdx ?? 0;
            const _liqR = this._liqResults?.[sym];
            pos._micCriteria = (criteria || []).map(c => {
              if (/^sliq/.test(c)) { const d = _liqR?.sDepth ?? 0; return `sliq${d >= 0 ? '+' : ''}${d}`; }
              if (/^bliq/.test(c)) { const d = _liqR?.bDepth ?? 0; return `bliq${d >= 0 ? '+' : ''}${d}`; }
              return c;
            });
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        // Two-level CoinGecko cache shared via window.__cgCoinList (24h TTL, localStorage).
        // ID cache: base symbol → CoinGecko coin id (session-scoped, permanent).
        // Mcap cache: coin id → { mcap, ts } (1h TTL).
        async _micPrefetchMcaps(bases) {
          if (!this._micCoinIdCache) this._micCoinIdCache = {};
          if (!this._micMcapCache)   this._micMcapCache   = {};
          const now     = Date.now();
          const unknown = bases.filter(b => this._micCoinIdCache[b] === undefined);
          if (unknown.length) {
            if (!window.__cgCoinList) {
              try {
                const s = JSON.parse(localStorage.getItem('__cgCoinList') || 'null');
                if (s?.list?.length && Date.now() - s.ts < 86_400_000) window.__cgCoinList = s.list;
              } catch(e) {}
            }
            if (!window.__cgCoinList) {
              try {
                const r = await fetch('https://api.coingecko.com/api/v3/coins/list?include_platform=false');
                if (r.ok) {
                  window.__cgCoinList = await r.json();
                  try { localStorage.setItem('__cgCoinList', JSON.stringify({ list: window.__cgCoinList, ts: Date.now() })); } catch(e) {}
                }
              } catch(e) {}
            }
            if (window.__cgCoinList) {
              for (const base of unknown) {
                const hit = window.__cgCoinList.find(c => c.symbol === base);
                this._micCoinIdCache[base] = hit?.id || '';
              }
            }
          }
          // Seed from shared mcap — avoids refetching what partner already resolved
          const sharedMcap = this._sharedRead('mcap');
          const mcapTtl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3_600_000;
          if (sharedMcap?.data) {
            for (const [id, entry] of Object.entries(sharedMcap.data)) {
              if (entry?.mcap && (now - (entry.ts || 0)) < mcapTtl && !this._micMcapCache[id]) {
                this._micMcapCache[id] = { mcap: entry.mcap, ts: entry.ts };
              }
            }
          }
          const ids = [...new Set(
            bases.map(b => this._micCoinIdCache[b]).filter(id => {
              if (!id) return false;
              const c = this._micMcapCache[id];
              return !c || now - c.ts >= mcapTtl;
            })
          )];
          if (!ids.length) return;
          try {
            const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=usd&include_market_cap=true`);
            if (r.ok) {
              const d = await r.json();
              const _patch = {};
              for (const id of ids) {
                const mcap = d?.[id]?.usd_market_cap;
                if (mcap) {
                  this._micMcapCache[id] = { mcap, ts: now };
                  _patch[id] = { mcap, ts: now };
                }
              }
              if (Object.keys(_patch).length) this._sharedMerge('mcap', _patch);
            }
          } catch(e) {}
        },

        _micGetMcapSync(base) {
          const id = this._micCoinIdCache?.[base];
          if (!id) return null;
          const c = this._micMcapCache?.[id];
          return (c && Date.now() - c.ts < (this.cfg.bulkTickerCooldownHours ?? 1) * 3_600_000) ? c.mcap : null;
        },

        _micGenerateCombos(size) {
          const all = ['+fund','-fund','+24h','-24h','>10pct','<10pct','lsa','lba','rasl','rabl','sliq','bliq'];
          const result = [];
          const pick = (start, current) => {
            if (current.length === size) { result.push([...current]); return; }
            for (let i = start; i < all.length; i++) {
              current.push(all[i]);
              pick(i + 1, current);
              current.pop();
            }
          };
          pick(0, []);
          return result;
        },

        _micEffectiveSlots() {
          const raw = this.cfg.micAutoSlots
            ? this._micGenerateCombos(this.cfg.micAutoSlotSize ?? 2)
            : (this.cfg.micSlots || []).filter(s => s.length > 0);
          const blocks = this.micBlockedSlots || {};
          const filtered = Object.keys(blocks).length ? raw.filter(s => !blocks[[...s].sort().join(',')]) : raw;
          const ranks = this.micSlotRanks || {};
          if (!Object.keys(ranks).length) return filtered;
          return filtered.slice().sort((a, b) => {
            const ka = [...a].sort().join(','), kb = [...b].sort().join(',');
            const ra = ranks[ka] ?? 0, rb = ranks[kb] ?? 0;
            return rb - ra;
          });
        },

        async _micPrefetchKlines(symbols) {
          const now           = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const scanMs        = (this.cfg.scanMins || 15) * 60 * 1000;
          const sharedKlines  = this._sharedRead('klines_1h_last');
          const seedCache = {};
          if (sharedKlines?.data) {
            for (const sym of symbols) {
              const e = sharedKlines.data[sym];
              if (e && e.candleStart >= lastHourStart && e.ts && (now - e.ts) < scanMs) seedCache[sym] = e;
            }
          }
          this._micKlineCache = { ...seedCache };
          const toFetch = symbols.filter(sym => !seedCache[sym]);
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                this._micKlineCache[sym] = {
                  candleStart: parseInt(candle[0]),
                  open:  parseFloat(candle[1]),
                  close: parseFloat(candle[4]),
                  volume: parseFloat(candle[5]),
                  ts: now,
                };
              } catch(e) {}
            }));
          }
          const patch = {};
          for (const sym of toFetch) { if (this._micKlineCache[sym]) patch[sym] = this._micKlineCache[sym]; }
          if (Object.keys(patch).length) this._sharedMerge('klines_1h_last', patch);
        },

        _micGetKlineSync(symbol) {
          return this._micKlineCache?.[symbol] || null;
        },

      });
    },
  };
})();
</script>
