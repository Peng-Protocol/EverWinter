              if (!secondary.every(c => this._micCheckCrit(c, fr, pec, t, ocResultsMap))) continue;

              // Matched — annotate and score against this same-type slot subset. Co-Qualifying
              // Penalty against slots anchored on a different liq type or 0liq is moot: only one
              // liq classification can be true for this ticker at this moment, so any such slot
              // would fail its own anchor check anyway.
              const annotCrits = slot.map(c => this._micAnnotateLiveCrit(c, t, type, depth, ocResultsMap));

              // Halted or Slot-Blocked: everything above (banlist, direction lock, cross-win
              // graylist, criteria match) is exactly what a real entry would have checked, so
              // this is a genuine match a real entry would have taken were it not blocked — log
              // it as a hist target and stop, same as the real path does below. Slot Blocking
              // still lets hist scoring log through it so the score has data to recover with.
              if (halted || this._micIsEntryBlocked(anchor, annotCrits)) {
                return;
              }

              let compositeScore = 0;
              if (this.cfg.afCoQualPenaltyEnabled) {
                const bestScore = slot.reduce((s, c, j) => s + this._micScaledRank(c, annotCrits[j]), 0);
                let penalty = 0;
                for (let k = 0; k < candidateSlots.length; k++) {
                  if (k === i) continue;
                  const other = candidateSlots[k];
                  if (!this._micCheckLiveLiqCrit(this._micSlotLiqAnchor(other), type, depth)) continue;
                  const otherSecondary = other.filter(c => c !== this._micSlotLiqAnchor(other));
                  if (!otherSecondary.every(c => this._micCheckCrit(c, fr, pec, t, ocResultsMap))) continue;
                  const otherAnnot = other.map(c => this._micAnnotateLiveCrit(c, t, type, depth, ocResultsMap));
                  const sc = other.reduce((s, c, j) => s + this._micScaledRank(c, otherAnnot[j]), 0);
                  if (sc < 0) penalty += sc;
                }
                compositeScore = bestScore + penalty;
              }

              await this._micLiveTryOpen(t, slot, annotCrits, compositeScore, type, depth);
              return;
            }
          } finally {
            this._micOpening.delete(sym);
          }
        },

        async _micLiveTryOpen(t, criteria, annotCrits, compositeScore, liqType, depth) {
          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.micShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.micShareCapPct ?? 100) / 100)));
            const micCount = (this.positions || []).filter(p => p._mic).length;
            headroom = Math.min(headroom, capSlots - micCount);
          }
          if (headroom >= 1) return await this._micLiveOpen(t, criteria, annotCrits, compositeScore, liqType, depth);
          if (!(this.cfg.micSubstitutionEnabled ?? true)) return false;
          return await this._micLiveTrySubstitute(t, criteria, annotCrits, compositeScore, liqType, depth);
        },
        // Path-B (live) substitution uses the same cross-strategy, score-gated swap test
        // as the scan-time version — clearing the depth threshold alone isn't sufficient.
        async _micLiveTrySubstitute(t, criteria, annotCrits, compositeScore, liqType, depth) {
          const now            = Date.now();
          const minAgeMs       = (this.cfg.micSubstitutionMinAgeMins ?? 10) * 60000;
          const protectWinners = this.cfg.micSubstitutionProtectWinners ?? true;
          const baseMargin     = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const marginThreshold = baseMargin * ((this.cfg.micSubstitutionMarginPct ?? 5) / 100);

          const eligible = (this.positions || []).filter(p => {
            if ((now - (p.openedAt || 0)) < minAgeMs) return false;
            if (protectWinners && (p.upnl || 0) > 0) return false;
            return true;
          });
          if (!eligible.length) return false;

          const scoreOf = p => p._mic ? (p._micCompositeScore ?? 0) : -Infinity;
          eligible.sort((a, b) => scoreOf(a) - scoreOf(b));
          const worst      = eligible[0];
          const worstScore = scoreOf(worst);
          if ((compositeScore - worstScore) < marginThreshold) return false;

          this.log(`[MIC] 🔁 Live Substitution — closing ${worst.symbol} (score ${worstScore === -Infinity ? 'n/a' : worstScore.toFixed(4)}) for ${t.symbol} (score ${compositeScore.toFixed(4)}), Δ${(compositeScore - worstScore).toFixed(4)} ≥ ${marginThreshold.toFixed(4)} margin`, 'info');
          await this.pseudoClosePosition(worst, 'substitution');
          return await this._micLiveOpen(t, criteria, annotCrits, compositeScore, liqType, depth);
        },

        // All _mic* tagging fields go into pseudoOpenLong's candidate object (see _micOpen's
        // comment above for why — the atomic tag-on-open avoids a momentary "Multi" badge).
        async _micLiveOpen(t, criteria, annotCrits, compositeScore, liqType, depth) {
          const sym = t.symbol;
          let price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          try {
            const r  = await fetch(`${this.base}/v5/market/tickers?category=linear&symbol=${sym}`);
            const d  = await r.json();
            const lp = parseFloat(d?.result?.list?.[0]?.lastPrice);
            if (lp > 0) price = lp;
          } catch(e) {}
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const pos = await this.pseudoOpenLong({
            symbol: sym, price, change, fundingRate: fr,
            _mic: true,
            _micPathA: false, // live/reactive entry
            _micSlotIdx: 0,
            _micCompositeScore: compositeScore ?? 0,
            _micLiqType: liqType,
            _micLiqDepth: depth,
            _micCriteria: annotCrits,
          });
          if (pos) {
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        // The liq criterion a slot is anchored on, or null if the slot has none. sliq/bliq/
        // msliq/mbliq are the live-only anchors; 0liq is the closed-cycle-only anchor. null no
        // longer means "invalid" outright — it also describes a valid Past-1 slot, IF 'past1' is
        // an active presence mode (see _micEffectiveSlots, which is where that distinction gets
        // made; this function only reports what's literally in the slot).
        _micSlotLiqAnchor(slot) {
          return (slot || []).find(c => LIQ_TYPES.some(t => c.startsWith(t)) || c === '0liq') || null;
        },

        // Every other reader of the mode should call this, not cfg.micLiqPresenceModes directly.
        // Always non-empty — falls back to ['1'] the same way the old single-mode getter did.
        _micEffectivePresenceModes() {
          const m = this.cfg.micLiqPresenceModes;
          return Array.isArray(m) && m.length ? m : ['1'];
        },

        // Multi-select toggle for the Liquidation Presence buttons. Refuses to drop the last
        // active mode — a slot with no reachable anchor type would never match anything.
        _micToggleLiqMode(v) {
          if (this.cfgLocked) return;
          const cur = new Set(this._micEffectivePresenceModes());
          if (cur.has(v)) {
            if (cur.size <= 1) return;
            cur.delete(v);
          } else {
            cur.add(v);
          }
          this.cfg.micLiqPresenceModes = ['1','0','past1'].filter(m => cur.has(m));
          this.persist();
        },

        // Shared collapsed-rank lookup (own + partner + historical PnL, see micCollapsedSlotRanks)
        // for a single criterion key. Every criterion's rank accumulates under a sign-suffixed key
        // (e.g. 'sliq+', 'fund-', 'pecob+'), so both variants are summed — PEC is tiered like
        // fund/vm/iot (always non-negative, '+' only) rather than a bare unsigned key like 0liq.
        _micCritScore(c) {
          const ranks = this.micCollapsedSlotRanks || {};
          return (ranks[c] ?? 0) + (ranks[c + '+'] ?? 0) + (ranks[c + '-'] ?? 0);
        },

        // Slot Blocking: true once a criterion's collapsed score is a loss beyond the configured
        // % of base margin. Auto-clears the moment the score recovers — no manual reset needed.
        _micIsCritBlocked(c) {
          if (!this.cfg.micSlotBlockEnabled) return false;
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const threshold  = baseMargin * ((this.cfg.micSlotBlockPct ?? 25) / 100);
          return this._micCritScore(c) <= -threshold;
        },

        // Always checks the triggering liq-anchor type. micSlotBlockTags additionally checks
        // every criterion selected in cfg.micSlotBlockCriteria (see the Blockable Criteria
        // picker) — configurable rather than a hardcoded set, so any secondary criterion
        // (including fund) can be opted in. Nothing is blockable by default beyond the
        // pre-existing PEC/kline set — see DEFAULT_BLOCKABLE_CRITS.
        _micIsEntryBlocked(anchor, annotCrits) {
          if (this._micIsCritBlocked(anchor)) return true;
          if (!this.cfg.micSlotBlockTags) return false;
          const blockable = (this.cfg.micSlotBlockCriteria || []).filter(Boolean);
          if (!blockable.length) return false;
          const rx = new RegExp('^(' + blockable.join('|') + ')[+-]');
          return (annotCrits || []).some(c => rx.test(c) ? this._micIsCritBlocked(c.replace(/\d+$/, '')) : false);
        },

        // true if this liq anchor is allowed under the current Liquidation Presence modes.
        // Only ever called with a real criterion (0liq or a live type) — Past-1 has no anchor
        // criterion, so it's never passed in here; see _micEffectiveSlots/_micAutoQualify for
        // where the 'past1' mode is actually consulted.
        _micAnchorAllowed(anchorCrit) {
          const modes = this._micEffectivePresenceModes();
          if (anchorCrit === '0liq') return modes.includes('0');
          return modes.includes('1'); // sliq/bliq/msliq/mbliq
        },

        // Reads the same shared graylist the host writes on every close (any strategy, keyed by
        // symbol) — a symbol stays blocked for one bulk-ticker cooldown window after its position
        // closes. 'both' (default) blocks regardless of win/loss; 'losers' lets a symbol that
        // just closed in profit re-trigger immediately. Ported from Liquid-Diver.
        _micIsReentryBlocked(sym) {
          const g = this._tickerGraylist?.[sym];
          if (!g || !(g.ts > 0)) return false;
          const ttl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3600000;
          if (Date.now() - g.ts >= ttl) return false;
          if ((this.cfg.micReentryBlockMode ?? 'losers') === 'losers') return g.isWin === false;
          return true;
        },
        // Records closed-batch liquidation stats for PEC freshness and Past-1 candidate lookup.
        _micOnLiqClose(results, batch) {
          // Closed-batch pool: every symbol whose surveillance batch just closed lands here for
          // micPecFreshCycles cycles, carrying its dominance stats alongside the timestamp. This
          // is the shared foundation for two consumers: PEC (see _micPecFreshCandidates, which
          // only needs the timestamp) and the past1 liq anchor (see _micPast1FreshSymbols, which
          // needs sLiqPct/bLiqPct/sLiqRaw/bLiqRaw/sDepth/bDepth to tell "had some liquidation
          // but never crossed the live threshold" apart from "genuinely clean"). Tracked unconditionally.
          if (!this._micPecPool) this._micPecPool = {};
          const _now = Date.now();
          for (const r of (results || [])) {
            if (!r?.sym) continue;
            this._micPecPool[r.sym] = {
              ts: _now,
              sLiqPct: r.sLiqPct ?? 0, bLiqPct: r.bLiqPct ?? 0,
              sLiqRaw: r.sLiqRaw ?? 0, bLiqRaw: r.bLiqRaw ?? 0,
              sDepth:  r.sDepth  ?? 0, bDepth:  r.bDepth  ?? 0,
            };
          }
        },

        // Retrospective classification of a closed batch's dominance against the same 70%/30%
        // thresholds _micOnLiqMessage checks live (sFrac/bFrac as 0-1 fractions). Shared so the
        // two never drift apart. Returns the live criterion it would have fired, or null.
        _micClassifyLiqDominance(sFrac, bFrac) {
          if (sFrac >= 0.70) return 'sliq';
          if (bFrac >= 0.70) return 'bliq';
          if (sFrac > bFrac && bFrac >= 0.30) return 'msliq';
          if (bFrac > sFrac && sFrac >= 0.30) return 'mbliq';
          return null;
        },

        // past1 candidate set: fresh closed-batch entries (same TTL as PEC, uncapped — this is
        // pure lookup, no fetch) that are liq- — real liquidation happened (sLiqRaw+bLiqRaw > 0,
        // so not 0-Liq's territory) but neither side's raw turnover cleared its own historical
        // average (sDepth/bDepth, the same calcDepth Ashfall already computed against
        // _liqAvgSTurnover/_liqAvgBTurnover) beyond micLiveDepthThreshold (default 1, i.e. "≥1%
        // above average"). This is independent of sell/buy dominance — the 70/30 split
        // (_micClassifyLiqDominance) only labels sliq/bliq/msliq/mbliq for the live path and has
        // no bearing on the liq+/liq-/0-liq classification here. A ticker is liq- (past1) as long
        // as the stronger of its two sides never cleared the threshold; if either side did, it's
        // liq+ and would have fired live already, so it's excluded. Checked against the global
        // threshold (a manual per-slot depth override on a live anchor has no bearing on this
        // pool). Consumed by the scan loop as the match gate for anchorless (Past-1) slots — past1
        // is a path, not a criterion, so this is never called from checkCrit.
        _micPast1FreshSymbols() {
          const pool = this._micPecPool || {};
          const ttl  = (this.cfg.micPecFreshCycles ?? 4) * (this.cfg.scanMins ?? 15) * 60000;
          const threshold = this.cfg.micLiveDepthThreshold ?? 1;
          const now  = Date.now();
          const out  = new Set();
          for (const [sym, e] of Object.entries(pool)) {
            if ((now - e.ts) >= ttl) continue;
            if ((e.sLiqRaw || 0) + (e.bLiqRaw || 0) <= 0) continue; // no liquidation at all — 0-Liq's territory
            const maxDepth = Math.max(e.sDepth ?? 0, e.bDepth ?? 0);
            if (maxDepth >= threshold) continue; // liq+ — a side cleared its average, would have fired live
            out.add(sym); // liq- — real liquidation, but neither side cleared its average
          }
          return out;
        },

        // Auto's minimum-gate qualifier. "Criteria per Slot" (micAutoSlotSize) is a FLOOR, not a
        // fixed count: given an anchor (or null for an anchorless Past-1 match), this evaluates
        // EVERY non-excluded secondary criterion against the ticker and qualifies once at least
        // (size - 1) of them are true (the full size for Past-1, since there's no anchor slot to
        // reserve room for). Unlike the old fixed-size combo system, every true criterion is kept
        // — a ticker exhibiting 5 genuine criteria is scored on all 5, not sliced down to however
        // many the slider happens to say. checkFn(c) -> bool and annotFn(c) -> annotated string
        // are supplied by the caller so this works identically at scan time and live time.
        _micAutoQualify(anchor, checkFn, annotFn) {
          const exclude = new Set(this.cfg.micAutoSlotExclude || []);
          const need = Math.max(0, (this.cfg.micAutoSlotSize ?? 3) - (anchor ? 1 : 0));
          const trueCrits = [];
          for (const c of SECONDARY_CRITS) {
            if (exclude.has(c)) continue;
            if (checkFn(c)) trueCrits.push(c);
          }
          if (trueCrits.length < need) return null;
          const criteria = anchor ? [anchor, ...trueCrits] : trueCrits;
          return { criteria, annotCrits: criteria.map(c => annotFn(c)) };
        },

        // True if Auto mode could produce a qualifying match at all right now — i.e. at least
        // one anchor (or Past-1) is reachable under the current presence modes/exclusions, and
        // enough non-excluded secondary criteria exist to ever reach the minimum. Auto's
        // equivalent of "any active slots" now that there's no generated slot list to check.
        _micAutoActive() {
          if (!this.cfg.micAutoSlots) return false;
          const exclude = new Set(this.cfg.micAutoSlotExclude || []);
          const secAvail = SECONDARY_CRITS.filter(c => !exclude.has(c)).length;
          const minAnchored = Math.max(0, (this.cfg.micAutoSlotSize ?? 3) - 1);
          const anchors = ['sliq','bliq','msliq','mbliq','0liq'].filter(c => !exclude.has(c) && this._micAnchorAllowed(c));
          if (anchors.length && secAvail >= minAnchored) return true;
          if (this._micEffectivePresenceModes().includes('past1') && secAvail >= (this.cfg.micAutoSlotSize ?? 3)) return true;
          return false;
        },

        // Manual mode only now — Auto no longer generates a slot list (see _micAutoQualify).
        // Liquidation presence is mandatory, but that no longer means every slot needs an
        // anchor criterion: an anchorless slot is valid exactly when 'past1' is an active
        // mode (it's a Past-1 slot — see header comment), and an anchored slot is valid when
        // its specific anchor's mode ('0' or '1') is active.
        _micEffectiveSlots() {
          const modes = this._micEffectivePresenceModes();
          const filtered = (this.cfg.micSlots || []).filter(s => s.length > 0).filter(s => {
            const anchor = this._micSlotLiqAnchor(s);
            return anchor ? this._micAnchorAllowed(anchor) : modes.includes('past1');
          });
          if (!Object.keys(this.micCollapsedSlotRanks || {}).length) return filtered;
          return filtered.slice().sort((a, b) => {
            const sa = a.reduce((s, c) => s + this._micCritScore(c), 0);
            const sb = b.reduce((s, c) => s + this._micCritScore(c), 0);
            return sb - sa;
          });
        },

        async _micPrefetchKlines(symbols) {
          const now           = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const scanMs        = (this.cfg.scanMins || 15) * 60 * 1000;
          const sharedKlines  = this._sharedRead('klines_1h_last');
          const seedCache = {};
          if (sharedKlines?.data) {
            for (const sym of symbols) {
              const e = sharedKlines.data[sym];
              if (e && e.candleStart >= lastHourStart && e.ts && (now - e.ts) < scanMs) seedCache[sym] = e;
            }
          }
          this._micKlineCache = { ...seedCache };
          const toFetch = symbols.filter(sym => !seedCache[sym]);
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                this._micKlineCache[sym] = {
                  candleStart: parseInt(candle[0]),
                  open:   parseFloat(candle[1]),
                  high:   parseFloat(candle[2]),
                  low:    parseFloat(candle[3]),
                  close:  parseFloat(candle[4]),
                  volume: parseFloat(candle[5]),
                  ts: now,
                };
              } catch(e) {}
            }));
          }
          const patch = {};
          for (const sym of toFetch) { if (this._micKlineCache[sym]) patch[sym] = this._micKlineCache[sym]; }
          if (Object.keys(patch).length) this._sharedMerge('klines_1h_last', patch);
        },

        _micGetKlineSync(symbol) {
          return this._micKlineCache?.[symbol] || null;
        },

        // PEC candidate pool: tickers whose liq surveillance batch closed within the last
        // micPecFreshCycles scan cycles, capped at micPecScanCap. Draws from the same
        // _micPecPool that past1 uses (see _micOnLiqClose / _micPast1FreshSymbols) — this is
        // just PEC's own capped, timestamp-sorted view of it, since fetching costs bandwidth
        // and past1's lookup doesn't.
        _micPecFreshCandidates() {
          const pool = this._micPecPool || {};
          const ttl  = (this.cfg.micPecFreshCycles ?? 4) * (this.cfg.scanMins ?? 15) * 60000;
          const cap  = this.cfg.micPecScanCap ?? 20;
          const now  = Date.now();
          return Object.entries(pool)
            .filter(([, e]) => (now - e.ts) < ttl)
            .sort((a, b) => b[1].ts - a[1].ts)
            .slice(0, cap)
            .map(([sym]) => sym);
        },

        _micPecIntervalMinutes() {
          const g = this.cfg.micPecGranularity ?? '1h';
          return g === '15m' ? 15 : g === '3h' ? 180 : 60;
        },

        _micPecCandleCount() {
          return Math.round(1440 / this._micPecIntervalMinutes());
        },

        // Price Effect Coefficient for one window: (Close-Open)/(range), mapped to 0-100
        // (50=neutral). Close is always the latest completed candle — only Open/range change
        // per window, so all three timeframes read off the same current price (see PEC.md).
        // Wick-dampened range uses the average sub-candle range instead of window high/low; since
        // that can be smaller than the actual |close-open| displacement, P is clamped to ±1.
        _micCalcPecWindow(candles, windowCount, dampen) {
          if (!candles.length) return null;
          const subset = candles.slice(-windowCount);
          if (!subset.length) return null;
          const open  = subset[0].open;
          const close = candles[candles.length - 1].close;
          let range;
          if (dampen) {
            range = subset.reduce((s, c) => s + (c.high - c.low), 0) / subset.length;
          } else {
            range = Math.max(...subset.map(c => c.high)) - Math.min(...subset.map(c => c.low));
          }
          if (!(range > 0)) return 50;
          let p = (close - open) / range;
          if (p > 1) p = 1; else if (p < -1) p = -1;
          return p * 50 + 50;
        },

        // Fetches enough completed candles at micPecGranularity to cover 24h, then derives the
        // 6h/12h/24h composite index for each symbol. Seeds from the shared cache first (same
        // pattern as _micPrefetchKlines) so MIW doesn't refetch what MIC already pulled this bar.
        // Volume Shape Graph for one window: (V-VO_t)/(VH_t-VL_t), mapped to 0-100 (50=neutral).
        // PEC's math applied to volume instead of price — see VSG.md. V is always the latest
        // completed sub-candle's volume, same one shared across all three windows as PEC's C.
        // No wick-dampening equivalent (VSG.md flags it but doesn't propose it as default).
        _micCalcVsgWindow(candles, windowCount) {
          if (!candles.length) return null;
          const subset = candles.slice(-windowCount);
          if (!subset.length) return null;
          const vOpen = subset[0].volume;
          const v     = candles[candles.length - 1].volume;
          const vHigh = Math.max(...subset.map(c => c.volume));
          const vLow  = Math.min(...subset.map(c => c.volume));
          if (!(vHigh > vLow)) return 50;
          let vp = (v - vOpen) / (vHigh - vLow);
          if (vp > 1) vp = 1; else if (vp < -1) vp = -1;
          return vp * 50 + 50;
        },

        // Fetches enough completed candles at micPecGranularity to cover 24h, then derives the
        // 6h/12h/24h composite index for each symbol. Seeds from the shared cache first (same
        // pattern as _micPrefetchKlines) so MIW doesn't refetch what MIC already pulled this bar.
        async _micPrefetchPec(symbols) {
          if (!symbols || !symbols.length) return;
          const gran         = this.cfg.micPecGranularity ?? '1h';
          const bybitInterval= gran === '15m' ? '15' : gran === '3h' ? '180' : '60';
          const intervalMin  = this._micPecIntervalMinutes();
          const total        = this._micPecCandleCount();
          const barMs        = intervalMin * 60 * 1000;
          const now          = Date.now();
          const lastBarStart = Math.floor(now / barMs) * barMs - barMs;
          const scanMs       = (this.cfg.scanMins || 15) * 60 * 1000;
          const dampen       = !!this.cfg.micPecWickDampen;
          const sharedKey    = `pec_${gran}_last`;
          const shared       = this._sharedRead(sharedKey);
          const seedCache    = {};
          if (shared?.data) {
            for (const sym of symbols) {
              const e = shared.data[sym];
              if (e && e.candleStart >= lastBarStart && e.ts && (now - e.ts) < scanMs) seedCache[sym] = e;
            }
          }
          // Ashfall's full-universe PEC/VSG prefetch (Pre-Screening's "PEC/VSG Universe
          // Weighing") runs in this same page instance and already covers every USDT ticker on
          // the current bulk-ticker window — seed straight from it before touching the network,
          // so this narrow path only ever fetches what that pass missed (a symbol outside the
          // USDT set, a request that failed this cycle, or Universe Weighing being off).
          // Gated on _afPecUniverseFetchedAt matching the current bulk window rather than a
          // scanMs recency check: the candle itself is only ever as fresh as the last completed
          // bar either way, so what actually matters is whether this reading is from the current
          // window or a stale prior one, not how many minutes ago it was fetched.
          const uniCache = this._afPecUniverseCache;
          if (uniCache && this._afPecUniverseFetchedAt === this._lastAllTickersAt) {
            for (const sym of symbols) {
              if (seedCache[sym]) continue;
              const u = uniCache[sym];
              if (u?.pec?.['6h'] != null) {
                seedCache[sym] = { '6h': u.pec['6h'], '12h': u.pec['12h'], '24h': u.pec['24h'], vsg: u.vsg, candleStart: lastBarStart, ts: now };
              }
            }
          }
          if (!this._micPecCache) this._micPecCache = {};
          Object.assign(this._micPecCache, seedCache);
          const toFetch = symbols.filter(sym => !seedCache[sym]);
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=${bybitInterval}&limit=${total + 1}`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                // list[0] is the current, still-forming candle — drop it. Rest are completed,
                // newest-first from Bybit; reverse to chronological (oldest -> newest).
                const completed = list.slice(1).map(c => ({
                  candleStart: parseInt(c[0]),
                  open:  parseFloat(c[1]),
                  high:  parseFloat(c[2]),
                  low:   parseFloat(c[3]),
                  close: parseFloat(c[4]),
                  volume: parseFloat(c[5]),
                })).reverse();
                if (!completed.length) return;
                const per6h  = Math.max(1, Math.round(360  / intervalMin));
                const per12h = Math.max(1, Math.round(720  / intervalMin));
                const per24h = Math.max(1, Math.round(1440 / intervalMin));
                this._micPecCache[sym] = {
                  '6h':  this._micCalcPecWindow(completed, per6h,  dampen),
                  '12h': this._micCalcPecWindow(completed, per12h, dampen),
                  '24h': this._micCalcPecWindow(completed, per24h, dampen),
                  // VSG rides this same fetch/cache — no separate fetch path (see VSG.md).
                  vsg: {
                    '6h':  this._micCalcVsgWindow(completed, per6h),
                    '12h': this._micCalcVsgWindow(completed, per12h),
                    '24h': this._micCalcVsgWindow(completed, per24h),
                  },
                  candleStart: completed[completed.length - 1].candleStart,
                  ts: now,
                };
              } catch (e) {}
            }));
          }
          const patch = {};
          for (const sym of toFetch) { if (this._micPecCache[sym]) patch[sym] = this._micPecCache[sym]; }
          if (Object.keys(patch).length) this._sharedMerge(sharedKey, patch);
        },

        _micGetPecSync(symbol) {
          return this._micPecCache?.[symbol] || null;
        },

      });
    },
  };
})();
</script>
