<!--
  Ashfall Strategy Plugin for PseudoChaser
  Self-calibrating halt governor: replaces the fixed 12h drawdown-throttle /
  gains-lock timers with a learned market-structure profile.

  Every halt event records the market structure (gainer/loser skew + breadth)
  at the moment it fired — drawdown events mark hostile climate, gains-lock
  events mark favorable climate. Scan cycles add weaker PnL-labeled samples
  between those anchors. While halted, structure is re-sampled on a slow
  timer. Halts run the stock 12h horizon by default. Only a *strong* historical
  bias (large |score| backed by enough evidence mass) changes that: it can hold
  the halt past 12h up to a hard cap (24h — the extreme case) while structure
  stays hostile, or settle it early ("the ash settles", as soon as 1h) once
  structure scores favorably. Without a strong bias the lock is never lifted
  early — it just serves its 12h. A thin profile falls back to the stock 12h
  timer too.

  PLK (preemptive lock, on by default): proactive rather than reactive — when
  a routine structure check reads a climate that is historically bad (score at
  or below the PLK trigger, with sufficient evidence), entries lock before any
  PnL damage occurs. A PLK rides the drawdown gate so every entry choke point
  respects it, and surfaces as a "PLK" countdown pill on the topbar (click to
  lift manually). Its duration scales with the strength of the historical bias
  up to the hard cap — an arbitrary span like 3h 20m — and it also settles early
  once structure clears the settle score under a strong bias. A real drawdown/
  gains-lock halt supersedes an active PLK. After a PLK ends, a dynamic cooldown
  equal to that lock's own duration must pass before another can engage — no
  back-to-back preemptive locks.

  Structure trajectory ("the wave"): a reading is judged in the context of what
  preceded it, not in isolation. The recent path of the structure lean is tracked
  and plotted in the accordion, and its direction folds into an inherent bull⇄bear
  oscillation prior — so a mildly-bullish tape that is turning down reads negative
  (don't long into the start of a dump). Learned history stays primary; the
  inherent wave only takes the helm when the profile is thin.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation — the same logic powers Permafrost on PseudoWinter.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const ASH_KEY        = '__ashfall_chaser_v1';
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old burns fade
  const EVENT_W        = 10;                   // halt events are strong anchors
  const SAMPLE_W       = 1;                    // cycle samples are weak fill
  const MIN_MASS       = 6;                    // effective evidence mass required to override the timer
  const STRONG_MASS    = 12;                   // evidence mass for a *strong* historical bias (2× MIN_MASS)
  const STRONG_SCORE   = 0.30;                 // |score| at/above which the bias counts as strong
  const DEFAULT_HALT_MS = 12 * 3600 * 1000;    // stock 12h horizon — the floor unless strong history says otherwise
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never resume before 1h (only reachable under a strong bias)
  const LABEL_WINDOW   = 6 * 3600 * 1000;      // samples are labeled by the realized PnL that followed
  const EVENTS_CAP     = 200;
  const SAMPLES_CAP    = 1000;
  const PNL_LOG_TTL    = 24 * 3600 * 1000;

  // ── Structure trajectory ("the wave") ──
  // A reading isn't just where the market is now — it's where it came from. We
  // track the recent path of the structure lean and read its direction, then
  // fold an *inherent* oscillation prior (markets swing strongly bullish ⇄
  // strongly bearish) into the decision. History stays primary; the inherent
  // wave only takes the helm when the learned profile is thin.
  const WAVE_TTL_MS    = 7 * 24 * 3600 * 1000; // wave retains as much structure history as we have, up to ~a week
  const WAVE_CAP       = 2000;              // hard cap on stored wave points
  const WAVE_MIN_PTS   = 3;                 // readings needed before a trajectory is meaningful
  const W_LEAN         = 0.6;               // inherent-score weight on the current structure level
  const W_SLOPE        = 0.4;               // inherent-score weight on the trajectory (where it's heading)
  const W_IO           = 0.15;              // inherent-score weight on collective IO sentiment (contrarian)
  const SLOPE_REF      = 0.3;               // lean change over the window that counts as full-scale
  const DIR            = 1;                 // PseudoChaser longs → favourable structure is bullish/rising

  window.__BotPlugin = {
    id:        'ashfall-chaser',
    name:      'Ashfall (Chaser)',
    version:   '1.6.0',
    targetBot: 'pseudochaser',
    after:     ['sunchaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition', 'recordDrawdownPnl', 'recordGainsPnl', 'activateManualHalt'],

    css: `
      .ash-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .ash-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.ashfallEnabled"> + Ashfall</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Ashfall</span>
              <span x-show="cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.ashfallEnabled=!cfg.ashfallEnabled;persist()}">
              <div class="tog-t" :class="cfg.ashfallEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Ashfall Mode</div>
                <div class="ash-hint">Learns which market climates trigger drawdowns vs gains locks, then lifts halts when structure leaves the hostile zone instead of waiting out the clock. Thin profile = stock 12h behavior.</div>
              </div>
            </label>
            <div x-show="cfg.ashfallEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Settle Score <b x-text="(cfg.ashfallThawScore??0).toFixed(2)"></b></div>
                <input type="range" min="-0.5" max="0.5" step="0.05" x-model.number="cfg.ashfallThawScore" @change="persist()">
                <div class="ash-hint">Profile score (−1 hostile … +1 favorable) the current structure must reach to lift a halt early. 0 = at least neutral history nearby.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Strong Bias Score <b x-text="'±'+(cfg.ashfallStrongScore??0.30).toFixed(2)"></b></div>
                <input type="range" min="0.10" max="0.60" step="0.05" x-model.number="cfg.ashfallStrongScore" @change="persist()">
                <div class="ash-hint">|score| at/above which the history counts as a <em>strong bias</em> (also needs evidence mass ≥ 12). Default 12h halts only stretch toward the hard cap, or settle early, when the bias is this strong — otherwise 12h prevails and the lock is never lifted early.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Hard Cap <b x-text="(cfg.ashfallCapHours??24)+'h'"></b></div>
                <input type="range" min="12" max="48" step="1" x-model.number="cfg.ashfallCapHours" @change="persist()">
                <div class="ash-hint">Maximum halt duration under a strong historical bias (the extreme case). Without one, halts run the default 12h. Resumes regardless once reached — stale burns must be re-tested.</div>
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.ashfallPlkEnabled=!(cfg.ashfallPlkEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.ashfallPlkEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Preemptive Lock (PLK)</div>
                  <div class="ash-hint">Proactive rather than reactive: when a routine structure check reads a climate that is historically bad (score at or below the trigger, with sufficient evidence), entries lock preemptively — before any PnL damage. The lock's duration scales with the strength of the bias, up to the Hard Cap (arbitrary, e.g. 3h 20m). Settles early when structure clears the Settle Score under a strong bias, when its duration elapses, or manually from the topbar pill.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.ashfallPlkEnabled??true" style="margin-top:8px">
                <div class="lbl">PLK Trigger Score <b x-text="(cfg.ashfallPlkScore??-0.15).toFixed(2)"></b></div>
                <input type="range" min="-0.5" max="-0.05" step="0.05" x-model.number="cfg.ashfallPlkScore" @change="persist()">
                <div class="ash-hint">Profile score at or below which the preemptive lock engages. Closer to 0 = more cautious (locks earlier); more negative = only the worst climates trigger it.</div>
              </div>
              <div class="g" x-show="cfg.ashfallPlkEnabled??true" style="margin-top:8px">
                <div class="lbl">PLK Cooldown <b>dynamic</b></div>
                <div class="ash-hint">After a preemptive lock ends, the next one can't engage until the same span as the last lock has passed (it matches that lock's duration) — no back-to-back locks. Last lock: <span x-text="afPlkLastDurationMs>0?(Math.floor(afPlkLastDurationMs/3600000)+'h '+String(Math.round((afPlkLastDurationMs%3600000)/60000)).padStart(2,'0')+'m'):'—'"></span>.</div>
              </div>
              <div class="g" x-show="cfg.ashfallEnabled" style="margin-top:10px">
                <div class="lbl">Structure Wave <b x-text="(()=>{ void tick; const s=afStatus.slope??0; return s>0.05?'rising ▲':s<-0.05?'falling ▼':'steady ▬'; })()"></b></div>
                <div x-html="_afWaveSvg()" style="margin-top:4px;border:1px solid rgba(255,150,80,.15);border-radius:3px;background:rgba(255,150,80,.03)"></div>
                <div class="ash-hint">Path of the market's structure lean (bull ↑ / bear ↓), retained for as long as there is data — up to ~a week. The plugin reads where the wave is <em>heading</em>, not just where it is — folding an inherent bull⇄bear oscillation in as a fallback so it won't long into the start of a dump. History stays primary when the profile is rich.</div>
                <div class="lbl" style="margin-top:8px">Slope Window <b x-text="(cfg.ashfallSlopeWindowHours??6)+'h'"></b></div>
                <input type="range" min="1" max="24" step="1" x-model.number="cfg.ashfallSlopeWindowHours" @change="persist()">
                <div class="ash-hint">Timeframe for the directional comparison — "turning bullish/bearish" means the avg lean over the last N hours has shifted vs the N hours before it. Default 6h; raise to 12h for a slower, less reactive signal.</div>
                <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <label class="tog" style="font-size:9px" @click="cfg.ashfallIoEnabled=!cfg.ashfallIoEnabled;persist()">
                    <div class="tog-t" :class="cfg.ashfallIoEnabled?'on':''"><div class="tog-k"></div></div>
                    <span class="tog-l">Collective IO</span>
                  </label>
                  <span class="ash-hint" style="margin:0">Aggregates funding rates across all tickers (already in the ticker response — zero extra bandwidth) as a contrarian crowd-sentiment signal and blends it into the inherent score.</span>
                </div>
                <div x-show="cfg.ashfallIoEnabled && afStatus.ioScore != null" class="ash-hint" style="margin-top:3px">
                  IO <span x-text="afStatus.ioScore>=0?'+':''"></span><span x-text="(afStatus.ioScore??0).toFixed(2)"></span> — <span x-text="(afStatus.ioScore??0)>0.2?'crowd net long (contrarian bearish)':(afStatus.ioScore??0)<-0.2?'crowd net short (contrarian bullish)':'crowd neutral'"></span>
                </div>
              </div>
              <div class="ash-stat" style="margin-top:10px;padding:8px 10px;background:rgba(255,150,80,.05);border:1px solid rgba(255,150,80,.18);border-radius:3px">
                <div>PROFILE — <span x-text="(afEvents||[]).filter(e=>e.kind==='drawdown').length"></span> drawdown / <span x-text="(afEvents||[]).filter(e=>e.kind==='gainslock').length"></span> gains-lock events, <span x-text="(afSamples||[]).filter(s=>s.label!==null).length"></span> labeled samples</div>
                <div x-show="afStatus.at">READING — skew <span x-text="(afStatus.skew??0).toFixed(2)"></span> | breadth <span x-text="(afStatus.breadth??0).toFixed(2)"></span> | score <span x-text="afStatus.score===null?'—':afStatus.score.toFixed(2)"></span> | mass <span x-text="afStatus.mass.toFixed(1)"></span></div>
                <div x-show="afStatus.at">STRUCTURE — lean <span x-text="(afStatus.lean??0).toFixed(2)"></span> | slope <span x-text="(afStatus.slope>=0?'+':'')+(afStatus.slope??0).toFixed(2)"></span> | effective <span x-text="afStatus.eff===null||afStatus.eff===undefined?'—':((afStatus.eff>=0?'+':'')+afStatus.eff.toFixed(2))"></span> for longs</div>
                <div x-show="afHalt && afHalt.kind!=='plk'" style="color:#ff9650">HALT — <span x-text="afHalt?.kind"></span> (<span x-text="afHalt?.strong?'strong bias — up to '+(cfg.ashfallCapHours??24)+'h / early settle':afHalt?.informed?'default 12h':'timer fallback'"></span>) <span x-text="(()=>{ void tick; return afHalt? Math.floor((Date.now()-afHalt.at)/3600000)+'h elapsed':''; })()"></span></div>
                <div x-show="afHalt && afHalt.kind==='plk'" style="color:#ff9650;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <span x-text="(()=>{ void tick; if(!afHalt||!afHalt.until) return 'PLK active'; const rem=Math.max(0,afHalt.until-Date.now()); const h=Math.floor(rem/3600000); const m=Math.floor((rem%3600000)/60000); const s=Math.floor((rem%60000)/1000); return 'PLK'+(afHalt.strong?' (strong)':'')+' — '+h+'h '+String(m).padStart(2,'0')+'m '+String(s).padStart(2,'0')+'s left'; })()"></span>
                  <button @click="_afLiftPlk()" style="font-family:var(--mono);font-size:9px;padding:2px 8px;border:1px solid rgba(255,150,80,.5);border-radius:2px;background:none;color:#ff9650;cursor:pointer;letter-spacing:.5px">Lift PLK</button>
                </div>
                <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
                  <button @click="afExport()" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,150,80,.4);border-radius:2px;background:none;color:#ff9650;cursor:pointer;letter-spacing:.5px">Export</button>
                  <button @click="if(confirm('Import will replace your current events, samples, and wave history. This cannot be undone — export first if you want to keep the existing profile.\n\nContinue?')){document.getElementById('ash-import-file').click()}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,150,80,.4);border-radius:2px;background:none;color:#ff9650;cursor:pointer;letter-spacing:.5px">Import</button>
                  <input type="file" id="ash-import-file" accept=".json" style="display:none" @change="afImport($event)">
                  <button @click="if(!cfgLocked&&confirm('Clear all Ashfall events, samples, PnL log, and wave history?\n\nThis cannot be undone.')){afEvents=[];afSamples=[];afPnl=[];afWave=[];persist();log('[ASH] Profile cleared.','warn')}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.4);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Profile</button>
                </div>
              </div>
            </div>
            <div x-data="{ dzOpen:false }" style="margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:8px">
              <button @click="dzOpen=!dzOpen" style="font-family:var(--mono);font-size:9px;padding:2px 8px;border:1px solid rgba(255,69,96,.25);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px;display:flex;align-items:center;gap:4px"><span x-text="dzOpen?'▾':'▸'"></span>&nbsp;Danger Zone</button>
              <div x-show="dzOpen" x-transition.opacity style="margin-top:6px;padding:8px;background:rgba(255,69,96,.04);border:1px solid rgba(255,69,96,.18);border-radius:3px">
                <button @click="if(!cfgLocked&&confirm('Wipe ALL Ashfall plugin data from browser storage?\n\nThis clears events, samples, wave history, halt state, and the storage key itself — nothing will remain. Export first if you want to preserve the profile.\n\nThis cannot be undone.')){localStorage.removeItem('__ashfall_chaser_v1');afEvents=[];afSamples=[];afPnl=[];afWave=[];afHalt=null;afPlkLastLift=0;afPlkLastDurationMs=0;persist();log('[ASH] Plugin state cleared from storage.','warn')}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Plugin State</button>
                <div class="ash-hint" style="margin-top:4px">Wipes all Ashfall data from browser storage — events, samples, wave history, and halt state. Also clears the storage key so no orphaned data lingers if the plugin is removed. Export first if you want to preserve the profile.</div>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origPers  = def.persist;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;
      const _origDD    = def.recordDrawdownPnl;
      const _origGL    = def.recordGainsPnl;
      const _origMH    = def.activateManualHalt;
      const _origIsDD  = def._isDrawdownHalted;
      const _origIsGL  = def._isGainsLocked;

      // Slow sampler handle lives outside the Alpine proxy (see Timer architecture)
      let _ashTimer = null;

      return Object.assign({}, def, {

        afEvents:  [],   // { ts, kind:'drawdown'|'gainslock', skew, breadth, gCount, lCount, gSum, lSum }
        afSamples: [],   // { ts, skew, breadth, label } — label null until the 6h window resolves
        afPnl:     [],   // { ts, pnl } — plugin-owned closed-trade log for sample labeling
        afWave:    [],   // { ts, lean } — structure-lean trajectory, retained up to ~a week (the "wave")
        afHalt:    null, // { kind, at, informed, strong, until?, durMs? } while a halt is being governed (until/durMs are PLK-only)
        afPlkLastLift: 0, // when the last PLK ended — gates the (dynamic) PLK cooldown
        afPlkLastDurationMs: 0, // duration of the last PLK — the cooldown matches it
        afStatus:  { skew: null, breadth: null, score: null, mass: 0, lean: 0, slope: 0, inherent: 0, eff: null, ioScore: null, at: 0 },

        async init() {
          await _origInit.call(this);
          if (this.cfg.ashfallEnabled   === undefined) this.cfg.ashfallEnabled   = false;
          if (this.cfg.ashfallThawScore === undefined) this.cfg.ashfallThawScore = 0;
          if (this.cfg.ashfallStrongScore === undefined) this.cfg.ashfallStrongScore = STRONG_SCORE;
          if (this.cfg.ashfallCapHours  === undefined) this.cfg.ashfallCapHours  = 24;
          if (this.cfg.ashfallPlkEnabled === undefined) this.cfg.ashfallPlkEnabled = true;
          if (this.cfg.ashfallPlkScore   === undefined) this.cfg.ashfallPlkScore   = -0.15;
          if (this.cfg.ashfallPlkCooldownHours === undefined) this.cfg.ashfallPlkCooldownHours = 24;
          if (this.cfg.ashfallSlopeWindowHours === undefined) this.cfg.ashfallSlopeWindowHours = 6;
          if (this.cfg.ashfallIoEnabled       === undefined) this.cfg.ashfallIoEnabled       = true;
          try {
            const raw = localStorage.getItem(ASH_KEY);
            if (raw) {
              const s = JSON.parse(raw);
              if (Array.isArray(s.events))  this.afEvents  = s.events.slice(-EVENTS_CAP);
              if (Array.isArray(s.samples)) this.afSamples = s.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(s.pnl))     this.afPnl     = s.pnl.filter(e => Date.now() - e.ts < PNL_LOG_TTL);
              if (Array.isArray(s.wave))    this.afWave    = s.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              if (s.halt && s.halt.at) this.afHalt = s.halt;
              if (typeof s.plkLastLift === 'number') this.afPlkLastLift = s.plkLastLift;
              if (typeof s.plkLastDurationMs === 'number') this.afPlkLastDurationMs = s.plkLastDurationMs;
            }
          } catch(e) {}
          // Drop a stale governed-halt record if the underlying halt is gone (manual clear, expiry).
          // A PLK has no backing host timer — it expires on its own scaled duration instead.
          if (this.afHalt?.kind === 'plk') {
            if (!this.afHalt.until || Date.now() >= this.afHalt.until) {
              this.afPlkLastDurationMs = this.afHalt.until ? (this.afHalt.until - this.afHalt.at) : this.afPlkLastDurationMs;
              this.afHalt = null; this.afPlkLastLift = Date.now();
            }
          } else if (this.afHalt && !_origIsDD.call(this) && !_origIsGL.call(this)) this.afHalt = null;
          if (this.afHalt) this._afEnsureSampler();
          this.log(`[ASH] Ashfall (Chaser) v1.6.0 loaded — ${this.cfg.ashfallEnabled ? 'enabled' : 'disabled'} | ${this.afEvents.length} events, ${this.afSamples.length} samples on record`, 'info');
        },

        // ── PLK (preemptive lock) — proactive halt on historically bad structure ──
        _afPlkActive() {
          if (!this.cfg.ashfallEnabled || !(this.cfg.ashfallPlkEnabled ?? true)) return false;
          return this.afHalt?.kind === 'plk';
        },

        // PLK duration scales with the strength of the effective read (|eff|, which
        // already blends learned history with the inherent structure wave), as a
        // fraction of the hard cap. Floored at 1h, capped at the hard cap — so it
        // lands on arbitrary values like 3h 20m, never a fixed block.
        _afPlkDurationMs(eff) {
          const capMs    = (this.cfg.ashfallCapHours ?? 24) * 3600 * 1000;
          const strength = Math.min(1, Math.abs(eff || 0));
          return Math.min(capMs, Math.max(MIN_HALT_MS, Math.round(strength * capMs)));
        },

        // Remaining ms on the active PLK (0 if none) — read by the host's deferral logs
        _plkRemainingMs() {
          if (this.afHalt?.kind !== 'plk' || !this.afHalt.until) return 0;
          return Math.max(0, this.afHalt.until - Date.now());
        },

        // Topbar pill for an active PLK — labelled "PLK" with a live countdown and
        // click-to-lift, instead of the host's drawdown (DDT) pill.
        _extraStatusPills() {
          if (!this._afPlkActive() || !this.afHalt?.until) return [];
          void this.tick;
          const rem = Math.max(0, this.afHalt.until - Date.now());
          const s   = Math.floor(rem / 1000);
          const remStr = `${Math.floor(s/3600)}h ${String(Math.floor((s%3600)/60)).padStart(2,'0')}m ${String(s%60).padStart(2,'0')}s`;
          return [{
            pip:        'warn',
            pipStyle:   'background:#ff9650',
            label:      `PLK ${remStr}`,
            labelStyle: 'color:#ff9650',
            border:     'border-color:rgba(255,150,80,.45);background:rgba(255,150,80,.06)',
            title:      `Preemptive lock active — entries locked for ${remStr}. Click to lift.`,
            action:     () => this._afLiftPlk(),
          }];
        },

        // Manual PLK lift — clears the lock and starts the dynamic cooldown (which
        // matches the duration this lock was set for).
        _afLiftPlk() {
          if (this.afHalt?.kind !== 'plk') return;
          this.afPlkLastDurationMs = Math.max(0, (this.afHalt.until || Date.now()) - this.afHalt.at);
          this.afPlkLastLift = Date.now();
          this.afHalt = null;
          this._afStopSampler();
          this.log('[ASH] 🔓 PLK lifted manually — new entries re-enabled', 'warn');
          this.persist();
        },

        // PLK rides the drawdown gate: every entry choke point (host scans and
        // plugins) that respects the drawdown halt respects a preemptive lock too.
        _isDrawdownHalted() {
          return _origIsDD.call(this) || this._afPlkActive();
        },

        persist() {
          _origPers.call(this);
          try {
            localStorage.setItem(ASH_KEY, JSON.stringify({
              events: this.afEvents, samples: this.afSamples, pnl: this.afPnl, wave: this.afWave, halt: this.afHalt, plkLastLift: this.afPlkLastLift, plkLastDurationMs: this.afPlkLastDurationMs,
            }));
          } catch(e) {}
        },

        // ── Market structure reading — full ticker universe, not the curated pools ──
        async _afFetchStructure() {
          try {
            // Reuse the host scan's bulk ticker response when fresh (slow-tick
            // sampling during halts falls back to fetching — scans don't run then)
            let list;
            if (this._lastAllTickers?.length) {
              list = this._lastAllTickers; // trust host cooldown — may be up to bulkTickerCooldownHours old
            } else {
              const r = await fetch(`${this.base}/v5/market/tickers?category=linear`);
              const d = await r.json();
              if (d.retCode !== 0) return null;
              list = d.result?.list || [];
              this._lastAllTickers   = list;
              this._lastAllTickersAt = Date.now();
            }
            let gSum = 0, lSum = 0, gCount = 0, lCount = 0;
            let gTurnover = 0, lTurnover = 0;
            let frSum = 0, frCount = 0;
            for (const t of list) {
              if (!t.symbol.endsWith('USDT') || t.symbol === 'BTCUSDT') continue;
              if (parseFloat(t.lastPrice || 0) < 0.001) continue;
              const ch  = parseFloat(t.price24hPcnt || 0) * 100;
              const tvr = parseFloat(t.turnover24h  || 0);
              if (ch > 0)      { gSum += ch; gCount++; gTurnover += tvr; }
              else if (ch < 0) { lSum += Math.abs(ch); lCount++; lTurnover += tvr; }
              const fr = parseFloat(t.fundingRate || 0);
              if (!isNaN(fr)) { frSum += fr * 100; frCount++; } // accumulate as %
            }
            const sumT   = gSum + lSum, cntT = gCount + lCount;
            const totalTvr = gTurnover + lTurnover;
            const vol    = totalTvr > 0 ? +((gTurnover - lTurnover) / totalTvr).toFixed(4) : 0;
            const volAbs = +(totalTvr / 1e9).toFixed(2); // USD billions

            // Collective IO from aggregate funding rate: positive funding = longs paying = crowd net long.
            // Normalised against 0.05% reference (≈5× the typical 0.01%/8h baseline) → [-1, 1].
            const ioScore = frCount > 0
              ? +Math.max(-1, Math.min(1, (frSum / frCount) / 0.05)).toFixed(4)
              : null;

            return {
              ts: Date.now(),
              skew:    sumT > 0 ? (gSum - lSum) / sumT : 0,
              breadth: cntT > 0 ? (gCount - lCount) / cntT : 0,
              gCount, lCount,
              gSum: +gSum.toFixed(1), lSum: +lSum.toFixed(1),
              vol, volAbs, ioScore,
            };
          } catch(e) { return null; }
        },

        // ── Human-readable structure + historical-bias phrasing for the activity log ──
        // Intensity ranges over mildly / moderately / strongly bullish (or bearish). The
        // tiers are entirely relative to this installation's own history: thresholds are
        // the 25th / 50th / 80th percentiles of |lean| across recorded events + samples,
        // so they shift as the profile collects more data. Fixed fallbacks
        // (0.08 / 0.20 / 0.40) apply until at least 30 readings are on record.
        _afDescribe(reading, score, mass) {
          const lean = (reading.skew + reading.breadth) / 2;
          const hist = [...this.afEvents, ...this.afSamples]
            .map(x => Math.abs((x.skew + x.breadth) / 2))
            .sort((a, b) => a - b);
          const q = p => hist[Math.min(hist.length - 1, Math.floor(p * hist.length))];
          const [tFlat, tModerate, tStrong] = hist.length >= 30 ? [q(0.25), q(0.5), q(0.8)] : [0.08, 0.20, 0.40];
          const mag    = Math.abs(lean);
          const adverb = mag >= tStrong ? 'strongly ' : mag >= tModerate ? 'moderately ' : 'mildly ';
          const struct = mag <= tFlat ? 'mixed/flat' : `${adverb}${lean > 0 ? 'bullish' : 'bearish'}`;
          const slope  = this._afTrajectory().slope;
          const trend  = slope > 0.05 ? ', rising (turning bullish)' : slope < -0.05 ? ', falling (turning bearish)' : ', steady';
          const desc   = `${struct}${trend} (skew ${reading.skew.toFixed(2)}, breadth ${reading.breadth.toFixed(2)}, ${reading.gCount}▲/${reading.lCount}▼)`;
          const inherent = this._afInherent(lean, slope, reading.ioScore ?? null);
          const eff      = this._afEffectiveScore(score, mass, inherent);
          let bias;
          if (score === null || mass < MIN_MASS) bias = `thin history (mass ${mass.toFixed(1)} < ${MIN_MASS}) — leaning on inherent structure (${eff >= 0 ? '+' : ''}${eff.toFixed(2)} for longs)`;
          else if (score >= 0.15)  bias = `historically good for longs (score +${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else if (score <= -0.15) bias = `historically bad for longs (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else                     bias = `historically neutral for longs (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          if (score !== null && mass >= MIN_MASS && Math.abs(eff - score) >= 0.1) bias += ` | structure shifts the effective read to ${eff >= 0 ? '+' : ''}${eff.toFixed(2)}`;
          return { desc, bias, eff };
        },

        // ── The wave: recent path of the structure lean (oldest → newest) ──
        // lean = (skew + breadth) / 2 ∈ [−1,1]: +1 strongly bullish, −1 strongly bearish.
        _afWaveSeries() {
          const cut = Date.now() - WAVE_TTL_MS;
          return this.afWave.filter(p => p.ts >= cut);
        },

        // Append a structure-lean point to the wave and prune by age / cap. Kept
        // separate from afSamples (which get pruned for scoring) so the wave
        // retains the full trajectory for as long as we have data, up to ~a week.
        _afPushWave(reading) {
          this.afWave.push({ ts: reading.ts, lean: +(((reading.skew + reading.breadth) / 2)).toFixed(4), vol: reading.vol ?? 0, volAbs: reading.volAbs ?? 0 });
          const cut = Date.now() - WAVE_TTL_MS;
          if (this.afWave.length && this.afWave[0].ts < cut) this.afWave = this.afWave.filter(p => p.ts >= cut);
          if (this.afWave.length > WAVE_CAP) this.afWave = this.afWave.slice(-WAVE_CAP);
        },

        // Current lean plus its trajectory (slope = avg lean over last N hours − avg lean N–2N hours ago).
        // Fixed time window (cfg.ashfallSlopeWindowHours, default 6h) so directional signals
        // always reflect the same timeframe regardless of wave history depth.
        // slope > 0 → drifting bullish; slope < 0 → drifting bearish.
        _afTrajectory() {
          const wave = this._afWaveSeries();
          const n    = wave.length;
          const lean = n ? wave[n - 1].lean : (((this.afStatus.skew ?? 0) + (this.afStatus.breadth ?? 0)) / 2);
          if (n < WAVE_MIN_PTS) return { lean, slope: 0, n };
          const winMs     = (this.cfg.ashfallSlopeWindowHours ?? 6) * 3600 * 1000;
          const now       = Date.now();
          const recentPts = wave.filter(p => p.ts >= now - winMs);
          const olderPts  = wave.filter(p => p.ts >= now - 2 * winMs && p.ts < now - winMs);
          if (!recentPts.length || !olderPts.length) return { lean, slope: 0, n };
          const recent = recentPts.reduce((a, p) => a + p.lean, 0) / recentPts.length;
          const older  = olderPts.reduce((a, p) => a + p.lean, 0) / olderPts.length;
          return { lean, slope: recent - older, n };
        },

        // Inherent favourability for this bot's direction (DIR): a long bot likes
        // bullish *and* rising structure. The slope term is what stops us longing
        // into the start of a dump (mildly bullish but turning down).
        _afInherent(lean, slope, ioScore) {
          const slopeN = Math.max(-1, Math.min(1, (slope || 0) / SLOPE_REF));
          const ioN    = ioScore != null ? Math.max(-1, Math.min(1, -ioScore)) : 0;
          return Math.max(-1, Math.min(1, DIR * (W_LEAN * (lean || 0) + W_SLOPE * slopeN + W_IO * ioN)));
        },

        // Effective score: learned history is primary, the inherent wave is the
        // fallback — blended by how much evidence the profile actually has.
        _afEffectiveScore(score, mass, inherent) {
          const massFrac = Math.max(0, Math.min(1, (mass || 0) / STRONG_MASS));
          return score === null ? inherent : massFrac * score + (1 - massFrac) * inherent;
        },

        // Inline SVG wave plot — time-based 1-week window, bins data into pixel columns so
        // the chart compacts automatically as history grows (no index stretching).
        _afWaveSvg() {
          void this.tick;
          const wave = this._afWaveSeries();
          const W = 260, H = 64, pad = 6;
          const y = lean => pad + ((1 - lean) / 2) * (H - 2 * pad);
          const mid = y(0);
          const placeholder = `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block"><line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="rgba(255,255,255,.15)" stroke-dasharray="3 3"/><text x="${W/2}" y="${H/2+3}" fill="rgba(255,255,255,.35)" font-size="9" font-family="monospace" text-anchor="middle">gathering structure history…</text></svg>`;
          if (wave.length < 2) return placeholder;
          const now = Date.now();
          const tMin = now - WAVE_TTL_MS;
          const plotW = W - 2 * pad;
          const BINS = Math.floor(plotW);
          const bins = new Array(BINS).fill(null).map(() => ({ sum: 0, n: 0 }));
          for (const p of wave) {
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            bins[bi].sum += p.lean; bins[bi].n++;
          }
          const pts = [];
          for (let i = 0; i < BINS; i++) {
            if (!bins[i].n) continue;
            pts.push({ x: pad + i + 0.5, lean: bins[i].sum / bins[i].n });
          }
          if (pts.length < 2) return placeholder;

          const vBins = new Array(BINS).fill(null).map(() => ({ vSum: 0, aSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.vol == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            vBins[bi].vSum += p.vol; vBins[bi].aSum += (p.volAbs ?? Math.abs(p.vol)); vBins[bi].n++;
          }
          const volPts = [];
          for (let i = 0; i < BINS; i++) {
            if (!vBins[i].n) continue;
            volPts.push({ x: pad + i + 0.5, v: vBins[i].vSum / vBins[i].n, abs: vBins[i].aSum / vBins[i].n });
          }
          const maxAbs = Math.max(...volPts.map(p => p.abs), 0.001);
          let volSvg = '';
          for (let i = 1; i < volPts.length; i++) {
            const p1 = volPts[i-1], p2 = volPts[i];
            const relAbs = ((p1.abs + p2.abs) / 2) / maxAbs;
            const op = (0.12 + relAbs * 0.55).toFixed(2);
            volSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.v).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.v).toFixed(1)}" stroke="rgba(255,185,50,${op})" stroke-width="1"/>`;
          }

          const cur = pts[pts.length - 1].lean;
          const col = cur > 0.05 ? 'var(--profit)' : cur < -0.05 ? 'var(--short)' : '#ff9650';
          const polyPts = pts.map(p => `${p.x.toFixed(1)},${y(p.lean).toFixed(1)}`).join(' ');
          const cx = pts[pts.length - 1].x, cy = y(cur);
          return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block">`
            + `<line x1="0" y1="${pad}" x2="${W}" y2="${pad}" stroke="rgba(0,229,160,.12)"/>`
            + `<line x1="0" y1="${(H-pad).toFixed(1)}" x2="${W}" y2="${(H-pad).toFixed(1)}" stroke="rgba(255,69,96,.12)"/>`
            + `<line x1="0" y1="${mid.toFixed(1)}" x2="${W}" y2="${mid.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-dasharray="3 3"/>`
            + volSvg
            + `<polyline points="${polyPts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>`
            + `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="${col}"/>`
            + `<text x="2" y="${pad+7}" fill="rgba(0,229,160,.5)" font-size="8" font-family="monospace">bull</text>`
            + `<text x="2" y="${(H-pad-1).toFixed(1)}" fill="rgba(255,69,96,.5)" font-size="8" font-family="monospace">bear</text>`
            + `<text x="${W-18}" y="${pad+7}" fill="rgba(255,185,50,.45)" font-size="8" font-family="monospace">vol</text>`
            + `</svg>`;
        },

        // ── Hostility score: kernel-weighted, recency-decayed vote of past events
        // and labeled samples near the given reading. score ∈ [−1,1]; mass = evidence weight.
        _afScore(reading) {
          const now = Date.now();
          let num = 0, mass = 0;
          const tally = (skew, breadth, label, w, ts) => {
            const ds = reading.skew - skew, db = reading.breadth - breadth;
            const k  = Math.exp(-(ds * ds + db * db) / (2 * KERNEL_H * KERNEL_H));
            const dec = Math.pow(0.5, (now - ts) / HALF_LIFE_MS);
            num  += w * label * k * dec;
            mass += w * k * dec;
          };
          for (const e of this.afEvents) tally(e.skew, e.breadth, e.kind === 'drawdown' ? -1 : 1, EVENT_W, e.ts);
          for (const s of this.afSamples) { if (s.label !== null) tally(s.skew, s.breadth, s.label, SAMPLE_W, s.ts); }
          return { score: mass > 0 ? num / mass : null, mass };
        },

        // ── Label samples whose 6h window has resolved; drop windows with no closed trades ──
        _afStampSamples() {
          const now = Date.now();
          const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          this.afSamples = this.afSamples.filter(s => {
            if (s.label !== null || now - s.ts < LABEL_WINDOW) return true;
            const trades = this.afPnl.filter(p => p.ts > s.ts && p.ts <= s.ts + LABEL_WINDOW);
            if (!trades.length) return false; // nothing closed — no evidence either way
            const pnl = trades.reduce((a, p) => a + p.pnl, 0);
            s.label = Math.max(-1, Math.min(1, pnl / entryMargin));
            return true;
          });
          if (this.afSamples.length > SAMPLES_CAP) this.afSamples = this.afSamples.slice(-SAMPLES_CAP);
        },

        _afAddSample(reading) {
          this._afStampSamples();
          this.afSamples.push({ ts: reading.ts, skew: reading.skew, breadth: reading.breadth, label: null });
          this._afPushWave(reading);
          const { score, mass } = this._afScore(reading);
          const { lean, slope } = this._afTrajectory();
          const inherent = this._afInherent(lean, slope, reading.ioScore ?? null);
          const eff = this._afEffectiveScore(score, mass, inherent);
          this.afStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, lean, slope, inherent, eff, ioScore: reading.ioScore ?? null, at: reading.ts };
        },

        // ── Halt event: record the climate, decide informed cap vs timer fallback ──
        async _afOnHaltTriggered(kind) {
          const reading = await this._afFetchStructure();
          if (!reading) { this.afHalt = { kind, at: Date.now(), informed: false }; this.persist(); return; }
          this.afEvents.push({ ts: reading.ts, kind, skew: reading.skew, breadth: reading.breadth, gCount: reading.gCount, lCount: reading.lCount, gSum: reading.gSum, lSum: reading.lSum });
          if (this.afEvents.length > EVENTS_CAP) this.afEvents = this.afEvents.slice(-EVENTS_CAP);
          this._afPushWave(reading);
          const { score, mass } = this._afScore(reading);
          const lean     = (reading.skew + reading.breadth) / 2;
          const slope    = this._afTrajectory().slope;
          const inherent = this._afInherent(lean, slope, reading.ioScore ?? null);
          const eff      = this._afEffectiveScore(score, mass, inherent);
          this.afStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, lean, slope, inherent, eff, ioScore: reading.ioScore ?? null, at: reading.ts };
          const informed = mass >= MIN_MASS;
          const strong   = mass >= STRONG_MASS && score !== null && Math.abs(score) >= (this.cfg.ashfallStrongScore ?? STRONG_SCORE);
          // The stock 12h horizon is the default. Only a *strong* historical bias
          // extends the halt toward the 24h hard cap (and unlocks early settle); a
          // merely-informed profile rides the host's 12h timer unchanged.
          if (strong) {
            const capUntil = reading.ts + (this.cfg.ashfallCapHours ?? 24) * 3600 * 1000;
            if (kind === 'drawdown') this._drawdownHaltUntil = capUntil;
            else                     this._gainsLockHaltUntil = capUntil;
          }
          if (this.afHalt?.kind === 'plk') this.afPlkLastLift = Date.now(); // superseded PLK still starts the cooldown
          this.afHalt = { kind, at: reading.ts, informed, strong };
          const _d = this._afDescribe(reading, score, mass);
          this.log(`[ASH] 🌋 ${kind === 'drawdown' ? 'Drawdown' : 'Gains lock'} activated — market structure is ${_d.desc} | ${_d.bias} → ${strong ? `strong historical bias — profile-governed (may extend to the ${this.cfg.ashfallCapHours ?? 24}h cap or settle early)` : informed ? 'default 12h halt — early settle needs a strong bias' : 'profile too thin — stock 12h timer'}`, 'warn');
          this._afEnsureSampler();
          this.persist();
        },

        _afEnsureSampler() {
          if (_ashTimer) return;
          const iv = Math.max(3600 * 1000, 4 * (this.cfg.scanMins || 15) * 60 * 1000);
          _ashTimer = setInterval(() => this._afSamplerTick(), iv);
        },

        _afStopSampler() {
          if (_ashTimer) { clearInterval(_ashTimer); _ashTimer = null; }
        },

        async _afSamplerTick() {
          const ddActive = _origIsDD.call(this), glActive = this._isGainsLocked();
          const isPlk    = this.afHalt?.kind === 'plk';
          if (!this.cfg.ashfallEnabled || !this.afHalt || (!isPlk && !ddActive && !glActive)) {
            this.afHalt = null; this._afStopSampler(); this.persist(); return;
          }
          const reading = await this._afFetchStructure();
          if (!reading) return;
          this._afAddSample(reading);
          const { score, mass, eff } = this.afStatus;
          const elapsed = Date.now() - this.afHalt.at;
          const strong  = mass >= STRONG_MASS && score !== null && Math.abs(score) >= (this.cfg.ashfallStrongScore ?? STRONG_SCORE);
          // Early settle is reserved for a strong historical bias — without one, the
          // lock is never lifted arbitrarily; it simply runs its 12h horizon. For
          // drawdown/gains-lock that horizon is the host's own timer; PLK has none,
          // so it self-caps below. The settle compares the *effective* read (history
          // + structure trajectory) so we don't lift straight into a reversal.
          if (strong && elapsed >= MIN_HALT_MS && (eff ?? score) >= (this.cfg.ashfallThawScore ?? 0)) {
            const kind = this.afHalt.kind;
            if      (kind === 'drawdown')  { this._drawdownHaltUntil = 0; this._drawdownWindow = []; }
            else if (kind === 'gainslock') { this._gainsLockHaltUntil = 0; this._gainsWindow = []; }
            // 'plk' has no host timer to clear — dropping afHalt lifts it
            // 'plk' has no host timer to clear — dropping afHalt lifts it; record its
            // duration so the cooldown matches it
            if (kind === 'plk') { this.afPlkLastDurationMs = Math.max(0, (this.afHalt.until || Date.now()) - this.afHalt.at); this.afPlkLastLift = Date.now(); }
            this.afHalt = null;
            this._afStopSampler();
            this.log(`[ASH] 🍂 Ash settled — strong bias cleared the ${kind} zone after ${(elapsed / 3600000).toFixed(1)}h (score ${score.toFixed(2)} ≥ ${(this.cfg.ashfallThawScore ?? 0).toFixed(2)}, mass ${mass.toFixed(1)}) — new entries re-enabled`, 'success');
          } else if (isPlk && Date.now() >= (this.afHalt.until || 0)) {
            // PLK duration elapsed — the lock's strength-scaled run is over
            this.afPlkLastDurationMs = Math.max(0, (this.afHalt.until || Date.now()) - this.afHalt.at);
            this.afPlkLastLift = Date.now(); // start the re-trigger cooldown (matches this duration)
            this.afHalt = null;
            this._afStopSampler();
            this.log(`[ASH] 🛑 PLK duration elapsed after ${(elapsed / 3600000).toFixed(1)}h — preemptive lock lifted for re-test`, 'warn');
          } else {
            const _d = this._afDescribe(reading, score, mass);
            this.log(`[ASH] ♨ Halt check (${(elapsed / 3600000).toFixed(1)}h elapsed) — market is ${_d.desc} | ${_d.bias} — holding`, 'info');
          }
          this.persist();
        },

        afExport() {
          const blob = new Blob([JSON.stringify({ exportedAt: Date.now(), events: this.afEvents, samples: this.afSamples, wave: this.afWave }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `ashfall-chaser-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
        },

        afImport(e) {
          const file = e.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const d = JSON.parse(ev.target.result);
              if (Array.isArray(d.events))  this.afEvents  = d.events.slice(-EVENTS_CAP);
              if (Array.isArray(d.samples)) this.afSamples = d.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(d.wave))    this.afWave    = d.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              this.persist();
              this.log(`[ASH] Profile imported — ${this.afEvents.length} events, ${this.afSamples.length} samples, ${this.afWave.length} wave points`, 'info');
            } catch(err) {
              this.log('[ASH] Import failed — file could not be parsed as a valid Ashfall profile', 'warn');
            }
            e.target.value = '';
          };
          reader.readAsText(file);
        },

        async runScan() {
          await _origScan.call(this);
          if (!this.cfg.ashfallEnabled) return;
          this._afFetchStructure().then(r => {
            if (!r) return;
            this._afAddSample(r);
            const { score, mass, eff } = this.afStatus;
            const _d = this._afDescribe(r, score, mass);
            this.log(`[ASH] ♨ Routine market structure check — market is ${_d.desc} | ${_d.bias}`, 'info');
            // PLK — proactive rather than reactive: when the *effective* read (learned
            // history primary, the inherent structure wave as fallback) is bad for the
            // bot's direction, lock entries preemptively before PnL damage. This is
            // what keeps us from longing into the start of a dump — a mildly bullish
            // tape that is turning down reads negative once the trajectory is folded in.
            // Duration scales with the strength of that read; the re-trigger cooldown
            // matches the last lock's duration so locks can't fire back to back.
            const _plkCooldownMs = this.afPlkLastDurationMs > 0
              ? this.afPlkLastDurationMs
              : (this.cfg.ashfallPlkCooldownHours ?? 24) * 3600 * 1000;
            const _plkTrip = (this.cfg.ashfallPlkScore ?? -0.15);
            if ((this.cfg.ashfallPlkEnabled ?? true) && !this.afHalt
                && Date.now() - (this.afPlkLastLift || 0) >= _plkCooldownMs
                && !_origIsDD.call(this) && !_origIsGL.call(this)
                && eff !== null && eff !== undefined && eff <= _plkTrip) {
              const plkStrong = mass >= STRONG_MASS && score !== null && Math.abs(score) >= (this.cfg.ashfallStrongScore ?? STRONG_SCORE);
              const durMs = this._afPlkDurationMs(eff);
              const now   = Date.now();
              this.afHalt = { kind: 'plk', at: now, until: now + durMs, durMs, informed: mass >= MIN_MASS, strong: plkStrong };
              const _dh = Math.floor(durMs / 3600000), _dm = Math.round((durMs % 3600000) / 60000);
              const _src = mass >= MIN_MASS ? `history+structure read ${eff.toFixed(2)}` : `inherent structure read ${eff.toFixed(2)} (thin history)`;
              this.log(`[ASH] 🛑 PLK — ${_d.desc} is bad for longs (${_src} ≤ ${_plkTrip.toFixed(2)}) — preemptive lock engaged for ${_dh}h ${String(_dm).padStart(2,'0')}m${plkStrong ? ' (strong bias)' : ''}; cooldown will match`, 'warn');
              this._afEnsureSampler();
            }
            this.persist();
          }).catch(() => {});
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if ((this.closedTrades?.length ?? 0) > prevLen) {
            // totalPnl (incl. funding) is what the base feeds its halt windows
            const t   = this.closedTrades[0];
            const pnl = t?.totalPnl ?? t?.pnl;
            if (typeof pnl === 'number') {
              const now = Date.now();
              this.afPnl.push({ ts: now, pnl });
              this.afPnl = this.afPnl.filter(e => now - e.ts < PNL_LOG_TTL);
            }
          }
        },

        recordDrawdownPnl(pnl) {
          // Compare the host's own gate — the wrapped one reads true under a PLK
          const prevActive = _origIsDD.call(this);
          _origDD.call(this, pnl);
          if (!this.cfg.ashfallEnabled) return;
          if (!prevActive && _origIsDD.call(this)) {
            // A real drawdown halt supersedes an active PLK (kind is overwritten)
            this._afOnHaltTriggered('drawdown').catch(() => {});
          }
        },

        recordGainsPnl(pnl) {
          const prevActive = this._isGainsLocked();
          _origGL.call(this, pnl);
          if (!this.cfg.ashfallEnabled) return;
          if (!prevActive && this._isGainsLocked()) {
            this._afOnHaltTriggered('gainslock').catch(() => {});
          }
        },

        activateManualHalt() {
          _origMH.call(this);
          if (!this.cfg.ashfallEnabled) return;
          this._afOnHaltTriggered('drawdown').catch(() => {});
        },
      });
    },
  };
})();
</script>
