<!--
  Ashfall Strategy Plugin for PseudoChaser
  Self-calibrating halt governor: replaces the fixed 12h drawdown-throttle /
  gains-lock timers with a learned market-structure profile.

  Every halt event records the market structure (gainer/loser skew + breadth)
  at the moment it fired — drawdown events mark hostile climate, gains-lock
  events mark favorable climate. Scan cycles add weaker PnL-labeled samples
  between those anchors. While halted, structure is re-sampled on a slow
  timer and the halt lifts early once current structure scores favorably
  against the profile ("the ash settles") — or holds past 12h (up to a hard
  cap) while it stays hostile. With a thin profile the plugin defers to the
  stock 12h timer.

  PLK (preemptive lock, on by default): proactive rather than reactive — when
  a routine structure check reads a climate that is historically bad (score at
  or below the PLK trigger, with sufficient evidence), entries lock before any
  PnL damage occurs. A PLK rides the drawdown gate so every entry choke point
  respects it, and lifts like the other halts: early once structure clears the
  settle score, or at the hard cap. A real drawdown/gains-lock halt supersedes
  an active PLK. After a PLK ends, a cooldown (24h default) must pass before
  another can engage — no back-to-back preemptive locks.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation — the same logic powers Permafrost on PseudoWinter.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const ASH_KEY        = '__ashfall_chaser_v1';
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old burns fade
  const EVENT_W        = 10;                   // halt events are strong anchors
  const SAMPLE_W       = 1;                    // cycle samples are weak fill
  const MIN_MASS       = 6;                    // effective evidence mass required to override the timer
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never resume before 1h
  const LABEL_WINDOW   = 6 * 3600 * 1000;      // samples are labeled by the realized PnL that followed
  const EVENTS_CAP     = 200;
  const SAMPLES_CAP    = 1000;
  const PNL_LOG_TTL    = 24 * 3600 * 1000;

  window.__BotPlugin = {
    id:        'ashfall-chaser',
    name:      'Ashfall (Chaser)',
    version:   '1.3.0',
    targetBot: 'pseudochaser',
    after:     ['sunchaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition', 'recordDrawdownPnl', 'recordGainsPnl'],

    css: `
      .ash-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .ash-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.ashfallEnabled"> + Ashfall</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Ashfall</span>
              <span x-show="cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.ashfallEnabled=!cfg.ashfallEnabled;persist()}">
              <div class="tog-t" :class="cfg.ashfallEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Ashfall Mode</div>
                <div class="ash-hint">Learns which market climates trigger drawdowns vs gains locks, then lifts halts when structure leaves the hostile zone instead of waiting out the clock. Thin profile = stock 12h behavior.</div>
              </div>
            </label>
            <div x-show="cfg.ashfallEnabled" style="margin-top:8px">
              <div class="g">
                <div class="lbl">Settle Score <b x-text="(cfg.ashfallThawScore??0).toFixed(2)"></b></div>
                <input type="range" min="-0.5" max="0.5" step="0.05" x-model.number="cfg.ashfallThawScore" @change="persist()">
                <div class="ash-hint">Profile score (−1 hostile … +1 favorable) the current structure must reach to lift a halt early. 0 = at least neutral history nearby.</div>
              </div>
              <div class="g" style="margin-top:8px">
                <div class="lbl">Hard Cap <b x-text="(cfg.ashfallCapHours??24)+'h'"></b></div>
                <input type="range" min="12" max="48" step="1" x-model.number="cfg.ashfallCapHours" @change="persist()">
                <div class="ash-hint">Maximum informed-halt duration. Resumes regardless once reached — stale burns must be re-tested.</div>
              </div>
              <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.ashfallPlkEnabled=!(cfg.ashfallPlkEnabled??true);persist()}">
                <div class="tog-t" :class="(cfg.ashfallPlkEnabled??true)?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Preemptive Lock (PLK)</div>
                  <div class="ash-hint">Proactive rather than reactive: when a routine structure check reads a climate that is historically bad (score at or below the trigger, with sufficient evidence), entries lock preemptively — before any PnL damage. Lifts like the other halts: early at the Settle Score, or at the Hard Cap.</div>
                </div>
              </label>
              <div class="g" x-show="cfg.ashfallPlkEnabled??true" style="margin-top:8px">
                <div class="lbl">PLK Trigger Score <b x-text="(cfg.ashfallPlkScore??-0.15).toFixed(2)"></b></div>
                <input type="range" min="-0.5" max="-0.05" step="0.05" x-model.number="cfg.ashfallPlkScore" @change="persist()">
                <div class="ash-hint">Profile score at or below which the preemptive lock engages. Closer to 0 = more cautious (locks earlier); more negative = only the worst climates trigger it.</div>
              </div>
              <div class="g" x-show="cfg.ashfallPlkEnabled??true" style="margin-top:8px">
                <div class="lbl">PLK Cooldown <b x-text="(cfg.ashfallPlkCooldownHours??24)+'h'"></b></div>
                <input type="range" min="1" max="72" step="1" x-model.number="cfg.ashfallPlkCooldownHours" @change="persist()">
                <div class="ash-hint">Minimum time after a preemptive lock ends before another can engage — avoids back-to-back locks when structure hovers around the trigger.</div>
              </div>
              <div class="ash-stat" style="margin-top:10px;padding:8px 10px;background:rgba(255,150,80,.05);border:1px solid rgba(255,150,80,.18);border-radius:3px">
                <div>PROFILE — <span x-text="(afEvents||[]).filter(e=>e.kind==='drawdown').length"></span> drawdown / <span x-text="(afEvents||[]).filter(e=>e.kind==='gainslock').length"></span> gains-lock events, <span x-text="(afSamples||[]).filter(s=>s.label!==null).length"></span> labeled samples</div>
                <div x-show="afStatus.at">READING — skew <span x-text="(afStatus.skew??0).toFixed(2)"></span> | breadth <span x-text="(afStatus.breadth??0).toFixed(2)"></span> | score <span x-text="afStatus.score===null?'—':afStatus.score.toFixed(2)"></span> | mass <span x-text="afStatus.mass.toFixed(1)"></span></div>
                <div x-show="afHalt" style="color:#ff9650">HALT — <span x-text="afHalt?.kind"></span> (<span x-text="afHalt?.informed?'profile-governed':'timer fallback'"></span>) <span x-text="(()=>{ void tick; return afHalt? Math.floor((Date.now()-afHalt.at)/3600000)+'h elapsed':''; })()"></span></div>
                <div style="margin-top:6px;display:flex;gap:8px">
                  <button @click="afExport()" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,150,80,.4);border-radius:2px;background:none;color:#ff9650;cursor:pointer;letter-spacing:.5px">Export</button>
                  <button @click="if(!cfgLocked){afEvents=[];afSamples=[];afPnl=[];persist();log('[ASH] Profile cleared.','warn')}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.4);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Profile</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origPers  = def.persist;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;
      const _origDD    = def.recordDrawdownPnl;
      const _origGL    = def.recordGainsPnl;
      const _origIsDD  = def._isDrawdownHalted;
      const _origIsGL  = def._isGainsLocked;

      // Slow sampler handle lives outside the Alpine proxy (see Timer architecture)
      let _ashTimer = null;

      return Object.assign({}, def, {

        afEvents:  [],   // { ts, kind:'drawdown'|'gainslock', skew, breadth, gCount, lCount, gSum, lSum }
        afSamples: [],   // { ts, skew, breadth, label } — label null until the 6h window resolves
        afPnl:     [],   // { ts, pnl } — plugin-owned closed-trade log for sample labeling
        afHalt:    null, // { kind, at, informed } while a halt is being governed
        afPlkLastLift: 0, // when the last PLK ended — gates the PLK cooldown
        afStatus:  { skew: null, breadth: null, score: null, mass: 0, at: 0 },

        async init() {
          await _origInit.call(this);
          if (this.cfg.ashfallEnabled   === undefined) this.cfg.ashfallEnabled   = false;
          if (this.cfg.ashfallThawScore === undefined) this.cfg.ashfallThawScore = 0;
          if (this.cfg.ashfallCapHours  === undefined) this.cfg.ashfallCapHours  = 24;
          if (this.cfg.ashfallPlkEnabled === undefined) this.cfg.ashfallPlkEnabled = true;
          if (this.cfg.ashfallPlkScore   === undefined) this.cfg.ashfallPlkScore   = -0.15;
          if (this.cfg.ashfallPlkCooldownHours === undefined) this.cfg.ashfallPlkCooldownHours = 24;
          try {
            const raw = localStorage.getItem(ASH_KEY);
            if (raw) {
              const s = JSON.parse(raw);
              if (Array.isArray(s.events))  this.afEvents  = s.events.slice(-EVENTS_CAP);
              if (Array.isArray(s.samples)) this.afSamples = s.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(s.pnl))     this.afPnl     = s.pnl.filter(e => Date.now() - e.ts < PNL_LOG_TTL);
              if (s.halt && s.halt.at) this.afHalt = s.halt;
              if (typeof s.plkLastLift === 'number') this.afPlkLastLift = s.plkLastLift;
            }
          } catch(e) {}
          // Drop a stale governed-halt record if the underlying halt is gone (manual clear, expiry).
          // A PLK has no backing host timer — it expires on its own hard cap instead.
          if (this.afHalt?.kind === 'plk') {
            if (Date.now() - this.afHalt.at >= (this.cfg.ashfallCapHours ?? 24) * 3600 * 1000) { this.afHalt = null; this.afPlkLastLift = Date.now(); }
          } else if (this.afHalt && !_origIsDD.call(this) && !_origIsGL.call(this)) this.afHalt = null;
          if (this.afHalt) this._afEnsureSampler();
          this.log(`[ASH] Ashfall (Chaser) v1.3.0 loaded — ${this.cfg.ashfallEnabled ? 'enabled' : 'disabled'} | ${this.afEvents.length} events, ${this.afSamples.length} samples on record`, 'info');
        },

        // ── PLK (preemptive lock) — proactive halt on historically bad structure ──
        _afPlkActive() {
          if (!this.cfg.ashfallEnabled || !(this.cfg.ashfallPlkEnabled ?? true)) return false;
          return this.afHalt?.kind === 'plk';
        },

        // PLK rides the drawdown gate: every entry choke point (host scans and
        // plugins) that respects the drawdown halt respects a preemptive lock too.
        _isDrawdownHalted() {
          return _origIsDD.call(this) || this._afPlkActive();
        },

        persist() {
          _origPers.call(this);
          try {
            localStorage.setItem(ASH_KEY, JSON.stringify({
              events: this.afEvents, samples: this.afSamples, pnl: this.afPnl, halt: this.afHalt, plkLastLift: this.afPlkLastLift,
            }));
          } catch(e) {}
        },

        // ── Market structure reading — full ticker universe, not the curated pools ──
        async _afFetchStructure() {
          try {
            // Reuse the host scan's bulk ticker response when fresh (slow-tick
            // sampling during halts falls back to fetching — scans don't run then)
            let list;
            if (this._lastAllTickers?.length && (Date.now() - (this._lastAllTickersAt || 0)) < 60000) {
              list = this._lastAllTickers;
            } else {
              const r = await fetch(`${this.base}/v5/market/tickers?category=linear`);
              const d = await r.json();
              if (d.retCode !== 0) return null;
              list = d.result?.list || [];
            }
            let gSum = 0, lSum = 0, gCount = 0, lCount = 0;
            for (const t of list) {
              if (!t.symbol.endsWith('USDT') || t.symbol === 'BTCUSDT') continue;
              if (parseFloat(t.lastPrice || 0) < 0.001) continue;
              const ch = parseFloat(t.price24hPcnt || 0) * 100;
              if (ch > 0)      { gSum += ch; gCount++; }
              else if (ch < 0) { lSum += Math.abs(ch); lCount++; }
            }
            const sumT   = gSum + lSum, cntT = gCount + lCount;
            return {
              ts: Date.now(),
              skew:    sumT > 0 ? (gSum - lSum) / sumT : 0,
              breadth: cntT > 0 ? (gCount - lCount) / cntT : 0,
              gCount, lCount,
              gSum: +gSum.toFixed(1), lSum: +lSum.toFixed(1),
            };
          } catch(e) { return null; }
        },

        // ── Human-readable structure + historical-bias phrasing for the activity log ──
        // Intensity ranges over mildly / moderately / strongly bullish (or bearish). The
        // tiers are entirely relative to this installation's own history: thresholds are
        // the 25th / 50th / 80th percentiles of |lean| across recorded events + samples,
        // so they shift as the profile collects more data. Fixed fallbacks
        // (0.08 / 0.20 / 0.40) apply until at least 30 readings are on record.
        _afDescribe(reading, score, mass) {
          const lean = (reading.skew + reading.breadth) / 2;
          const hist = [...this.afEvents, ...this.afSamples]
            .map(x => Math.abs((x.skew + x.breadth) / 2))
            .sort((a, b) => a - b);
          const q = p => hist[Math.min(hist.length - 1, Math.floor(p * hist.length))];
          const [tFlat, tModerate, tStrong] = hist.length >= 30 ? [q(0.25), q(0.5), q(0.8)] : [0.08, 0.20, 0.40];
          const mag    = Math.abs(lean);
          const adverb = mag >= tStrong ? 'strongly ' : mag >= tModerate ? 'moderately ' : 'mildly ';
          const struct = mag <= tFlat ? 'mixed/flat' : `${adverb}${lean > 0 ? 'bullish' : 'bearish'}`;
          const desc   = `${struct} (skew ${reading.skew.toFixed(2)}, breadth ${reading.breadth.toFixed(2)}, ${reading.gCount}▲/${reading.lCount}▼)`;
          let bias;
          if (score === null || mass < MIN_MASS) bias = `no historical bias noted (evidence mass ${mass.toFixed(1)} < ${MIN_MASS})`;
          else if (score >= 0.15)  bias = `this is historically good for longs (score +${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else if (score <= -0.15) bias = `this is historically bad for longs (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else                     bias = `historically neutral for longs (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          return { desc, bias };
        },

        // ── Hostility score: kernel-weighted, recency-decayed vote of past events
        // and labeled samples near the given reading. score ∈ [−1,1]; mass = evidence weight.
        _afScore(reading) {
          const now = Date.now();
          let num = 0, mass = 0;
          const tally = (skew, breadth, label, w, ts) => {
            const ds = reading.skew - skew, db = reading.breadth - breadth;
            const k  = Math.exp(-(ds * ds + db * db) / (2 * KERNEL_H * KERNEL_H));
            const dec = Math.pow(0.5, (now - ts) / HALF_LIFE_MS);
            num  += w * label * k * dec;
            mass += w * k * dec;
          };
          for (const e of this.afEvents) tally(e.skew, e.breadth, e.kind === 'drawdown' ? -1 : 1, EVENT_W, e.ts);
          for (const s of this.afSamples) { if (s.label !== null) tally(s.skew, s.breadth, s.label, SAMPLE_W, s.ts); }
          return { score: mass > 0 ? num / mass : null, mass };
        },

        // ── Label samples whose 6h window has resolved; drop windows with no closed trades ──
        _afStampSamples() {
          const now = Date.now();
          const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          this.afSamples = this.afSamples.filter(s => {
            if (s.label !== null || now - s.ts < LABEL_WINDOW) return true;
            const trades = this.afPnl.filter(p => p.ts > s.ts && p.ts <= s.ts + LABEL_WINDOW);
            if (!trades.length) return false; // nothing closed — no evidence either way
            const pnl = trades.reduce((a, p) => a + p.pnl, 0);
            s.label = Math.max(-1, Math.min(1, pnl / entryMargin));
            return true;
          });
          if (this.afSamples.length > SAMPLES_CAP) this.afSamples = this.afSamples.slice(-SAMPLES_CAP);
        },

        _afAddSample(reading) {
          this._afStampSamples();
          this.afSamples.push({ ts: reading.ts, skew: reading.skew, breadth: reading.breadth, label: null });
          const { score, mass } = this._afScore(reading);
          this.afStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, at: reading.ts };
        },

        // ── Halt event: record the climate, decide informed cap vs timer fallback ──
        async _afOnHaltTriggered(kind) {
          const reading = await this._afFetchStructure();
          if (!reading) { this.afHalt = { kind, at: Date.now(), informed: false }; this.persist(); return; }
          this.afEvents.push({ ts: reading.ts, kind, skew: reading.skew, breadth: reading.breadth, gCount: reading.gCount, lCount: reading.lCount, gSum: reading.gSum, lSum: reading.lSum });
          if (this.afEvents.length > EVENTS_CAP) this.afEvents = this.afEvents.slice(-EVENTS_CAP);
          const { score, mass } = this._afScore(reading);
          this.afStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, at: reading.ts };
          const informed = mass >= MIN_MASS;
          if (informed) {
            // Enough evidence to govern: extend to the hard cap; early settle lifts it
            const capUntil = reading.ts + (this.cfg.ashfallCapHours ?? 24) * 3600 * 1000;
            if (kind === 'drawdown') this._drawdownHaltUntil = capUntil;
            else                     this._gainsLockHaltUntil = capUntil;
          }
          if (this.afHalt?.kind === 'plk') this.afPlkLastLift = Date.now(); // superseded PLK still starts the cooldown
          this.afHalt = { kind, at: reading.ts, informed };
          const _d = this._afDescribe(reading, score, mass);
          this.log(`[ASH] 🌋 ${kind === 'drawdown' ? 'Drawdown' : 'Gains lock'} activated — market structure is ${_d.desc} | ${_d.bias} → ${informed ? 'profile-governed halt, lifts when structure clears' : 'profile too thin — stock 12h timer'}`, 'warn');
          this._afEnsureSampler();
          this.persist();
        },

        _afEnsureSampler() {
          if (_ashTimer) return;
          const iv = Math.max(3600 * 1000, 4 * (this.cfg.scanMins || 15) * 60 * 1000);
          _ashTimer = setInterval(() => this._afSamplerTick(), iv);
        },

        _afStopSampler() {
          if (_ashTimer) { clearInterval(_ashTimer); _ashTimer = null; }
        },

        async _afSamplerTick() {
          const ddActive = _origIsDD.call(this), glActive = this._isGainsLocked();
          const isPlk    = this.afHalt?.kind === 'plk';
          if (!this.cfg.ashfallEnabled || !this.afHalt || (!isPlk && !ddActive && !glActive)) {
            this.afHalt = null; this._afStopSampler(); this.persist(); return;
          }
          const reading = await this._afFetchStructure();
          if (!reading) return;
          this._afAddSample(reading);
          const { score, mass } = this.afStatus;
          const elapsed = Date.now() - this.afHalt.at;
          if (elapsed >= MIN_HALT_MS && mass >= MIN_MASS && score !== null && score >= (this.cfg.ashfallThawScore ?? 0)) {
            const kind = this.afHalt.kind;
            if      (kind === 'drawdown')  { this._drawdownHaltUntil = 0; this._drawdownWindow = []; }
            else if (kind === 'gainslock') { this._gainsLockHaltUntil = 0; this._gainsWindow = []; }
            // 'plk' has no host timer to clear — dropping afHalt lifts it
            if (kind === 'plk') this.afPlkLastLift = Date.now(); // start the re-trigger cooldown
            this.afHalt = null;
            this._afStopSampler();
            this.log(`[ASH] 🍂 Ash settled — structure cleared the ${kind} zone after ${(elapsed / 3600000).toFixed(1)}h (score ${score.toFixed(2)} ≥ ${(this.cfg.ashfallThawScore ?? 0).toFixed(2)}, mass ${mass.toFixed(1)}) — new entries re-enabled`, 'success');
          } else if (isPlk && elapsed >= (this.cfg.ashfallCapHours ?? 24) * 3600 * 1000) {
            // PLK hard cap — the host timers cap the other kinds; PLK caps itself here
            this.afPlkLastLift = Date.now(); // start the re-trigger cooldown
            this.afHalt = null;
            this._afStopSampler();
            this.log(`[ASH] 🛑 PLK hard cap reached after ${(elapsed / 3600000).toFixed(1)}h — preemptive lock lifted for re-test`, 'warn');
          } else {
            const _d = this._afDescribe(reading, score, mass);
            this.log(`[ASH] ♨ Halt check (${(elapsed / 3600000).toFixed(1)}h elapsed) — market is ${_d.desc} | ${_d.bias} — holding`, 'info');
          }
          this.persist();
        },

        afExport() {
          const blob = new Blob([JSON.stringify({ exportedAt: Date.now(), events: this.afEvents, samples: this.afSamples }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `ashfall-chaser-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
        },

        async runScan() {
          await _origScan.call(this);
          if (!this.cfg.ashfallEnabled) return;
          this._afFetchStructure().then(r => {
            if (!r) return;
            this._afAddSample(r);
            const { score, mass } = this.afStatus;
            const _d = this._afDescribe(r, score, mass);
            this.log(`[ASH] ♨ Routine market structure check — market is ${_d.desc} | ${_d.bias}`, 'info');
            // PLK — proactive rather than reactive: when the current structure is
            // historically bad with sufficient evidence, lock entries preemptively
            // before PnL damage, instead of waiting for a drawdown halt to fire.
            // Lifts like the other halts: early when structure clears the thaw
            // score, or at the hard cap. A cooldown (ashfallPlkCooldownHours,
            // 24h default) gates re-triggering so locks can't fire back to back.
            if ((this.cfg.ashfallPlkEnabled ?? true) && !this.afHalt
                && Date.now() - (this.afPlkLastLift || 0) >= (this.cfg.ashfallPlkCooldownHours ?? 24) * 3600 * 1000
                && !_origIsDD.call(this) && !_origIsGL.call(this)
                && mass >= MIN_MASS && score !== null
                && score <= (this.cfg.ashfallPlkScore ?? -0.15)) {
              this.afHalt = { kind: 'plk', at: Date.now(), informed: true };
              this.log(`[ASH] 🛑 PLK — structure is ${_d.desc} and historically bad for longs (score ${score.toFixed(2)} ≤ ${(this.cfg.ashfallPlkScore ?? -0.15).toFixed(2)}, mass ${mass.toFixed(1)}) — preemptive lock engaged; lifts when structure clears`, 'warn');
              this._afEnsureSampler();
            }
            this.persist();
          }).catch(() => {});
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if ((this.closedTrades?.length ?? 0) > prevLen) {
            // totalPnl (incl. funding) is what the base feeds its halt windows
            const t   = this.closedTrades[0];
            const pnl = t?.totalPnl ?? t?.pnl;
            if (typeof pnl === 'number') {
              const now = Date.now();
              this.afPnl.push({ ts: now, pnl });
              this.afPnl = this.afPnl.filter(e => now - e.ts < PNL_LOG_TTL);
            }
          }
        },

        recordDrawdownPnl(pnl) {
          // Compare the host's own gate — the wrapped one reads true under a PLK
          const prevActive = _origIsDD.call(this);
          _origDD.call(this, pnl);
          if (!this.cfg.ashfallEnabled) return;
          if (!prevActive && _origIsDD.call(this)) {
            // A real drawdown halt supersedes an active PLK (kind is overwritten)
            this._afOnHaltTriggered('drawdown').catch(() => {});
          }
        },

        recordGainsPnl(pnl) {
          const prevActive = this._isGainsLocked();
          _origGL.call(this, pnl);
          if (!this.cfg.ashfallEnabled) return;
          if (!prevActive && this._isGainsLocked()) {
            this._afOnHaltTriggered('gainslock').catch(() => {});
          }
        },
      });
    },
  };
})();
</script>
