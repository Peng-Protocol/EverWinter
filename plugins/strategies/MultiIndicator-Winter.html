          if (!ranks) return 0;
          let base;
          if (/^msliq/.test(rawC)) base = (ranks['msliq+'] ?? 0) + (ranks['msliq-'] ?? 0);
          else if (/^mbliq/.test(rawC)) base = (ranks['mbliq+'] ?? 0) + (ranks['mbliq-'] ?? 0);
          else if (/^sliq/.test(rawC)) base = (ranks['sliq+'] ?? 0) + (ranks['sliq-'] ?? 0);
          else if (/^bliq/.test(rawC)) base = (ranks['bliq+'] ?? 0) + (ranks['bliq-'] ?? 0);
          else base = ranks[(annotC || '').replace(/\d+$/, '')] ?? 0;
          if (!base) return 0;
          // Depth = distance past the slot's own gate threshold, in the qualifying direction ‚Äî
          // NOT raw tier magnitude. For a ">" gate, a higher tier is further past threshold and
          // deeper. For a "<" gate (vm<N, iot<N, iom<N, ocx<N), a LOWER tier is further past
          // threshold and deeper ‚Äî using raw magnitude there would score a barely-qualifying
          // ticker as "deeper" than one that qualifies strongly, which is backwards.
          const annotM = (annotC || '').match(/([+-]?\d+)$/);
          const tierVal = annotM ? parseInt(annotM[1], 10) : 0;
          const gateM = rawC.match(/([<>])(-?\d+)$/);
          let depth = Math.abs(tierVal);
          if (gateM) {
            const threshold = parseInt(gateM[2], 10);
            depth = gateM[1] === '>' ? Math.max(0, tierVal - threshold) : Math.max(0, threshold - tierVal);
          }
          const depthPct = (this.cfg.pfCoQualDepthPct ?? 10) / 100;
          return base * (1 + depth * depthPct);
        },

        // Live liquidation criterion match ‚Äî sliq/bliq/msliq/mbliq only, evaluated against a
        // depth value already computed from the live message (see calcLiveDepth / _miwOnLiqMessage).
        // A bare anchor (no depth suffix ‚Äî always true for Auto Slots, optional for manual) falls
        // back to the general Live Depth Threshold; a manual per-slot suffix overrides it.
        _miwCheckLiveLiqCrit(c, type, depth) {
          const base = c.match(/^(?:m?sliq|m?bliq)/)?.[0];
          if (base !== type) return false;
          const m = c.match(/^(?:m?sliq|m?bliq)([<>])([+-]?\d+)$/);
          if (!m) return depth >= (this.cfg.miwLiveDepthThreshold ?? 1);
          return m[1] === '>' ? depth >= parseInt(m[2], 10) : depth <= parseInt(m[2], 10);
        },

        // Annotation for a live-triggered slot's criteria ‚Äî sliq/bliq/msliq/mbliq use the live
        // depth just computed from the message (never _liqResults, which is closed-cycle only).
        // Everything else mirrors _miwOpen's cache-based annotation.
        _miwAnnotateLiveCrit(c, t, liveType, liveDepth, ocResults) {
          if (LIQ_TYPES.some(ty => c.startsWith(ty))) return `${liveType}${liveDepth >= 0 ? '+' : ''}${liveDepth}`;
          if (/^va/.test(c)) { const val = parseFloat(t.turnover24h || 0); const w = this._pfVolIoWindowAvg?.('vol'); const step = this.cfg.miwVaStep ?? 1; const tier = (val && w) ? Math.floor(((val - w) / w * 100) / step) : 0; return `va${tier>=0?'+':''}${tier}`; }
          if (/^ioa/.test(c)) { const val = parseFloat(t.openInterestValue || 0); const w = this._pfVolIoWindowAvg?.('oi'); const step = this.cfg.miwIoaStep ?? 1; const tier = (val && w) ? Math.floor(((val - w) / w * 100) / step) : 0; return `ioa${tier>=0?'+':''}${tier}`; }
          if (/^fund/.test(c)) { const step = this.cfg.miwFundStep ?? 0.25; const fr_ = parseFloat(t.fundingRate||0)*100; const tier = Math.floor(fr_/step); return `fund${tier>=0?'+':''}${tier}`; }
          if (/^vsg/.test(c)) { const p = this._miwGetPecSync(t.symbol); const v = p?.vsg; if (!v || v['6h']==null || v['12h']==null || v['24h']==null) return `${c}+0`; const step = this.cfg.miwVsgDepthStep ?? 5; const high = this.cfg.miwVsgThresholdHigh ?? 70; const low = this.cfg.miwVsgThresholdLow ?? 30; let depth = 0; if (c==='vsgot') depth = ((v['6h']-high)+(v['12h']-high)+(v['24h']-high))/3; else if (c==='vsgut') depth = ((low-v['6h'])+(low-v['12h'])+(low-v['24h']))/3; else if (c==='vsgalpha') depth = ((v['12h']-v['6h'])+(v['12h']-v['24h']))/2; else if (c==='vsgdelta') depth = ((v['6h']-v['12h'])+(v['24h']-v['12h']))/2; else if (c==='vsgmomup') depth = v['6h']-v['24h']; else if (c==='vsgmomdn') depth = v['24h']-v['6h']; const tier = Math.max(0, Math.floor(depth/step)); return `${c}+${tier}`; }
          if (/^ocs/.test(c)) { const _r = ocResults?.[t.symbol]; const tot = (_r?.bc||0)+(_r?.sc||0); const buyPct = tot ? (_r.bc||0)/tot*100 : 50; const step = this.cfg.miwOcsStep ?? 1; const tier = Math.floor((buyPct-50)/step); return `ocs${tier>=0?'+':''}${tier}`; }
          if (/^ocx/.test(c)) { const _r = ocResults?.[t.symbol]; const _w = this._pfOcWindowAvgMs?.(); const step = this.cfg.miwOcxStep ?? 1; const tier = (_r?.avgMs!=null && _w) ? Math.floor(((_w - _r.avgMs) / _w * 100) / step) : 0; return `ocx${tier>=0?'+':''}${tier}`; }
          if (/^pec/.test(c)) {
            const p = this._miwGetPecSync(t.symbol);
            if (!p || p['6h'] == null || p['12h'] == null || p['24h'] == null) return `${c}+0`;
            const step = this.cfg.miwPecDepthStep ?? 5;
            const high = this.cfg.miwPecThresholdHigh ?? 70;
            const low  = this.cfg.miwPecThresholdLow ?? 30;
            let depth = 0;
            if (c === 'pecob') depth = ((p['6h']-high)+(p['12h']-high)+(p['24h']-high))/3;
            else if (c === 'pecos') depth = ((low-p['6h'])+(low-p['12h'])+(low-p['24h']))/3;
            else if (c === 'pecalpha') depth = ((p['12h']-p['6h'])+(p['12h']-p['24h']))/2;
            else if (c === 'pecdelta') depth = ((p['6h']-p['12h'])+(p['24h']-p['12h']))/2;
            else if (c === 'pecmomup') depth = p['6h']-p['24h'];
            else if (c === 'pecmomdn') depth = p['24h']-p['6h'];
            else return c;
            const tier = Math.max(0, Math.floor(depth/step));
            return `${c}+${tier}`;
          }
          return c;
        },

        // Live liq-message hook ‚Äî registered via Permafrost's registerLiqMessageHook. Not
        // scan-gated: fires the instant a message crosses this ticker's slot(s) depth threshold.
        // Only sliq/bliq/msliq/mbliq route through here ‚Äî 0liq/past1 are closed-cycle-only and
        // stay on the regular runScan/checkCrit path. Skipped entirely when 'live' isn't active.
        async _miwOnLiqMessage(batch, sym) {
          if (!this.cfg.miwEnabled) return;
          if (!this._miwEffectivePresenceModes().includes('1')) return;
          // A halt blocks the real entry below, but Historical Scoring still wants to see what
          // this message would have matched ‚Äî otherwise live-only setups (and any live-anchored slots)
          // go completely dark for scoring purposes every time a halt is active, since the
          // scan-time checker can never resolve a live liq anchor on its own (see _miwCheckCrit ‚Äî
          // sliq/bliq/msliq/mbliq have no branch there). Falls through to a hist-only simulation
          // instead of returning, gated the same way _miwHistScoringActive() already gates the
          // scan-time path.
          const halted = !!(this._isDrawdownHalted?.() || this._isGainsLocked?.());
          if (halted && !this._miwHistScoringActive()) return;
          if (this._isSymbolBanned?.(sym)) return;
          if (!halted && this._miwIsReentryBlocked(sym)) return;
          if (this._miwOpening.has(sym)) return;
          if ((this.positions || []).some(p => p.symbol === sym)) return;

          const sRaw  = batch.sLiqTurnover?.[sym] || 0;
          const bRaw  = batch.bLiqTurnover?.[sym] || 0;
          const total = sRaw + bRaw;
          if (!total) return;
          const sPct = sRaw / total, bPct = bRaw / total;

          const type = this._miwClassifyLiqDominance(sPct, bPct);
          if (!type) return;

          // Tell Ashfall this ticker just produced a live liq event, regardless of whether this
          // bot has a slot to act on it ‚Äî Ashfall's Only-0 side reacts by graylisting the ticker
          // for 6h (see pfCrossLiqGraylistEnabled). Piggybacks on the existing Cross Broadcast
          // toggle rather than adding a separate one for the sending direction.
          if (this.cfg.permafrostCrossEnabled) this._pfCrossWrite?.('live-liq', sym);

          // Direction-awareness lock ‚Äî a prior win/loss on this exact liq type for this exact
          // ticker can lock this bot into only that type, or exclude it. See _miwOnPositionScored
          // for how the lock gets written, and _miwLockTtl for the window.
          if (this.cfg.miwDirLockEnabled) {
            const lock = this._miwDirLock?.[sym];
            if (lock && (Date.now() - lock.ts) < this._miwLockTtl()) {
              if (lock.mode === 'lock'    && type !== lock.type) return;
              if (lock.mode === 'exclude' && type === lock.type) return;
            }
          }

          // Ashfall winning a 0-Liq trade on this ticker graylists it from this bot's live
          // entries for 6h (symmetric to the self/cross-liq graylists guarding 0-Liq).
          if (this.cfg.pfCrossWinGraylistEnabled) {
            const _winEv = (this._pfCrossRead?.() || []).find(e => e.kind === '0liq-win' && e.source === 'chaser' && e.symbol === sym);
            if (_winEv) {
              if (!this._miwCrossWinGraylist) this._miwCrossWinGraylist = {};
              this._miwCrossWinGraylist[sym] = { ts: _winEv.ts, reason: 'cross-win' };
              return;
            }
          }

          const autoMode = !!this.cfg.miwAutoSlots;
          const isSell = type === 'sliq' || type === 'msliq';
          const raw    = isSell ? sRaw : bRaw;
          const avg    = isSell ? (this._liqAvgSTurnover || 0) : (this._liqAvgBTurnover || 0);
          const depth  = calcLiveDepth(raw, avg);

          const t = (this._lastAllTickers || []).find(x => x.symbol === sym);
          if (!t) return;
          const fr      = parseFloat(t.fundingRate || 0) * 100;
          let pec       = this._miwGetPecSync(sym);
          // PEC is normally only ever populated for tickers whose liq batch just closed (see
          // _miwPrefetchPec) ‚Äî a different population than "this symbol just triggered a live
          // entry." Unlike kline/OC below, it had no on-demand fallback here at all, so a
          // live entry could open with fund/OCS/OCX guaranteed but PEC left entirely to chance.
          if (this.cfg.miwForceGeneralCriteria && !pec) {
            await this._miwPrefetchPec([sym]);
            pec = this._miwGetPecSync(sym);
          }

          this._miwOpening.add(sym);
          try {
            if (autoMode) {
              // Auto's anchor is always bare (no per-slot depth override), so the live-trigger
              // depth check is a single general-threshold test, done once ‚Äî not once per combo.
              if (!this._miwAnchorAllowed(type) || !this._miwCheckLiveLiqCrit(type, type, depth)) return;

              const exclude    = new Set(this.cfg.miwAutoSlotExclude || []);
              const activeSec  = SECONDARY_CRITS.filter(c => !exclude.has(c));
              const needsVsg   = activeSec.some(c => /^vsg/.test(c));
              const needsOc    = activeSec.some(c => /^(ocs|ocx)/.test(c));

              if (needsVsg && !pec) { await this._miwPrefetchPec([sym]); pec = this._miwGetPecSync(sym); }
              let ocResult = this.pfOcResults?.[sym] ?? null;
              if (needsOc && !ocResult && this.cfg.pfOcEnabled) ocResult = await this._ocFetchSingle?.(sym) ?? null;
              const ocResultsMap = ocResult ? { [sym]: ocResult } : {};

              // va/ioa need no live prefetch ‚Äî the per-ticker value is already on `t`, and the
              // population average comes from the tethered _pfOcCycleHistory window.
              const matched = this._miwAutoQualify(
                type,
                c => this._miwCheckCrit(c, fr, pec, t, ocResultsMap),
                c => this._miwAnnotateLiveCrit(c, t, type, depth, ocResultsMap)
              );
              if (!matched) return;

              if (halted || this._miwIsEntryBlocked(type, matched.annotCrits)) {
                this._miwLogLiveHistMatch(sym, matched.annotCrits);
                return;
              }

              let compositeScore = 0;
              if (this.cfg.pfCoQualPenaltyEnabled) {
                // Every true criterion is already captured ‚Äî sum directly, same reasoning as
                // the scan-time path (see the pool-build loop's Auto compositeScore comment).
                compositeScore = matched.criteria.reduce((s, c, j) => s + this._miwScaledRank(c, matched.annotCrits[j]), 0);
              }
              await this._miwLiveTryOpen(t, matched.criteria, matched.annotCrits, compositeScore, type, depth);
              return;
            }

            // Manual mode ‚Äî exact AND-gate combos, unchanged.
            const candidateSlots = this._miwEffectiveSlots().filter(s => {
              const anchor = this._miwSlotLiqAnchor(s);
              return anchor && anchor.startsWith(type);
            });
            if (!candidateSlots.length) return;

            for (let i = 0; i < candidateSlots.length; i++) {
              const slot   = candidateSlots[i];
              const anchor = this._miwSlotLiqAnchor(slot);
              if (!this._miwCheckLiveLiqCrit(anchor, type, depth)) continue;

              const secondary  = slot.filter(c => c !== anchor);
              const needsVsg   = secondary.some(c => /^vsg/.test(c));
              const needsOc    = secondary.some(c => /^(ocs|ocx)/.test(c));

              if (needsVsg && !pec) { await this._miwPrefetchPec([sym]); pec = this._miwGetPecSync(sym); }
              // Reuses this symbol's fresh scan-time OC data if it happens to already be in
              // pfOcResults, but otherwise fetches via the isolated _ocFetchSingle ‚Äî never
              // _ocFetchBatch, which would replace the whole shared pfOcResults snapshot other
              // tickers' checks still need this cycle, and would flood the OC chart's history
              // with a noisy 1-ticker sample (see _ocFetchSingle's own comment).
              let ocResult = this.pfOcResults?.[sym] ?? null;
              if (needsOc && !ocResult && this.cfg.pfOcEnabled) ocResult = await this._ocFetchSingle?.(sym) ?? null;
              const ocResultsMap = ocResult ? { [sym]: ocResult } : {};

              // va/ioa need no live prefetch ‚Äî the per-ticker value is already on `t`, and the
              // population average comes from the tethered _pfOcCycleHistory window.
              if (!secondary.every(c => this._miwCheckCrit(c, fr, pec, t, ocResultsMap))) continue;

              // Matched ‚Äî annotate and score against this same-type slot subset. Co-Qualifying
              // Penalty against slots anchored on a different liq type or 0liq is moot: only one
              // liq classification can be true for this ticker at this moment, so any such slot
              // would fail its own anchor check anyway.
              const annotCrits = slot.map(c => this._miwAnnotateLiveCrit(c, t, type, depth, ocResultsMap));

              // Halted or Slot-Blocked: everything above (banlist, direction lock, cross-win
              // graylist, criteria match) is exactly what a real entry would have checked, so
              // this is a genuine match a real entry would have taken were it not blocked ‚Äî log
              // it as a hist target and stop, same as the real path does below. Slot Blocking
              // still lets hist scoring log through it so the score has data to recover with.
              if (halted || this._miwIsEntryBlocked(anchor, annotCrits)) {
                this._miwLogLiveHistMatch(sym, annotCrits);
                return;
              }

              let compositeScore = 0;
              if (this.cfg.pfCoQualPenaltyEnabled) {
                const bestScore = slot.reduce((s, c, j) => s + this._miwScaledRank(c, annotCrits[j]), 0);
                let penalty = 0;
                for (let k = 0; k < candidateSlots.length; k++) {
                  if (k === i) continue;
                  const other = candidateSlots[k];
                  if (!this._miwCheckLiveLiqCrit(this._miwSlotLiqAnchor(other), type, depth)) continue;
                  const otherSecondary = other.filter(c => c !== this._miwSlotLiqAnchor(other));
                  if (!otherSecondary.every(c => this._miwCheckCrit(c, fr, pec, t, ocResultsMap))) continue;
                  const otherAnnot = other.map(c => this._miwAnnotateLiveCrit(c, t, type, depth, ocResultsMap));
                  const sc = other.reduce((s, c, j) => s + this._miwScaledRank(c, otherAnnot[j]), 0);
                  if (sc < 0) penalty += sc;
                }
                compositeScore = bestScore + penalty;
              }

              await this._miwLiveTryOpen(t, slot, annotCrits, compositeScore, type, depth);
              return;
            }
          } finally {
            this._miwOpening.delete(sym);
          }
        },

        async _miwLiveTryOpen(t, criteria, annotCrits, compositeScore, liqType, depth) {
          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.miwShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.miwShareCapPct ?? 100) / 100)));
            const miwCount = (this.positions || []).filter(p => p._miw).length;
            headroom = Math.min(headroom, capSlots - miwCount);
          }
          if (headroom >= 1) return await this._miwLiveOpen(t, criteria, annotCrits, compositeScore, liqType, depth);
          if (!(this.cfg.miwSubstitutionEnabled ?? true)) return false;
          return await this._miwLiveTrySubstitute(t, criteria, annotCrits, compositeScore, liqType, depth);
        },

        // Path-B (live) substitution ‚Äî same cross-strategy pool as _miwTrySubstitute, but a live
        // candidate can never close a path-A (0-liq, closed-cycle) position: path-A is the
        // higher-conviction read, per Protect Path-A. Path-A's own substitution has no such
        // restriction since it's always the superior side. Still score-gated, same margin check
        // as the scan-time version ‚Äî clearing the depth threshold alone isn't sufficient.
        async _miwLiveTrySubstitute(t, criteria, annotCrits, compositeScore, liqType, depth) {
          const now            = Date.now();
          const minAgeMs       = (this.cfg.miwSubstitutionMinAgeMins ?? 10) * 60000;
          const protectWinners = this.cfg.miwSubstitutionProtectWinners ?? true;
          const protectPathA   = this.cfg.miwSubstitutionProtectPathA ?? true;
          const baseMargin     = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const marginThreshold = baseMargin * ((this.cfg.miwSubstitutionMarginPct ?? 5) / 100);

          const eligible = (this.positions || []).filter(p => {
            if (protectPathA && p._miwPathA) return false;
            if ((now - (p.openedAt || 0)) < minAgeMs) return false;
            if (protectWinners && (p.upnl || 0) > 0) return false;
            return true;
          });
          if (!eligible.length) return false;

          const scoreOf = p => p._miw ? (p._miwCompositeScore ?? 0) : -Infinity;
          eligible.sort((a, b) => scoreOf(a) - scoreOf(b));
          const worst      = eligible[0];
          const worstScore = scoreOf(worst);
          if ((compositeScore - worstScore) < marginThreshold) return false;

          this.log(`[MIW] üîÅ Live Substitution ‚Äî closing ${worst.symbol} (score ${worstScore === -Infinity ? 'n/a' : worstScore.toFixed(4)}) for ${t.symbol} (score ${compositeScore.toFixed(4)}), Œî${(compositeScore - worstScore).toFixed(4)} ‚â• ${marginThreshold.toFixed(4)} margin`, 'info');
          await this.pseudoClosePosition(worst, 'substitution');
          return await this._miwLiveOpen(t, criteria, annotCrits, compositeScore, liqType, depth);
        },

        // All _miw* tagging fields go into pseudoOpenShort's candidate object (see _miwOpen's
        // comment above for why ‚Äî the atomic tag-on-open avoids a momentary "Multi" badge).
        async _miwLiveOpen(t, criteria, annotCrits, compositeScore, liqType, depth) {
          const sym = t.symbol;
          let price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          try {
            const r  = await fetch(`${this.base}/v5/market/tickers?category=linear&symbol=${sym}`);
            const d  = await r.json();
            const lp = parseFloat(d?.result?.list?.[0]?.lastPrice);
            if (lp > 0) price = lp;
          } catch(e) {}
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const pos = await this.pseudoOpenShort({
            symbol: sym, price, change, fundingRate: fr,
            _miw: true,
            _miwPathA: false, // live/reactive entry ‚Äî see Substitution's path precedence
            _miwSlotIdx: 0,
            _miwCompositeScore: compositeScore ?? 0,
            _miwLiqType: liqType,
            _miwLiqDepth: depth,
            _miwCriteria: annotCrits,
          });
          if (pos) {
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        // The liq criterion a slot is anchored on, or null if the slot has none. sliq/bliq/
        // msliq/mbliq are the live-only anchors; 0liq is the closed-cycle-only anchor. null no
        // longer means "invalid" outright ‚Äî it also describes a valid Past-1 slot, IF 'past1' is
        // an active presence mode (see _miwEffectiveSlots, which is where that distinction gets
        // made; this function only reports what's literally in the slot).
        _miwSlotLiqAnchor(slot) {
          return (slot || []).find(c => LIQ_TYPES.some(t => c.startsWith(t)) || c === '0liq') || null;
        },

        // Every other reader of the mode should call this, not cfg.miwLiqPresenceModes directly.
        // Always non-empty ‚Äî falls back to ['1'] the same way the old single-mode getter did.
        _miwEffectivePresenceModes() {
          const m = this.cfg.miwLiqPresenceModes;
          return Array.isArray(m) && m.length ? m : ['1'];
        },

        // Multi-select toggle for the Liquidation Presence buttons. Refuses to drop the last
        // active mode ‚Äî a slot with no reachable anchor type would never match anything.
        _miwToggleLiqMode(v) {
          if (this.cfgLocked) return;
          const cur = new Set(this._miwEffectivePresenceModes());
          if (cur.has(v)) {
            if (cur.size <= 1) return;
            cur.delete(v);
          } else {
            cur.add(v);
          }
          this.cfg.miwLiqPresenceModes = ['1','0','past1'].filter(m => cur.has(m));
          this.persist();
        },

        // Shared collapsed-rank lookup (own + partner + historical PnL, see miwCollapsedSlotRanks)
        // for a single criterion key. Every criterion's rank accumulates under a sign-suffixed key
        // (e.g. 'sliq+', 'fund-', 'pecob+'), so both variants are summed ‚Äî PEC is tiered like
        // fund/vm/iot (always non-negative, '+' only) rather than a bare unsigned key like 0liq.
        _miwCritScore(c) {
          const ranks = this.miwCollapsedSlotRanks || {};
          return (ranks[c] ?? 0) + (ranks[c + '+'] ?? 0) + (ranks[c + '-'] ?? 0);
        },

        // Slot Blocking: true once a criterion's collapsed score is a loss beyond the configured
        // % of base margin. Auto-clears the moment the score recovers ‚Äî no manual reset needed.
        _miwIsCritBlocked(c) {
          if (!this.cfg.miwSlotBlockEnabled) return false;
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const threshold  = baseMargin * ((this.cfg.miwSlotBlockPct ?? 25) / 100);
          return this._miwCritScore(c) <= -threshold;
        },

        // Always checks the triggering liq-anchor type. miwSlotBlockTags additionally checks
        // every criterion selected in cfg.miwSlotBlockCriteria (see the Blockable Criteria
        // picker) ‚Äî configurable rather than a hardcoded set, so any secondary criterion
        // (including fund) can be opted in. Nothing is blockable by default beyond the
        // pre-existing PEC/VSG set ‚Äî see DEFAULT_BLOCKABLE_CRITS.
        _miwIsEntryBlocked(anchor, annotCrits) {
          if (this._miwIsCritBlocked(anchor)) return true;
          if (!this.cfg.miwSlotBlockTags) return false;
          const blockable = (this.cfg.miwSlotBlockCriteria || []).filter(Boolean);
          if (!blockable.length) return false;
          const rx = new RegExp('^(' + blockable.join('|') + ')[+-]');
          return (annotCrits || []).some(c => rx.test(c) ? this._miwIsCritBlocked(c.replace(/\d+$/, '')) : false);
        },

        // true if this liq anchor is allowed under the current Liquidation Presence modes.
        // Only ever called with a real criterion (0liq or a live type) ‚Äî Past-1 has no anchor
        // criterion, so it's never passed in here; see _miwEffectiveSlots/_miwAutoQualify for
        // where the 'past1' mode is actually consulted.
        _miwAnchorAllowed(anchorCrit) {
          const modes = this._miwEffectivePresenceModes();
          if (anchorCrit === '0liq') return modes.includes('0');
          return modes.includes('1'); // sliq/bliq/msliq/mbliq
        },

        // Reads the same shared graylist the host writes on every close (any strategy, keyed by
        // symbol) ‚Äî a symbol stays blocked for one bulk-ticker cooldown window after its position
        // closes. 'both' (default) blocks regardless of win/loss; 'losers' lets a symbol that
        // just closed in profit re-trigger immediately. Ported from Liquid-Diver.
        _miwIsReentryBlocked(sym) {
          const g = this._tickerGraylist?.[sym];
          if (!g || !(g.ts > 0)) return false;
          const ttl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3600000;
          if (Date.now() - g.ts >= ttl) return false;
          if ((this.cfg.miwReentryBlockMode ?? 'losers') === 'losers') return g.isWin === false;
          return true;
        },

        // Registered via Permafrost's registerLiqCloseHook ‚Äî fires once per closed liq batch with
        // every surveilled symbol's final turnover, qualifying or not. A ticker with ANY recorded
        // liquidation (even one that never crossed the qualifying % threshold) gets graylisted for
        // the _miwLockTtl() window as a belt-and-suspenders backstop ‚Äî redundant now that
        // _miwCheckCrit's '0liq' branch itself scans the full retained window
        // (_miwLiqZeroAcrossWindow), but left in place rather than reworked right now.
        _miwOnLiqClose(results, batch) {
          // Closed-batch pool: every symbol whose surveillance batch just closed lands here for
          // miwPecFreshCycles cycles, carrying its dominance stats alongside the timestamp. This
          // is the shared foundation for two consumers: PEC (see _miwPecFreshCandidates, which
          // only needs the timestamp) and the past1 liq anchor (see _miwPast1FreshSymbols, which
          // needs sLiqPct/bLiqPct/sLiqRaw/bLiqRaw/sDepth/bDepth to tell "had some liquidation
          // but never crossed the live threshold" apart from "genuinely clean"). Tracked
          // unconditionally ‚Äî this is the only source of tickers for either consumer, unlike the
          // graylist below which is opt-in via miwSelfLiqGraylistEnabled.
          if (!this._miwPecPool) this._miwPecPool = {};
          const _now = Date.now();
          for (const r of (results || [])) {
            if (!r?.sym) continue;
            this._miwPecPool[r.sym] = {
              ts: _now,
              sLiqPct: r.sLiqPct ?? 0, bLiqPct: r.bLiqPct ?? 0,
              sLiqRaw: r.sLiqRaw ?? 0, bLiqRaw: r.bLiqRaw ?? 0,
              sDepth:  r.sDepth  ?? 0, bDepth:  r.bDepth  ?? 0,
            };
          }

          if (!this.cfg.miwSelfLiqGraylistEnabled) return;
          if (!this._miwSlotGraylist) this._miwSlotGraylist = {};
          const now = Date.now();
          for (const r of (results || [])) {
            if ((r.sLiqRaw || 0) + (r.bLiqRaw || 0) > 0) {
              this._miwSlotGraylist[r.sym] = { ts: now, reason: 'self-liq' };
            }
          }
        },

        // Retrospective classification of a closed batch's dominance against the same 70%/30%
        // thresholds _miwOnLiqMessage checks live (sFrac/bFrac as 0-1 fractions). Shared so the
        // two never drift apart. Returns the live criterion it would have fired, or null.
        _miwClassifyLiqDominance(sFrac, bFrac) {
          if (sFrac >= 0.70) return 'sliq';
          if (bFrac >= 0.70) return 'bliq';
          if (sFrac > bFrac && bFrac >= 0.30) return 'msliq';
          if (bFrac > sFrac && sFrac >= 0.30) return 'mbliq';
          return null;
        },

        // past1 candidate set: fresh closed-batch entries (same TTL as PEC, uncapped ‚Äî this is
        // pure lookup, no fetch) that are liq- ‚Äî real liquidation happened (sLiqRaw+bLiqRaw > 0,
        // so not 0-Liq's territory) but neither side's raw turnover cleared its own historical
        // average (sDepth/bDepth, the same calcDepth Permafrost already computed against
        // _liqAvgSTurnover/_liqAvgBTurnover) beyond miwLiveDepthThreshold (default 1, i.e. "‚â•1%
        // above average"). This is independent of sell/buy dominance ‚Äî the 70/30 split
        // (_miwClassifyLiqDominance) only labels sliq/bliq/msliq/mbliq for the live path and has
        // no bearing on the liq+/liq-/0-liq classification here. A ticker is liq- (past1) as long
        // as the stronger of its two sides never cleared the threshold; if either side did, it's
        // liq+ and would have fired live already, so it's excluded. Checked against the global
        // threshold (a manual per-slot depth override on a live anchor has no bearing on this
        // pool). Consumed by the scan loop as the match gate for anchorless (Past-1) slots ‚Äî past1
        // is a path, not a criterion, so this is never called from checkCrit.
        _miwPast1FreshSymbols() {
          const pool = this._miwPecPool || {};
          const ttl  = (this.cfg.miwPecFreshCycles ?? 4) * (this.cfg.scanMins ?? 15) * 60000;
          const threshold = this.cfg.miwLiveDepthThreshold ?? 1;
          const now  = Date.now();
          const out  = new Set();
          for (const [sym, e] of Object.entries(pool)) {
            if ((now - e.ts) >= ttl) continue;
            if ((e.sLiqRaw || 0) + (e.bLiqRaw || 0) <= 0) continue; // no liquidation at all ‚Äî 0-Liq's territory
            const maxDepth = Math.max(e.sDepth ?? 0, e.bDepth ?? 0);
            if (maxDepth >= threshold) continue; // liq+ ‚Äî a side cleared its average, would have fired live
            out.add(sym); // liq- ‚Äî real liquidation, but neither side cleared its average
          }
          return out;
        },

        // Window for the self-liq graylist, cross-bot graylist reactions, and the direction-
        // awareness lock ‚Äî tracks Permafrost's own retained liquidation history (capped at 25
        // batches) at this bot's own scan cadence, rather than a fixed duration, so a faster or
        // slower scanMins doesn't drift the exclusion away from what "25 batches" actually covers.
        // Cross-bot reactions (Partner Live-Liq / Partner 0-Liq Win) also can't outlive
        // Permafrost/Ashfall's own CROSS_TTL (6h) regardless, since that's how long the
        // underlying broadcast event itself survives in _pfCrossRead()/_afCrossRead().
        _miwLockTtl() {
          return (this.cfg.scanMins ?? 15) * 60000 * 25;
        },

        _miwIsSlotGraylisted(sym) {
          const g = this._miwSlotGraylist?.[sym];
          if (!g || !(g.ts > 0)) return false;
          return (Date.now() - g.ts) < this._miwLockTtl();
        },

        // Called from Permafrost's pseudoClosePosition with the closed position's symbol,
        // criteria, and realized PnL. If the criteria include a live liq type (sliq/bliq/msliq/
        // mbliq), locks or excludes that exact type for that exact ticker for the _miwLockTtl()
        // window ‚Äî default: a win locks this bot into repeating only that type, a loss excludes
        // it. miwDirLockInvert flips both: a win excludes the type (don't repeat a move already
        // spent), a loss locks into it (bet the losing read was actually right). Breakeven
        // (pnl === 0) is a no-op.
        _miwOnPositionScored(symbol, criteria, pnl) {
          if (!this.cfg.miwDirLockEnabled) return;
          if (typeof pnl !== 'number' || pnl === 0) return;
          const m = (criteria || []).map(c => c.match(/^(m?sliq|m?bliq)(?:[+-]\d+)?$/)).find(Boolean);
          if (!m) return;
          const type   = m[1];
          const isWin  = pnl > 0;
          const invert = !!this.cfg.miwDirLockInvert;
          const mode   = (isWin !== invert) ? 'lock' : 'exclude';
          if (!this._miwDirLock) this._miwDirLock = {};
          this._miwDirLock[symbol] = { type, mode, ts: Date.now(), isWin };
        },

        // Merges all four ticker-exclusion mechanisms into one row per ticker: Self-Liq
        // Graylist, react-to-partner-live-liq, react-to-partner-0-liq-win, and Direction Lock.
        // Each is otherwise invisible on its own (only Direction Lock previously had a panel),
        // even though all four answer the same question ‚Äî "why isn't this ticker eligible?" ‚Äî
        // and a ticker can be caught by more than one at once. "Until" is the latest of the
        // ticker's active reasons, since the ticker stays constrained until all of them clear.
        // Self-Liq/Partner-Live-Liq only affect anything while the 0-Liq path is reachable
        // ('0' active); Partner-0-Liq-Win/Direction-Lock only affect anything while the live
        // path is reachable ('1' active) ‚Äî a reason inert under the current modes is skipped
        // entirely rather than shown as if it were still doing something.
        _miwCombinedLockRows() {
          const now  = Date.now();
          const ttl  = this._miwLockTtl();
          const modes = this._miwEffectivePresenceModes();
          const zeroLiqRelevant = modes.includes('0');
          const liveLiqRelevant = modes.includes('1');
          const bySym = {};
          const add = (sym, text, mode_, ts) => {
            if (!bySym[sym]) bySym[sym] = { sym, reasons: [], maxTs: 0 };
            bySym[sym].reasons.push({ text, mode: mode_ });
            if (ts > bySym[sym].maxTs) bySym[sym].maxTs = ts;
          };
          if (zeroLiqRelevant && this.cfg.miwSelfLiqGraylistEnabled) {
            for (const [sym, g] of Object.entries(this._miwSlotGraylist || {})) {
              if ((now - g.ts) < ttl) add(sym, 'Self-Liq', 'exclude', g.ts);
            }
          }
          if (zeroLiqRelevant && this.cfg.pfCrossLiqGraylistEnabled) {
            for (const [sym, g] of Object.entries(this._miwCrossLiqGraylist || {})) {
              if ((now - g.ts) < ttl) add(sym, 'Partner Live-Liq', 'exclude', g.ts);
            }
          }
          if (liveLiqRelevant && this.cfg.pfCrossWinGraylistEnabled) {
            for (const [sym, g] of Object.entries(this._miwCrossWinGraylist || {})) {
              if ((now - g.ts) < ttl) add(sym, 'Partner 0-Liq Win', 'exclude', g.ts);
            }
          }
          if (liveLiqRelevant && this.cfg.miwDirLockEnabled) {
            const labelOf = { sliq: 'S-Liq', bliq: 'B-Liq', msliq: 'mS-Liq', mbliq: 'mB-Liq' };
            for (const [sym, l] of Object.entries(this._miwDirLock || {})) {
              if ((now - l.ts) < ttl) add(sym, labelOf[l.type] || l.type, l.mode, l.ts);
            }
          }
          return Object.values(bySym).map(r => {
            const exp = new Date(r.maxTs + ttl);
            return { sym: r.sym, reasons: r.reasons, until: exp.getHours().toString().padStart(2,'0')+':'+exp.getMinutes().toString().padStart(2,'0') };
          }).sort((a, b) => a.sym.localeCompare(b.sym));
        },

        // Auto's minimum-gate qualifier. "Criteria per Slot" (miwAutoSlotSize) is a FLOOR, not a
        // fixed count: given an anchor (or null for an anchorless Past-1 match), this evaluates
        // EVERY non-excluded secondary criterion against the ticker and qualifies once at least
        // (size - 1) of them are true (the full size for Past-1, since there's no anchor slot to
        // reserve room for). Unlike the old fixed-size combo system, every true criterion is kept
        // ‚Äî a ticker exhibiting 5 genuine criteria is scored on all 5, not sliced down to however
        // many the slider happens to say. checkFn(c) -> bool and annotFn(c) -> annotated string
        // are supplied by the caller so this works identically at scan time and live time.
        _miwAutoQualify(anchor, checkFn, annotFn) {
          const exclude = new Set(this.cfg.miwAutoSlotExclude || []);
          const need = Math.max(0, (this.cfg.miwAutoSlotSize ?? 3) - (anchor ? 1 : 0));
          const trueCrits = [];
          for (const c of SECONDARY_CRITS) {
            if (exclude.has(c)) continue;
            if (checkFn(c)) trueCrits.push(c);
          }
          if (trueCrits.length < need) return null;
          const criteria = anchor ? [anchor, ...trueCrits] : trueCrits;
          return { criteria, annotCrits: criteria.map(c => annotFn(c)) };
        },

        // True if Auto mode could produce a qualifying match at all right now ‚Äî i.e. at least
        // one anchor (or Past-1) is reachable under the current presence modes/exclusions, and
        // enough non-excluded secondary criteria exist to ever reach the minimum. Auto's
        // equivalent of "any active slots" now that there's no generated slot list to check.
        _miwAutoActive() {
          if (!this.cfg.miwAutoSlots) return false;
          const exclude = new Set(this.cfg.miwAutoSlotExclude || []);
          const secAvail = SECONDARY_CRITS.filter(c => !exclude.has(c)).length;
          const minAnchored = Math.max(0, (this.cfg.miwAutoSlotSize ?? 3) - 1);
          const anchors = ['sliq','bliq','msliq','mbliq','0liq'].filter(c => !exclude.has(c) && this._miwAnchorAllowed(c));
          if (anchors.length && secAvail >= minAnchored) return true;
          if (this._miwEffectivePresenceModes().includes('past1') && secAvail >= (this.cfg.miwAutoSlotSize ?? 3)) return true;
          return false;
        },

        // Manual mode only now ‚Äî Auto no longer generates a slot list (see _miwAutoQualify).
        // Liquidation presence is mandatory, but that no longer means every slot needs an
        // anchor criterion: an anchorless slot is valid exactly when 'past1' is an active
        // mode (it's a Past-1 slot ‚Äî see header comment), and an anchored slot is valid when
        // its specific anchor's mode ('0' or '1') is active.
        _miwEffectiveSlots() {
          const modes = this._miwEffectivePresenceModes();
          const filtered = (this.cfg.miwSlots || []).filter(s => s.length > 0).filter(s => {
            const anchor = this._miwSlotLiqAnchor(s);
            return anchor ? this._miwAnchorAllowed(anchor) : modes.includes('past1');
          });
          if (!Object.keys(this.miwCollapsedSlotRanks || {}).length) return filtered;
          return filtered.slice().sort((a, b) => {
            const sa = a.reduce((s, c) => s + this._miwCritScore(c), 0);
            const sb = b.reduce((s, c) => s + this._miwCritScore(c), 0);
            return sb - sa;
          });
        },

        // The scan-time criteria checker has no branch for sliq/bliq/msliq/mbliq (they're
        // live-only ‚Äî see _miwCheckCrit), so _miwLogHistMatches's pool (built from that checker)
        // can never contain a live-anchored slot match ‚Äî those are instead caught live, in
        // _miwOnLiqMessage, which logs a hist target itself when a halt blocks the real entry
        // (see _miwLogLiveHistMatch). During normal (non-halted) operation live matches don't
        // need this at all ‚Äî real trades already write the scorecard for every live match that
        // fires. With only 'live' active, that halted-only case is the *only* time this feature
        // has anything to log, since every slot is live-anchored. '0' and 'past1' aren't limited
        // this way ‚Äî 0liq-anchored slots and Past-1's anchorless (pool-gated) slots both resolve
        // fine at scan time, so logging stays active unconditionally whenever either is an
        // active mode, same as before.
        _miwHistScoringActive() {
          if (!this.cfg.miwHistScoringEnabled) return false;
          const modes = this._miwEffectivePresenceModes();
          if (modes.includes('0') || modes.includes('past1')) return true;
          return !!(this._isDrawdownHalted?.() || this._isGainsLocked?.());
        },

        // Mirrors _miwLogHistMatches's dedupe-key shape exactly so both paths feed the same
        // _miwHistPending/_miwProcessHistMatches pipeline without it needing to know which one
        // a given entry came from.
        _miwLogLiveHistMatch(sym, annotCrits) {
          if (!this._miwHistScoringActive()) return;
          if ((this.positions || []).some(p => p._miw && p.symbol === sym)) return;
          const now = Date.now();
          const toleranceMs = (this.cfg.miwHistToleranceMins ?? 20) * 60 * 1000;
          const targetHourStart = Math.ceil((now + toleranceMs) / 3_600_000) * 3_600_000;
          const annotKey = [...annotCrits].sort().join(',');
          const dedupeKey = `${sym}:${annotKey}:${targetHourStart}`;
          if (!this._miwHistPending[dedupeKey]) {
            this._miwHistPending[dedupeKey] = { symbol: sym, annotCrits, targetHourStart };
          }
        },

        _miwLogHistMatches(pool) {
          if (!this._miwHistScoringActive() || !pool.length) return;
          const now = Date.now();
          const toleranceMs = (this.cfg.miwHistToleranceMins ?? 20) * 60 * 1000;
          const targetHourStart = Math.ceil((now + toleranceMs) / 3_600_000) * 3_600_000;
          for (const entry of pool) {
            if ((this.positions || []).some(p => p._miw && p.symbol === entry.t.symbol)) continue;
            const dedupeKey = `${entry.t.symbol}:${entry.annotKey}:${targetHourStart}`;
            if (!this._miwHistPending[dedupeKey]) {
              this._miwHistPending[dedupeKey] = {
                symbol: entry.t.symbol,
                annotCrits: entry.annotCrits,
                targetHourStart,
              };
            }
          }
        },

        async _miwSequestrFetch() {
          if (!this._miwHistScoringActive()) return;
          const cap = this.cfg.miwKlineScanCap ?? 20;
          const budget = Math.floor(cap * ((this.cfg.miwHistSequestrPct ?? 50) / 100));
          if (!budget) { this._miwSequestrUsed = 0; return; }
          const now = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const seen = new Set();
          const syms = [];
          for (const entry of Object.values(this._miwHistPending)) {
            if (entry.targetHourStart !== lastHourStart) continue;
            if (now < entry.targetHourStart + 3_600_000) continue;
            if (!seen.has(entry.symbol)) { seen.add(entry.symbol); syms.push(entry.symbol); }
            if (syms.length >= budget) break;
          }
          this._miwSequestrUsed = syms.length;
          if (!syms.length) return;
          await this._miwPrefetchKlines(syms);
        },

        async _miwProcessHistMatches() {
          if (!this.cfg.miwHistScoringEnabled) return;
          const now = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const MAX_AGE_MS = 24 * 3_600_000;
          const toProcess = [];
          for (const [key, entry] of Object.entries(this._miwHistPending)) {
            if (now - entry.targetHourStart > MAX_AGE_MS) { delete this._miwHistPending[key]; continue; }
            if (now >= entry.targetHourStart + 3_600_000) toProcess.push({ key, entry });
          }
          if (!toProcess.length) return;

          this._miwHistBatchId = (this._miwHistBatchId % 99) + 1;
          const _batchId = this._miwHistBatchId;
          const _uniqueSyms = [...new Set(toProcess.map(x => x.entry.symbol))];
          this.log(`[MIW] üìä Hist-score batch #${_batchId} begun ‚Äî ${toProcess.length} entr${toProcess.length === 1 ? 'y' : 'ies'} across ${_uniqueSyms.length} symbol${_uniqueSyms.length === 1 ? '' : 's'}`, 'info');

          const tpPct  = (this.cfg.binaryTpPct ?? 18) / 100;
          const slPct  = (this.cfg.binarySlPct ?? 18) / 100;
          const lev    = this.cfg.leverage ?? 6;
          const margin = (this.cfg.minNotional ?? 6) / lev;
          let wrote = 0, wins = 0, losses = 0, netPnl = 0;

          // MIW = SHORT: TP when price falls, SL when price rises
          const _resolve = (open, high, low, close) => {
            const hitTp = low  <= open * (1 - tpPct / lev);
            const hitSl = high >= open * (1 + slPct / lev);
            if (hitTp && hitSl) return -margin * slPct;
            if (hitTp)          return  margin * tpPct;
            if (hitSl)          return -margin * slPct;
            return margin * (open - close) / open * lev;
          };

          // Cache-first: resolve entries targeting the most recently completed candle without a fetch
          const toFetch = [];
          for (const x of toProcess) {
            if (x.entry.targetHourStart === lastHourStart) {
              const cached = this._miwKlineCache?.[x.entry.symbol];
              if (cached?.candleStart === lastHourStart) {
                const _pnl0 = _resolve(cached.open, cached.high, cached.low, cached.close);
                this._pfScoreWrite?.(x.entry.annotCrits, _pnl0, true);
                netPnl += _pnl0; if (_pnl0 > 0) wins++; else losses++;
                delete this._miwHistPending[x.key];
                wrote++;
                continue;
              }
            }
            toFetch.push(x);
          }

          if (toFetch.length) {
            const bySymbol = {};
            for (const x of toFetch) {
              if (!bySymbol[x.entry.symbol]) bySymbol[x.entry.symbol] = [];
              bySymbol[x.entry.symbol].push(x);
            }
            const CONC = 5;
            const symbols = Object.keys(bySymbol);
            for (let i = 0; i < symbols.length; i += CONC) {
              await Promise.all(symbols.slice(i, i + CONC).map(async sym => {
                const entries = bySymbol[sym];
                const oldestTs  = Math.min(...entries.map(x => x.entry.targetHourStart));
                const hoursBack = Math.min(Math.ceil((now - oldestTs) / 3_600_000) + 2, 200);
                try {
                  const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=${hoursBack}`);
                  if (!r.ok) return;
                  const d = await r.json();
                  const list = d?.result?.list;
                  if (!list) return;
                  const candleMap = {};
                  for (const c of list) candleMap[parseInt(c[0])] = c;
                  for (const { key, entry } of entries) {
                    const c = candleMap[entry.targetHourStart];
                    if (!c) { delete this._miwHistPending[key]; continue; }
                    const _pnl1 = _resolve(parseFloat(c[1]), parseFloat(c[2]), parseFloat(c[3]), parseFloat(c[4]));
                    this._pfScoreWrite?.(entry.annotCrits, _pnl1, true);
                    netPnl += _pnl1; if (_pnl1 > 0) wins++; else losses++;
                    delete this._miwHistPending[key];
                    wrote++;
                  }
                } catch(_) {}
              }));
            }
          }

          this.log(`[MIW] üìä Hist-score batch #${_batchId} done ‚Äî ${wrote} written`, 'info');
          if (wrote) {
            this._pfScoreBuild?.();
            if (!this.miwHistBatches) this.miwHistBatches = [];
            this.miwHistBatches.push({ id: _batchId, ts: now, wrote, total: toProcess.length, wins, losses, netPnl });
            if (this.miwHistBatches.length > 25) this.miwHistBatches.splice(0, this.miwHistBatches.length - 25);
            this.persist?.();
          }
        },

        async _miwPrefetchKlines(symbols) {
          const now           = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const scanMs        = (this.cfg.scanMins || 15) * 60 * 1000;
          // Seed from shared klines ‚Äî entries must be for the current completed hour and within 1 scan cycle
          const sharedKlines = this._sharedRead('klines_1h_last');
          const seedCache = {};
          if (sharedKlines?.data) {
            for (const sym of symbols) {
              const e = sharedKlines.data[sym];
              if (e && e.candleStart >= lastHourStart && e.ts && (now - e.ts) < scanMs) seedCache[sym] = e;
            }
          }
          this._miwKlineCache = { ...seedCache };
          const toFetch = symbols.filter(sym => !seedCache[sym]);
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                this._miwKlineCache[sym] = {
                  candleStart: parseInt(candle[0]),
                  open:   parseFloat(candle[1]),
                  high:   parseFloat(candle[2]),
                  low:    parseFloat(candle[3]),
                  close:  parseFloat(candle[4]),
                  volume: parseFloat(candle[5]),
                  ts: now,
                };
              } catch(e) {}
            }));
          }
          // Write newly fetched entries to shared
          const patch = {};
          for (const sym of toFetch) { if (this._miwKlineCache[sym]) patch[sym] = this._miwKlineCache[sym]; }
          if (Object.keys(patch).length) this._sharedMerge('klines_1h_last', patch);
        },

        _miwGetKlineSync(symbol) {
          return this._miwKlineCache?.[symbol] || null;
        },

        // PEC candidate pool: tickers whose liq surveillance batch closed within the last
        // miwPecFreshCycles scan cycles, capped at miwPecScanCap. Draws from the same
        // _miwPecPool that past1 uses (see _miwOnLiqClose / _miwPast1FreshSymbols) ‚Äî this is
        // just PEC's own capped, timestamp-sorted view of it, since fetching costs bandwidth
        // and past1's lookup doesn't.
        _miwPecFreshCandidates() {
          const pool = this._miwPecPool || {};
          const ttl  = (this.cfg.miwPecFreshCycles ?? 4) * (this.cfg.scanMins ?? 15) * 60000;
          const cap  = this.cfg.miwPecScanCap ?? 20;
          const now  = Date.now();
          return Object.entries(pool)
            .filter(([, e]) => (now - e.ts) < ttl)
            .sort((a, b) => b[1].ts - a[1].ts)
            .slice(0, cap)
            .map(([sym]) => sym);
        },

        _miwPecIntervalMinutes() {
          const g = this.cfg.miwPecGranularity ?? '1h';
          return g === '15m' ? 15 : g === '3h' ? 180 : 60;
        },

        _miwPecCandleCount() {
          return Math.round(1440 / this._miwPecIntervalMinutes());
        },

        // Price Effect Coefficient for one window: (Close-Open)/(range), mapped to 0-100
        // (50=neutral). Close is always the latest completed candle ‚Äî only Open/range change
        // per window, so all three timeframes read off the same current price (see PEC.md).
        // Wick-dampened range uses the average sub-candle range instead of window high/low; since
        // that can be smaller than the actual |close-open| displacement, P is clamped to ¬±1.
        _miwCalcPecWindow(candles, windowCount, dampen) {
          if (!candles.length) return null;
          const subset = candles.slice(-windowCount);
          if (!subset.length) return null;
          const open  = subset[0].open;
          const close = candles[candles.length - 1].close;
          let range;
          if (dampen) {
            range = subset.reduce((s, c) => s + (c.high - c.low), 0) / subset.length;
          } else {
            range = Math.max(...subset.map(c => c.high)) - Math.min(...subset.map(c => c.low));
          }
          if (!(range > 0)) return 50;
          let p = (close - open) / range;
          if (p > 1) p = 1; else if (p < -1) p = -1;
          return p * 50 + 50;
        },

        // Fetches enough completed candles at miwPecGranularity to cover 24h, then derives the
        // 6h/12h/24h composite index for each symbol. Seeds from the shared cache first (same
        // pattern as _miwPrefetchKlines) so MIC doesn't refetch what MIW already pulled this bar.
        // Volume Shape Graph for one window: (V-VO_t)/(VH_t-VL_t), mapped to 0-100 (50=neutral).
        // PEC's math applied to volume instead of price ‚Äî see VSG.md. V is always the latest
        // completed sub-candle's volume, same one shared across all three windows as PEC's C.
        // No wick-dampening equivalent (VSG.md flags it but doesn't propose it as default).
        _miwCalcVsgWindow(candles, windowCount) {
          if (!candles.length) return null;
          const subset = candles.slice(-windowCount);
          if (!subset.length) return null;
          const vOpen = subset[0].volume;
          const v     = candles[candles.length - 1].volume;
          const vHigh = Math.max(...subset.map(c => c.volume));
          const vLow  = Math.min(...subset.map(c => c.volume));
          if (!(vHigh > vLow)) return 50;
          let vp = (v - vOpen) / (vHigh - vLow);
          if (vp > 1) vp = 1; else if (vp < -1) vp = -1;
          return vp * 50 + 50;
        },

        // Fetches enough completed candles at miwPecGranularity to cover 24h, then derives the
        // 6h/12h/24h composite index for each symbol. Seeds from the shared cache first (same
        // pattern as _miwPrefetchKlines) so MIC doesn't refetch what MIW already pulled this bar.
        async _miwPrefetchPec(symbols) {
          if (!symbols || !symbols.length) return;
          const gran         = this.cfg.miwPecGranularity ?? '1h';
          const bybitInterval= gran === '15m' ? '15' : gran === '3h' ? '180' : '60';
          const intervalMin  = this._miwPecIntervalMinutes();
          const total        = this._miwPecCandleCount();
          const barMs        = intervalMin * 60 * 1000;
          const now          = Date.now();
          const lastBarStart = Math.floor(now / barMs) * barMs - barMs;
          const scanMs       = (this.cfg.scanMins || 15) * 60 * 1000;
          const dampen       = !!this.cfg.miwPecWickDampen;
          const sharedKey    = `pec_${gran}_last`;
          const shared       = this._sharedRead(sharedKey);
          const seedCache    = {};
          if (shared?.data) {
            for (const sym of symbols) {
              const e = shared.data[sym];
              if (e && e.candleStart >= lastBarStart && e.ts && (now - e.ts) < scanMs) seedCache[sym] = e;
            }
          }
          // Permafrost's full-universe PEC/VSG prefetch (Pre-Screening's "PEC/VSG Universe
          // Weighing") runs in this same page instance and already covers every USDT ticker on
          // the current bulk-ticker window ‚Äî seed straight from it before touching the network,
          // so this narrow path only ever fetches what that pass missed (a symbol outside the
          // USDT set, a request that failed this cycle, or Universe Weighing being off).
          // Gated on _pfPecUniverseFetchedAt matching the current bulk window rather than a
          // scanMs recency check: the candle itself is only ever as fresh as the last completed
          // bar either way, so what actually matters is whether this reading is from the current
          // window or a stale prior one, not how many minutes ago it was fetched.
          const uniCache = this._pfPecUniverseCache;
          if (uniCache && this._pfPecUniverseFetchedAt === this._lastAllTickersAt) {
            for (const sym of symbols) {
              if (seedCache[sym]) continue;
              const u = uniCache[sym];
              if (u?.pec?.['6h'] != null) {
                seedCache[sym] = { '6h': u.pec['6h'], '12h': u.pec['12h'], '24h': u.pec['24h'], vsg: u.vsg, candleStart: lastBarStart, ts: now };
              }
            }
          }
          if (!this._miwPecCache) this._miwPecCache = {};
          Object.assign(this._miwPecCache, seedCache);
          const toFetch = symbols.filter(sym => !seedCache[sym]);
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=${bybitInterval}&limit=${total + 1}`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                // list[0] is the current, still-forming candle ‚Äî drop it. Rest are completed,
                // newest-first from Bybit; reverse to chronological (oldest -> newest).
                const completed = list.slice(1).map(c => ({
                  candleStart: parseInt(c[0]),
                  open:  parseFloat(c[1]),
                  high:  parseFloat(c[2]),
                  low:   parseFloat(c[3]),
                  close: parseFloat(c[4]),
                  volume: parseFloat(c[5]),
                })).reverse();
                if (!completed.length) return;
                const per6h  = Math.max(1, Math.round(360  / intervalMin));
                const per12h = Math.max(1, Math.round(720  / intervalMin));
                const per24h = Math.max(1, Math.round(1440 / intervalMin));
                this._miwPecCache[sym] = {
                  '6h':  this._miwCalcPecWindow(completed, per6h,  dampen),
                  '12h': this._miwCalcPecWindow(completed, per12h, dampen),
                  '24h': this._miwCalcPecWindow(completed, per24h, dampen),
                  // VSG rides this same fetch/cache ‚Äî no separate fetch path (see VSG.md).
                  vsg: {
                    '6h':  this._miwCalcVsgWindow(completed, per6h),
                    '12h': this._miwCalcVsgWindow(completed, per12h),
                    '24h': this._miwCalcVsgWindow(completed, per24h),
                  },
                  candleStart: completed[completed.length - 1].candleStart,
                  ts: now,
                };
              } catch (e) {}
            }));
          }
          const patch = {};
          for (const sym of toFetch) { if (this._miwPecCache[sym]) patch[sym] = this._miwPecCache[sym]; }
          if (Object.keys(patch).length) this._sharedMerge(sharedKey, patch);
        },

        _miwGetPecSync(symbol) {
          return this._miwPecCache?.[symbol] || null;
        },

      });
    },
  };
})();
</script>
