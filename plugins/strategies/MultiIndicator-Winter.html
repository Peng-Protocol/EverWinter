<!--
  Multi-Indicator Strategy Plugin for PseudoWinter
  Slot-based entry filter built around liquidation presence as the primary, mandatory signal,
  with fund rate, PEC, population-relative volume/OI, candle, and order-flow criteria layered on as secondary
  confirmation. Liquidation Presence (miwLiqPresenceModes: any combination of '1' / '0' /
  'past1') selects which of three paths a slot can run under:
    '1'     (Live)   ‚Äî every slot anchors on exactly one of sliq/bliq/msliq/mbliq, a real
      criterion evaluated the instant a liquidation message crosses the depth threshold
      mid-cycle (see _miwOnLiqMessage, registered via Permafrost's registerLiqMessageHook).
      These never resolve from a closed cycle ‚Äî the data is too temporal to be meaningful an
      hour later ‚Äî so they no longer appear in the scan-time criteria checker at all.
    '0'     (0-Liq)  ‚Äî every slot anchors on the 0liq criterion, a real criterion confirmable
      only once a ticker's surveillance cycle closes clean, checked against the full retained
      window of Permafrost's closed liq cycles (_liqCycleHistory, up to miwLiqLookbackCycles of
      them) ‚Äî a ticker only reads 0-Liq if every cycle it appeared in within that window came
      back clean. See _miwLiqZeroAcrossWindow.
    'past1' (Past-1) ‚Äî NOT a criterion. A Past-1 slot has no liquidation criterion in it at all;
      it's built entirely from secondary criteria. Every closed cycle sorts each ticker into
      exactly one of three buckets, independent of sell/buy dominance: liq+ (some side's raw
      turnover cleared its own historical average, i.e. would have fired live), 0-liq (no
      liquidation at all this cycle, across the full retained window), or liq- (real liquidation
      happened, but neither side's turnover cleared its average ‚Äî too weak to have fired live).
      Past-1 slots match liq- tickers. See _miwPast1FreshSymbols, sourced from the same
      closed-batch pool (_miwPecPool, populated by registerLiqCloseHook) that feeds PEC. The
      ticker-pool restriction *is* the anchor; there's nothing to tag in the slot or the
      scorecard. A manually-built slot with no liquidation criterion is only valid while 'past1'
      is an active mode ‚Äî otherwise it's the same mistake it always was (see the anchorless-slot
      warning at startup).

  This is why "every slot must have exactly one liquidation criterion" is no longer quite true:
  '1'/'0' slots do; 'past1' slots deliberately don't. See _miwSlotLiqAnchor (returns the
  criterion or null) and _miwAutoQualify (the null-anchor case is the Past-1 match).

  Slot Blocking (miwSlotBlockEnabled) is a per-criterion loss circuit breaker: if a liq-anchor
  type's collapsed scorecard score (own + partner + historical, see miwCollapsedSlotRanks) drops
  beyond miwSlotBlockPct% of base margin in loss, new entries carrying that type are blocked ‚Äî
  continuously re-checked, no manual clear needed. Only applies to '1'/'0' slots (sliq/bliq/
  msliq/mbliq/0liq are real, blockable anchors) ‚Äî Past-1 slots have no anchor to block on, so
  they're only ever blockable via miwSlotBlockTags below. Historical Scoring keeps logging
  matches through a block (folded into the existing halted-but-still-scoring path) so the score
  has data to recover with. miwSlotBlockTags extends the same check to the entry's own PEC and
  VSG tags only ‚Äî fund and the other secondary criteria are too
  generalized to include here, since blocking on them tends to block nearly every entry off one
  bad stretch. Standalone toggle, independent of Liquidation Presence mode.

  Secondary criteria (fund, PEC 6h/12h/24h, va, VSG 6h/12h/24h, ioa, ocs, ocx) combine with
  the liq anchor via the same AND-gate slot logic as before. On the live path, anything not
  fetched fresh this cycle (PEC/VSG, OC) is fetched synchronously for just the triggering
  symbol before the slot match is judged ‚Äî see _miwOnLiqMessage. va/ioa need no fetch at all ‚Äî
  the per-ticker value is already on the live ticker payload.

  Auto Slots always includes the liq anchor as one of the combo's criteria; at size 1 every
  generated slot is bare liquidation with no secondary confirmation. The live depth threshold
  used by Auto Slots is one general value (miwLiveDepthThreshold); manual slots keep granular
  per-slot/per-type depth via the existing criteria picker.

  Substitution now considers any held position in the book, not just MIW's own, same as
  Liquid-Diver did ‚Äî but a live (path-B) candidate can never substitute out a 0-liq (path-A)
  position, since path-A is the higher-conviction read (toggle: miwSubstitutionProtectPathA).
  Path-A candidates may still substitute anything. The swap itself remains score-gated, not a
  blanket "depth cleared is enough" ‚Äî one liq type scoring better than another still matters.

  Re-entry Block Mode (miwReentryBlockMode: 'both' / 'losers') is ported from Liquid-Diver:
  'losers' lets a symbol that just closed in profit re-trigger immediately.

  Entry pool fires once per fresh bulk ticker fetch (_lastAllTickersAt) ‚Äî will not re-scan
  the same cached snapshot twice. TP, SL, and all exit logic use the host's settings.
  Drawdown throttle and gains lock gate all entries (including the live liq path).

  Load via Plugin Manager in PseudoWinter's config panel. Requires Permafrost (Liq
  Surveillance on) ‚Äî liquidation is no longer optional data, it's the entry gate itself.
  Load AFTER EverWinter if using live trading ‚Äî see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const VERSION       = '1.66.1';
  // Every default slot anchors on a live liq criterion, matching the default Liquidation
  // Presence modes (default ['1'] ‚Äî live only). Enabling 0/Past-1 won't retroactively populate
  // 0liq-anchored presets; users building 0-Liq slots do so manually.
  // rasl/rabl (low-vol confirmation) retired in favor of VSG's vsgut (Under-Traded) ‚Äî see VSG.md.
  const DEFAULT_SLOTS = [['sliq','fund>1','vsgut'],['bliq','vm<10','vsgut'],['msliq','fund<-1','vsgut'],['mbliq','fund>1','vsgut'],['sliq','vm>10','vsgut'],['bliq','fund<-1','vsgut']];
  const MIW_HIST_KEY  = '__miw_hist_batches';
  const LIQ_TYPES     = ['sliq', 'bliq', 'msliq', 'mbliq'];
  // Full secondary criteria list ‚Äî shared by Auto's minimum-gate qualifier, the Exclude-from-
  // Auto picker, and the Blockable Criteria picker, so all three stay in sync by construction.
  const SECONDARY_CRITS = ['fund','pecob','pecos','pecalpha','pecdelta','pecmomup','pecmomdn','va','vsgot','vsgut','vsgalpha','vsgdelta','vsgmomup','vsgmomdn','ioa','ocs','ocx'];
  // Pre-existing "Include Sign Tags" behavior, preserved as the default selection now that the
  // set is configurable ‚Äî fund is deliberately NOT included by default (see _miwIsEntryBlocked),
  // matching the old hardcoded behavior exactly. Opt fund in manually via the picker.
  // va/ioa are blockable by default (unlike the vm/iot/iom they replace, which never were) ‚Äî
  // population-relative criteria are a much cleaner signal than the old own-ratio ones.
  const DEFAULT_BLOCKABLE_CRITS = ['vsgot','vsgut','vsgalpha','vsgdelta','vsgmomup','vsgmomdn','pecob','pecos','pecalpha','pecdelta','pecmomup','pecmomdn','va','ioa'];

  // Megacaps excluded from the population pool alongside BTC ‚Äî their size skews OC/IO/Volume/liq
  // averages the same way BTC would. cfg.megacapExclude is seeded from this default below but is
  // a plain array on cfg (no picker UI) ‚Äî edit it directly in saved config if the list needs to
  // change. Shared key name with Permafrost's own seed so either plugin can init it first.
  const DEFAULT_MEGACAP_EXCLUDE = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','TRXUSDT','LINKUSDT'];

  // Same formula as Permafrost's calcDepth: % deviation of this side's liquidated $ from the
  // average liquidation size recorded across all history. Depth +1 means 1% above average.
  const calcLiveDepth = (raw, avg) => avg > 0 ? Math.trunc(((raw / avg) - 1) * 100) : 0;

  // Per-criterion emoji for position badges. Fund emoji is app-relative:
  // +fund = longs paying = good carry for shorts (ü§ë), bad for longs (üí∏).
  // -fund = shorts paying = bad for shorts (üí∏), good for longs (ü§ë).
  const CRIT_EMOJI = { 'pecob': '‚¨ÜÔ∏è', 'pecos': '‚¨áÔ∏è', 'pecalpha': '‚§µÔ∏è', 'pecdelta': '‚§¥Ô∏è', 'pecmomup': '‚ÜóÔ∏è', 'pecmomdn': '‚ÜòÔ∏è', 'vsgot': '‚è´', 'vsgut': '‚è¨', 'vsgalpha': 'üîº', 'vsgdelta': 'üîΩ', 'vsgmomup': '‚è©', 'vsgmomdn': '‚è™', 'fund': 'üí∞', 'va': 'üîä', 'vm': 'üîä', 'sliq': 'ü•µ', 'bliq': 'ü•∂', 'msliq': 'üí¶', 'mbliq': 'üå®Ô∏è', '0liq': '‚ö´', 'ioa': 'üé≤', 'iot': 'üé≤', 'iom': 'üß≤', 'ocs': 'üî≠', 'ocx': 'üì°' };
  const CRIT_DESC  = { 'fund': 'Fund (tiered funding rate)', 'pecob': 'PEC Overbought (6h, 12h and 24h all above high threshold)', 'pecos': 'PEC Oversold (6h, 12h and 24h all below low threshold)', 'pecalpha': 'PEC Red Mountain (12h more bullish than both 6h and 24h)', 'pecdelta': 'PEC Green Delta (12h more bearish than both 6h and 24h)', 'pecmomup': 'PEC Bullish Momentum (6h > 12h > 24h ‚Äî trended up all day)', 'pecmomdn': 'PEC Bearish Momentum (6h < 12h < 24h ‚Äî trended down all day)', 'va': 'V/A (volume vs. population sample-window average)', 'vm': 'V/M (vol/mcap ratio) ‚Äî retired, replaced by V/A', 'vsgot': 'VSG Over-Traded (6h, 12h and 24h volume-shape all above high threshold)', 'vsgut': 'VSG Under-Traded (6h, 12h and 24h volume-shape all below low threshold)', 'vsgalpha': 'VSG Volume Mountain (12h volume-shape higher than both 6h and 24h)', 'vsgdelta': 'VSG Volume Trough (12h volume-shape lower than both 6h and 24h)', 'vsgmomup': 'VSG Building Momentum (6h > 12h > 24h ‚Äî volume building all day)', 'vsgmomdn': 'VSG Fading Momentum (6h < 12h < 24h ‚Äî volume fading all day)', 'lsa': 'LSA (1h sell spike) ‚Äî retired, replaced by VSG', 'lba': 'LBA (1h buy spike) ‚Äî retired, replaced by VSG', 'rasl': 'R-ASL (1h low-vol red) ‚Äî retired, replaced by VSG', 'rabl': 'R-ABL (1h low-vol green) ‚Äî retired, replaced by VSG', 'sliq': 'S-Liq (Sell-Liquidation: sell side ‚â•70% dominant)', 'bliq': 'B-Liq (Buy-Liquidation: buy side ‚â•70% dominant)', 'msliq': 'mS-Liq (Mixed Sell-Liq: sell majority, buy ‚â•30%)', 'mbliq': 'mB-Liq (Mixed Buy-Liq: buy majority, sell ‚â•30%)', '0liq': '0-Liq (no liquidation at all this cycle)', 'ioa': 'IO/A (open interest vs. population sample-window average)', 'iot': 'IO/T (OI vs Turnover) ‚Äî retired, replaced by IO/A', 'iom': 'IO/M (OI vs MCap) ‚Äî retired, replaced by IO/A', 'ocs': 'OCS (buy/sell skew %)', 'ocx': 'OCX (% faster/slower than the full-window avg order interval)' };
  // PEC (Price Effect Coefficient): replaces the old raw +24h/-24h ticker-field boolean. For each
  // of 6h/12h/24h, builds a composite candle from cached klines at cfg.miwPecGranularity and scores
  // (Close-Open)/(High-Low) onto a 0-100 scale (50=neutral). Six criteria, all derived from the
  // resulting I_6h/I_12h/I_24h triple:
  //   pecob    ‚Äî Confluent Overbought: I_6h, I_12h, and I_24h all above miwPecThresholdHigh.
  //   pecos    ‚Äî Confluent Oversold: I_6h, I_12h, and I_24h all below miwPecThresholdLow.
  //   pecalpha ‚Äî Red Mountain: I_12h higher than both I_6h and I_24h (a peak on the middle timeframe).
  //   pecdelta ‚Äî Green Delta: I_12h lower than both I_6h and I_24h (a trough on the middle timeframe).
  //   pecmomup ‚Äî Bullish Momentum: I_6h > I_12h > I_24h, a pure upward tilt across the whole day.
  //   pecmomdn ‚Äî Bearish Momentum: I_6h < I_12h < I_24h, a pure downward tilt across the whole day.
  // (The Bullish/Bearish Reversion pair that used to sit here was retired as redundant with
  // Red Mountain/Green Delta.) pecalpha/pecdelta/pecmomup/pecmomdn only compare the three
  // readings to each other, not to any threshold. Only pecob/pecos gate on
  // High/Low. Every criterion is also tiered with a depth score (miwPecDepthStep) reflecting how
  // strongly it's expressed ‚Äî a clean distance-past-threshold measure for pecob/pecos/momentum,
  // a looser divergence-intensity proxy for Reversion/Mountain/Delta. Only ever
  // computed for tickers whose liq surveillance batch just closed (see _miwOnLiqClose /
  // _miwPecPool) and are still within miwPecFreshCycles ‚Äî the same
  // universe every liq anchor already requires, so this adds no new fetch scope, just reuses it.
  // BOC/SOC (raw buy/sell fill counts requiring 24h surveillance runway) were considered but scrapped:
  // a 24h watch period only tells you counts at the end of the period, not a meaningful trend, and
  // hardware restarts every ~6h make a reliable 24h runway impractical on this device.

  // VSG (Volume Shape Graph): replaces the old LSA/LBA/R-ASL/R-ABL 1h-vs-24h-avg spike family
  // (see VSG.md). PEC's math applied to volume instead of price ‚Äî same 6h/12h/24h composite
  // windows, riding PEC's own cache (each cached sub-candle now also carries its volume), so this
  // adds no new fetch path at all; it retires one (_miwPrefetchKlines' criteria-scan call site).
  //   vsgot    ‚Äî Over-Traded: VI_6h, VI_12h, and VI_24h all above miwVsgThresholdHigh.
  //   vsgut    ‚Äî Under-Traded: VI_6h, VI_12h, and VI_24h all below miwVsgThresholdLow.
  //   vsgalpha ‚Äî Volume Mountain: VI_12h higher than both VI_6h and VI_24h (a burst that crested).
  //   vsgdelta ‚Äî Volume Trough: VI_12h lower than both VI_6h and VI_24h (a lull, picking back up).
  //   vsgmomup ‚Äî Building Momentum: VI_6h > VI_12h > VI_24h, loudest right now.
  //   vsgmomdn ‚Äî Fading Momentum: VI_6h < VI_12h < VI_24h, quietest right now.
  // Unlike LSA/LBA/R-ASL/R-ABL, VSG makes no directional claim at all ‚Äî candle color was always a
  // proxy for order flow, not a measurement of it; sliq/bliq/ocs already measure that directly.
  // Depth-tiered via miwVsgDepthStep exactly like PEC. Same liq-fresh scope as PEC (deliberate ‚Äî
  // see VSG.md's Open Question, decided in favor of the narrow pool).

  const critEmoji = c => {
    if (/^fund/.test(c)) { const s = c.slice(4); const num = parseFloat(s.replace(/^[<>]/,'')); return (num < 0 ? 'üí∏' : 'ü§ë') + s; }
    if (/^va/.test(c)) return 'üîä' + c.slice(2);
    if (/^vm/.test(c)) return 'üîä' + c.slice(2);
    // Retired (see VSG.md) ‚Äî kept resolvable so old scorecard/history entries still render.
    if (/^lsa/.test(c)) return 'üü•' + c.slice(3);
    if (/^lba/.test(c)) return 'üü©' + c.slice(3);
    if (/^rasl/.test(c)) return 'üî¥' + c.slice(4);
    if (/^rabl/.test(c)) return 'üü¢' + c.slice(4);
    if (/^msliq/.test(c)) return 'üí¶' + c.slice(5);
    if (/^mbliq/.test(c)) return 'üå®Ô∏è' + c.slice(5);
    if (/^sliq/.test(c)) return 'ü•µ' + c.slice(4);
    if (/^bliq/.test(c)) return 'ü•∂' + c.slice(4);
    if (/^ioa/.test(c)) return 'üé≤' + c.slice(3);
    if (/^iot/.test(c)) return 'üé≤' + c.slice(3);
    if (/^iom/.test(c)) return 'üß≤' + c.slice(3);
    if (/^ocs/.test(c)) return 'üî≠' + c.slice(3);
    if (/^ocx/.test(c)) return 'üì°' + c.slice(3);
    if (/^pec/.test(c)) { const m = c.match(/^(pec[a-z]+)/); return (CRIT_EMOJI[m ? m[1] : c] || '') + c.replace(/^pec[a-z]+/, ''); }
    if (/^vsg/.test(c)) { const m = c.match(/^(vsg[a-z]+)/); return (CRIT_EMOJI[m ? m[1] : c] || '') + c.replace(/^vsg[a-z]+/, ''); }
    return CRIT_EMOJI[c] || '';
  };
  const critLabel = c => {
    const fM = c.match(/^fund([<>])(-?\d+)$/);
    if (fM) return 'Fund ' + fM[1] + fM[2];
    const fA = c.match(/^fund([+-]-?\d*)$/);
    if (fA) return 'Fund t' + fA[1];
    if (c === 'fund') return 'Fund';
    const aM = c.match(/^va([<>])(-?\d+)$/);
    if (aM) return 'V/A ' + aM[1] + aM[2];
    const aA = c.match(/^va([+-]-?\d*)$/);
    if (aA) return 'V/A t' + aA[1];
    if (c === 'va') return 'V/A';
    const vM = c.match(/^vm([<>])(\d+)$/);
    if (vM) return 'V/M ' + vM[1] + vM[2];
    const vA = c.match(/^vm([+-]\d+)$/);
    if (vA) return 'V/M t' + vA[1];
    if (c === 'vm') return 'V/M';
    // Retired (see VSG.md) ‚Äî kept resolvable so old scorecard/history entries and any
    // not-yet-migrated saved slots still render instead of falling through to the raw tag.
    const kM = c.match(/^(lsa|lba|rasl|rabl)([<>])(\d+)$/);
    if (kM) return kM[1].toUpperCase().replace('RASL','R-ASL').replace('RABL','R-ABL') + ' ' + kM[2] + kM[3];
    const kA = c.match(/^(lsa|lba|rasl|rabl)([+-]\d+)$/);
    if (kA) return kA[1].toUpperCase().replace('RASL','R-ASL').replace('RABL','R-ABL') + ' t' + kA[2];
    if (c === 'lsa') return 'LSA'; if (c === 'lba') return 'LBA';
    if (c === 'rasl') return 'R-ASL'; if (c === 'rabl') return 'R-ABL';
    const m = c.match(/^(m?sliq|m?bliq)([<>])([+-]?\d+)$/);
    if (m) return (m[1] === 'sliq' ? 'S-Liq' : m[1] === 'bliq' ? 'B-Liq' : m[1] === 'msliq' ? 'mS-Liq' : 'mB-Liq') + ' ' + m[2] + m[3];
    const n = c.match(/^(m?sliq|m?bliq)([+-]\d+)$/);
    if (n) return (n[1] === 'sliq' ? 'S-Liq' : n[1] === 'bliq' ? 'B-Liq' : n[1] === 'msliq' ? 'mS-Liq' : 'mB-Liq') + ' ' + n[2];
    if (c === 'sliq') return 'S-Liq'; if (c === 'bliq') return 'B-Liq';
    if (c === 'msliq') return 'mS-Liq'; if (c === 'mbliq') return 'mB-Liq';
    if (c === '0liq') return '0-Liq';
    const ioaM = c.match(/^ioa([<>])(-?\d+)$/);
    if (ioaM) return 'IO/A ' + ioaM[1] + ioaM[2];
    const ioaA = c.match(/^ioa([+-]-?\d*)$/);
    if (ioaA) return 'IO/A t' + ioaA[1];
    if (c === 'ioa') return 'IO/A';
    const o = c.match(/^(iot|iom)([<>])(\d+)$/);
    if (o) return (o[1] === 'iot' ? 'IO/T' : 'IO/M') + ' ' + o[2] + o[3];
    const p = c.match(/^(iot|iom)([+-]\d+)$/);
    if (p) return (p[1] === 'iot' ? 'IO/T' : 'IO/M') + ' t' + p[2];
    if (c === 'iot') return 'IO/T'; if (c === 'iom') return 'IO/M';
    const oc = c.match(/^(ocs|ocx)([<>])(-?\d+)$/);
    if (oc) return ({'ocs':'OCS','ocx':'OCX'}[oc[1]])+' '+oc[2]+oc[3];
    const ocT = c.match(/^(ocs|ocx)([+-]\d+)$/);
    if (ocT) return ({'ocs':'OCS','ocx':'OCX'}[ocT[1]])+' t'+ocT[2];
    if (c === 'ocs') return 'OCS'; if (c === 'ocx') return 'OCX';
    const PEC_LABEL = { pecob: 'PEC OB', pecos: 'PEC OS', pecalpha: 'PEC Red Mtn', pecdelta: 'PEC Grn Delta', pecmomup: 'PEC Bull-Mom', pecmomdn: 'PEC Bear-Mom' };
    const pM = c.match(/^(pec[a-z]+)([+-]\d+)$/);
    if (pM && PEC_LABEL[pM[1]]) return PEC_LABEL[pM[1]] + ' t' + pM[2];
    if (PEC_LABEL[c]) return PEC_LABEL[c];
    const VSG_LABEL = { vsgot: 'VSG Over-Traded', vsgut: 'VSG Under-Traded', vsgalpha: 'VSG Mountain', vsgdelta: 'VSG Trough', vsgmomup: 'VSG Mom-Up', vsgmomdn: 'VSG Mom-Dn' };
    const vsgM = c.match(/^(vsg[a-z]+)([+-]\d+)$/);
    if (vsgM && VSG_LABEL[vsgM[1]]) return VSG_LABEL[vsgM[1]] + ' t' + vsgM[2];
    if (VSG_LABEL[c]) return VSG_LABEL[c];
    return CRIT_DESC[c] || c;
  };

  window.__BotPlugin = {
    id:        'multiindicator-winter',
    name:      'Multi-Indicator (Winter)',
    version:   VERSION,
    targetBot: 'pseudowinter',
    after:     ['everwinter', 'permafrost-winter'],
    before:    [],
    conflicts: ['liquiddiver-winter'],
    requires:  ['permafrost-winter'],
    touches:   ['init', 'runScan', 'pseudoWatchPositions'],

    css: `
      .miw-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .miw-slot { display:inline-flex; flex-direction:column; align-items:center; gap:3px; padding:6px 5px; border-radius:3px; border:1px solid; cursor:pointer; min-width:52px; font-size:9px; font-family:var(--mono); text-align:center; transition:border-color .15s,background .15s; }
      .miw-crit { font-size:8px; padding:1px 4px; border-radius:2px; background:rgba(96,210,255,.12); border:1px solid rgba(96,210,255,.3); color:var(--ice); white-space:nowrap; }
      .miw-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
      .miw-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .miw-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .miw-tab.on { border-color:rgba(96,210,255,.6); color:var(--ice); background:rgba(96,210,255,.08); }
      .miw-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .miw-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.miwEnabled"> + Multi</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false, tE: false, tX: false, tF: false, tFe: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">

          const threshold   = -(baseMargin * ((this.cfg.miwSacrificePct ?? 25) / 100) * halvMul);
          if (totalUPnL <= threshold) {
            const halvNote = halvMul < 0.999 ? ` √ó halving √ó${halvMul.toFixed(3)}` : '';
            if (this.cfg.miwRollingSacrificeEnabled) {
              const oldest = allPositions.reduce((a, b) => (a.openedAt || 0) <= (b.openedAt || 0) ? a : b);
              this.log(`[MIW] ü©∏ Rolling sacrifice ‚Äî uPnL ${totalUPnL.toFixed(4)} ‚â§ ${threshold.toFixed(4)} USDT (${this.cfg.miwSacrificePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) ‚Äî closing oldest: ${oldest.symbol}`, 'info');
              await this.pseudoClosePosition(oldest, 'sacrifice');
            } else {
              this.log(`[MIW] ü©∏ Sacrifice triggered ‚Äî collective uPnL ${totalUPnL.toFixed(4)} ‚â§ ${threshold.toFixed(4)} USDT (${this.cfg.miwSacrificePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) ‚Äî bailing ${allPositions.length} position(s)`, 'info');
              this._logBatchBegin?.();
              try {
                for (const pos of allPositions) {
                  await this.pseudoClosePosition(pos, 'sacrifice');
                }
              } finally { this._logBatchEnd?.('[MIW] ü©∏ Sacrifice roll-up'); }
            }
          }
        },

        // Only meaningful when Co-Qualifying Penalty is on (Permafrost) ‚Äî otherwise compositeScore
        // is always 0 for both sides and the margin check never clears, so this is a safe no-op.
        // entryPool only ever contains 0-liq (path-A) candidates ‚Äî sliq/bliq/msliq/mbliq are
        // live-only and never appear here (see _miwCheckCrit / runScan's checkCrit). Path-A is the
        // higher-conviction read, so unlike the live path's substitution (_miwLiveTrySubstitute)
        // there's no path restriction on what it can close ‚Äî cross-strategy, any held position,
        // same as Liquid-Diver's version. The swap is still score-gated, not automatic.
        async _miwTrySubstitute(entryPool) {
          if (!this.cfg.miwSubstitutionEnabled || !entryPool?.length) return false;
          const now           = Date.now();
          const minAgeMs       = (this.cfg.miwSubstitutionMinAgeMins ?? 10) * 60000;
          const protectWinners = this.cfg.miwSubstitutionProtectWinners ?? true;
          const baseMargin     = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const marginThreshold = baseMargin * ((this.cfg.miwSubstitutionMarginPct ?? 5) / 100);

          const eligible = (this.positions || []).filter(p => {
            if ((now - (p.openedAt || 0)) < minAgeMs) return false;
            if (protectWinners && (p.upnl || 0) > 0) return false;
            return true;
          });
          if (!eligible.length) return false;

          const scoreOf = p => p._miw ? (p._miwCompositeScore ?? 0) : (p._miwCompositeScore ?? -Infinity);
          eligible.sort((a, b) => scoreOf(a) - scoreOf(b));
          const worst      = eligible[0];
          const worstScore = scoreOf(worst);
          const best       = entryPool[0];
          if (!best || (best.compositeScore - worstScore) < marginThreshold) return false;

          this.log(`[MIW] üîÅ Substitution ‚Äî closing ${worst.symbol} (score ${worstScore === -Infinity ? 'n/a' : worstScore.toFixed(4)}) for ${best.t.symbol} (score ${best.compositeScore.toFixed(4)}), Œî${(best.compositeScore - worstScore).toFixed(4)} ‚â• ${marginThreshold.toFixed(4)} margin`, 'info');
          await this.pseudoClosePosition(worst, 'substitution');
          return await this._miwOpen(best.t, best.criteria, best.slotIdx, best.compositeScore);
        },

        async runScan() {
          await this._miwSequestrFetch();
          await this._miwProcessHistMatches();
          const tsBefore = this._lastAllTickersAt || 0;
          await _origScan.call(this);
          // If _origScan returned without fetching fresh tickers (halt/lock/cache-hit after a
          // halt cleared), _lastAllTickersAt is unchanged. Reset _miwLastActedAt so that the
          // next genuine fresh fetch is not silently skipped by the dedup check.
          if ((this._lastAllTickersAt || 0) === tsBefore && tsBefore === (this._miwLastActedAt || 0)) {
            this._miwLastActedAt = 0;
          }
          await this._miwRunScan();
        },

        _miwComputeSamplingData() {
          // Funding skew ‚Äî always computed for PF visualization. Population sample used to be
          // "symbols the broad kline-criteria scan touched this cycle" (klineSyms); now that VSG
          // rides PEC's own liq-fresh-pool fetch instead of a broad scan, the PEC cache's key set
          // is the equivalent population.
          const pecSyms = Object.keys(this._miwPecCache || {});
          const sharedLiq = this._sharedRead('liqResults');
          const fundCombined = { ...(sharedLiq?.data || {}), ...(this._liqResults || {}) };
          const liqSyms = Object.keys(fundCombined);
          const unionSyms = [...new Set([...pecSyms, ...liqSyms])];
          const tickerMap = {};
          for (const t of (this._lastAllTickers || [])) tickerMap[t.symbol] = t;
          let posCount = 0, negCount = 0;
          for (const sym of unionSyms) {
            const t = tickerMap[sym];
            if (!t) continue;
            const fr = parseFloat(t.fundingRate || 0) * 100;
            if (fr > 0) posCount++;
            else if (fr < 0) negCount++;
          }
          const fundTotal = posCount + negCount;
          if (fundTotal > 0) {
            this._miwFundSkew = { negPct: negCount / fundTotal * 100, posPct: posCount / fundTotal * 100, domDir: posCount >= negCount ? 'fund+' : 'fund-', domPct: Math.max(posCount, negCount) / fundTotal * 100 };
          }

          // Volume skew ‚Äî always computed for PF visualization. Used to read the retired 1h-vs-
          // 24h-avg kline multiplier; now reads VSG's 6h/12h/24h composite index instead (50 =
          // neutral), summed across all three windows per symbol ‚Äî same population, richer signal.
          let aboveSum = 0, belowSum = 0;
          for (const [sym, p] of Object.entries(this._miwPecCache || {})) {
            const t = tickerMap[sym];
            const v = p?.vsg;
            if (!t || !v || v['6h'] == null || v['12h'] == null || v['24h'] == null) continue;
            for (const win of ['6h', '12h', '24h']) {
              const vi = v[win];
              if (vi > 50) aboveSum += (vi - 50) / 50;
              else if (vi < 50) belowSum += (50 - vi) / 50;
            }
          }
          const volTotal = aboveSum + belowSum;
          if (volTotal > 0) {
            this._miwVolSkew = { abovePct: aboveSum / volTotal * 100, belowPct: belowSum / volTotal * 100, aboveSum, belowSum };
          }
        },

        _extraStatusPills() {
          return [];
        },

        async _miwRunScan() {
          if (!this.cfg.miwEnabled) return;
          const _miwHalted = !!(this._isDrawdownHalted?.() || this._isGainsLocked?.());
          if (_miwHalted) {
            if (!this._miwHaltLogged) { this.log(`[MIW] üí° Halted ‚Äî ${this._isGainsLocked?.() ? 'gains lock' : 'drawdown halt'} active; hist scoring continues`, 'info'); this._miwHaltLogged = true; }
          } else {
            this._miwHaltLogged = false;
          }

          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;

          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._miwLastActedAt) return;

          // Rebuild block state from scorecard immediately before any slot or pool decisions
          this._pfScoreBuild?.();

          // Entry slots ‚Äî Auto mode has no generated slot list any more (see _miwAutoQualify);
          // Manual mode keeps its exact combo list as before.
          const autoMode = !!this.cfg.miwAutoSlots;
          const slots = autoMode ? [] : this._miwEffectiveSlots();
          const hasActiveEntry = autoMode ? this._miwAutoActive() : slots.length > 0;

          }

          const activeSyms  = new Set((this.positions || []).map(p => p.symbol));

          const _allLiqResults = { ...((this._sharedRead?.('liqResults'))?.data || {}), ...(this._liqResults || {}) };
          // Criteria pool to scan for data-fetch needs ‚Äî Auto's non-excluded secondary list, or
          // every criterion actually used across manual slots.
          const _critPool = autoMode
            ? SECONDARY_CRITS.filter(c => !(new Set(this.cfg.miwAutoSlotExclude || [])).has(c))
            : [...new Set(slots.flat())];
          const needsVolIo = _critPool.some(c => /^(va|ioa)/.test(c));
          const needsOc    = _critPool.some(c => /^(ocs|ocx)/.test(c));
          const needsPec   = _critPool.some(c => /^(pec|vsg)/.test(c));

          if (!this._miwSlotGraylist) this._miwSlotGraylist = {};
          // 0-liq slots are only ever generated when '0' is an active mode (see
          // _miwAutoQualify), so the self- and cross-liq graylists ‚Äî both aimed at keeping
          // 0liq honest ‚Äî only need to apply when this bot's presence modes could actually
          // produce a 0liq slot. But both are belt-and-suspenders backstops, not the actual
          // guarantor of 0liq's correctness ‚Äî _miwCheckCrit's '0liq' branch independently scans
          // the full retained window (_miwLiqZeroAcrossWindow) and would never read a recently-
          // liquidated ticker as clean regardless of these graylists. Past-1's entire population
          // IS "recently liquidated" tickers (_miwPast1FreshSymbols draws from the same pool),
          // so leaving these graylists active while Past-1 is also a mode silently deletes every
          // Past-1 candidate from basePool for the length of the graylist lock (25 scan cycles ‚Äî
          // far longer than Past-1's own freshness TTL) before Past-1 ever gets to see them. Stand
          // both graylists down whenever Past-1 is active; 0liq stays correct either way.
          const _0liqRelevant    = this._miwEffectivePresenceModes().includes('0');
          const _past1Relevant   = this._miwEffectivePresenceModes().includes('past1');
          const _crossLiqSyms = (_0liqRelevant && !_past1Relevant && this.cfg.pfCrossLiqGraylistEnabled) ? new Set(
            (this._pfCrossRead?.() || []).filter(e => e.kind === 'live-liq' && e.source === 'chaser' && e.symbol).map(e => e.symbol)
          ) : null;
          // Mirror the derived exclusion set into persisted, timestamped per-symbol state ‚Äî
          // the Cross Broadcast log itself already survives reload with its own TTL, but this
          // gives the combined-locks display (and any future consumer) a durable record of
          // exactly which ticker was excluded and since when, matching how the self-liq
          // graylist and Direction Lock already store their state.
          if (_crossLiqSyms) {
            if (!this._miwCrossLiqGraylist) this._miwCrossLiqGraylist = {};
            for (const e of (this._pfCrossRead?.() || [])) {
              if (e.kind === 'live-liq' && e.source === 'chaser' && e.symbol) this._miwCrossLiqGraylist[e.symbol] = { ts: e.ts, reason: 'cross-liq' };
            }
          }
          const scanSkip = {
            excluded: { nonUsdt: 0, btc: 0, lowPrice: 0, active: 0, banned: 0, reentry: 0, selfLiq: 0, crossLiq: 0 },
            unmatched: { noScanAnchor: 0, criteria: 0 },
            blocked: 0
          };
          const basePool = [];
          for (const t of allTickers) {
            if (!t?.symbol?.endsWith('USDT')) { scanSkip.excluded.nonUsdt++; continue; }
            if ((this.cfg.megacapExclude || DEFAULT_MEGACAP_EXCLUDE).includes(t.symbol)) { scanSkip.excluded.btc++; continue; }
            if (parseFloat(t.lastPrice || 0) < 0.001) { scanSkip.excluded.lowPrice++; continue; }
            if (activeSyms.has(t.symbol)) { scanSkip.excluded.active++; continue; }
            if (this._isSymbolBanned?.(t.symbol)) { scanSkip.excluded.banned++; continue; }
            if (this._miwIsReentryBlocked(t.symbol)) { scanSkip.excluded.reentry++; continue; }
            if (_0liqRelevant && !_past1Relevant && this.cfg.miwSelfLiqGraylistEnabled && this._miwIsSlotGraylisted(t.symbol)) { scanSkip.excluded.selfLiq++; continue; }
            if (_crossLiqSyms && _crossLiqSyms.has(t.symbol)) { scanSkip.excluded.crossLiq++; continue; }
            basePool.push(t);
          };

          // Order Count Surveillance: fetch a fresh sample for this cycle's candidate pool, only
          // when a slot actually uses ocs/ocx. Stateless ‚Äî no accumulation across cycles, no
          // cross-ticker mean required for OCX. A ticker missing from this sample simply fails
          // the ocs/ocx criterion in checkCrit ‚Äî it no longer blocks the rest of the pool.
          //
          // Tickers this scan just picked for liq surveillance are always included first, so OC
          // data exists for exactly the tickers a liquidation event might be about to hit (e.g.
          // to look back at order skew/velocity ahead of a liquidation) ‚Äî not the accumulated set
          // across every still-open, hour-long liq batch, just this cycle's pick. The remaining
          // headroom up to the shared cap (same size as the Liq Batch Size config) is filled with
          // random pool candidates, same as before this coordination existed.
          if ((needsOc || needsVolIo) && this.cfg.pfOcEnabled) {
            const ocCap = this.cfg.pfLiqBatchSize ?? 25;
            const liqSyms = this._liqLastBatchSyms || [];
            const liqSet  = new Set(liqSyms);
            let fillSyms = basePool.map(t => t.symbol).filter(s => !liqSet.has(s));
            for (let i = fillSyms.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [fillSyms[i], fillSyms[j]] = [fillSyms[j], fillSyms[i]];
            }
            const ocSyms = liqSyms.concat(fillSyms).slice(0, ocCap);
            // Vol/OI is already on the ticker payload ‚Äî no fetch needed, just carried into the
            // same tethered cycle history alongside OC (see _ocFetchBatch, Option A design).
            const volIoMap = {};
            for (const t of allTickers) volIoMap[t.symbol] = { vol: parseFloat(t.turnover24h || 0) || null, oi: parseFloat(t.openInterestValue || 0) || null };
            await this._ocFetchBatch(ocSyms, volIoMap, needsOc);
          }
          const _pfOcResults = this.pfOcResults || {};

          // Criteria-scan kline discovery (the old LSA/LBA/R-ASL/R-ABL random-sample prefetch)
          // is retired ‚Äî VSG replaces that family and rides PEC's own liq-fresh-pool fetch below
          // instead (see VSG.md). _miwPrefetchKlines/_miwKlineCache still exist and are still used,
          // just only by Historical Scoring's _miwSequestrFetch now, not by the criteria pool.

          // PEC only ever fetches for tickers whose liq surveillance batch just closed (see
          // _miwOnLiqClose) and are still within miwPecFreshCycles ‚Äî never the general pool.
          // A ticker outside that set simply fails every pec{tf}+/- check, same as any other
          // criterion whose backing data isn't available this cycle.
          if (needsPec) await this._miwPrefetchPec(this._miwPecFreshCandidates());

          // Always compute sampling data for PF visualizations (PLK evaluated inside)
          this._miwComputeSamplingData();

          const checkCrit = (c, fr, pec, t) => this._miwCheckCrit(c, fr, pec, t, _pfOcResults);

          this._miwLastActedAt = freshAt;

          // Build pool before capacity check so historical matches are logged regardless
          const _coQualEnabled = this.cfg.pfCoQualPenaltyEnabled;
          const _cqRanks = _coQualEnabled ? (this.miwCollapsedSlotRanks || {}) : null;
          const _cqScaledRank = (rawC, annotC) => this._miwScaledRank(rawC, annotC, _cqRanks);
          const _miwAnnotateCrit = (c, t) => {
            const _liqR = _allLiqResults[t.symbol];
            if (/^msliq/.test(c)) { const d = _liqR?.sDepth ?? 0; return `msliq${d >= 0 ? '+' : ''}${d}`; }
            if (/^mbliq/.test(c)) { const d = _liqR?.bDepth ?? 0; return `mbliq${d >= 0 ? '+' : ''}${d}`; }
            if (/^sliq/.test(c)) { const d = _liqR?.sDepth ?? 0; return `sliq${d >= 0 ? '+' : ''}${d}`; }
            if (/^bliq/.test(c)) { const d = _liqR?.bDepth ?? 0; return `bliq${d >= 0 ? '+' : ''}${d}`; }
            if (/^va/.test(c)) { const val = parseFloat(t.turnover24h || 0); const w = this._pfVolIoWindowAvg?.('vol'); const step = this.cfg.miwVaStep ?? 1; const tier = (val && w) ? Math.floor(((val - w) / w * 100) / step) : 0; return `va${tier>=0?'+':''}${tier}`; }
            if (/^ioa/.test(c)) { const val = parseFloat(t.openInterestValue || 0); const w = this._pfVolIoWindowAvg?.('oi'); const step = this.cfg.miwIoaStep ?? 1; const tier = (val && w) ? Math.floor(((val - w) / w * 100) / step) : 0; return `ioa${tier>=0?'+':''}${tier}`; }
            if (/^fund/.test(c)) { const step = this.cfg.miwFundStep ?? 0.25; const fr_ = parseFloat(t.fundingRate||0)*100; const tier = Math.floor(fr_ / step); return `fund${tier>=0?'+':''}${tier}`; }
            if (/^vsg/.test(c)) { const p = this._miwGetPecSync(t.symbol); const v = p?.vsg; if (!v || v['6h']==null || v['12h']==null || v['24h']==null) return `${c}+0`; const step = this.cfg.miwVsgDepthStep ?? 5; const high = this.cfg.miwVsgThresholdHigh ?? 70; const low = this.cfg.miwVsgThresholdLow ?? 30; let depth = 0; if (c==='vsgot') depth = ((v['6h']-high)+(v['12h']-high)+(v['24h']-high))/3; else if (c==='vsgut') depth = ((low-v['6h'])+(low-v['12h'])+(low-v['24h']))/3; else if (c==='vsgalpha') depth = ((v['12h']-v['6h'])+(v['12h']-v['24h']))/2; else if (c==='vsgdelta') depth = ((v['6h']-v['12h'])+(v['24h']-v['12h']))/2; else if (c==='vsgmomup') depth = v['6h']-v['24h']; else if (c==='vsgmomdn') depth = v['24h']-v['6h']; const tier = Math.max(0, Math.floor(depth/step)); return `${c}+${tier}`; }
            if (/^ocs/.test(c)) { const _r = this.pfOcResults?.[t.symbol]; const tot = (_r?.bc||0)+(_r?.sc||0); const buyPct = tot ? (_r.bc||0)/tot*100 : 50; const step = this.cfg.miwOcsStep ?? 1; const tier = Math.floor((buyPct-50)/step); return `ocs${tier>=0?'+':''}${tier}`; }
            if (/^ocx/.test(c)) { const _r = this.pfOcResults?.[t.symbol]; const _w = this._pfOcWindowAvgMs?.(); const step = this.cfg.miwOcxStep ?? 1; const tier = (_r?.avgMs!=null && _w) ? Math.floor(((_w - _r.avgMs) / _w * 100) / step) : 0; return `ocx${tier>=0?'+':''}${tier}`; }
            if (/^pec/.test(c)) {
              const p = this._miwGetPecSync(t.symbol);
              if (!p || p['6h'] == null || p['12h'] == null || p['24h'] == null) return `${c}+0`;
              const step = this.cfg.miwPecDepthStep ?? 5;
              const high = this.cfg.miwPecThresholdHigh ?? 70;
              const low  = this.cfg.miwPecThresholdLow ?? 30;
              let depth = 0;
              if (c === 'pecob') depth = ((p['6h']-high)+(p['12h']-high)+(p['24h']-high))/3;
              else if (c === 'pecos') depth = ((low-p['6h'])+(low-p['12h'])+(low-p['24h']))/3;
              else if (c === 'pecalpha') depth = ((p['12h']-p['6h'])+(p['12h']-p['24h']))/2;
              else if (c === 'pecdelta') depth = ((p['6h']-p['12h'])+(p['24h']-p['12h']))/2;
              else if (c === 'pecmomup') depth = p['6h']-p['24h'];
              else if (c === 'pecmomdn') depth = p['24h']-p['6h'];
              else return c;
              const tier = Math.max(0, Math.floor(depth/step));
              return `${c}+${tier}`;
            }
            return c;
          };
          // Past-1 slots have no anchor criterion (see _miwSlotLiqAnchor/_miwAutoQualify) ‚Äî the
          // ticker-pool restriction below IS their anchor. Computed once per scan, not per-ticker.
          const _past1Pool = this._miwEffectivePresenceModes().includes('past1') ? this._miwPast1FreshSymbols() : null;
          // Richness score for sort priority when Co-Qual is off ‚Äî sum of each matched
          // criterion's own collapsed rank, so capacity still favors historically-stronger
          // tickers even without Co-Qual scoring turned on. Replaces the old slotIdx-based
          // ordering (which relied on a pre-sorted combo list that no longer exists in Auto).
          const _richness = e => e.criteria.reduce((s, c) => s + this._miwCritScore(c), 0);
          const pool = basePool
            .map(t => {
              const fr       = parseFloat(t.fundingRate || 0) * 100;
              const _isPast1Fresh = !!_past1Pool && _past1Pool.has(t.symbol);
              const pec      = this._miwGetPecSync(t.symbol);
              const critOk = c => checkCrit(c, fr, pec, t);

              let matched = null; // { criteria, annotCrits, slotIdx }
              if (autoMode) {
                // Only 0-Liq and Past-1 ever resolve at scan time ‚Äî sliq/bliq/msliq/mbliq are
                // live-only (checkCrit has no branch for them). Mutually exclusive by
                // definition (0-Liq needs zero liquidation in-window, Past-1 needs some), so
                // there's no ambiguity in trying one then the other. _miwAnchorAllowed only
                // confirms '0' is an active mode ‚Äî it says nothing about THIS ticker, so
                // critOk('0liq') (the real _miwLiqZeroAcrossWindow check) has to run here too,
                // or every ticker clearing the secondary-criteria floor gets falsely tagged
                // 0liq regardless of its actual liquidation history.
                if (this._miwAnchorAllowed('0liq') && critOk('0liq')) {
                  const m = this._miwAutoQualify('0liq', critOk, c => _miwAnnotateCrit(c, t));
                  if (m) matched = { ...m, slotIdx: -1 };
                }
                if (!matched && _isPast1Fresh && this._miwEffectivePresenceModes().includes('past1')) {
                  const m = this._miwAutoQualify(null, critOk, c => _miwAnnotateCrit(c, t));
                  if (m) matched = { ...m, slotIdx: -1 };
                }
              } else {
                const slotIdx = slots.findIndex(s => {
                  if (!this._miwSlotLiqAnchor(s) && !_isPast1Fresh) return false;
                  return s.every(c => checkCrit(c, fr, pec, t));
                });
                if (slotIdx !== -1) matched = { criteria: slots[slotIdx], annotCrits: slots[slotIdx].map(c => _miwAnnotateCrit(c, t)), slotIdx };
              }
              if (!matched) {
                if (autoMode) {
                  const _canScan0 = this._miwAnchorAllowed('0liq');
                  const _canScanPast1 = _isPast1Fresh && this._miwEffectivePresenceModes().includes('past1');
                  if (!_canScan0 && !_canScanPast1) scanSkip.unmatched.noScanAnchor++;
                  else scanSkip.unmatched.criteria++;
                } else {
                  const slotReasons = slots.map(s => {
                    if (!this._miwSlotLiqAnchor(s) && !_isPast1Fresh) return 'noScanAnchor';
                    return 'criteria';
                  });
                  if (slotReasons.length && slotReasons.every(r => r === 'noScanAnchor')) scanSkip.unmatched.noScanAnchor++;
                  else scanSkip.unmatched.criteria++;
                }
                return null;
              }

              const _annotCrits = matched.annotCrits;
              const _annotKey = [..._annotCrits].sort().join(',');
              let compositeScore = 0;
              if (_coQualEnabled && _cqRanks) {
                if (autoMode) {
                  // Every true criterion is already captured in matched.criteria ‚Äî sum
                  // directly (positives and negatives together) rather than hunting for
                  // "other matching combos" to penalize. There's only one canonical match
                  // set per ticker now, so a separate penalty pass would be redundant.
                  compositeScore = matched.criteria.reduce((s, c, i) => s + _cqScaledRank(c, _annotCrits[i]), 0);
                } else {
                  const bestScore = matched.criteria.reduce((s, c, i) => s + _cqScaledRank(c, _annotCrits[i]), 0);
                  let penalty = 0;
                  for (let i = 0; i < slots.length; i++) {
                    if (i === matched.slotIdx) continue;
                    if (!this._miwSlotLiqAnchor(slots[i]) && !_isPast1Fresh) continue;
                    if (!slots[i].every(c => checkCrit(c, fr, pec, t))) continue;
                    const otherAnnot = slots[i].map(c => _miwAnnotateCrit(c, t));
                    const sc = slots[i].reduce((s, c, j) => s + _cqScaledRank(c, otherAnnot[j]), 0);
                    if (sc < 0) penalty += sc;
                  }
                  compositeScore = bestScore + penalty;
