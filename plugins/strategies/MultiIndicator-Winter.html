<!--
  Multi-Indicator Strategy Plugin for PseudoWinter
  Slot-based entry filter combining fund rate, 24hr price direction, and vol/mcap signals.

  Each "slot" is an AND-condition over any combination of twelve criteria:
    fund   — tiered funding rate (fund>N longs paying, fund<-N shorts paying)
    +24h   — ticker's 24hr price change is positive
    -24h   — ticker's 24hr price change is negative
    vm     — tiered vol/mcap ratio (vm>N high participation)
    lsa    — tiered 1h sell spike above avg (lsa>N)
    lba    — tiered 1h buy spike above avg (lba>N)
    rasl   — tiered 1h low-vol red candle (rasl>N)
    rabl   — tiered 1h low-vol green candle (rabl>N)
    sliq   — sell-liquidation depth gate (≥70% sell dominance)
    bliq   — buy-liquidation depth gate (≥70% buy dominance)
    msliq  — mixed sell-liq: sell majority but buy ≥30%
    mbliq  — mixed buy-liq: buy majority but sell ≥30%
    iot    — tiered OI vs Turnover ratio
    iom    — tiered OI vs MCap ratio

  A ticker qualifies for entry if it satisfies ALL criteria in ANY slot. Slots that contain
  a vol/mcap criterion trigger a CoinGecko market cap lookup via the shared window.__cgCoinList
  cache; fund and 24h criteria run entirely from the host's bulk ticker cache.

  Entry pool fires once per fresh bulk ticker fetch (_lastAllTickersAt) — will not re-scan
  the same cached snapshot twice. TP, SL, and all exit logic use the host's settings.
  Drawdown throttle and gains lock gate all entries.

  Load via Plugin Manager in PseudoWinter's config panel.
  Load AFTER EverWinter if using live trading — see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const VERSION       = '1.43.5';
  const DEFAULT_SLOTS = [['fund>1','rasl>25'],['vm<10','rabl>25'],['fund<-1','rasl>25'],['fund>1','rabl>25'],['vm>10','rabl>25'],['fund<-1','rabl>25']];
  const MIW_HIST_KEY  = '__miw_hist_batches';

  // Per-criterion emoji for position badges. Fund emoji is app-relative:
  // +fund = longs paying = good carry for shorts (🤑), bad for longs (💸).
  // -fund = shorts paying = bad for shorts (💸), good for longs (🤑).
  const CRIT_EMOJI = { '+24h': '⬆️', '-24h': '⬇️', 'fund': '💰', 'vm': '🔊', 'sliq': '🥵', 'bliq': '🥶', 'msliq': '💦', 'mbliq': '🌨️', 'iot': '🎲', 'iom': '🧲', 'ocs': '🔭', 'ocx': '📡' };
  const CRIT_DESC  = { 'fund': 'Fund (tiered funding rate)', '+24h': '+24h (up on day)', '-24h': '-24h (down on day)', 'vm': 'V/M (vol/mcap ratio)', 'lsa': 'LSA (1h sell spike)', 'lba': 'LBA (1h buy spike)', 'rasl': 'R-ASL (1h low-vol red)', 'rabl': 'R-ABL (1h low-vol green)', 'sliq': 'S-Liq (Sell-Liquidation: sell side ≥70% dominant)', 'bliq': 'B-Liq (Buy-Liquidation: buy side ≥70% dominant)', 'msliq': 'mS-Liq (Mixed Sell-Liq: sell majority, buy ≥30%)', 'mbliq': 'mB-Liq (Mixed Buy-Liq: buy majority, sell ≥30%)', 'iot': 'IO/T (OI vs Turnover — conviction/stickiness)', 'iom': 'IO/M (OI vs MCap — leverage concentration)', 'ocs': 'OCS (buy/sell skew %)', 'ocx': 'OCX (avg seconds between orders)' };
  // BOC/SOC (raw buy/sell fill counts requiring 24h surveillance runway) were considered but scrapped:
  // a 24h watch period only tells you counts at the end of the period, not a meaningful trend, and
  // hardware restarts every ~6h make a reliable 24h runway impractical on this device.

  const critEmoji = c => {
    if (/^fund/.test(c)) { const s = c.slice(4); const num = parseFloat(s.replace(/^[<>]/,'')); return (num < 0 ? '💸' : '🤑') + s; }
    if (/^vm/.test(c)) return '🔊' + c.slice(2);
    if (/^lsa/.test(c)) return '🟥' + c.slice(3);
    if (/^lba/.test(c)) return '🟩' + c.slice(3);
    if (/^rasl/.test(c)) return '🔴' + c.slice(4);
    if (/^rabl/.test(c)) return '🟢' + c.slice(4);
    if (/^msliq/.test(c)) return '💦' + c.slice(5);
    if (/^mbliq/.test(c)) return '🌨️' + c.slice(5);
    if (/^sliq/.test(c)) return '🥵' + c.slice(4);
    if (/^bliq/.test(c)) return '🥶' + c.slice(4);
    if (/^iot/.test(c)) return '🎲' + c.slice(3);
    if (/^iom/.test(c)) return '🧲' + c.slice(3);
    if (/^ocs/.test(c)) return '🔭' + c.slice(3);
    if (/^ocx/.test(c)) return '📡' + c.slice(3);
    return CRIT_EMOJI[c] || '';
  };
  const critLabel = c => {
    const fM = c.match(/^fund([<>])(-?\d+)$/);
    if (fM) return 'Fund ' + fM[1] + fM[2];
    const fA = c.match(/^fund([+-]-?\d*)$/);
    if (fA) return 'Fund t' + fA[1];
    if (c === 'fund') return 'Fund';
    const vM = c.match(/^vm([<>])(\d+)$/);
    if (vM) return 'V/M ' + vM[1] + vM[2];
    const vA = c.match(/^vm([+-]\d+)$/);
    if (vA) return 'V/M t' + vA[1];
    if (c === 'vm') return 'V/M';
    const kM = c.match(/^(lsa|lba|rasl|rabl)([<>])(\d+)$/);
    if (kM) return kM[1].toUpperCase().replace('RASL','R-ASL').replace('RABL','R-ABL') + ' ' + kM[2] + kM[3];
    const kA = c.match(/^(lsa|lba|rasl|rabl)([+-]\d+)$/);
    if (kA) return kA[1].toUpperCase().replace('RASL','R-ASL').replace('RABL','R-ABL') + ' t' + kA[2];
    if (c === 'lsa') return 'LSA'; if (c === 'lba') return 'LBA';
    if (c === 'rasl') return 'R-ASL'; if (c === 'rabl') return 'R-ABL';
    const m = c.match(/^(m?sliq|m?bliq)([<>])([+-]?\d+)$/);
    if (m) return (m[1] === 'sliq' ? 'S-Liq' : m[1] === 'bliq' ? 'B-Liq' : m[1] === 'msliq' ? 'mS-Liq' : 'mB-Liq') + ' ' + m[2] + m[3];
    const n = c.match(/^(m?sliq|m?bliq)([+-]\d+)$/);
    if (n) return (n[1] === 'sliq' ? 'S-Liq' : n[1] === 'bliq' ? 'B-Liq' : n[1] === 'msliq' ? 'mS-Liq' : 'mB-Liq') + ' ' + n[2];
    if (c === 'sliq') return 'S-Liq'; if (c === 'bliq') return 'B-Liq';
    if (c === 'msliq') return 'mS-Liq'; if (c === 'mbliq') return 'mB-Liq';
    const o = c.match(/^(iot|iom)([<>])(\d+)$/);
    if (o) return (o[1] === 'iot' ? 'IO/T' : 'IO/M') + ' ' + o[2] + o[3];
    const p = c.match(/^(iot|iom)([+-]\d+)$/);
    if (p) return (p[1] === 'iot' ? 'IO/T' : 'IO/M') + ' t' + p[2];
    if (c === 'iot') return 'IO/T'; if (c === 'iom') return 'IO/M';
    const oc = c.match(/^(ocs|ocx)([<>])(\d+)$/);
    if (oc) return ({'ocs':'OCS','ocx':'OCX'}[oc[1]])+' '+oc[2]+oc[3];
    if (c === 'ocs') return 'OCS'; if (c === 'ocx') return 'OCX';
    return CRIT_DESC[c] || c;
  };

  window.__BotPlugin = {
    id:        'multiindicator-winter',
    name:      'Multi-Indicator (Winter)',
    version:   VERSION,
    targetBot: 'pseudowinter',
    after:     ['everwinter', 'permafrost-winter'],
    before:    [],
    conflicts: ['liquiddiver-winter'],
    requires:  [],
    touches:   ['init', 'runScan'],

    css: `
      .miw-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .miw-slot { display:inline-flex; flex-direction:column; align-items:center; gap:3px; padding:6px 5px; border-radius:3px; border:1px solid; cursor:pointer; min-width:52px; font-size:9px; font-family:var(--mono); text-align:center; transition:border-color .15s,background .15s; }
      .miw-crit { font-size:8px; padding:1px 4px; border-radius:2px; background:rgba(96,210,255,.12); border:1px solid rgba(96,210,255,.3); color:var(--ice); white-space:nowrap; }
      .miw-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
      .miw-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .miw-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .miw-tab.on { border-color:rgba(96,210,255,.6); color:var(--ice); background:rgba(96,210,255,.08); }
      .miw-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .miw-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.miwEnabled"> + Multi</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false, tE: false, tX: false, tF: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Multi-Indicator</span>
              <span x-show="cfg.miwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.miwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.miwEnabled=!cfg.miwEnabled;persist()}">
              <div class="tog-t" :class="cfg.miwEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Multi-Indicator Mode</div>
                <div class="miw-hint">Shorts tickers matching any active entry slot; fires once per bulk ticker fetch using host TP/SL settings.</div>
              </div>
            </label>
            <div x-show="cfg.miwEnabled" style="margin-top:8px">
              <div class="miw-tabs">
                <button class="miw-tab" :class="tE?'on':''" @click="tE=!tE">ENTRY</button>
                <button class="miw-tab" :class="tX?'on':''" @click="tX=!tX">EXIT</button>
                <button class="miw-tab" :class="tF?'on':''" @click="tF=!tF">FADE</button>
              </div>

              <!-- Entry Zone -->
              <div class="miw-zone" x-show="tE">
                <!-- Entry Slots -->
                <div>
                  <div style="margin-bottom:6px">
                    <div class="lbl" style="margin-bottom:4px">Entry Slots</div>
                    <label class="tog" style="font-size:9px" @click="if(!cfgLocked){cfg.miwAutoSlots=!cfg.miwAutoSlots;persist()}">
                      <div class="tog-t" :class="cfg.miwAutoSlots?'on':''"><div class="tog-k"></div></div>
                      <span class="tog-l">Auto</span>
                    </label>
                  </div>

                  <!-- Auto slots controls -->
                  <div x-show="cfg.miwAutoSlots" style="margin-bottom:8px;padding:6px 8px;background:rgba(96,210,255,.04);border:1px solid rgba(96,210,255,.12);border-radius:3px">
                    <div class="lbl">Criteria per Slot <b x-text="cfg.miwAutoSlotSize??3"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'— '+(()=>{const n=cfg.miwAutoSlotSize??3,k=14-(cfg.miwAutoSlotExclude||[]).length;if(k<n)return 0;let r=1;for(let i=0;i<n;i++)r=r*(k-i)/(i+1);return Math.round(r)})()+' base slots (tiers add more)'"></span></div>
                    <input type="range" min="1" max="5" step="1" x-model.number="cfg.miwAutoSlotSize" @change="persist()">
                    <div class="lbl" style="margin-top:5px;margin-bottom:3px">Exclude from Auto</div>
                    <div style="display:flex;flex-wrap:wrap;gap:3px">
                      <template x-for="c in ['fund','+24h','-24h','vm','lsa','lba','rasl','rabl','sliq','bliq','msliq','mbliq','iot','iom','ocs','ocx']" :key="c">
                        <button @click.prevent="if(!cfgLocked){ const ex=(cfg.miwAutoSlotExclude||[]).slice(); const i=ex.indexOf(c); if(i>=0) ex.splice(i,1); else ex.push(c); cfg.miwAutoSlotExclude=ex; persist(); }"
                                :style="'font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;cursor:pointer;border:1px solid;' + ((cfg.miwAutoSlotExclude||[]).includes(c) ? 'border-color:rgba(255,80,80,.5);background:rgba(255,80,80,.15);color:rgba(255,80,80,.8)' : 'border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--text-lo)')"
                                x-text="c.replace('fund','Fund').replace('vm','V/M').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL').replace('sliq','S-Liq').replace('bliq','B-Liq').replace('iot','IO/T').replace('iom','IO/M').replace('ocs','OCS').replace('ocx','OCX')">
                        </button>
                      </template>
                    </div>
                    <div class="miw-hint" style="margin-top:4px">Excluded criteria are omitted from all auto combos and scorecard scoring. Manual slots are preserved when Auto is off. Tiered criteria (Fund, V/M, spike, IO/T, IO/M) record a tier value at entry — each distinct tier produces a separate scorecard key, so the actual scored variety exceeds the base slot count shown above.</div>
                  </div>

                  <!-- Manual slot builder — hidden when Auto is on -->
                  <div x-show="!cfg.miwAutoSlots">
                    <div class="miw-hint" style="margin-bottom:6px;color:var(--text-lo)">(click slot to edit · click criteria to toggle)</div>

                    <!-- Criteria picker — visible when a slot is selected -->
                    <div x-show="cfg.miwActiveSlot !== null && cfg.miwActiveSlot !== undefined && cfg.miwActiveSlot < (cfg.miwSlots||[]).length"
                         x-data="{ liqFocus: null, liqDir: '>', liqVal: 1, ratioFocus: null, ratioDir: '>', ratioTier: 5, gateFocus: null, gateDir: '>', gateTier: 1, ocFocus: null, ocDir: '>', ocVal: 100 }"
                         @click.outside="liqFocus = null; ratioFocus = null; gateFocus = null; ocFocus = null"
                         style="display:flex;gap:3px;flex-wrap:wrap;align-items:center;margin-bottom:7px;padding:6px 7px;background:rgba(255,255,255,.04);border-radius:3px;border:1px solid rgba(255,255,255,.08)">
                      <span style="font-size:9px;color:var(--text-lo);margin-right:2px">Slot <span x-text="(cfg.miwActiveSlot??0)+1"></span>:</span>
                      <template x-for="c in ['fund','+24h','-24h','vm','lsa','lba','rasl','rabl','sliq','bliq','msliq','mbliq','iot','iom','ocs','ocx']" :key="c">
                        <button class="miw-opt"
                          @click.prevent="if(!cfgLocked){
                            if(c==='sliq'||c==='bliq'||c==='msliq'||c==='mbliq'){
                              liqFocus=(liqFocus===c?null:c); ratioFocus=null; gateFocus=null; ocFocus=null;
                              if(liqFocus){ const ex=(cfg.miwSlots?.[cfg.miwActiveSlot]||[]).find(x=>x.startsWith(c)); if(ex){ const m=ex.match(/^(?:m?sliq|m?bliq)([<>])([+-]?\d+)$/); if(m){liqDir=m[1];liqVal=parseInt(m[2],10)} } }
                            } else if(c==='iot'||c==='iom'){
                              ratioFocus=(ratioFocus===c?null:c); liqFocus=null; gateFocus=null; ocFocus=null;
                              if(ratioFocus){ const ex=(cfg.miwSlots?.[cfg.miwActiveSlot]||[]).find(x=>x.startsWith(c)); if(ex){ const m=ex.match(/^(?:iot|iom)([<>])(\d+)$/); if(m){ratioDir=m[1];ratioTier=parseInt(m[2],10)} } }
                            } else if(c==='fund'||c==='vm'||c==='lsa'||c==='lba'||c==='rasl'||c==='rabl'){
                              gateFocus=(gateFocus===c?null:c); liqFocus=null; ratioFocus=null; ocFocus=null;
                              if(gateFocus){ const ex=(cfg.miwSlots?.[cfg.miwActiveSlot]||[]).find(x=>x.startsWith(c)); if(ex){ const m=ex.match(/^(?:fund|vm|lsa|lba|rasl|rabl)([<>])(-?\d+)$/); if(m){gateDir=m[1];gateTier=parseInt(m[2],10)} } else { gateDir='>'; gateTier=c==='fund'?1:c==='vm'?10:25; } }
                            } else if(c==='ocs'||c==='ocx'){
                              ocFocus=(ocFocus===c?null:c); liqFocus=null; ratioFocus=null; gateFocus=null;
                              if(ocFocus){ const ex=(cfg.miwSlots?.[cfg.miwActiveSlot]||[]).find(x=>x.startsWith(c)); if(ex){ const m=ex.match(/^(?:ocs|ocx)([<>])(\d+)$/); if(m){ocDir=m[1];ocVal=parseInt(m[2],10)} } else { ocDir='>'; ocVal=c==='ocs'?60:1; } }
                            } else { liqFocus=null; ratioFocus=null; gateFocus=null; ocFocus=null; _miwToggle(cfg.miwActiveSlot, c) }
                          }"
                          :style="(c==='sliq'||c==='bliq'||c==='msliq'||c==='mbliq') ? (liqFocus===c ? 'border-color:rgba(96,210,255,.8);color:var(--ice);background:rgba(96,210,255,.25)' : (cfg.miwSlots?.[cfg.miwActiveSlot]||[]).some(x=>x.startsWith(c)) ? 'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent') : (c==='iot'||c==='iom') ? (ratioFocus===c ? 'border-color:rgba(96,210,255,.8);color:var(--ice);background:rgba(96,210,255,.25)' : (cfg.miwSlots?.[cfg.miwActiveSlot]||[]).some(x=>x.startsWith(c)) ? 'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent') : (c==='fund'||c==='vm'||c==='lsa'||c==='lba'||c==='rasl'||c==='rabl') ? (gateFocus===c ? 'border-color:rgba(96,210,255,.8);color:var(--ice);background:rgba(96,210,255,.25)' : (cfg.miwSlots?.[cfg.miwActiveSlot]||[]).some(x=>x.startsWith(c)) ? 'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent') : (c==='ocs'||c==='ocx') ? (ocFocus===c ? 'border-color:rgba(96,210,255,.8);color:var(--ice);background:rgba(96,210,255,.25)' : (cfg.miwSlots?.[cfg.miwActiveSlot]||[]).some(x=>x.startsWith(c)) ? 'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent') : ((cfg.miwSlots?.[cfg.miwActiveSlot]||[]).includes(c) ? 'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent')"
                          x-text="c.replace('fund','Fund').replace('vm','V/M').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL').replace('sliq','S-Liq').replace('bliq','B-Liq').replace('iot','IO/T').replace('iom','IO/M').replace('ocs','OCS').replace('ocx','OCX')">
                        </button>
                      </template>
                      <!-- Liq depth config panel -->
                      <div x-show="liqFocus !== null" style="width:100%;margin-top:6px;padding:5px 7px;background:rgba(96,210,255,.06);border:1px solid rgba(96,210,255,.2);border-radius:3px">
                        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                          <span style="font-size:9px;color:var(--text-lo)" x-text="({'sliq':'S-Liq','bliq':'B-Liq','msliq':'mS-Liq','mbliq':'mB-Liq'}[liqFocus]||liqFocus)+' depth (% vs. history avg)'"></span>
                          <button @click.prevent="liqDir=(liqDir==='>'?'<':'>')"
                            style="font-family:var(--mono);font-size:9px;padding:1px 6px;background:rgba(96,210,255,.1);border:1px solid rgba(96,210,255,.35);border-radius:2px;color:var(--ice);cursor:pointer"
                            x-text="liqDir"></button>
                          <input type="range" min="-100" max="200" step="1" x-model.number="liqVal" style="flex:1;min-width:60px">
                          <span style="font-size:9px;color:var(--ice);min-width:24px;text-align:right" x-text="(liqVal>=0?'+':'')+liqVal"></span>
                          <button @click.prevent="if(!cfgLocked&&liqFocus){ const slots=(cfg.miwSlots||[]).map(s=>[...s]); const si=cfg.miwActiveSlot; if(!slots[si]) return; const existIdx=slots[si].findIndex(x=>x.startsWith(liqFocus)); if(existIdx!==-1){ slots[si].splice(existIdx,1); } else { slots[si].push(liqFocus+liqDir+(liqVal>=0?'+':'')+liqVal); } cfg.miwSlots=slots; persist?.(); }"
                            :style="(cfg.miwSlots?.[cfg.miwActiveSlot]||[]).some(x=>x.startsWith(liqFocus??'__')) ? 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.4);color:rgba(255,100,100,.9)' : 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(96,210,255,.1);border:1px solid rgba(96,210,255,.35);color:var(--ice)'"
                            x-text="(cfg.miwSlots?.[cfg.miwActiveSlot]||[]).some(x=>x.startsWith(liqFocus??'__')) ? 'Remove' : 'Add'">
                          </button>
                        </div>
                      </div>
                      <!-- IO/T and IO/M tier config panel -->
                      <div x-show="ratioFocus !== null" style="width:100%;margin-top:6px;padding:5px 7px;background:rgba(96,210,255,.06);border:1px solid rgba(96,210,255,.2);border-radius:3px">
                        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                          <span style="font-size:9px;color:var(--text-lo)" x-text="(ratioFocus==='iot'?'IO/T':'IO/M')+' tier'"></span>
                          <button @click.prevent="ratioDir=(ratioDir==='>'?'<':'>')"

                            :style="(cfg.miwSlots?.[cfg.miwActiveSlot]||[]).some(x=>x.startsWith(ocFocus??'__')) ? 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.4);color:rgba(255,100,100,.9)' : 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(96,210,255,.1);border:1px solid rgba(96,210,255,.35);color:var(--ice)'"

                          <button @click.prevent="gateDir=(gateDir==='>'?'<':'>')"
                            style="font-family:var(--mono);font-size:9px;padding:1px 6px;background:rgba(96,210,255,.1);border:1px solid rgba(96,210,255,.35);border-radius:2px;color:var(--ice);cursor:pointer"
                            x-text="gateDir"></button>

                            :style="(cfg.miwSlots?.[cfg.miwActiveSlot]||[]).some(x=>x.startsWith(gateFocus??'__')) ? 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.4);color:rgba(255,100,100,.9)' : 'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(96,210,255,.1);border:1px solid rgba(96,210,255,.35);color:var(--ice)'"

                    <!-- Slot blocks -->
                    <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:flex-start">

                          <div style="display:flex;flex-direction:column;gap:2px;min-height:14px">
                            <template x-for="c in slot" :key="c">
                              <span class="miw-crit" x-text="c.replace('fund','Fund').replace('vm','V/M').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL').replace('sliq','S-Liq').replace('bliq','B-Liq').replace('iot','IO/T').replace('iom','IO/M').replace('ocs','OCS').replace('ocx','OCX')"></span>

                            <span x-show="!slot.length" style="font-size:8px;color:var(--text-lo);font-style:italic">empty</span>

                          <button x-show="!cfgLocked"

                            style="font-size:8px;color:var(--text-lo);background:none;border:none;cursor:pointer;padding:0;margin-top:2px;line-height:1;opacity:.7">✕</button>
                        </div>
                      </template>
                      <button x-show="!cfgLocked"
                        @click.prevent="_miwAddSlot()"
                        style="align-self:center;padding:8px 10px;font-size:12px;background:rgba(96,210,255,.06);border:1px dashed rgba(96,210,255,.3);border-radius:3px;color:var(--ice);cursor:pointer">+</button>
                    </div>
                    <div class="miw-hint" style="margin-top:5px">Each slot is an AND-gate — a ticker must meet every criterion in the slot. Any matching slot qualifies the ticker for entry. Vol/mcap criteria compute market cap from CoinPaprika supply × Bybit price. LSA/LBA/R-ASL/R-ABL fetch the last completed 1h kline per ticker.</div>
                    <div class="miw-hint" style="margin-top:5px;line-height:1.8">Badge key: 🤑/💸 Fund · ⬆️ +24h · ⬇️ -24h · 🔊 V/M · 🟥 LSA · 🟩 LBA · 🔴 R-ASL · 🟢 R-ABL · 🥵 S-Liq · 🥶 B-Liq · 💦 mS-Liq · 🌨️ mB-Liq · 🎲 IO/T · 🧲 IO/M · 🔭 OCS · 📡 OCX — click any tiered criterion to configure gate</div>
                  </div><!-- end manual builder -->
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">Kline Scan Cap <b x-text="(cfg.miwKlineScanCap??20)"></b> tickers</div>
                    <input type="range" min="10" max="500" step="10" x-model.number="cfg.miwKlineScanCap" @change="persist()">
                    <div class="miw-hint">Random sample of tickers checked for kline criteria per cycle.</div>
                  </div>
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">V/M Scan Cap <b x-text="(cfg.miwMcapScanCap??50)"></b> tickers</div>
                    <input type="range" min="10" max="200" step="10" x-model.number="cfg.miwMcapScanCap" @change="persist()">
                    <div class="miw-hint">Max tickers for supply fetch per cycle. Pre-screened by fund rate and 24h direction first.</div>
                  </div>
                  <div class="g" style="margin-top:8px">
                    <div class="lbl" style="margin-bottom:4px">Tier Step Sizes</div>
                    <div class="miw-hint" x-text="'💰 Fund '+(cfg.miwFundStep??0.25)+'% · 🔊 V/M '+(cfg.miwVmStep??1)+'% · 🟥 Spike '+(cfg.miwSpikeStep??1)+'% · 🎲 IO/T '+(cfg.miwIotStep??1)+'% · 🧲 IO/M '+(cfg.miwIomStep??1)+'% · 🔭 OCS '+(cfg.miwOcsStep??1)+'% · 📡 OCX '+(cfg.miwOcxStep??1)+'s per tier. Tier = floor(value / step) — e.g. \"lsa>25\" at 1% step means spike ≥ 25% above average.'"></div>
                  </div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.miwRequireLiqData=!cfg.miwRequireLiqData;persist()}">

                    <div>
                      <div class="tog-l">Liq-Only Entries</div>
                      <div class="miw-hint">Only considers tickers with a fresh liquidation surveillance result. Requires Liquidation Surveillance in Permafrost. Adds ~1h startup delay. Staleness limit: Liq Result Max Age (Fade tab).</div>
                    </div>
                  </label>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.miwRequireMcapData=!cfg.miwRequireMcapData;persist()}">
                    <div class="tog-t" :class="cfg.miwRequireMcapData?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Fresh V/M Only</div>

                    </div>
                  </label>
                  <div class="g" x-show="cfg.miwRequireMcapData" style="margin-top:8px">
                    <div class="lbl">V/M Freshness <b x-text="(cfg.miwMcapFreshCycles??6)+' cycles'"></b></div>
                    <input type="number" class="inp" min="1" max="48" step="1" x-model.number="cfg.miwMcapFreshCycles" @change="persist()" style="width:70px">
                    <div class="miw-hint">Max age of supply data in scan cycles before a ticker is excluded.</div>
                  </div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.miwRequireOcData=!cfg.miwRequireOcData;persist()}">
                    <div class="tog-t" :class="cfg.miwRequireOcData?'on':''"><div class="tog-k"></div></div>

                      <div class="tog-l">Fresh OC Only</div>

                    </div>
                  </label>
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">OC Scan Cap <b x-text="(cfg.miwOcScanCap??20)"></b> tickers</div>
                    <input type="range" min="10" max="500" step="10" x-model.number="cfg.miwOcScanCap" @change="persist()">
                    <div class="miw-hint">Max candidate tickers sampled for Order Count Surveillance per scan cycle. Random draw from the pool when it exceeds this cap.</div>
                  </div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.miwVmSanityCheck=!cfg.miwVmSanityCheck;persist()}">
                    <div class="tog-t" :class="cfg.miwVmSanityCheck?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">V/M Sanity Cap</div>

                    </div>
                  </label>
                  <div class="g" x-show="cfg.miwVmSanityCheck" style="margin-top:8px">

                    <input type="range" min="0.1" max="2" step="0.05" x-model.number="cfg.miwVmSanityCap" @change="persist()">
                    <div class="miw-hint">Tickers where turnover24h / mcap exceeds this ratio are excluded from mcapMap for this cycle.</div>
                  </div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.miwIomSanityCheck=!cfg.miwIomSanityCheck;persist()}">
                    <div class="tog-t" :class="cfg.miwIomSanityCheck?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">IO/M Sanity Cap</div>

                  <div class="g" x-show="cfg.miwIomSanityCheck" style="margin-top:8px">

                    <input type="range" min="0.05" max="1" step="0.05" x-model.number="cfg.miwIomSanityCap" @change="persist()">
                    <div class="miw-hint">Tickers where openInterestValue / mcap exceeds this ratio are excluded from mcapMap for this cycle.</div>
                  </div>

                <div class="g" style="margin-top:10px">
                  <div class="lbl">Liq Result Max Age <b x-text="(cfg.miwLiqResultMaxCycles??2)+' cycles'"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'('+((cfg.miwLiqResultMaxCycles??2)*(cfg.scanMins??15))+' min)'"></span></div>
                  <input type="range" min="1" max="10" step="1" x-model.number="cfg.miwLiqResultMaxCycles" @change="persist()">
                  <div class="miw-hint">S-Liq / B-Liq slot criteria reject results older than this many scan cycles.</div>
                </div>
              </div><!-- end entry zone -->

              <!-- Exit Zone -->
              <div class="miw-zone" x-show="tX">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.miwCascadeEnabled=!cfg.miwCascadeEnabled;persist()}">
                  <div class="tog-t" :class="cfg.miwCascadeEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Cascade Exit</div>
                    <div class="miw-hint">Bails all MIW positions when their collective unrealized profit reaches a % of total base margin.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.miwCascadeEnabled" style="margin-top:8px">
                  <div class="lbl">Trigger at <b x-text="(cfg.miwCascadePct??25)+'% of base margin'"></b></div>
                  <input type="range" min="5" max="200" step="5" x-model.number="cfg.miwCascadePct" @change="persist()">
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.miwSacrificeEnabled=!cfg.miwSacrificeEnabled;persist()}">
                  <div class="tog-t" :class="cfg.miwSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Sacrifice Exit</div>
                    <div class="miw-hint">Bails all MIW positions when their collective unrealized loss reaches a % of avg base margin.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.miwSacrificeEnabled" style="margin-top:8px">
                  <div class="lbl">Trigger at <b x-text="'-'+(cfg.miwSacrificePct??25)+'% of base margin'"></b></div>
                  <input type="range" min="5" max="200" step="5" x-model.number="cfg.miwSacrificePct" @change="persist()">
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.miwRollingSacrificeEnabled=!cfg.miwRollingSacrificeEnabled;persist()}">
                    <div class="tog-t" :class="cfg.miwRollingSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Rolling Window</div>
                      <div class="miw-hint">On trigger: close oldest position only instead of bailing all.</div>
                    </div>
                  </label>
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.miwHalvingEnabled=!cfg.miwHalvingEnabled;persist()}">
                  <div class="tog-t" :class="cfg.miwHalvingEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Target Halving</div>
                    <div class="miw-hint">Halves the cascade/sacrifice trigger threshold once per interval, based on the age of the oldest MIW position — the longer they're held, the easier the collective exit fires.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.miwHalvingEnabled" style="margin-top:8px">
                  <div class="lbl">Halving Interval <b x-text="(h=>(h<1?Math.round(h*60)+'m':h%1===0?h+'h':Math.floor(h)+'h '+Math.round((h%1)*60)+'m'))(cfg.miwHalvingHours??0.5)"></b></div>
                  <input type="number" class="inp" min="0.1" max="24" step="0.1" x-model.number="cfg.miwHalvingHours" @change="persist()" style="width:80px">
                  <div class="miw-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._miw); if(!pos.length) return 'No active MIW positions.'; const oldest=pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()); const ageMs=Date.now()-oldest; const halvMs=(cfg.miwHalvingHours??0.5)*3600000; const mul=Math.pow(0.5,ageMs/halvMs); const h=Math.floor(ageMs/3600000); const m=Math.floor((ageMs%3600000)/60000); return 'Oldest: '+h+'h '+String(m).padStart(2,'0')+'m old → ×'+mul.toFixed(3)+' on trigger'; })()"></div>
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.miwSubstitutionEnabled=!cfg.miwSubstitutionEnabled;persist()}">
                  <div class="tog-t" :class="cfg.miwSubstitutionEnabled?'on':''"><div class="tog-k"></div></div>

                    <div class="tog-l">Substitution</div>

                  </div>
                </label>
                <div x-show="cfg.miwSubstitutionEnabled" style="margin-top:8px">

                  </div>
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">Min Age <b x-text="(cfg.miwSubstitutionMinAgeMins??10)+'m'"></b></div>

                    <div class="miw-hint">A position must be held at least this long before it can be substituted out.</div>
                  </div>

                      <div class="tog-l">Protect Winners</div>

                    </div>
                  </label>
                </div>
              </div><!-- end exit zone -->

                      <div class="miw-hint">Share of the kline scan cap reserved each cycle for confirming pending targets. Remainder goes to discovery.</div>
                    </div>

      `,
      'stats-eda': `
        <div class="sec">

          <div x-data="{
            get syms() {
              void tick;
              if (!_tickerGraylist) return [];

              <div style="font-family:var(--mono);font-size:9.5px;color:var(--text-lo);margin-bottom:5px">Blocked until next bulk fetch:</div>
              <div style="display:flex;flex-wrap:wrap;gap:3px">
                <template x-for="sym in syms" :key="sym">
                  <span style="padding:1px 6px;border-radius:2px;background:rgba(96,210,255,.07);border:1px solid rgba(96,210,255,.25);color:var(--ice);font-family:var(--mono);font-size:9px" x-text="sym.replace('USDT','')"></span>
                </template>
              </div>
            </div>
          </div>
        </div>
        <div class="sec">
          <div class="sec-ttl">Hist Scoring</div>
          <div>
            <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px">
              <span style="font-family:var(--mono);font-size:10px;color:var(--ice)" x-text="Object.keys(_miwHistPending||{}).length"></span>
              <span style="font-family:var(--mono);font-size:9px;color:var(--text-lo)">target(s) pending simulation</span>
            </div>
            <div x-show="Object.keys(_miwHistPending||{}).length > 0" style="font-family:var(--mono);font-size:9px;color:var(--text-lo);margin-bottom:6px">Next batch: <span x-text="(()=>{ void tick; const rem=(cfg.scanMins||15)*60000-(Date.now()-(bot.lastScanAt||0)); if(!bot.running||rem<=0) return 'next scan'; const m=Math.floor(rem/60000); const s=Math.floor((rem%60000)/1000); return m+'m '+s+'s'; })()" :style="(()=>{ void tick; const rem=(cfg.scanMins||15)*60000-(Date.now()-(bot.lastScanAt||0)); return !bot.running||rem<=0?'color:var(--ice)':''; })()"></span></div>
            <div x-show="!(miwHistBatches||[]).length" style="font-family:var(--mono);font-size:9px;color:var(--text-lo)">No completed batches yet.</div>
            <div x-show="(miwHistBatches||[]).length" style="display:flex;flex-direction:column;gap:4px">
              <template x-for="b in (miwHistBatches||[]).slice(-5).reverse()" :key="b.ts">
                <div style="display:flex;flex-direction:column;gap:1px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)">
                  <div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8.5px">
                    <span style="color:var(--text-lo);min-width:22px" x-text="'#'+b.id"></span>
                    <span style="color:var(--ice)" x-text="b.wrote+'/'+b.total"></span>
                    <span x-show="b.wins != null" style="color:rgba(100,220,150,.85)" x-text="'W'+b.wins"></span>
                    <span x-show="b.losses != null" style="color:rgba(255,80,80,.7)" x-text="'L'+b.losses"></span>
                    <span x-show="b.netPnl != null" style="margin-left:auto" :style="'color:'+(b.netPnl>=0?'rgba(100,220,150,.85)':'rgba(255,80,80,.7)')" x-text="b.netPnl!=null?(b.netPnl>=0?'+$':'-$')+Math.abs(b.netPnl).toFixed(2):''"></span>
                  </div>
                  <div style="font-family:var(--mono);font-size:7.5px;color:var(--text-lo);text-align:right" x-text="(()=>{ const d=new Date(b.ts); const now=new Date(); const hm=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); return d.toDateString()===now.toDateString()?hm:d.toLocaleDateString('en',{month:'short',day:'numeric'})+' '+hm; })()"></div>
                </div>
              </template>
            </div>

      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origScan  = def.runScan;
      const _origPers  = def.persist;

      return Object.assign({}, def, {

        miwCollapsedSlotRanks: {},
        _miwFundSkew: null,
        _miwVolSkew: null,
        _miwOiSkew: null,
        _miwLastSampledAt: 0,
        _miwHaltLogged: false,
        miwHistBatches: [],
        _miwHistPending: {},
        _miwHistBatchId: 0,
        _miwSequestrUsed: 0,
        _miwSlotGraylist: {},
        _miwFreshMcapBases: null,

        persist() {
          _origPers.call(this);
          try { localStorage.setItem(MIW_HIST_KEY, JSON.stringify({ batches: (this.miwHistBatches || []).slice(-25), fundSkew: this._miwFundSkew || null, graylist: this._miwSlotGraylist || {}, histPending: this._miwHistPending || {} })); } catch(e) {}
        },

        async init() {
          await _origInit.call(this);
          // Presence flag other plugins (Ashfall/Permafrost) check to decide whether to show
          // MIW-specific UI (sampling bars) — set unconditionally on load, not on miwEnabled,
          // since the plugin being loaded is what matters for "is this data available at all."
          this._miwLoaded = true;
          try { const _r = localStorage.getItem(MIW_HIST_KEY); if (_r) { const _p = JSON.parse(_r); if (Array.isArray(_p)) { this.miwHistBatches = _p.slice(-25); } else { this.miwHistBatches = (_p.batches || []).slice(-25); if (_p.fundSkew) this._miwFundSkew = _p.fundSkew; if (_p.graylist) this._miwSlotGraylist = _p.graylist; if (_p.histPending) this._miwHistPending = _p.histPending; } } } catch(e) {}
          if (!this.miwCollapsedSlotRanks) this.miwCollapsedSlotRanks = {};
          if (!this.miwCollapsedCritStats) this.miwCollapsedCritStats = {};
          if (this.cfg.miwEnabled         === undefined) this.cfg.miwEnabled         = true;
          if (this.cfg.miwPicks           === undefined) this.cfg.miwPicks           = 5;
          if (this.cfg.miwFrThreshold     === undefined) this.cfg.miwFrThreshold     = 0.1;
          if (this.cfg.miwShareCapEnabled === undefined) this.cfg.miwShareCapEnabled = true;
          if (this.cfg.miwShareCapPct     === undefined) this.cfg.miwShareCapPct     = 100;
          if (this.cfg.miwActiveSlot      === undefined) this.cfg.miwActiveSlot      = 5;
          if (!Array.isArray(this.cfg.miwSlots) || !this.cfg.miwSlots.length)
            this.cfg.miwSlots = DEFAULT_SLOTS.map(s => [...s]);
          if (this.cfg.miwCascadeEnabled   === undefined) this.cfg.miwCascadeEnabled   = true;
          if (this.cfg.miwCascadePct       === undefined) this.cfg.miwCascadePct       = 25;
          if (this.cfg.miwSacrificeEnabled === undefined) this.cfg.miwSacrificeEnabled = true;
          if (this.cfg.miwRollingSacrificeEnabled === undefined) this.cfg.miwRollingSacrificeEnabled = true;
          if (this.cfg.miwSacrificePct     === undefined) this.cfg.miwSacrificePct     = 25;
          if (this.cfg.miwKlineVolMin      === undefined) this.cfg.miwKlineVolMin      = 25;
          if (this.cfg.miwKlineScanCap     === undefined) this.cfg.miwKlineScanCap     = 20;
          if (this.cfg.miwMcapScanCap      === undefined) this.cfg.miwMcapScanCap      = 50;
          if (this.cfg.miwHalvingEnabled   === undefined) this.cfg.miwHalvingEnabled   = true;
          if (this.cfg.miwHalvingHours     === undefined) this.cfg.miwHalvingHours     = 0.5;
          if (this.cfg.miwSubstitutionEnabled       === undefined) this.cfg.miwSubstitutionEnabled       = true;
          if (this.cfg.miwSubstitutionMarginPct     === undefined) this.cfg.miwSubstitutionMarginPct     = 5;
          if (this.cfg.miwSubstitutionMinAgeMins    === undefined) this.cfg.miwSubstitutionMinAgeMins    = 10;
          if (this.cfg.miwSubstitutionProtectWinners === undefined) this.cfg.miwSubstitutionProtectWinners = true;
          if (this.cfg.miwLiqResultMaxCycles   === undefined) this.cfg.miwLiqResultMaxCycles   = 2;
          if (this.cfg.miwRequireLiqData       === undefined) this.cfg.miwRequireLiqData       = false;
          if (this.cfg.miwRequireMcapData      === undefined) this.cfg.miwRequireMcapData      = false;
          if (this.cfg.miwRequireOcData        === undefined) this.cfg.miwRequireOcData        = true;
          if (this.cfg.miwOcScanCap            === undefined) this.cfg.miwOcScanCap            = 20;
          if (this.cfg.miwMcapFreshCycles      === undefined) this.cfg.miwMcapFreshCycles      = 6;
          if (this.cfg.miwVmSanityCheck        === undefined) this.cfg.miwVmSanityCheck        = true;
          if (this.cfg.miwVmSanityCap          === undefined) this.cfg.miwVmSanityCap          = 0.5;
          if (this.cfg.miwIomSanityCheck       === undefined) this.cfg.miwIomSanityCheck       = true;
          if (this.cfg.miwIomSanityCap         === undefined) this.cfg.miwIomSanityCap         = 0.5;
          this._miwFreshMcapBases = null;
          this._miwFundSkew       = null;
          this._miwVolSkew        = null;
          this._miwOiSkew         = null;
          if (this.cfg.miwHistScoringEnabled   === undefined) this.cfg.miwHistScoringEnabled   = true;
          if (this.cfg.miwHistToleranceMins    === undefined) this.cfg.miwHistToleranceMins    = 20;
          if (this.cfg.miwHistSequestrPct      === undefined) this.cfg.miwHistSequestrPct      = 50;
          this._miwHistPending = {};
          this._miwSequestrUsed = 0;
          if (this.cfg.miwAutoSlots                  === undefined) this.cfg.miwAutoSlots                  = true;
          if (this.cfg.miwAutoSlotSize               === undefined) this.cfg.miwAutoSlotSize               = 3;
          if (this.cfg.miwAutoSlotExclude            === undefined) this.cfg.miwAutoSlotExclude            = [];
          if (!this._miwSlotGraylist) this._miwSlotGraylist = {};
          if (this.cfg.miwFundStep  === undefined) this.cfg.miwFundStep  = 0.25;
          if (this.cfg.miwVmStep    === undefined) this.cfg.miwVmStep    = 1;
          if (this.cfg.miwSpikeStep === undefined) this.cfg.miwSpikeStep = 1;
          if (this.cfg.miwIotStep   === undefined) this.cfg.miwIotStep   = 1;
          if (this.cfg.miwIomStep   === undefined) this.cfg.miwIomStep   = 1;
          if (this.cfg.miwOcsStep   === undefined) this.cfg.miwOcsStep   = 1;
          if (this.cfg.miwOcxStep   === undefined) this.cfg.miwOcxStep   = 0.1;
          // Legacy migration: convert old +fund/-fund/>10pct/<10pct/bare lsa/lba/rasl/rabl to tiered form
          {
            const _fundStep   = this.cfg.miwFundStep  ?? 0.25;
            const _vmStep     = this.cfg.miwVmStep    ?? 1;
            const _spikeStep  = this.cfg.miwSpikeStep ?? 1;
            const _frThr      = this.cfg.miwFrThreshold ?? 0.1;
            const _volMin     = this.cfg.miwKlineVolMin  ?? 25;
            const _vmTier     = Math.max(1, Math.round(10 / _vmStep));
            const _frTier     = Math.max(1, Math.ceil(_frThr / _fundStep));
            const _migCrit = c => {
              if (c === '+fund')   return `fund>${_frTier}`;
              if (c === '-fund')   return `fund<-${_frTier}`;
              if (c === '>10pct')  return `vm>${_vmTier}`;
              if (c === '<10pct')  return `vm<${_vmTier}`;
              if (c === 'lsa')     return `lsa>${_volMin}`;
              if (c === 'lba')     return `lba>${_volMin}`;
              if (c === 'rasl')    return `rasl>${_volMin}`;
              if (c === 'rabl')    return `rabl>${_volMin}`;
              return c;
            };
            const _legacyNames = new Set(['+fund','-fund','>10pct','<10pct','lsa','lba','rasl','rabl']);
            if (Array.isArray(this.cfg.miwSlots) && this.cfg.miwSlots.some(s => s.some(c => _legacyNames.has(c)))) {
              this.cfg.miwSlots = this.cfg.miwSlots.map(s => s.map(_migCrit));
              this.persist();
            }
            if (Array.isArray(this.cfg.miwAutoSlotExclude) && this.cfg.miwAutoSlotExclude.some(c => _legacyNames.has(c))) {
              this.cfg.miwAutoSlotExclude = this.cfg.miwAutoSlotExclude.map(_migCrit);
              this.persist();
            }
          }
          this.registerRoleBadge?.(item => {
            if (!item || !item._miw) return null;
            const crits  = item._miwCriteria || [];
            const emoji  = crits.map(c => critEmoji(c)).join('');
            const title  = crits.length ? 'Multi: ' + crits.map(c => critLabel(c)).join(' + ') : 'Multi-Indicator';
            return `<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;letter-spacing:1px;border:1px solid rgba(96,210,255,.45);color:var(--ice);background:rgba(96,210,255,.10)" title="${title}">${emoji || 'Multi'}</span>`;
          });
          this.registerCloseReason?.('substitution', 'Sub');
          this.log(`[MIW] Multi-Indicator (Winter) v${VERSION} loaded — ${this.cfg.miwEnabled ? 'enabled' : 'disabled'} | ${(this.cfg.miwSlots||[]).length} slots | ${this.cfg.miwPicks}/cycle`, 'info');
          this.renderTradeFeed?.();
          if (this._miwExitTimer) clearInterval(this._miwExitTimer);
          this._miwExitTimer = setInterval(() => {
            this._miwCheckCascade();
            this._miwCheckSacrifice();
          }, 5000);
        },

        _miwToggle(i, c) {
          const slots = (this.cfg.miwSlots || []).map(s => [...s]);
          if (!slots[i]) return;
          const idx = slots[i].indexOf(c);
          if (idx === -1) slots[i].push(c); else slots[i].splice(idx, 1);
          this.cfg.miwSlots = slots;
          this.persist?.();
        },

        _miwDelSlot(i) {
          const slots = (this.cfg.miwSlots || []).map(s => [...s]);
          slots.splice(i, 1);
          this.cfg.miwSlots = slots;
          if (this.cfg.miwActiveSlot !== null) {
            if (slots.length === 0) this.cfg.miwActiveSlot = null;
            else if (this.cfg.miwActiveSlot >= slots.length) this.cfg.miwActiveSlot = slots.length - 1;
          }
          this.persist?.();
        },

        _miwAddSlot() {
          const slots = (this.cfg.miwSlots || []).map(s => [...s]);
          slots.push([]);
          this.cfg.miwSlots = slots;
          this.cfg.miwActiveSlot = slots.length - 1;
          this.persist?.();
        },

        _miwHalvingMultiplier() {
          if (!this.cfg.miwHalvingEnabled) return 1;
          const pos = (this.positions || []).filter(p => p._miw);
          if (!pos.length) return 1;
          const oldest = pos.reduce((m, p) => Math.min(m, p.openedAt || Date.now()), Date.now());
          return Math.pow(0.5, (Date.now() - oldest) / ((this.cfg.miwHalvingHours ?? 0.5) * 3600000));
        },

        async _miwCheckCascade() {
          if (!this.cfg.miwCascadeEnabled) return;
          const miwPositions = (this.positions || []).filter(p => p._miw);
          if (!miwPositions.length) return;
          const totalUPnL   = miwPositions.reduce((s, p) => s + (p.upnl || 0), 0);
          const baseMargin  = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const halvMul     = this._miwHalvingMultiplier();
          const threshold   = baseMargin * ((this.cfg.miwCascadePct ?? 25) / 100) * halvMul;
          if (totalUPnL >= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            this.log(`[MIW] 🌊 Cascade triggered — collective uPnL +${totalUPnL.toFixed(4)} ≥ ${threshold.toFixed(4)} USDT (${this.cfg.miwCascadePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) — bailing ${miwPositions.length} position(s)`, 'info');
            this._logBatchBegin?.();
            try {
              for (const pos of miwPositions) {
                await this.pseudoClosePosition(pos, 'cascade');
              }
            } finally { this._logBatchEnd?.('[MIW] 🌊 Cascade roll-up'); }
          }
        },

        async _miwCheckSacrifice() {
          if (!this.cfg.miwSacrificeEnabled) return;
          const miwPositions = (this.positions || []).filter(p => p._miw);
          if (!miwPositions.length) return;
          const totalUPnL   = miwPositions.reduce((s, p) => s + (p.upnl || 0), 0);
          const baseMargin  = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const halvMul     = this._miwHalvingMultiplier();
          const threshold   = -(baseMargin * ((this.cfg.miwSacrificePct ?? 25) / 100) * halvMul);
          if (totalUPnL <= threshold) {
            const halvNote = halvMul < 0.999 ? ` × halving ×${halvMul.toFixed(3)}` : '';
            if (this.cfg.miwRollingSacrificeEnabled) {
              const oldest = miwPositions.reduce((a, b) => (a.openedAt || 0) <= (b.openedAt || 0) ? a : b);
              this.log(`[MIW] 🩸 Rolling sacrifice — uPnL ${totalUPnL.toFixed(4)} ≤ ${threshold.toFixed(4)} USDT (${this.cfg.miwSacrificePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) — closing oldest: ${oldest.symbol}`, 'info');
              await this.pseudoClosePosition(oldest, 'sacrifice');
            } else {
              this.log(`[MIW] 🩸 Sacrifice triggered — collective uPnL ${totalUPnL.toFixed(4)} ≤ ${threshold.toFixed(4)} USDT (${this.cfg.miwSacrificePct ?? 25}%${halvNote} of ${baseMargin.toFixed(4)} base margin) — bailing ${miwPositions.length} position(s)`, 'info');
              this._logBatchBegin?.();
              try {
                for (const pos of miwPositions) {
                  await this.pseudoClosePosition(pos, 'sacrifice');
                }
              } finally { this._logBatchEnd?.('[MIW] 🩸 Sacrifice roll-up'); }
            }
          }
        },

        // Only meaningful when Co-Qualifying Penalty is on (Permafrost) — otherwise compositeScore
        // is always 0 for both sides and the margin check never clears, so this is a safe no-op.
        async _miwTrySubstitute(entryPool) {
          if (!this.cfg.miwSubstitutionEnabled || !entryPool?.length) return false;
          const myPositions = (this.positions || []).filter(p => p._miw);
          if (!myPositions.length) return false;
          const now           = Date.now();
          const minAgeMs       = (this.cfg.miwSubstitutionMinAgeMins ?? 10) * 60000;
          const protectWinners = this.cfg.miwSubstitutionProtectWinners ?? true;
          const baseMargin     = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const marginThreshold = baseMargin * ((this.cfg.miwSubstitutionMarginPct ?? 5) / 100);

          const eligible = myPositions.filter(p => {
            if ((now - (p.openedAt || 0)) < minAgeMs) return false;
            if (protectWinners && (p.upnl || 0) > 0) return false;
            return true;
          });
          if (!eligible.length) return false;

          eligible.sort((a, b) => (a._miwCompositeScore ?? 0) - (b._miwCompositeScore ?? 0));
          const worst      = eligible[0];
          const worstScore = worst._miwCompositeScore ?? 0;
          const best       = entryPool[0];
          if (!best || (best.compositeScore - worstScore) < marginThreshold) return false;

          this.log(`[MIW] 🔁 Substitution — closing ${worst.symbol} (score ${worstScore.toFixed(4)}) for ${best.t.symbol} (score ${best.compositeScore.toFixed(4)}), Δ${(best.compositeScore - worstScore).toFixed(4)} ≥ ${marginThreshold.toFixed(4)} margin`, 'info');
          await this.pseudoClosePosition(worst, 'substitution');
          return await this._miwOpen(best.t, best.criteria, best.slotIdx, best.compositeScore);
        },

        async runScan() {
          await this._miwSequestrFetch();
          await this._miwProcessHistMatches();
          await this._miwCheckCascade();
          await this._miwCheckSacrifice();
          const tsBefore = this._lastAllTickersAt || 0;
          await _origScan.call(this);
          // If _origScan returned without fetching fresh tickers (halt/lock/cache-hit after a
          // halt cleared), _lastAllTickersAt is unchanged. Reset _miwLastActedAt so that the
          // next genuine fresh fetch is not silently skipped by the dedup check.
          if ((this._lastAllTickersAt || 0) === tsBefore && tsBefore === (this._miwLastActedAt || 0)) {
            this._miwLastActedAt = 0;
          }
          await this._miwRunScan();
        },

        _miwComputeSamplingData() {
          // Funding skew — always computed for PF visualization
          const klineSyms = Object.keys(this._miwKlineCache || {});
          const sharedLiq = this._sharedRead('liqResults');
          const fundCombined = { ...(sharedLiq?.data || {}), ...(this._liqResults || {}) };
          const liqSyms = Object.keys(fundCombined);
          const unionSyms = [...new Set([...klineSyms, ...liqSyms])];
          const tickerMap = {};
          for (const t of (this._lastAllTickers || [])) tickerMap[t.symbol] = t;
          let posCount = 0, negCount = 0;
          for (const sym of unionSyms) {
            const t = tickerMap[sym];
            if (!t) continue;
            const fr = parseFloat(t.fundingRate || 0) * 100;
            if (fr > 0) posCount++;
            else if (fr < 0) negCount++;
          }
          const fundTotal = posCount + negCount;
          if (fundTotal > 0) {
            this._miwFundSkew = { negPct: negCount / fundTotal * 100, posPct: posCount / fundTotal * 100, domDir: posCount >= negCount ? 'fund+' : 'fund-', domPct: Math.max(posCount, negCount) / fundTotal * 100 };
          }

          // Volume skew — always computed for PF visualization
          let aboveSum = 0, belowSum = 0;
          for (const [sym, kl] of Object.entries(this._miwKlineCache || {})) {
            const t = tickerMap[sym];
            if (!t || !kl?.volume) continue;
            const avg = parseFloat(t.volume24h || 0) / 24;
            if (!avg) continue;
            const mult = kl.volume / avg;
            if (mult > 1) aboveSum += mult - 1;
            else if (mult < 1) belowSum += 1 - mult;
          }
          const volTotal = aboveSum + belowSum;
          if (volTotal > 0) {
            this._miwVolSkew = { abovePct: aboveSum / volTotal * 100, belowPct: belowSum / volTotal * 100, aboveSum, belowSum };
          }

          // OI Normalcy — always computed for PF visualization
          let oiSum = 0, mcapSum = 0, oiCount = 0;
          for (const t of (this._lastAllTickers || [])) {
            const oi = parseFloat(t.openInterestValue || 0);
            if (!oi) continue;
            const base = t.symbol.replace(/USDT$/i, '').toLowerCase();
            const price = parseFloat(t.lastPrice || 0);
            const mcap = this._miwGetFreshMcap(base, price);
            if (!mcap) continue;
            oiSum += oi; mcapSum += mcap; oiCount++;
          }
          if (oiCount >= 3 && mcapSum > 0) {
            const ratio = oiSum / mcapSum * 100;
            const mid = this.cfg.pfWaveOiMid ?? 2;
            const tol = this.cfg.pfWaveOiTol ?? 1;
            const excess = Math.max(0, Math.abs(ratio - mid) - tol);
            const score = Math.min(100, excess / tol * 100);
            this._miwOiSkew = { ratio, mid, tol, score, count: oiCount };

            const CONC = 5;
            const symbols = Object.keys(bySymbol);
            for (let i = 0; i < symbols.length; i += CONC) {
              await Promise.all(symbols.slice(i, i + CONC).map(async sym => {
                const entries = bySymbol[sym];
                const oldestTs  = Math.min(...entries.map(x => x.entry.targetHourStart));
                const hoursBack = Math.min(Math.ceil((now - oldestTs) / 3_600_000) + 2, 200);
                try {
                  const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=${hoursBack}`);
                  if (!r.ok) return;
                  const d = await r.json();
                  const list = d?.result?.list;
                  if (!list) return;
                  const candleMap = {};
                  for (const c of list) candleMap[parseInt(c[0])] = c;
                  for (const { key, entry } of entries) {
                    const c = candleMap[entry.targetHourStart];
                    if (!c) { delete this._miwHistPending[key]; continue; }
                    const _pnl1 = _resolve(parseFloat(c[1]), parseFloat(c[2]), parseFloat(c[3]), parseFloat(c[4]));
                    this._pfScoreWrite?.(entry.annotCrits, _pnl1, true);
                    netPnl += _pnl1; if (_pnl1 > 0) wins++; else losses++;
                    delete this._miwHistPending[key];
                    wrote++;
                  }
                } catch(_) {}
              }));
            }
          }

          this.log(`[MIW] 📊 Hist-score batch #${_batchId} done — ${wrote} written`, 'info');
          if (wrote) {
            this._pfScoreBuild?.();
            if (!this.miwHistBatches) this.miwHistBatches = [];
            this.miwHistBatches.push({ id: _batchId, ts: now, wrote, total: toProcess.length, wins, losses, netPnl });
            if (this.miwHistBatches.length > 25) this.miwHistBatches.splice(0, this.miwHistBatches.length - 25);
            this.persist?.();
          }
        },

        async _miwPrefetchKlines(symbols) {
          const now           = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const scanMs        = (this.cfg.scanMins || 15) * 60 * 1000;
          // Seed from shared klines — entries must be for the current completed hour and within 1 scan cycle
          const sharedKlines = this._sharedRead('klines_1h_last');
          const seedCache = {};
          if (sharedKlines?.data) {
            for (const sym of symbols) {
              const e = sharedKlines.data[sym];
              if (e && e.candleStart >= lastHourStart && e.ts && (now - e.ts) < scanMs) seedCache[sym] = e;
            }
          }
          this._miwKlineCache = { ...seedCache };
          const toFetch = symbols.filter(sym => !seedCache[sym]);
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                this._miwKlineCache[sym] = {
                  candleStart: parseInt(candle[0]),
                  open:   parseFloat(candle[1]),
                  high:   parseFloat(candle[2]),
                  low:    parseFloat(candle[3]),
                  close:  parseFloat(candle[4]),
                  volume: parseFloat(candle[5]),
                  ts: now,
                };
              } catch(e) {}
            }));
          }
          // Write newly fetched entries to shared
          const patch = {};
          for (const sym of toFetch) { if (this._miwKlineCache[sym]) patch[sym] = this._miwKlineCache[sym]; }
          if (Object.keys(patch).length) this._sharedMerge('klines_1h_last', patch);
        },

        _miwGetKlineSync(symbol) {
          return this._miwKlineCache?.[symbol] || null;
        },

      });
    },
  };
})();
</script>
