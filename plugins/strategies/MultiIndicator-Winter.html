            const iotM = c.match(/^iot([<>])(\d+)$/);
            if (!iotM) return true;
            return iotM[1] === '>' ? tier >= parseInt(iotM[2], 10) : tier <= parseInt(iotM[2], 10);
          }
          if (/^iom/.test(c)) {
            const oi = parseFloat(t.openInterestValue || 0);
            const mc = mcapMap ? mcapMap[t.symbol] : this._miwGetMcapSync(t.symbol.replace(/USDT$/i, '').toLowerCase(), parseFloat(t.lastPrice || 0));
            if (oi <= 0 || !mc || mc <= 0) return false;
            const step = this.cfg.miwIomStep ?? 1;
            const tier = Math.floor(oi / mc * 100 / step);
            const iomM = c.match(/^iom([<>])(\d+)$/);
            if (!iomM) return true;
            return iomM[1] === '>' ? tier >= parseInt(iomM[2], 10) : tier <= parseInt(iomM[2], 10);
          }
          if (/^(ocs|ocx)/.test(c)) {
            const _ocR = (ocResults || this.pfOcResults || {})[t.symbol]; if (!_ocR) return false;
            const m = c.match(/^(ocs|ocx)([<>])(\d+)$/); if (!m) return true;
            const [, kind, dir, valStr] = m; const val = parseInt(valStr, 10);
            if (kind === 'ocs') {
              const tot = (_ocR.bc||0) + (_ocR.sc||0); if (!tot) return false;
              const buyPct = (_ocR.bc||0) / tot * 100;
              const step = this.cfg.miwOcsStep ?? 1;
              const tier = Math.floor(buyPct / step);
              return dir === '>' ? tier >= val : tier <= val;
            }
            if (kind === 'ocx') {
              if (_ocR.avgMs == null) return false;
              const avgSec = _ocR.avgMs / 1000;
              const step = this.cfg.miwOcxStep ?? 1;
              const tier = Math.floor(avgSec / step);
              return dir === '>' ? tier >= val : tier <= val;
            }
          }
          return false;
        },

        // Co-Qualifying Penalty scoring for one criterion. Base rank is looked up from the
        // ticker's actual annotated tier (e.g. "fund+3" -> "fund+"), matching exactly how the
        // scorecard collapses closes into rank buckets. sliq/bliq/msliq/mbliq sum both depth
        // directions for a base score, since sign there reflects depth intensity, not a
        // "good vs bad" direction reversal. Shared by the scan-time entry pool (runScan) and the
        // live liq-message path (_miwOnLiqMessage).
        _miwScaledRank(rawC, annotC, ranksOverride) {
          const ranks = ranksOverride ?? (this.cfg.pfCoQualPenaltyEnabled ? (this.miwCollapsedSlotRanks || {}) : null);
          if (!ranks) return 0;
          let base;
          if (/^msliq/.test(rawC)) base = (ranks['msliq+'] ?? 0) + (ranks['msliq-'] ?? 0);
          else if (/^mbliq/.test(rawC)) base = (ranks['mbliq+'] ?? 0) + (ranks['mbliq-'] ?? 0);
          else if (/^sliq/.test(rawC)) base = (ranks['sliq+'] ?? 0) + (ranks['sliq-'] ?? 0);
          else if (/^bliq/.test(rawC)) base = (ranks['bliq+'] ?? 0) + (ranks['bliq-'] ?? 0);
          else base = ranks[(annotC || '').replace(/\d+$/, '')] ?? 0;
          if (!base) return 0;
          // Depth = distance past the slot's own gate threshold, in the qualifying direction —
          // NOT raw tier magnitude. For a ">" gate, a higher tier is further past threshold and
          // deeper. For a "<" gate (vm<N, iot<N, iom<N, ocx<N), a LOWER tier is further past
          // threshold and deeper — using raw magnitude there would score a barely-qualifying
          // ticker as "deeper" than one that qualifies strongly, which is backwards.
          const annotM = (annotC || '').match(/([+-]?\d+)$/);
          const tierVal = annotM ? parseInt(annotM[1], 10) : 0;
          const gateM = rawC.match(/([<>])(-?\d+)$/);
          let depth = Math.abs(tierVal);
          if (gateM) {
            const threshold = parseInt(gateM[2], 10);
            depth = gateM[1] === '>' ? Math.max(0, tierVal - threshold) : Math.max(0, threshold - tierVal);
          }
          const depthPct = (this.cfg.pfCoQualDepthPct ?? 10) / 100;
          return base * (1 + depth * depthPct);
        },

        // Live liquidation criterion match — sliq/bliq/msliq/mbliq only, evaluated against a
        // depth value already computed from the live message (see calcLiveDepth / _miwOnLiqMessage).
        // A bare anchor (no depth suffix — always true for Auto Slots, optional for manual) falls
        // back to the general Live Depth Threshold; a manual per-slot suffix overrides it.
        _miwCheckLiveLiqCrit(c, type, depth) {
          const base = c.match(/^(?:m?sliq|m?bliq)/)?.[0];
          if (base !== type) return false;
          const m = c.match(/^(?:m?sliq|m?bliq)([<>])([+-]?\d+)$/);
          if (!m) return depth >= (this.cfg.miwLiveDepthThreshold ?? 1);
          return m[1] === '>' ? depth >= parseInt(m[2], 10) : depth <= parseInt(m[2], 10);
        },

        // Annotation for a live-triggered slot's criteria — sliq/bliq/msliq/mbliq use the live
        // depth just computed from the message (never _liqResults, which is closed-cycle only).
        // Everything else mirrors _miwOpen's cache-based annotation.
        _miwAnnotateLiveCrit(c, t, mcap, liveType, liveDepth, ocResults) {
          if (LIQ_TYPES.some(ty => c.startsWith(ty))) return `${liveType}${liveDepth >= 0 ? '+' : ''}${liveDepth}`;
          if (/^iot/.test(c)) { const oi = parseFloat(t.openInterestValue || 0); const tv = parseFloat(t.turnover24h || 0); const step = this.cfg.miwIotStep ?? 1; return `iot+${tv > 0 ? Math.floor(oi / tv * 100 / step) : 0}`; }
          if (/^iom/.test(c)) { const oi = parseFloat(t.openInterestValue || 0); const mc = mcap || 0; const step = this.cfg.miwIomStep ?? 1; return `iom+${mc > 0 ? Math.floor(oi / mc * 100 / step) : 0}`; }
          if (/^fund/.test(c)) { const step = this.cfg.miwFundStep ?? 0.25; const fr_ = parseFloat(t.fundingRate||0)*100; const tier = Math.floor(fr_/step); return `fund${tier>=0?'+':''}${tier}`; }
          if (/^vm/.test(c)) { const mc = mcap || 0; const tv = parseFloat(t.turnover24h||0); const step = this.cfg.miwVmStep ?? 1; const tier = mc > 0 ? Math.floor(tv/mc*100/step) : 0; return `vm+${tier}`; }
          if (/^(lsa|lba|rasl|rabl)/.test(c)) { const base = c.match(/^(lsa|lba|rasl|rabl)/)[1]; const kl = this._miwGetKlineSync(t.symbol); const avg = parseFloat(t.volume24h||0)/24; const step = this.cfg.miwSpikeStep ?? 1; let tier = 0; if (kl && avg > 0) { const mult = kl.volume/avg; const isAbove = base==='lsa'||base==='lba'; tier = Math.max(0, Math.floor((isAbove?mult-1:1-mult)*100/step)); } return `${base}+${tier}`; }
          if (/^ocs/.test(c)) { const _r = ocResults?.[t.symbol]; const tot = (_r?.bc||0)+(_r?.sc||0); const buyPct = tot ? (_r.bc||0)/tot*100 : 50; const step = this.cfg.miwOcsStep ?? 1; const tier = Math.floor((buyPct-50)/step); return `ocs${tier>=0?'+':''}${tier}`; }
          if (/^ocx/.test(c)) { const _r = ocResults?.[t.symbol]; const step = this.cfg.miwOcxStep ?? 1; const tier = _r?.avgMs!=null ? Math.floor((_r.avgMs/1000)/step) : 0; return `ocx+${tier}`; }
          return c;
        },

        // Live liq-message hook — registered via Permafrost's registerLiqMessageHook. Not
        // scan-gated: fires the instant a message crosses this ticker's slot(s) depth threshold.
        // Only sliq/bliq/msliq/mbliq route through here — 0liq is closed-cycle-only and stays on
        // the regular runScan/checkCrit path. Skipped entirely in Only-0 mode.
        async _miwOnLiqMessage(batch, sym) {
          if (!this.cfg.miwEnabled) return;
          if ((this.cfg.miwLiqPresenceMode ?? '1') === '0') return;
          if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) return;
          if (this._isSymbolBanned?.(sym)) return;
          if (this._miwIsReentryBlocked(sym)) return;
          if (this._miwOpening.has(sym)) return;
          if ((this.positions || []).some(p => p.symbol === sym)) return;

          const sRaw  = batch.sLiqTurnover?.[sym] || 0;
          const bRaw  = batch.bLiqTurnover?.[sym] || 0;
          const total = sRaw + bRaw;
          if (!total) return;
          const sPct = sRaw / total, bPct = bRaw / total;

          let type = null;
          if (sPct >= 0.70) type = 'sliq';
          else if (bPct >= 0.70) type = 'bliq';
          else if (sPct > bPct && bPct >= 0.30) type = 'msliq';
          else if (bPct > sPct && sPct >= 0.30) type = 'mbliq';
          if (!type) return;

          // Tell Ashfall this ticker just produced a live liq event, regardless of whether this
          // bot has a slot to act on it — Ashfall's Only-0 side reacts by graylisting the ticker
          // for 6h (see pfCrossLiqGraylistEnabled). Piggybacks on the existing Cross Broadcast
          // toggle rather than adding a separate one for the sending direction.
          if (this.cfg.permafrostCrossEnabled) this._pfCrossWrite?.('live-liq', sym);

          // Direction-awareness lock — a prior win/loss on this exact liq type for this exact
          // ticker can lock this bot into only that type, or exclude it, for 6h. See
          // _miwOnPositionScored for how the lock gets written.
          if (this.cfg.miwDirLockEnabled) {
            const lock = this._miwDirLock?.[sym];
            if (lock && (Date.now() - lock.ts) < GRAYLIST_TTL_6H) {
              if (lock.mode === 'lock'    && type !== lock.type) return;
              if (lock.mode === 'exclude' && type === lock.type) return;
            }
          }

          // Ashfall winning a 0-Liq trade on this ticker graylists it from this bot's live
          // entries for 6h (symmetric to the self/cross-liq graylists guarding 0-Liq).
          if (this.cfg.pfCrossWinGraylistEnabled) {
            const _winEv = (this._pfCrossRead?.() || []).find(e => e.kind === '0liq-win' && e.source === 'chaser' && e.symbol === sym);
            if (_winEv) {
              if (!this._miwCrossWinGraylist) this._miwCrossWinGraylist = {};
              this._miwCrossWinGraylist[sym] = { ts: _winEv.ts, reason: 'cross-win' };
              return;
            }
          }

          const candidateSlots = this._miwEffectiveSlots().filter(s => {
            const anchor = this._miwSlotLiqAnchor(s);
            return anchor && anchor.startsWith(type);
          });
          if (!candidateSlots.length) return;

          const isSell = type === 'sliq' || type === 'msliq';
          const raw    = isSell ? sRaw : bRaw;
          const avg    = isSell ? (this._liqAvgSTurnover || 0) : (this._liqAvgBTurnover || 0);
          const depth  = calcLiveDepth(raw, avg);

          const t = (this._lastAllTickers || []).find(x => x.symbol === sym);
          if (!t) return;
          const fr      = parseFloat(t.fundingRate || 0) * 100;
          const is24hUp = parseFloat(t.price24hPcnt || 0) > 0;

          this._miwOpening.add(sym);
          try {
            for (let i = 0; i < candidateSlots.length; i++) {
              const slot   = candidateSlots[i];
              const anchor = this._miwSlotLiqAnchor(slot);
              if (!this._miwCheckLiveLiqCrit(anchor, type, depth)) continue;

              const secondary  = slot.filter(c => c !== anchor);
              const needsMcap  = secondary.some(c => /^(vm|iom)/.test(c));
              const needsKline = secondary.some(c => /^(lsa|lba|rasl|rabl)/.test(c));
              const needsOc    = secondary.some(c => /^(ocs|ocx)/.test(c));

              let mcap = null;
              if (needsMcap) {
                const base = sym.replace(/USDT$/i, '').toLowerCase();
                mcap = this._miwGetMcapSync(base, parseFloat(t.lastPrice || 0));
                if (mcap == null) { await this._miwPrefetchMcaps([base]); mcap = this._miwGetMcapSync(base, parseFloat(t.lastPrice || 0)); }
              }
              if (needsKline && !this._miwGetKlineSync(sym)) await this._miwPrefetchKlines([sym]);
              // Reuses this symbol's fresh scan-time OC data if it happens to already be in
              // pfOcResults, but otherwise fetches via the isolated _ocFetchSingle — never
              // _ocFetchBatch, which would replace the whole shared pfOcResults snapshot other
              // tickers' checks still need this cycle, and would flood the OC chart's history
              // with a noisy 1-ticker sample (see _ocFetchSingle's own comment).
              let ocResult = this.pfOcResults?.[sym] ?? null;
              if (needsOc && !ocResult && this.cfg.pfOcEnabled) ocResult = await this._ocFetchSingle?.(sym) ?? null;
              const ocResultsMap = ocResult ? { [sym]: ocResult } : {};

              const ratio   = mcap ? parseFloat(t.turnover24h || 0) / mcap : null;
              const mcapMap = mcap != null ? { [sym]: mcap } : {};
              if (!secondary.every(c => this._miwCheckCrit(c, fr, is24hUp, ratio, t, mcapMap, ocResultsMap))) continue;

              // Matched — annotate and score against this same-type slot subset. Co-Qualifying
              // Penalty against slots anchored on a different liq type or 0liq is moot: only one
              // liq classification can be true for this ticker at this moment, so any such slot
              // would fail its own anchor check anyway.
              const annotCrits = slot.map(c => this._miwAnnotateLiveCrit(c, t, mcap, type, depth, ocResultsMap));
              let compositeScore = 0;
              if (this.cfg.pfCoQualPenaltyEnabled) {
                const bestScore = slot.reduce((s, c, j) => s + this._miwScaledRank(c, annotCrits[j]), 0);
                let penalty = 0;
                for (let k = 0; k < candidateSlots.length; k++) {
                  if (k === i) continue;
                  const other = candidateSlots[k];
                  if (!this._miwCheckLiveLiqCrit(this._miwSlotLiqAnchor(other), type, depth)) continue;
                  const otherSecondary = other.filter(c => c !== this._miwSlotLiqAnchor(other));
                  if (!otherSecondary.every(c => this._miwCheckCrit(c, fr, is24hUp, ratio, t, mcapMap, ocResultsMap))) continue;
                  const otherAnnot = other.map(c => this._miwAnnotateLiveCrit(c, t, mcap, type, depth, ocResultsMap));
                  const sc = other.reduce((s, c, j) => s + this._miwScaledRank(c, otherAnnot[j]), 0);
                  if (sc < 0) penalty += sc;
                }
                compositeScore = bestScore + penalty;
              }

              await this._miwLiveTryOpen(t, slot, annotCrits, compositeScore, type, depth);
              return;
            }
          } finally {
            this._miwOpening.delete(sym);
          }
        },

        async _miwLiveTryOpen(t, criteria, annotCrits, compositeScore, liqType, depth) {
          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.miwShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.miwShareCapPct ?? 100) / 100)));
            const miwCount = (this.positions || []).filter(p => p._miw).length;
            headroom = Math.min(headroom, capSlots - miwCount);
          }
          if (headroom >= 1) return await this._miwLiveOpen(t, criteria, annotCrits, compositeScore, liqType, depth);
          if (!(this.cfg.miwSubstitutionEnabled ?? true)) return false;
          return await this._miwLiveTrySubstitute(t, criteria, annotCrits, compositeScore, liqType, depth);
        },

        // Path-B (live) substitution — same cross-strategy pool as _miwTrySubstitute, but a live
        // candidate can never close a path-A (0-liq, closed-cycle) position: path-A is the
        // higher-conviction read, per Protect Path-A. Path-A's own substitution has no such
        // restriction since it's always the superior side. Still score-gated, same margin check
        // as the scan-time version — clearing the depth threshold alone isn't sufficient.
        async _miwLiveTrySubstitute(t, criteria, annotCrits, compositeScore, liqType, depth) {
          const now            = Date.now();
          const minAgeMs       = (this.cfg.miwSubstitutionMinAgeMins ?? 10) * 60000;
          const protectWinners = this.cfg.miwSubstitutionProtectWinners ?? true;
          const protectPathA   = this.cfg.miwSubstitutionProtectPathA ?? true;
          const baseMargin     = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const marginThreshold = baseMargin * ((this.cfg.miwSubstitutionMarginPct ?? 5) / 100);

          const eligible = (this.positions || []).filter(p => {
            if (protectPathA && p._miwPathA) return false;
            if ((now - (p.openedAt || 0)) < minAgeMs) return false;
            if (protectWinners && (p.upnl || 0) > 0) return false;
            return true;
          });
          if (!eligible.length) return false;

          const scoreOf = p => p._miw ? (p._miwCompositeScore ?? 0) : -Infinity;
          eligible.sort((a, b) => scoreOf(a) - scoreOf(b));
          const worst      = eligible[0];
          const worstScore = scoreOf(worst);
          if ((compositeScore - worstScore) < marginThreshold) return false;

          this.log(`[MIW] 🔁 Live Substitution — closing ${worst.symbol} (score ${worstScore === -Infinity ? 'n/a' : worstScore.toFixed(4)}) for ${t.symbol} (score ${compositeScore.toFixed(4)}), Δ${(compositeScore - worstScore).toFixed(4)} ≥ ${marginThreshold.toFixed(4)} margin`, 'info');
          await this.pseudoClosePosition(worst, 'substitution');
          return await this._miwLiveOpen(t, criteria, annotCrits, compositeScore, liqType, depth);
        },

        async _miwLiveOpen(t, criteria, annotCrits, compositeScore, liqType, depth) {
          const sym = t.symbol;
          let price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          try {
            const r  = await fetch(`${this.base}/v5/market/tickers?category=linear&symbol=${sym}`);
            const d  = await r.json();
            const lp = parseFloat(d?.result?.list?.[0]?.lastPrice);
            if (lp > 0) price = lp;
          } catch(e) {}
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const lenBefore = (this.positions || []).length;
          await this.pseudoOpenShort({ symbol: sym, price, change, fundingRate: fr, _miw: true });
          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._miw = true;
            pos._miwPathA = false; // live/reactive entry — see Substitution's path precedence
            pos._miwSlotIdx = 0;
            pos._miwCompositeScore = compositeScore ?? 0;
            pos._miwLiqType = liqType;
            pos._miwLiqDepth = depth;
            pos._miwCriteria = annotCrits;
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        _miwGetFreshMcap(base, price, maxAge = 3_600_000) {
          const now = Date.now();
          const ok = src => !price || !src || Math.abs(src - price) / price <= 0.10;
          const cgId = this._miwCoinIdCache?.[base];
          if (cgId) {
            const c = this._miwMcapCache?.[cgId];
            if (c?.mcap && (now - (c.ts || 0)) <= maxAge && ok(c.cgPrice)) return c.mcap;
          }
          const cpId = this._miwCpIdCache?.[base];
          if (cpId) {
            const c = this._miwSupplyCache?.[cpId];
            if (c?.supply && price > 0 && (now - (c.ts || 0)) <= maxAge && ok(c.cpPrice)) return c.supply * price;
          }
          const ds = this._miwDsCache?.[base];
          if (ds?.mcap && (now - (ds.ts || 0)) <= maxAge && ok(ds.dsPrice)) return ds.mcap;
          return null;
        },

        // The liq criterion a slot is anchored on, or null if the slot has none (never matches —
        // liquidation is mandatory). sliq/bliq/msliq/mbliq are the live-only anchors; 0liq is the
        // closed-cycle-only anchor. A slot is expected to carry at most one of these.
        _miwSlotLiqAnchor(slot) {
          return (slot || []).find(c => LIQ_TYPES.some(t => c.startsWith(t)) || c === '0liq') || null;
        },

        // true if this liq anchor is allowed under the current Liquidation Presence mode.
        _miwAnchorAllowed(anchorCrit) {
          const mode = this.cfg.miwLiqPresenceMode ?? '1';
          if (mode === 'both') return true;
          const isLive = LIQ_TYPES.some(t => anchorCrit.startsWith(t));
          return mode === '1' ? isLive : !isLive;
        },

        // Reads the same shared graylist the host writes on every close (any strategy, keyed by
        // symbol) — a symbol stays blocked for one bulk-ticker cooldown window after its position
        // closes. 'both' (default) blocks regardless of win/loss; 'losers' lets a symbol that
        // just closed in profit re-trigger immediately. Ported from Liquid-Diver.
        _miwIsReentryBlocked(sym) {
          const g = this._tickerGraylist?.[sym];
          if (!g || !(g.ts > 0)) return false;
          const ttl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3600000;
          if (Date.now() - g.ts >= ttl) return false;
          if ((this.cfg.miwReentryBlockMode ?? 'both') === 'losers') return g.isWin === false;
          return true;
        },

        // Registered via Permafrost's registerLiqCloseHook — fires once per closed liq batch with
        // every surveilled symbol's final turnover, qualifying or not. A ticker with ANY recorded
        // liquidation (even one that never crossed the qualifying % threshold) gets graylisted for
        // 6h so a stale 0liq read (last-batch-only, see _miwCheckCrit's '0liq' branch) can't treat
        // a ticker that liquidated a couple hours ago as newly "calm" just because its latest
        // batch happened to close clean.
        _miwOnLiqClose(results, batch) {
          if (!this.cfg.miwSelfLiqGraylistEnabled) return;
          if (!this._miwSlotGraylist) this._miwSlotGraylist = {};
          const now = Date.now();
          for (const r of (results || [])) {
            if ((r.sLiqRaw || 0) + (r.bLiqRaw || 0) > 0) {
              this._miwSlotGraylist[r.sym] = { ts: now, reason: 'self-liq' };
            }
          }
        },

        _miwIsSlotGraylisted(sym) {
          const g = this._miwSlotGraylist?.[sym];
          if (!g || !(g.ts > 0)) return false;
          return (Date.now() - g.ts) < GRAYLIST_TTL_6H;
        },

        // Called from Permafrost's pseudoClosePosition with the closed position's symbol,
        // criteria, and realized PnL. If the criteria include a live liq type (sliq/bliq/msliq/
        // mbliq), locks or excludes that exact type for that exact ticker for 6h — default: a
        // win locks this bot into repeating only that type, a loss excludes it. miwDirLockInvert
        // flips both: a win excludes the type (don't repeat a move already spent), a loss locks
        // into it (bet the losing read was actually right). Breakeven (pnl === 0) is a no-op.
        _miwOnPositionScored(symbol, criteria, pnl) {
          if (!this.cfg.miwDirLockEnabled) return;
          if (typeof pnl !== 'number' || pnl === 0) return;
          const m = (criteria || []).map(c => c.match(/^(m?sliq|m?bliq)(?:[+-]\d+)?$/)).find(Boolean);
          if (!m) return;
          const type   = m[1];
          const isWin  = pnl > 0;
          const invert = !!this.cfg.miwDirLockInvert;
          const mode   = (isWin !== invert) ? 'lock' : 'exclude';
          if (!this._miwDirLock) this._miwDirLock = {};
          this._miwDirLock[symbol] = { type, mode, ts: Date.now(), isWin };
        },

        // Merges all four ticker-exclusion mechanisms into one row per ticker: Self-Liq
        // Graylist, react-to-partner-live-liq, react-to-partner-0-liq-win, and Direction Lock.
        // Each is otherwise invisible on its own (only Direction Lock previously had a panel),
        // even though all four answer the same question — "why isn't this ticker eligible?" —
        // and a ticker can be caught by more than one at once. "Until" is the latest of the
        // ticker's active reasons, since the ticker stays constrained until all of them clear.
        _miwCombinedLockRows() {
          const now = Date.now();
          const bySym = {};
          const add = (sym, text, mode, ts) => {
            if (!bySym[sym]) bySym[sym] = { sym, reasons: [], maxTs: 0 };
            bySym[sym].reasons.push({ text, mode });
            if (ts > bySym[sym].maxTs) bySym[sym].maxTs = ts;
          };
          if (this.cfg.miwSelfLiqGraylistEnabled) {
            for (const [sym, g] of Object.entries(this._miwSlotGraylist || {})) {
              if ((now - g.ts) < GRAYLIST_TTL_6H) add(sym, 'Self-Liq', 'exclude', g.ts);
            }
          }
          if (this.cfg.pfCrossLiqGraylistEnabled) {
            for (const [sym, g] of Object.entries(this._miwCrossLiqGraylist || {})) {
              if ((now - g.ts) < GRAYLIST_TTL_6H) add(sym, 'Partner Live-Liq', 'exclude', g.ts);
            }
          }
          if (this.cfg.pfCrossWinGraylistEnabled) {
            for (const [sym, g] of Object.entries(this._miwCrossWinGraylist || {})) {
              if ((now - g.ts) < GRAYLIST_TTL_6H) add(sym, 'Partner 0-Liq Win', 'exclude', g.ts);
            }
          }
          if (this.cfg.miwDirLockEnabled) {
            const labelOf = { sliq: 'S-Liq', bliq: 'B-Liq', msliq: 'mS-Liq', mbliq: 'mB-Liq' };
            for (const [sym, l] of Object.entries(this._miwDirLock || {})) {
              if ((now - l.ts) < GRAYLIST_TTL_6H) add(sym, labelOf[l.type] || l.type, l.mode, l.ts);
            }
          }
          return Object.values(bySym).map(r => {
            const exp = new Date(r.maxTs + GRAYLIST_TTL_6H);
            return { sym: r.sym, reasons: r.reasons, until: exp.getHours().toString().padStart(2,'0')+':'+exp.getMinutes().toString().padStart(2,'0') };
          }).sort((a, b) => a.sym.localeCompare(b.sym));
        },

        // Auto-generated combos always anchor on exactly one liq criterion (filtered by presence
        // mode) plus (size - 1) secondary criteria — at size 1 a combo is bare liquidation with no
        // secondary confirmation at all. This is the structural version of "liquidation is
        // mandatory": there is no way to auto-generate a slot without one.
        _miwGenerateCombos(size) {
          const exclude = new Set(this.cfg.miwAutoSlotExclude || []);
          const mode = this.cfg.miwLiqPresenceMode ?? '1';
          const anchors = ['sliq','bliq','msliq','mbliq','0liq'].filter(c => !exclude.has(c) && (
            mode === 'both' ? true : mode === '0' ? c === '0liq' : c !== '0liq'
          ));
          const secondary = ['fund','+24h','-24h','vm','lsa','lba','rasl','rabl','iot','iom','ocs','ocx'].filter(c => !exclude.has(c));
          const need = Math.max(0, size - 1);
          const secCombos = [];
          const pick = (start, current) => {
            if (current.length === need) { secCombos.push([...current]); return; }
            for (let i = start; i < secondary.length; i++) {
              current.push(secondary[i]);
              pick(i + 1, current);
              current.pop();
            }
          };
          pick(0, []);
          const result = [];
          for (const anchor of anchors) {
            if (need === 0) { result.push([anchor]); continue; }
            for (const combo of secCombos) result.push([anchor, ...combo]);
          }
          return result;
        },

        _miwEffectiveSlots() {
          const raw = this.cfg.miwAutoSlots
            ? this._miwGenerateCombos(this.cfg.miwAutoSlotSize ?? 3)
            : (this.cfg.miwSlots || []).filter(s => s.length > 0);
          // Liquidation is mandatory — drop any slot with no liq anchor, or whose anchor isn't
          // allowed under the current Liquidation Presence mode (e.g. a saved manual slot built
          // before this restructure, or a 0liq slot while mode is 'Only 1').
          const filtered = raw.filter(s => {
            const anchor = this._miwSlotLiqAnchor(s);
            return !!anchor && this._miwAnchorAllowed(anchor);
          });
          const ranks = this.miwCollapsedSlotRanks || {};
          if (!Object.keys(ranks).length) return filtered;
          // Collapsed rank keys are sign-suffixed (e.g. 'ocx+', 'fund-') per collapseCrit();
          // bare criterion names never accumulate rank on their own, so every tiered
          // criterion — not just sliq/bliq — needs both sign variants summed.
          const getRank = c => {
            if (c === '+24h' || c === '-24h') return ranks[c] ?? 0;
            return (ranks[c] ?? 0) + (ranks[c + '+'] ?? 0) + (ranks[c + '-'] ?? 0);
          };
          return filtered.slice().sort((a, b) => {
            const sa = a.reduce((s, c) => s + getRank(c), 0);
            const sb = b.reduce((s, c) => s + getRank(c), 0);
            return sb - sa;
          });
        },

        // In Only-1, the scan-time criteria checker has no branch for sliq/bliq/msliq/mbliq
        // (they're live-only now — see _miwCheckCrit), so the candidate list this feature logs
        // targets from can never contain a live-anchored slot match. During normal operation
        // that's fine, real trades already write the scorecard for every live match that
        // fires. The one time it's actually useful in Only-1 is during Drawdown Halt or Gains
        // Lock, when real entries are blocked and this is the only thing still feeding the
        // scorecard. Only-0 and Both aren't affected — their slots are 0-Liq-anchored, which
        // this checker does still resolve, so logging stays active same as before.
        _miwHistScoringActive() {
          if (!this.cfg.miwHistScoringEnabled) return false;
          if ((this.cfg.miwLiqPresenceMode ?? '1') !== '1') return true;
          return !!(this._isDrawdownHalted?.() || this._isGainsLocked?.());
        },

        _miwLogHistMatches(pool) {
          if (!this._miwHistScoringActive() || !pool.length) return;
          const now = Date.now();
          const toleranceMs = (this.cfg.miwHistToleranceMins ?? 20) * 60 * 1000;
          const targetHourStart = Math.ceil((now + toleranceMs) / 3_600_000) * 3_600_000;
          for (const entry of pool) {
            if ((this.positions || []).some(p => p._miw && p.symbol === entry.t.symbol)) continue;
            const dedupeKey = `${entry.t.symbol}:${entry.annotKey}:${targetHourStart}`;
            if (!this._miwHistPending[dedupeKey]) {
              this._miwHistPending[dedupeKey] = {
                symbol: entry.t.symbol,
                annotCrits: entry.annotCrits,
                targetHourStart,
              };
            }
          }
        },

        async _miwSequestrFetch() {
          if (!this._miwHistScoringActive()) return;
          const cap = this.cfg.miwKlineScanCap ?? 20;
          const budget = Math.floor(cap * ((this.cfg.miwHistSequestrPct ?? 50) / 100));
          if (!budget) { this._miwSequestrUsed = 0; return; }
          const now = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const seen = new Set();
          const syms = [];
          for (const entry of Object.values(this._miwHistPending)) {
            if (entry.targetHourStart !== lastHourStart) continue;
            if (now < entry.targetHourStart + 3_600_000) continue;
            if (!seen.has(entry.symbol)) { seen.add(entry.symbol); syms.push(entry.symbol); }
            if (syms.length >= budget) break;
          }
          this._miwSequestrUsed = syms.length;
          if (!syms.length) return;
          await this._miwPrefetchKlines(syms);
        },

        async _miwProcessHistMatches() {
          if (!this.cfg.miwHistScoringEnabled) return;
          const now = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const MAX_AGE_MS = 24 * 3_600_000;
          const toProcess = [];
          for (const [key, entry] of Object.entries(this._miwHistPending)) {
            if (now - entry.targetHourStart > MAX_AGE_MS) { delete this._miwHistPending[key]; continue; }
            if (now >= entry.targetHourStart + 3_600_000) toProcess.push({ key, entry });
          }
          if (!toProcess.length) return;

          this._miwHistBatchId = (this._miwHistBatchId % 99) + 1;
          const _batchId = this._miwHistBatchId;
          const _uniqueSyms = [...new Set(toProcess.map(x => x.entry.symbol))];
          this.log(`[MIW] 📊 Hist-score batch #${_batchId} begun — ${toProcess.length} entr${toProcess.length === 1 ? 'y' : 'ies'} across ${_uniqueSyms.length} symbol${_uniqueSyms.length === 1 ? '' : 's'}`, 'info');

          const tpPct  = (this.cfg.binaryTpPct ?? 18) / 100;
          const slPct  = (this.cfg.binarySlPct ?? 18) / 100;
          const lev    = this.cfg.leverage ?? 6;
          const margin = (this.cfg.minNotional ?? 6) / lev;
          let wrote = 0, wins = 0, losses = 0, netPnl = 0;

          // MIW = SHORT: TP when price falls, SL when price rises
          const _resolve = (open, high, low, close) => {
            const hitTp = low  <= open * (1 - tpPct / lev);
            const hitSl = high >= open * (1 + slPct / lev);
            if (hitTp && hitSl) return -margin * slPct;
            if (hitTp)          return  margin * tpPct;
            if (hitSl)          return -margin * slPct;
            return margin * (open - close) / open * lev;
          };

          // Cache-first: resolve entries targeting the most recently completed candle without a fetch
          const toFetch = [];
          for (const x of toProcess) {
            if (x.entry.targetHourStart === lastHourStart) {
              const cached = this._miwKlineCache?.[x.entry.symbol];
              if (cached?.candleStart === lastHourStart) {
                const _pnl0 = _resolve(cached.open, cached.high, cached.low, cached.close);
                this._pfScoreWrite?.(x.entry.annotCrits, _pnl0, true);
                netPnl += _pnl0; if (_pnl0 > 0) wins++; else losses++;
                delete this._miwHistPending[x.key];
                wrote++;
                continue;
              }
            }
            toFetch.push(x);
          }

          if (toFetch.length) {
            const bySymbol = {};
            for (const x of toFetch) {
              if (!bySymbol[x.entry.symbol]) bySymbol[x.entry.symbol] = [];
              bySymbol[x.entry.symbol].push(x);
            }
            const CONC = 5;
            const symbols = Object.keys(bySymbol);
            for (let i = 0; i < symbols.length; i += CONC) {
              await Promise.all(symbols.slice(i, i + CONC).map(async sym => {
                const entries = bySymbol[sym];
                const oldestTs  = Math.min(...entries.map(x => x.entry.targetHourStart));
                const hoursBack = Math.min(Math.ceil((now - oldestTs) / 3_600_000) + 2, 200);
                try {
                  const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=${hoursBack}`);
                  if (!r.ok) return;
                  const d = await r.json();
                  const list = d?.result?.list;
                  if (!list) return;
                  const candleMap = {};
                  for (const c of list) candleMap[parseInt(c[0])] = c;
                  for (const { key, entry } of entries) {
                    const c = candleMap[entry.targetHourStart];
                    if (!c) { delete this._miwHistPending[key]; continue; }
                    const _pnl1 = _resolve(parseFloat(c[1]), parseFloat(c[2]), parseFloat(c[3]), parseFloat(c[4]));
                    this._pfScoreWrite?.(entry.annotCrits, _pnl1, true);
                    netPnl += _pnl1; if (_pnl1 > 0) wins++; else losses++;
                    delete this._miwHistPending[key];
                    wrote++;
                  }
                } catch(_) {}
              }));
            }
          }

          this.log(`[MIW] 📊 Hist-score batch #${_batchId} done — ${wrote} written`, 'info');
          if (wrote) {
            this._pfScoreBuild?.();
            if (!this.miwHistBatches) this.miwHistBatches = [];
            this.miwHistBatches.push({ id: _batchId, ts: now, wrote, total: toProcess.length, wins, losses, netPnl });
            if (this.miwHistBatches.length > 25) this.miwHistBatches.splice(0, this.miwHistBatches.length - 25);
            this.persist?.();
          }
        },

        async _miwPrefetchKlines(symbols) {
          const now           = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const scanMs        = (this.cfg.scanMins || 15) * 60 * 1000;
          // Seed from shared klines — entries must be for the current completed hour and within 1 scan cycle
          const sharedKlines = this._sharedRead('klines_1h_last');
          const seedCache = {};
          if (sharedKlines?.data) {
            for (const sym of symbols) {
              const e = sharedKlines.data[sym];
              if (e && e.candleStart >= lastHourStart && e.ts && (now - e.ts) < scanMs) seedCache[sym] = e;
            }
          }
          this._miwKlineCache = { ...seedCache };
          const toFetch = symbols.filter(sym => !seedCache[sym]);
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                this._miwKlineCache[sym] = {
                  candleStart: parseInt(candle[0]),
                  open:   parseFloat(candle[1]),
                  high:   parseFloat(candle[2]),
                  low:    parseFloat(candle[3]),
                  close:  parseFloat(candle[4]),
                  volume: parseFloat(candle[5]),
                  ts: now,
                };
              } catch(e) {}
            }));
          }
          // Write newly fetched entries to shared
          const patch = {};
          for (const sym of toFetch) { if (this._miwKlineCache[sym]) patch[sym] = this._miwKlineCache[sym]; }
          if (Object.keys(patch).length) this._sharedMerge('klines_1h_last', patch);
        },

        _miwGetKlineSync(symbol) {
          return this._miwKlineCache?.[symbol] || null;
        },

      });
    },
  };
})();
</script>
