<!--
  Multi-Indicator Strategy Plugin for PseudoWinter
  Slot-based entry filter combining fund rate, 24hr price direction, and vol/mcap signals.

  Each "slot" is an AND-condition over any combination of six criteria:
    +fund  — funding rate ≥ threshold (longs paying shorts)
    -fund  — funding rate ≤ −threshold (shorts paying longs)
    +24h   — ticker's 24hr price change is positive
    -24h   — ticker's 24hr price change is negative
    >10%   — 24hr turnover exceeds 10% of market cap (high participation)
    <10%   — 24hr turnover is below 10% of market cap (low relative participation)

  A ticker qualifies for entry if it satisfies ALL criteria in ANY slot. Slots that contain
  a vol/mcap criterion trigger a CoinGecko market cap lookup via the shared window.__cgCoinList
  cache; fund and 24h criteria run entirely from the host's bulk ticker cache.

  Entry pool fires once per fresh bulk ticker fetch (_lastAllTickersAt) — will not re-scan
  the same cached snapshot twice. TP, SL, and all exit logic use the host's settings.
  Drawdown throttle and gains lock gate all entries.

  Load via Plugin Manager in PseudoWinter's config panel.
  Load AFTER EverWinter if using live trading — see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const VERSION       = '1.9.0';
  const DEFAULT_SLOTS = [['+fund','+24h','>10pct'],['-fund','-24h','<10pct']];

  // Per-criterion emoji for position badges. Fund emoji is app-relative:
  // +fund = longs paying = good carry for shorts (🤑), bad for longs (💸).
  // -fund = shorts paying = bad for shorts (💸), good for longs (🤑).
  const CRIT_EMOJI = { '+fund': '🤑', '-fund': '💸', '+24h': '⬆️', '-24h': '⬇️', '>10pct': '🔊', '<10pct': '🔉', 'lsa': '🟥', 'lba': '🟩', 'rasl': '🔴', 'rabl': '🟢', 'sliq': '🥵', 'bliq': '🥶' };
  const CRIT_DESC  = { '+fund': '+fund (longs paying)', '-fund': '-fund (shorts paying)', '+24h': '+24h (up on day)', '-24h': '-24h (down on day)', '>10pct': '>10% vol/mcap', '<10pct': '<10% vol/mcap', 'lsa': 'LSA (1h sell spike)', 'lba': 'LBA (1h buy spike)', 'rasl': 'R-ASL (1h low-vol red)', 'rabl': 'R-ABL (1h low-vol green)', 'sliq': 'S-Liq (Sell-Liquidation: short positions liquidated ≥ threshold)', 'bliq': 'B-Liq (Buy-Liquidation: long positions liquidated ≥ threshold)' };

  window.__BotPlugin = {
    id:        'multiindicator-winter',
    name:      'Multi-Indicator (Winter)',
    version:   VERSION,
    targetBot: 'pseudowinter',
    after:     ['everwinter', 'permafrost-winter'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'runScan'],

    css: `
      .miw-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .miw-slot { display:inline-flex; flex-direction:column; align-items:center; gap:3px; padding:6px 5px; border-radius:3px; border:1px solid; cursor:pointer; min-width:52px; font-size:9px; font-family:var(--mono); text-align:center; transition:border-color .15s,background .15s; }
      .miw-crit { font-size:8px; padding:1px 4px; border-radius:2px; background:rgba(96,210,255,.12); border:1px solid rgba(96,210,255,.3); color:var(--ice); white-space:nowrap; }
      .miw-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
      .miw-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .miw-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .miw-tab.on { border-color:rgba(96,210,255,.6); color:var(--ice); background:rgba(96,210,255,.08); }
      .miw-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .miw-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.miwEnabled"> + Multi</span>`,
      'strategy-accordions': `
        <div x-data="{ open: false, tE: false, tX: false, tF: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Multi-Indicator</span>
              <span x-show="cfg.miwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.miwEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.miwEnabled=!cfg.miwEnabled;persist()}">
              <div class="tog-t" :class="cfg.miwEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Multi-Indicator Mode</div>
                <div class="miw-hint">Shorts tickers matching any active entry slot; fires once per bulk ticker fetch using host TP/SL settings.</div>
              </div>
            </label>
            <div x-show="cfg.miwEnabled" style="margin-top:8px">
              <div class="miw-tabs">
                <button class="miw-tab" :class="tE?'on':''" @click="tE=!tE">ENTRY</button>
                <button class="miw-tab" :class="tX?'on':''" @click="tX=!tX">EXIT</button>
                <button class="miw-tab" :class="tF?'on':''" @click="tF=!tF">FADE</button>
              </div>

              <!-- Entry Zone -->
              <div class="miw-zone" x-show="tE">
                <!-- Entry Slots -->
                <div>
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                    <div class="lbl" style="margin-bottom:0">Entry Slots</div>
                    <label class="tog" style="font-size:9px" @click="if(!cfgLocked){cfg.miwAutoSlots=!cfg.miwAutoSlots;persist()}">
                      <div class="tog-t" :class="cfg.miwAutoSlots?'on':''"><div class="tog-k"></div></div>
                      <span class="tog-l">Auto</span>
                    </label>
                  </div>

                  <!-- Auto slots controls -->
                  <div x-show="cfg.miwAutoSlots" style="margin-bottom:8px;padding:6px 8px;background:rgba(96,210,255,.04);border:1px solid rgba(96,210,255,.12);border-radius:3px">
                    <div class="lbl">Criteria per Slot <b x-text="cfg.miwAutoSlotSize??2"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'— '+(()=>{const n=cfg.miwAutoSlotSize??2,k=12;let r=1;for(let i=0;i<n;i++)r=r*(k-i)/(i+1);return Math.round(r)})()+' slots'"></span></div>
                    <input type="range" min="1" max="5" step="1" x-model.number="cfg.miwAutoSlotSize" @change="persist()">
                    <div class="miw-hint">Generates all combinations of the 12 criteria taken N at a time. Manual slots are preserved and restored when Auto is off.</div>
                    <div x-show="Object.keys(miwBlockedSlots||{}).length" class="miw-hint" style="margin-top:3px" x-text="Object.values(miwBlockedSlots||{}).filter(v=>v==='blocked').length+' slot(s) blocked — matched tickers graylisted for '+(cfg.miwBlockedSlotCooldownHours??6)+'h'"></div>
                  </div>

                  <!-- Manual slot builder — hidden when Auto is on -->
                  <div x-show="!cfg.miwAutoSlots">
                    <div class="miw-hint" style="margin-bottom:6px;color:var(--text-lo)">(click slot to edit · click criteria to toggle)</div>

                    <!-- Criteria picker — visible when a slot is selected -->
                    <div x-show="cfg.miwActiveSlot !== null && cfg.miwActiveSlot !== undefined && cfg.miwActiveSlot < (cfg.miwSlots||[]).length"
                         style="display:flex;gap:3px;flex-wrap:wrap;align-items:center;margin-bottom:7px;padding:6px 7px;background:rgba(255,255,255,.04);border-radius:3px;border:1px solid rgba(255,255,255,.08)">
                      <span style="font-size:9px;color:var(--text-lo);margin-right:2px">Slot <span x-text="(cfg.miwActiveSlot??0)+1"></span>:</span>
                      <template x-for="c in ['+fund','-fund','+24h','-24h','>10pct','<10pct','lsa','lba','rasl','rabl','sliq','bliq']" :key="c">
                        <button class="miw-opt"
                          @click.prevent="if(!cfgLocked) _miwToggle(cfg.miwActiveSlot, c)"
                          :style="(cfg.miwSlots?.[cfg.miwActiveSlot]||[]).includes(c) ? 'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)' : 'border-color:var(--border);color:var(--text-lo);background:transparent'"
                          x-text="c.replace('>10pct','>10%').replace('<10pct','<10%').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL').replace('sliq','S-Liq').replace('bliq','B-Liq')">
                        </button>
                      </template>
                    </div>

                    <!-- Slot blocks -->
                    <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:flex-start">
                      <template x-for="(slot, i) in (cfg.miwSlots||[])" :key="i">
                        <div class="miw-slot"
                          @click.prevent="if(!cfgLocked){cfg.miwActiveSlot=(cfg.miwActiveSlot===i?null:i);persist()}"
                          :style="(()=>{ const bs=miwBlockedSlots[[...slot].sort().join(',')]; return bs==='blocked'?'border-color:rgba(255,80,80,.7);background:rgba(255,80,80,.07)':cfg.miwActiveSlot===i?'border-color:rgba(96,210,255,.7);background:rgba(96,210,255,.07)':'border-color:var(--border);background:transparent'; })()">
                          <div style="font-size:8px;color:var(--text-lo)">Slot <span x-text="i+1"></span></div>
                          <div style="display:flex;flex-direction:column;gap:2px;min-height:14px">
                            <template x-for="c in slot" :key="c">
                              <span class="miw-crit" x-text="c.replace('>10pct','>10%').replace('<10pct','<10%').replace('lsa','LSA').replace('lba','LBA').replace('rasl','R-ASL').replace('rabl','R-ABL').replace('sliq','S-Liq').replace('bliq','B-Liq')"></span>
                            </template>
                            <span x-show="!slot.length" style="font-size:8px;color:var(--text-lo);font-style:italic">empty</span>
                          </div>
                          <div x-show="miwBlockedSlots[[...slot].sort().join(',')]==='blocked'" style="font-size:7px;color:rgba(255,80,80,.7);margin-top:2px;line-height:1.2">⛔ blocked</div>
                          <button x-show="!cfgLocked"
                            @click.stop.prevent="_miwDelSlot(i)"
                            style="font-size:8px;color:var(--text-lo);background:none;border:none;cursor:pointer;padding:0;margin-top:2px;line-height:1;opacity:.7">✕</button>
                        </div>
                      </template>
                      <button x-show="!cfgLocked"
                        @click.prevent="_miwAddSlot()"
                        style="align-self:center;padding:8px 10px;font-size:12px;background:rgba(96,210,255,.06);border:1px dashed rgba(96,210,255,.3);border-radius:3px;color:var(--ice);cursor:pointer">+</button>
                    </div>
                    <div class="miw-hint" style="margin-top:5px">Each slot is an AND-gate — a ticker must meet every criterion in the slot. Any matching slot qualifies the ticker for entry. Vol/mcap criteria pull market cap from CoinGecko (1h cache). LSA/LBA/R-ASL/R-ABL fetch the last completed 1h kline per ticker.</div>
                    <div class="miw-hint" style="margin-top:5px;line-height:1.8">Badge key: 🤑 +fund · 💸 -fund · ⬆️ +24h · ⬇️ -24h · 🔊 &gt;10% vol/mcap · 🔉 &lt;10% vol/mcap · 🟥 LSA · 🟩 LBA · 🔴 R-ASL · 🟢 R-ABL · 🥵 S-Liq · 🥶 B-Liq</div>
                  </div><!-- end manual builder -->
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">Kline Scan Cap <b x-text="(cfg.miwKlineScanCap??50)"></b> tickers</div>
                    <input type="range" min="10" max="500" step="10" x-model.number="cfg.miwKlineScanCap" @change="persist()">
                    <div class="miw-hint">Random sample of tickers checked for kline criteria per cycle.</div>
                  </div>
                  <div class="g" style="margin-top:8px">
                    <div class="lbl">Blocked Slot Cooldown <b x-text="(cfg.miwBlockedSlotCooldownHours??6)+'h'"></b></div>
                    <input type="number" class="inp" min="0.5" max="48" step="0.5" x-model.number="cfg.miwBlockedSlotCooldownHours" @change="persist()" style="width:70px">
                    <div class="miw-hint">Tickers matching a blocked slot are graylisted for this duration.</div>
                  </div>
                </div><!-- end entry slots section -->
              </div><!-- end entry zone -->

              <!-- Exit Zone -->
              <div class="miw-zone" x-show="tX">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.miwCascadeEnabled=!cfg.miwCascadeEnabled;persist()}">
                  <div class="tog-t" :class="cfg.miwCascadeEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Cascade Exit</div>
                    <div class="miw-hint">Bails all MIW positions when their collective unrealized profit reaches a % of total base margin.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.miwCascadeEnabled" style="margin-top:8px">
                  <div class="lbl">Trigger at <b x-text="(cfg.miwCascadePct??25)+'% of base margin'"></b></div>
                  <input type="range" min="5" max="200" step="5" x-model.number="cfg.miwCascadePct" @change="persist()">
                  <div class="miw-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._miw); const margin=pos.reduce((s,p)=>s+(p.margin||0),0); const upnl=pos.reduce((s,p)=>s+(p.upnl||0),0); const avg=pos.length?margin/pos.length:0; const halvMul=cfg.miwHalvingEnabled&&pos.length?Math.pow(0.5,(Date.now()-pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()))/((cfg.miwHalvingHours??3)*3600000)):1; const thr=avg*((cfg.miwCascadePct??25)/100)*halvMul; return pos.length ? 'Active: '+pos.length+' pos · avg margin '+avg.toFixed(4)+' · uPnL '+(upnl>=0?'+':'')+upnl.toFixed(4)+' · trigger @ +'+(thr).toFixed(4)+(halvMul<0.999?' (×'+halvMul.toFixed(2)+')':'')+' USDT' : 'No active MIW positions.'; })()"></div>
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.miwSacrificeEnabled=!cfg.miwSacrificeEnabled;persist()}">
                  <div class="tog-t" :class="cfg.miwSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Sacrifice Exit</div>
                    <div class="miw-hint">Bails all MIW positions when their collective unrealized loss reaches a % of avg base margin.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.miwSacrificeEnabled" style="margin-top:8px">
                  <div class="lbl">Trigger at <b x-text="'-'+(cfg.miwSacrificePct??25)+'% of base margin'"></b></div>
                  <input type="range" min="5" max="200" step="5" x-model.number="cfg.miwSacrificePct" @change="persist()">
                  <div class="miw-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._miw); const margin=pos.reduce((s,p)=>s+(p.margin||0),0); const upnl=pos.reduce((s,p)=>s+(p.upnl||0),0); const avg=pos.length?margin/pos.length:0; const halvMul=cfg.miwHalvingEnabled&&pos.length?Math.pow(0.5,(Date.now()-pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()))/((cfg.miwHalvingHours??3)*3600000)):1; const thr=avg*((cfg.miwSacrificePct??25)/100)*halvMul; return pos.length ? 'Active: '+pos.length+' pos · avg margin '+avg.toFixed(4)+' · uPnL '+(upnl>=0?'+':'')+upnl.toFixed(4)+' · trigger @ -'+(thr).toFixed(4)+(halvMul<0.999?' (×'+halvMul.toFixed(2)+')':'')+' USDT' : 'No active MIW positions.'; })()"></div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.miwRollingSacrificeEnabled=!cfg.miwRollingSacrificeEnabled;persist()}">
                    <div class="tog-t" :class="cfg.miwRollingSacrificeEnabled?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Rolling Window</div>
                      <div class="miw-hint">On trigger: close oldest position only instead of bailing all.</div>
                    </div>
                  </label>
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.miwHalvingEnabled=!cfg.miwHalvingEnabled;persist()}">
                  <div class="tog-t" :class="cfg.miwHalvingEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Target Halving</div>
                    <div class="miw-hint">Halves the cascade/sacrifice trigger threshold once per interval, based on the age of the oldest MIW position — the longer they're held, the easier the collective exit fires.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.miwHalvingEnabled" style="margin-top:8px">
                  <div class="lbl">Halving Interval <b x-text="(h=>(h<1?Math.round(h*60)+'m':h%1===0?h+'h':Math.floor(h)+'h '+Math.round((h%1)*60)+'m'))(cfg.miwHalvingHours??3)"></b></div>
                  <input type="number" class="inp" min="0.1" max="24" step="0.1" x-model.number="cfg.miwHalvingHours" @change="persist()" style="width:80px">
                  <div class="miw-hint" x-text="(()=>{ const pos=(positions||[]).filter(p=>p._miw); if(!pos.length) return 'No active MIW positions.'; const oldest=pos.reduce((m,p)=>Math.min(m,p.openedAt||Date.now()),Date.now()); const ageMs=Date.now()-oldest; const halvMs=(cfg.miwHalvingHours??3)*3600000; const mul=Math.pow(0.5,ageMs/halvMs); const h=Math.floor(ageMs/3600000); const m=Math.floor((ageMs%3600000)/60000); return 'Oldest: '+h+'h '+String(m).padStart(2,'0')+'m old → ×'+mul.toFixed(3)+' on trigger'; })()"></div>
                </div>
              </div><!-- end exit zone -->

              <!-- Fade Zone -->
              <div class="miw-zone" x-show="tF">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.miwFadeAwayEnabled=!cfg.miwFadeAwayEnabled;persist()}">
                  <div class="tog-t" :class="cfg.miwFadeAwayEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Fade Away</div>
                    <div class="miw-hint">Runs every scan cycle using cached klines. If any MIW position is in loss ≥ threshold, fetches fresh klines instead. Bad structure → closes oldest position.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.miwFadeAwayEnabled" style="margin-top:8px">
                  <div class="lbl">Loss Trigger <b x-text="'$'+((cfg.minNotional||6)/(cfg.leverage||6)*(cfg.miwFadeAwayLossPct??25)/100).toFixed(2)"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'('+(cfg.miwFadeAwayLossPct??25)+'% base margin)'"></span></div>
                  <input type="range" min="5" max="200" step="5" x-model.number="cfg.miwFadeAwayLossPct" @change="persist()">
                  <div class="lbl" style="margin-top:5px">Bullish Threshold <b x-text="(cfg.miwFadeAwayPct??50)+'%'"></b></div>
                  <input type="range" min="10" max="100" step="5" x-model.number="cfg.miwFadeAwayPct" @change="persist()">
                  <div class="miw-hint" x-text="(()=>{ if(_miwStructureBlocked) return '⛔ Entries blocked — bad structure. Lifts automatically when structure recovers.'; if(_miwFadeAwayLocked) return '🔒 Locked — good structure detected. Resets on next scan.'; const cache=_miwFadeAwayCache||{}; const lastHourStart=Math.floor(Date.now()/3600000)*3600000-3600000; let r=0,g=0; for(const e of Object.values(cache)){if(e.candleStart!==lastHourStart)continue;if(e.close<e.open)r++;else if(e.close>e.open)g++;} const t=r+g; return t ? r+'R / '+g+'G — '+(g/t*100).toFixed(0)+'% bullish (trigger @ '+(cfg.miwFadeAwayPct??50)+'%)' : 'No sample yet.'; })()"></div>
                  <label class="tog" style="margin-top:6px" @click.prevent="if(!cfgLocked){cfg.miwFadeAwayBlockEntries=!cfg.miwFadeAwayBlockEntries;persist()}">
                    <div class="tog-t" :class="cfg.miwFadeAwayBlockEntries?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Block Entries on Bad Structure</div>
                      <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
                        <div class="miw-hint" style="margin-top:0">When bullish threshold is met, new MIW entries are blocked until structure recovers.</div>
                        <span x-show="cfg.miwFadeAwayBlockEntries && _miwStructureBlocked" style="flex-shrink:0;font-family:var(--mono);font-size:7.5px;padding:1px 5px;border-radius:2px;background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.45);color:rgba(255,80,80,.9);letter-spacing:.5px">⛔ BLOCKING</span>
                      </div>
                    </div>
                  </label>
                </div>

                <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.miwLiqFadeEnabled=!cfg.miwLiqFadeEnabled;persist()}">
                  <div class="tog-t" :class="cfg.miwLiqFadeEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Liq Fade Away</div>
                    <div class="miw-hint">B-Liq = Buy-Liquidation (long positions liquidated); S-Liq = Sell-Liquidation (short positions liquidated). Fades/blocks only when the dominant type is historically bad per the PF slot scorecard.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.miwLiqFadeEnabled" style="margin-top:8px">
                  <div class="lbl">Liq Dominance Threshold <b x-text="(cfg.miwLiqFadePct??50)+'%'"></b></div>
                  <input type="range" min="10" max="100" step="5" x-model.number="cfg.miwLiqFadePct" @change="persist()">

        async _miwCheckFadeAway() {

          if (this._miwFadeAwayLocked) return;

          if (!miwPositions.length) { this._miwStructureBlocked = false; return; }
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const lossTrig = baseMargin * (this.cfg.miwFadeAwayLossPct ?? 25) / 100;
          const inLoss = miwPositions.some(p => (p.unrealizedPnl ?? p.uPnl ?? 0) <= -lossTrig);
          const now = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          let faCache;

            // Position past loss threshold — fresh kline fetch to confirm structure
            const cap = this.cfg.miwKlineScanCap ?? 50;
            const allTickers = this._lastAllTickers || [];
            let syms = allTickers
              .filter(t => t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT' && parseFloat(t.lastPrice || 0) >= 0.001)
              .map(t => t.symbol);
            if (syms.length > cap) {
              for (let i = syms.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [syms[i], syms[j]] = [syms[j], syms[i]];
              }
              syms = syms.slice(0, cap);

            if (!syms.length) return;
            faCache = {};
            const CONC = 10;
            for (let i = 0; i < syms.length; i += CONC) {

                  if (!r.ok) return;
                  const d = await r.json();
                  const list = d?.result?.list;
                  if (!list || list.length < 2) return;
                  const candle = list[1];
                  faCache[sym] = { candleStart: parseInt(candle[0]), open: parseFloat(candle[1]), close: parseFloat(candle[4]) };
                } catch(e) {}
              }));
            }
          } else {
            // Normal scan path — use cached klines from this cycle
            faCache = this._miwKlineCache || {};
          }
          let red = 0, green = 0;
          for (const e of Object.values(faCache)) {

            this._miwFadeAwayLocked = true;

          }

        _miwLiqScorecardBias(crit) {
          // Returns 'bad', 'good', or null (no data / tie) by reading PF slot scorecard from localStorage.
          // Counts how many slots containing `crit` are in net profit vs net loss (from Winter's perspective).
          try {
            const raw = JSON.parse(localStorage.getItem('__everwinter_scorecard_v1') || 'null');
            if (!Array.isArray(raw) || !raw.length) return null;
            const cut = Date.now() - 30 * 24 * 3600 * 1000;
            const map = {};
            for (const r of raw) {
              if (r.ts < cut || !Array.isArray(r.criteria) || !r.criteria.includes(crit)) continue;
              const key = [...r.criteria].sort().join(',');
              if (!map[key]) map[key] = { totalPnl: 0 };
              const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
              map[key].totalPnl += r.source === 'winter' ? pnl : -pnl;

            let profitSlots = 0, lossSlots = 0;
            for (const s of slots) {
              if (s.totalPnl > 0) profitSlots++;
              else if (s.totalPnl < 0) lossSlots++;
            }
            if (lossSlots > profitSlots) return 'bad';
            if (profitSlots > lossSlots) return 'good';
            return null;
          } catch(_) { return null; }

        async _miwRunScan() {

          const _glNow = Date.now();
          const _glTtl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3_600_000;
          const _slTtl = (this.cfg.miwBlockedSlotCooldownHours ?? 6) * 3_600_000;
          if (!this._miwSlotGraylist) this._miwSlotGraylist = {};
          const basePool = allTickers.filter(t =>
            t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
            && parseFloat(t.lastPrice || 0) >= 0.001
            && !activeSyms.has(t.symbol)
            && !(this._isSymbolBanned?.(t.symbol))
            && !((this._tickerGraylist?.[t.symbol] ?? 0) > 0 && _glNow - this._tickerGraylist[t.symbol] < _glTtl)
            && !((this._miwSlotGraylist[t.symbol] ?? 0) > 0 && _glNow - this._miwSlotGraylist[t.symbol] < _slTtl)
          );

          // Resolve market caps for vol/mcap criteria if any slot requires them.
          const mcapMap = {};
          if (needsMcap) {
            const bases = basePool.map(t => t.symbol.replace(/USDT$/i, '').toLowerCase());
            await this._miwPrefetchMcaps(bases);
            for (const t of basePool) {
              const mcap = this._miwGetMcapSync(t.symbol.replace(/USDT$/i, '').toLowerCase());
              if (mcap) mcapMap[t.symbol] = mcap;
            }
          }

          if (needsKline) {
            const cap = this.cfg.miwKlineScanCap ?? 50;
            let klineSyms = basePool.map(t => t.symbol);
            if (klineSyms.length > cap) {
              for (let i = klineSyms.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [klineSyms[i], klineSyms[j]] = [klineSyms[j], klineSyms[i]];
              }
              klineSyms = klineSyms.slice(0, cap);
            }
            await this._miwPrefetchKlines(klineSyms);
          }

          const klineVolMin = this.cfg.miwKlineVolMin ?? 25;
          const klineVolMax = this.cfg.miwKlineVolMax ?? 50;
          const checkCrit = (c, fr, is24hUp, ratio, t) => {
            if (c === '+fund')  return fr >= frThreshold;
            if (c === '-fund')  return fr <= -frThreshold;
            if (c === '+24h')   return is24hUp;
            if (c === '-24h')   return !is24hUp;
            if (c === '>10pct') return ratio !== null && ratio > 0.10;
            if (c === '<10pct') return ratio !== null && ratio < 0.10;
            if (c === 'lsa' || c === 'lba' || c === 'rasl' || c === 'rabl') {
              const kline = this._miwGetKlineSync(t.symbol);
              if (!kline) return false;
              const avgHourly = parseFloat(t.volume24h || 0) / 24;
              if (avgHourly <= 0) return false;
              const mult = kline.volume / avgHourly;
              let inBand;
              if (c === 'lsa' || c === 'lba') {
                inBand = mult >= 1 + klineVolMin / 100 && mult <= 1 + klineVolMax / 100;
              } else {
                inBand = mult >= 1 - klineVolMax / 100 && mult <= 1 - klineVolMin / 100;
              }
              if (!inBand) return false;
              return (c === 'lsa' || c === 'rasl') ? kline.close < kline.open : kline.close > kline.open;
            }
            if (c === 'sliq') { const r = this._liqResults?.[t.symbol]; return !!r && r.sLiqPct >= (this.cfg.pfLiqThresholdPct ?? 50); }
            if (c === 'bliq') { const r = this._liqResults?.[t.symbol]; return !!r && r.bLiqPct >= (this.cfg.pfLiqThresholdPct ?? 50); }
            return false;
          };

          // Blocked slot scan: graylist tickers that match any blocked slot
          if (blockedSlots.length) {
            let newlyGraylisted = 0;
            for (const t of basePool) {
              const fr      = parseFloat(t.fundingRate || 0) * 100;
              const is24hUp = parseFloat(t.price24hPcnt || 0) > 0;
              const mcap    = mcapMap[t.symbol];
              const ratio   = mcap ? parseFloat(t.turnover24h || 0) / mcap : null;
              if (blockedSlots.some(s => s.every(c => checkCrit(c, fr, is24hUp, ratio, t)))) {
                this._miwSlotGraylist[t.symbol] = _glNow;
                newlyGraylisted++;
              }
            }
            if (newlyGraylisted) this.log(`[MIW] ⛔ ${newlyGraylisted} ticker(s) graylisted for ${this.cfg.miwBlockedSlotCooldownHours ?? 6}h (blocked slot match)`, 'info');
          }

          this._miwLastActedAt = freshAt;

          // Entry logic only runs when there are non-blocked slots and capacity
          if (!slots.length) return;
          if ((this.positions?.length ?? 0) >= (this.cfg.maxPos ?? 5)) return;

          let headroom = (this.cfg.maxPos ?? 5) - (this.positions?.length ?? 0);
          if (this.cfg.miwShareCapEnabled ?? true) {
            const capSlots = Math.max(1, Math.floor((this.cfg.maxPos ?? 5) * ((this.cfg.miwShareCapPct ?? 100) / 100)));
            const miwCount = (this.positions || []).filter(p => p._miw).length;
            headroom = Math.min(headroom, capSlots - miwCount);
            if (headroom < 1) {
              this.log('[MIW] 💡 Share cap reached — no slots available', 'info');
              return;
            }
          }
          const picks = Math.min(Math.max(1, Math.round(this.cfg.miwPicks ?? 5)), headroom);

          // Build pool: non-blocked slots only, excluding newly slot-graylisted tickers
          const pool = basePool
            .map(t => {
              if ((this._miwSlotGraylist[t.symbol] ?? 0) > 0 && _glNow - this._miwSlotGraylist[t.symbol] < _slTtl) return null;
              const fr       = parseFloat(t.fundingRate || 0) * 100;
              const is24hUp  = parseFloat(t.price24hPcnt || 0) > 0;
              const mcap     = mcapMap[t.symbol];
              const ratio    = mcap ? parseFloat(t.turnover24h || 0) / mcap : null;
              const slotIdx  = slots.findIndex(s => s.every(c => checkCrit(c, fr, is24hUp, ratio, t)));
              return slotIdx !== -1 ? { t, criteria: slots[slotIdx], slotIdx } : null;
            })
            .filter(Boolean)
            .sort((a, b) => a.slotIdx - b.slotIdx || Math.abs(parseFloat(b.t.fundingRate || 0)) - Math.abs(parseFloat(a.t.fundingRate || 0)));

          if (!pool.length) {
            const slotDesc = slots.map(s => `[${s.join(',')}]`).join(' ');
            const posFund  = basePool.filter(t => parseFloat(t.fundingRate || 0) * 100 >= frThreshold).length;
            const negFund  = basePool.filter(t => parseFloat(t.fundingRate || 0) * 100 <= -frThreshold).length;
            const up24h    = basePool.filter(t => parseFloat(t.price24hPcnt || 0) > 0).length;
            const mcapHits  = Object.keys(mcapMap).length;
            const klineHits = needsKline ? Object.keys(this._miwKlineCache||{}).length : 0;
            const mcapNote  = needsMcap  ? ` mcap:${mcapHits}/${basePool.length}`  : '';
            const klineNote = needsKline ? ` kline:${klineHits}/${basePool.length}` : '';
            this.log(`[MIW] 💡 No tickers matched slots ${slotDesc} — pool:${basePool.length} +fund:${posFund} -fund:${negFund} +24h:${up24h}${mcapNote}${klineNote}`, 'info');
            return;
          }

          // Quota per slot = floor(maxPos / slotCount), minimum 1; later slots lose the remainder.
          // Live position count does not reduce quota — each slot gets its full allotment per cycle.
          const maxPos     = this.cfg.maxPos ?? 5;
          const baseQuota  = Math.max(1, Math.floor(maxPos / slots.length));
          const slotQuota  = slots.map(() => baseQuota);
          const slotOpened = new Array(slots.length).fill(0);

          let opened = 0, attempted = 0, blocked = 0, slotSkipped = 0;
          this._logBatchBegin?.();
          try {
            for (const { t, criteria, slotIdx } of pool) {
              if (opened >= picks) break;
              if ((this.positions?.length ?? 0) >= maxPos) break;
              if (slotOpened[slotIdx] >= slotQuota[slotIdx]) { slotSkipped++; continue; }
              attempted++;
              if (await this._miwOpen(t, criteria, slotIdx)) { opened++; slotOpened[slotIdx]++; }
              else { blocked++; }
            }
          } finally { this._logBatchEnd?.('[MIW] 💡 Entry roll-up'); }
          const _miwBlockNote = blocked     ? `, ${blocked} blocked (qty/lev)`  : '';
          const _miwSkipNote  = slotSkipped ? `, ${slotSkipped} slot-skipped`   : '';
          const quotaParts    = slotQuota.map((q, i) => (slotOpened[i] > 0 || q > 0) ? `s${i+1}:${slotOpened[i]}/${q}` : null).filter(Boolean);
          const quotaNote     = quotaParts.length ? ` (quota: ${quotaParts.join(' ')})` : '';
          this.log(`[MIW] 💡 ${pool.length} qualified — ${opened} opened${_miwBlockNote}${_miwSkipNote}${quotaNote}`, 'info');
        },

        async _miwOpen(t, criteria, slotIdx) {
          const sym   = t.symbol;
          let price = parseFloat(t.lastPrice || 0);
          if (!price) return false;
          try {
            const r  = await fetch(`${this.base}/v5/market/tickers?category=linear&symbol=${sym}`);
            const d  = await r.json();
            const lp = parseFloat(d?.result?.list?.[0]?.lastPrice);
            if (lp > 0) price = lp;
          } catch(e) {}
          const change = parseFloat(t.price24hPcnt || 0) * 100;
          const fr     = parseFloat(t.fundingRate  || 0) * 100;
          const lenBefore = (this.positions || []).length;
          await this.pseudoOpenShort({ symbol: sym, price, change, fundingRate: fr, _miw: true });
          if ((this.positions || []).length > lenBefore) {
            const pos = this.positions[this.positions.length - 1];
            pos._miw = true;
            pos._miwSlotIdx  = slotIdx ?? 0;
            pos._miwCriteria = criteria || [];
            if (typeof this.persist === 'function') this.persist();
            return true;
          }
          return false;
        },

        // Two-level CoinGecko cache shared via window.__cgCoinList (24h TTL, localStorage).
        // ID cache: base symbol → CoinGecko coin id (session-scoped, permanent).
        // Mcap cache: coin id → { mcap, ts } (1h TTL).
        async _miwPrefetchMcaps(bases) {
          if (!this._miwCoinIdCache) this._miwCoinIdCache = {};
          if (!this._miwMcapCache)   this._miwMcapCache   = {};
          const now     = Date.now();
          const unknown = bases.filter(b => this._miwCoinIdCache[b] === undefined);
          if (unknown.length) {
            if (!window.__cgCoinList) {
              try {
                const s = JSON.parse(localStorage.getItem('__cgCoinList') || 'null');
                if (s?.list?.length && Date.now() - s.ts < 86_400_000) window.__cgCoinList = s.list;
              } catch(e) {}
            }
            if (!window.__cgCoinList) {
              try {
                const r = await fetch('https://api.coingecko.com/api/v3/coins/list?include_platform=false');
                if (r.ok) {
                  window.__cgCoinList = await r.json();
                  try { localStorage.setItem('__cgCoinList', JSON.stringify({ list: window.__cgCoinList, ts: Date.now() })); } catch(e) {}
                }
              } catch(e) {}
            }
            if (window.__cgCoinList) {
              for (const base of unknown) {
                const hit = window.__cgCoinList.find(c => c.symbol === base);
                this._miwCoinIdCache[base] = hit?.id || '';
              }
            }
          }
          // Seed from shared mcap — avoids refetching what partner already resolved
          const sharedMcap = this._sharedRead('mcap');
          const mcapTtl = (this.cfg.bulkTickerCooldownHours ?? 1) * 3_600_000;
          if (sharedMcap?.data) {
            for (const [id, entry] of Object.entries(sharedMcap.data)) {
              if (entry?.mcap && (now - (entry.ts || 0)) < mcapTtl && !this._miwMcapCache[id]) {
                this._miwMcapCache[id] = { mcap: entry.mcap, ts: entry.ts };
              }
            }
          }
          const ids = [...new Set(
            bases.map(b => this._miwCoinIdCache[b]).filter(id => {
              if (!id) return false;
              const c = this._miwMcapCache[id];
              return !c || now - c.ts >= mcapTtl;
            })
          )];
          if (!ids.length) return;
          try {
            const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=usd&include_market_cap=true`);
            if (r.ok) {
              const d = await r.json();
              const _patch = {};
              for (const id of ids) {
                const mcap = d?.[id]?.usd_market_cap;
                if (mcap) {
                  this._miwMcapCache[id] = { mcap, ts: now };
                  _patch[id] = { mcap, ts: now };
                }
              }
              if (Object.keys(_patch).length) this._sharedMerge('mcap', _patch);
            }
          } catch(e) {}
        },

        _miwGetMcapSync(base) {
          const id = this._miwCoinIdCache?.[base];
          if (!id) return null;
          const c = this._miwMcapCache?.[id];
          return (c && Date.now() - c.ts < (this.cfg.bulkTickerCooldownHours ?? 1) * 3_600_000) ? c.mcap : null;
        },

        _miwGenerateCombos(size) {
          const all = ['+fund','-fund','+24h','-24h','>10pct','<10pct','lsa','lba','rasl','rabl','sliq','bliq'];
          const result = [];
          const pick = (start, current) => {
            if (current.length === size) { result.push([...current]); return; }
            for (let i = start; i < all.length; i++) {
              current.push(all[i]);
              pick(i + 1, current);
              current.pop();
            }
          };
          pick(0, []);
          return result;
        },

        _miwEffectiveSlots() {
          const raw = this.cfg.miwAutoSlots
            ? this._miwGenerateCombos(this.cfg.miwAutoSlotSize ?? 2)
            : (this.cfg.miwSlots || []).filter(s => s.length > 0);
          const blocks = this.miwBlockedSlots || {};
          const filtered = Object.keys(blocks).length ? raw.filter(s => !blocks[[...s].sort().join(',')]) : raw;
          const ranks = this.miwSlotRanks || {};
          if (!Object.keys(ranks).length) return filtered;
          return filtered.slice().sort((a, b) => {
            const ka = [...a].sort().join(','), kb = [...b].sort().join(',');
            const ra = ranks[ka] ?? 0, rb = ranks[kb] ?? 0;
            return rb - ra;
          });
        },

        async _miwPrefetchKlines(symbols) {
          const now           = Date.now();
          const lastHourStart = Math.floor(now / 3_600_000) * 3_600_000 - 3_600_000;
          const scanMs        = (this.cfg.scanMins || 15) * 60 * 1000;
          // Seed from shared klines — entries must be for the current completed hour and within 1 scan cycle
          const sharedKlines = this._sharedRead('klines_1h_last');
          const seedCache = {};
          if (sharedKlines?.data) {
            for (const sym of symbols) {
              const e = sharedKlines.data[sym];
              if (e && e.candleStart >= lastHourStart && e.ts && (now - e.ts) < scanMs) seedCache[sym] = e;
            }
          }
          this._miwKlineCache = { ...seedCache };
          const toFetch = symbols.filter(sym => !seedCache[sym]);
          const CONC = 10;
          for (let i = 0; i < toFetch.length; i += CONC) {
            await Promise.all(toFetch.slice(i, i + CONC).map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                this._miwKlineCache[sym] = {
                  candleStart: parseInt(candle[0]),
                  open:  parseFloat(candle[1]),
                  close: parseFloat(candle[4]),
                  volume: parseFloat(candle[5]),
                  ts: now,
                };
              } catch(e) {}
            }));
          }
          // Write newly fetched entries to shared
          const patch = {};
          for (const sym of toFetch) { if (this._miwKlineCache[sym]) patch[sym] = this._miwKlineCache[sym]; }
          if (Object.keys(patch).length) this._sharedMerge('klines_1h_last', patch);
        },

        _miwGetKlineSync(symbol) {
          return this._miwKlineCache?.[symbol] || null;
        },

      });
    },
  };
})();
</script>
