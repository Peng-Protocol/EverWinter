<!--
  DCA Short Mode Plugin for PseudoWinter
  Unlocks multi-stage DCA mode for short positions: conditional add orders placed
  ABOVE entry (price moves against you), each with a decreasing TP ROI target.
  SL armed when all first-wind stages fill.

  Load via Plugin Manager in PseudoWinter's config panel.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  window.__BotPlugin = {
    id:        'dca-short-mode',
    name:      'DCA Short Mode',
    version:   '1.0.0',
    targetBot: 'pseudowinter',
    after:     [],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['pseudoOpenShort', 'pseudoWatchPositions'],

    css: `
      .dcas-section { margin-top: 8px; }
      .dcas-hint { font-size: 9.5px; color: var(--text-lo); margin-top: 3px; line-height: 1.5; }
    `,

    slots: {
      'mode-config': `
        <div style="margin-bottom:6px">
          <label class="tog" @click.prevent="if(!cfgLocked){cfg.binaryModeEnabled=!cfg.binaryModeEnabled;persist()}">
            <div class="tog-t" :class="cfg.binaryModeEnabled?'on':''"><div class="tog-k"></div></div>
            <div>
              <div class="tog-l">Binary Mode</div>
              <div style="font-size:9px;color:var(--text-lo);line-height:1.4;margin-top:1px">
                On: TP + SL set at entry (no DCA). Off: multi-stage DCA adds above entry.
              </div>
            </div>
          </label>
        </div>
        <div x-show="!cfg.binaryModeEnabled" class="dcas-section">
          <div style="font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--text-lo);margin-bottom:8px">DCA SETTINGS</div>
          <div class="g">
            <div class="lbl">Entry TP <b x-text="cfg.entryTpRoi+'% ROI'"></b></div>
            <input type="range" min="3" max="30" step="1" x-model.number="cfg.entryTpRoi" :disabled="bot.running" @change="persist()">
            <div class="dcas-hint">Stage TPs scale down per add: entry ÷ (stage+1), min 3%.</div>
          </div>
          <div class="g" style="margin-top:8px">
            <div class="lbl">DCA Stages <b x-text="cfg.dcaStages"></b></div>
            <input type="range" min="1" max="6" step="1" x-model.number="cfg.dcaStages" :disabled="bot.running" @change="persist()">
            <div class="dcas-hint">
              Add orders placed at:
              <span x-text="(()=>{ const n=cfg.dcaStages||3; const pts=n===3?[3,9,15]:Array.from({length:n},(_,k)=>k===0?1.5:3*k); return pts.slice(0,n).map((p,i)=>'Add'+(i+1)+' +'+p+'%').join(', '); })()"></span>
              above entry (shorts add as price rises).
            </div>
          </div>
        </div>
      `,

      'tp-stats': `
        <div class="stat" x-show="!cfg.binaryModeEnabled"><div class="sl">Entry TP</div><div class="sv profit sm" x-text="cfg.entryTpRoi+'%'"></div></div>
        <div class="stat" x-show="!cfg.binaryModeEnabled"><div class="sl">Add1 TP</div><div class="sv profit sm" x-text="(+_tpRoi(1).toFixed(2))+'%'"></div></div>
      `,

      'tp-description': `
        <div x-show="!cfg.binaryModeEnabled" style="font-size:9.5px;color:var(--text-lo);margin-top:7px;line-height:1.6">
          Entry TP ÷ (stage+1) per add, min 3%. SL arms after all first-wind stages fill.
        </div>
      `,
    },

    transform(def) {
      return def;
    },
  };
})();
</script>
