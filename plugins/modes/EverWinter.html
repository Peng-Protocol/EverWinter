<!--
  EverWinter Plugin for PseudoWinter
  Transforms PseudoWinter into a live Bybit short-trading bot.
  Load via Plugin Manager in PseudoWinter's config panel.
-->
<script>
(function () {
  'use strict';

  async function _ewSign(key, secret, payload, tsOffset) {
    const ts   = String(Date.now() + (tsOffset | 0));
    const recv = '5000';
    const str  = ts + key + recv + payload;
    const enc  = new TextEncoder();
    const k    = await crypto.subtle.importKey('raw', enc.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
    const sig  = await crypto.subtle.sign('HMAC', k, enc.encode(str));
    const hex  = Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('');
    return { 'X-BAPI-API-KEY': key, 'X-BAPI-TIMESTAMP': ts, 'X-BAPI-RECV-WINDOW': recv, 'X-BAPI-SIGN': hex, 'Content-Type': 'application/json' };
  }

  window.__BotPlugin = {
    id:        'everwinter',
    name:      'EverWinter',
    version:   '1.0.2',
    targetBot: 'pseudowinter',
    after:     [],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'pseudoOpenShort', 'pseudoClosePosition', 'pseudoWatchPositions', 'refreshBalance'],
    suppresses: ['pseudoOpenShort', 'refreshBalance'],

    css: `
      .ew-inp { width: 100%; background: var(--bg-void); border: 1px solid var(--border-hi); color: var(--text-hi); padding: 5px 8px; border-radius: 4px; font-family: var(--mono); font-size: 10px; margin-bottom: 6px; }
      .ew-inp:focus { outline: none; border-color: var(--ice); }
      .ew-save { width: 100%; background: var(--bg-raised); border: 1px solid var(--ice); color: var(--ice); font-size: 10px; padding: 5px 0; border-radius: 4px; cursor: pointer; font-family: var(--mono); letter-spacing: 1px; transition: background 0.15s; }
      .ew-save:hover { background: var(--ice-glow); }
      .ew-note { font-size: 9px; color: var(--text-lo); text-align: center; margin-top: 6px; font-family: var(--mono); }
    `,

    slots: {
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <!-- ❄ matches other Winter-family plugin accordions (❄ Permafrost, ❄ Blizzard, etc.) — emoji variant ❄️ is too dissimilar -->
              <span>❄ EverWinter</span>
              <span x-show="creds.key && creds.secret" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">LIVE</span>
              <span x-show="!(creds.key && creds.secret)" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">SETUP</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <div style="font-size:10px;color:var(--text-lo);margin-bottom:3px">API Key</div>
            <input type="text" class="ew-inp" x-model="creds.key" placeholder="Bybit API Key" autocomplete="off" spellcheck="false">
            <div style="font-size:10px;color:var(--text-lo);margin-bottom:3px">API Secret</div>
            <input type="password" class="ew-inp" x-model="creds.secret" placeholder="Bybit API Secret" autocomplete="off">
            <button class="ew-save" @click="_ewSaveCreds()">SAVE CREDENTIALS</button>
            <div class="ew-note">Stored in localStorage — sent only to api.bybit.com</div>
            <div x-show="creds.key && creds.secret" style="margin-top:6px;font-size:9px;font-family:var(--mono);color:var(--profit);text-align:center">⚡ Live mode active</div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _sign    = _ewSign;
      const _origInit  = def.init;
      const _origOpen  = def.pseudoOpenShort;
      const _origClose = def.pseudoClosePosition;
      const _origWatch = def.pseudoWatchPositions;
      const _origCycle = def.runScheduledCycle;

      return Object.assign({}, def, {

        _tsOffset:      0,
        _lastSignedAt:  0,
        _ewLive:        true,
        _ewLastSync:    0,
        _ewNeedsSync:   false,
        _ewClosing:     {},
        _ewOpposite:    {},  // opposite-direction (Buy) exchange positions, noted but not managed

        async init() {
          // Update loading screen immediately — it persists until showApp() fires after init completes
          const _loadLogo = document.querySelector('.pw-logo');
          if (_loadLogo) _loadLogo.textContent = '❄️ EVERWINTER';
          await _origInit.call(this);
          if (typeof this.setThemeEmoji === 'function') this.setThemeEmoji('❄️');
          this.appName  = 'EVERWINTER';
          this.botLabel = 'Bot';
          document.title = document.title.replace(/PSEUDOWINTER/i, 'EVERWINTER');
          try {
            const s = JSON.parse(localStorage.getItem('__ew_creds') || '{}');
            if (s.key)    this.creds.key    = s.key;
            if (s.secret) this.creds.secret = s.secret;
          } catch(e) {}
          if (this.creds.key && this.creds.secret) await this._ewSyncTs();
          this.log('⚡ EverWinter live plugin active.', 'info');
        },

        _ewSaveCreds() {
          localStorage.setItem('__ew_creds', JSON.stringify({ key: this.creds.key, secret: this.creds.secret }));
          this._ewSyncTs();
          this.log('[EW] Credentials saved.', 'info');
        },

        async _ewSyncTs() {
          try {
            const r = await fetch('https://api.bybit.com/v5/market/time');
            const d = await r.json();
            const ms = parseInt(d.result?.timeNano ? d.result.timeNano / 1000000 : (d.result?.timeSecond || 0) * 1000);
            if (ms > 0) this._tsOffset = ms - Date.now();
          } catch(e) { this._tsOffset = 0; }
        },

        async refreshBalance() {
          if (!this.creds.key || !this.creds.secret) return;
          try {
            await this._ewDelay();
            const p = 'accountType=UNIFIED';
            const h = await _sign(this.creds.key, this.creds.secret, p, this._tsOffset);
            const r = await fetch(`${this.base}/v5/account/wallet-balance?${p}`, { headers: h });
            const d = await this._ewSafeJson(r);
            const coin = d?.result?.list?.[0]?.coin?.find(c => c.coin === 'USDT');
            if (coin) {
              this.acct.balance   = parseFloat(coin.walletBalance   || 0);
              this.acct.available = parseFloat(coin.availableToWithdraw || coin.availableToBorrow || 0);
            }
          } catch(e) {}
        },

        async _ewDelay() {
          const GAP = 250;
          const now = Date.now();
          const t   = Math.max(now, (this._lastSignedAt || 0) + GAP);
          this._lastSignedAt = t;
          if (t > now) await new Promise(r => setTimeout(r, t - now));
        },

        _ewPriceDp(symbol) {
          const ts = this._instrCache?.[symbol]?.tickSize;
          if (!ts) return 4;
          const s  = String(ts);
          const d  = s.indexOf('.');
          return d < 0 ? 0 : s.length - d - 1;
        },

        async _ewSafeJson(res) {
          try { const t = await res.text(); return t && !t.trimStart().startsWith('<') ? JSON.parse(t) : null; }
          catch(e) { return null; }
        },

        async placeOrder(symbol, side, orderType, qty, refPrice = 0) {
          await this._ewDelay();
          let body;
          if (refPrice > 0 && orderType === 'Market') {
            const dp  = this._ewPriceDp(symbol);
            const lim = parseFloat((refPrice * (side === 'Sell' ? 0.999 : 1.001)).toFixed(dp));
            body = { category: 'linear', symbol, side, orderType: 'Limit', qty: String(qty), price: String(lim), timeInForce: 'GTC', reduceOnly: false };
          } else {
            body = { category: 'linear', symbol, side, orderType, qty: String(qty), timeInForce: 'IOC', reduceOnly: false };
          }
          const b = JSON.stringify(body);
          const h = await _sign(this.creds.key, this.creds.secret, b, this._tsOffset);
          try {
            const r = await fetch(`${this.base}/v5/order/create`, { method: 'POST', headers: h, body: b });
            const d = await this._ewSafeJson(r);
            if (!d)              { this.log(`[EW] placeOrder ${symbol}: empty response`, 'error'); return null; }
            if (d.retCode !== 0) { this.log(`[EW] placeOrder ${symbol}: ${d.retMsg}`, 'error'); return d.retMsg?.toLowerCase().includes('not supported') ? 'NOT_LIVE' : null; }
            return d.result?.orderId || null;
          } catch(e) { this.log(`[EW] placeOrder: ${e.message}`, 'error'); return null; }
        },

        async waitForPosition(symbol, orderId = null) {
          const POLL = 2500, TIMEOUT = 30000;
          const end  = Date.now() + TIMEOUT;
          const check = async () => {
            await this._ewDelay();
            const p = `category=linear&symbol=${symbol}`;
            const h = await _sign(this.creds.key, this.creds.secret, p, this._tsOffset);
            const r = await fetch(`${this.base}/v5/position/list?${p}`, { headers: h });
            const d = await this._ewSafeJson(r);
            const e = d ? (d.result?.list || []).find(x => x.symbol === symbol && x.side === 'Sell' && parseFloat(x.size) > 0) : null;
            if (!e) return null;
            const fp = parseFloat(e.avgPrice || e.entryPrice || 0);
            return fp > 0 ? fp : null;
          };
          while (Date.now() < end) {
            await new Promise(r => setTimeout(r, POLL));
            try { const fp = await check(); if (fp) return fp; } catch(e) {}
          }
          if (orderId) {
            try {
              await this._ewDelay();
              const b = JSON.stringify({ category: 'linear', symbol, orderId });
              const h = await _sign(this.creds.key, this.creds.secret, b, this._tsOffset);
              await fetch(`${this.base}/v5/order/cancel`, { method: 'POST', headers: h, body: b });
            } catch(e) {}
            try { const fp = await check(); if (fp) return fp; } catch(e) {}
          }
          this.log(`[EW] ${symbol}: fill timeout — aborted.`, 'warn');
          return null;
        },

        async _ewSetLeverage(symbol, lev) {
          await this._ewDelay();
          const b = JSON.stringify({ category: 'linear', symbol, buyLeverage: String(lev), sellLeverage: String(lev) });
          const h = await _sign(this.creds.key, this.creds.secret, b, this._tsOffset);
          try {
            const r = await fetch(`${this.base}/v5/position/set-leverage`, { method: 'POST', headers: h, body: b });
            const d = await this._ewSafeJson(r);
            if (d?.retCode !== 0 && d?.retCode !== 110043) this.log(`[EW] setLeverage ${symbol}: ${d?.retMsg}`, 'warn');
          } catch(e) { this.log(`[EW] setLeverage error: ${e.message}`, 'warn'); }
        },

        async setTP(pos, tpPrice) {
          await this._ewDelay();
          const dp  = this._ewPriceDp(pos.symbol);
          const trig = parseFloat(tpPrice.toFixed(dp));
          const b   = JSON.stringify({ category: 'linear', symbol: pos.symbol, takeProfit: String(trig), tpTriggerBy: 'LastPrice', positionIdx: 0 });
          const h   = await _sign(this.creds.key, this.creds.secret, b, this._tsOffset);
          try {
            const r = await fetch(`${this.base}/v5/position/trading-stop`, { method: 'POST', headers: h, body: b });
            const d = await this._ewSafeJson(r);
            if (d?.retCode === 0) { pos.currentTpPrice = tpPrice; return 'ok'; }
            this.log(`[EW] setTP ${pos.symbol}: ${d?.retMsg || 'no response'}`, 'warn');
            return 'error';
          } catch(e) { this.log(`[EW] setTP: ${e.message}`, 'error'); return 'error'; }
        },

        async _ewSetSL(symbol, slPrice) {
          await this._ewDelay();
          const dp  = this._ewPriceDp(symbol);
          const str = slPrice > 0 ? slPrice.toFixed(dp) : '0';
          const b   = JSON.stringify({ category: 'linear', symbol, stopLoss: str, slTriggerBy: 'LastPrice', positionIdx: 0 });
          const h   = await _sign(this.creds.key, this.creds.secret, b, this._tsOffset);
          try {
            const r = await fetch(`${this.base}/v5/position/trading-stop`, { method: 'POST', headers: h, body: b });
            const d = await this._ewSafeJson(r);
            if (d?.retCode !== 0) this.log(`[EW] setSL ${symbol}: ${d?.retMsg}`, 'warn');
          } catch(e) {}
        },

        async _ewCheckTp(pos, exTp, exAvg) {
          const dp    = this._ewPriceDp(pos.symbol);
          const lev   = pos.leverage || this.cfg.leverage;
          const tpPct = pos.tpPct > 0 ? pos.tpPct : this.cfg.entryTpRoi;
          const base  = exAvg > 0 ? exAvg : pos.entryPrice;
          const targetTp = parseFloat((base * (1 - tpPct / 100 / lev)).toFixed(dp));

          if (exTp > 0) {
            // Sync display from exchange
            pos.currentTpPrice = exTp;
            pos.tpPct          = parseFloat(((base - exTp) / base * lev * 100).toFixed(1));

            // Deviation check — 10% of expected TP distance from avgPrice
            const tolerance = base * tpPct / 100 / lev * 0.10;
            const deviation = Math.abs(exTp - targetTp);
            const lockKey   = exTp.toFixed(dp);
            const targetKey = targetTp.toFixed(dp);
            const lockAge   = pos._ewTpLockedAt ? Date.now() - pos._ewTpLockedAt : Infinity;
            // Bail if the exchange TP is accepted-authoritative OR if we already sent this target (in-flight / recently confirmed)
            if (lockAge < 60000 && (pos._ewTpLockKey === lockKey || pos._ewTpLockKey === targetKey)) return;

            if (deviation > tolerance) {
              this.log(`[EW] ${pos.symbol}: TP drift — exchange ${exTp.toFixed(dp)} vs target ${targetTp.toFixed(dp)} (Δ${deviation.toFixed(dp)}) — correcting`, 'warn');
              pos._ewTpLockKey = targetKey; pos._ewTpLockedAt = Date.now(); // pre-flight: block concurrent ticks
              const res = await this.setTP(pos, targetTp);
              if (res !== 'ok') {
                pos._ewTpLockKey = lockKey; pos._ewTpLockedAt = Date.now(); // refused — accept exchange TP as authoritative
                this.log(`[EW] ${pos.symbol}: TP correction refused — accepting exchange TP ${exTp.toFixed(dp)}`, 'debug');
              }
              // on 'ok': keep targetKey locked so the exchange echo doesn't re-trigger for 60 s
            }
          } else {
            // Exchange TP is null — reissue stored or recomputed target
            const reissue = pos.currentTpPrice > 0 ? pos.currentTpPrice : targetTp;
            if (reissue > 0) {
              const nullKey = `null:${reissue.toFixed(dp)}`;
              const lockAge = pos._ewTpLockedAt ? Date.now() - pos._ewTpLockedAt : Infinity;
              if (pos._ewTpLockKey === nullKey && lockAge < 60000) return;
              this.log(`[EW] ${pos.symbol}: TP null on exchange — reissuing @ ${reissue.toFixed(dp)}`, 'warn');
              pos._ewTpLockKey = nullKey; pos._ewTpLockedAt = Date.now(); // pre-flight lock
              const res = await this.setTP(pos, reissue);
              if (res !== 'ok') { pos._ewTpLockKey = nullKey; pos._ewTpLockedAt = Date.now(); }
              // on 'ok': keep nullKey locked until exchange echoes back a real TP value
            }
          }
        },

        async _ewSyncPositions() {
          if (!this.creds.key || !this.creds.secret) return;
          try {
            await this._ewDelay();
            const p = 'category=linear&settleCoin=USDT';
            const h = await _sign(this.creds.key, this.creds.secret, p, this._tsOffset);
            const r = await fetch(`${this.base}/v5/position/list?${p}`, { headers: h });
            const d = await this._ewSafeJson(r);
            if (!d || d.retCode !== 0) return;
            const exMap = new Map((d.result?.list || [])
              .filter(e => e.side === 'Sell' && parseFloat(e.size) > 0)
              .map(e => [e.symbol, e]));
            // Import opposite-direction (Buy) positions as lesser, note-only records —
            // not managed, no TP/SL, no PnL tracking — so entries on those tickers
            // can be blocked instead of shorting against an existing long.
            const opp = {};
            for (const e of (d.result?.list || [])) {
              if (e.side !== 'Buy' || !(parseFloat(e.size) > 0)) continue;
              const prev = this._ewOpposite?.[e.symbol];
              opp[e.symbol] = {
                side:       'Buy',
                size:       parseFloat(e.size),
                entryPrice: parseFloat(e.avgPrice || e.entryPrice || 0),
                markPrice:  parseFloat(e.markPrice || 0),
                noticedAt:  prev?.noticedAt || Date.now(),
              };
              if (!prev) this.log(`[EW] ${e.symbol}: opposite (long) position on exchange — noted, not managed; new shorts on this ticker blocked`, 'warn');
            }
            for (const sym of Object.keys(this._ewOpposite || {})) {
              if (!opp[sym]) this.log(`[EW] ${sym}: opposite (long) position gone from exchange — ticker unblocked`, 'info');
            }
            this._ewOpposite = opp;
            for (const pos of [...this.positions]) {
              const ep = exMap.get(pos.symbol);
              if (!ep) {
                // Gone on exchange — fetch closed PnL for exit price
                let exitPrice = pos.markPrice || pos.entryPrice, reason = 'tp';
                try {
                  await this._ewDelay();
                  const pp = `category=linear&symbol=${pos.symbol}&limit=1`;
                  const ph = await _sign(this.creds.key, this.creds.secret, pp, this._tsOffset);
                  const pr = await fetch(`${this.base}/v5/position/closed-pnl?${pp}`, { headers: ph });
                  const pd = await this._ewSafeJson(pr);
                  const rec = pd?.result?.list?.[0];
                  if (rec) {
                    exitPrice = parseFloat(rec.avgExitPrice || rec.exitPrice || exitPrice);
                    reason    = parseFloat(rec.closedPnl || 0) >= 0 ? 'tp' : 'sl';
                  }
                } catch(e) {}
                this.log(`[EW] ${pos.symbol}: exchange closed [${reason}] @ ${exitPrice}`, 'info');
                await _origClose.call(this, pos, reason, exitPrice);
              } else {
                const exAvg    = parseFloat(ep.avgPrice || ep.entryPrice || pos.entryPrice);
                pos.markPrice  = parseFloat(ep.markPrice || exAvg || pos.markPrice);
                pos.totalSize  = parseFloat(ep.size || pos.totalSize);
                if (exAvg > 0) pos.entryPrice = exAvg;
                const exTp = parseFloat(ep.takeProfit || 0);
                await this._ewCheckTp(pos, exTp, exAvg || pos.entryPrice);
              }
            }
            this._ewLastSync = Date.now();
          } catch(e) { this.log(`[EW] sync error: ${e.message}`, 'warn'); }
        },

        async pseudoOpenShort(candidate) {
          if (!this.creds.key || !this.creds.secret) {
            this.log('[EW] No credentials set — set API key/secret in config panel.', 'warn');
            return;
          }
          const sym = candidate.symbol;
          if (this._symbolBanlist?.[sym]) return;
          if (this._ewOpposite?.[sym]) {
            this.log(`[EW] ${sym}: skipped — opposite (long) position open on exchange`, 'warn');
            return;
          }
          if (this.positions.find(p => p.symbol === sym)) return;
          if (this.positions.length >= this.cfg.maxPos) return;

          const instr = await this.getInstrInfo(sym);
          if (!instr) { this.log(`[EW] ${sym}: instrument info unavailable`, 'warn'); return; }

          const price = candidate.price;
          if (instr.minPrice > 0 && price < instr.minPrice) return;

          const levRes = this.resolveEffectiveLeverage(sym, instr);
          if (!levRes) return;
          const lev = (typeof levRes === 'object' ? levRes.lev : levRes) || this.cfg.leverage;

          const rawQty = this.cfg.minNotional / price;
          const qty    = this.snapQty(rawQty, instr);
          if (!qty || qty < (instr.minQty || 0)) { this.log(`[EW] ${sym}: qty below min`, 'warn'); return; }
          const notional = qty * price;
          if (instr.minOrderAmt > 0 && notional < instr.minOrderAmt) { this.log(`[EW] ${sym}: notional below min`, 'warn'); return; }

          const binary = this.cfg.binaryModeEnabled;
          const tpPct  = binary ? (this.cfg.binaryTpPct ?? 18) : this.cfg.entryTpRoi;

          await this._ewSetLeverage(sym, lev);
          this.log(`[EW] Placing SELL ${sym} qty=${qty} @ ~${price}…`, 'info');
          const oid = await this.placeOrder(sym, 'Sell', 'Market', qty, price);
          if (!oid || oid === 'NOT_LIVE') { if (oid === 'NOT_LIVE') { this.log(`[EW] ${sym}: not supported on exchange — banned for 1 week`, 'warn'); this._banSymbol?.(sym, 'not supported on exchange'); } return; }

          const fillPrice = await this.waitForPosition(sym, oid);
          if (!fillPrice) return;

          const tpPrice = this.snapPrice(fillPrice * (1 - tpPct / 100 / lev), instr);
          const bSlPct  = this.cfg.binarySlPct ?? 18;
          const slPrice = binary ? this.snapPrice(fillPrice * (1 + bSlPct / 100 / lev), instr) : 0;

          const pos = {
            id:                 `${sym}_${Date.now()}`,
            symbol:             sym,
            entryPrice:         fillPrice,
            originalEntryPrice: fillPrice,
            markPrice:          fillPrice,
            totalSize:          qty,
            leverage:           lev,
            margin:             notional / lev,
            change24h:          (candidate.change ?? 0).toFixed(2),
            rsi6:               candidate.rsi6,
            rsi12:              candidate.rsi12,
            rsi24:              candidate.rsi24,
            fundingRate:        candidate.fundingRate ?? null,
            _fundingIntervalMs: 8 * 3600000,
            upnl:               0,
            openedAt:           Date.now(),
            phase:              'normal',
            isPending:          false,
            currentTpPrice:     tpPrice,
            tpPct,
            slPrice,
            slSet:              binary,
            dcaStage:           0,
            orders:             [],
            _stageCount:        0,
            _pseudo:            false,
            _loser:             candidate._loser === true,
            _lastSeenAt:        Date.now(),
            _binary:            binary,
          };

          this.positions.push(pos);
          if (typeof this.persist === 'function') this.persist();

          if (tpPrice > 0) await this.setTP(pos, tpPrice);
          if (slPrice > 0) await this._ewSetSL(sym, slPrice);

          const g = (this.gainers || []).find(x => x.symbol === sym);
          if (g) g.status = 'active';

          this.log(`⚡ [EW] SHORT ${sym} @ ${fillPrice} | TP:${tpPrice}${slPrice ? ' SL:'+slPrice : ''}`, 'info');

          if (candidate._loser === true) this.loserLockInBump?.(sym, candidate.change ?? 0);
          else this.gainerLockInBump?.(sym, candidate.change ?? 0);
        },

        async pseudoClosePosition(pos, reason = 'manual', fillPrice = null) {
          if (this.creds.key && this.creds.secret && !this._ewClosing?.[pos.id]) {
            if (!this._ewClosing) this._ewClosing = {};
            this._ewClosing[pos.id] = true;
            try {
              const ref = fillPrice || pos.markPrice || pos.entryPrice;
              if (reason === 'tp' || reason === 'sl') {
                // Exchange-native TP/SL already filled — fetch real exit price, no redundant order
                await this._ewDelay();
                try {
                  const pp = `category=linear&symbol=${pos.symbol}&limit=1`;
                  const ph = await _sign(this.creds.key, this.creds.secret, pp, this._tsOffset);
                  const pr = await fetch(`${this.base}/v5/position/closed-pnl?${pp}`, { headers: ph });
                  const pd = await this._ewSafeJson(pr);
                  const rec = pd?.result?.list?.[0];
                  if (rec) fillPrice = parseFloat(rec.avgExitPrice || rec.exitPrice || ref);
                } catch(e) {}
              } else {
                // Manual/force close — place order, then always fetch real fill regardless of outcome
                await this._ewDelay();
                const dp = this._ewPriceDp(pos.symbol);
                let body;
                if (ref > 0) {
                  const lim = parseFloat((ref * 1.003).toFixed(dp));
                  body = { category: 'linear', symbol: pos.symbol, side: 'Buy', orderType: 'Limit', qty: String(pos.totalSize), price: String(lim), timeInForce: 'GTC', reduceOnly: true };
                } else {
                  body = { category: 'linear', symbol: pos.symbol, side: 'Buy', orderType: 'Market', qty: String(pos.totalSize), timeInForce: 'IOC', reduceOnly: true };
                }
                const b = JSON.stringify(body);
                const h = await _sign(this.creds.key, this.creds.secret, b, this._tsOffset);
                const r = await fetch(`${this.base}/v5/order/create`, { method: 'POST', headers: h, body: b });
                const d = await this._ewSafeJson(r);
                if (d?.retCode !== 0) this.log(`[EW] close attempt ${pos.symbol}: ${d?.retMsg || 'no response'}`, 'warn');
                await new Promise(res => setTimeout(res, 2000));
                try {
                  await this._ewDelay();
                  const pp = `category=linear&symbol=${pos.symbol}&limit=1`;
                  const ph = await _sign(this.creds.key, this.creds.secret, pp, this._tsOffset);
                  const pr = await fetch(`${this.base}/v5/position/closed-pnl?${pp}`, { headers: ph });
                  const pd = await this._ewSafeJson(pr);
                  const rec = pd?.result?.list?.[0];
                  if (rec) fillPrice = parseFloat(rec.avgExitPrice || rec.exitPrice || ref);
                } catch(e) {}
              }
            } catch(e) {
              this.log(`[EW] close error ${pos.symbol}: ${e.message}`, 'warn');
            } finally {
              delete this._ewClosing[pos.id];
            }
          }
          if ((reason === 'sl' || reason === 'tp') && this.creds.key && this.creds.secret) this._ewNeedsSync = true;
          return _origClose.call(this, pos, reason, fillPrice || pos.markPrice || pos.entryPrice);
        },

        async runScheduledCycle() {
          if (this.creds.key && this.creds.secret) await this._ewSyncPositions();
          return _origCycle.call(this);
        },

        async pseudoWatchPositions() {
          if (this.creds.key && this.creds.secret && this._ewNeedsSync) {
            this._ewNeedsSync = false;
            await this._ewSyncPositions();
          }
          // Update markPrice for live positions using public ticker (base watch skips _pseudo=false)
          const live = this.positions.filter(p => !p._pseudo);
          for (const pos of live) {
            try {
              const tr = await fetch(`${this.base}/v5/market/tickers?category=linear&symbol=${pos.symbol}`);
              const td = await tr.json();
              const t  = td?.retCode === 0 ? td.result?.list?.[0] : null;
              if (t) {
                const mp = parseFloat(t.lastPrice || t.markPrice || 0);
                if (mp > 0) {
                  pos.markPrice = mp;
                  pos.upnl = (pos.entryPrice - mp) / pos.entryPrice * pos.leverage * pos.margin;
                }
              }
            } catch {}
          }
          if (live.length) this.acct.upnl = this.positions.reduce((s, p) => s + (Number.isFinite(p.upnl) ? p.upnl : 0), 0);
          // TP drift correction runs every watch tick; 60s lock prevents excess setTP calls
          for (const pos of live) {
            if (pos.currentTpPrice > 0 || pos.tpPct > 0)
              await this._ewCheckTp(pos, pos.currentTpPrice, pos.entryPrice);
          }
          return _origWatch.call(this);
        },
      });
    },
  };
})();
</script>
