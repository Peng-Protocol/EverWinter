<!--
  Ashfall Strategy Plugin for PseudoChaser
  Builds a learned market-structure profile by recording the climate at every
  drawdown-throttle and gains-lock event — drawdown events mark hostile climate,
  gains-lock events mark favorable climate. Scan cycles add weaker PnL-labeled
  samples between those anchors.

  Structure trajectory ("the wave"): a reading is judged in the context of what
  preceded it, not in isolation. The recent path of the structure lean is tracked
  and plotted in the accordion, and its direction folds into an inherent bull⇄bear
  oscillation prior — so a mildly-bullish tape that is turning down reads negative
  (don't long into the start of a dump). Learned history stays primary; the
  inherent wave only takes the helm when the profile is thin.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation — the same logic powers Permafrost on PseudoWinter.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const ASH_KEY        = '__ashfall_chaser_v1';
  const CROSS_KEY      = '__everwinter_cross_v1';
  const CROSS_TTL      = 6 * 3600 * 1000;
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old burns fade
  const EVENT_W        = 10;                   // halt events are strong anchors
  const SAMPLE_W       = 1;                    // cycle samples are weak fill
  const MIN_MASS       = 6;                    // effective evidence mass required to override the timer
  const STRONG_MASS    = 12;                   // evidence mass for a *strong* historical bias (2× MIN_MASS)
  const STRONG_SCORE   = 0.30;                 // |score| at/above which the bias counts as strong
  const DEFAULT_HALT_MS = 12 * 3600 * 1000;    // stock 12h horizon — the floor unless strong history says otherwise
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never resume before 1h (only reachable under a strong bias)
  const LABEL_WINDOW   = 6 * 3600 * 1000;      // samples are labeled by the realized PnL that followed
  const EVENTS_CAP     = 200;
  const SAMPLES_CAP    = 1000;
  const PNL_LOG_TTL    = 24 * 3600 * 1000;

  // ── Structure trajectory ("the wave") ──
  // A reading isn't just where the market is now — it's where it came from. We
  // track the recent path of the structure lean and read its direction, then
  // fold an *inherent* oscillation prior (markets swing strongly bullish ⇄
  // strongly bearish) into the decision. History stays primary; the inherent
  // wave only takes the helm when the learned profile is thin.
  const WAVE_TTL_MS    = 7 * 24 * 3600 * 1000; // wave retains as much structure history as we have, up to ~a week
  const WAVE_CAP       = 2000;              // hard cap on stored wave points
  const WAVE_MIN_PTS   = 3;                 // readings needed before a trajectory is meaningful
  const W_LEAN         = 0.6;               // inherent-score weight on the current structure level
  const W_SLOPE        = 0.4;               // inherent-score weight on the trajectory (where it's heading)
  const W_IO           = 0.15;              // inherent-score weight on collective IO sentiment (direct)
  const SLOPE_REF      = 0.3;               // lean change over the window that counts as full-scale
  const DIR            = 1;                 // PseudoChaser longs → favourable structure is bullish/rising

  window.__BotPlugin = {
    id:        'ashfall-chaser',
    name:      'Ashfall (Chaser)',
    version:   '1.8.2',
    targetBot: 'pseudochaser',
    after:     ['sunchaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition'],

    css: `
      .ash-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .ash-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.ashfallEnabled"> + Ashfall</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Ashfall</span>
              <span x-show="cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.ashfallEnabled=!cfg.ashfallEnabled;persist()}">
              <div class="tog-t" :class="cfg.ashfallEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Ashfall Mode</div>
                <div class="ash-hint">Learns which market climates correlate with drawdowns vs gains locks, building a historical structure profile over time.</div>
              </div>
            </label>
            <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.ashfallCrossEnabled=!cfg.ashfallCrossEnabled;persist()}">
              <div class="tog-t" :class="cfg.ashfallCrossEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Cross-Signal (Permafrost)</div>
                <div class="ash-hint">Winter cascade → halt + bail all. Winter sacrifice → lift halt.</div>
              </div>
            </label>
            <div x-show="cfg.ashfallCrossEnabled && afCrossEvents.length" class="ash-hint" style="margin-top:5px" x-text="afCrossEvents.slice().reverse().slice(0,3).map(e=>(e.kind==='cascade'?'⚡ Cascade':'🩸 Sacrifice')+' from Winter — '+new Date(e.ts).toISOString().slice(11,19)+' UTC').join(' · ')"></div>
            <div x-show="cfg.ashfallEnabled" style="margin-top:8px">
              <div class="g" x-show="cfg.ashfallEnabled" style="margin-top:10px">
                <div class="lbl">Structure Wave <b x-text="(()=>{ void tick; const s=afStatus.slope??0; return s>0.05?'rising ▲':s<-0.05?'falling ▼':'steady ▬'; })()"></b></div>
                <div x-html="_afWaveSvg()" style="margin-top:4px;border:1px solid rgba(255,150,80,.15);border-radius:3px;background:rgba(255,150,80,.03)"></div>
                <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">
                  <button @click="cfg.ashfallWaveShowMain=!(cfg.ashfallWaveShowMain??true);persist()" :style="(cfg.ashfallWaveShowMain??true)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;cursor:pointer;letter-spacing:.5px">Main</button>
                  <button @click="cfg.ashfallWaveShowVol=!(cfg.ashfallWaveShowVol??true);persist()" :style="(cfg.ashfallWaveShowVol??true)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;cursor:pointer;letter-spacing:.5px">Vol</button>
                  <button @click="cfg.ashfallWaveShowIo=!(cfg.ashfallWaveShowIo??true);persist()" :style="(cfg.ashfallWaveShowIo??true)?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;cursor:pointer;letter-spacing:.5px">IO</button>
                </div>
                <div class="ash-hint">Structure lean path (bull ↑ / bear ↓), up to ~1 week of history. Direction matters — falling tape reads negative for longs even if mildly bullish. History takes priority over the inherent wave when the profile is rich.</div>
                <div class="lbl" style="margin-top:8px">Slope Window <b x-text="(cfg.ashfallSlopeWindowHours??6)+'h'"></b></div>
                <input type="range" min="1" max="24" step="1" x-model.number="cfg.ashfallSlopeWindowHours" @change="persist()">
                <div class="ash-hint">Timeframe for the directional comparison — "turning bullish/bearish" means the avg lean over the last N hours has shifted vs the N hours before it. Default 6h; raise to 12h for a slower, less reactive signal.</div>
                <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <label class="tog" style="font-size:9px" @click="cfg.ashfallIoEnabled=!cfg.ashfallIoEnabled;persist()">
                    <div class="tog-t" :class="cfg.ashfallIoEnabled?'on':''"><div class="tog-k"></div></div>
                    <span class="tog-l">Collective IO</span>
                  </label>
                  <span class="ash-hint" style="margin:0">Aggregates funding rates across all tickers (already in the ticker response — zero extra bandwidth) as a direct crowd-sentiment signal and blends it into the inherent score.</span>
                </div>
                <div x-show="cfg.ashfallIoEnabled && afStatus.ioScore != null" class="ash-hint" style="margin-top:3px">
                  IO <span x-text="afStatus.ioScore>=0?'+':''"></span><span x-text="(afStatus.ioScore??0).toFixed(2)"></span> — <span x-text="(afStatus.ioScore??0)>0.2?'crowd net long':(afStatus.ioScore??0)<-0.2?'crowd net short':'crowd neutral'"></span>
                </div>
              </div>
              <div class="ash-stat" style="margin-top:10px;padding:8px 10px;background:rgba(255,150,80,.05);border:1px solid rgba(255,150,80,.18);border-radius:3px">
                <div>PROFILE — <span x-text="(afEvents||[]).filter(e=>e.kind==='drawdown').length"></span> drawdown / <span x-text="(afEvents||[]).filter(e=>e.kind==='gainslock').length"></span> gains-lock events, <span x-text="(afSamples||[]).filter(s=>s.label!==null).length"></span> labeled samples</div>
                <div x-show="afStatus.at">READING — mag <span x-text="(afStatus.skew??0).toFixed(2)"></span> | breadth <span x-text="(afStatus.breadth??0).toFixed(2)"></span> | score <span x-text="afStatus.score===null?'—':afStatus.score.toFixed(2)"></span> | mass <span x-text="afStatus.mass.toFixed(1)"></span></div>
                <div x-show="afStatus.at">STRUCTURE — lean <span x-text="(afStatus.lean??0).toFixed(2)"></span> | slope <span x-text="(afStatus.slope>=0?'+':'')+(afStatus.slope??0).toFixed(2)"></span> | effective <span x-text="afStatus.eff===null||afStatus.eff===undefined?'—':((afStatus.eff>=0?'+':'')+afStatus.eff.toFixed(2))"></span> for longs</div>
                <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
                  <button @click="afExport()" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,150,80,.4);border-radius:2px;background:none;color:#ff9650;cursor:pointer;letter-spacing:.5px">Export</button>
                  <button @click="if(confirm('Import will replace your current events, samples, and wave history. This cannot be undone — export first if you want to keep the existing profile.\n\nContinue?')){document.getElementById('ash-import-file').click()}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,150,80,.4);border-radius:2px;background:none;color:#ff9650;cursor:pointer;letter-spacing:.5px">Import</button>
                  <input type="file" id="ash-import-file" accept=".json" style="display:none" @change="afImport($event)">
                  <button @click="if(!cfgLocked&&confirm('Clear all Ashfall events, samples, PnL log, and wave history?\n\nThis cannot be undone.')){afEvents=[];afSamples=[];afPnl=[];afWave=[];persist();log('[ASH] Profile cleared.','warn')}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.4);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Profile</button>
                </div>
              </div>
            </div>
            <div x-data="{ dzOpen:false }" style="margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:8px">
              <button @click="dzOpen=!dzOpen" style="font-family:var(--mono);font-size:9px;padding:2px 8px;border:1px solid rgba(255,69,96,.25);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px;display:flex;align-items:center;gap:4px"><span x-text="dzOpen?'▾':'▸'"></span>&nbsp;Danger Zone</button>
              <div x-show="dzOpen" x-transition.opacity style="margin-top:6px;padding:8px;background:rgba(255,69,96,.04);border:1px solid rgba(255,69,96,.18);border-radius:3px">
                <button @click="if(!cfgLocked&&confirm('Wipe ALL Ashfall plugin data from browser storage?\n\nThis clears events, samples, wave history, and the storage key itself — nothing will remain. Export first if you want to preserve the profile.\n\nThis cannot be undone.')){localStorage.removeItem('__ashfall_chaser_v1');afEvents=[];afSamples=[];afPnl=[];afWave=[];persist();log('[ASH] Plugin state cleared from storage.','warn')}" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Plugin State</button>
                <div class="ash-hint" style="margin-top:4px">Wipes all Ashfall data from browser storage — events, samples, and wave history. Also clears the storage key so no orphaned data lingers if the plugin is removed. Export first if you want to preserve the profile.</div>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origPers  = def.persist;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;

      let _afCrossLastCascadeActed  = 0;
      let _afCrossLastSacrificeActed = 0;

      return Object.assign({}, def, {

        afEvents:  [],   // { ts, kind:'drawdown'|'gainslock', skew, breadth, gCount, lCount, gSum, lSum }
        afSamples: [],   // { ts, skew, breadth, label } — label null until the 6h window resolves
        afPnl:     [],   // { ts, pnl } — plugin-owned closed-trade log for sample labeling
        afWave:    [],   // { ts, lean } — structure-lean trajectory, retained up to ~a week (the "wave")
        _afStructureList: null, _afStructureAt: 0, // own 3h ticker cache independent of host
        afStatus:  { skew: null, breadth: null, score: null, mass: 0, lean: 0, slope: 0, inherent: 0, eff: null, ioScore: null, at: 0 },
        afCrossEvents: [],

        async init() {
          await _origInit.call(this);
          if (this.cfg.ashfallEnabled          === undefined) this.cfg.ashfallEnabled          = false;
          if (this.cfg.ashfallSlopeWindowHours === undefined) this.cfg.ashfallSlopeWindowHours = 6;
          if (this.cfg.ashfallIoEnabled        === undefined) this.cfg.ashfallIoEnabled        = true;
          if (this.cfg.ashfallWaveShowMain     === undefined) this.cfg.ashfallWaveShowMain     = true;
          if (this.cfg.ashfallWaveShowVol      === undefined) this.cfg.ashfallWaveShowVol      = true;
          if (this.cfg.ashfallWaveShowIo       === undefined) this.cfg.ashfallWaveShowIo       = true;
          if (this.cfg.ashfallCrossEnabled     === undefined) this.cfg.ashfallCrossEnabled     = true;
          try {
            const raw = localStorage.getItem(ASH_KEY);
            if (raw) {
              const s = JSON.parse(raw);
              if (Array.isArray(s.events))  this.afEvents  = s.events.slice(-EVENTS_CAP);
              if (Array.isArray(s.samples)) this.afSamples = s.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(s.pnl))     this.afPnl     = s.pnl.filter(e => Date.now() - e.ts < PNL_LOG_TTL);
              if (Array.isArray(s.wave))    this.afWave    = s.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              if (typeof s.crossLastCascadeActed  === 'number') _afCrossLastCascadeActed  = s.crossLastCascadeActed;
              if (typeof s.crossLastSacrificeActed === 'number') _afCrossLastSacrificeActed = s.crossLastSacrificeActed;
            }
          } catch(e) {}
          this.log(`[ASH] Ashfall (Chaser) v1.9.0 loaded — ${this.cfg.ashfallEnabled ? 'enabled' : 'disabled'} | ${this.afEvents.length} events, ${this.afSamples.length} samples on record`, 'info');
        },

        persist() {
          _origPers.call(this);
          try {
            localStorage.setItem(ASH_KEY, JSON.stringify({
              events: this.afEvents, samples: this.afSamples, pnl: this.afPnl, wave: this.afWave,
              crossLastCascadeActed: _afCrossLastCascadeActed,
              crossLastSacrificeActed: _afCrossLastSacrificeActed,
            }));
          } catch(e) {}
        },

        // ── Market structure reading — full ticker universe, not the curated pools ──
        async _afFetchStructure() {
          try {
            // Reuse the host scan's bulk ticker response when fresh (slow-tick
            // sampling during halts falls back to fetching — scans don't run then)
            const cooldownMs = (this.cfg.bulkTickerCooldownHours ?? 3) * 3600 * 1000;
            let list;
            if (this._afStructureList?.length && (Date.now() - (this._afStructureAt || 0)) < cooldownMs) {
              list = this._afStructureList; // own cache within cooldown
            } else if (this._lastAllTickers?.length && (Date.now() - (this._lastAllTickersAt || 0)) < 60000) {
              list = this._lastAllTickers;  // host just fetched this tick — piggyback
              this._afStructureList = list;
              this._afStructureAt   = this._lastAllTickersAt;
            } else {
              const r = await fetch(`${this.base}/v5/market/tickers?category=linear`);
              const d = await r.json();
              if (d.retCode !== 0) return null;
              list = d.result?.list || [];
              this._afStructureList = list;
              this._afStructureAt   = Date.now();
            }
            let gSum = 0, lSum = 0, gCount = 0, lCount = 0;
            let gTurnover = 0, lTurnover = 0;
            let frSum = 0, frCount = 0;
            for (const t of list) {
              if (!t.symbol.endsWith('USDT') || t.symbol === 'BTCUSDT') continue;
              if (parseFloat(t.lastPrice || 0) < 0.001) continue;
              const ch  = parseFloat(t.price24hPcnt || 0) * 100;
              const tvr = parseFloat(t.turnover24h  || 0);
              if (ch > 0)      { gSum += ch; gCount++; gTurnover += tvr; }
              else if (ch < 0) { lSum += Math.abs(ch); lCount++; lTurnover += tvr; }
              const fr = parseFloat(t.fundingRate || 0);
              if (!isNaN(fr)) { frSum += fr * 100; frCount++; } // accumulate as %
            }
            const sumT   = gSum + lSum, cntT = gCount + lCount;
            const totalTvr = gTurnover + lTurnover;
            const vol    = totalTvr > 0 ? +((gTurnover - lTurnover) / totalTvr).toFixed(4) : 0;
            const volAbs = +(totalTvr / 1e9).toFixed(2); // USD billions

            // Collective IO from aggregate funding rate: positive funding = longs paying = crowd net long.
            // Normalised against 0.05% reference (≈5× the typical 0.01%/8h baseline) → [-1, 1].
            const ioScore = frCount > 0
              ? +Math.max(-1, Math.min(1, (frSum / frCount) / 0.05)).toFixed(4)
              : null;

            return {
              ts: Date.now(),
              skew:    sumT > 0 ? (gSum - lSum) / sumT : 0,
              breadth: cntT > 0 ? (gCount - lCount) / cntT : 0,
              gCount, lCount,
              gSum: +gSum.toFixed(1), lSum: +lSum.toFixed(1),
              vol, volAbs, ioScore,
            };
          } catch(e) { return null; }
        },

        // ── Human-readable structure + historical-bias phrasing for the activity log ──
        // Intensity ranges over mildly / moderately / strongly bullish (or bearish). The
        // tiers are entirely relative to this installation's own history: thresholds are
        // the 25th / 50th / 80th percentiles of |lean| across recorded events + samples,
        // so they shift as the profile collects more data. Fixed fallbacks
        // (0.08 / 0.20 / 0.40) apply until at least 30 readings are on record.
        _afDescribe(reading, score, mass) {
          const lean = (reading.skew + reading.breadth) / 2;
          const hist = [...this.afEvents, ...this.afSamples]
            .map(x => Math.abs((x.skew + x.breadth) / 2))
            .sort((a, b) => a - b);
          const q = p => hist[Math.min(hist.length - 1, Math.floor(p * hist.length))];
          const [tFlat, tModerate, tStrong] = hist.length >= 30 ? [q(0.25), q(0.5), q(0.8)] : [0.08, 0.20, 0.40];
          const mag    = Math.abs(lean);
          const adverb = mag >= tStrong ? 'strongly ' : mag >= tModerate ? 'moderately ' : 'mildly ';
          const struct = mag <= tFlat ? 'mixed/flat' : `${adverb}${lean > 0 ? 'bullish' : 'bearish'}`;
          const slope  = this._afTrajectory().slope;
          const trend  = slope > 0.05 ? ', rising (turning bullish)' : slope < -0.05 ? ', falling (turning bearish)' : ', steady';
          const ioStr  = reading.ioScore != null ? `, io ${reading.ioScore >= 0 ? '+' : ''}${reading.ioScore.toFixed(2)}` : '';
          const desc   = `${struct}${trend} (mag ${reading.skew.toFixed(2)}, breadth ${reading.breadth.toFixed(2)}, slope ${slope >= 0 ? '+' : ''}${slope.toFixed(2)}${ioStr}, ${reading.gCount}▲/${reading.lCount}▼)`;
          const inherent = this._afInherent(lean, slope, reading.ioScore ?? null);
          const eff      = this._afEffectiveScore(score, mass, inherent);
          let bias;
          if (score === null || mass < MIN_MASS) bias = `thin history (mass ${mass.toFixed(1)} < ${MIN_MASS}) — leaning on inherent structure (${eff >= 0 ? '+' : ''}${eff.toFixed(2)} for longs)`;
          else if (score >= 0.15)  bias = `historically good for longs (score +${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else if (score <= -0.15) bias = `historically bad for longs (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else                     bias = `historically neutral for longs (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          if (score !== null && mass >= MIN_MASS && Math.abs(eff - score) >= 0.1) bias += ` | structure shifts the effective read to ${eff >= 0 ? '+' : ''}${eff.toFixed(2)}`;
          return { desc, bias, eff };
        },

        // ── The wave: recent path of the structure lean (oldest → newest) ──
        // lean = (skew + breadth) / 2 ∈ [−1,1]: +1 strongly bullish, −1 strongly bearish.
        _afWaveSeries() {
          const cut = Date.now() - WAVE_TTL_MS;
          return this.afWave.filter(p => p.ts >= cut);
        },

        // Append a structure-lean point to the wave and prune by age / cap. Kept
        // separate from afSamples (which get pruned for scoring) so the wave
        // retains the full trajectory for as long as we have data, up to ~a week.
        _afPushWave(reading) {
          this.afWave.push({ ts: reading.ts, lean: +(((reading.skew + reading.breadth) / 2)).toFixed(4), vol: reading.vol ?? 0, volAbs: reading.volAbs ?? 0, io: reading.ioScore ?? null });
          const cut = Date.now() - WAVE_TTL_MS;
          if (this.afWave.length && this.afWave[0].ts < cut) this.afWave = this.afWave.filter(p => p.ts >= cut);
          if (this.afWave.length > WAVE_CAP) this.afWave = this.afWave.slice(-WAVE_CAP);
        },

        // Current lean plus its trajectory (slope = avg lean over last N hours − avg lean N–2N hours ago).
        // Fixed time window (cfg.ashfallSlopeWindowHours, default 6h) so directional signals
        // always reflect the same timeframe regardless of wave history depth.
        // slope > 0 → drifting bullish; slope < 0 → drifting bearish.
        _afTrajectory() {
          const wave = this._afWaveSeries();
          const n    = wave.length;
          const lean = n ? wave[n - 1].lean : (((this.afStatus.skew ?? 0) + (this.afStatus.breadth ?? 0)) / 2);
          if (n < WAVE_MIN_PTS) return { lean, slope: 0, n };
          const winMs     = (this.cfg.ashfallSlopeWindowHours ?? 6) * 3600 * 1000;
          const now       = Date.now();
          const recentPts = wave.filter(p => p.ts >= now - winMs);
          const olderPts  = wave.filter(p => p.ts >= now - 2 * winMs && p.ts < now - winMs);
          if (!recentPts.length || !olderPts.length) return { lean, slope: 0, n };
          const recent = recentPts.reduce((a, p) => a + p.lean, 0) / recentPts.length;
          const older  = olderPts.reduce((a, p) => a + p.lean, 0) / olderPts.length;
          return { lean, slope: recent - older, n };
        },

        // Inherent favourability for this bot's direction (DIR): a long bot likes
        // bullish *and* rising structure. The slope term is what stops us longing
        // into the start of a dump (mildly bullish but turning down).
        _afInherent(lean, slope, ioScore) {
          const slopeN = Math.max(-1, Math.min(1, (slope || 0) / SLOPE_REF));
          const ioN    = ioScore != null ? Math.max(-1, Math.min(1, ioScore)) : 0;
          return Math.max(-1, Math.min(1, DIR * (W_LEAN * (lean || 0) + W_SLOPE * slopeN + W_IO * ioN)));
        },

        // Effective score: learned history is primary, the inherent wave is the
        // fallback — blended by how much evidence the profile actually has.
        _afEffectiveScore(score, mass, inherent) {
          const massFrac = Math.max(0, Math.min(1, (mass || 0) / STRONG_MASS));
          return score === null ? inherent : massFrac * score + (1 - massFrac) * inherent;
        },

        _afCrossRead() {
          try {
            const raw = localStorage.getItem(CROSS_KEY);
            if (!raw) return [];
            const cut = Date.now() - CROSS_TTL;
            return (JSON.parse(raw).events || []).filter(e => e.ts >= cut);
          } catch(e) { return []; }
        },

        _afCrossWrite(kind) {
          try {
            const events = this._afCrossRead();
            events.push({ ts: Date.now(), kind, source: 'chaser' });
            localStorage.setItem(CROSS_KEY, JSON.stringify({ events }));
          } catch(e) {}
        },

        async _afCheckCross() {
          if (!this.cfg.ashfallCrossEnabled) return;
          const fromWinter = this._afCrossRead().filter(e => e.source === 'winter');
          this.afCrossEvents = fromWinter.slice(-10);

          const lat = kind => fromWinter.filter(e => e.kind === kind).reduce((m, e) => !m || e.ts > m.ts ? e : m, null);
          const latCascade  = lat('cascade');
          const latSacrifice = lat('sacrifice');

          if (latCascade && latCascade.ts > _afCrossLastCascadeActed) {
            _afCrossLastCascadeActed = latCascade.ts;
            const haltMs = (this.cfg.drawdownHaltHours ?? 6) * 3600 * 1000;
            this._drawdownHaltUntil = Date.now() + haltMs;
            this.log(`[ASH] ♨ Cross-signal — Winter cascade at ${new Date(latCascade.ts).toISOString().slice(11,19)} UTC → drawdown halt ${this.cfg.drawdownHaltHours ?? 6}h + bailing all Chaser positions`, 'warn');
            this.bailAll().catch(() => {});
            this._afFetchStructure().then(r => {
              if (!r) return;
              this.afEvents.push({ ts: r.ts, kind: 'drawdown', skew: r.skew, breadth: r.breadth, gCount: r.gCount, lCount: r.lCount, gSum: r.gSum, lSum: r.lSum, _cross: true });
              if (this.afEvents.length > EVENTS_CAP) this.afEvents = this.afEvents.slice(-EVENTS_CAP);
              this._afPushWave(r);
              this.persist();
            }).catch(() => {});
          }

          if (latSacrifice && latSacrifice.ts > _afCrossLastSacrificeActed && this._isDrawdownHalted()) {
            _afCrossLastSacrificeActed = latSacrifice.ts;
            this._drawdownHaltUntil = 0;
            this._drawdownWindow = [];
            this.log(`[ASH] ♨ Cross-signal — Winter sacrifice at ${new Date(latSacrifice.ts).toISOString().slice(11,19)} UTC → drawdown halt lifted, Chaser re-enabled`, 'success');
            this._afFetchStructure().then(r => {
              if (!r) return;
              this.afEvents.push({ ts: r.ts, kind: 'gainslock', skew: r.skew, breadth: r.breadth, gCount: r.gCount, lCount: r.lCount, gSum: r.gSum, lSum: r.lSum, _cross: true });
              if (this.afEvents.length > EVENTS_CAP) this.afEvents = this.afEvents.slice(-EVENTS_CAP);
              this._afPushWave(r);
              this.persist();
            }).catch(() => {});
          }
        },

        // Inline SVG wave plot — time-based 1-week window, bins data into pixel columns so
        // the chart compacts automatically as history grows (no index stretching).
        _afWaveSvg() {
          void this.tick;
          const wave = this._afWaveSeries();
          const W = 260, H = 64, pad = 6;
          const y = lean => pad + ((1 - lean) / 2) * (H - 2 * pad);
          const mid = y(0);
          const placeholder = `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block"><line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="rgba(255,255,255,.15)" stroke-dasharray="3 3"/><text x="${W/2}" y="${H/2+3}" fill="rgba(255,255,255,.35)" font-size="9" font-family="monospace" text-anchor="middle">gathering structure history…</text></svg>`;
          if (wave.length < 2) return placeholder;
          const now = Date.now();
          const tMin = now - WAVE_TTL_MS;
          const plotW = W - 2 * pad;
          const BINS = Math.floor(plotW);
          const bins = new Array(BINS).fill(null).map(() => ({ sum: 0, n: 0 }));
          for (const p of wave) {
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            bins[bi].sum += p.lean; bins[bi].n++;
          }
          const pts = [];
          for (let i = 0; i < BINS; i++) {
            if (!bins[i].n) continue;
            pts.push({ x: pad + i + 0.5, lean: bins[i].sum / bins[i].n });
          }
          if (pts.length < 2) return placeholder;

          const vBins = new Array(BINS).fill(null).map(() => ({ vSum: 0, aSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.vol == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            vBins[bi].vSum += p.vol; vBins[bi].aSum += (p.volAbs ?? Math.abs(p.vol)); vBins[bi].n++;
          }
          const volPts = [];
          for (let i = 0; i < BINS; i++) {
            if (!vBins[i].n) continue;
            volPts.push({ x: pad + i + 0.5, v: vBins[i].vSum / vBins[i].n, abs: vBins[i].aSum / vBins[i].n });
          }
          const maxAbs = Math.max(...volPts.map(p => p.abs), 0.001);
          let volSvg = '';
          for (let i = 1; i < volPts.length; i++) {
            const p1 = volPts[i-1], p2 = volPts[i];
            const relAbs = ((p1.abs + p2.abs) / 2) / maxAbs;
            const op = (0.12 + relAbs * 0.55).toFixed(2);
            volSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.v).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.v).toFixed(1)}" stroke="rgba(255,185,50,${op})" stroke-width="1"/>`;
          }

          // IO line: crowd funding-rate sentiment; only present in newer wave entries (guard p.io != null)
          const ioBins = new Array(BINS).fill(null).map(() => ({ iSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.io == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            ioBins[bi].iSum += p.io; ioBins[bi].n++;
          }
          const ioPts = [];
          for (let i = 0; i < BINS; i++) {
            if (!ioBins[i].n) continue;
            ioPts.push({ x: pad + i + 0.5, io: ioBins[i].iSum / ioBins[i].n });
          }
          let ioSvg = '';
          for (let i = 1; i < ioPts.length; i++) {
            const p1 = ioPts[i-1], p2 = ioPts[i];
            ioSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.io).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.io).toFixed(1)}" stroke="rgba(200,150,255,0.5)" stroke-width="1" stroke-dasharray="3 2"/>`;
          }

          const showMain = this.cfg.ashfallWaveShowMain ?? true;
          const showVol = this.cfg.ashfallWaveShowVol ?? true;
          const showIo  = this.cfg.ashfallWaveShowIo  ?? true;
          const cur = pts[pts.length - 1].lean;
          const col = cur > 0.05 ? 'var(--profit)' : cur < -0.05 ? 'var(--short)' : '#ff9650';
          const polyPts = pts.map(p => `${p.x.toFixed(1)},${y(p.lean).toFixed(1)}`).join(' ');
          const cx = pts[pts.length - 1].x, cy = y(cur);
          return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block">`
            + `<line x1="0" y1="${pad}" x2="${W}" y2="${pad}" stroke="rgba(0,229,160,.12)"/>`
            + `<line x1="0" y1="${(H-pad).toFixed(1)}" x2="${W}" y2="${(H-pad).toFixed(1)}" stroke="rgba(255,69,96,.12)"/>`
            + `<line x1="0" y1="${mid.toFixed(1)}" x2="${W}" y2="${mid.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-dasharray="3 3"/>`
            + (showVol ? volSvg : '')
            + (showIo  ? ioSvg  : '')
            + (showMain ? `<polyline points="${polyPts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>` : '')
            + (showMain ? `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="${col}"/>` : '')
            + `<text x="2" y="${pad+7}" fill="rgba(0,229,160,.5)" font-size="8" font-family="monospace">bull</text>`
            + `<text x="2" y="${(H-pad-1).toFixed(1)}" fill="rgba(255,69,96,.5)" font-size="8" font-family="monospace">bear</text>`
            + (showVol ? `<text x="${W-18}" y="${pad+7}" fill="rgba(255,185,50,.45)" font-size="8" font-family="monospace">vol</text>` : '')
            + (showIo && ioPts.length >= 2 ? `<text x="${W-10}" y="${pad+17}" fill="rgba(200,150,255,.45)" font-size="8" font-family="monospace">io</text>` : '')
            + `</svg>`;
        },

        // ── Hostility score: kernel-weighted, recency-decayed vote of past events
        // and labeled samples near the given reading. score ∈ [−1,1]; mass = evidence weight.
        _afScore(reading) {
          const now = Date.now();
          let num = 0, mass = 0;
          const tally = (skew, breadth, label, w, ts) => {
            const ds = reading.skew - skew, db = reading.breadth - breadth;
            const k  = Math.exp(-(ds * ds + db * db) / (2 * KERNEL_H * KERNEL_H));
            const dec = Math.pow(0.5, (now - ts) / HALF_LIFE_MS);
            num  += w * label * k * dec;
            mass += w * k * dec;
          };
          for (const e of this.afEvents) tally(e.skew, e.breadth, e.kind === 'drawdown' ? -1 : 1, EVENT_W, e.ts);
          for (const s of this.afSamples) { if (s.label !== null) tally(s.skew, s.breadth, s.label, SAMPLE_W, s.ts); }
          return { score: mass > 0 ? num / mass : null, mass };
        },

        // ── Label samples whose 6h window has resolved; drop windows with no closed trades ──
        _afStampSamples() {
          const now = Date.now();
          const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          this.afSamples = this.afSamples.filter(s => {
            if (s.label !== null || now - s.ts < LABEL_WINDOW) return true;
            const trades = this.afPnl.filter(p => p.ts > s.ts && p.ts <= s.ts + LABEL_WINDOW);
            if (!trades.length) return false; // nothing closed — no evidence either way
            const pnl = trades.reduce((a, p) => a + p.pnl, 0);
            s.label = Math.max(-1, Math.min(1, pnl / entryMargin));
            return true;
          });
          if (this.afSamples.length > SAMPLES_CAP) this.afSamples = this.afSamples.slice(-SAMPLES_CAP);
        },

        _afAddSample(reading) {
          this._afStampSamples();
          this.afSamples.push({ ts: reading.ts, skew: reading.skew, breadth: reading.breadth, label: null });
          this._afPushWave(reading);
          const { score, mass } = this._afScore(reading);
          const { lean, slope } = this._afTrajectory();
          const inherent = this._afInherent(lean, slope, reading.ioScore ?? null);
          const eff = this._afEffectiveScore(score, mass, inherent);
          this.afStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, lean, slope, inherent, eff, ioScore: reading.ioScore ?? null, at: reading.ts };
        },

        afExport() {
          const blob = new Blob([JSON.stringify({ exportedAt: Date.now(), events: this.afEvents, samples: this.afSamples, wave: this.afWave }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `ashfall-chaser-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
        },

        afImport(e) {
          const file = e.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const d = JSON.parse(ev.target.result);
              if (Array.isArray(d.events))  this.afEvents  = d.events.slice(-EVENTS_CAP);
              if (Array.isArray(d.samples)) this.afSamples = d.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(d.wave))    this.afWave    = d.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              this.persist();
              this.log(`[ASH] Profile imported — ${this.afEvents.length} events, ${this.afSamples.length} samples, ${this.afWave.length} wave points`, 'info');
            } catch(err) {
              this.log('[ASH] Import failed — file could not be parsed as a valid Ashfall profile', 'warn');
            }
            e.target.value = '';
          };
          reader.readAsText(file);
        },

        async runScan() {
          await _origScan.call(this);
          if (!this.cfg.ashfallEnabled) return;
          this._afCheckCross().catch(() => {});
          this._afFetchStructure().then(r => {
            if (!r) return;
            this._afAddSample(r);
            const { score, mass } = this.afStatus;
            const _d = this._afDescribe(r, score, mass);
            this.log(`[ASH] ♨ Routine market structure check — market is ${_d.desc} | ${_d.bias}`, 'info');
            this.persist();
          }).catch(() => {});
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if ((this.closedTrades?.length ?? 0) > prevLen) {
            // totalPnl (incl. funding) is what the base feeds its halt windows
            const t   = this.closedTrades[0];
            const pnl = t?.totalPnl ?? t?.pnl;
            if (typeof pnl === 'number') {
              const now = Date.now();
              this.afPnl.push({ ts: now, pnl });
              this.afPnl = this.afPnl.filter(e => now - e.ts < PNL_LOG_TTL);
            }
          }
          if (this.cfg.ashfallCrossEnabled) {
            if (reason === 'cascade' || reason === 'sacrifice') this._afCrossWrite(reason);
            else if (reason === 'sl') this._afCrossWrite('sacrifice');
            else if (reason === 'tp') this._afCrossWrite('cascade');
          }
        },

      });
    },
  };
})();
</script>
