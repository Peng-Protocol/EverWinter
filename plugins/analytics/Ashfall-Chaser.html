<!--
  Ashfall Strategy Plugin for PseudoChaser
  Builds a learned market-structure profile by recording the climate at every
  drawdown-throttle and gains-lock event — drawdown events mark hostile climate,
  gains-lock events mark favorable climate. Scan cycles add weaker PnL-labeled
  samples between those anchors.

  Structure trajectory ("the wave"): a reading is judged in the context of what
  preceded it, not in isolation. The recent path of the structure lean is tracked
  and plotted in the accordion, and its direction folds into an inherent bull⇄bear
  oscillation prior — so a mildly-bullish tape that is turning down reads negative
  (don't long into the start of a dump). Learned history stays primary; the
  inherent wave only takes the helm when the profile is thin.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation — the same logic powers Permafrost on PseudoWinter.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const VERSION        = '1.29.5';
  const ASH_KEY        = '__ashfall_chaser_v1';
  const ASH_LIQ_KEY         = '__ash_liq_batches';
  const ASH_LIQ_HISTORY_KEY = '__ash_liq_history';
  const CROSS_KEY      = '__everwinter_cross_v1';
  const CROSS_TTL      = 6 * 3600 * 1000;
  const SCORE_KEY      = '__everwinter_scorecard_v1';
  const SCORE_SAFETY_TTL = 365 * 24 * 3600 * 1000;
  const afCritEmoji = c => {
    if (/^fund/.test(c)) { const s = c.slice(4); const isNeg = s[0] === '-' || s === '<'; return (isNeg ? '🤑' : '💸') + s; }
    if (/^vm/.test(c))   return '🔊' + c.slice(2);
    if (/^lsa/.test(c))  return '🟥' + c.slice(3);
    if (/^lba/.test(c))  return '🟩' + c.slice(3);
    if (/^rasl/.test(c)) return '🔴' + c.slice(4);
    if (/^rabl/.test(c)) return '🟢' + c.slice(4);
    if (/^msliq/.test(c)) return '💦' + c.slice(5);
    if (/^mbliq/.test(c)) return '🌨️' + c.slice(5);
    if (/^sliq/.test(c)) return '🥵' + c.slice(4);
    if (/^bliq/.test(c)) return '🥶' + c.slice(4);
    if (/^iot/.test(c))  return '🎲' + c.slice(3);
    if (/^iom/.test(c))  return '🧲' + c.slice(3);
    if (c === '+24h') return '⬆️'; if (c === '-24h') return '⬇️';
    if (c === '+fund') return '💸'; if (c === '-fund') return '🤑';
    if (c === '>10pct') return '🔊'; if (c === '<10pct') return '🔉';
    return c;
  };
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old burns fade
  const MIN_MASS       = 6;                    // effective evidence mass required to override the timer
  const STRONG_MASS    = 12;                   // evidence mass for a *strong* historical bias (2× MIN_MASS)
  const STRONG_SCORE   = 0.30;                 // |score| at/above which the bias counts as strong
  const DEFAULT_HALT_MS = 12 * 3600 * 1000;    // stock 12h horizon — the floor unless strong history says otherwise
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never resume before 1h (only reachable under a strong bias)
  const EVENTS_CAP     = 200;
  const CLOSES_CAP     = 500;
  const SAMPLE_STATE_KEY = '__ew_sample_state_v1'; // cross-bot sample sharing

  // ── Structure trajectory ("the wave") ──
  // A reading isn't just where the market is now — it's where it came from. We
  // track the recent path of the structure lean and read its direction, then
  // fold an *inherent* oscillation prior (markets swing strongly bullish ⇄
  // strongly bearish) into the decision. History stays primary; the inherent
  // wave only takes the helm when the learned profile is thin.
  const WAVE_TTL_MS    = 7 * 24 * 3600 * 1000; // wave retains as much structure history as we have, up to ~a week
  const WAVE_CAP       = 2000;              // hard cap on stored wave points
  const WAVE_MIN_PTS   = 3;                 // readings needed before a trajectory is meaningful
  const W_LEAN         = 0.6;               // inherent-score weight on the current structure level
  const W_SLOPE        = 0.4;               // inherent-score weight on the trajectory (where it's heading)
  const W_IO           = 0.15;              // inherent-score weight on collective IO sentiment (direct)
  const SLOPE_REF      = 0.3;               // lean change over the window that counts as full-scale
  const DIR            = 1;                 // PseudoChaser longs → favourable structure is bullish/rising

  window.__BotPlugin = {
    id:        'ashfall-chaser',
    name:      'Ashfall (Chaser)',
    version:   VERSION,
    targetBot: 'pseudochaser',
    after:     ['sunchaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition'],

    css: `
      .ash-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .ash-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
      .ash-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .ash-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .ash-tab.on { border-color:rgba(255,150,80,.6); color:#ff9650; background:rgba(255,150,80,.08); }
      .ash-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .ash-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
      .ash-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.ashfallEnabled"> + Ashfall</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false, tC: false, tS: false, tW: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Ashfall</span>
              <span x-show="cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.ashfallEnabled=!cfg.ashfallEnabled;persist()}">
              <div class="tog-t" :class="cfg.ashfallEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Ashfall Mode</div>
                <div class="ash-hint">Learns which market climates correlate with drawdowns vs gains locks, building a historical structure profile over time.</div>
              </div>
            </label>
            <div class="ash-tabs" style="margin-top:10px">
              <button class="ash-tab" :class="tC?'on':''" @click="tC=!tC">CROSS</button>
              <button class="ash-tab" :class="tS?'on':''" @click="tS=!tS">SCORE</button>
              <button class="ash-tab" :class="tW?'on':''" @click="tW=!tW">WAVE</button>
            </div>
            <div class="ash-zone" x-show="tC">
              <label class="tog" @click.prevent="if(!cfgLocked){cfg.ashfallCrossEnabled=!cfg.ashfallCrossEnabled;persist()}">
                <div class="tog-t" :class="cfg.ashfallCrossEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Cross Broadcast (Permafrost)</div>
                  <div class="ash-hint">Broadcasts cascade/sacrifice on close and DDH/gains-lock transitions to Permafrost.</div>
                </div>
              </label>
              <div x-show="cfg.ashfallCrossEnabled" style="margin-top:6px">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.ashfallMutualDdLiftEnabled=!cfg.ashfallMutualDdLiftEnabled;persist()}">
                  <div class="tog-t" :class="cfg.ashfallMutualDdLiftEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Mutual DDH Lift</div>
                    <div class="ash-hint">When Permafrost is also in drawdown halt, lifts this bot's halt. Checked every 15 s.</div>
                  </div>
                </label>
                <label class="tog" style="margin-top:6px" @click.prevent="if(!cfgLocked){cfg.ashfallGainsContinuationEnabled=!cfg.ashfallGainsContinuationEnabled;persist()}">
                  <div class="tog-t" :class="cfg.ashfallGainsContinuationEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Gains Continuation</div>
                    <div class="ash-hint">When Permafrost reaches its gains threshold and broadcasts a Gains Continuation signal, resets this bot's drawdown throttle to its full configured duration.</div>
                  </div>
                </label>
              </div>
              <div x-show="cfg.ashfallCrossEnabled && afCrossEvents.length" class="ash-hint" style="margin-top:5px" x-text="afCrossEvents.slice().reverse().slice(0,3).map(e=>(e.kind==='cascade'?'⚡ Cascade':'🩸 Sacrifice')+' from Winter — '+new Date(e.ts).toISOString().slice(11,19)+' UTC').join(' · ')"></div>
            </div>
            <div class="ash-zone" x-show="tS">
              <label class="tog" @click.prevent="if(!cfgLocked){cfg.ashfallScorecardEnabled=!cfg.ashfallScorecardEnabled;_afScoreBuild();persist()}">
                <div class="tog-t" :class="cfg.ashfallScorecardEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Slot Scorecard</div>
                  <div class="ash-hint">Cumulative PnL per MIC slot combo across both bots. Partner closes are direction-inverted. Best → worst, left to right.</div>
                </div>
              </label>
              <div x-show="cfg.ashfallScorecardEnabled" style="margin-top:8px">
                <div class="g">
                  <div class="lbl">Sponge Quota <b x-text="cfg.afSpongeQuota??30"></b> closes/slot</div>
                  <input type="range" min="10" max="200" step="10" x-model.number="cfg.afSpongeQuota" @change="_afScoreBuild();persist()">
                  <div class="ash-hint">Max recent closes per slot used to compute scores. Older records beyond this count are ignored. Lower = faster adaptation.</div>
                </div>
                <div class="g" style="margin-top:8px">
                  <div class="lbl">Stale Purge <b x-text="cfg.afStaleSlotDays??7"></b> days</div>
                  <input type="range" min="1" max="90" step="1" x-model.number="cfg.afStaleSlotDays" @change="_afScoreTrim();_afScoreBuild();persist()">
                  <div class="ash-hint">Slots with no new closes in this many days are fully removed from the scorecard.</div>
                </div>
                <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.afHistScoringEnabled=!cfg.afHistScoringEnabled;_afScoreBuild();persist()}">
                  <div class="tog-t" :class="cfg.afHistScoringEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Include Historical Scores</div>
                    <div class="ash-hint">Includes MIC historical (simulated) closes in scorecard calculations. Disable to see real-trades-only profile.</div>
                  </div>
                </label>
                <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.ashfallAutoBlock=!cfg.ashfallAutoBlock;_afScoreBuild();persist()}">
                  <div class="tog-t" :class="cfg.ashfallAutoBlock?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Auto Block</div>
                    <div class="ash-hint">Gates per-slot blocking by scorecard data. Enable conditions below.</div>
                  </div>
                </label>
                <div x-show="cfg.ashfallAutoBlock" style="margin-top:6px;padding:6px 8px;background:rgba(255,80,80,.03);border:1px solid rgba(255,80,80,.1);border-radius:3px">
                  <label class="tog" @click.prevent="if(!cfgLocked){cfg.afThresholdBlock=!cfg.afThresholdBlock;_afScoreBuild();persist()}">
                    <div class="tog-t" :class="cfg.afThresholdBlock?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Threshold Block</div>
                      <div class="ash-hint">Blocks if own loss sum OR partner win sum individually exceeds the threshold. Wins don't offset losses.</div>
                    </div>
                  </label>
                  <label class="tog" style="margin-top:6px" @click.prevent="if(!cfgLocked){cfg.afCombinedBlock=!cfg.afCombinedBlock;_afScoreBuild();persist()}">
                    <div class="tog-t" :class="cfg.afCombinedBlock?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Combined PnL Block</div>
                      <div class="ash-hint">Blocks if total net PnL (own + inverted partner) falls below minus the threshold. Wins offset losses.</div>
                    </div>
                  </label>
                  <div class="g" style="margin-top:6px">
                  <div class="lbl">Block Threshold <b x-text="'-$'+(((cfg.minNotional||6)/(cfg.leverage||6))*(cfg.ashfallSlotLossThreshold??0.25)).toFixed(2)"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'('+(Math.round((cfg.ashfallSlotLossThreshold??0.25)*100))+'% margin)'"></span></div>
                  <input type="range" min="0.05" max="1.00" step="0.05" x-model.number="cfg.ashfallSlotLossThreshold" @change="_afScoreBuild();persist()">
                  <div class="ash-hint" style="margin-top:4px" x-text="(()=>{ const n=Object.values(micBlockedSlots||{}).filter(v=>v==='blocked').length; return n===0?'No MIC slots blocked.':n+' slot'+(n===1?'':'s')+' blocked.'; })()"></div>
                  </div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.afCollapsedBlockEnabled=!cfg.afCollapsedBlockEnabled;_afScoreBuild();persist()}">
                    <div class="tog-t" :class="cfg.afCollapsedBlockEnabled?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Collapsed Blocking</div>
                      <div class="ash-hint">Pre-computes entry blocks using collapsed criterion PnL scaled by tier depth. Slot combinations whose aggregate score falls below the threshold are blocked at scan time.</div>
                    </div>
                  </label>
                  <div x-show="cfg.afCollapsedBlockEnabled" style="margin-top:6px;padding:6px 8px;background:rgba(255,80,80,.02);border:1px solid rgba(255,80,80,.08);border-radius:3px">
                    <div class="g">
                      <div class="lbl">Collapsed Threshold <b x-text="'-$'+(((cfg.minNotional||6)/(cfg.leverage||6))*(cfg.afCollapsedBlockThreshold??0.25)).toFixed(2)"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'('+(Math.round((cfg.afCollapsedBlockThreshold??0.25)*100))+'% margin)'"></span></div>
                      <input type="range" min="0.05" max="1.00" step="0.05" x-model.number="cfg.afCollapsedBlockThreshold" @change="_afScoreBuild();persist()">
                    </div>
                    <div class="g" style="margin-top:6px">
                      <div class="lbl">Scale Factor <b x-text="Math.round((cfg.afCollapsedBlockScaleFactor??0.01)*100)+'%'"></b>/tier</div>
                      <input type="range" min="0.001" max="0.05" step="0.001" x-model.number="cfg.afCollapsedBlockScaleFactor" @change="_afScoreBuild();persist()">
                    </div>
                    <div class="g" style="margin-top:6px">
                      <div class="lbl">Tier Cap <b x-text="cfg.afCollapsedBlockTierCap??50"></b></div>
                      <input type="range" min="5" max="200" step="5" x-model.number="cfg.afCollapsedBlockTierCap" @change="_afScoreBuild();persist()">
                    </div>
                    <label class="tog" style="margin-top:6px" @click.prevent="if(!cfgLocked){cfg.afCollapsedBlockManual=!cfg.afCollapsedBlockManual;_afScoreBuild();persist()}">
                      <div class="tog-t" :class="cfg.afCollapsedBlockManual?'on':''"><div class="tog-k"></div></div>
                      <div>
                        <div class="tog-l">Apply to Manual Slots</div>
                        <div class="ash-hint">Also apply collapsed scoring and block evaluation to manual MIC slots.</div>
                      </div>
                    </label>
                    <label class="tog" style="margin-top:6px" @click.prevent="if(!cfgLocked){cfg.afLiveCollapsedBlock=!cfg.afLiveCollapsedBlock;persist()}">
                      <div class="tog-t" :class="cfg.afLiveCollapsedBlock?'on':''"><div class="tog-k"></div></div>
                      <div>
                        <div class="tog-l">Live Collapsed Gate</div>
                        <div class="ash-hint">At scan time, scores each qualifying ticker using its live criterion depths against collapsed PnL. Uses the same threshold, scale factor, and tier cap above.</div>
                      </div>
                    </label>
                  </div>
                </div>
                <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.afCollapsedSort=!cfg.afCollapsedSort;persist()}">
                  <div class="tog-t" :class="cfg.afCollapsedSort?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Collapsed Sorting</div>
                    <div class="ash-hint">Orders entry slots by their aggregate collapsed criterion PnL score, highest first.</div>
                  </div>
                </label>
                <label class="tog" x-show="cfg.afCollapsedSort" style="margin-top:6px;margin-left:10px" @click.prevent="if(!cfgLocked){cfg.afCoQualPenaltyEnabled=!cfg.afCoQualPenaltyEnabled;persist()}">
                  <div class="tog-t" :class="cfg.afCoQualPenaltyEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Co-Qualifying Penalty</div>
                    <div class="ash-hint">Tickers also matching slots with negative collapsed scores are ranked lower. Each additional bad co-qualifying slot deducts from the ticker's sort score.</div>
                  </div>
                </label>
              </div>
            </div>
            <div class="ash-zone" x-show="tW">
              <div x-data="{sm:null}">
                <div style="font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--text-lo);margin-bottom:6px">SCORE METRICS</div>
                <div style="display:flex;gap:3px;flex-wrap:wrap">
                  <button class="ash-opt" @click="sm=(sm==='structure'?null:'structure')" :style="sm==='structure'?'border-color:rgba(255,150,80,.8);color:#ff9650;background:rgba(255,150,80,.25)':(cfg.afScoreMetrics??{}).structure!=null?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">Structure</button>
                  <button class="ash-opt" @click="sm=(sm==='funding'?null:'funding')" :style="sm==='funding'?'border-color:rgba(255,150,80,.8);color:#ff9650;background:rgba(255,150,80,.25)':(cfg.afScoreMetrics??{}).funding!=null?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">Funding</button>
                  <button class="ash-opt" @click="sm=(sm==='liq'?null:'liq')" :style="sm==='liq'?'border-color:rgba(255,150,80,.8);color:#ff9650;background:rgba(255,150,80,.25)':(cfg.afScoreMetrics??{}).liq!=null?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">Liq</button>
                  <button class="ash-opt" @click="sm=(sm==='vol'?null:'vol')" :style="sm==='vol'?'border-color:rgba(255,150,80,.8);color:#ff9650;background:rgba(255,150,80,.25)':(cfg.afScoreMetrics??{}).vol!=null?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">Vol</button>
                  <button class="ash-opt" @click="sm=(sm==='oi'?null:'oi')" :style="sm==='oi'?'border-color:rgba(255,150,80,.8);color:#ff9650;background:rgba(255,150,80,.25)':(cfg.afScoreMetrics??{}).oi!=null?'border-color:rgba(255,150,80,.6);color:#ff9650;background:rgba(255,150,80,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">OI</button>
                </div>
                <div x-show="sm !== null" style="width:100%;margin-top:6px;padding:5px 7px;background:rgba(255,150,80,.06);border:1px solid rgba(255,150,80,.2);border-radius:3px">
                  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                    <span style="font-size:9px;color:var(--text-lo)" x-text="({structure:'Structure',funding:'Funding',liq:'Liq',vol:'Vol',oi:'OI'})[sm]||''"></span>
                    <span x-show="(cfg.afScoreMetrics??{})[sm]!=null" style="display:flex;align-items:center;gap:4px;flex:1">
                      <span style="font-size:9px;color:var(--text-lo)">Weight</span>
                      <input type="range" min="1" max="5" step="1" style="flex:1;min-width:60px" :value="(cfg.afScoreMetrics??{})[sm]??1" @input="(()=>{const k=sm;cfg.afScoreMetrics=Object.assign({},cfg.afScoreMetrics||{},{[k]:parseInt($event.target.value)});persist()})()">
                      <b style="font-size:9px;color:#ff9650;min-width:10px" x-text="(cfg.afScoreMetrics??{})[sm]??1"></b>
                    </span>
                    <button
                      @click="(()=>{const k=sm;if(!k)return;const m=cfg.afScoreMetrics??{};if(m[k]!=null){cfg.afScoreMetrics=Object.fromEntries(Object.entries(m).filter(([x])=>x!==k));}else{cfg.afScoreMetrics={...m,[k]:1};}persist()})()"
                      :style="(cfg.afScoreMetrics??{})[sm]!=null?'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.4);color:rgba(255,100,100,.9)':'font-size:9px;padding:1px 8px;border-radius:2px;cursor:pointer;background:rgba(255,150,80,.1);border:1px solid rgba(255,150,80,.35);color:#ff9650'"
                      x-text="(cfg.afScoreMetrics??{})[sm]!=null?'Remove':'Add'">
                    </button>
                  </div>
                  <div x-show="sm==='oi' && cfg.micFadeOiEnabled" class="ash-hint" style="margin-top:4px;color:rgba(255,150,80,.8)">Mid/tol inherited from Fade Away OI config.</div>
                  <div x-show="sm==='oi' && !cfg.micFadeOiEnabled && (cfg.afScoreMetrics??{}).oi!=null" style="margin-top:4px">
                    <div class="lbl">OI/MC Midpoint <b x-text="(cfg.afWaveOiMid??2)+'%'"></b></div>
                    <input type="range" min="1" max="50" step="1" x-model.number="cfg.afWaveOiMid" @change="persist()">
                    <div class="lbl" style="margin-top:4px">Tolerance <b x-text="'±'+(cfg.afWaveOiTol??1)+' pts'"></b></div>
                    <input type="range" min="1" max="30" step="1" x-model.number="cfg.afWaveOiTol" @change="persist()">
                    <div class="ash-hint" x-text="_micOiSkew?'OI/MC: '+_micOiSkew.ratio.toFixed(2)+'%':'Awaiting OI data.'"></div>
                  </div>
                  <div class="ash-hint" x-show="(cfg.afScoreMetrics??{})[sm]==null">Changes are forward-looking only.</div>
                </div>
              </div>

                  <button x-show="!c" @click="if(!cfgLocked)c=true" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Plugin State</button>
                  <template x-if="c">
                    <span style="display:inline-flex;gap:3px;align-items:center">
                      <span style="font-family:var(--mono);font-size:8px;color:var(--short)">Sure?</span>
                      <button @click="localStorage.removeItem('__ashfall_chaser_v1');afEvents=[];afCloses=[];afWave=[];persist();log('[ASH] Plugin state cleared from storage.','warn'); c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:rgba(255,69,96,.12);color:var(--short);cursor:pointer;letter-spacing:.5px">Yes</button>
                      <button @click="c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(255,255,255,.15);border-radius:2px;background:rgba(255,255,255,.05);color:var(--text-lo);cursor:pointer;letter-spacing:.5px">No</button>

                <div class="ash-hint" style="margin-top:4px">Wipes all Ashfall data from browser storage — events, samples, and wave history. Also clears the storage key so no orphaned data lingers if the plugin is removed. Export first if you want to preserve the profile.</div>
