<!--
  Ashfall Strategy Plugin for PseudoChaser
  Builds a learned market-structure profile by recording the climate at every
  drawdown-throttle and gains-lock event — drawdown events mark hostile climate,
  gains-lock events mark favorable climate. Scan cycles add weaker PnL-labeled
  samples between those anchors.

  Structure trajectory ("the wave"): a reading is judged in the context of what
  preceded it, not in isolation. The recent path of the structure lean is tracked
  and plotted in the accordion, and its direction folds into an inherent bull⇄bear
  oscillation prior — so a mildly-bullish tape that is turning down reads negative
  (don't long into the start of a dump). Learned history stays primary; the
  inherent wave only takes the helm when the profile is thin.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation — the same logic powers Permafrost on PseudoWinter.

  Load via Plugin Manager in PseudoChaser's config panel.
  Load AFTER SunChaser if using live trading — see README Plugin Stack Order.
  targetBot: pseudochaser
-->
<script>
(function () {
  'use strict';

  const VERSION        = '1.57.1';
  // Megacaps excluded from the population pool alongside BTC — their size skews OC/IO/Volume/liq
  // averages the same way BTC would. cfg.megacapExclude is seeded from this default below but is
  // a plain array on cfg (no picker UI) — edit it directly in saved config if the list needs to
  // change. Shared key name with MultiIndicator-Chaser's own seed so either plugin can init it first.
  const DEFAULT_MEGACAP_EXCLUDE = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','TRXUSDT','LINKUSDT'];
  const ASH_KEY        = '__ashfall_chaser_v1';
  const ASH_LIQ_KEY         = '__ash_liq_batches';
  const ASH_LIQ_HISTORY_KEY = '__ash_liq_history';
  const ASH_LIQ_SEQUESTER_KEY = '__ash_liq_sequester';
  const ASH_OC_HIST_KEY     = '__ash_oc_history';
  const CROSS_KEY      = '__everwinter_cross_v1';
  const CROSS_TTL      = 6 * 3600 * 1000;
  const SCORE_KEY      = '__everwinter_scorecard_v1';
  const SCORE_SAFETY_TTL = 365 * 24 * 3600 * 1000;
  // Full-universe PEC/VSG candle log for Pre-Screening — same same-origin-localStorage
  // sharing convention as SCORE_KEY/CROSS_KEY (Ashfall and Permafrost both read/write this,
  // so whichever fetches first each cycle saves the other one the trip), but deliberately
  // its own key rather than the generic _sharedWrite registry: that registry is capped at
  // SHARED_REGISTRY_BYTE_CAP (200KB, in PseudoChaser.html/PseudoWinter.html) sized for small
  // recent-snapshot caches (bulkTickers, pec_1h_last, liqResults) — a real per-symbol candle
  // history for the whole exchange is an order of magnitude bigger and would evict those on
  // arrival. Keyed by granularity bucket ('15m'/'1h'/'3h') so this stays correct even if
  // micPecGranularity and miwPecGranularity are set differently on the two installs.
  const KLINE_LOG_KEY      = '__everwinter_kline_log_v1';
  const KLINE_LOG_BYTE_CAP = 1.5 * 1024 * 1024;
  const afCritEmoji = c => {
    if (/^fund/.test(c)) { const s = c.slice(4); const isNeg = s[0] === '-' || s === '<'; return (isNeg ? '🤑' : '💸') + s; }
    if (/^vm/.test(c))   return '🔊' + c.slice(2);
    if (/^va/.test(c))   return '🔊' + c.slice(2);
    if (/^ioa/.test(c))  return '🎲' + c.slice(3);
    // Retired (see VSG.md) — kept resolvable so old scorecard entries still render.
    if (/^lsa/.test(c))  return '🟥' + c.slice(3);
    if (/^lba/.test(c))  return '🟩' + c.slice(3);
    if (/^rasl/.test(c)) return '🔴' + c.slice(4);
    if (/^rabl/.test(c)) return '🟢' + c.slice(4);
    if (/^msliq/.test(c)) return '💦' + c.slice(5);
    if (/^mbliq/.test(c)) return '🌨️' + c.slice(5);
    if (/^sliq/.test(c)) return '🥵' + c.slice(4);
    if (/^bliq/.test(c)) return '🥶' + c.slice(4);
    if (/^iot/.test(c))  return '🎲' + c.slice(3);
    if (/^iom/.test(c))  return '🧲' + c.slice(3);
    if (/^ocs/.test(c))  return '🔭' + c.slice(3);
    if (/^ocx/.test(c))  return '📡' + c.slice(3);
    if (/^pec([a-z]+)/.test(c)) {
      const m = c.match(/^(pec[a-z]+)/);
      const base = m[1];
      const emoji = { pecob: '⬆️', pecos: '⬇️', pecalpha: '⤵️', pecdelta: '⤴️', pecmomup: '↗️', pecmomdn: '↘️' }[base] || '📊';
      return emoji + c.slice(base.length);
    }
    if (/^vsg([a-z]+)/.test(c)) {
      const m = c.match(/^(vsg[a-z]+)/);
      const base = m[1];
      const emoji = { vsgot: '⏫', vsgut: '⏬', vsgalpha: '🔼', vsgdelta: '🔽', vsgmomup: '⏩', vsgmomdn: '⏪' }[base] || '📊';
      return emoji + c.slice(base.length);
    }
    if (/^regime([a-z]+)/.test(c)) {
      const m = c.match(/^(regime[a-z]+)/);
      const base = m[1];
      const emoji = { regimeslo: '🌤️', regimeblo: '🌤️', regimesmid: '☁️', regimebmid: '☁️', regimeshi: '🌪️', regimebhi: '🌪️' }[base] || '📊';
      return emoji + c.slice(base.length);
    }
    if (c === '+24h') return '⬆️'; if (c === '-24h') return '⬇️';
    if (c === '+fund') return '💸'; if (c === '-fund') return '🤑';
    if (c === '+ocs') return '🔭+'; if (c === '-ocs') return '🔭-';
    if (c === '0liq') return '⚫';
    if (c === '>10pct') return '🔊'; if (c === '<10pct') return '🔉';
    return c;
  };
  // Collapses a single recorded (tiered) criterion down to its base+sign bucket, e.g.
  // "fund+3" -> "fund+", "ocx+18" -> "ocx+". Used both for scorecard display aggregation
  // and for scorecard storage retention — the sponge quota is meant to cap records per
  // base-criterion combination, not per exact tier value (which is combinatorially large
  // and would barely ever repeat, defeating the quota). Bare '+fund'/'-fund' (Blind-Entry/
  // Liquid-Diver's own tag, never produced by MIC which is always tiered) used to fold into
  // 'fund>'/'fund<' here so they'd share MIC's bucket — now that the scorecard is split into
  // separate MIC and Blind-Entry/Liquid-Diver charts that merge no longer serves a purpose,
  // and it was making the collapsed key get read back through afCritEmoji's tiered-fund
  // regex branch instead of its bare-tag branch, showing a stray >/< after the emoji.
  const collapseCrit = c => c.replace(/\d+$/, '');
  const collapseKey = criteria => [...criteria].map(collapseCrit).sort().join(',');
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old burns fade
  const MIN_MASS       = 6;                    // effective evidence mass required to override the timer
  const STRONG_MASS    = 12;                   // evidence mass for a *strong* historical bias (2× MIN_MASS)
  const STRONG_SCORE   = 0.30;                 // |score| at/above which the bias counts as strong
  const DEFAULT_HALT_MS = 12 * 3600 * 1000;    // stock 12h horizon — the floor unless strong history says otherwise
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never resume before 1h (only reachable under a strong bias)
  const EVENTS_CAP     = 200;
  const CLOSES_CAP     = 500;
  const SAMPLE_STATE_KEY = '__ew_sample_state_v1'; // cross-bot sample sharing

  // ── Per-data-type storage cap ──
  // Each distinct data type (wave, liq history, OC history, scorecard, ...) is capped
  // independently at TYPE_BYTE_CAP bytes, trimming its own oldest entries when it alone
  // exceeds budget. Deliberately atomized rather than one blanket cap on the whole plugin
  // blob, so an oversized data type can't force pruning of unrelated data that's still
  // well within budget — e.g. a liq-history spike shouldn't cost wave history records.
  const TYPE_BYTE_CAP = 200 * 1024;
  function trimToByteCap(arr, maxBytes = TYPE_BYTE_CAP) {
    // Assumes arr is ordered oldest-first (push-appended). Converges in a handful of
    // iterations by estimating how many records to drop from the size overshoot, rather
    // than shifting one at a time and re-stringifying the whole array each try.
    if (!Array.isArray(arr) || arr.length < 2) return arr;
    let out = arr;
    let size = new Blob([JSON.stringify(out)]).size;
    let guard = 0;
    while (size > maxBytes && out.length > 1 && guard < 25) {
      const avg = size / out.length;
      const excess = size - maxBytes;
      const drop = Math.min(out.length - 1, Math.max(1, Math.ceil(excess / avg)));
      out = out.slice(drop);
      size = new Blob([JSON.stringify(out)]).size;
      guard++;
    }
    return out;
  }

  // ── Structure trajectory ("the wave") ──
  // A reading isn't just where the market is now — it's where it came from. We
  // track the recent path of the structure lean and read its direction, then
  // fold an *inherent* oscillation prior (markets swing strongly bullish ⇄
  // strongly bearish) into the decision. History stays primary; the inherent
  // wave only takes the helm when the learned profile is thin.
  const WAVE_TTL_MS    = 7 * 24 * 3600 * 1000; // wave retains as much structure history as we have, up to ~a week
  const WAVE_CAP       = 2000;              // hard cap on stored wave points
  const WAVE_MIN_PTS   = 3;                 // readings needed before a trajectory is meaningful
  const W_LEAN         = 0.6;               // inherent-score weight on the current structure level
  const W_SLOPE        = 0.4;               // inherent-score weight on the trajectory (where it's heading)
  const W_FIO          = 0.15;               // inherent-score weight on collective FIO (funding-derived) sentiment (direct)
  const SLOPE_REF      = 0.3;               // lean change over the window that counts as full-scale
  const DIR            = 1;                 // PseudoChaser longs → favourable structure is bullish/rising

  window.__BotPlugin = {
    id:        'ashfall-chaser',
    name:      'Ashfall (Chaser)',
    version:   VERSION,
    targetBot: 'pseudochaser',
    after:     ['sunchaser'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition'],

    css: `
      .ash-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .ash-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
      .ash-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .ash-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .ash-tab.on { border-color:rgba(255,150,80,.6); color:#ff9650; background:rgba(255,150,80,.08); }
      .ash-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .ash-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
      .ash-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.ashfallEnabled"> + Ashfall</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false, tC: false, tS: false, tW: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>♨ Ashfall</span>
              <span x-show="cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,150,80,.15);border:1px solid rgba(255,150,80,.35);border-radius:2px;color:#ff9650;letter-spacing:1px">ON</span>
              <span x-show="!cfg.ashfallEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog">
              <div class="tog-t" :class="cfg.ashfallEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.ashfallEnabled=!cfg.ashfallEnabled;persist()}"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Ashfall Mode</div>
                <div class="ash-hint">Learns from historical market conditions and outcomes to adapt halt timing and entry behavior.</div>
              </div>
            </label>
            <div class="ash-tabs" style="margin-top:10px">
              <button class="ash-tab" :class="tC?'on':''" @click="tC=!tC">CROSS</button>
              <button class="ash-tab" :class="tS?'on':''" @click="tS=!tS">SCORE</button>
              <button class="ash-tab" :class="tW?'on':''" @click="tW=!tW">WAVE</button>
            </div>
            <div class="ash-zone" x-show="tC">
              <label class="tog">
                <div class="tog-t" :class="cfg.ashfallCrossEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.ashfallCrossEnabled=!cfg.ashfallCrossEnabled;persist()}"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Cross Broadcast (Permafrost)</div>
                  <div class="ash-hint">Broadcasts cascade/sacrifice on close and DDH/gains-lock transitions to Permafrost.</div>
                </div>
              </label>
              <div x-show="cfg.ashfallCrossEnabled" style="margin-top:6px">
                <label class="tog">
                  <div class="tog-t" :class="cfg.ashfallMutualDdLiftEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.ashfallMutualDdLiftEnabled=!cfg.ashfallMutualDdLiftEnabled;persist()}"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Mutual DDH Lift</div>
                    <div class="ash-hint">When Permafrost is also in drawdown halt, lifts this bot's halt. Checked every 15 s.</div>
                  </div>
                </label>
                <label class="tog" style="margin-top:6px">
                  <div class="tog-t" :class="cfg.ashfallGainsContinuationEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.ashfallGainsContinuationEnabled=!cfg.ashfallGainsContinuationEnabled;persist()}"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Gains Continuation</div>
                    <div class="ash-hint">When Permafrost reaches its gains threshold and broadcasts a Gains Continuation signal, arms this bot's own drawdown halt for a full configured duration — same as if this bot's own drawdown throttle had just triggered, including bailing open positions if Drawdown Bail is on.</div>
                  </div>
                </label>
                <label class="tog" style="margin-top:6px">
                  <div class="tog-t" :class="cfg.afCrossLiqGraylistEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.afCrossLiqGraylistEnabled=!cfg.afCrossLiqGraylistEnabled;persist()}"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">React to Winter Live-Liq</div>
                    <div class="ash-hint">When Permafrost logs a live liquidation, graylists that ticker from MIC's 0-Liq path for 6h. Only has an effect while this bot's Liquidation Presence isn't Only-1.</div>
                  </div>
                </label>
                <label class="tog" style="margin-top:6px">
                  <div class="tog-t" :class="cfg.afCrossWinGraylistEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.afCrossWinGraylistEnabled=!cfg.afCrossWinGraylistEnabled;persist()}"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">React to Winter 0-Liq Win</div>
                    <div class="ash-hint">When Permafrost wins a 0-Liq trade, graylists that ticker from MIC's live liq entries for 6h. Only has an effect while this bot's Liquidation Presence isn't Only-0.</div>
                  </div>
                </label>
              </div>
              <div x-show="cfg.ashfallCrossEnabled && afCrossEvents.length" class="ash-hint" style="margin-top:5px" x-text="afCrossEvents.slice().reverse().slice(0,3).map(e=>(e.kind==='cascade'?'⚡ Cascade':'🩸 Sacrifice')+' from Winter — '+new Date(e.ts).toISOString().slice(11,19)+' UTC').join(' · ')"></div>
            </div>
            <div class="ash-zone" x-show="tS">
              <label class="tog">
                <div class="tog-t" :class="cfg.ashfallScorecardEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.ashfallScorecardEnabled=!cfg.ashfallScorecardEnabled;_afScoreBuild();persist()}"><div class="tog-k"></div></div>

                  <div class="tog-l">Slot Scorecard</div>

                </div>
              </label>
              <div x-show="cfg.ashfallScorecardEnabled" style="margin-top:8px">
                <div class="g">
                  <div class="lbl">Sponge Quota <b x-text="cfg.afSpongeQuota??30"></b> closes/criterion</div>
                  <input type="range" min="10" max="200" step="10" x-model.number="cfg.afSpongeQuota" @change="_afScoreBuild();persist()">
                  <div class="ash-hint">Max recent closes per criterion used to compute scores. Older records beyond this count are ignored. Lower = faster adaptation.</div>
                </div>
                <div class="g" style="margin-top:8px">
                  <div class="lbl">Stale Purge <b x-text="cfg.afStaleSlotDays??7"></b> days</div>
                  <input type="range" min="1" max="90" step="1" x-model.number="cfg.afStaleSlotDays" @change="_afScoreTrim();_afScoreBuild();persist()">
                  <div class="ash-hint">Slots with no new closes in this many days are fully removed from the scorecard.</div>
                </div>
                <label class="tog" style="margin-top:8px">
                  <div class="tog-t" :class="cfg.afHistScoringEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.afHistScoringEnabled=!cfg.afHistScoringEnabled;_afScoreBuild();persist()}"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Include Historical Scores</div>
                    <div class="ash-hint">Includes MIC historical (simulated) closes in scorecard calculations. Disable to see real-trades-only profile.</div>
                  </div>
                </label>
                <label class="tog" style="margin-top:8px">
                  <div class="tog-t" :class="cfg.afCoQualPenaltyEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.afCoQualPenaltyEnabled=!cfg.afCoQualPenaltyEnabled;persist()}"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Co-Qualifying Penalty</div>
                    <div class="ash-hint">Tickers also matching slots with negative collapsed scores are ranked lower. Each additional bad co-qualifying slot deducts from the ticker's sort score.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.afCoQualPenaltyEnabled" style="margin-top:8px">
                  <div class="lbl">Depth Multiplier <b x-text="(cfg.afCoQualDepthPct??10)+'%'"></b> per tier</div>
                  <input type="range" min="0" max="50" step="1" x-model.number="cfg.afCoQualDepthPct" @change="persist()">
                  <div class="ash-hint">Scales a criterion's collapsed score by how deep the ticker qualifies at — a good score gets better with depth, a bad score gets worse. E.g. at 10%, a criterion scoring +$0.50 is applied as +$0.70 for a ticker qualifying 4 tiers deep.</div>
                </div>
              </div>
            </div>
            <div class="ash-zone" x-show="tW">
              <div x-data="{sm:null}">
              <div style="margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:6px">
                <div style="font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--text-lo);margin-bottom:4px">SAMPLING BARS</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px 16px">
                  <label class="tog">
                    <div class="tog-t" :class="(cfg.afShowStructure??false)?'on':''" @click.prevent="if(!cfgLocked){cfg.afShowStructure=!(cfg.afShowStructure??false);persist()}"><div class="tog-k"></div></div>
                    <span class="tog-l">Structure</span>
                  </label>
                  <label class="tog">
                    <div class="tog-t" :class="(cfg.afShowFunding??false)?'on':''" @click.prevent="if(!cfgLocked){cfg.afShowFunding=!(cfg.afShowFunding??false);persist()}"><div class="tog-k"></div></div>

                  <label class="tog">
                    <div class="tog-t" :class="(cfg.afShowLiq??true)?'on':''" @click.prevent="if(!cfgLocked){cfg.afShowLiq=!(cfg.afShowLiq??true);persist()}"><div class="tog-k"></div></div>

                    <div class="tog-t" :class="(cfg.afShowVol??true)?'on':''" @click.prevent="if(!cfgLocked){cfg.afShowVol=!(cfg.afShowVol??true);persist()}"><div class="tog-k"></div></div>

                <div class="lbl">Slope Window <b x-text="(cfg.ashfallSlopeWindowHours??24)+'h'"></b></div>
                <input type="range" min="1" max="24" step="1" x-model.number="cfg.ashfallSlopeWindowHours" @change="persist()">

              </div>
              <label class="tog" style="margin-top:8px">
                <div class="tog-t" :class="cfg.ashLiqEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.ashLiqEnabled=!cfg.ashLiqEnabled;if(!cfg.ashLiqEnabled)_liqCloseAll();persist()}"><div class="tog-k"></div></div>

                  <div class="lbl">S/B Dominance Threshold <b x-text="(cfg.ashLiqThresholdPct??50)+'%'"></b></div>
                  <input type="range" min="10" max="90" step="5" x-model.number="cfg.ashLiqThresholdPct" @change="persist()">

    transform(def) {
      const _origInit  = def.init;
      const _origPers  = def.persist;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;

      let _afWasHalted               = false;
      let _afWasGainsLocked          = false;
      let _afLastGainsContinuationTs = 0;

      return Object.assign({}, def, {

        afEvents:     [],   // { ts, kind:'drawdown'|'gainslock', skew, breadth } — kept for import compat, not scored
        afCloses:     [],   // { ts, pnl, skew, breadth } — per-close PnL paired with structure at close time
        afWave:       [],   // { ts, lean } — structure-lean trajectory, retained up to ~a week (the "wave")
        afScoreboard: [],   // sorted scorecard entries built from SCORE_KEY records
        afScorecardView: null,         // persisted in cfg; init below
        afScorecardSource: null,       // persisted in cfg; init below
        afScorecardExpanded: null,     // key of currently expanded chip, or null
        afKlineBar:   { bearSum: 0, bullSum: 0, max: 50 }, // merged (own + partner) kline bar for display
        _afOwnKlineBar: null,                       // own-only kline bar before partner merge
        _afKlineBarAt: 0,                           // hourly candle timestamp of last own kline sample
        _afStructureList: null, _afStructureAt: 0, // own 3h ticker cache independent of host
        afStatus:  { skew: null, breadth: null, score: null, mass: 0, count: 0, lean: 0, slope: 0, inherent: 0, eff: null, fioScore: null, at: 0 },
        afCrossEvents: [],
        _liqBatches: [],
        _liqLastBatchSyms: [], // tickers picked for liq surveillance on the most recent scan only
        _liqMessageHooks: [], // plugins push (batch, sym) => void here to react to live liq turnover, e.g. Liquid-Diver
        _liqCloseHooks: [], // plugins push (results, batch) => void here to react to a closed cycle's final per-symbol snapshot, e.g. Liquid-Diver's 0-liq detection
        _liqPersistPending: false, // debounce guard for _liqPersistBatches
        _liqResults: {},
        _liqResultsVersion: 0,
        _liqCycleHistory: [],
        // Symbols whose most recently closed batch read clean (zero combined liq turnover).
        // Map of symbol -> { qualifiedAt }, refreshed every time a clean close reconfirms it,
        // deleted the moment a close shows any liquidation. Drives sequestered priority picks
        // in _liqLaunchBatch so a calm ticker keeps getting resurveilled instead of aging out
        // of the >6%/-6% mover pool and going dark. See _liqCloseBatch / _liqLaunchBatch.
        _liqSequester: {},
        _liqAvgYPx: null,
        _liqYAxisHtml: '',
        _liqHighlightedCycleTs: null, // ts of a clicked cycle in the LIQUIDATION SAMPLE chart; null = follow latest
        _liqAvgSTurnover: 0, // avg sell-liq $ across all recorded cycles — see _liqUpdateAvgTurnover
        _liqAvgBTurnover: 0, // avg buy-liq $ across all recorded cycles
        _afOcCycleHistory: [], // rolling per-cycle snapshots: {id, ts, results:[{sym,bc,sc,avgMs,n}]}
        _afOcCycleCounter: 0,
        afOcResults: {},       // {[sym]:{bc,sc,avgMs,n}} from the most recent OC fetch batch
        _ocFetchRunning: false, // guards against overlapping _ocFetchBatch calls
        _liqLatestResults: [],
        _liqCycleCounter: 0,
        // Fixed Y-axis overlay HTML/positions for the OC chart, set as a side effect of
        // _afOcChartSvg(). Must be pre-declared (not just assigned later inside that method) —
        // an x-html/x-text binding that reads a property before Alpine has ever seen it
        // declared throws a ReferenceError during the initial bind, same as
        // _liqYAxisHtml/_liqAvgYPx above.
        _afOcYAxisHtml: '',
        _afOcAvgYPx: null,
        _afOcHighlightedCycleTs: null, // ts of a clicked cycle in the ORDER INTERVAL SAMPLE chart; null = follow latest
        _afOcViewMode: 'oc', // 'oc' | 'vol' | 'io' — which sample the tethered chart/summary/chips display

        async init() {
          await _origInit.call(this);
          // Sync to the actual restored halt/gains-lock state instead of leaving these at their
          // false initial value. Without this, reloading the tab mid-halt made the very next
          // tick see a false→true "transition" that never really happened, rewriting the
          // cross-event start timestamp to "now" — which silently made an already-old halt look
          // freshly started, breaking the Mutual DDH Lift age comparison below (it picks the
          // *older* halt to lift, so an inflated timestamp can flip which side loses the halt).
          _afWasHalted      = this._isDrawdownHalted?.() ?? false;
          _afWasGainsLocked = this._isGainsLocked?.()    ?? false;
          if (this.cfg.ashfallEnabled          === undefined) this.cfg.ashfallEnabled          = true;
          if (this.cfg.ashfallSlopeWindowHours === undefined) this.cfg.ashfallSlopeWindowHours = 24;
          // Renamed from ashfallIoEnabled/ashfallWaveShowIo ('IO' read as Open Interest, confusable
          // with the unrelated iot/iom criteria — this line is purely funding-rate-derived). Fall
          // back to the old key so an existing user's toggle choice survives the rename.
          if (this.cfg.ashfallFioEnabled        === undefined) this.cfg.ashfallFioEnabled        = this.cfg.ashfallIoEnabled ?? true;
          if (this.cfg.ashfallWaveShowMain      === undefined) this.cfg.ashfallWaveShowMain      = true;
          if (this.cfg.ashfallWaveShowFio        === undefined) this.cfg.ashfallWaveShowFio        = this.cfg.ashfallWaveShowIo ?? true;
          if (!Array.isArray(this.cfg.megacapExclude)) this.cfg.megacapExclude = [...DEFAULT_MEGACAP_EXCLUDE];
          if (this.cfg.afShowScore              === undefined) this.cfg.afShowScore              = true;
          if (this.cfg.ashfallCrossEnabled        === undefined) this.cfg.ashfallCrossEnabled        = true;
          if (this.cfg.afCrossLiqGraylistEnabled  === undefined) this.cfg.afCrossLiqGraylistEnabled  = false;
          if (this.cfg.afCrossWinGraylistEnabled  === undefined) this.cfg.afCrossWinGraylistEnabled  = true;
          if (this.cfg.ashfallMutualDdLiftEnabled          === undefined) this.cfg.ashfallMutualDdLiftEnabled          = true;
          if (this.cfg.ashfallGainsContinuationEnabled     === undefined) this.cfg.ashfallGainsContinuationEnabled     = true;
          if (this.cfg.ashfallScorecardEnabled           === undefined) this.cfg.ashfallScorecardEnabled           = true;
          if (this.cfg.afCoQualPenaltyEnabled           === undefined) this.cfg.afCoQualPenaltyEnabled           = true;
          if (this.cfg.afCoQualDepthPct                 === undefined) this.cfg.afCoQualDepthPct                 = 10;
          if (this.cfg.afScorecardView                   === undefined) this.cfg.afScorecardView                   = 'combined';
          if (this.cfg.afScorecardSource                 === undefined) this.cfg.afScorecardSource                 = 'both';
          if (this.cfg.afSpongeQuota                     === undefined) this.cfg.afSpongeQuota                     = 30;
          if (this.cfg.afStaleSlotDays                   === undefined) this.cfg.afStaleSlotDays                   = 7;
          if (this.cfg.afHistScoringEnabled              === undefined) this.cfg.afHistScoringEnabled              = true;
          if (this.cfg.ashLiqEnabled      === undefined) this.cfg.ashLiqEnabled      = true;
          if (this.cfg.ashLiqBatchSize    === undefined) this.cfg.ashLiqBatchSize    = 25;
          if (this.cfg.ashLiqThresholdPct === undefined) this.cfg.ashLiqThresholdPct = 50;
          if (this.cfg.ashLiqSequesterEnabled === undefined) this.cfg.ashLiqSequesterEnabled = true;
          if (this.cfg.ashLiqSequesterCap     === undefined) this.cfg.ashLiqSequesterCap     = 12;
          if (this.cfg.ashLiqPrescreenEnabled === undefined) this.cfg.ashLiqPrescreenEnabled = false;
          if (this.cfg.ashPecPrescreenEnabled === undefined) this.cfg.ashPecPrescreenEnabled = false;
          if (this.cfg.ashPecBatchSize        === undefined) this.cfg.ashPecBatchSize        = 25;
          if (this.cfg.ashPecBatchDelayMs     === undefined) this.cfg.ashPecBatchDelayMs     = 2000;
          if (this.cfg.ashPresenceSkewThreshold === undefined) this.cfg.ashPresenceSkewThreshold = 70;
          if (this.cfg.ashPresenceSkewWindow    === undefined) this.cfg.ashPresenceSkewWindow    = 0;
          if (this.cfg.ashPresenceMixedMode     === undefined) this.cfg.ashPresenceMixedMode     = 'continue';
          if (this.cfg.afOcEnabled            === undefined) this.cfg.afOcEnabled            = true;
          if (this.cfg.afOcOrderLimit         === undefined) this.cfg.afOcOrderLimit         = 100;
          if (this.cfg.afShowStructure === undefined) this.cfg.afShowStructure = false;
          if (this.cfg.afShowLiq       === undefined) this.cfg.afShowLiq       = true;
          if (this.cfg.afShowFunding   === undefined) this.cfg.afShowFunding   = false;
          if (this.cfg.afShowVol       === undefined) this.cfg.afShowVol       = true;
          try {
            const saved = JSON.parse(localStorage.getItem(ASH_LIQ_KEY) || 'null');
            if (Array.isArray(saved) && this.cfg.ashLiqEnabled) {
              const valid = saved.filter(s => s.endsAt > Date.now());
              if (valid.length) {
                this._liqCycleCounter = Math.max(this._liqCycleCounter, ...valid.map(s => s.id));
                for (const s of valid) this._liqResumeBatch(s);
              }
            }
          } catch(_) {}
          try {
            const hist = JSON.parse(localStorage.getItem(ASH_LIQ_HISTORY_KEY) || 'null');
            if (Array.isArray(hist) && hist.length) {
              this._liqCycleHistory = hist.slice(-25);
              const last = hist[hist.length - 1];
              this._liqLatestResults = last.results || [];
              for (const r of last.results || [])
                this._liqResults[r.sym] = { sLiqPct: r.sLiqPct, bLiqPct: r.bLiqPct, sLiqRaw: r.sLiqRaw, bLiqRaw: r.bLiqRaw, cycleId: last.id, ts: last.ts };
              this._liqCycleCounter = Math.max(this._liqCycleCounter, last.id || 0);
            }
          } catch(_) {}
          try {
            const seq = JSON.parse(localStorage.getItem(ASH_LIQ_SEQUESTER_KEY) || 'null');
            if (seq && typeof seq === 'object') this._liqSequester = seq;
          } catch(_) {}
          this._liqUpdateAvgTurnover();
          try {
            const _sharedLiq = this._sharedRead?.('liqResults');
            if (_sharedLiq && Object.keys(_sharedLiq).length) this._liqResults = { ...this._liqResults, ..._sharedLiq };
          } catch(_) {}
          try {
            const _ocHist = JSON.parse(localStorage.getItem(ASH_OC_HIST_KEY) || 'null');
            if (Array.isArray(_ocHist) && _ocHist.length) {
              const { cleaned: _cleaned, purged: _purged } = this._ocSanitizeHistory(_ocHist);
              this._afOcCycleHistory = _cleaned;
              if (_purged > 0) {
                this.log(`[ASH] 🧹 Purged ${_purged} legacy OC record(s) from stored history (pre-redesign raw-count schema).`, 'info');
                this._ocPersistHistory();
              }
              // Latest cycle by timestamp, not array position — a slower concurrent fetch
              // finishing after a newer one has already pushed would otherwise leave a stale
              // batch sitting last in the array.
              const _last = this._afOcCycleHistory.reduce((a,c) => (!a || c.ts > a.ts) ? c : a, null);
              if (_last?.results) for (const r of _last.results) { if (r && typeof r.sym === 'string') this.afOcResults[r.sym] = { bc: r.bc, sc: r.sc, avgMs: r.avgMs, n: r.n }; }
              this._afOcCycleCounter = Math.max(this._afOcCycleCounter, _last?.id || 0);
            }
          } catch(_) {}
          this._afScoreTrim();
          this._afScoreBuild();
          try {
            const raw = localStorage.getItem(ASH_KEY);
            if (raw) {
              const s = JSON.parse(raw);
              if (Array.isArray(s.events)) this.afEvents = s.events.slice(-EVENTS_CAP);
              if (Array.isArray(s.closes)) this.afCloses = s.closes.slice(-CLOSES_CAP);
              if (Array.isArray(s.wave))      this.afWave      = s.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              if (s.afKlineBar?.bearSum != null) this.afKlineBar = s.afKlineBar;
              // Restore the last-acted-on Gains Continuation broadcast so a reload doesn't
              // see the same still-recent glk-start as "new" and restart the throttle timer.
              if (typeof s.lastGainsContinuationTs === 'number') _afLastGainsContinuationTs = s.lastGainsContinuationTs;
            }
          } catch(e) {}
          this.log(`[ASH] Ashfall (Chaser) v${VERSION} loaded — ${this.cfg.ashfallEnabled ? 'enabled' : 'disabled'} | ${this.afCloses.length} closes on record`, 'info');
          setInterval(() => {
            if (this.cfg.ashfallCrossEnabled) this._afCheckCross().catch(() => {});
            // _afScoreBuild() is NOT called here on a timer — its source data (scorecard
            // records) only changes on a trade close, a config change affecting the
            // computation, or an import, and it's called from each of those directly. A
            // periodic rebuild here would just recompute the identical result between those
            // events for no reason, on every tick's worth of ticks (up to a few thousand
            // records, twice-sorted) whether or not the Score panel is even open.
            if (this.cfg.ashfallCrossEnabled) {
              const _halted  = this._isDrawdownHalted?.() ?? false;
              const _glocked = this._isGainsLocked?.()    ?? false;
              if (_halted !== _afWasHalted) {
                _afWasHalted = _halted;
                this._afCrossWrite(_halted ? 'ddh-start' : 'ddh-end');
              }
              if (_glocked !== _afWasGainsLocked) {
                _afWasGainsLocked = _glocked;
                this._afCrossWrite(_glocked ? 'glk-start' : 'glk-end');
              }
              if (this.cfg.ashfallMutualDdLiftEnabled && _halted) {
                const _allEvents   = this._afCrossRead();
                const _fromPartner = _allEvents.filter(e => e.source === 'winter');
                const _fromSelf    = _allEvents.filter(e => e.source === 'chaser');
                const _partnerDdh  = _fromPartner.filter(e => e.kind === 'ddh-start' || e.kind === 'ddh-end').at(-1);
                const _selfDdh     = _fromSelf.filter(e => e.kind === 'ddh-start').at(-1);
                if (_partnerDdh?.kind === 'ddh-start' && _selfDdh) {
                  if (_selfDdh.ts < _partnerDdh.ts) {
                    this._drawdownHaltUntil = null;
                    this._haltLoggedKind = null;
                    this.persist();
                    this.log('[ASH] ♨ Mutual DDH lift — own halt is older; cleared.', 'info');
                  }
                }
              }
              if (this.cfg.ashfallGainsContinuationEnabled && this.cfg.drawdownThrottleEnabled !== false) {
                const _fromPartner = this._afCrossRead().filter(e => e.source === 'winter');
                const _lastGlk = _fromPartner.filter(e => e.kind === 'glk-start').at(-1);
                // Explicit recency gate at the point of use — a bot that was offline or just
                // reloaded may discover a glk-start it's never personally seen, but if the
                // broadcast itself is already this old, arming a fresh multi-hour halt on top
                // of time that's already elapsed since Permafrost's gains-lock started is not
                // the intended "continuation." CROSS_TTL already prunes anything older than
                // this from _afCrossRead(), but checking it here too makes the recency
                // requirement explicit rather than an incidental side effect of unrelated
                // pruning logic.
                if (_lastGlk && (Date.now() - _lastGlk.ts) < CROSS_TTL && _lastGlk.ts > _afLastGainsContinuationTs) {
                  _afLastGainsContinuationTs = _lastGlk.ts;
                  const _gcMs = (this.cfg.drawdownHaltHours ?? 6) * 3600 * 1000;
                  this._drawdownHaltUntil = Date.now() + _gcMs;
                  this.persist();
                  this.log('[ASH] ♨ Gains Continuation — Permafrost locked gains; drawdown throttle restarted.', 'warn');
                  // Same bail-or-not decision the base bot makes for its own drawdown throttle
                  // trigger — Gains Continuation arms an identical halt, so it defers to the
                  // same drawdownBailEnabled toggle rather than always or never bailing.
                  if (this.cfg.drawdownBailEnabled !== false && this.positions.length > 0) {
                    this.log(`[ASH] ⚡ Gains Continuation bail — closing ${this.positions.length} open position(s)`, 'warn');
                    setTimeout(() => { this.bailAll().catch(() => {}); }, 0);
                  }
                }
              }
            }
            if (this.cfg.ashfallEnabled && (this._isDrawdownHalted?.() ?? false)) {
              const _cdMs = (this.cfg.bulkTickerCooldownHours ?? 3) * 3600 * 1000;
              if ((Date.now() - (this._afStructureAt || 0)) >= _cdMs) {
                this._afFetchStructure().then(r => {
                  if (!r) return;
                  this._afAddSample(r);
                  if (!r._fresh) return;
                  const { score, mass, count } = this.afStatus;
                  const _d = this._afDescribe(r, score, mass, count);
                  this.log(`[ASH] ♨ Structure check (halted) — ${_d.desc} — ${_d.bias}`, 'info');
                }).catch(() => {});
              }
            }
            // Partner sample: keep wave chart and sampling bars alive using Permafrost's latest data
            if (this.cfg.ashfallEnabled) {
              const _ps = this._afReadPartnerSample();
              this._afMergeKlineBar();
              if (_ps) {
                // During own halt: adopt partner's sampling metrics so bars stay current
                if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) {
                  if (_ps.fundSkew) this._micFundSkew = _ps.fundSkew;
                  if (_ps.volSkew)  this._micVolSkew  = _ps.volSkew;
                }
                // Merge partner liq history — add entries not already in own history (by ts), sort, cap
                if (Array.isArray(_ps.liqHistory) && _ps.liqHistory.length) {
                  const _ownTs = new Set((this._liqCycleHistory || []).map(e => e.ts));
                  const _added = _ps.liqHistory.filter(e => e.ts && !_ownTs.has(e.ts));
                  if (_added.length) {
                    this._liqCycleHistory = [...(this._liqCycleHistory || []), ..._added]
                      .sort((a, b) => a.ts - b.ts).slice(-25);
                    this._liqPersistHistory();
                  }
                }
                const _lwTs = this.afWave.length ? this.afWave[this.afWave.length - 1].ts : 0;
                if (_ps.ts > _lwTs + 60_000) {
                  this.afWave.push({ ts: _ps.ts, lean: +(_ps.lean ?? 0).toFixed(4), vol: +(_ps.vol ?? 0).toFixed(4), volAbs: _ps.volAbs ?? 0, fio: _ps.fioScore != null ? +_ps.fioScore.toFixed(4) : null, score: null });
                  const _cut = Date.now() - WAVE_TTL_MS;
                  if (this.afWave.length && this.afWave[0].ts < _cut) this.afWave = this.afWave.filter(p => p.ts >= _cut);
                  if (this.afWave.length > WAVE_CAP) this.afWave = this.afWave.slice(-WAVE_CAP);
                }
              }
            }
          }, 15000);
        },

        persist() {
          _origPers.call(this);
          try {
            // Each array is its own atomized data type — capped independently so an
            // oversized one (e.g. volume history) can't crowd out another (e.g. wave).
            this.afEvents     = trimToByteCap(this.afEvents);
            this.afCloses     = trimToByteCap(this.afCloses);
            this.afWave       = trimToByteCap(this.afWave);
            localStorage.setItem(ASH_KEY, JSON.stringify({
              events: this.afEvents, closes: this.afCloses, wave: this.afWave,
              afKlineBar: this.afKlineBar,
              lastGainsContinuationTs: _afLastGainsContinuationTs,
            }));
          } catch(e) {}
        },

        // ── Market structure reading — full ticker universe, not the curated pools ──
        async _afFetchStructure() {
          try {
            // Reuse the host scan's bulk ticker response when fresh (slow-tick
            // sampling during halts falls back to fetching — scans don't run then)
            const cooldownMs = (this.cfg.bulkTickerCooldownHours ?? 3) * 3600 * 1000;
            let list, _freshData = false;
            if (this._afStructureList?.length && (Date.now() - (this._afStructureAt || 0)) < cooldownMs) {
              list = this._afStructureList; // own cache within cooldown
            } else if (this._lastAllTickers?.length && (Date.now() - (this._lastAllTickersAt || 0)) < 60000) {
              list = this._lastAllTickers;  // host just fetched this tick — piggyback
              this._afStructureList = list;
              this._afStructureAt   = this._lastAllTickersAt;
              _freshData = true;
            } else {
              const _shared = this._sharedRead?.('bulkTickers');
              if (_shared?.data?.tickers?.length && (Date.now() - (_shared.ts || 0)) < cooldownMs) {
                list = _shared.data.tickers; // partner fetched recently — adopt
                this._afStructureList = list;
                this._afStructureAt   = _shared.ts;
                _freshData = true;
              } else {
                const r = await fetch(`${this.base}/v5/market/tickers?category=linear`);
                const d = await r.json();
                if (d.retCode !== 0) return null;
                list = d.result?.list || [];
                this._afStructureList = list;
                this._afStructureAt   = Date.now();
                _freshData = true;
              }
            }
            let gSum = 0, lSum = 0, gCount = 0, lCount = 0;
            let gTurnover = 0, lTurnover = 0;
            let frSum = 0, frCount = 0;
            for (const t of list) {
              if (!t.symbol.endsWith('USDT') || (this.cfg.megacapExclude || DEFAULT_MEGACAP_EXCLUDE).includes(t.symbol)) continue;
              if (parseFloat(t.lastPrice || 0) < 0.001) continue;
              const ch  = parseFloat(t.price24hPcnt || 0) * 100;
              const tvr = parseFloat(t.turnover24h  || 0);
              if (ch > 0)      { gSum += ch; gCount++; gTurnover += tvr; }
              else if (ch < 0) { lSum += Math.abs(ch); lCount++; lTurnover += tvr; }
              const fr = parseFloat(t.fundingRate || 0);
              if (!isNaN(fr)) { frSum += fr * 100; frCount++; } // accumulate as %
            }
            const sumT   = gSum + lSum, cntT = gCount + lCount;
            const totalTvr = gTurnover + lTurnover;
            const vol    = totalTvr > 0 ? +((gTurnover - lTurnover) / totalTvr).toFixed(4) : 0;
            const volAbs = +(totalTvr / 1e9).toFixed(2); // USD billions

            // Collective FIO from aggregate funding rate: positive funding = longs paying = crowd net long.
            // Normalised against 0.05% reference (≈5× the typical 0.01%/8h baseline) → [-1, 1].
            const fioScore = frCount > 0
              ? +Math.max(-1, Math.min(1, (frSum / frCount) / 0.05)).toFixed(4)
              : null;

            return {
              ts: Date.now(),
              skew:    sumT > 0 ? (gSum - lSum) / sumT : 0,
              breadth: cntT > 0 ? (gCount - lCount) / cntT : 0,
              gCount, lCount,
              gSum: +gSum.toFixed(1), lSum: +lSum.toFixed(1),
              vol, volAbs, fioScore, _fresh: _freshData,
            };
          } catch(e) { return null; }
        },

        _afDescribe(reading, score, mass, count) {
          const lean = (reading.skew + reading.breadth) / 2;
          const hist = this.afCloses.map(x => Math.abs((x.skew + x.breadth) / 2)).sort((a, b) => a - b);
          const q = p => hist[Math.min(hist.length - 1, Math.floor(p * hist.length))];
          const [tFlat, tModerate, tStrong] = hist.length >= 30 ? [q(0.25), q(0.5), q(0.8)] : [0.08, 0.20, 0.40];
          const mag    = Math.abs(lean);
          const adverb = mag >= tStrong ? 'strongly ' : mag >= tModerate ? 'moderately ' : 'mildly ';
          const struct = mag <= tFlat ? 'flat/mixed' : `${adverb}${lean > 0 ? 'bullish' : 'bearish'}`;
          const slope  = this._afTrajectory().slope;
          const trend  = slope > 0.05 ? ', rising' : slope < -0.05 ? ', falling' : '';
          const desc   = `${struct}${trend}`;
          const inherent = this._afInherent(lean, slope, reading.fioScore ?? null);
          const eff    = this._afEffectiveScore(score, mass, inherent);
          let bias;
          if (score === null || mass < MIN_MASS) {
            bias = 'thin history';
          } else {
            const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
            const avgPnl = score * entryMargin;
            const sign = avgPnl >= 0 ? '+' : '-';
            bias = `avg ${sign}${Math.abs(avgPnl).toFixed(2)}/position (${count} similar close${count === 1 ? '' : 's'})`;
          }
          return { desc, bias, eff };
        },

        // ── The wave: recent path of the structure lean (oldest → newest) ──
        // lean = (skew + breadth) / 2 ∈ [−1,1]: +1 strongly bullish, −1 strongly bearish.
        _afWaveSeries() {
          const cut = Date.now() - WAVE_TTL_MS;
          return this.afWave.filter(p => p.ts >= cut);
        },

        // Append a structure-lean point to the wave and prune by age / cap. Kept
        // separate from afCloses (which track realized PnL) so the wave
        // retains the full trajectory for as long as we have data, up to ~a week.
        _afScoreNet() {
          const cs = this.micCollapsedCritStats || {};
          const vals = Object.values(cs);
          const net = vals.reduce((a,c)=>a+c.pnl,0);
          const abs = vals.reduce((a,c)=>a+Math.abs(c.pnl),0);
          return { net, abs };
        },

        _afPushWave(reading) {
          const { net: _scNet, abs: _scAbs } = this._afScoreNet();
          const _score  = _scAbs > 0 ? +((_scNet / _scAbs).toFixed(4)) : null;
          this.afWave.push({ ts: reading.ts, lean: +(((reading.skew + reading.breadth) / 2)).toFixed(4), vol: reading.vol ?? 0, volAbs: reading.volAbs ?? 0, fio: reading.fioScore ?? null, score: _score });
          const cut = Date.now() - WAVE_TTL_MS;
          if (this.afWave.length && this.afWave[0].ts < cut) this.afWave = this.afWave.filter(p => p.ts >= cut);
          if (this.afWave.length > WAVE_CAP) this.afWave = this.afWave.slice(-WAVE_CAP);
        },

        // Current lean plus its trajectory (slope = avg lean over last N hours − avg lean N–2N hours ago).
        // Fixed time window (cfg.ashfallSlopeWindowHours, default 6h) so directional signals
        // always reflect the same timeframe regardless of wave history depth.
        // slope > 0 → drifting bullish; slope < 0 → drifting bearish.
        _afTrajectory() {
          const wave = this._afWaveSeries();
          const n    = wave.length;
          const lean = n ? wave[n - 1].lean : (((this.afStatus.skew ?? 0) + (this.afStatus.breadth ?? 0)) / 2);
          if (n < WAVE_MIN_PTS) return { lean, slope: 0, n };
          const winMs     = (this.cfg.ashfallSlopeWindowHours ?? 24) * 3600 * 1000;
          const now       = Date.now();
          const recentPts = wave.filter(p => p.ts >= now - winMs);
          const olderPts  = wave.filter(p => p.ts >= now - 2 * winMs && p.ts < now - winMs);
          if (!recentPts.length || !olderPts.length) return { lean, slope: 0, n };
          const recent = recentPts.reduce((a, p) => a + p.lean, 0) / recentPts.length;
          const older  = olderPts.reduce((a, p) => a + p.lean, 0) / olderPts.length;
          return { lean, slope: recent - older, n };
        },

        // Inherent favourability for this bot's direction (DIR): a long bot likes
        // bullish *and* rising structure. The slope term is what stops us longing
        // into the start of a dump (mildly bullish but turning down).
        _afInherent(lean, slope, fioScore) {
          const slopeN = Math.max(-1, Math.min(1, (slope || 0) / SLOPE_REF));
          const fioN   = fioScore != null ? Math.max(-1, Math.min(1, fioScore)) : 0;
          return Math.max(-1, Math.min(1, DIR * (W_LEAN * (lean || 0) + W_SLOPE * slopeN + W_FIO * fioN)));
        },

        // Effective score: learned history is primary, the inherent wave is the
        // fallback — blended by how much evidence the profile actually has.
        _afEffectiveScore(score, mass, inherent) {
          const massFrac = Math.max(0, Math.min(1, (mass || 0) / STRONG_MASS));
          return score === null ? inherent : massFrac * score + (1 - massFrac) * inherent;
        },

        async _afUpdateKlineBar() {
          const lastHourStart = Math.floor(Date.now() / 3_600_000) * 3_600_000 - 3_600_000;
          // Piggyback on MIC's cache when it's populated for the right hour
          const cache = this._micKlineCache;
          if (cache && Object.keys(cache).length > 0) {
            let bearSum = 0, bullSum = 0;
            for (const e of Object.values(cache)) {
              if (e.candleStart !== lastHourStart || !e.open) continue;
              const pct = (e.close - e.open) / e.open * 100;
              if (pct < 0) bearSum += -pct;
              else if (pct > 0) bullSum += pct;
            }
            if (bearSum > 0 || bullSum > 0) {
              this.afKlineBar = { bearSum, bullSum, max: this.cfg.micKlineScanCap ?? 20 };
              this._afOwnKlineBar = { ...this.afKlineBar };
              this._afMergeKlineBar();
              return;
            }
          }
          // MIC didn't fetch klines this cycle — own sample, cached per completed hourly candle
          if (this._afKlineBarAt === lastHourStart && (this.afKlineBar.bearSum > 0 || this.afKlineBar.bullSum > 0)) {
            this._afMergeKlineBar(); return;
          }
          try {
            const allTickers = this._lastAllTickers || [];
            const cap = this.cfg.micKlineScanCap ?? 20;
            let syms = allTickers
              .filter(t => t.symbol.endsWith('USDT') && !(this.cfg.megacapExclude || DEFAULT_MEGACAP_EXCLUDE).includes(t.symbol) && parseFloat(t.lastPrice || 0) >= 0.001)
              .map(t => t.symbol);
            if (!syms.length) return;
            for (let i = syms.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [syms[i], syms[j]] = [syms[j], syms[i]];
            }
            syms = syms.slice(0, cap);
            let bearSum = 0, bullSum = 0;
            await Promise.all(syms.map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                const d = await r.json();
                if (d.retCode !== 0) return;
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                if (parseInt(candle[0]) !== lastHourStart) return;
                const open = parseFloat(candle[1]), close = parseFloat(candle[4]);
                if (!open) return;
                const pct = (close - open) / open * 100;
                if (pct < 0) bearSum += -pct;
                else if (pct > 0) bullSum += pct;
              } catch(e) {}
            }));
            this._afKlineBarAt = lastHourStart;
            this.afKlineBar = { bearSum, bullSum, max: cap };
            this._afOwnKlineBar = { ...this.afKlineBar };
            this._afMergeKlineBar();
          } catch(e) {}
        },

        _afWriteSample(reading) {
          try {
            const raw = localStorage.getItem(SAMPLE_STATE_KEY);
            const state = raw ? JSON.parse(raw) : {};
            // liqHistory duplicates data already fully persisted under its own key
            // (ASH_LIQ_HISTORY_KEY) — it's shared here only so a halted partner can
            // backfill cycles it missed. Cap it as its own atomized type rather than
            // embedding the full (already independently-capped) history verbatim.
            state.chaser = {
              ts: reading.ts,
              klineBar: this._afOwnKlineBar ?? this.afKlineBar,
              fundSkew: this._micFundSkew ?? null,
              volSkew: this._micVolSkew ?? null,
              vol: reading.vol ?? 0,
              volAbs: reading.volAbs ?? 0,
              fioScore: reading.fioScore ?? null,
              lean: +((reading.skew + reading.breadth) / 2).toFixed(4),
              liqHistory: trimToByteCap(this._liqCycleHistory ?? []),
            };
            localStorage.setItem(SAMPLE_STATE_KEY, JSON.stringify(state));
          } catch(e) {}
        },

        _afReadPartnerSample() {
          try {
            const raw = localStorage.getItem(SAMPLE_STATE_KEY);
            if (!raw) return null;
            const s = JSON.parse(raw)?.winter ?? null;
            return (s && s.ts >= Date.now() - 7_200_000) ? s : null;
          } catch(e) { return null; }
        },

        _afMergeKlineBar() {
          const own = this._afOwnKlineBar ?? this.afKlineBar;
          const partner = this._afReadPartnerSample();
          const pb = partner?.klineBar;
          if (!pb || (!pb.bearSum && !pb.bullSum)) return;
          this.afKlineBar = {
            bearSum: own.bearSum + pb.bearSum,
            bullSum: own.bullSum + pb.bullSum,
            max: (own.max || 50) + (pb.max || 50),
          };
        },

        _afScoreRead() {
          try {
            const raw = localStorage.getItem(SCORE_KEY);
            if (!raw) return [];
            const cut = Date.now() - SCORE_SAFETY_TTL;
            return (JSON.parse(raw) || []).filter(r => r.ts >= cut && Array.isArray(r.criteria) && r.criteria.length);
          } catch(e) { return []; }
        },
        _afScoreTrim() {
          try {
            const records   = this._afScoreRead();
            const quota     = this.cfg.afSpongeQuota   ?? 30;
            const staleDays = this.cfg.afStaleSlotDays ?? 7;
            const staleMs   = staleDays * 24 * 3600 * 1000;
            const now       = Date.now();
            // +fund/-fund are NOT legacy — Blind-Entry and Liquid-Diver actively write them as
            // their primary criteria tags. Only the genuinely dead pre-tiered criteria purge here.
            const LEGACY    = new Set(['>10pct','<10pct','lsa','lba','rasl','rabl']);
            const isLegacy  = r => r.criteria.some(c => LEGACY.has(c));
            const bySlot = {};
            for (const r of records) {
              if (isLegacy(r)) continue;
              const k = collapseKey(r.criteria);
              if (!bySlot[k]) bySlot[k] = [];
              bySlot[k].push(r);
            }
            const trimmed = [];
            for (const recs of Object.values(bySlot)) {
              recs.sort((a, b) => b.ts - a.ts);
              const kept = recs.slice(0, quota);
              if (kept.length && now - kept[0].ts < staleMs) trimmed.push(...kept);
            }
            const GLOBAL_CAP = 5000;
            const capped = trimmed.sort((a, b) => b.ts - a.ts).slice(0, GLOBAL_CAP);
            // Per-slot quota + GLOBAL_CAP bound the record *count*, but with enough
            // distinct auto-generated slot buckets the total byte size can still run
            // large — apply the same atomized byte cap as a final safety net, oldest first.
            const byteCapped = trimToByteCap([...capped].reverse()).reverse();
            localStorage.setItem(SCORE_KEY, JSON.stringify(byteCapped));
          } catch(e) {}
        },
        _afScoreWrite(criteria, pnl, hist = false) {
          try {
            const records = this._afScoreRead();
            const rec = { ts: Date.now(), criteria, pnl, source: 'chaser' };
            if (hist) rec.hist = true;
            records.push(rec);
            const quota = this.cfg.afSpongeQuota ?? 30;
            const bySlot = {};
            for (const r of records) {
              const k = collapseKey(r.criteria);
              if (!bySlot[k]) bySlot[k] = [];
              bySlot[k].push(r);
            }
            const trimmed = [];
            for (const recs of Object.values(bySlot)) {
              recs.sort((a, b) => b.ts - a.ts);
              trimmed.push(...recs.slice(0, quota));
            }
            const byteCapped = trimToByteCap([...trimmed].reverse()).reverse();
            localStorage.setItem(SCORE_KEY, JSON.stringify(byteCapped));
            return byteCapped;
          } catch(e) { return null; }
        },
        // `records`, when passed, skips the internal _afScoreRead() — callers on the
        // trade-close hot path already have the just-written result from _afScoreWrite()
        // in hand, so re-reading and re-parsing the same data straight back out of
        // localStorage would be pure duplicate work.
        _afScoreBuild(records) {
          records = records || this._afScoreRead();
          const exclude = new Set(this.cfg.micAutoSlotExclude || []);
          const quota = this.cfg.afSpongeQuota ?? 30;
          const includeHist = this.cfg.afHistScoringEnabled ?? true;
          const critBase = c => /^sliq/.test(c) ? 'sliq' : /^bliq/.test(c) ? 'bliq' : c;
          // Sorted once and reused by both passes below — they use the identical sort
          // criteria (newest-first), so sorting twice was pure duplicate work.
          const sortedRecords = [...records].sort((a, b) => b.ts - a.ts);
          const slotCount = {};
          const map = {};
          for (const r of sortedRecords) {
            if (r.hist && !includeHist) continue;
            if (exclude.size && r.criteria.some(c => exclude.has(critBase(c)))) continue;
            const key = [...r.criteria].sort().join(',');
            if ((slotCount[key] = (slotCount[key] ?? 0) + 1) > quota) continue;
            if (!map[key]) map[key] = { criteria: r.criteria, ownPnl: 0, ownWins: 0, ownLosses: 0, ownLossSum: 0, partnerPnl: 0, partnerWins: 0, partnerLosses: 0, partnerWinSum: 0, hasHist: false, hasTrade: false };
            if (r.hist) map[key].hasHist = true; else map[key].hasTrade = true;
            const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
            if (r.source === 'chaser') {
              map[key].ownPnl += pnl;
              if (pnl > 0) map[key].ownWins++; else { map[key].ownLosses++; map[key].ownLossSum += -pnl; }
            } else {
              const inv = -pnl;
              map[key].partnerPnl += inv;
              if (inv > 0) map[key].partnerWins++; else { map[key].partnerLosses++; map[key].partnerWinSum += pnl; }
            }
          }
          for (const s of Object.values(map)) s.totalPnl = s.ownPnl + s.partnerPnl;
          this.afScoreboard = Object.values(map).sort((a, b) => b.totalPnl - a.totalPnl);
          const collapse = collapseCrit;
          const critCount = {}, collapsedRanks = {}, critStats = {};
          for (const r of sortedRecords) {
            if (r.hist && !includeHist) continue;
            if (exclude.size && r.criteria.some(c => exclude.has(critBase(c)))) continue;
            const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
            const effectivePnl = r.source === 'chaser' ? pnl : -pnl;
            for (const c of r.criteria) {
              const key = collapse(c);
              if ((critCount[key] = (critCount[key] ?? 0) + 1) > quota) continue;
              collapsedRanks[key] = (collapsedRanks[key] ?? 0) + effectivePnl;
              if (!critStats[key]) critStats[key] = { pnl: 0, wins: 0, losses: 0, ownPnl: 0, ownWins: 0, ownLosses: 0, hasHist: false, hasTrade: false };
              const cs = critStats[key];
              cs.pnl += effectivePnl;
              if (effectivePnl > 0) cs.wins++; else cs.losses++;
              if (r.source === 'chaser') { cs.ownPnl += pnl; if (pnl > 0) cs.ownWins++; else cs.ownLosses++; }
              if (r.hist) cs.hasHist = true; else cs.hasTrade = true;
            }
          }
          this.micCollapsedSlotRanks = collapsedRanks;
          this.micCollapsedCritStats = critStats;
          // Blind-Entry / Liquid-Diver bucket — a *separate* pass over the same records, not a
          // filter of critStats above. Their bare-sign tags (+fund/-fund, +ocs/-ocs) collapse to
          // the exact same keys MIC's own tiered criteria collapse to (e.g. '+fund' and 'fund>5'
          // both become 'fund>'), so once folded into critStats they're no longer separable —
          // this has to be built independently, straight from the raw records. MIC's own
          // critStats/collapsedRanks above are left untouched since real trading logic
          // (co-qualification ranking, _afScoreNet) reads them.
          const isBlindRec = r => Array.isArray(r.criteria) && r.criteria.some(c => c === '+fund' || c === '-fund' || c === '+ocs' || c === '-ocs');
          const blindCritCount = {}, blindCritStats = {};
          for (const r of sortedRecords) {
            if (!isBlindRec(r)) continue;
            if (r.hist && !includeHist) continue;
            const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
            const effectivePnl = r.source === 'chaser' ? pnl : -pnl;
            for (const c of r.criteria) {
              const key = collapse(c);
              if ((blindCritCount[key] = (blindCritCount[key] ?? 0) + 1) > quota) continue;
              if (!blindCritStats[key]) blindCritStats[key] = { pnl: 0, wins: 0, losses: 0, ownPnl: 0, ownWins: 0, ownLosses: 0, hasHist: false, hasTrade: false };
              const cs = blindCritStats[key];
              cs.pnl += effectivePnl;
              if (effectivePnl > 0) cs.wins++; else cs.losses++;
              if (r.source === 'chaser') { cs.ownPnl += pnl; if (pnl > 0) cs.ownWins++; else cs.ownLosses++; }
              if (r.hist) cs.hasHist = true; else cs.hasTrade = true;
            }
          }
          this.blindCollapsedCritStats = blindCritStats;
        },
        // cfg.micEnabled is a persisted toggle value — it survives MIC being removed via the
        // Plugin Manager, so it alone can't tell us whether MIC is actually loaded right now.
        // Cross-check against the live plugin list so the MIC scorecard section disappears the
        // moment MIC is unloaded, not just when its own toggle happens to be off.
        _micPluginLoaded() {
          return (this._pluginList || []).some(p => p.id === 'multiindicator-chaser');
        },
        _becPluginLoaded() {
          return (this._pluginList || []).some(p => p.id === 'blindentry-chaser');
        },
        _ldcPluginLoaded() {
          return (this._pluginList || []).some(p => p.id === 'liquiddiver-chaser');
        },
        // Liquid-Diver's OC fetch is single-symbol, triggered per reactive entry — its samples are
        // almost always one bar of 0.0s and drown out a real batch-fetched sample. Only show the
        // chart when a plugin doing proper batch OC sampling (MIC or Blind-Entry) is loaded; if
        // Liquid-Diver is the only OC consumer, hide it rather than let its noise dominate.
        _ocChartViable() {
          return this._micPluginLoaded() || this._becPluginLoaded();
        },
        // Pure display — unlike _afScoreBuild() (which micCollapsedCritStats/micCollapsedSlotRanks
        // come from and which real trading logic reads), this chip-rendering step has no
        // consumer besides this panel, so it's safe to skip while the panel isn't visible.
        // Mirrors MIC's actual Slot Blocking decision (_micIsCritBlocked/_micIsEntryBlocked) so
        // the scorecard can show, at a glance, which chips are currently contributing to a block.
        // Only meaningful for the MIW/MIC bucket — Slot Blocking is an MIW/MIC mechanism, the
        // Blind-Entry/Liquid-Diver bucket has no equivalent concept.
        // Liq-anchor types (sliq/bliq/msliq/mbliq/0liq) are always eligible, matching
        // _micIsEntryBlocked's unconditional anchor check; their score is the sign-combined total
        // (matching _micCritScore, which sums the '+' and '-' buckets for a bare anchor name —
        // blocking is per anchor TYPE, not per sign, so both a type's chips share one verdict).
        // Past-1 is a path, not a criterion — it never appears as a collapsed key here, so there's
        // nothing to match it against.
        // User-selected Blockable Criteria (cfg.micSlotBlockCriteria) are eligible when
        // micSlotBlockTags is on. This now mirrors the strategy plugin's configurable
        // blockable criteria picker instead of the old hardcoded kline/PEC-only list, so
        // fund/vm/iot/iom/ocs/ocx chips can turn purple once opted in and below threshold.
        _afIsCritBlocked(key) {
          if (!this.cfg.micSlotBlockEnabled) return false;
          const ranks = this.micCollapsedSlotRanks || {};
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const threshold  = baseMargin * ((this.cfg.micSlotBlockPct ?? 25) / 100);
          const anchorM = key.match(/^(sliq|bliq|msliq|mbliq)[+-]/);
          if (anchorM || key === '0liq') {
            const base = anchorM ? anchorM[1] : '0liq'; // '0liq' is bare, never sign-tagged
            const score = (ranks[base] ?? 0) + (ranks[base + '+'] ?? 0) + (ranks[base + '-'] ?? 0);
            return score <= -threshold;
          }
          if (!this.cfg.micSlotBlockTags) return false;
          const blockable = (this.cfg.micSlotBlockCriteria || []).filter(Boolean);
          if (!blockable.length) return false;
          const esc = v => String(v).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const rx = new RegExp('^(' + blockable.map(esc).join('|') + ')[+-]');
          return rx.test(key) && (ranks[key] ?? 0) <= -threshold;
        },

        _afScorecardHtml(shown, bucket) {
          if (!shown) return '';
          const stats = (bucket === 'blind' ? this.blindCollapsedCritStats : this.micCollapsedCritStats) || {};
          if (!Object.keys(stats).length) return `<span style="font-size:9px;color:var(--text-lo)">No ${bucket === 'blind' ? 'Blind-Entry/Liquid-Diver' : 'MIC'} closes recorded yet.</span>`;
          const own = (this.cfg.afScorecardView || 'combined') === 'own';
          const expanded = this.afScorecardExpanded;
          const _chipHtml = (key, emoji, title, val, wins, losses, isExpanded, expandedInner, blocked) => {
            let clr, bg, bdr;
            if (blocked) {
              clr = 'rgba(190,130,255,.95)'; bg = 'rgba(160,90,255,.14)'; bdr = 'rgba(190,130,255,.55)';
            } else {
              clr = val > 0 ? 'rgba(100,220,150,.9)' : val < 0 ? 'var(--short)' : 'var(--text-lo)';
              bg  = val > 0 ? 'rgba(100,220,150,.08)' : val < 0 ? 'rgba(255,80,80,.08)' : 'rgba(255,255,255,.04)';
              bdr = val > 0 ? 'rgba(100,220,150,.35)' : val < 0 ? 'rgba(255,80,80,.35)' : 'rgba(255,255,255,.12)';
            }
            const inner = isExpanded ? expandedInner : `<b>${(val >= 0 ? '+$' : '-$') + Math.abs(val).toFixed(2)}</b> <span style="opacity:.55;font-size:8px">${wins}W ${losses}L</span>`;
            const titleFull = blocked ? title + ' (blocked)' : title;
            return `<span data-slot="${key}" title="${titleFull}" style="cursor:pointer;font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:2px;border:1px solid ${bdr};background:${bg};color:${clr};white-space:nowrap">${emoji || '?'} ${inner}</span>`;
          };
          const _srcFilter = cs => { const src = this.cfg.afScorecardSource || 'both'; if (src === 'hist') return cs.hasHist; if (src === 'traded') return cs.hasTrade; return true; };
          const sorted = Object.entries(stats).filter(([,cs]) => _srcFilter(cs)).sort(([,a],[,b]) => own ? b.ownPnl-a.ownPnl : b.pnl-a.pnl);
          return sorted.map(([key, cs]) => {
            const val = own ? cs.ownPnl : cs.pnl;
            const wins = own ? cs.ownWins : cs.wins;
            const losses = own ? cs.ownLosses : cs.losses;
            const expandedInner = `<span style="opacity:.55;font-size:8px">${wins}W ${losses}L of ${wins+losses} recorded</span>`;
            const blocked = bucket !== 'blind' && this._afIsCritBlocked(key);
            return _chipHtml(key, afCritEmoji(key), key, val, wins, losses, expanded===key, expandedInner, blocked);
          }).join('');
        },

        _afCrossRead() {
          try {
            const raw = localStorage.getItem(CROSS_KEY);
            if (!raw) return [];
            const cut = Date.now() - CROSS_TTL;
            return (JSON.parse(raw).events || []).filter(e => e.ts >= cut);
          } catch(e) { return []; }
        },

        _afCrossWrite(kind, symbol, extra) {
          try {
            const events = this._afCrossRead();
            const rec = { ts: Date.now(), kind, source: 'chaser' };
            if (symbol) rec.symbol = symbol;
            if (extra) Object.assign(rec, extra);
            events.push(rec);
            localStorage.setItem(CROSS_KEY, JSON.stringify({ events }));
          } catch(e) {}
        },

        async _afCheckCross() {
          if (!this.cfg.ashfallCrossEnabled) return;
          const fromWinter = this._afCrossRead().filter(e => e.source === 'winter');
          this.afCrossEvents = fromWinter.slice(-10);
        },

        // Inline SVG wave plot — time-based 1-week window, bins data into pixel columns so
        // the chart compacts automatically as history grows (no index stretching).
        // `shown` comes from the caller's own x-show chain (accordion open + relevant cfg
        // toggle) — Alpine still evaluates x-html bindings on hidden elements every reactive
        // tick, so without this the rebuild below would run every time `afWave` changes even
        // while the panel is collapsed. No artificial tick dependency here: Alpine already
        // re-runs this whenever a property it actually reads (afWave, cfg.*) changes, so it
        // naturally recomputes only when new data arrives — not on a timer.
        _afWaveSvg(shown) {
          if (!shown) return '';
          const wave = this._afWaveSeries();
          const W = 260, H = 64, labelH = 12, pad = 6;
          const y = lean => pad + ((1 - lean) / 2) * (H - 2 * pad);
          const mid = y(0);
          const placeholder = `<svg width="100%" viewBox="0 0 ${W} ${H + labelH}" preserveAspectRatio="none" style="display:block"><line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="rgba(255,255,255,.15)" stroke-dasharray="3 3"/><text x="${W/2}" y="${H/2+3}" fill="rgba(255,255,255,.35)" font-size="9" font-family="monospace" text-anchor="middle">gathering structure history…</text></svg>`;
          if (wave.length < 2) return placeholder;
          const now = Date.now();
          const tMin = now - WAVE_TTL_MS;
          const plotW = W - 2 * pad;
          const BINS = Math.floor(plotW);
          const bins = new Array(BINS).fill(null).map(() => ({ sum: 0, n: 0 }));
          for (const p of wave) {
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            bins[bi].sum += p.lean; bins[bi].n++;
          }
          const pts = [];
          for (let i = 0; i < BINS; i++) {
            if (!bins[i].n) continue;
            pts.push({ x: pad + i + 0.5, lean: bins[i].sum / bins[i].n });
          }
          if (pts.length < 2) return placeholder;
          // A gap of missing bins this large means the bot was off/unable to sample for a
          // real stretch of time, not continuous data — break the lines there instead of
          // drawing a straight connector across the gap. Threshold must clear two floors:
          // it can never be smaller than a single bin's own width (BIN_MS) or literally
          // every adjacent pair of bins — i.e. every normal, gap-free render — would count
          // as "missing" data, since consecutive bins are BIN_MS apart by construction. It
          // also needs headroom above the scan cadence itself so ordinary scan-timing jitter
          // doesn't get misread as a gap.
          const BIN_MS = WAVE_TTL_MS / BINS;
          const WAVE_GAP_MS = Math.max(BIN_MS * 2, 3 * (this.cfg.scanMins ?? 15) * 60000);

          // FIO line: crowd funding-rate sentiment; only present in newer wave entries (guard p.fio != null)
          const fioBins = new Array(BINS).fill(null).map(() => ({ iSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.fio == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            fioBins[bi].iSum += p.fio; fioBins[bi].n++;
          }
          const fioPts = [];
          for (let i = 0; i < BINS; i++) {
            if (!fioBins[i].n) continue;
            fioPts.push({ x: pad + i + 0.5, fio: fioBins[i].iSum / fioBins[i].n });
          }
          let fioSvg = '';
          for (let i = 1; i < fioPts.length; i++) {
            const p1 = fioPts[i-1], p2 = fioPts[i];
            if ((p2.x - p1.x) * BIN_MS > WAVE_GAP_MS) continue;
            fioSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.fio).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.fio).toFixed(1)}" stroke="rgba(200,150,255,0.5)" stroke-width="1" stroke-dasharray="3 2"/>`;
          }

          // Score line: timestamp-direct (no binning) so stored values stay immutable as window scrolls
          const scorePts = [];
          for (const p of wave) {
            if (p.score == null) continue;
            const x = pad + ((p.ts - tMin) / WAVE_TTL_MS) * plotW;
            if (x < pad || x > pad + plotW) continue;
            scorePts.push({ x, s: p.score, ts: p.ts });
          }
          let scoreSvg = '';
          for (let i = 1; i < scorePts.length; i++) {
            const p1 = scorePts[i-1], p2 = scorePts[i];
            if (p2.ts - p1.ts > WAVE_GAP_MS) continue;
            const avg = (p1.s + p2.s) / 2;
            const gv = Math.round(50 + (avg + 1) / 2 * 160);
            scoreSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.s).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.s).toFixed(1)}" stroke="rgba(${gv},${gv},${gv},.8)" stroke-width="1.5"/>`;
          }

          const showMain  = this.cfg.ashfallWaveShowMain ?? true;
          const showFio    = this.cfg.ashfallWaveShowFio   ?? true;
          const showScore = this.cfg.afShowScore         ?? true;
          const cur = pts[pts.length - 1].lean;
          const col = cur > 0.05 ? 'var(--profit)' : cur < -0.05 ? 'var(--short)' : '#ff9650';
          const leanGroups = [[pts[0]]];
          for (let i = 1; i < pts.length; i++) {
            if ((pts[i].x - pts[i-1].x) * BIN_MS > WAVE_GAP_MS) leanGroups.push([]);
            leanGroups[leanGroups.length-1].push(pts[i]);
          }
          const mainPolylines = leanGroups.map(g => g.length > 1
            ? `<polyline points="${g.map(p => `${p.x.toFixed(1)},${y(p.lean).toFixed(1)}`).join(' ')}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>`
            : '').join('');
          const cx = pts[pts.length - 1].x, cy = y(cur);
          return `<svg width="100%" viewBox="0 0 ${W} ${H + labelH}" preserveAspectRatio="none" style="display:block">`
            + `<line x1="0" y1="${pad}" x2="${W}" y2="${pad}" stroke="rgba(0,229,160,.12)"/>`
            + `<line x1="0" y1="${(H-pad).toFixed(1)}" x2="${W}" y2="${(H-pad).toFixed(1)}" stroke="rgba(255,69,96,.12)"/>`
            + `<line x1="0" y1="${mid.toFixed(1)}" x2="${W}" y2="${mid.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-dasharray="3 3"/>`
            + (showFio    ? fioSvg   : '')
            + (showScore ? scoreSvg : '')
            + (showMain ? mainPolylines : '')
            + (showMain ? `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="${col}"/>` : '')
            + `<text x="2" y="${pad+7}" fill="rgba(0,229,160,.5)" font-size="8" font-family="monospace">bull</text>`
            + `<text x="2" y="${(H-pad-1).toFixed(1)}" fill="rgba(255,69,96,.5)" font-size="8" font-family="monospace">bear</text>`
            + (showFio && fioPts.length >= 2 ? `<text x="${W / 2}" y="${H + 9}" fill="rgba(200,150,255,.55)" font-size="8" font-family="monospace" text-anchor="middle">fio</text>` : '')
            + (showScore && scorePts.length >= 2 ? `<text x="${W - pad}" y="${H + 9}" fill="rgba(180,180,180,.55)" font-size="8" font-family="monospace" text-anchor="end">score</text>` : '')
            + `</svg>`;
        },

        // ── Hostility score: kernel-weighted, recency-decayed, normalized by entry margin.
        // score ∈ [−1,1]; mass = evidence weight; count = closes within kernel radius.
        _afScore(reading) {
          const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const now = Date.now();
          let num = 0, mass = 0, count = 0;
          for (const c of this.afCloses) {
            const ds = reading.skew - c.skew, db = reading.breadth - c.breadth;
