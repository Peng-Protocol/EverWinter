<!--
  Permafrost Strategy Plugin for PseudoWinter
  Self-calibrating halt governor: replaces the fixed 12h drawdown-throttle /
  gains-lock timers with a learned market-structure profile.

  Every halt event records the market structure (gainer/loser skew + breadth)
  at the moment it fired — drawdown events mark hostile climate, gains-lock
  events mark favorable climate. Scan cycles add weaker PnL-labeled samples
  between those anchors. While halted, structure is re-sampled on a slow
  timer. Halts run the stock 12h horizon by default. Only a *strong* historical
  bias (large |score| backed by enough evidence mass) changes that: it can hold
  the halt past 12h up to a hard cap (24h — the extreme case) while structure
  stays hostile, or "thaw" it early (as soon as 1h) once structure scores
  favorably. Without a strong bias the lock is never lifted early — it just
  serves its 12h. A thin profile falls back to the stock 12h timer too.

  PLK (preemptive lock, on by default): proactive rather than reactive — when
  a routine structure check reads a climate that is historically bad (score at
  or below the PLK trigger, with sufficient evidence), entries lock before any
  PnL damage occurs. A PLK rides the drawdown gate so every entry choke point
  respects it, and surfaces as a "PLK" countdown pill on the topbar (click to
  lift manually). Its duration scales with the strength of the historical bias
  up to the hard cap — an arbitrary span like 3h 20m — and it also lifts early
  once structure clears the thaw score under a strong bias. A real drawdown/
  gains-lock halt supersedes an active PLK. After a PLK ends, a dynamic cooldown
  equal to that lock's own duration must pass before another can engage — no
  back-to-back preemptive locks.

  Structure trajectory ("the wave"): a reading is judged in the context of what
  preceded it, not in isolation. The recent path of the structure lean is tracked
  and plotted in the accordion, and its direction folds into an inherent bull⇄bear
  oscillation prior — so a mildly-bearish tape that is turning up reads negative
  (don't short into the start of a pump). Learned history stays primary; the
  inherent wave only takes the helm when the profile is thin.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation, so the same logic powers Ashfall on PseudoChaser.

  Load via Plugin Manager in PseudoWinter's config panel.
  Load AFTER EverWinter if using live trading — see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const VERSION        = '1.13.4';
  const PFR_KEY        = '__permafrost_winter_v1';
  const CROSS_KEY      = '__everwinter_cross_v1';
  const CROSS_TTL      = 6 * 3600 * 1000;
  const SCORE_KEY      = '__everwinter_scorecard_v1';
  const SCORE_TTL      = 30 * 24 * 3600 * 1000;
  const PF_CRIT_EMOJI  = { '+fund': '🤑', '-fund': '💸', '+24h': '⬆️', '-24h': '⬇️', '>10pct': '🔊', '<10pct': '🔉', 'lsa': '🟥', 'lba': '🟩', 'rasl': '🔴', 'rabl': '🟢' };
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old scars fade
  const EVENT_W        = 10;                   // halt events are strong anchors
  const SAMPLE_W       = 1;                    // cycle samples are weak fill
  const MIN_MASS       = 6;                    // effective evidence mass required to override the timer
  const STRONG_MASS    = 12;                   // evidence mass for a *strong* historical bias (2× MIN_MASS)
  const STRONG_SCORE   = 0.30;                 // |score| at/above which the bias counts as strong
  const DEFAULT_HALT_MS = 12 * 3600 * 1000;    // stock 12h horizon — the floor unless strong history says otherwise
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never thaw before 1h (only reachable under a strong bias)
  const LABEL_WINDOW   = 6 * 3600 * 1000;      // samples are labeled by the realized PnL that followed
  const EVENTS_CAP     = 200;
  const SAMPLES_CAP    = 1000;
  const PNL_LOG_TTL    = 24 * 3600 * 1000;

  // ── Structure trajectory ("the wave") ──
  // A reading isn't just where the market is now — it's where it came from. We
  // track the recent path of the structure lean and read its direction, then
  // fold an *inherent* oscillation prior (markets swing strongly bullish ⇄
  // strongly bearish) into the decision. History stays primary; the inherent
  // wave only takes the helm when the learned profile is thin.
  const WAVE_TTL_MS    = 7 * 24 * 3600 * 1000; // wave retains as much structure history as we have, up to ~a week
  const WAVE_CAP       = 2000;              // hard cap on stored wave points
  const WAVE_MIN_PTS   = 3;                 // readings needed before a trajectory is meaningful
  const W_LEAN         = 0.6;               // inherent-score weight on the current structure level
  const W_SLOPE        = 0.4;               // inherent-score weight on the trajectory (where it's heading)
  const W_IO           = 0.15;              // inherent-score weight on collective IO sentiment (direct)
  const SLOPE_REF      = 0.3;               // lean change over the window that counts as full-scale
  const DIR            = -1;                // PseudoWinter shorts → favourable structure is bearish/falling

  window.__BotPlugin = {
    id:        'permafrost-winter',
    name:      'Permafrost (Winter)',
    version:   VERSION,
    targetBot: 'pseudowinter',
    after:     ['everwinter'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition', '_checkDrawdownThrottle', '_checkGainsLock', 'activateManualHalt'],

    css: `
      .pfr-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .pfr-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.permafrostEnabled"> + Permafrost</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Permafrost</span>
              <span x-show="cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.permafrostEnabled=!cfg.permafrostEnabled;persist()}">
              <div class="tog-t" :class="cfg.permafrostEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Permafrost Mode</div>
                <div class="pfr-hint">Learns which market climates correlate with drawdowns vs gains locks, building a historical structure profile over time.</div>
              </div>
            </label>
            <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.permafrostCrossEnabled=!cfg.permafrostCrossEnabled;persist()}">
              <div class="tog-t" :class="cfg.permafrostCrossEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Cross-Signal (Ashfall)</div>
                <div class="pfr-hint">Chaser cascade → halt + bail all. Chaser sacrifice → lift halt.</div>
              </div>
            </label>
            <label class="tog" style="margin-top:6px;margin-left:20px" x-show="cfg.permafrostCrossEnabled" @click.prevent="if(!cfgLocked){cfg.permafrostCrossWinLossEnabled=!cfg.permafrostCrossWinLossEnabled;persist()}">
              <div class="tog-t" :class="cfg.permafrostCrossWinLossEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Win/Loss Broadcast</div>
                <div class="pfr-hint">SL hit → broadcast sacrifice. TP hit → broadcast cascade. Only full SL/TP closes.</div>
              </div>
            </label>
            <label class="tog" style="margin-top:6px;margin-left:20px" x-show="cfg.permafrostCrossEnabled" @click.prevent="if(!cfgLocked){cfg.permafrostCrossStatusEnabled=!cfg.permafrostCrossStatusEnabled;persist()}">
              <div class="tog-t" :class="cfg.permafrostCrossStatusEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Halt Status Sync</div>
                <div class="pfr-hint">Broadcasts DDH/gains-lock transitions to partner. When Chaser is in drawdown, Winter maxPos doubles.</div>
              </div>
            </label>
            <div x-show="cfg.permafrostCrossEnabled && pfCrossEvents.length" class="pfr-hint" style="margin-top:5px" x-text="pfCrossEvents.slice().reverse().slice(0,3).map(e=>(e.kind==='cascade'?'⚡ Cascade':'🩸 Sacrifice')+' from Chaser — '+new Date(e.ts).toISOString().slice(11,19)+' UTC').join(' · ')"></div>
            <label class="tog" style="margin-top:10px" @click.prevent="if(!cfgLocked){cfg.permafrostScorecardEnabled=!cfg.permafrostScorecardEnabled;_pfScoreBuild();persist()}">
              <div class="tog-t" :class="cfg.permafrostScorecardEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Slot Scorecard</div>
                <div class="pfr-hint">Cumulative PnL per MIW slot combo across both bots. Partner closes are direction-inverted. Best → worst, left to right.</div>
              </div>
            </label>
            <div x-show="cfg.permafrostScorecardEnabled" style="margin-top:6px;padding:6px 8px;background:rgba(96,210,255,.03);border:1px solid rgba(96,210,255,.1);border-radius:3px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
                <div style="font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--text-lo)">SLOT SCORECARD (WINTER VIEW)</div>
                <span x-data="{c:false}" style="display:inline-flex;gap:3px;align-items:center">
                  <button x-show="!c" @click="if(!cfgLocked)c=true" style="font-family:var(--mono);font-size:7.5px;padding:1px 5px;border-radius:2px;border:1px solid rgba(255,80,80,.35);background:rgba(255,80,80,.08);color:rgba(255,80,80,.8);cursor:pointer;letter-spacing:.5px">CLEAR</button>
                  <template x-if="c">
                    <span style="display:inline-flex;gap:3px;align-items:center">
                      <span style="font-family:var(--mono);font-size:7.5px;color:rgba(255,80,80,.8)">Sure?</span>
                      <button @click="try{localStorage.removeItem('__everwinter_scorecard_v1')}catch(e){}; _pfScoreBuild(); c=false" style="font-family:var(--mono);font-size:7.5px;padding:1px 5px;border-radius:2px;border:1px solid rgba(255,80,80,.5);background:rgba(255,80,80,.18);color:rgba(255,80,80,.9);cursor:pointer;letter-spacing:.5px">Yes</button>
                      <button @click="c=false" style="font-family:var(--mono);font-size:7.5px;padding:1px 5px;border-radius:2px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--text-lo);cursor:pointer;letter-spacing:.5px">No</button>
                    </span>
                  </template>
                </span>
              </div>
              <div x-html="_pfScorecardHtml()" style="display:flex;flex-wrap:wrap;gap:4px"></div>
            </div>
            <div x-show="cfg.permafrostScorecardEnabled" style="margin-top:8px">
              <label class="tog" @click.prevent="if(!cfgLocked){cfg.permafrostAutoBlock=!cfg.permafrostAutoBlock;_pfScoreBuild();persist()}">
                <div class="tog-t" :class="cfg.permafrostAutoBlock?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Auto Block</div>
                  <div class="pfr-hint">Blocks MIW slots whose combined PnL (own + inverted partner) falls below the threshold. Unblocks automatically when partner losses bring the score back up.</div>
                </div>
              </label>
              <div x-show="cfg.permafrostAutoBlock" style="margin-top:6px;padding:6px 8px;background:rgba(255,80,80,.03);border:1px solid rgba(255,80,80,.1);border-radius:3px">
                <div class="lbl">Block Threshold <b x-text="'$'+(((cfg.minNotional||6)/(cfg.leverage||6))*(cfg.permafrostSlotLossThreshold??0.25)).toFixed(2)"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'('+(Math.round((cfg.permafrostSlotLossThreshold??0.25)*100))+'% margin)'"></span></div>
                <input type="range" min="0.05" max="1.00" step="0.05" x-model.number="cfg.permafrostSlotLossThreshold" @change="_pfScoreBuild();persist()">
                <div class="pfr-hint" style="margin-top:4px" x-text="(()=>{ const n=Object.values(miwBlockedSlots||{}).filter(v=>v==='blocked').length; return n===0?'No MIW slots blocked.':n+' slot'+(n===1?'':'s')+' blocked.'; })()"></div>
              </div>
            </div>
            <div x-show="cfg.permafrostEnabled" style="margin-top:8px">
              <div class="g" style="margin-top:10px">
                <div class="lbl">Structure Wave <b x-text="(()=>{ void tick; const s=pfStatus.slope??0; return s>0.05?'rising ▲':s<-0.05?'falling ▼':'steady ▬'; })()"></b></div>
                <div x-html="_pfWaveSvg()" style="margin-top:4px;border:1px solid rgba(96,210,255,.15);border-radius:3px;background:rgba(96,210,255,.03)"></div>
                <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">
                  <button @click="cfg.permafrostWaveShowMain=!(cfg.permafrostWaveShowMain??true);persist()" :style="(cfg.permafrostWaveShowMain??true)?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;cursor:pointer;letter-spacing:.5px">Main</button>
                  <button @click="cfg.permafrostWaveShowVol=!(cfg.permafrostWaveShowVol??true);persist()" :style="(cfg.permafrostWaveShowVol??true)?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;cursor:pointer;letter-spacing:.5px">Vol</button>
                  <button @click="cfg.permafrostWaveShowIo=!(cfg.permafrostWaveShowIo??true);persist()" :style="(cfg.permafrostWaveShowIo??true)?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.12)':'border-color:var(--border);color:var(--text-lo);background:transparent'" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;cursor:pointer;letter-spacing:.5px">IO</button>
                </div>
                <div class="pfr-hint">Structure lean path (bull ↑ / bear ↓), up to ~1 week of history. Direction matters — rising tape reads negative for shorts even if mildly bearish. History takes priority over the inherent wave when the profile is rich.</div>
                <div class="lbl" style="margin-top:8px">Slope Window <b x-text="(cfg.permafrostSlopeWindowHours??6)+'h'"></b></div>
                <input type="range" min="1" max="24" step="1" x-model.number="cfg.permafrostSlopeWindowHours" @change="persist()">
                <div class="pfr-hint">Timeframe for the directional comparison — "turning bullish/bearish" means the avg lean over the last N hours has shifted vs the N hours before it. Default 6h; raise to 12h for a slower, less reactive signal.</div>
                <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <label class="tog" style="font-size:9px" @click="cfg.permafrostIoEnabled=!cfg.permafrostIoEnabled;persist()">
                    <div class="tog-t" :class="cfg.permafrostIoEnabled?'on':''"><div class="tog-k"></div></div>
                    <span class="tog-l">Collective IO</span>
                  </label>
                  <span class="pfr-hint" style="margin:0">Aggregates funding rates across all tickers (already in the ticker response — zero extra bandwidth) as a direct crowd-sentiment signal and blends it into the inherent score.</span>
                </div>
                <div x-show="cfg.permafrostIoEnabled && pfStatus.ioScore != null" class="pfr-hint" style="margin-top:3px">
                  IO <span x-text="pfStatus.ioScore>=0?'+':''"></span><span x-text="(pfStatus.ioScore??0).toFixed(2)"></span> — <span x-text="(pfStatus.ioScore??0)>0.2?'crowd net long':(pfStatus.ioScore??0)<-0.2?'crowd net short':'crowd neutral'"></span>
                </div>
                <div style="margin-top:10px">
                  <div class="lbl">Structure Sampling <b x-text="pfKlineBar.red > 0 || pfKlineBar.green > 0 ? '🔴 '+pfKlineBar.red+' · 🟢 '+pfKlineBar.green+' · of '+pfKlineBar.max : '—'"></b></div>
                  <div style="display:flex;height:14px;border-radius:2px;overflow:hidden;margin-top:4px;border:1px solid rgba(255,255,255,.08)">
                    <div style="flex:1;display:flex;justify-content:flex-end;background:rgba(255,80,80,.04)">
                      <div :style="'width:'+Math.min(100,pfKlineBar.red/pfKlineBar.max*100)+'%;background:rgba(255,80,80,.55)'"></div>
                    </div>
                    <div style="width:1px;background:rgba(255,255,255,.18);flex-shrink:0"></div>
                    <div style="flex:1;display:flex;justify-content:flex-start;background:rgba(100,220,150,.04)">
                      <div :style="'width:'+Math.min(100,pfKlineBar.green/pfKlineBar.max*100)+'%;background:rgba(100,220,150,.55)'"></div>
                    </div>
                  </div>
                  <div class="pfr-hint" style="margin-top:2px">1h candle close direction — last kline sample. Red ← bears · bulls → Green.</div>
                </div>
              </div>
              <div class="pfr-stat" style="margin-top:10px;padding:8px 10px;background:rgba(96,210,255,.05);border:1px solid rgba(96,210,255,.15);border-radius:3px">
                <div>PROFILE — <span x-text="(pfEvents||[]).filter(e=>e.kind==='drawdown').length"></span> drawdown / <span x-text="(pfEvents||[]).filter(e=>e.kind==='gainslock').length"></span> gains-lock events, <span x-text="(pfSamples||[]).filter(s=>s.label!==null).length"></span> labeled samples</div>
                <div x-show="pfStatus.at">READING — mag <span x-text="(pfStatus.skew??0).toFixed(2)"></span> | breadth <span x-text="(pfStatus.breadth??0).toFixed(2)"></span> | score <span x-text="pfStatus.score===null?'—':pfStatus.score.toFixed(2)"></span> | mass <span x-text="pfStatus.mass.toFixed(1)"></span></div>
                <div x-show="pfStatus.at">STRUCTURE — lean <span x-text="(pfStatus.lean??0).toFixed(2)"></span> | slope <span x-text="(pfStatus.slope>=0?'+':'')+(pfStatus.slope??0).toFixed(2)"></span> | effective <span x-text="pfStatus.eff===null||pfStatus.eff===undefined?'—':((pfStatus.eff>=0?'+':'')+pfStatus.eff.toFixed(2))"></span> for shorts</div>
                <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
                  <button @click="pfExport()" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(96,210,255,.4);border-radius:2px;background:none;color:var(--ice);cursor:pointer;letter-spacing:.5px">Export</button>
                  <span x-data="{c:false}" style="display:inline-flex;gap:3px;align-items:center">
                    <button x-show="!c" @click="c=true" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(96,210,255,.4);border-radius:2px;background:none;color:var(--ice);cursor:pointer;letter-spacing:.5px">Import</button>
                    <template x-if="c">
                      <span style="display:inline-flex;gap:3px;align-items:center">
                        <span style="font-family:var(--mono);font-size:8px;color:var(--ice)">Replace profile?</span>
                        <button @click="document.getElementById('pfr-import-file').click(); c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(96,210,255,.5);border-radius:2px;background:rgba(96,210,255,.12);color:var(--ice);cursor:pointer;letter-spacing:.5px">Yes</button>
                        <button @click="c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(255,255,255,.15);border-radius:2px;background:rgba(255,255,255,.05);color:var(--text-lo);cursor:pointer;letter-spacing:.5px">No</button>
                      </span>
                    </template>
                  </span>
                  <input type="file" id="pfr-import-file" accept=".json" style="display:none" @change="pfImport($event)">
                  <span x-data="{c:false}" style="display:inline-flex;gap:3px;align-items:center">
                    <button x-show="!c" @click="if(!cfgLocked)c=true" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.4);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Profile</button>
                    <template x-if="c">
                      <span style="display:inline-flex;gap:3px;align-items:center">
                        <span style="font-family:var(--mono);font-size:8px;color:var(--short)">Sure?</span>
                        <button @click="pfEvents=[];pfSamples=[];pfPnl=[];pfWave=[];persist();log('[PFR] Profile cleared.','warn'); c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:rgba(255,69,96,.12);color:var(--short);cursor:pointer;letter-spacing:.5px">Yes</button>
                        <button @click="c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(255,255,255,.15);border-radius:2px;background:rgba(255,255,255,.05);color:var(--text-lo);cursor:pointer;letter-spacing:.5px">No</button>
                      </span>
                    </template>
                  </span>
                </div>
              </div>
            </div>
            <div x-data="{ dzOpen:false }" style="margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:8px">
              <button @click="dzOpen=!dzOpen" style="font-family:var(--mono);font-size:9px;padding:2px 8px;border:1px solid rgba(255,69,96,.25);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px;display:flex;align-items:center;gap:4px"><span x-text="dzOpen?'▾':'▸'"></span>&nbsp;Danger Zone</button>
              <div x-show="dzOpen" x-transition.opacity style="margin-top:6px;padding:8px;background:rgba(255,69,96,.04);border:1px solid rgba(255,69,96,.18);border-radius:3px">
                <span x-data="{c:false}" style="display:inline-flex;gap:3px;align-items:center">
                  <button x-show="!c" @click="if(!cfgLocked)c=true" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Plugin State</button>
                  <template x-if="c">
                    <span style="display:inline-flex;gap:3px;align-items:center">
                      <span style="font-family:var(--mono);font-size:8px;color:var(--short)">Sure?</span>
                      <button @click="localStorage.removeItem('__permafrost_winter_v1');pfEvents=[];pfSamples=[];pfPnl=[];pfWave=[];persist();log('[PFR] Plugin state cleared from storage.','warn'); c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:rgba(255,69,96,.12);color:var(--short);cursor:pointer;letter-spacing:.5px">Yes</button>
                      <button @click="c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(255,255,255,.15);border-radius:2px;background:rgba(255,255,255,.05);color:var(--text-lo);cursor:pointer;letter-spacing:.5px">No</button>
                    </span>
                  </template>
                </span>
                <div class="pfr-hint" style="margin-top:4px">Wipes all Permafrost data from browser storage — events, samples, and wave history. Also clears the storage key so no orphaned data lingers if the plugin is removed. Export first if you want to preserve the profile.</div>
              </div>
            </div>
          </div>
        </div>
      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origPers  = def.persist;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;

      let _pfCrossLastCascadeActed   = 0;
      let _pfCrossLastSacrificeActed = 0;
      let _pfPartnerInDDH            = false;
      let _pfPartnerInGLK            = false;
      let _pfWasHalted               = false;
      let _pfWasGainsLocked          = false;

      return Object.assign({}, def, {

        pfEvents:     [],   // { ts, kind:'drawdown'|'gainslock', skew, breadth, gCount, lCount, gSum, lSum }
        pfSamples:    [],   // { ts, skew, breadth, label } — label null until the 6h window resolves
        pfPnl:        [],   // { ts, pnl } — plugin-owned closed-trade log for sample labeling
        pfWave:       [],   // { ts, lean } — structure-lean trajectory, retained up to ~a week (the "wave")
        pfScoreboard: [],   // sorted scorecard entries built from SCORE_KEY records
        pfKlineBar:   { red: 0, green: 0, max: 50 }, // last-cycle kline close direction counts
        _pfStructureList: null, _pfStructureAt: 0, // own 3h ticker cache independent of host
        pfStatus:  { skew: null, breadth: null, score: null, mass: 0, lean: 0, slope: 0, inherent: 0, eff: null, ioScore: null, at: 0 },
        pfCrossEvents: [],

        async init() {
          await _origInit.call(this);
          if (this.cfg.permafrostEnabled          === undefined) this.cfg.permafrostEnabled          = false;
          if (this.cfg.permafrostSlopeWindowHours === undefined) this.cfg.permafrostSlopeWindowHours = 6;
          if (this.cfg.permafrostIoEnabled        === undefined) this.cfg.permafrostIoEnabled        = true;
          if (this.cfg.permafrostWaveShowMain     === undefined) this.cfg.permafrostWaveShowMain     = true;
          if (this.cfg.permafrostWaveShowVol      === undefined) this.cfg.permafrostWaveShowVol      = true;
          if (this.cfg.permafrostWaveShowIo       === undefined) this.cfg.permafrostWaveShowIo       = true;
          if (this.cfg.permafrostCrossEnabled        === undefined) this.cfg.permafrostCrossEnabled        = true;
          if (this.cfg.permafrostCrossWinLossEnabled  === undefined) this.cfg.permafrostCrossWinLossEnabled  = false;
          if (this.cfg.permafrostCrossStatusEnabled    === undefined) this.cfg.permafrostCrossStatusEnabled    = false;
          if (this.cfg.permafrostScorecardEnabled        === undefined) this.cfg.permafrostScorecardEnabled        = false;
          if (this.cfg.permafrostAutoBlock               === undefined) this.cfg.permafrostAutoBlock               = false;
          if (this.cfg.permafrostSlotLossThreshold       === undefined) this.cfg.permafrostSlotLossThreshold       = 0.25;
          this._pfScoreBuild();
          try {
            const raw = localStorage.getItem(PFR_KEY);
            if (raw) {
              const s = JSON.parse(raw);
              if (Array.isArray(s.events))  this.pfEvents  = s.events.slice(-EVENTS_CAP);
              if (Array.isArray(s.samples)) this.pfSamples = s.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(s.pnl))     this.pfPnl     = s.pnl.filter(e => Date.now() - e.ts < PNL_LOG_TTL);
              if (Array.isArray(s.wave))    this.pfWave    = s.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              if (typeof s.crossLastCascadeActed  === 'number') _pfCrossLastCascadeActed  = s.crossLastCascadeActed;
              if (typeof s.crossLastSacrificeActed === 'number') _pfCrossLastSacrificeActed = s.crossLastSacrificeActed;
            }
          } catch(e) {}
          this.log(`[PFR] Permafrost (Winter) v${VERSION} loaded — ${this.cfg.permafrostEnabled ? 'enabled' : 'disabled'} | ${this.pfEvents.length} events, ${this.pfSamples.length} samples on record`, 'info');
          setInterval(() => {
            if (this.cfg.permafrostCrossEnabled) this._pfCheckCross().catch(() => {});
            if (this.cfg.permafrostScorecardEnabled) this._pfScoreBuild();
            if (this.cfg.permafrostCrossEnabled && this.cfg.permafrostCrossStatusEnabled) {
              const _halted  = this._isDrawdownHalted?.() ?? false;
              const _glocked = this._isGainsLocked?.()    ?? false;
              if (_halted !== _pfWasHalted) {
                _pfWasHalted = _halted;
                this._pfCrossWrite(_halted ? 'ddh-start' : 'ddh-end');
              }
              if (_glocked !== _pfWasGainsLocked) {
                _pfWasGainsLocked = _glocked;
                this._pfCrossWrite(_glocked ? 'glk-start' : 'glk-end');
              }
            }
            if (this.cfg.permafrostEnabled && (this._isDrawdownHalted?.() ?? false)) {
              const _cdMs = (this.cfg.bulkTickerCooldownHours ?? 3) * 3600 * 1000;
              if ((Date.now() - (this._pfStructureAt || 0)) >= _cdMs) {
                this._pfFetchStructure().then(r => {
                  if (!r) return;
                  this._pfAddSample(r);
                  const { score, mass } = this.pfStatus;
                  const _d = this._pfDescribe(r, score, mass);
                  this.log(`[PFR] ❄ Structure check (halt-tick) — market is ${_d.desc} | ${_d.bias}`, 'info');
                }).catch(() => {});
              }
            }
          }, 15000);
        },

        persist() {
          _origPers.call(this);
          try {
            localStorage.setItem(PFR_KEY, JSON.stringify({
              events: this.pfEvents, samples: this.pfSamples, pnl: this.pfPnl, wave: this.pfWave,
              crossLastCascadeActed: _pfCrossLastCascadeActed,
              crossLastSacrificeActed: _pfCrossLastSacrificeActed,
            }));
          } catch(e) {}
        },

        // ── Market structure reading — full ticker universe, not the curated pools ──
        async _pfFetchStructure() {
          try {
            // Reuse the host scan's bulk ticker response when fresh (slow-tick
            // sampling during halts falls back to fetching — scans don't run then)
            const cooldownMs = (this.cfg.bulkTickerCooldownHours ?? 3) * 3600 * 1000;
            let list;
            if (this._pfStructureList?.length && (Date.now() - (this._pfStructureAt || 0)) < cooldownMs) {
              list = this._pfStructureList; // own cache within cooldown
            } else if (this._lastAllTickers?.length && (Date.now() - (this._lastAllTickersAt || 0)) < 60000) {
              list = this._lastAllTickers;  // host just fetched this tick — piggyback
              this._pfStructureList = list;
              this._pfStructureAt   = this._lastAllTickersAt;
            } else {
              const r = await fetch(`${this.base}/v5/market/tickers?category=linear`);
              const d = await r.json();
              if (d.retCode !== 0) return null;
              list = d.result?.list || [];
              this._pfStructureList = list;
              this._pfStructureAt   = Date.now();
            }
            let gSum = 0, lSum = 0, gCount = 0, lCount = 0;
            let gTurnover = 0, lTurnover = 0;
            let frSum = 0, frCount = 0;
            for (const t of list) {
              if (!t.symbol.endsWith('USDT') || t.symbol === 'BTCUSDT') continue;
              if (parseFloat(t.lastPrice || 0) < 0.001) continue;
              const ch  = parseFloat(t.price24hPcnt || 0) * 100;
              const tvr = parseFloat(t.turnover24h  || 0);
              if (ch > 0)      { gSum += ch; gCount++; gTurnover += tvr; }
              else if (ch < 0) { lSum += Math.abs(ch); lCount++; lTurnover += tvr; }
              const fr = parseFloat(t.fundingRate || 0);
              if (!isNaN(fr)) { frSum += fr * 100; frCount++; } // accumulate as %
            }
            const sumT   = gSum + lSum, cntT = gCount + lCount;
            const totalTvr = gTurnover + lTurnover;
            const vol    = totalTvr > 0 ? +((gTurnover - lTurnover) / totalTvr).toFixed(4) : 0;
            const volAbs = +(totalTvr / 1e9).toFixed(2); // USD billions

            // Collective IO from aggregate funding rate: positive funding = longs paying = crowd net long.
            // Normalised against 0.05% reference (≈5× the typical 0.01%/8h baseline) → [-1, 1].
            const ioScore = frCount > 0
              ? +Math.max(-1, Math.min(1, (frSum / frCount) / 0.05)).toFixed(4)
              : null;

            return {
              ts: Date.now(),
              skew:    sumT > 0 ? (gSum - lSum) / sumT : 0,
              breadth: cntT > 0 ? (gCount - lCount) / cntT : 0,
              gCount, lCount,
              gSum: +gSum.toFixed(1), lSum: +lSum.toFixed(1),
              vol, volAbs, ioScore,
            };
          } catch(e) { return null; }
        },

        // ── Human-readable structure + historical-bias phrasing for the activity log ──
        // Intensity ranges over mildly / moderately / strongly bullish (or bearish). The
        // tiers are entirely relative to this installation's own history: thresholds are
        // the 25th / 50th / 80th percentiles of |lean| across recorded events + samples,
        // so they shift as the profile collects more data. Fixed fallbacks
        // (0.08 / 0.20 / 0.40) apply until at least 30 readings are on record.
        _pfDescribe(reading, score, mass) {
          const lean = (reading.skew + reading.breadth) / 2;
          const hist = [...this.pfEvents, ...this.pfSamples]
            .map(x => Math.abs((x.skew + x.breadth) / 2))
            .sort((a, b) => a - b);
          const q = p => hist[Math.min(hist.length - 1, Math.floor(p * hist.length))];
          const [tFlat, tModerate, tStrong] = hist.length >= 30 ? [q(0.25), q(0.5), q(0.8)] : [0.08, 0.20, 0.40];
          const mag    = Math.abs(lean);
          const adverb = mag >= tStrong ? 'strongly ' : mag >= tModerate ? 'moderately ' : 'mildly ';
          const struct = mag <= tFlat ? 'mixed/flat' : `${adverb}${lean > 0 ? 'bullish' : 'bearish'}`;
          const slope  = this._pfTrajectory().slope;
          const trend  = slope > 0.05 ? ', rising (turning bullish)' : slope < -0.05 ? ', falling (turning bearish)' : ', steady';
          const ioStr  = reading.ioScore != null ? `, io ${reading.ioScore >= 0 ? '+' : ''}${reading.ioScore.toFixed(2)}` : '';
          const desc   = `${struct}${trend} (mag ${reading.skew.toFixed(2)}, breadth ${reading.breadth.toFixed(2)}, slope ${slope >= 0 ? '+' : ''}${slope.toFixed(2)}${ioStr}, ${reading.gCount}▲/${reading.lCount}▼)`;
          const inherent = this._pfInherent(lean, slope, reading.ioScore ?? null);
          const eff      = this._pfEffectiveScore(score, mass, inherent);
          let bias;
          if (score === null || mass < MIN_MASS) bias = `thin history (mass ${mass.toFixed(1)} < ${MIN_MASS}) — leaning on inherent structure (${eff >= 0 ? '+' : ''}${eff.toFixed(2)} for shorts)`;
          else if (score >= 0.15)  bias = `historically good for shorts (score +${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else if (score <= -0.15) bias = `historically bad for shorts (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          else                     bias = `historically neutral for shorts (score ${score.toFixed(2)}, mass ${mass.toFixed(1)})`;
          if (score !== null && mass >= MIN_MASS && Math.abs(eff - score) >= 0.1) bias += ` | structure shifts the effective read to ${eff >= 0 ? '+' : ''}${eff.toFixed(2)}`;
          return { desc, bias, eff };
        },

        // ── Hostility score: kernel-weighted, recency-decayed vote of past events
        // and labeled samples near the given reading. score ∈ [−1,1]; mass = evidence weight.
        _pfScore(reading) {
          const now = Date.now();
          let num = 0, mass = 0;
          const tally = (skew, breadth, label, w, ts) => {
            const ds = reading.skew - skew, db = reading.breadth - breadth;
            const k  = Math.exp(-(ds * ds + db * db) / (2 * KERNEL_H * KERNEL_H));
            const dec = Math.pow(0.5, (now - ts) / HALF_LIFE_MS);
            num  += w * label * k * dec;
            mass += w * k * dec;
          };
          for (const e of this.pfEvents) tally(e.skew, e.breadth, e.kind === 'drawdown' ? -1 : 1, EVENT_W, e.ts);
          for (const s of this.pfSamples) { if (s.label !== null) tally(s.skew, s.breadth, s.label, SAMPLE_W, s.ts); }
          return { score: mass > 0 ? num / mass : null, mass };
        },

        // ── The wave: recent path of the structure lean (oldest → newest) ──
        // lean = (skew + breadth) / 2 ∈ [−1,1]: +1 strongly bullish, −1 strongly bearish.
        _pfWaveSeries() {
          const cut = Date.now() - WAVE_TTL_MS;
          return this.pfWave.filter(p => p.ts >= cut);
        },

        // Append a structure-lean point to the wave and prune by age / cap. Kept
        // separate from pfSamples (which get pruned for scoring) so the wave
        // retains the full trajectory for as long as we have data, up to ~a week.
        _pfPushWave(reading) {
          this.pfWave.push({ ts: reading.ts, lean: +(((reading.skew + reading.breadth) / 2)).toFixed(4), vol: reading.vol ?? 0, volAbs: reading.volAbs ?? 0, io: reading.ioScore ?? null });
          const cut = Date.now() - WAVE_TTL_MS;
          if (this.pfWave.length && this.pfWave[0].ts < cut) this.pfWave = this.pfWave.filter(p => p.ts >= cut);
          if (this.pfWave.length > WAVE_CAP) this.pfWave = this.pfWave.slice(-WAVE_CAP);
        },

        // Current lean plus its trajectory (slope = avg lean over last N hours − avg lean N–2N hours ago).
        // Using a fixed time window (cfg.permafrostSlopeWindowHours, default 6h) so "turning bullish/bearish"
        // always reflects the same timeframe regardless of how much wave history has accumulated.
        // slope > 0 → drifting bullish; slope < 0 → drifting bearish.
        _pfTrajectory() {
          const wave = this._pfWaveSeries();
          const n    = wave.length;
          const lean = n ? wave[n - 1].lean : (((this.pfStatus.skew ?? 0) + (this.pfStatus.breadth ?? 0)) / 2);
          if (n < WAVE_MIN_PTS) return { lean, slope: 0, n };
          const winMs     = (this.cfg.permafrostSlopeWindowHours ?? 6) * 3600 * 1000;
          const now       = Date.now();
          const recentPts = wave.filter(p => p.ts >= now - winMs);
          const olderPts  = wave.filter(p => p.ts >= now - 2 * winMs && p.ts < now - winMs);
          if (!recentPts.length || !olderPts.length) return { lean, slope: 0, n };
          const recent = recentPts.reduce((a, p) => a + p.lean, 0) / recentPts.length;
          const older  = olderPts.reduce((a, p) => a + p.lean, 0) / olderPts.length;
          return { lean, slope: recent - older, n };
        },

        // Inherent favourability for this bot's direction (DIR), from the wave alone:
        // a short bot likes bearish *and* falling structure; longing likes bullish/rising.
        // The slope term is what stops us shorting into the start of a pump (mildly
        // bearish but turning up) or longing into the start of a dump.
        _pfInherent(lean, slope, ioScore) {
          const slopeN = Math.max(-1, Math.min(1, (slope || 0) / SLOPE_REF));
          // IO is direct: crowd-long pressure is bullish, crowd-short pressure is bearish.
          // W_IO is additive alongside lean/slope — the outer clamp keeps the result in [-1, 1].
          const ioN = ioScore != null ? Math.max(-1, Math.min(1, ioScore)) : 0;
          return Math.max(-1, Math.min(1, DIR * (W_LEAN * (lean || 0) + W_SLOPE * slopeN + W_IO * ioN)));
        },

        // Effective score: learned history is primary, the inherent wave is the
        // fallback — blended by how much evidence the profile actually has.
        _pfEffectiveScore(score, mass, inherent) {
          const massFrac = Math.max(0, Math.min(1, (mass || 0) / STRONG_MASS));
          return score === null ? inherent : massFrac * score + (1 - massFrac) * inherent;
        },

        _pfUpdateKlineBar() {
          const cache = this._miwKlineCache;
          if (!cache) return;
          const lastHourStart = Math.floor(Date.now() / 3_600_000) * 3_600_000 - 3_600_000;
          let red = 0, green = 0;
          for (const e of Object.values(cache)) {
            if (e.candleStart !== lastHourStart) continue;
            if (e.close < e.open) red++;
            else if (e.close > e.open) green++;
          }
          this.pfKlineBar = { red, green, max: this.cfg.miwKlineScanCap ?? 50 };
        },

        _pfScoreRead() {
          try {
            const raw = localStorage.getItem(SCORE_KEY);
            if (!raw) return [];
            const cut = Date.now() - SCORE_TTL;
            return (JSON.parse(raw) || []).filter(r => r.ts >= cut && Array.isArray(r.criteria) && r.criteria.length);
          } catch(e) { return []; }
        },
        _pfScoreWrite(criteria, pnl) {
          try {
            const records = this._pfScoreRead();
            records.push({ ts: Date.now(), criteria, pnl, source: 'winter' });
            localStorage.setItem(SCORE_KEY, JSON.stringify(records));
          } catch(e) {}
        },
        _pfScoreBuild() {
          const records = this._pfScoreRead();
          const map = {};
          for (const r of records) {
            const key = [...r.criteria].sort().join(',');
            if (!map[key]) map[key] = { criteria: r.criteria, totalPnl: 0, wins: 0, losses: 0 };
            const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
            const ownPnl = r.source === 'winter' ? pnl : -pnl;
            map[key].totalPnl += ownPnl;
            if (ownPnl > 0) map[key].wins++; else map[key].losses++;
          }
          this.pfScoreboard = Object.values(map).sort((a, b) => b.totalPnl - a.totalPnl);
          if (this.cfg.permafrostAutoBlock) {
            const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
            const lossThresh = baseMargin * (this.cfg.permafrostSlotLossThreshold ?? 0.25);
            const blocks = {};
            for (const s of this.pfScoreboard) {
              const key = [...s.criteria].sort().join(',');
              if (s.totalPnl <= -lossThresh) blocks[key] = 'blocked';
            }
            this.miwBlockedSlots = blocks;
          } else {
            this.miwBlockedSlots = {};
          }
          const ranks = {};
          for (const s of this.pfScoreboard) {
            const key = [...s.criteria].sort().join(',');
            if (!this.miwBlockedSlots[key]) ranks[key] = s.totalPnl;
          }
          this.miwSlotRanks = ranks;
        },
        _pfScorecardHtml() {
          if (!this.pfScoreboard.length) return '<span style="font-size:9px;color:var(--text-lo)">No MIW closes recorded yet.</span>';
          return this.pfScoreboard.map(s => {
            const emoji = s.criteria.map(c => PF_CRIT_EMOJI[c] || c).join('');
            const clr = s.totalPnl > 0 ? 'rgba(96,210,255,.9)' : s.totalPnl < 0 ? 'var(--short)' : 'var(--text-lo)';
            const bg  = s.totalPnl > 0 ? 'rgba(96,210,255,.08)' : s.totalPnl < 0 ? 'rgba(255,80,80,.08)' : 'rgba(255,255,255,.04)';
            const bdr = s.totalPnl > 0 ? 'rgba(96,210,255,.35)' : s.totalPnl < 0 ? 'rgba(255,80,80,.35)' : 'rgba(255,255,255,.12)';
            const pnlStr = (s.totalPnl >= 0 ? '+$' : '-$') + Math.abs(s.totalPnl).toFixed(2);
            const title = s.criteria.join(' + ');
            return `<span title="${title}" style="font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:2px;border:1px solid ${bdr};background:${bg};color:${clr};white-space:nowrap">${emoji || '?'} <b>${pnlStr}</b> <span style="opacity:.55;font-size:8px">${s.wins}W ${s.losses}L</span></span>`;
          }).join('');
        },

        _pfCrossRead() {
          try {
            const raw = localStorage.getItem(CROSS_KEY);
            if (!raw) return [];
            const cut = Date.now() - CROSS_TTL;
            return (JSON.parse(raw).events || []).filter(e => e.ts >= cut);
          } catch(e) { return []; }
        },

        _pfCrossWrite(kind) {
          try {
            const events = this._pfCrossRead();
            events.push({ ts: Date.now(), kind, source: 'winter' });
            localStorage.setItem(CROSS_KEY, JSON.stringify({ events }));
          } catch(e) {}
        },

        async _pfCheckCross() {
          if (!this.cfg.permafrostCrossEnabled) return;
          const fromChaser = this._pfCrossRead().filter(e => e.source === 'chaser');
          this.pfCrossEvents = fromChaser.slice(-10);

          const lat = kind => fromChaser.filter(e => e.kind === kind).reduce((m, e) => !m || e.ts > m.ts ? e : m, null);
          const latCascade  = lat('cascade');
          const latSacrifice = lat('sacrifice');

          if (latCascade && latCascade.ts > _pfCrossLastCascadeActed) {
            _pfCrossLastCascadeActed = latCascade.ts;
            const haltMs = (this.cfg.drawdownHaltHours ?? 6) * 3600 * 1000;
            this._drawdownHaltUntil = Date.now() + haltMs;
            this.log(`[PFR] ❄ Cross-signal — Chaser cascade at ${new Date(latCascade.ts).toISOString().slice(11,19)} UTC → drawdown halt ${this.cfg.drawdownHaltHours ?? 6}h + bailing all Winter positions`, 'warn');
            this.bailAll().catch(() => {});
            this._pfFetchStructure().then(r => {
              if (!r) return;
              this.pfEvents.push({ ts: r.ts, kind: 'drawdown', skew: r.skew, breadth: r.breadth, gCount: r.gCount, lCount: r.lCount, gSum: r.gSum, lSum: r.lSum, _cross: true });
              if (this.pfEvents.length > EVENTS_CAP) this.pfEvents = this.pfEvents.slice(-EVENTS_CAP);
              this._pfPushWave(r);
              this.persist();
            }).catch(() => {});
          }

          if (latSacrifice && latSacrifice.ts > _pfCrossLastSacrificeActed && this._isDrawdownHalted()) {
            _pfCrossLastSacrificeActed = latSacrifice.ts;
            this._drawdownHaltUntil = null;
            this._drawdownWindow = [];
            this.log(`[PFR] ❄ Cross-signal — Chaser sacrifice at ${new Date(latSacrifice.ts).toISOString().slice(11,19)} UTC → drawdown halt lifted, Winter re-enabled`, 'success');
            this._pfFetchStructure().then(r => {
              if (!r) return;
              this.pfEvents.push({ ts: r.ts, kind: 'gainslock', skew: r.skew, breadth: r.breadth, gCount: r.gCount, lCount: r.lCount, gSum: r.gSum, lSum: r.lSum, _cross: true });
              if (this.pfEvents.length > EVENTS_CAP) this.pfEvents = this.pfEvents.slice(-EVENTS_CAP);
              this._pfPushWave(r);
              this.persist();
            }).catch(() => {});
          }

          if (this.cfg.permafrostCrossStatusEnabled) {
            const latDDHStart = lat('ddh-start');
            const latDDHEnd   = lat('ddh-end');
            const nowInDDH    = !!(latDDHStart && (!latDDHEnd || latDDHStart.ts > latDDHEnd.ts));
            if (nowInDDH !== _pfPartnerInDDH) {
              _pfPartnerInDDH = nowInDDH;
              if (nowInDDH) this.log(`[PFR] ❄ Cross-status — Chaser entered drawdown halt → Winter maxPos ×2`, 'warn');
              else          this.log(`[PFR] ❄ Cross-status — Chaser drawdown lifted → Winter maxPos restored`, 'info');
            }
            const latGLKStart = lat('glk-start');
            const latGLKEnd   = lat('glk-end');
            const nowInGLK    = !!(latGLKStart && (!latGLKEnd || latGLKStart.ts > latGLKEnd.ts));
            if (nowInGLK !== _pfPartnerInGLK) {
              _pfPartnerInGLK = nowInGLK;
              if (nowInGLK) this.log(`[PFR] ❄ Cross-status — Chaser entered gains lock`, 'info');
              else          this.log(`[PFR] ❄ Cross-status — Chaser gains lock lifted`, 'info');
            }
          }
        },

        // Inline SVG wave plot — time-based 1-week window, bins data into pixel columns so
        // the chart compacts automatically as history grows (no index stretching).
        _pfWaveSvg() {
          void this.tick;
          const wave = this._pfWaveSeries();
          const W = 260, H = 64, pad = 6;
          const y = lean => pad + ((1 - lean) / 2) * (H - 2 * pad);
          const mid = y(0);
          const placeholder = `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block"><line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="rgba(255,255,255,.15)" stroke-dasharray="3 3"/><text x="${W/2}" y="${H/2+3}" fill="rgba(255,255,255,.35)" font-size="9" font-family="monospace" text-anchor="middle">gathering structure history…</text></svg>`;
          if (wave.length < 2) return placeholder;
          const now = Date.now();
          const tMin = now - WAVE_TTL_MS;
          const plotW = W - 2 * pad;
          const BINS = Math.floor(plotW);
          const bins = new Array(BINS).fill(null).map(() => ({ sum: 0, n: 0 }));
          for (const p of wave) {
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            bins[bi].sum += p.lean; bins[bi].n++;
          }
          const pts = [];
          for (let i = 0; i < BINS; i++) {
            if (!bins[i].n) continue;
            pts.push({ x: pad + i + 0.5, lean: bins[i].sum / bins[i].n });
          }
          if (pts.length < 2) return placeholder;

          // Volume line: bin vol and volAbs alongside lean; opacity reflects absolute volume level.
          const vBins = new Array(BINS).fill(null).map(() => ({ vSum: 0, aSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.vol == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            vBins[bi].vSum += p.vol; vBins[bi].aSum += (p.volAbs ?? Math.abs(p.vol)); vBins[bi].n++;
          }
          const volPts = [];
          for (let i = 0; i < BINS; i++) {
            if (!vBins[i].n) continue;
            volPts.push({ x: pad + i + 0.5, v: vBins[i].vSum / vBins[i].n, abs: vBins[i].aSum / vBins[i].n });
          }
          const maxAbs = Math.max(...volPts.map(p => p.abs), 0.001);
          // Draw vol as individual segments so each can carry its own opacity (low vol → faint).
          let volSvg = '';
          for (let i = 1; i < volPts.length; i++) {
            const p1 = volPts[i-1], p2 = volPts[i];
            const relAbs = ((p1.abs + p2.abs) / 2) / maxAbs;
            const op = (0.12 + relAbs * 0.55).toFixed(2);
            volSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.v).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.v).toFixed(1)}" stroke="rgba(255,185,50,${op})" stroke-width="1"/>`;
          }

          // IO line: crowd funding-rate sentiment; only present in newer wave entries (guard p.io != null)
          const ioBins = new Array(BINS).fill(null).map(() => ({ iSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.io == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            ioBins[bi].iSum += p.io; ioBins[bi].n++;
          }
          const ioPts = [];
          for (let i = 0; i < BINS; i++) {
            if (!ioBins[i].n) continue;
            ioPts.push({ x: pad + i + 0.5, io: ioBins[i].iSum / ioBins[i].n });
          }
          let ioSvg = '';
          for (let i = 1; i < ioPts.length; i++) {
            const p1 = ioPts[i-1], p2 = ioPts[i];
            ioSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.io).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.io).toFixed(1)}" stroke="rgba(200,150,255,0.5)" stroke-width="1" stroke-dasharray="3 2"/>`;
          }

          const showMain = this.cfg.permafrostWaveShowMain ?? true;
          const showVol = this.cfg.permafrostWaveShowVol ?? true;
          const showIo  = this.cfg.permafrostWaveShowIo  ?? true;
          const cur = pts[pts.length - 1].lean;
          const col = cur > 0.05 ? 'var(--profit)' : cur < -0.05 ? 'var(--short)' : 'var(--ice)';
          const polyPts = pts.map(p => `${p.x.toFixed(1)},${y(p.lean).toFixed(1)}`).join(' ');
          const cx = pts[pts.length - 1].x, cy = y(cur);
          return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block">`
            + `<line x1="0" y1="${pad}" x2="${W}" y2="${pad}" stroke="rgba(0,229,160,.12)"/>`
            + `<line x1="0" y1="${(H-pad).toFixed(1)}" x2="${W}" y2="${(H-pad).toFixed(1)}" stroke="rgba(255,69,96,.12)"/>`
            + `<line x1="0" y1="${mid.toFixed(1)}" x2="${W}" y2="${mid.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-dasharray="3 3"/>`
            + (showVol ? volSvg : '')
            + (showIo  ? ioSvg  : '')
            + (showMain ? `<polyline points="${polyPts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>` : '')
            + (showMain ? `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="${col}"/>` : '')
            + `<text x="2" y="${pad+7}" fill="rgba(0,229,160,.5)" font-size="8" font-family="monospace">bull</text>`
            + `<text x="2" y="${(H-pad-1).toFixed(1)}" fill="rgba(255,69,96,.5)" font-size="8" font-family="monospace">bear</text>`
            + (showVol ? `<text x="${W-18}" y="${pad+7}" fill="rgba(255,185,50,.45)" font-size="8" font-family="monospace">vol</text>` : '')
            + (showIo && ioPts.length >= 2 ? `<text x="${W-10}" y="${pad+17}" fill="rgba(200,150,255,.45)" font-size="8" font-family="monospace">io</text>` : '')
            + `</svg>`;
        },

        // ── Label samples whose 6h window has resolved; drop windows with no closed trades ──
        _pfStampSamples() {
          const now = Date.now();
          const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          this.pfSamples = this.pfSamples.filter(s => {
            if (s.label !== null || now - s.ts < LABEL_WINDOW) return true;
            const trades = this.pfPnl.filter(p => p.ts > s.ts && p.ts <= s.ts + LABEL_WINDOW);
            if (!trades.length) return false; // nothing closed — no evidence either way
            const pnl = trades.reduce((a, p) => a + p.pnl, 0);
            s.label = Math.max(-1, Math.min(1, pnl / entryMargin));
            return true;
          });
          if (this.pfSamples.length > SAMPLES_CAP) this.pfSamples = this.pfSamples.slice(-SAMPLES_CAP);
        },

        _pfAddSample(reading) {
          this._pfStampSamples();
          this.pfSamples.push({ ts: reading.ts, skew: reading.skew, breadth: reading.breadth, label: null });
          this._pfPushWave(reading);
          const { score, mass } = this._pfScore(reading);
          const { lean, slope } = this._pfTrajectory();
          const inherent = this._pfInherent(lean, slope, reading.ioScore ?? null);
          const eff = this._pfEffectiveScore(score, mass, inherent);
          this.pfStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, lean, slope, inherent, eff, ioScore: reading.ioScore ?? null, at: reading.ts };
        },

        pfExport() {
          const blob = new Blob([JSON.stringify({ exportedAt: Date.now(), events: this.pfEvents, samples: this.pfSamples, wave: this.pfWave }, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `permafrost-winter-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
        },

        pfImport(e) {
          const file = e.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const d = JSON.parse(ev.target.result);
              if (Array.isArray(d.events))  this.pfEvents  = d.events.slice(-EVENTS_CAP);
              if (Array.isArray(d.samples)) this.pfSamples = d.samples.slice(-SAMPLES_CAP);
              if (Array.isArray(d.wave))    this.pfWave    = d.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              this.persist();
              this.log(`[PFR] Profile imported — ${this.pfEvents.length} events, ${this.pfSamples.length} samples, ${this.pfWave.length} wave points`, 'info');
            } catch(err) {
              this.log('[PFR] Import failed — file could not be parsed as a valid Permafrost profile', 'warn');
            }
            e.target.value = '';
          };
          reader.readAsText(file);
        },

        async runScan() {
          const _savedMaxPos = this.cfg.maxPos;
          if (this.cfg.permafrostCrossEnabled && this.cfg.permafrostCrossStatusEnabled && _pfPartnerInDDH) {
            this.cfg.maxPos = (this.cfg.maxPos ?? 5) * 2;
          }
          await _origScan.call(this);
          this.cfg.maxPos = _savedMaxPos;
          if (!this.cfg.permafrostEnabled) return;
          this._pfCheckCross().catch(() => {});
          // Deferred so MIW's _miwRunScan (which fetches klines) finishes first —
          // MIW wraps after PF, so _origScan returns before MIW's own kline fetch runs.
          setTimeout(() => this._pfUpdateKlineBar(), 0);
          this._pfFetchStructure().then(r => {
            if (!r) return;
            this._pfAddSample(r);
            const { score, mass } = this.pfStatus;
            const _d = this._pfDescribe(r, score, mass);
            this.log(`[PFR] 🧊 Routine market structure check — market is ${_d.desc} | ${_d.bias}`, 'info');
            this.persist();
          }).catch(() => {});
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if ((this.closedTrades?.length ?? 0) > prevLen) {
            // totalPnl (incl. funding) is what the base feeds its halt windows
            const t   = this.closedTrades[0];
            const pnl = t?.totalPnl ?? t?.pnl;
            if (typeof pnl === 'number') {
              const now = Date.now();
              this.pfPnl.push({ ts: now, pnl });
              this.pfPnl = this.pfPnl.filter(e => now - e.ts < PNL_LOG_TTL);
            }
          }
          if (this.cfg.permafrostCrossEnabled) {
            if (reason === 'cascade' || reason === 'sacrifice') this._pfCrossWrite(reason);
          }
          if (this.cfg.permafrostCrossEnabled && this.cfg.permafrostCrossWinLossEnabled) {
            if (reason === 'sl') this._pfCrossWrite('sacrifice');
            else if (reason === 'tp') this._pfCrossWrite('cascade');
          }
          if (this.cfg.permafrostScorecardEnabled && pos._miw && pos._miwCriteria?.length) {
            const _t = this.closedTrades?.[0];
            const _pnl = _t?.totalPnl ?? _t?.pnl;
            if (typeof _pnl === 'number') {
              this._pfScoreWrite(pos._miwCriteria, _pnl);
              this._pfScoreBuild();
            }
          }
        },

      });
    },
  };
})();
</script>
