          const W = 260, H = 64, labelH = 12, pad = 6;
          const y = lean => pad + ((1 - lean) / 2) * (H - 2 * pad);
          const mid = y(0);
          const placeholder = `<svg width="100%" viewBox="0 0 ${W} ${H + labelH}" preserveAspectRatio="none" style="display:block"><line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="rgba(255,255,255,.15)" stroke-dasharray="3 3"/><text x="${W/2}" y="${H/2+3}" fill="rgba(255,255,255,.35)" font-size="9" font-family="monospace" text-anchor="middle">gathering structure history…</text></svg>`;
          if (wave.length < 2) return placeholder;
          const now = Date.now();
          const tMin = now - WAVE_TTL_MS;
          const plotW = W - 2 * pad;
          const BINS = Math.floor(plotW);
          const bins = new Array(BINS).fill(null).map(() => ({ sum: 0, n: 0 }));
          for (const p of wave) {
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            bins[bi].sum += p.lean; bins[bi].n++;
          }
          const pts = [];
          for (let i = 0; i < BINS; i++) {
            if (!bins[i].n) continue;
            pts.push({ x: pad + i + 0.5, lean: bins[i].sum / bins[i].n });
          }
          if (pts.length < 2) return placeholder;
          // A gap of missing bins this large means the bot was off/unable to sample for a
          // real stretch of time, not continuous data — break the lines there instead of
          // drawing a straight connector across the gap. Threshold must clear two floors:
          // it can never be smaller than a single bin's own width (BIN_MS) or literally
          // every adjacent pair of bins — i.e. every normal, gap-free render — would count
          // as "missing" data, since consecutive bins are BIN_MS apart by construction. It
          // also needs headroom above the scan cadence itself so ordinary scan-timing jitter
          // doesn't get misread as a gap.
          const BIN_MS = WAVE_TTL_MS / BINS;
          const WAVE_GAP_MS = Math.max(BIN_MS * 2, 3 * (this.cfg.scanMins ?? 15) * 60000);

          // FIO line: crowd funding-rate sentiment; only present in newer wave entries (guard p.fio != null)
          const fioBins = new Array(BINS).fill(null).map(() => ({ iSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.fio == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            fioBins[bi].iSum += p.fio; fioBins[bi].n++;
          }
          const fioPts = [];
          for (let i = 0; i < BINS; i++) {
            if (!fioBins[i].n) continue;
            fioPts.push({ x: pad + i + 0.5, fio: fioBins[i].iSum / fioBins[i].n });
          }
          let fioSvg = '';
          for (let i = 1; i < fioPts.length; i++) {
            const p1 = fioPts[i-1], p2 = fioPts[i];
            if ((p2.x - p1.x) * BIN_MS > WAVE_GAP_MS) continue;
            fioSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.fio).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.fio).toFixed(1)}" stroke="rgba(200,150,255,0.5)" stroke-width="1" stroke-dasharray="3 2"/>`;
          }

          // Score line: timestamp-direct (no binning) so stored values stay immutable as window scrolls
          const scorePts = [];
          for (const p of wave) {
            if (p.score == null) continue;
            const x = pad + ((p.ts - tMin) / WAVE_TTL_MS) * plotW;
            if (x < pad || x > pad + plotW) continue;
            scorePts.push({ x, s: p.score, ts: p.ts });
          }
          let scoreSvg = '';
          for (let i = 1; i < scorePts.length; i++) {
            const p1 = scorePts[i-1], p2 = scorePts[i];
            if (p2.ts - p1.ts > WAVE_GAP_MS) continue;
            const avg = (p1.s + p2.s) / 2;
            const gv = Math.round(50 + (avg + 1) / 2 * 160);
            scoreSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.s).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.s).toFixed(1)}" stroke="rgba(${gv},${gv},${gv},.8)" stroke-width="1.5"/>`;
          }

          const showMain  = this.cfg.permafrostWaveShowMain ?? true;
          const showFio    = this.cfg.permafrostWaveShowFio   ?? true;
          const showScore = this.cfg.pfShowScore            ?? true;
          const cur = pts[pts.length - 1].lean;
          const col = cur > 0.05 ? 'var(--profit)' : cur < -0.05 ? 'var(--short)' : 'var(--ice)';
          const leanGroups = [[pts[0]]];
          for (let i = 1; i < pts.length; i++) {
            if ((pts[i].x - pts[i-1].x) * BIN_MS > WAVE_GAP_MS) leanGroups.push([]);
            leanGroups[leanGroups.length-1].push(pts[i]);
          }
          const mainPolylines = leanGroups.map(g => g.length > 1
            ? `<polyline points="${g.map(p => `${p.x.toFixed(1)},${y(p.lean).toFixed(1)}`).join(' ')}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>`
            : '').join('');
          const cx = pts[pts.length - 1].x, cy = y(cur);
          return `<svg width="100%" viewBox="0 0 ${W} ${H + labelH}" preserveAspectRatio="none" style="display:block">`
            + `<line x1="0" y1="${pad}" x2="${W}" y2="${pad}" stroke="rgba(0,229,160,.12)"/>`
            + `<line x1="0" y1="${(H-pad).toFixed(1)}" x2="${W}" y2="${(H-pad).toFixed(1)}" stroke="rgba(255,69,96,.12)"/>`
            + `<line x1="0" y1="${mid.toFixed(1)}" x2="${W}" y2="${mid.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-dasharray="3 3"/>`
            + (showFio    ? fioSvg   : '')
            + (showScore ? scoreSvg : '')
            + (showMain ? mainPolylines : '')
            + (showMain ? `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="${col}"/>` : '')
            + `<text x="2" y="${pad+7}" fill="rgba(0,229,160,.5)" font-size="8" font-family="monospace">bull</text>`
            + `<text x="2" y="${(H-pad-1).toFixed(1)}" fill="rgba(255,69,96,.5)" font-size="8" font-family="monospace">bear</text>`
            + (showFio && fioPts.length >= 2 ? `<text x="${W / 2}" y="${H + 9}" fill="rgba(200,150,255,.55)" font-size="8" font-family="monospace" text-anchor="middle">fio</text>` : '')
            + (showScore && scorePts.length >= 2 ? `<text x="${W - pad}" y="${H + 9}" fill="rgba(180,180,180,.55)" font-size="8" font-family="monospace" text-anchor="end">score</text>` : '')
            + `</svg>`;
        },

        _pfAddSample(reading) {
          this._pfPushWave(reading);
          const { score, mass, count } = this._pfScore(reading);
          const { lean, slope } = this._pfTrajectory();
          const inherent = this._pfInherent(lean, slope, reading.fioScore ?? null);
          const eff = this._pfEffectiveScore(score, mass, inherent);
          this.pfStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, count, lean, slope, inherent, eff, fioScore: reading.fioScore ?? null, at: reading.ts };
          this._pfWriteSample(reading);
        },

        _pfDownload(filename, data) {
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
        },
        pfExportAll() {
          try {
            const scorecardRaw = localStorage.getItem(SCORE_KEY);
            const liqRaw       = localStorage.getItem(PFR_LIQ_HISTORY_KEY);
            const ocRaw        = localStorage.getItem(PFR_OC_HIST_KEY);
            this._pfDownload(`permafrost-profile-${new Date().toISOString().slice(0, 10)}.json`, {
              exportedAt: Date.now(),
              events: this.pfEvents,
              closes: this.pfCloses,
              wave: this.pfWave,
              scorecard: scorecardRaw ? JSON.parse(scorecardRaw) : [],
              liqHistory: liqRaw ? JSON.parse(liqRaw) : [],
              ocHistory: ocRaw ? JSON.parse(ocRaw) : [],
            });
          } catch(e) { this.log('[PFR] Export failed', 'warn'); }
        },

        pfImport(e) {
          const file = e.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const d = JSON.parse(ev.target.result);
              if (Array.isArray(d.events)) this.pfEvents = d.events.slice(-EVENTS_CAP);
              if (Array.isArray(d.closes)) this.pfCloses = d.closes.slice(-CLOSES_CAP);
              if (Array.isArray(d.wave))   this.pfWave   = d.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              if (Array.isArray(d.scorecard)) {
                try { localStorage.setItem(SCORE_KEY, JSON.stringify(d.scorecard)); } catch(_) {}
              }
              if (Array.isArray(d.liqHistory)) {
                this._liqCycleHistory = d.liqHistory.slice(-25);
                try { localStorage.setItem(PFR_LIQ_HISTORY_KEY, JSON.stringify(this._liqCycleHistory)); } catch(_) {}
                this._liqUpdateAvgTurnover();
              }
              if (Array.isArray(d.ocHistory)) {
                this._pfOcCycleHistory = this._ocSanitizeHistory(d.ocHistory).cleaned;
                try { localStorage.setItem(PFR_OC_HIST_KEY, JSON.stringify(this._pfOcCycleHistory)); } catch(_) {}
              }
              this.persist();
              this._pfScoreTrim();
              this._pfScoreBuild();
              this.log(`[PFR] Profile imported — ${this.pfCloses.length} closes, ${this.pfWave.length} wave points, ${(d.scorecard||[]).length} scorecard records, ${(d.liqHistory||[]).length} liq cycles, ${(d.ocHistory||[]).length} OC cycles`, 'info');
            } catch(err) {
              this.log('[PFR] Import failed — file could not be parsed as a valid Permafrost profile', 'warn');
            }
            e.target.value = '';
          };
          reader.readAsText(file);
        },

        async runScan() {
          await _origScan.call(this);
          if (this.cfg.pfLiqEnabled) this._liqLaunchBatch();
          if (this.cfg.pfPecPrescreenEnabled) this._pfPecUniverseFetch().catch(() => {});
          if (!this.cfg.permafrostEnabled) return;
          this._pfCheckCross().catch(() => {});
          // Deferred so MIW's _miwRunScan (which fetches klines) finishes first —
          // MIW wraps after PF, so _origScan returns before MIW's own kline fetch runs.
          setTimeout(() => this._pfUpdateKlineBar(), 0);
          this._pfFetchStructure().then(r => {
            if (!r) return;
            this._pfAddSample(r);
            if (!r._fresh) return;
            const { score, mass, count } = this.pfStatus;
            const _d = this._pfDescribe(r, score, mass, count);
            this.log(`[PFR] 🧊 Market structure: ${_d.desc} — ${_d.bias}`, 'info');
            this.persist();
          }).catch(() => {});
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if ((this.closedTrades?.length ?? 0) > prevLen) {
            // totalPnl (incl. funding) is what the base feeds its halt windows
            const t   = this.closedTrades[0];
            const pnl = t?.totalPnl ?? t?.pnl;
            if (typeof pnl === 'number' && this.pfStatus.skew !== null && this.pfStatus.skew !== undefined) {
              const now = Date.now();
              this.pfCloses.push({ ts: now, pnl, skew: this.pfStatus.skew, breadth: this.pfStatus.breadth });
              if (this.pfCloses.length > CLOSES_CAP) this.pfCloses = this.pfCloses.slice(-CLOSES_CAP);
            }
          }
          if (this.cfg.permafrostCrossEnabled) {
            if (reason === 'cascade' || reason === 'sacrifice') this._pfCrossWrite(reason);
            if (reason === 'sl') this._pfCrossWrite('sacrifice');
            else if (reason === 'tp') this._pfCrossWrite('cascade');
          }
          // Blind-Entry has no real filtering criteria (see docs/blind-entry-plan.md) — its
          // _bewCriteria are sign-only recording tags (+24h/-24h, +fund/-fund, +ocs/-ocs), never
          // used to gate entry, that exist purely so the scorecard has something to bucket.
          const _scoreCriteria = (pos._miw && pos._miwCriteria?.length) ? pos._miwCriteria
            : (pos._bew && pos._bewCriteria?.length) ? pos._bewCriteria
            : (pos._ldw && pos._ldwCriteria?.length) ? pos._ldwCriteria
            : null;
          if (this.cfg.permafrostScorecardEnabled && _scoreCriteria) {
            const _t = this.closedTrades?.[0];
            const _pnl = _t?.totalPnl ?? _t?.pnl;
            if (typeof _pnl === 'number') {
              this._pfScoreBuild(this._pfScoreWrite(_scoreCriteria, _pnl));
            }
          }
          // MIW-only feedback: direction-awareness lock (always, independent of the scorecard
          // toggle) and the 0liq-win cross broadcast (Ashfall's Only-1/Both side graylists the
          // ticker for 6h so it doesn't compete with a ticker Winter just won calmly).
          if (pos._miw && pos._miwCriteria?.length) {
            const _t2  = this.closedTrades?.[0];
            const _pnl2 = _t2?.totalPnl ?? _t2?.pnl;
            if (typeof _pnl2 === 'number') {
              this._miwOnPositionScored?.(pos.symbol, pos._miwCriteria, _pnl2);
              if (this.cfg.permafrostCrossEnabled && _pnl2 > 0 && pos._miwCriteria.includes('0liq')) {
                this._pfCrossWrite('0liq-win', pos.symbol);
              }
            }
          }
        },

        // ── Liquidation surveillance ──

        _liqCloseAll() {
          for (const b of (this._liqBatches || [])) {
            if (b._endTimer) clearTimeout(b._endTimer);
            try { if (b.ws && b.ws.readyState !== WebSocket.CLOSED) b.ws.close(); } catch(_) {}
          }
          this._liqBatches = [];
          try { localStorage.removeItem(PFR_LIQ_KEY); } catch(_) {}
        },

        _liqFeedWatcherHtml(shown) {
          if (!shown) return '';
          void this.tick; // kept on the fast tick — shows a live mm:ss countdown
          const batches = this._liqBatches || [];
          if (!batches.length) return '';
          const fmt = v => v >= 1e6 ? (v / 1e6).toFixed(2) + 'M' : v >= 1e3 ? (v / 1e3).toFixed(1) + 'K' : v.toFixed(0);
          return batches.map(b => {
            const rem  = Math.max(0, b.endsAt - Date.now());
            const remM = Math.floor(rem / 60000);
            const remS = Math.floor((rem % 60000) / 1000);
            let totalS = 0, totalB = 0;
            for (const s of b.symbols) { totalS += b.sLiqTurnover[s] || 0; totalB += b.bLiqTurnover[s] || 0; }
            const dom  = totalS > totalB ? 'S' : totalB > totalS ? 'B' : '·';
            const clr  = dom === 'S' ? 'rgba(100,220,150,.9)' : dom === 'B' ? 'rgba(255,80,80,.9)' : 'var(--text-lo)';
            return `<div style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)">` +
              `<span style="color:var(--text-lo);min-width:18px">#${b.id}</span>` +
              `<span style="color:var(--text-lo)">${b.symbols.length}t</span>` +
              `<span style="color:rgba(100,220,150,.8)">S:${fmt(totalS)}</span>` +
              `<span style="color:rgba(255,80,80,.8)">B:${fmt(totalB)}</span>` +
              `<span style="color:${clr};font-weight:bold">${dom}</span>` +
              `<span style="margin-left:auto;color:var(--text-lo)">${remM}m${String(remS).padStart(2, '0')}s</span>` +
              `</div>`;
          }).join('');
        },

        // Called from the liq WS onmessage handler for every incoming fill — with an active
        // feed that's potentially several messages/sec, writing synchronously on each one was
        // a real main-thread cost for no benefit (only a reload mid-cycle needs the persisted
        // snapshot, and losing the last ~2s of accumulation on a reload is harmless). Debounced
        // to at most one write per 2s; batch objects are mutated in place so the callback still
        // reads whatever the latest totals are when it fires, not a stale snapshot from when it was scheduled.
        _liqPersistBatches() {
          if (this._liqPersistPending) return;
          this._liqPersistPending = true;
          setTimeout(() => {
            this._liqPersistPending = false;
            try {
              const snapshots = (this._liqBatches || []).map(b => ({
                id: b.id, startedAt: b.startedAt, endsAt: b.endsAt, symbols: b.symbols,
                sLiqTurnover: { ...b.sLiqTurnover }, bLiqTurnover: { ...b.bLiqTurnover }
              }));
              localStorage.setItem(PFR_LIQ_KEY, JSON.stringify(snapshots));
            } catch(_) {}
          }, 2000);
        },

        _liqPersistHistory() {
          try {
            this._liqCycleHistory = trimToByteCap(this._liqCycleHistory);
            localStorage.setItem(PFR_LIQ_HISTORY_KEY, JSON.stringify(this._liqCycleHistory));
          } catch(_) {}
        },

        _liqPersistSequester() {
          try { localStorage.setItem(PFR_LIQ_SEQUESTER_KEY, JSON.stringify(this._liqSequester)); } catch(_) {}
        },

        _liqResumeBatch(snapshot) {
          const remaining = snapshot.endsAt - Date.now();
          if (remaining <= 0) return;
          const batch = {
            id: snapshot.id, startedAt: snapshot.startedAt, endsAt: snapshot.endsAt,
            symbols: snapshot.symbols,
            sLiqTurnover: { ...snapshot.sLiqTurnover },
            bLiqTurnover: { ...snapshot.bLiqTurnover },
            ws: null, _endTimer: null
          };
          this._liqBatches.push(batch);
          const id = batch.id;
          const handleMsg = (ev) => {
            try {
              const msg = JSON.parse(ev.data);
              if (!msg.data) return;
              const events = Array.isArray(msg.data) ? msg.data : [msg.data];
              for (const e of events) {
                const sym  = e.symbol || e.s;
                const side = e.side   || e.S;
                if (!sym || !Object.prototype.hasOwnProperty.call(batch.sLiqTurnover, sym)) continue;
                const turnover = parseFloat(e.size || e.v || 0) * parseFloat(e.price || e.p || 0);
                if (!isFinite(turnover) || turnover <= 0) continue;
                if (side === 'Sell')      batch.sLiqTurnover[sym] += turnover;
                else if (side === 'Buy')  batch.bLiqTurnover[sym] += turnover;
                else continue;
                for (const fn of (this._liqMessageHooks || [])) { try { fn(batch, sym); } catch(_) {} }
              }
              this._liqPersistBatches();
            } catch(_) {}
          };
          const openWs = () => {
            try {
              const ws = new WebSocket('wss://stream.bybit.com/v5/public/linear');
              batch.ws = ws;
              ws.onopen    = () => ws.send(JSON.stringify({ op: 'subscribe', args: batch.symbols.map(s => `allLiquidation.${s}`) }));
              ws.onmessage = handleMsg;
              ws.onerror   = () => {};
              ws.onclose   = () => {
                if (Date.now() >= batch.endsAt || !this._liqBatches.some(b => b.id === id)) return;
                setTimeout(openWs, 5000);
              };
            } catch(_) {}
          };
          openWs();
          batch._endTimer = setTimeout(() => this._liqCloseBatch(batch), remaining);
          this.log(`[PFR] 💧 Liq cycle #${id} resumed — ${batch.symbols.length} tickers, ${Math.round(remaining / 60000)}m remaining`, 'info');
        },

        // Called for every incoming liq message, per touched symbol, with the batch object still
        // live (sLiqTurnover/bLiqTurnover already updated) — before the batch closes. Lets a
        // reactive consumer (e.g. Liquid-Diver) compute a mid-cycle depth reading without
        // waiting for _liqCloseBatch's once-per-hour snapshot.
        registerLiqMessageHook(fn) {
          if (typeof fn === 'function' && !this._liqMessageHooks.includes(fn)) this._liqMessageHooks.push(fn);
        },

        // Called once per closed liquidation cycle with that cycle's full per-symbol results array
        // (batch.symbols, each already carrying sLiqRaw/bLiqRaw/sDepth/bDepth/sLiqPct/bLiqPct) — lets
        // a consumer detect states a per-message hook can't, e.g. 0-liq (a symbol with zero turnover
        // never fires a live message, so it can only be observed once the cycle closes).
        registerLiqCloseHook(fn) {
          if (typeof fn === 'function' && !this._liqCloseHooks.includes(fn)) this._liqCloseHooks.push(fn);
        },

        // Ranks a bulk-ticker candidate by MIW's own collapsed critStats (this.miwCollapsedCritStats,
        // built in _pfScoreBuild) restricted to the criteria actually readable at prescreen time —
        // fund, V/A, IO/A always (straight off the ticker payload); PEC/VSG too once the universe
        // prefetch (pfPecPrescreenEnabled, see _pfPecUniverseFetch) has populated
        // _pfPecUniverseCache. ocs/ocx still need a live OC sample and are left out regardless. Tier
        // math mirrors MIW's _miwCheckCrit exactly (same steps, same window averages, same shape-
        // match quartet) so a criterion means the same thing whether MIW tags it after the fact or
        // this scores it ahead of time. Missing scorecard history for a key resolves to 0, not a
        // penalty — deprioritizes, excludes nothing.
        _liqPrescreenScore(t) {
          const stats  = this.miwCollapsedCritStats || {};
          const pnlOf  = key => stats[key]?.pnl || 0;
          let score = 0;

          const fundStep = this.cfg.miwFundStep ?? 0.25;
          const fundTier = Math.floor((parseFloat(t.fundingRate || 0) * 100) / fundStep);
          score += pnlOf(fundTier >= 0 ? 'fund+' : 'fund-');

          const volW = this._pfVolIoWindowAvg?.('vol');
          if (volW) {
            const vaStep = this.cfg.miwVaStep ?? 1;
            const vaTier = Math.floor(((parseFloat(t.turnover24h || 0) - volW) / volW * 100) / vaStep);
            score += pnlOf(vaTier >= 0 ? 'va+' : 'va-');
          }

          const oiW = this._pfVolIoWindowAvg?.('oi');
          if (oiW) {
            const ioaStep = this.cfg.miwIoaStep ?? 1;
            const ioaTier = Math.floor(((parseFloat(t.openInterestValue || 0) - oiW) / oiW * 100) / ioaStep);
            score += pnlOf(ioaTier >= 0 ? 'ioa+' : 'ioa-');
          }

          if (this.cfg.pfPecPrescreenEnabled) {
            const uni = this._pfPecUniverseCache?.[t.symbol];
            const p = uni?.pec, v = uni?.vsg, pIrr = uni?.pecIrr, vIrr = uni?.vsgIrr;
            if (p && p['6h'] != null && p['12h'] != null && p['24h'] != null) {
              const pecHigh = this.cfg.miwPecThresholdHigh ?? 70;
              const pecLow  = this.cfg.miwPecThresholdLow  ?? 30;
              if (p['6h'] > pecHigh && p['12h'] > pecHigh && p['24h'] > pecHigh) score += pnlOf('pecob');
              if (p['6h'] < pecLow  && p['12h'] < pecLow  && p['24h'] < pecLow)  score += pnlOf('pecos');
              if (this._pfPecShapeMatch(p, 'pecalpha', pIrr)) score += pnlOf('pecalpha');
              if (this._pfPecShapeMatch(p, 'pecdelta', pIrr)) score += pnlOf('pecdelta');
              if (this._pfPecShapeMatch(p, 'pecmomup', pIrr)) score += pnlOf('pecmomup');
              if (this._pfPecShapeMatch(p, 'pecmomdn', pIrr)) score += pnlOf('pecmomdn');
            }
            if (pIrr && pIrr['6h'] != null) {
              const irrThresh = this.cfg.miwPecIrrThreshold ?? 60;
              const irrAvg = (pIrr['6h'] + pIrr['12h'] + pIrr['24h']) / 3;
              if (irrAvg > irrThresh) score += pnlOf('pecirr');
            }
            if (v && v['6h'] != null && v['12h'] != null && v['24h'] != null) {
              const vsgHigh = this.cfg.miwVsgThresholdHigh ?? 70;
              const vsgLow  = this.cfg.miwVsgThresholdLow  ?? 30;
              if (v['6h'] > vsgHigh && v['12h'] > vsgHigh && v['24h'] > vsgHigh) score += pnlOf('vsgot');
              if (v['6h'] < vsgLow  && v['12h'] < vsgLow  && v['24h'] < vsgLow)  score += pnlOf('vsgut');
              if (this._pfVsgShapeMatch(v, 'vsgalpha', vIrr)) score += pnlOf('vsgalpha');
              if (this._pfVsgShapeMatch(v, 'vsgdelta', vIrr)) score += pnlOf('vsgdelta');
              if (this._pfVsgShapeMatch(v, 'vsgmomup', vIrr)) score += pnlOf('vsgmomup');
              if (this._pfVsgShapeMatch(v, 'vsgmomdn', vIrr)) score += pnlOf('vsgmomdn');
            }
            if (vIrr && vIrr['6h'] != null) {
              const irrThresh = this.cfg.miwVsgIrrThreshold ?? 60;
              const irrAvg = (vIrr['6h'] + vIrr['12h'] + vIrr['24h']) / 3;
              if (irrAvg > irrThresh) score += pnlOf('vsgirr');
            }
          }

          return score;
        },

        // Same mutually-exclusive shape-quartet logic as MIW's _miwPecShapeMatch/_miwVsgShapeMatch
        // (see MultiIndicator-Winter.html) — duplicated rather than called through, deliberately:
        // Permafrost's prescreen score has to work whether or not MIW is even loaded, and these are
        // pure functions of the composite index object with no MIW-only state behind them, so
        // duplication costs nothing in correctness (same formula, same thresholds off the same
        // shared cfg) while keeping Pre-Screening independent of MIW's presence.
        _pfPecShapeMatch(pec, want, irr) {
          const a = pec['6h'], b = pec['12h'], c = pec['24h'];
          // Dampen momentum's score under high price irregularity — see _pfCalcPriceIrregular
          // and MultiIndicator-Winter.html's _miwPecShapeMatch for the full rationale.
          const irrAvg = irr && irr['6h'] != null ? (irr['6h'] + irr['12h'] + irr['24h']) / 3 : null;
          const irrThresh = this.cfg.miwPecIrrThreshold ?? 60;
          const tooSpikey = irrAvg != null && irrAvg > irrThresh;
          if (b > a && b > c) return want === 'pecalpha';
          if (b < a && b < c) return want === 'pecdelta';
          if (!tooSpikey) {
            if (a > b && b > c) return want === 'pecmomup';
            if (a < b && b < c) return want === 'pecmomdn';
          }
          const momDampen = tooSpikey ? Math.max(0, (100 - irrAvg) / (100 - irrThresh)) : 1;
          const scores = {
            pecalpha: Math.min(b - a, b - c),
            pecdelta: Math.min(a - b, c - b),
            pecmomup: Math.min(a - b, b - c) * momDampen,
            pecmomdn: Math.min(b - a, c - b) * momDampen,
          };
          const best = Object.entries(scores).reduce((p, n) => n[1] > p[1] ? n : p);
          return want === best[0];
        },
        _pfVsgShapeMatch(vsg, want, irr) {
          const a = vsg['6h'], b = vsg['12h'], c = vsg['24h'];
          const irrAvg = irr && irr['6h'] != null ? (irr['6h'] + irr['12h'] + irr['24h']) / 3 : null;
          const irrThresh = this.cfg.miwVsgIrrThreshold ?? 60;
          const tooSpikey = irrAvg != null && irrAvg > irrThresh;
          if (b > a && b > c) return want === 'vsgalpha';
          if (b < a && b < c) return want === 'vsgdelta';
          if (!tooSpikey) {
            if (a > b && b > c) return want === 'vsgmomup';
            if (a < b && b < c) return want === 'vsgmomdn';
          }
          const momDampen = tooSpikey ? Math.max(0, (100 - irrAvg) / (100 - irrThresh)) : 1;
          const scores = {
            vsgalpha: Math.min(b - a, b - c),
            vsgdelta: Math.min(a - b, c - b),
            vsgmomup: Math.min(a - b, b - c) * momDampen,
            vsgmomdn: Math.min(b - a, c - b) * momDampen,
          };
          const best = Object.entries(scores).reduce((p, n) => n[1] > p[1] ? n : p);
          return want === best[0];
        },
        // Price Effect Coefficient for one window — duplicated from MIW's _miwCalcPecWindow (same
        // formula, same wick-dampening option) so Permafrost's universe log can derive PEC without
        // a dependency on MIW being loaded. See MultiIndicator-Winter.html for the full derivation.
        _pfCalcPecWindow(candles, windowCount, dampen) {
          if (!candles.length) return null;
          const subset = candles.slice(-windowCount);
          if (!subset.length) return null;
          const open  = subset[0].open;
          const close = candles[candles.length - 1].close;
          let range;
          if (dampen) {
            range = subset.reduce((s, c) => s + (c.high - c.low), 0) / subset.length;
          } else {
            range = Math.max(...subset.map(c => c.high)) - Math.min(...subset.map(c => c.low));
          }
          if (!(range > 0)) return 50;
          let p = (close - open) / range;
          if (p > 1) p = 1; else if (p < -1) p = -1;
          return p * 50 + 50;
        },
        // Volume Shape Graph for one window — duplicated from MIW's _miwCalcVsgWindow, same reason
        // as _pfCalcPecWindow above.
        _pfCalcVsgWindow(candles, windowCount) {
          if (!candles.length) return null;
          const subset = candles.slice(-windowCount);
          if (!subset.length) return null;
          const vOpen = subset[0].volume;
          const v     = candles[candles.length - 1].volume;
          const vHigh = Math.max(...subset.map(c => c.volume));
          const vLow  = Math.min(...subset.map(c => c.volume));
          if (!(vHigh > vLow)) return 50;
          let vp = (v - vOpen) / (vHigh - vLow);
          if (vp > 1) vp = 1; else if (vp < -1) vp = -1;
          return vp * 50 + 50;
        },
        // Price/volume irregularity for the universe log — duplicated from MIW's
        // _miwCalcPriceIrregular/_miwCalcVolIrregular, same reason as _pfCalcPecWindow above.
        _pfCalcPriceIrregular(candles, windowCount) {
          if (!candles.length) return null;
          const subset = candles.slice(-windowCount);
          if (!subset.length) return null;
          const netRange = Math.max(...subset.map(c => c.high)) - Math.min(...subset.map(c => c.low));
          const pathSum  = subset.reduce((s, c) => s + (c.high - c.low), 0);
          if (!(pathSum > 0)) return 50;
          const efficiency = Math.min(1, netRange / pathSum);
          return (1 - efficiency) * 100;
        },
        _pfCalcVolIrregular(candles, windowCount) {
          if (!candles.length) return null;
          const subset = candles.slice(-windowCount);
          if (subset.length < 2) return null;
          const vHigh = Math.max(...subset.map(c => c.volume));
          const vLow  = Math.min(...subset.map(c => c.volume));
          const netRange = vHigh - vLow;
          let pathSum = 0;
          for (let i = 1; i < subset.length; i++) pathSum += Math.abs(subset[i].volume - subset[i-1].volume);
          if (!(pathSum > 0)) return 50;
          const efficiency = Math.min(1, netRange / pathSum);
          return (1 - efficiency) * 100;
        },

        // Persistent, byte-capped candle log (KLINE_LOG_KEY) shared cross-bot the same way
        // SCORE_KEY/CROSS_KEY are — read fresh every call rather than cached on `this`, since
        // Ashfall may have written a newer version of the same bucket since this bot last read it.
        // Keyed by granularity so a differently-configured partner never corrupts this bot's bars.
        _pfKlineLogRead(gran) {
          try {
            const all = JSON.parse(localStorage.getItem(KLINE_LOG_KEY) || '{}');
            return all[gran] || {};
          } catch (_) { return {}; }
        },
        // Evicts whole symbols, oldest lastSeenAt first, until back under KLINE_LOG_BYTE_CAP —
        // eviction is per-symbol rather than per-oldest-candle because a symbol that's stopped
        // appearing in bulk tickers (delisted, or dropped below the price floor) is exactly the
        // data this log has no further use for, not merely its least-recently-touched entry.
        _pfKlineLogWrite(gran, bucket) {
          try {
            const all = JSON.parse(localStorage.getItem(KLINE_LOG_KEY) || '{}');
            all[gran] = bucket;
            let json = JSON.stringify(all);
            let guard = 0;
            while (new Blob([json]).size > KLINE_LOG_BYTE_CAP && guard < 50) {
              const syms = Object.keys(bucket).sort((a, b) => (bucket[a].lastSeenAt || 0) - (bucket[b].lastSeenAt || 0));
              if (!syms.length) break;
              delete bucket[syms[0]];
              all[gran] = bucket;
              json = JSON.stringify(all);
              guard++;
            }
            localStorage.setItem(KLINE_LOG_KEY, json);
          } catch (_) {}
        },

        // Full-universe PEC/VSG prefetch for Pre-Screening — piggybacks on the bulk-ticker
        // refresh event (runs once per _lastAllTickersAt change, not on its own clock) rather
        // than MIW's liq-batch-close trigger, so PEC/VSG are weighed before liq surveillance has
        // surveilled anything at all. Covers every USDT ticker, not just movers or previously-
        // surveilled symbols. MIC/MIW's own narrow _micPrefetchPec/_pfPrefetchPec is untouched and
        // keeps acting as a gap-filler for whatever a given cycle here missed (new listings, a
        // failed request). Batched with a configurable size/delay (pfPecBatchSize/
        // pfPecBatchDelayMs) since this is a much bigger single burst than any existing kline
        // fetch in this codebase — see the persistent log below for why repeat cycles are cheap
        // (delta-fetch only the bars since each symbol's last stored candle, not the full 24h
        // window every time).
        async _pfPecUniverseFetch() {
          if (!this.cfg.pfPecPrescreenEnabled) return;
          const freshAt = this._lastAllTickersAt || 0;
          if (!freshAt || freshAt === this._pfPecUniverseFetchedAt) return;
          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;

          const gran         = this.cfg.miwPecGranularity ?? '1h';
          const bybitInterval = gran === '15m' ? '15' : gran === '3h' ? '180' : '60';
          const intervalMin  = gran === '15m' ? 15 : gran === '3h' ? 180 : 60;
          const total        = Math.round(1440 / intervalMin);
          const barMs        = intervalMin * 60 * 1000;
          const now          = Date.now();
          const lastBarStart = Math.floor(now / barMs) * barMs - barMs;
          const dampen       = !!this.cfg.miwPecWickDampen;

          const bucket  = this._pfKlineLogRead(gran);
          const symbols = allTickers.filter(t => t?.symbol?.endsWith('USDT')).map(t => t.symbol);
          const batchSize = Math.max(1, this.cfg.pfPecBatchSize ?? 25);
          const delayMs   = Math.max(0, this.cfg.pfPecBatchDelayMs ?? 2000);

          for (let i = 0; i < symbols.length; i += batchSize) {
            const slice = symbols.slice(i, i + batchSize);
            await Promise.all(slice.map(async sym => {
              try {
                const entry = bucket[sym];
                const have  = entry?.candles || [];
                const newestHave = have.length ? have[have.length - 1].candleStart : 0;
                if (newestHave >= lastBarStart) { if (entry) entry.lastSeenAt = now; return; }
                const barsNeeded = have.length ? Math.round((lastBarStart - newestHave) / barMs) + 1 : total;
                const limit = Math.min(barsNeeded + 1, 200); // +1 — Bybit's first row is the still-forming candle
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=${bybitInterval}&limit=${limit}`);
                if (!r.ok) return;
                const d = await r.json();
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const fetched = list.slice(1).map(c => ({
                  candleStart: parseInt(c[0]), open: parseFloat(c[1]), high: parseFloat(c[2]),
                  low: parseFloat(c[3]), close: parseFloat(c[4]), volume: parseFloat(c[5]),
                })).reverse();
                const merged = [...have.filter(c => !fetched.some(f => f.candleStart === c.candleStart)), ...fetched]
                  .sort((a, b) => a.candleStart - b.candleStart)
                  .slice(-total);
                bucket[sym] = { candles: merged, lastSeenAt: now };
              } catch (e) {}
            }));
            if (i + batchSize < symbols.length && delayMs) await new Promise(res => setTimeout(res, delayMs));
          }

          this._pfKlineLogWrite(gran, bucket);
          this._pfPecUniverseFetchedAt = freshAt;

          const cache  = {};
          const per6h  = Math.max(1, Math.round(360  / intervalMin));
          const per12h = Math.max(1, Math.round(720  / intervalMin));
          const per24h = Math.max(1, Math.round(1440 / intervalMin));
          for (const sym of symbols) {
            const candles = bucket[sym]?.candles;
            if (!candles || !candles.length) continue;
            cache[sym] = {
              pec: {
                '6h':  this._pfCalcPecWindow(candles, per6h,  dampen),
                '12h': this._pfCalcPecWindow(candles, per12h, dampen),
                '24h': this._pfCalcPecWindow(candles, per24h, dampen),
              },
              vsg: {
                '6h':  this._pfCalcVsgWindow(candles, per6h),
                '12h': this._pfCalcVsgWindow(candles, per12h),
                '24h': this._pfCalcVsgWindow(candles, per24h),
              },
              pecIrr: {
                '6h':  this._pfCalcPriceIrregular(candles, per6h),
                '12h': this._pfCalcPriceIrregular(candles, per12h),
                '24h': this._pfCalcPriceIrregular(candles, per24h),
              },
              vsgIrr: {
                '6h':  this._pfCalcVolIrregular(candles, per6h),
                '12h': this._pfCalcVolIrregular(candles, per12h),
                '24h': this._pfCalcVolIrregular(candles, per24h),
              },
            };
          }
          this._pfPecUniverseCache = cache;
          this.log(`[PFR] 🕯️ PEC/VSG universe prefetch — ${Object.keys(cache).length}/${symbols.length} tickers ready`, 'info');
        },

        _liqLaunchBatch() {
          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) { this._liqLastBatchSyms = []; return; }
          const activeSyms = new Set((this._liqBatches || []).flatMap(b => b.symbols));
          const _megacapExclude = this.cfg.megacapExclude || DEFAULT_MEGACAP_EXCLUDE;
          // Inherits MIW's reentry-block verdict as-is (same graylist, same miwReentryBlockMode
          // winners+losers/losers-only split) — a ticker MIW would throw out of basePool anyway
          // shouldn't burn a WS slot here first. No-op via optional chaining when MIW isn't loaded;
          // this file invents no separate blocking policy of its own.
          const base = t => t.symbol.endsWith('USDT') && !_megacapExclude.includes(t.symbol)
            && parseFloat(t.lastPrice || 0) >= 0.001 && !activeSyms.has(t.symbol)
            && !this._miwIsReentryBlocked?.(t.symbol);

          // Sequester: symbols whose most recently closed batch read 0-liq get priority
          // resurveillance ahead of the random mover pool, so a calm ticker doesn't age out of
          // coverage the moment it stops moving >6%/<-6% and its 0-liq status goes stale. The
          // cap is a per-batch rotation limit, not a hard membership cap — a larger sequestered
          // pool just rotates through over successive cycles, most-recently-reconfirmed-clean
          // symbols drawn first each time (see _liqCloseBatch for how membership is maintained).
          const tickerBySym = new Map(allTickers.map(t => [t.symbol, t]));
          let sequesterPicks = [];
          if (this.cfg.pfLiqSequesterEnabled ?? true) {
            if (!this._liqSequester) this._liqSequester = {};
            const cap = this.cfg.pfLiqSequesterCap ?? 12;
            sequesterPicks = Object.entries(this._liqSequester)
              .filter(([sym]) => {
                const t = tickerBySym.get(sym);
                if (!t || !base(t)) { delete this._liqSequester[sym]; return false; }
                return true;
              })
              .sort((a, b) => (b[1].qualifiedAt || 0) - (a[1].qualifiedAt || 0))
              .slice(0, cap)
              .map(([sym]) => sym);
          }
          for (const sym of sequesterPicks) activeSyms.add(sym);

          const remaining = Math.max(0, (this.cfg.pfLiqBatchSize ?? 25) - sequesterPicks.length);
          const gainers = allTickers.filter(t => base(t) && parseFloat(t.price24hPcnt || 0) >  0.06);
          const losers  = allTickers.filter(t => base(t) && parseFloat(t.price24hPcnt || 0) < -0.06);
          if (!sequesterPicks.length && !gainers.length && !losers.length) {
            this.log('[PFR] 💧 Liq batch skipped — no eligible tickers (>6% or <-6% 24h move, not already surveilled)', 'info');
            this._liqLastBatchSyms = [];
            return;
          }
          const shuffle = arr => { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } };
          if (this.cfg.pfLiqPrescreenEnabled) {
            // Deprioritize, don't exclude — a ticker with no scorecard history or a losing one
            // still sorts to the back of its half, not out of it, so it still fills a slot when
            // nothing better is available this cycle.
            const byScore = (a, b) => this._liqPrescreenScore(b) - this._liqPrescreenScore(a);
            gainers.sort(byScore); losers.sort(byScore);
          } else {
            shuffle(gainers); shuffle(losers);
          }
          const half    = Math.floor(remaining / 2);
          const symbols = [...sequesterPicks, ...gainers.slice(0, half).map(t => t.symbol), ...losers.slice(0, half).map(t => t.symbol)];
          if (sequesterPicks.length) this.log(`[PFR] 💧 Sequester — ${sequesterPicks.length} calm ticker${sequesterPicks.length !== 1 ? 's' : ''} prioritized for resurveillance`, 'info');
          this._liqPersistSequester();
          // Tickers this scan just picked for liq surveillance — read by MIW's OC sampling so it
          // can guarantee coverage for exactly these tickers this cycle (not the accumulated set
          // across every still-open, hour-long batch — see _miwRunScan's OC ticker selection).
          this._liqLastBatchSyms = symbols;
          this._liqCycleCounter = (this._liqCycleCounter % 25) + 1;
          const id        = this._liqCycleCounter;
          const startedAt = Date.now();
          const batch     = { id, startedAt, endsAt: startedAt + 3600000, symbols,
            sLiqTurnover: Object.fromEntries(symbols.map(s => [s, 0])),
            bLiqTurnover: Object.fromEntries(symbols.map(s => [s, 0])),
            ws: null, _endTimer: null };
          this._liqBatches.push(batch);
          this._liqPersistBatches();
          const handleMsg = (ev) => {
            try {
              const msg = JSON.parse(ev.data);
              if (!msg.data) return;
              const events = Array.isArray(msg.data) ? msg.data : [msg.data];
              for (const e of events) {
                const sym  = e.symbol || e.s;
                const side = e.side   || e.S;
                if (!sym || !Object.prototype.hasOwnProperty.call(batch.sLiqTurnover, sym)) continue;
                const turnover = parseFloat(e.size || e.v || 0) * parseFloat(e.price || e.p || 0);
                if (!isFinite(turnover) || turnover <= 0) continue;
                if (side === 'Sell')      batch.sLiqTurnover[sym] += turnover;
                else if (side === 'Buy')  batch.bLiqTurnover[sym] += turnover;
                else continue;
                for (const fn of (this._liqMessageHooks || [])) { try { fn(batch, sym); } catch(_) {} }
              }
              this._liqPersistBatches();
            } catch(_) {}
          };
          const openWs = () => {
            try {
              const ws = new WebSocket('wss://stream.bybit.com/v5/public/linear');
              batch.ws = ws;
              ws.onopen    = () => ws.send(JSON.stringify({ op: 'subscribe', args: symbols.map(s => `allLiquidation.${s}`) }));
              ws.onmessage = handleMsg;
              ws.onerror   = () => {};
              ws.onclose   = () => {
                if (Date.now() >= batch.endsAt || !this._liqBatches.some(b => b.id === id)) return;
                setTimeout(openWs, 5000);
              };
            } catch(_) {}
          };
          openWs();
          batch._endTimer = setTimeout(() => this._liqCloseBatch(batch), 3600000);
          this.log(`[PFR] 💧 Liq cycle #${id} started — ${symbols.length} tickers (${symbols.map(s => s.replace('USDT', '')).join(', ')})`, 'info');
        },

        _liqCloseBatch(batch) {
          this._liqBatches = (this._liqBatches || []).filter(b => b.id !== batch.id);
          this._liqPersistBatches();
          if (batch._endTimer) { clearTimeout(batch._endTimer); batch._endTimer = null; }
          try { if (batch.ws && batch.ws.readyState !== WebSocket.CLOSED) batch.ws.close(); } catch(_) {}
          batch.ws = null;
          // Depth = % this side's liquidated $ deviates from the average liquidation size
          // recorded across all history so far (this._liqAvgSTurnover/_liqAvgBTurnover, see
          // _liqUpdateAvgTurnover) — +1 means 1% above average, -1 means 1% below, floor of
          // -100 at zero liquidation, no ceiling. Computed against the average as it stood
          // BEFORE this cycle (updated after, at the bottom of this function) so a cycle is
          // never judged against a baseline that already includes itself.
          const calcDepth  = (raw, avg) => avg > 0 ? Math.trunc(((raw / avg) - 1) * 100) : 0;
          const threshold  = this.cfg.pfLiqThresholdPct ?? 50;
          const results    = batch.symbols.map(sym => {
            const sLiqRaw  = batch.sLiqTurnover[sym] || 0;
            const bLiqRaw  = batch.bLiqTurnover[sym] || 0;
            const liqTotal = sLiqRaw + bLiqRaw;
            const sLiqPct  = liqTotal > 0 ? (sLiqRaw / liqTotal) * 100 : 0;
            const bLiqPct  = liqTotal > 0 ? (bLiqRaw / liqTotal) * 100 : 0;
            const sDepth   = calcDepth(sLiqRaw, this._liqAvgSTurnover || 0);
            const bDepth   = calcDepth(bLiqRaw, this._liqAvgBTurnover || 0);
            return { sym, sLiqPct, bLiqPct, sLiqRaw, bLiqRaw, sDepth, bDepth, sPass: liqTotal > 0 && sLiqPct >= threshold, bPass: liqTotal > 0 && bLiqPct >= threshold };
          });
          const _now = Date.now();
          const _liqPatch = {};
          for (const r of results) {
            const _entry = { sLiqPct: r.sLiqPct, bLiqPct: r.bLiqPct, sLiqRaw: r.sLiqRaw, bLiqRaw: r.bLiqRaw, sDepth: r.sDepth, bDepth: r.bDepth, cycleId: batch.id, ts: _now };
            this._liqResults[r.sym] = _entry;
            _liqPatch[r.sym] = _entry;
          }
          this._liqResultsVersion = (this._liqResultsVersion || 0) + 1;
          const _prevSharedVer = this._sharedRead?.('liqResults')?.ver ?? 0;
          this._sharedMerge?.('liqResults', _liqPatch, { ver: Math.max(this._liqResultsVersion, _prevSharedVer + 1) });
          if (!this._liqSequester) this._liqSequester = {};
          for (const r of results) {
            if ((r.sLiqRaw || 0) + (r.bLiqRaw || 0) === 0) this._liqSequester[r.sym] = { qualifiedAt: _now };
            else delete this._liqSequester[r.sym];
          }
          this._liqPersistSequester();
          const entry = { id: batch.id, ts: _now, results };
          this._liqCycleHistory.push(entry);
          if (this._liqCycleHistory.length > 25) this._liqCycleHistory = this._liqCycleHistory.slice(-25);
          this._liqPersistHistory();
          this._liqUpdateAvgTurnover();
          this._liqLatestResults = results;
          const _totS = results.reduce((s, r) => s + r.sLiqRaw, 0);
          const _totB = results.reduce((s, r) => s + r.bLiqRaw, 0);
          const _tot  = _totS + _totB;
          const _fmt  = v => v >= 1e6 ? `$${(v/1e6).toFixed(1)}M` : v >= 1e3 ? `$${(v/1e3).toFixed(0)}k` : `$${v.toFixed(0)}`;
          const _skew = _tot > 0 ? `B ${(_totB/_tot*100).toFixed(0)}% / S ${(_totS/_tot*100).toFixed(0)}%` : 'no turnover';
          this.log(`[PFR] 💧 Liq #${batch.id} — ${_fmt(_tot)} · ${_skew}`, 'info');
          for (const fn of (this._liqCloseHooks || [])) { try { fn(results, batch); } catch(_) {} }
        },

        // Recomputes the global avg sell-liq / buy-liq $ used as the depth baseline — the same
        // population as the chart's own dashed avg line, just split by side. Zero-turnover
        // entries are excluded so the vast majority of ticker/cycle combos with no liquidation
        // that side don't drag the average toward zero. Called once per cycle close (and once
        // at init, after history loads from storage) — not on every incoming WS message, since
        // that would recompute this over the whole rolling history on the live hot path.
        _liqUpdateAvgTurnover() {
          const history = this._liqCycleHistory || [];
          const allS = history.flatMap(c => (c.results || []).map(r => r.sLiqRaw || 0)).filter(v => v > 0);
          const allB = history.flatMap(c => (c.results || []).map(r => r.bLiqRaw || 0)).filter(v => v > 0);
          this._liqAvgSTurnover = allS.length ? allS.reduce((a, b) => a + b, 0) / allS.length : 0;
          this._liqAvgBTurnover = allB.length ? allB.reduce((a, b) => a + b, 0) / allB.length : 0;
        },

        _liqChartSvg(shown) {
          if (!shown) return '';
          const history = this._liqCycleHistory || [];
          if (!history.length) return '';
          const cycleW = 28, dayGapW = 38, H = 80, padL = 28, padB = 16, padT = 6, padR = 4;
          const plotH = H - padT - padB;
          const DATE_CLR = 'rgba(80,160,255,.65)';
          const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const dLabel = _d => isNaN(_d.getTime()) ? '?' : MONTHS[_d.getMonth()]+' '+_d.getDate();
          const localDay = ts => { const d = new Date(ts); return isNaN(d.getTime()) ? 0 : d.getFullYear() * 1000 + d.getMonth() * 32 + d.getDate(); };
          // Pre-compute x positions, reserving extra space at day boundaries
          const xPos = [];
          let xCur = padL;
          for (let ci = 0; ci < history.length; ci++) {
            if (ci > 0 && localDay(history[ci].ts) !== localDay(history[ci - 1].ts)) xCur += dayGapW;
            xPos.push(xCur);
            xCur += cycleW;
          }
          const W = xCur + padR;
          let maxRaw = 0;
          for (const cycle of history) for (const r of cycle.results) maxRaw = Math.max(maxRaw, (r.sLiqRaw || 0) + (r.bLiqRaw || 0));
          if (maxRaw <= 0) maxRaw = 1;
          const allTotals = history.flatMap(c => c.results.map(r => (r.sLiqRaw||0) + (r.bLiqRaw||0))).filter(v => v > 0);
          const avgRef = allTotals.length ? allTotals.reduce((a, b) => a + b, 0) / allTotals.length : 0;
          const fmt = v => v >= 1e6 ? (v / 1e6).toFixed(1) + 'M' : v >= 1e3 ? (v / 1e3).toFixed(0) + 'K' : v.toFixed(0);
          const yVal = v => padT + plotH - (v / maxRaw) * plotH;
          // Fixed Y-axis overlay SVG (padL=28, wrapPad=6 → overlay width=34, height=H+8=88)
          const _ow = padL + 6, _oh = H + 8, _ax = padL + 6;
          let _yAxis = `<svg width="${_ow}" height="${_oh}" style="display:block"><line x1="${_ax}" y1="${4 + padT}" x2="${_ax}" y2="${4 + padT + plotH}" stroke="rgba(255,255,255,.12)" stroke-width="0.5"/>`;
          for (const f of [0, 0.25, 0.5, 0.75, 1]) {
            const v = maxRaw * f;
            const y = (4 + yVal(v)).toFixed(1);
            _yAxis += `<text x="${_ax - 3}" y="${(parseFloat(y) + 3).toFixed(1)}" fill="rgba(255,255,255,.3)" font-size="7" font-family="monospace" text-anchor="end">${fmt(v)}</text>`;
          }
          this._liqYAxisHtml = _yAxis + '</svg>';
          const grids = [0, 0.25, 0.5, 0.75, 1].map(f => {
            const v = maxRaw * f;
            const y = yVal(v).toFixed(1);
            return `<line x1="${padL}" y1="${y}" x2="${(W - padR).toFixed(1)}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>`;
          }).join('');
          if (avgRef > maxRaw * 0.05 && avgRef < maxRaw * 0.95) {
            this._liqAvgYPx = 4 + yVal(avgRef); // 4px = wrapper top padding
          } else {
            this._liqAvgYPx = null;
          }
          // Highlighted cycle falls back to the actual latest cycle when nothing is pinned —
          // see the matching HIGHLIGHTED CYCLE section below, fed by _liqDisplayedResults().
          const displayedTs = this._liqHighlightedCycleTs ?? history[history.length - 1].ts;
          let bars = '';
          history.forEach((cycle, ci) => {
            const cx = xPos[ci];
            const n  = cycle.results.length;
            const bw = Math.max(1, Math.min(4, cycleW * 0.9 / n));
            // Hitbox — sits under the bars and spans the full cycle column (not just the bars
            // themselves, since a cycle with zero turnover has no bars to click), doubling as
            // the highlight backdrop for whichever cycle HIGHLIGHTED CYCLE is currently showing.
            const isDisplayed = cycle.ts === displayedTs;
            bars += `<rect class="liq-cycle-hit" data-liq-cycle-ts="${cycle.ts}" x="${cx.toFixed(1)}" y="${padT}" width="${cycleW.toFixed(1)}" height="${plotH.toFixed(1)}" fill="${isDisplayed ? 'rgba(96,210,255,.10)' : 'transparent'}" pointer-events="all" style="cursor:pointer"/>`;
            cycle.results.forEach((r, ri) => {
              const x    = cx + (ri / n) * cycleW * 0.9;
              const bRaw = r.bLiqRaw || 0;
              const sRaw = r.sLiqRaw || 0;
              if (bRaw + sRaw <= 0) return;
              const bH = Math.max(1, (bRaw / maxRaw) * plotH);
              const sH = Math.max(0, (sRaw / maxRaw) * plotH);
              bars += `<rect x="${x.toFixed(1)}" y="${(padT + plotH - bH).toFixed(1)}" width="${bw.toFixed(1)}" height="${bH.toFixed(1)}" fill="rgba(255,80,80,${r.bPass ? 0.85 : 0.35})"/>`;
              if (sH > 0) bars += `<rect x="${x.toFixed(1)}" y="${(padT + plotH - bH - sH).toFixed(1)}" width="${bw.toFixed(1)}" height="${sH.toFixed(1)}" fill="rgba(100,220,150,${r.sPass ? 0.85 : 0.35})"/>`;
            });
            if (ci > 0 && localDay(history[ci].ts) !== localDay(history[ci - 1].ts)) {
              const gx = cx - dayGapW / 2;
              const d  = new Date(history[ci].ts);
              bars += `<line x1="${gx.toFixed(1)}" y1="${padT}" x2="${gx.toFixed(1)}" y2="${(padT + plotH).toFixed(1)}" stroke="${DATE_CLR}" stroke-width="0.5" stroke-dasharray="3 2"/>`;
              bars += `<text x="${gx.toFixed(1)}" y="${H - 2}" fill="${DATE_CLR}" font-size="7" font-family="monospace" text-anchor="middle">${dLabel(d)}</text>`;
            } else if (ci > 0) {
              bars += `<line x1="${cx.toFixed(1)}" y1="${padT}" x2="${cx.toFixed(1)}" y2="${(padT + plotH).toFixed(1)}" stroke="rgba(255,255,255,.08)" stroke-width="0.5"/>`;
            }
            const d = new Date(cycle.ts);
            const label = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            bars += `<text x="${(cx + cycleW / 2).toFixed(1)}" y="${H - 2}" fill="rgba(255,255,255,.3)" font-size="7" font-family="monospace" text-anchor="middle">${label}</text>`;
          });
          return `<svg width="${W}" height="${H}" style="display:block">`
            + `<line x1="${padL}" y1="${(padT + plotH).toFixed(1)}" x2="${W - padR}" y2="${(padT + plotH).toFixed(1)}" stroke="rgba(255,255,255,.12)" stroke-width="0.5"/>`
            + grids + bars
            + `</svg>`;
        },
        // Shared aggregate liquidation skew for Multi-Indicator Regime criteria.
        _pfRegimeSkew() {
          const hist = this._liqCycleHistory || [];
          if (!hist.length) return null;
          const slice = hist;
          let s = 0, b = 0;
          for (const cycle of slice) {
            for (const r of (cycle.results || [])) { s += r.sLiqRaw || 0; b += r.bLiqRaw || 0; }
          }
          const total = s + b;
          if (!total) return null;
          return { sPct: s / total * 100, bPct: b / total * 100, total };
        },
        // Which of the 6 regime types are currently selected in MIW's own config — Auto mode
        // reads miwAutoSlotExclude (already the source of truth for "included in scoring" for
        // every other criterion, see _pfScoreBuild), manual mode scans the slot builder's raw
        // criteria lists. Drives both which segments the regime scorecard/cycle button show and
        // whether regime-based scoring can engage at all (needs >=1 active type).
        _pfRegimeActiveTypes() {
          const REGIME_TYPES = ['regimeslo','regimeblo','regimesmid','regimebmid','regimeshi','regimebhi'];
          if (this.cfg.miwAutoSlots) {
            const excl = new Set(this.cfg.miwAutoSlotExclude || []);
            return REGIME_TYPES.filter(t => !excl.has(t));
          }
          const used = new Set();
          for (const slot of (this.cfg.miwSlots || [])) for (const c of slot) if (REGIME_TYPES.includes(c)) used.add(c);
          return REGIME_TYPES.filter(t => used.has(t));
        },
        // Which regime type the market is in *right now* — same side/band derivation MIW uses
        // to annotate a criterion at open (see MultiIndicator-Winter's regime annotation), kept
        // here since Permafrost owns _pfRegimeSkew and both files must agree on band edges.
        _pfRegimeCurrentType() {
          const sk = this._pfRegimeSkew?.();
          if (!sk) return null;
          const dom  = Math.max(sk.sPct, sk.bPct);
          const side = sk.sPct >= sk.bPct ? 's' : 'b';
          const mid  = this.cfg.miwRegimeMidThreshold ?? 60;
          const hi   = this.cfg.miwRegimeHiThreshold  ?? 80;
          const band = dom >= hi ? 'hi' : dom >= mid ? 'mid' : 'lo';
          return `regime${side}${band}`;
        },

        // Standalone version of the boolean the Mutual DDH Lift check above computes inline —
        // true iff the partner bot's most recently broadcast drawdown transition was a start
        // with no matching end since. Requires Cross Broadcast.
        _pfPartnerHalted() {
          if (!this.cfg.permafrostCrossEnabled) return false;
          const last = this._pfCrossRead().filter(e => e.source === 'chaser' && (e.kind === 'ddh-start' || e.kind === 'ddh-end')).at(-1);
          return last?.kind === 'ddh-start';
        },

        // Resolves which cycle's results HIGHLIGHTED CYCLE shows — the pinned cycle if one was
        // clicked and is still in history, else the actual latest (default). A pinned cycle
        // can age out of _liqCycleHistory (capped at 25) without an explicit reset, so this
        // falls back rather than showing a stale/empty list.
        _liqDisplayedResults() {
          const history = this._liqCycleHistory || [];
          const hi = this._liqHighlightedCycleTs;
          if (hi != null) {
            const hit = history.find(c => c.ts === hi);
            if (hit) return hit.results || [];
          }
          return history.length ? (history[history.length - 1].results || []) : (this._liqLatestResults || []);
        },
        _liqSummary(results) {
          const rows = Array.isArray(results) ? results : [];
          let s = 0, b = 0, n = 0;
          for (const r of rows) {
            if (!r) continue;
            s += r.sLiqRaw || 0;
            b += r.bLiqRaw || 0;
            n++;
          }
          const total = s + b;
          return { s, b, total, n, sPct: total ? s / total * 100 : 0, bPct: total ? b / total * 100 : 0 };
        },

        _liqAllSummary() {
          const history = this._liqCycleHistory || [];
          const rows = history.flatMap(c => c.results || []);
          if (rows.length) return this._liqSummary(rows);
          return this._liqSummary(this._liqLatestResults || Object.values(this._liqResults || {}));
        },

        _liqDisplayedCycleLabel() {
          const history = this._liqCycleHistory || [];
          const hi = this._liqHighlightedCycleTs;
          if (hi == null || !history.length) return '';
          const latest = history[history.length - 1];
          if (hi === latest.ts) return '';
          const hit = history.find(c => c.ts === hi);
          if (!hit) return '';
          const d = new Date(hit.ts);
          return ' · ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        },
        // Classifies each ticker the same way MIW's live classifier actually does (sliq/bliq at
        // >=70% dominance, msliq/mbliq for a 30-70% mixed majority — see _miwOnLiqMessage in
        // MultiIndicator-Winter.html), not the separate, user-configurable pfLiqThresholdPct
        // (that one only drives the chart bar opacity / historical "pass" tracking below — a
        // ticker just past 50% there is not the same thing as a ticker MI would actually treat
        // as decisively one-sided). Mixed reads get the same hue as their majority side, just
        // visibly dimmer, so a 55/44 split no longer looks identical to a 95/5 one.
        _liqInfoHtml(shown) {
          if (!shown) return '';
          const results = this._liqDisplayedResults();
          return results.map(r => {
            const sPct = r.sLiqPct || 0, bPct = r.bLiqPct || 0;
            let type = null;
            if (sPct >= 70) type = 'sliq';
            else if (bPct >= 70) type = 'bliq';
            else if (sPct > bPct && bPct >= 30) type = 'msliq';
            else if (bPct > sPct && sPct >= 30) type = 'mbliq';
            const isSell  = type === 'sliq' || type === 'msliq';
            const isMixed = type === 'msliq' || type === 'mbliq';
            const clr = type ? (isMixed ? `rgba(96,210,255,.9)` : isSell ? 'rgba(100,220,150,.9)' : 'rgba(255,80,80,.9)') : 'rgba(255,255,255,.3)';
            const bg  = type ? (isMixed ? `rgba(96,210,255,.07)` : isSell ? 'rgba(100,220,150,.07)' : 'rgba(255,80,80,.07)') : 'rgba(255,255,255,.03)';
            const bdr = type ? (isMixed ? `rgba(96,210,255,.4)` : isSell ? 'rgba(100,220,150,.4)' : 'rgba(255,80,80,.4)') : 'rgba(255,255,255,.1)';
            const domDepth = isSell ? (r.sDepth ?? 0) : (r.bDepth ?? 0);
            const dSign = domDepth >= 0 ? '+' : '';
            const emoji = { sliq: '🥵', bliq: '🥶', msliq: '💦', mbliq: '🧊' }[type] || '';
            const label = { sliq: 'S', bliq: 'B', msliq: 'mS', mbliq: 'mB' }[type] || '';
            const badge = type ? `${emoji}${label}${dSign}${domDepth}` : '';
            return `<span title="${r.sym}: S-Liq ${r.sLiqPct.toFixed(1)}% (depth ${r.sDepth >= 0 ? '+' : ''}${r.sDepth ?? 0}) / B-Liq ${r.bLiqPct.toFixed(1)}% (depth ${r.bDepth >= 0 ? '+' : ''}${r.bDepth ?? 0})" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid ${bdr};background:${bg};color:${clr};white-space:nowrap">${badge}${r.sym.replace('USDT','')} <span style="opacity:.65">S${r.sLiqPct.toFixed(1)}% B${r.bLiqPct.toFixed(1)}%</span></span>`;
          }).join('');
        },

        // ── Order Count Surveillance ─────────────────────────────────────────

        // volIoMap: optional {sym: {vol, oi}} pulled straight from this cycle's ticker payload
        // by the caller — no fetch required, it's already on the ticker. wantOc: whether any
        // slot actually needs ocs/ocx this cycle; when false, the recent-trade network fetch is
        // skipped entirely and only vol/oi (free data) gets sampled into the same cycle entry —
        // tethered to the same history/chart/persistence as OC (see MIW's va/ioa criteria and
        // _pfVolIoWindowAvg), just without paying for a fetch neither criterion needs.
        async _ocFetchBatch(symbols, volIoMap, wantOc) {
          if (!this.cfg.pfOcEnabled || !symbols?.length) return;
          // Guard against overlapping calls: if a slower fetch (e.g. from a re-triggered
          // scan) finishes after a newer one already pushed, its stale ticker set would
          // otherwise land in history too, mixing symbols that were never part of the
          // latest scan's sample into the display.
          if (this._ocFetchRunning) return;
          this._ocFetchRunning = true;
          try {
          const results = {};
          const seedVolIo = sym => {
            const vio = volIoMap?.[sym];
            if (vio && (vio.vol != null || vio.oi != null)) return { vol: vio.vol ?? null, oi: vio.oi ?? null };
            return null;
          };
          if (wantOc) {
            const limit = this.cfg.pfOcOrderLimit ?? 100;
            const CONC = 10;
            for (let i = 0; i < symbols.length; i += CONC) {
              await Promise.all(symbols.slice(i, i + CONC).map(async sym => {
                let rec = seedVolIo(sym);
                try {
                  const res = await fetch(`${this.base}/v5/market/recent-trade?category=linear&symbol=${sym}&limit=${limit}`);
                  const js  = await res.json();
                  const trades = js?.result?.list || [];
                  if (trades.length >= 2) {
                    let bc = 0, sc = 0;
                    for (const t of trades) { if (t.side === 'Buy') bc++; else sc++; }
                    const times = trades.map(t => parseInt(t.time, 10)).filter(n => !isNaN(n)).sort((a,b)=>a-b);
                    const span = times[times.length - 1] - times[0];
                    const avgMs = times.length > 1 && span > 0 ? span / (times.length - 1) : null;
                    rec = { ...(rec || {}), bc, sc, avgMs, n: trades.length };
                  }
                } catch(_) {}
                if (rec) results[sym] = rec;
              }));
            }
          } else {
            // Vol/IO-only cycle — no network round trip, just snapshot what's already on the ticker.
            for (const sym of symbols) { const rec = seedVolIo(sym); if (rec) results[sym] = rec; }
          }
          if (!Object.keys(results).length) return;
          this.pfOcResults = results;
          this._pfOcCycleCounter = (this._pfOcCycleCounter % 99) + 1;
          const entry = { id: this._pfOcCycleCounter, ts: Date.now(), results: Object.entries(results).map(([sym, r]) => ({ sym, ...r })) };
          this._pfOcCycleHistory.push(entry);
          if (this._pfOcCycleHistory.length > 25) this._pfOcCycleHistory = this._pfOcCycleHistory.slice(-25);
          this._ocPersistHistory();
          const withInterval = Object.values(results).filter(r => r.avgMs != null);
          const withVolIo = Object.values(results).filter(r => r.vol != null || r.oi != null);
          const parts = [`${Object.keys(results).length}t`];
          if (withInterval.length) parts.push(`avg ${(withInterval.reduce((s,r)=>s+r.avgMs,0)/withInterval.length/1000).toFixed(1)}s/order`);
          if (withVolIo.length) parts.push(`${withVolIo.length}t vol/oi`);
          this.log(`[PFR] 📊 Sample cycle — ${parts.join(' · ')}`, 'info');
          } finally { this._ocFetchRunning = false; }
        },

        // Isolated single-symbol OC lookup for the live liquidation path (MIW's _miwOnLiqMessage).
        // Deliberately does NOT touch pfOcResults or _pfOcCycleHistory: pfOcResults is a full
        // replace on every _ocFetchBatch call, so a live single-symbol result written there would
        // wipe out the current scan's multi-ticker snapshot other tickers' ocs/ocx checks still
        // need; and pushing a 1-ticker entry into _pfOcCycleHistory floods the Order Interval
        // Sample chart / Volume History overlay's hourly buckets with noisy samples — the same
        // problem Liquid-Diver's live OC fetch used to cause (see _ocChartViable()), just
        // reintroduced from inside MIW instead of a separate plugin. Callers merge the return
        // value into their own local map instead.
        async _ocFetchSingle(sym) {
          if (!this.cfg.pfOcEnabled || !sym) return null;
          try {
            const limit = this.cfg.pfOcOrderLimit ?? 100;
            const res = await fetch(`${this.base}/v5/market/recent-trade?category=linear&symbol=${sym}&limit=${limit}`);
            const js  = await res.json();
            const trades = js?.result?.list || [];
            if (trades.length < 2) return null;
            let bc = 0, sc = 0;
            for (const t of trades) { if (t.side === 'Buy') bc++; else sc++; }
            const times = trades.map(t => parseInt(t.time, 10)).filter(n => !isNaN(n)).sort((a,b)=>a-b);
            const span = times[times.length - 1] - times[0];
            const avgMs = times.length > 1 && span > 0 ? span / (times.length - 1) : null;
            // live: true marks this sample as not yet folded into _pfOcCycleHistory (see the
            // comment above) — _pfOcAccumSkew's OCS callers use this flag to fold a fresh
            // single-symbol sample into the accumulated total exactly once, without double-
            // counting once a later batch fetch pushes the same ticker into history for real.
            return { bc, sc, avgMs, n: trades.length, live: true };
          } catch(_) { return null; }
        },

        // Shared by init() (loading from localStorage) and pfImport() (loading from a file)
        // so a corrupt/legacy history can't slip in through one path just because the other
        // path was hardened first. Drops records from the pre-redesign OC system (which
        // counted a single raw order number per ticker, before the current buy/sell split —
        // those entries lack bc/sc and only ever rendered as meaningless zero-fill bars/chips),
        // rejects malformed or NaN timestamps, and caps to the same 25-cycle window as the
        // liquidation history.
        _ocSanitizeHistory(raw) {
          const rawCount = (raw || []).reduce((n,c) => n + (Array.isArray(c?.results) ? c.results.length : 0), 0);
          const cleaned = (raw || [])
            .filter(c => c && Array.isArray(c.results) && typeof c.ts === 'number' && !isNaN(c.ts))
            .map(c => ({ ...c, results: c.results.filter(r => r && typeof r.sym === 'string' && (
              (typeof r.bc === 'number' && !isNaN(r.bc) && typeof r.sc === 'number' && !isNaN(r.sc)) ||
              (typeof r.vol === 'number' && !isNaN(r.vol)) ||
              (typeof r.oi === 'number' && !isNaN(r.oi))
            )) }))
            .filter(c => c.results.length > 0)
            .slice(-25);
          const cleanCount = cleaned.reduce((n,c) => n + c.results.length, 0);
          return { cleaned, purged: rawCount - cleanCount };
        },

        _ocPersistHistory() {
          try {
            this._pfOcCycleHistory = trimToByteCap(this._pfOcCycleHistory);
            localStorage.setItem(PFR_OC_HIST_KEY, JSON.stringify(this._pfOcCycleHistory));
          } catch(_) {}
        },

        // Per-mode chart settings — 'oc' (order interval, seconds, lower=busier, capped so a
        // handful of illiquid tickers don't stretch the axis) vs 'vol'/'io' (raw USDT value,
        // higher=busier, uncapped — there's no equivalent outlier problem since these are
        // already the population-relative criteria, not a per-ticker ratio).
        _pfOcModeCfg() {
          const mode = this._pfOcViewMode || 'oc';
          const fmtCompact = v => { if (v==null) return 'n/a'; const a=Math.abs(v); if (a>=1e9) return '$'+(v/1e9).toFixed(2)+'B'; if (a>=1e6) return '$'+(v/1e6).toFixed(2)+'M'; if (a>=1e3) return '$'+(v/1e3).toFixed(1)+'K'; return '$'+v.toFixed(0); };
          if (mode === 'vol') return { label: 'VOLUME SAMPLE', color: '96,210,255', cap: null, getVal: r => r.vol, fmt: fmtCompact, higherIsBusier: true, avgLabel: 'Avg volume' };
          if (mode === 'io')  return { label: 'OPEN INTEREST SAMPLE', color: '190,130,230', cap: null, getVal: r => r.oi, fmt: fmtCompact, higherIsBusier: true, avgLabel: 'Avg open interest' };
          return { label: 'ORDER INTERVAL SAMPLE', color: '200,160,80', cap: 12, getVal: r => r.avgMs != null ? r.avgMs / 1000 : null, fmt: v => v >= 100 ? v.toFixed(0) + 's' : v.toFixed(1) + 's', higherIsBusier: false, avgLabel: 'Avg order interval' };
        },
        _pfOcChartSvg(shown) {
          if (!shown) return '';
          const mc = this._pfOcModeCfg();
          // Defensive: a stale/partial write (e.g. a crash mid-save) or leftover pre-redesign
          // entries in localStorage can leave a history array with malformed shapes. Filter to
          // well-formed entries only so one bad record can't corrupt the whole render.
          const history = (this._pfOcCycleHistory || []).filter(c => c && Array.isArray(c.results) && typeof c.ts === 'number' && !isNaN(c.ts)).sort((a,b)=>a.ts-b.ts);
          if (!history.length) return '';
          const cycleW = 28, dayGapW = 38, H = 80, padL = 28, padB = 16, padT = 6, padR = 4;
          const plotH = H - padT - padB;
          const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const dLabel = _d => isNaN(_d.getTime()) ? '?' : MONTHS[_d.getMonth()]+' '+_d.getDate();
          const localDay = ts => { const d = new Date(ts); return isNaN(d.getTime()) ? 0 : d.getFullYear()*1000+d.getMonth()*32+d.getDate(); };
          const xPos = []; let xCur = padL;
          for (let ci=0;ci<history.length;ci++) { if (ci>0&&localDay(history[ci].ts)!==localDay(history[ci-1].ts)) xCur+=dayGapW; xPos.push(xCur); xCur+=cycleW; }
          const W = xCur + padR;
          const passesCap = v => v != null && (mc.cap == null || v <= mc.cap);
          let maxVal=0;
          for (const c of history) for (const r of c.results) { const v = mc.getVal(r); if (!passesCap(v)) continue; maxVal=Math.max(maxVal,v); }
          if (maxVal<=0) maxVal=1;
          maxVal *= 1.3;
          const allVals=history.flatMap(c=>c.results.filter(r=>r&&passesCap(mc.getVal(r))).map(r=>mc.getVal(r)));
          const avgRef=allVals.length?allVals.reduce((a,b)=>a+b,0)/allVals.length:0;
          // Plain value scale: 0 at the bottom, maxVal at the top — a higher value plots
          // taller, same convention as every other bar chart in this panel.
          const yVal = v => padT + plotH - (v/maxVal)*plotH;
          const fmt = mc.fmt;
          // Y-axis
          const _ow=padL+6,_oh=H+8,_ax=padL+6;
          let _yAxis=`<svg width="${_ow}" height="${_oh}" style="display:block"><line x1="${_ax}" y1="${4+padT}" x2="${_ax}" y2="${4+padT+plotH}" stroke="rgba(255,255,255,.12)" stroke-width="0.5"/>`;
          for (const f of [0,0.25,0.5,0.75,1]) { const v=maxVal*f; const y=(4+yVal(v)).toFixed(1); _yAxis+=`<text x="${_ax-3}" y="${(parseFloat(y)+3).toFixed(1)}" fill="rgba(255,255,255,.3)" font-size="7" font-family="monospace" text-anchor="end">${fmt(v)}</text>`; }
          this._pfOcYAxisHtml = _yAxis+'</svg>';
          if (avgRef>maxVal*0.05&&avgRef<maxVal*0.95) this._pfOcAvgYPx=4+yVal(avgRef); else this._pfOcAvgYPx=null;
          const grids=[0,0.25,0.5,0.75,1].map(f=>{const v=maxVal*f;const y=yVal(v).toFixed(1);return `<line x1="${padL}" y1="${y}" x2="${(W-padR).toFixed(1)}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>`;}).join('');
          const CLR=`rgba(${mc.color},`;
          // Highlighted cycle falls back to the actual latest cycle when nothing is pinned —
          // see the matching HIGHLIGHTED CYCLE section below, fed by _pfOcDisplayedResults().
          const displayedTs = this._pfOcHighlightedCycleTs ?? history[history.length - 1].ts;
          let bars='';
          history.forEach((cycle,ci)=>{
            const cx=xPos[ci]; const results=cycle.results.filter(r=>r&&passesCap(mc.getVal(r))); const n=results.length;
            const cycleMean=n?results.reduce((s,r)=>s+mc.getVal(r),0)/n:0;
            const bw=Math.max(1,Math.min(4,cycleW*0.9/Math.max(1,n)));
            // Hitbox — sits under the bars and spans the full cycle column (not just the bars
            // themselves, since a cycle with no qualifying tickers has no bars to click),
            // doubling as the highlight backdrop for whichever cycle is currently displayed.
            const isDisplayed = cycle.ts === displayedTs;
            bars += `<rect class="pfoc-cycle-hit" data-oc-cycle-ts="${cycle.ts}" x="${cx.toFixed(1)}" y="${padT}" width="${cycleW.toFixed(1)}" height="${plotH.toFixed(1)}" fill="${isDisplayed ? CLR+'.10)' : 'transparent'}" pointer-events="all" style="cursor:pointer"/>`;
            results.forEach((r,ri)=>{
              const x=cx+(ri/n)*cycleW*0.9;
              const v=mc.getVal(r);
              // Direction of "busier"/more-notable flips per mode — lower interval = faster
              // order flow (oc), higher volume/OI = more notable (vol/io) — matching the same
              // above/below-average direction the va/ioa criteria themselves use.
              const busier=cycleMean>0&&(mc.higherIsBusier?v>=cycleMean:v<=cycleMean);
              const alpha=busier?.85:.35;
              const h=Math.max(1,(padT+plotH)-yVal(v));
              const y=(padT+plotH)-h;
              bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${CLR}${alpha})"/>`;
            });
            if (ci>0 && localDay(history[ci].ts)!==localDay(history[ci-1].ts)) {
              const gx=cx-dayGapW/2;
              const d=new Date(history[ci].ts);
              bars+=`<line x1="${gx.toFixed(1)}" y1="${padT}" x2="${gx.toFixed(1)}" y2="${(padT+plotH).toFixed(1)}" stroke="${CLR}.4)" stroke-dasharray="2 2"/>`;
              bars+=`<text x="${gx.toFixed(1)}" y="${H-2}" fill="${CLR}.65)" font-size="7" font-family="monospace" text-anchor="middle">${dLabel(d)}</text>`;
            } else if (ci>0) {
              bars+=`<line x1="${cx.toFixed(1)}" y1="${padT}" x2="${cx.toFixed(1)}" y2="${(padT+plotH).toFixed(1)}" stroke="rgba(255,255,255,.08)" stroke-width="0.5"/>`;
            }
            const d=new Date(cycle.ts);
            const label=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            bars+=`<text x="${(cx+cycleW/2).toFixed(1)}" y="${H-2}" fill="rgba(255,255,255,.3)" font-size="7" font-family="monospace" text-anchor="middle">${label}</text>`;
          });
          return `<svg width="${W}" height="${H}" style="display:block">`
            + `<line x1="${padL}" y1="${(padT+plotH).toFixed(1)}" x2="${W-padR}" y2="${(padT+plotH).toFixed(1)}" stroke="rgba(255,255,255,.12)" stroke-width="0.5"/>`
            + grids + bars
            + `</svg>`;
        },

        // Picks the newest cycle by timestamp rather than array position — see the matching
        // comment in init() on why array-position ("last pushed") can go stale if two OC
        // fetches ever overlap.
        _pfOcLatestCycle() {
          const hist = this._pfOcCycleHistory || [];
          return hist.reduce((a,c) => (!a || c.ts > a.ts) ? c : a, null);
        },
        // Resolves which cycle's results the chart's summary/chip list show — the pinned cycle
        // if one was clicked and is still in history, else the actual latest (default). Mirrors
        // _liqDisplayedResults(); a pinned cycle can age out of _pfOcCycleHistory (capped at 25)
        // without an explicit reset, so this falls back rather than showing a stale/empty list.
        _pfOcDisplayedCycle() {
          const hist = this._pfOcCycleHistory || [];
          const hi = this._pfOcHighlightedCycleTs;
          if (hi != null) {
