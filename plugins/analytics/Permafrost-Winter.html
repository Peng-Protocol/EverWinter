            const hit = hist.find(c => c.ts === hi);
            if (hit) return hit;
          }
          return this._pfOcLatestCycle();
        },
        _pfOcDisplayedCycleLabel() {
          const last = this._pfOcLatestCycle();
          const hi = this._pfOcHighlightedCycleTs;
          if (hi == null || !last) return '';
          if (hi === last.ts) return '';
          const hist = this._pfOcCycleHistory || [];
          const hit = hist.find(c => c.ts === hi);
          if (!hit) return '';
          const d = new Date(hit.ts);
          return ' · ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        },
        _pfOcSummaryText(shown) {
          if (!shown) return '';
          const mode = this._pfOcViewMode || 'oc';
          const last = this._pfOcDisplayedCycle();
          const results = (last?.results || []).filter(r => r && typeof r.sym === 'string');
          if (!results.length) return '';
          if (mode !== 'oc') {
            const field = mode === 'vol' ? 'vol' : 'oi';
            const withField = results.filter(r => r[field] != null);
            if (!withField.length) return '';
            return `${withField.length} ticker${withField.length===1?'':'s'} sampled${this._pfOcDisplayedCycleLabel()}`;
          }
          const bc = results.reduce((s,r)=>s+(r.bc||0),0);
          const sc = results.reduce((s,r)=>s+(r.sc||0),0);
          const total = bc + sc;
          if (!total) return '';
          const buyPct = (bc/total*100).toFixed(0), sellPct = (sc/total*100).toFixed(0);
          return `${total} order${total===1?'':'s'} sampled · ${buyPct}% buy / ${sellPct}% sell · ${results.length} ticker${results.length===1?'':'s'}${this._pfOcDisplayedCycleLabel()}`;
        },
        // Accumulated buy/sell order-count skew for a single ticker across the ENTIRE retained
        // _pfOcCycleHistory window (same 25-cycle cap as _pfOcWindowAvgMs) — sums bc/sc from
        // every cycle that sampled this ticker instead of reading only the most recent batch's
        // counts, so OCS reflects the ticker's own accumulated order flow over the sample
        // window rather than one 100-trade snapshot. A ticker sampled across more cycles builds
        // a deeper, steadier read; a ticker that just entered the pool starts thin, same
        // cold-start behavior as OCX's window average. Returns null if the ticker has no
        // sampled cycles at all yet.
        _pfOcAccumSkew(sym) {
          let bc = 0, sc = 0, n = 0;
          for (const cycle of (this._pfOcCycleHistory || [])) {
            if (!cycle || !Array.isArray(cycle.results)) continue;
            const r = cycle.results.find(x => x && x.sym === sym && (typeof x.bc === 'number' || typeof x.sc === 'number'));
            if (!r) continue;
            bc += r.bc || 0; sc += r.sc || 0; n++;
          }
          return n ? { bc, sc } : null;
        },
        // Full-window population average for MIW's OCX criterion: every ticker's most recent
        // avgMs across the ENTIRE retained _pfOcCycleHistory (not just the current cycle's
        // batch), deduped to one entry per symbol — the latest one seen. Shared by both the
        // scan-time pool and the live liq-trigger path (which reads this same history but never
        // writes to it — see _ocFetchSingle) so a ticker's fast/slow classification means the
        // same thing regardless of which path resolved it. No minimum-ticker floor — a thin or
        // cold-start window is intentionally left unstable rather than gated off.
        _pfOcWindowAvgMs() {
          const bySym = {};
          for (const cycle of (this._pfOcCycleHistory || [])) {
            if (!cycle || !Array.isArray(cycle.results)) continue;
            for (const r of cycle.results) {
              if (!r || typeof r.sym !== 'string' || r.avgMs == null) continue;
              if (!bySym[r.sym] || cycle.ts > bySym[r.sym].ts) bySym[r.sym] = { avgMs: r.avgMs, ts: cycle.ts };
            }
          }
          const vals = Object.values(bySym).map(v => v.avgMs);
          if (!vals.length) return null;
          return vals.reduce((s, v) => s + v, 0) / vals.length;
        },
        // Full-window population average for MIW's va/ioa criteria — same dedup-to-latest-per-
        // symbol pattern as _pfOcWindowAvgMs, over the same tethered _pfOcCycleHistory, just
        // averaging 'vol' or 'oi' instead of 'avgMs'.
        _pfVolIoWindowAvg(field) {
          const bySym = {};
          for (const cycle of (this._pfOcCycleHistory || [])) {
            if (!cycle || !Array.isArray(cycle.results)) continue;
            for (const r of cycle.results) {
              if (!r || typeof r.sym !== 'string' || r[field] == null) continue;
              if (!bySym[r.sym] || cycle.ts > bySym[r.sym].ts) bySym[r.sym] = { val: r[field], ts: cycle.ts };
            }
          }
          const vals = Object.values(bySym).map(v => v.val);
          if (!vals.length) return null;
          return vals.reduce((s, v) => s + v, 0) / vals.length;
        },
        // Mean seconds/order across every ticker in the displayed cycle — moved here from the
        // old Volume History chart's OC overlay line, which got scrapped along with the rest
        // of that chart. Simple average across the cycle's tickers, not an hourly bucket mean.
        _pfOcAvgIntervalSec(shown) {
          if (!shown || (this._pfOcViewMode || 'oc') !== 'oc') return null;
          const last = this._pfOcDisplayedCycle();
          const withInterval = (last?.results || []).filter(r => r && r.avgMs != null);
          if (!withInterval.length) return null;
          return withInterval.reduce((s,r) => s + r.avgMs, 0) / withInterval.length / 1000;
        },
        // Mode-aware counterpart for vol/io — mirrors _pfOcAvgIntervalSec's role but formats
        // via _pfOcModeCfg() instead of assuming seconds.
        _pfOcAvgValueText(shown) {
          if (!shown) return null;
          const mode = this._pfOcViewMode || 'oc';
          if (mode === 'oc') return null;
          const mc = this._pfOcModeCfg();
          const last = this._pfOcDisplayedCycle();
          const withField = (last?.results || []).filter(r => r && mc.getVal(r) != null);
          if (!withField.length) return null;
          const avg = withField.reduce((s,r) => s + mc.getVal(r), 0) / withField.length;
          return `${mc.avgLabel}: ${mc.fmt(avg)}`;
        },
        _pfOcInfoHtml(shown) {
          if (!shown) return '';
          const mode = this._pfOcViewMode || 'oc';
          const last = this._pfOcDisplayedCycle();
          const results = (last?.results || []).filter(r => r && typeof r.sym === 'string');
          if (!results.length) return '';
          if (mode !== 'oc') {
            const mc = this._pfOcModeCfg();
            const withField = results.filter(r => mc.getVal(r) != null);
            if (!withField.length) return '';
            const mean = withField.reduce((s,r)=>s+mc.getVal(r),0)/withField.length;
            return withField.map(r=>{
              const v = mc.getVal(r);
              const aboveAvg = v >= mean;
              const clr=aboveAvg?`rgba(${mc.color},.9)`:'var(--text-lo)';
              const bdr=aboveAvg?`rgba(${mc.color},.4)`:'rgba(255,255,255,.1)';
              const bg=aboveAvg?`rgba(${mc.color},.06)`:'transparent';
              return `<span title="${r.sym}: ${mc.fmt(v)}" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid ${bdr};background:${bg};color:${clr};white-space:nowrap">${r.sym.replace('USDT','')} <span style="opacity:.65">${mc.fmt(v)}</span></span>`;
            }).join('');
          }
          const mean = results.reduce((s,r)=>s+(r.bc||0)+(r.sc||0),0)/results.length;
          return results.map(r=>{
            const total=(r.bc||0)+(r.sc||0); if(!total) return '';
            const aboveAvg=total>=mean;
            const clr=aboveAvg?'rgba(96,210,255,.9)':'var(--text-lo)';
            const bdr=aboveAvg?'rgba(96,210,255,.4)':'rgba(255,255,255,.1)';
            const bg=aboveAvg?'rgba(96,210,255,.06)':'transparent';
            const avgSec = r.avgMs!=null ? (r.avgMs/1000).toFixed(1)+'s/order' : 'n/a';
            return `<span title="${r.sym}: ${r.sc||0} S-fills / ${r.bc||0} B-fills · ${avgSec}" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid ${bdr};background:${bg};color:${clr};white-space:nowrap">${r.sym.replace('USDT','')} <span style="opacity:.65">S${r.sc||0} B${r.bc||0}</span><span style="opacity:.4;font-size:7px"> ${avgSec}</span></span>`;
          }).join('');
        },

      });
    },
  };
})();
</script>
