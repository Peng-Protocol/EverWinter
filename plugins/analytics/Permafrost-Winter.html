<!--
  Permafrost Strategy Plugin for PseudoWinter
  Self-calibrating halt governor: replaces the fixed 12h drawdown-throttle /
  gains-lock timers with a learned market-structure profile.

  Every halt event records the market structure (gainer/loser skew + breadth)
  at the moment it fired — drawdown events mark hostile climate, gains-lock
  events mark favorable climate. Scan cycles add weaker PnL-labeled samples
  between those anchors. While halted, structure is re-sampled on a slow
  timer. Halts run the stock 12h horizon by default. Only a *strong* historical
  bias (large |score| backed by enough evidence mass) changes that: it can hold
  the halt past 12h up to a hard cap (24h — the extreme case) while structure
  stays hostile, or "thaw" it early (as soon as 1h) once structure scores
  favorably. Without a strong bias the lock is never lifted early — it just
  serves its 12h. A thin profile falls back to the stock 12h timer too.

  PLK (preemptive lock, on by default): proactive rather than reactive — when
  a routine structure check reads a climate that is historically bad (score at
  or below the PLK trigger, with sufficient evidence), entries lock before any
  PnL damage occurs. A PLK rides the drawdown gate so every entry choke point
  respects it, and surfaces as a "PLK" countdown pill on the topbar (click to
  lift manually). Its duration scales with the strength of the historical bias
  up to the hard cap — an arbitrary span like 3h 20m — and it also lifts early
  once structure clears the thaw score under a strong bias. A real drawdown/
  gains-lock halt supersedes an active PLK. After a PLK ends, a dynamic cooldown
  equal to that lock's own duration must pass before another can engage — no
  back-to-back preemptive locks.

  Structure trajectory ("the wave"): a reading is judged in the context of what
  preceded it, not in isolation. The recent path of the structure lean is tracked
  and plotted in the accordion, and its direction folds into an inherent bull⇄bear
  oscillation prior — so a mildly-bearish tape that is turning up reads negative
  (don't short into the start of a pump). Learned history stays primary; the
  inherent wave only takes the helm when the profile is thin.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation, so the same logic powers Ashfall on PseudoChaser.

  Load via Plugin Manager in PseudoWinter's config panel.
  Load AFTER EverWinter if using live trading — see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const VERSION        = '1.29.1';
  const PFR_KEY        = '__permafrost_winter_v1';
  const PFR_LIQ_KEY         = '__pf_liq_batches';
  const PFR_LIQ_HISTORY_KEY = '__pf_liq_history';
  const CROSS_KEY      = '__everwinter_cross_v1';
  const CROSS_TTL      = 6 * 3600 * 1000;
  const SCORE_KEY      = '__everwinter_scorecard_v1';
  const SCORE_SAFETY_TTL = 365 * 24 * 3600 * 1000;
  const pfCritEmoji = c => {
    if (/^fund/.test(c)) { const s = c.slice(4); const isNeg = s[0] === '-' || s === '<'; return (isNeg ? '💸' : '🤑') + s; }
    if (/^vm/.test(c))   return '🔊' + c.slice(2);
    if (/^lsa/.test(c))  return '🟥' + c.slice(3);
    if (/^lba/.test(c))  return '🟩' + c.slice(3);
    if (/^rasl/.test(c)) return '🔴' + c.slice(4);
    if (/^rabl/.test(c)) return '🟢' + c.slice(4);
    if (/^msliq/.test(c)) return '💦' + c.slice(5);
    if (/^mbliq/.test(c)) return '🌨️' + c.slice(5);
    if (/^sliq/.test(c)) return '🥵' + c.slice(4);
    if (/^bliq/.test(c)) return '🥶' + c.slice(4);
    if (/^iot/.test(c))  return '🎲' + c.slice(3);
    if (/^iom/.test(c))  return '🧲' + c.slice(3);
    if (c === '+24h') return '⬆️'; if (c === '-24h') return '⬇️';
    if (c === '+fund') return '🤑'; if (c === '-fund') return '💸';
    if (c === '>10pct') return '🔊'; if (c === '<10pct') return '🔉';
    return c;
  };
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old scars fade
  const MIN_MASS       = 6;                    // evidence mass (kernel-weighted closes) required to use history
  const STRONG_MASS    = 12;                   // evidence mass for a *strong* historical bias (2× MIN_MASS)
  const STRONG_SCORE   = 0.30;                 // |score| at/above which the bias counts as strong
  const DEFAULT_HALT_MS = 12 * 3600 * 1000;    // stock 12h horizon — the floor unless strong history says otherwise
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never thaw before 1h (only reachable under a strong bias)
  const EVENTS_CAP     = 200;
  const CLOSES_CAP     = 500;

  // ── Structure trajectory ("the wave") ──
  // A reading isn't just where the market is now — it's where it came from. We
  // track the recent path of the structure lean and read its direction, then
  // fold an *inherent* oscillation prior (markets swing strongly bullish ⇄
  // strongly bearish) into the decision. History stays primary; the inherent
  // wave only takes the helm when the learned profile is thin.
  const WAVE_TTL_MS    = 7 * 24 * 3600 * 1000; // wave retains as much structure history as we have, up to ~a week
  const WAVE_CAP       = 2000;              // hard cap on stored wave points
  const WAVE_MIN_PTS   = 3;                 // readings needed before a trajectory is meaningful
  const W_LEAN         = 0.6;               // inherent-score weight on the current structure level
  const W_SLOPE        = 0.4;               // inherent-score weight on the trajectory (where it's heading)
  const W_IO           = 0.15;              // inherent-score weight on collective IO sentiment (direct)
  const SLOPE_REF      = 0.3;               // lean change over the window that counts as full-scale
  const DIR            = -1;                // PseudoWinter shorts → favourable structure is bearish/falling

  window.__BotPlugin = {
    id:        'permafrost-winter',
    name:      'Permafrost (Winter)',
    version:   VERSION,
    targetBot: 'pseudowinter',
    after:     ['everwinter'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition', '_checkDrawdownThrottle', '_checkGainsLock', 'activateManualHalt'],

    css: `
      .pfr-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .pfr-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
      .pfr-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .pfr-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .pfr-tab.on { border-color:rgba(96,210,255,.6); color:var(--ice); background:rgba(96,210,255,.08); }
      .pfr-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .pfr-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
      .pfr-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.permafrostEnabled"> + Permafrost</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false, tC: false, tS: false, tW: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Permafrost</span>
              <span x-show="cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog" @click.prevent="if(!cfgLocked){cfg.permafrostEnabled=!cfg.permafrostEnabled;persist()}">
              <div class="tog-t" :class="cfg.permafrostEnabled?'on':''"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Permafrost Mode</div>
                <div class="pfr-hint">Learns which market climates correlate with drawdowns vs gains locks, building a historical structure profile over time.</div>
              </div>
            </label>
            <div class="pfr-tabs" style="margin-top:10px">
              <button class="pfr-tab" :class="tC?'on':''" @click="tC=!tC">CROSS</button>
              <button class="pfr-tab" :class="tS?'on':''" @click="tS=!tS">SCORE</button>
              <button class="pfr-tab" :class="tW?'on':''" @click="tW=!tW">WAVE</button>
            </div>
            <div class="pfr-zone" x-show="tC">
              <label class="tog" @click.prevent="if(!cfgLocked){cfg.permafrostCrossEnabled=!cfg.permafrostCrossEnabled;persist()}">
                <div class="tog-t" :class="cfg.permafrostCrossEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Cross Broadcast (Ashfall)</div>
                  <div class="pfr-hint">Broadcasts cascade/sacrifice on close and DDH/gains-lock transitions to Ashfall.</div>
                </div>
              </label>
              <div x-show="cfg.permafrostCrossEnabled" style="margin-top:6px">
                <label class="tog" @click.prevent="if(!cfgLocked){cfg.permafrostMutualDdLiftEnabled=!cfg.permafrostMutualDdLiftEnabled;persist()}">
                  <div class="tog-t" :class="cfg.permafrostMutualDdLiftEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Mutual DDH Lift</div>
                    <div class="pfr-hint">When Ashfall is also in drawdown halt, lifts this bot's halt. Checked every 15 s.</div>
                  </div>
                </label>
                <label class="tog" style="margin-top:6px" @click.prevent="if(!cfgLocked){cfg.permafrostGainsContinuationEnabled=!cfg.permafrostGainsContinuationEnabled;persist()}">
                  <div class="tog-t" :class="cfg.permafrostGainsContinuationEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Gains Continuation</div>
                    <div class="pfr-hint">On receiving a gains-lock broadcast from Ashfall, restarts this bot's drawdown throttle from the full configured duration.</div>
                  </div>
                </label>
              </div>
              <div x-show="cfg.permafrostCrossEnabled && pfCrossEvents.length" class="pfr-hint" style="margin-top:5px" x-text="pfCrossEvents.slice().reverse().slice(0,3).map(e=>(e.kind==='cascade'?'⚡ Cascade':'🩸 Sacrifice')+' from Chaser — '+new Date(e.ts).toISOString().slice(11,19)+' UTC').join(' · ')"></div>
            </div>
            <div class="pfr-zone" x-show="tS">
              <label class="tog" @click.prevent="if(!cfgLocked){cfg.permafrostScorecardEnabled=!cfg.permafrostScorecardEnabled;_pfScoreBuild();persist()}">
                <div class="tog-t" :class="cfg.permafrostScorecardEnabled?'on':''"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Slot Scorecard</div>
                  <div class="pfr-hint">Cumulative PnL per MIW slot combo across both bots. Partner closes are direction-inverted. Best → worst, left to right.</div>
                </div>
              </label>
              <div x-show="cfg.permafrostScorecardEnabled" style="margin-top:8px">
                <div class="g">
                  <div class="lbl">Sponge Quota <b x-text="cfg.pfSpongeQuota??30"></b> closes/slot</div>
                  <input type="range" min="10" max="200" step="10" x-model.number="cfg.pfSpongeQuota" @change="_pfScoreBuild();persist()">
                  <div class="pfr-hint">Max recent closes per slot used to compute scores. Older records beyond this count are ignored. Lower = faster adaptation.</div>
                </div>
                <div class="g" style="margin-top:8px">
                  <div class="lbl">Stale Purge <b x-text="cfg.pfStaleSlotDays??7"></b> days</div>
                  <input type="range" min="1" max="90" step="1" x-model.number="cfg.pfStaleSlotDays" @change="_pfScoreTrim();_pfScoreBuild();persist()">
                  <div class="pfr-hint">Slots with no new closes in this many days are fully removed from the scorecard.</div>
                </div>
                <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.pfHistScoringEnabled=!cfg.pfHistScoringEnabled;_pfScoreBuild();persist()}">
                  <div class="tog-t" :class="cfg.pfHistScoringEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Include Historical Scores</div>
                    <div class="pfr-hint">Includes MIW historical (simulated) closes in scorecard calculations. Disable to see real-trades-only profile.</div>
                  </div>
                </label>
                <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.permafrostAutoBlock=!cfg.permafrostAutoBlock;_pfScoreBuild();persist()}">
                  <div class="tog-t" :class="cfg.permafrostAutoBlock?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Auto Block</div>
                    <div class="pfr-hint">Gates per-slot blocking by scorecard data. Enable conditions below.</div>
                  </div>
                </label>
                <div x-show="cfg.permafrostAutoBlock" style="margin-top:6px;padding:6px 8px;background:rgba(255,80,80,.03);border:1px solid rgba(255,80,80,.1);border-radius:3px">
                  <label class="tog" @click.prevent="if(!cfgLocked){cfg.pfThresholdBlock=!cfg.pfThresholdBlock;_pfScoreBuild();persist()}">
                    <div class="tog-t" :class="cfg.pfThresholdBlock?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Threshold Block</div>
                      <div class="pfr-hint">Blocks if own loss sum OR partner win sum individually exceeds the threshold. Wins don't offset losses.</div>
                    </div>
                  </label>
                  <label class="tog" style="margin-top:6px" @click.prevent="if(!cfgLocked){cfg.pfCombinedBlock=!cfg.pfCombinedBlock;_pfScoreBuild();persist()}">
                    <div class="tog-t" :class="cfg.pfCombinedBlock?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Combined PnL Block</div>
                      <div class="pfr-hint">Blocks if total net PnL (own + inverted partner) falls below minus the threshold. Wins offset losses.</div>
                    </div>
                  </label>
                  <div class="g" style="margin-top:6px">
                  <div class="lbl">Block Threshold <b x-text="'-$'+(((cfg.minNotional||6)/(cfg.leverage||6))*(cfg.permafrostSlotLossThreshold??0.25)).toFixed(2)"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'('+(Math.round((cfg.permafrostSlotLossThreshold??0.25)*100))+'% margin)'"></span></div>
                  <input type="range" min="0.05" max="1.00" step="0.05" x-model.number="cfg.permafrostSlotLossThreshold" @change="_pfScoreBuild();persist()">
                  <div class="pfr-hint" style="margin-top:4px" x-text="(()=>{ const n=Object.values(miwBlockedSlots||{}).filter(v=>v==='blocked').length; return n===0?'No MIW slots blocked.':n+' slot'+(n===1?'':'s')+' blocked.'; })()"></div>
                  </div>
                  <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.pfCollapsedBlockEnabled=!cfg.pfCollapsedBlockEnabled;_pfScoreBuild();persist()}">
                    <div class="tog-t" :class="cfg.pfCollapsedBlockEnabled?'on':''"><div class="tog-k"></div></div>
                    <div>
                      <div class="tog-l">Collapsed Blocking</div>
                      <div class="pfr-hint">Pre-computes entry blocks using collapsed criterion PnL scaled by tier depth. Slot combinations whose aggregate score falls below the threshold are blocked at scan time.</div>
                    </div>
                  </label>
                  <div x-show="cfg.pfCollapsedBlockEnabled" style="margin-top:6px;padding:6px 8px;background:rgba(255,80,80,.02);border:1px solid rgba(255,80,80,.08);border-radius:3px">
                    <div class="g">
                      <div class="lbl">Collapsed Threshold <b x-text="'-$'+(((cfg.minNotional||6)/(cfg.leverage||6))*(cfg.pfCollapsedBlockThreshold??0.25)).toFixed(2)"></b> <span style="font-weight:normal;color:var(--text-lo)" x-text="'('+(Math.round((cfg.pfCollapsedBlockThreshold??0.25)*100))+'% margin)'"></span></div>
                      <input type="range" min="0.05" max="1.00" step="0.05" x-model.number="cfg.pfCollapsedBlockThreshold" @change="_pfScoreBuild();persist()">
                    </div>
                    <div class="g" style="margin-top:6px">
                      <div class="lbl">Scale Factor <b x-text="Math.round((cfg.pfCollapsedBlockScaleFactor??0.01)*100)+'%'"></b>/tier</div>
                      <input type="range" min="0.001" max="0.05" step="0.001" x-model.number="cfg.pfCollapsedBlockScaleFactor" @change="_pfScoreBuild();persist()">
                    </div>
                    <div class="g" style="margin-top:6px">
                      <div class="lbl">Tier Cap <b x-text="cfg.pfCollapsedBlockTierCap??50"></b></div>
                      <input type="range" min="5" max="200" step="5" x-model.number="cfg.pfCollapsedBlockTierCap" @change="_pfScoreBuild();persist()">
                    </div>
                    <label class="tog" style="margin-top:6px" @click.prevent="if(!cfgLocked){cfg.pfCollapsedBlockManual=!cfg.pfCollapsedBlockManual;_pfScoreBuild();persist()}">
                      <div class="tog-t" :class="cfg.pfCollapsedBlockManual?'on':''"><div class="tog-k"></div></div>
                      <div>
                        <div class="tog-l">Apply to Manual Slots</div>
                        <div class="pfr-hint">Also apply collapsed scoring and block evaluation to manual MIW slots.</div>
                      </div>
                    </label>
                    <label class="tog" style="margin-top:6px" @click.prevent="if(!cfgLocked){cfg.pfLiveCollapsedBlock=!cfg.pfLiveCollapsedBlock;persist()}">
                      <div class="tog-t" :class="cfg.pfLiveCollapsedBlock?'on':''"><div class="tog-k"></div></div>
                      <div>
                        <div class="tog-l">Live Collapsed Gate</div>
                        <div class="pfr-hint">At scan time, scores each qualifying ticker using its live criterion depths against collapsed PnL. Uses the same threshold, scale factor, and tier cap above.</div>
                      </div>
                    </label>
                  </div>
                </div>
                <label class="tog" style="margin-top:8px" @click.prevent="if(!cfgLocked){cfg.pfCollapsedSort=!cfg.pfCollapsedSort;persist()}">
                  <div class="tog-t" :class="cfg.pfCollapsedSort?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Collapsed Sorting</div>
                    <div class="pfr-hint">Orders entry slots by their aggregate collapsed criterion PnL score, highest first.</div>
                  </div>
                </label>
                <label class="tog" x-show="cfg.pfCollapsedSort" style="margin-top:6px;margin-left:10px" @click.prevent="if(!cfgLocked){cfg.pfCoQualPenaltyEnabled=!cfg.pfCoQualPenaltyEnabled;persist()}">
                  <div class="tog-t" :class="cfg.pfCoQualPenaltyEnabled?'on':''"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Co-Qualifying Penalty</div>
                    <div class="pfr-hint">Tickers also matching slots with negative collapsed scores are ranked lower. Each additional bad co-qualifying slot deducts from the ticker's sort score.</div>
                  </div>
                </label>
              </div>
            </div>
            <div class="pfr-zone" x-show="tW">
              <div x-data="{sm:null}">
                <div style="font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--text-lo);margin-bottom:6px">SCORE METRICS</div>
                <div style="display:flex;gap:3px;flex-wrap:wrap">
                  <button class="pfr-opt" @click="sm=(sm==='structure'?null:'structure')" :style="sm==='structure'?'border-color:rgba(96,210,255,.8);color:var(--ice);background:rgba(96,210,255,.25)':(cfg.pfScoreMetrics??{}).structure!=null?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">Structure</button>
                  <button class="pfr-opt" @click="sm=(sm==='funding'?null:'funding')" :style="sm==='funding'?'border-color:rgba(96,210,255,.8);color:var(--ice);background:rgba(96,210,255,.25)':(cfg.pfScoreMetrics??{}).funding!=null?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">Funding</button>
                  <button class="pfr-opt" @click="sm=(sm==='liq'?null:'liq')" :style="sm==='liq'?'border-color:rgba(96,210,255,.8);color:var(--ice);background:rgba(96,210,255,.25)':(cfg.pfScoreMetrics??{}).liq!=null?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">Liq</button>
                  <button class="pfr-opt" @click="sm=(sm==='vol'?null:'vol')" :style="sm==='vol'?'border-color:rgba(96,210,255,.8);color:var(--ice);background:rgba(96,210,255,.25)':(cfg.pfScoreMetrics??{}).vol!=null?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">Vol</button>
                  <button class="pfr-opt" @click="sm=(sm==='oi'?null:'oi')" :style="sm==='oi'?'border-color:rgba(96,210,255,.8);color:var(--ice);background:rgba(96,210,255,.25)':(cfg.pfScoreMetrics??{}).oi!=null?'border-color:rgba(96,210,255,.6);color:var(--ice);background:rgba(96,210,255,.15)':'border-color:var(--border);color:var(--text-lo);background:transparent'">OI</button>
                </div>
                <div x-show="sm !== null" style="width:100%;margin-top:6px;padding:5px 7px;background:rgba(96,210,255,.06);border:1px solid rgba(96,210,255,.2);border-radius:3px">
                  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                    <span style="font-size:9px;color:var(--text-lo)" x-text="({structure:'Structure',funding:'Funding',liq:'Liq',vol:'Vol',oi:'OI'})[sm]||''"></span>
                    <span x-show="(cfg.pfScoreMetrics??{})[sm]!=null" style="display:flex;align-items:center;gap:4px;flex:1">
                      <span style="font-size:9px;color:var(--text-lo)">Weight</span>
                      <input type="range" min="1" max="5" step="1" style="flex:1;min-width:60px" :value="(cfg.pfScoreMetrics??{})[sm]??1" @input="(()=>{const k=sm;cfg.pfScoreMetrics=Object.assign({},cfg.pfScoreMetrics||{},{[k]:parseInt($event.target.value)});persist()})()">
                      <b style="font-size:9px;color:var(--ice);min-width:10px" x-text="(cfg.pfScoreMetrics??{})[sm]??1"></b>
                    </span>

                  <button x-show="!c" @click="if(!cfgLocked)c=true" style="font-family:var(--mono);font-size:9px;padding:3px 10px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:none;color:var(--short);cursor:pointer;letter-spacing:.5px">Clear Plugin State</button>
                  <template x-if="c">
                    <span style="display:inline-flex;gap:3px;align-items:center">
                      <span style="font-family:var(--mono);font-size:8px;color:var(--short)">Sure?</span>
                      <button @click="localStorage.removeItem('__permafrost_winter_v1');pfEvents=[];pfCloses=[];pfWave=[];persist();log('[PFR] Plugin state cleared from storage.','warn'); c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(255,69,96,.5);border-radius:2px;background:rgba(255,69,96,.12);color:var(--short);cursor:pointer;letter-spacing:.5px">Yes</button>
                      <button @click="c=false" style="font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid rgba(255,255,255,.15);border-radius:2px;background:rgba(255,255,255,.05);color:var(--text-lo);cursor:pointer;letter-spacing:.5px">No</button>

                <div class="pfr-hint" style="margin-top:4px">Wipes all Permafrost data from browser storage — events, samples, and wave history. Also clears the storage key so no orphaned data lingers if the plugin is removed. Export first if you want to preserve the profile.</div>
