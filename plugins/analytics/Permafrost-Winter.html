<!--
  Permafrost Strategy Plugin for PseudoWinter
  Self-calibrating halt governor: replaces the fixed 12h drawdown-throttle /
  gains-lock timers with a learned market-structure profile.

  Every halt event records the market structure (gainer/loser skew + breadth)
  at the moment it fired — drawdown events mark hostile climate, gains-lock
  events mark favorable climate. Scan cycles add weaker PnL-labeled samples
  between those anchors. While halted, structure is re-sampled on a slow
  timer. Halts run the stock 12h horizon by default. Only a *strong* historical
  bias (large |score| backed by enough evidence mass) changes that: it can hold
  the halt past 12h up to a hard cap (24h — the extreme case) while structure
  stays hostile, or "thaw" it early (as soon as 1h) once structure scores
  favorably. Without a strong bias the lock is never lifted early — it just
  serves its 12h. A thin profile falls back to the stock 12h timer too.

  PLK (preemptive lock, on by default): proactive rather than reactive — when
  a routine structure check reads a climate that is historically bad (score at
  or below the PLK trigger, with sufficient evidence), entries lock before any
  PnL damage occurs. A PLK rides the drawdown gate so every entry choke point
  respects it, and surfaces as a "PLK" countdown pill on the topbar (click to
  lift manually). Its duration scales with the strength of the historical bias
  up to the hard cap — an arbitrary span like 3h 20m — and it also lifts early
  once structure clears the thaw score under a strong bias. A real drawdown/
  gains-lock halt supersedes an active PLK. After a PLK ends, a dynamic cooldown
  equal to that lock's own duration must pass before another can engage — no
  back-to-back preemptive locks.

  Structure trajectory ("the wave"): a reading is judged in the context of what
  preceded it, not in isolation. The recent path of the structure lean is tracked
  and plotted in the accordion, and its direction folds into an inherent bull⇄bear
  oscillation prior — so a mildly-bearish tape that is turning up reads negative
  (don't short into the start of a pump). Learned history stays primary; the
  inherent wave only takes the helm when the profile is thin.

  The profile is direction-agnostic: it only learns what realized PnL says
  about this installation, so the same logic powers Ashfall on PseudoChaser.

  Load via Plugin Manager in PseudoWinter's config panel.
  Load AFTER EverWinter if using live trading — see README Plugin Stack Order.
  targetBot: pseudowinter
-->
<script>
(function () {
  'use strict';

  const VERSION        = '1.61.2';
  // Megacaps excluded from the population pool alongside BTC — their size skews OC/IO/Volume/liq
  // averages the same way BTC would. cfg.megacapExclude is seeded from this default below but is
  // a plain array on cfg (no picker UI) — edit it directly in saved config if the list needs to
  // change. Shared key name with MultiIndicator-Winter's own seed so either plugin can init it first.
  const DEFAULT_MEGACAP_EXCLUDE = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','TRXUSDT','LINKUSDT'];
  const PFR_KEY        = '__permafrost_winter_v1';
  const PFR_LIQ_KEY         = '__pf_liq_batches';
  const PFR_LIQ_HISTORY_KEY = '__pf_liq_history';
  const PFR_LIQ_SEQUESTER_KEY = '__pf_liq_sequester';
  const PFR_OC_HIST_KEY     = '__pf_oc_history';
  const CROSS_KEY      = '__everwinter_cross_v1';
  const CROSS_TTL      = 6 * 3600 * 1000;
  const SCORE_KEY      = '__everwinter_scorecard_v1';
  const SCORE_SAFETY_TTL = 365 * 24 * 3600 * 1000;
  // Full-universe PEC/VSG candle log for Pre-Screening — same same-origin-localStorage
  // sharing convention as SCORE_KEY/CROSS_KEY (Ashfall and Permafrost both read/write this,
  // so whichever fetches first each cycle saves the other one the trip), but deliberately
  // its own key rather than the generic _sharedWrite registry: that registry is capped at
  // SHARED_REGISTRY_BYTE_CAP (200KB, in PseudoChaser.html/PseudoWinter.html) sized for small
  // recent-snapshot caches (bulkTickers, pec_1h_last, liqResults) — a real per-symbol candle
  // history for the whole exchange is an order of magnitude bigger and would evict those on
  // arrival. Keyed by granularity bucket ('15m'/'1h'/'3h') so this stays correct even if
  // micPecGranularity and miwPecGranularity are set differently on the two installs.
  const KLINE_LOG_KEY      = '__everwinter_kline_log_v1';
  const KLINE_LOG_BYTE_CAP = 1.5 * 1024 * 1024;
  const pfCritEmoji = c => {
    if (/^fund/.test(c)) { const s = c.slice(4); const isNeg = s[0] === '-' || s === '<'; return (isNeg ? '💸' : '🤑') + s; }
    if (/^vm/.test(c))   return '🔊' + c.slice(2);
    if (/^va/.test(c))   return '🔊' + c.slice(2);
    if (/^ioa/.test(c))  return '🎲' + c.slice(3);
    // Retired (see VSG.md) — kept resolvable so old scorecard entries still render.
    if (/^lsa/.test(c))  return '🟥' + c.slice(3);
    if (/^lba/.test(c))  return '🟩' + c.slice(3);
    if (/^rasl/.test(c)) return '🔴' + c.slice(4);
    if (/^rabl/.test(c)) return '🟢' + c.slice(4);
    if (/^msliq/.test(c)) return '💦' + c.slice(5);
    if (/^mbliq/.test(c)) return '🧊' + c.slice(5);
    if (/^sliq/.test(c)) return '🥵' + c.slice(4);
    if (/^bliq/.test(c)) return '🥶' + c.slice(4);
    if (/^iot/.test(c))  return '🎲' + c.slice(3);
    if (/^iom/.test(c))  return '🧲' + c.slice(3);
    if (/^ocs/.test(c))  return '🔭' + c.slice(3);
    if (/^ocx/.test(c))  return '📡' + c.slice(3);
    if (/^pec([a-z]+)/.test(c)) {
      const m = c.match(/^(pec[a-z]+)/);
      const base = m[1];
      const emoji = { pecob: '⬆️', pecos: '⬇️', pecalpha: '⤵️', pecdelta: '⤴️', pecmomup: '↗️', pecmomdn: '↘️', pecirr: '🔄' }[base] || '📊';
      return emoji + c.slice(base.length);
    }
    if (/^vsg([a-z]+)/.test(c)) {
      const m = c.match(/^(vsg[a-z]+)/);
      const base = m[1];
      const emoji = { vsgot: '⏫', vsgut: '⏬', vsgalpha: '🔼', vsgdelta: '🔽', vsgmomup: '⏩', vsgmomdn: '⏪', vsgirr: '🔀' }[base] || '📊';
      return emoji + c.slice(base.length);
    }
    if (/^regime([a-z]+)/.test(c)) {
      const m = c.match(/^(regime[a-z]+)/);
      const base = m[1];
      const emoji = { regimeslo: '🌤️', regimeblo: '🌤️', regimesmid: '☁️', regimebmid: '☁️', regimeshi: '🌪️', regimebhi: '🌪️' }[base] || '📊';
      return emoji + c.slice(base.length);
    }
    if (c === '+24h') return '⬆️'; if (c === '-24h') return '⬇️';
    if (c === '+fund') return '🤑'; if (c === '-fund') return '💸';
    if (c === '+ocs') return '🔭+'; if (c === '-ocs') return '🔭-';
    if (c === '0liq') return '⚫';
    if (c === '>10pct') return '🔊'; if (c === '<10pct') return '🔉';
    return c;
  };
  // Collapses a single recorded (tiered) criterion down to its base+sign bucket, e.g.
  // "fund+3" -> "fund+", "ocx+18" -> "ocx+". Used both for scorecard display aggregation
  // and for scorecard storage retention — the sponge quota is meant to cap records per
  // base-criterion combination, not per exact tier value (which is combinatorially large
  // and would barely ever repeat, defeating the quota). Bare '+fund'/'-fund' (Blind-Entry/
  // Liquid-Diver's own tag, never produced by MIW which is always tiered) used to fold into
  // 'fund>'/'fund<' here so they'd share MIW's bucket — now that the scorecard is split into
  // separate MIW and Blind-Entry/Liquid-Diver charts that merge no longer serves a purpose,
  // and it was making the collapsed key get read back through pfCritEmoji's tiered-fund
  // regex branch instead of its bare-tag branch, showing a stray >/< after the emoji.
  const collapseCrit = c => c.replace(/\d+$/, '');
  const collapseKey = criteria => [...criteria].map(collapseCrit).sort().join(',');
  // Regime segment display labels — bull = S-Liq dominant, bear = B-Liq dominant (matches
  // the S/B naming already used by the regime criteria themselves, see Regime.md).
  const REGIME_SEGMENT_LABEL = { regimeslo: 'Low Bull', regimeblo: 'Low Bear', regimesmid: 'Mid Bull', regimebmid: 'Mid Bear', regimeshi: 'High Bull', regimebhi: 'High Bear' };
  const KERNEL_H       = 0.25;                 // gaussian bandwidth in (skew, breadth) space
  const HALF_LIFE_MS   = 7 * 24 * 3600 * 1000; // recency decay half-life — old scars fade
  const MIN_MASS       = 6;                    // evidence mass (kernel-weighted closes) required to use history
  const STRONG_MASS    = 12;                   // evidence mass for a *strong* historical bias (2× MIN_MASS)
  const STRONG_SCORE   = 0.30;                 // |score| at/above which the bias counts as strong
  const DEFAULT_HALT_MS = 12 * 3600 * 1000;    // stock 12h horizon — the floor unless strong history says otherwise
  const MIN_HALT_MS    = 1 * 3600 * 1000;      // never thaw before 1h (only reachable under a strong bias)
  const EVENTS_CAP     = 200;
  const CLOSES_CAP     = 500;
  const SAMPLE_STATE_KEY = '__ew_sample_state_v1'; // cross-bot sample sharing

  // ── Per-data-type storage cap ──
  // Each distinct data type (wave, liq history, OC history, scorecard, ...) is capped
  // independently at TYPE_BYTE_CAP bytes, trimming its own oldest entries when it alone
  // exceeds budget. Deliberately atomized rather than one blanket cap on the whole plugin
  // blob, so an oversized data type can't force pruning of unrelated data that's still
  // well within budget — e.g. a liq-history spike shouldn't cost wave history records.
  const TYPE_BYTE_CAP = 200 * 1024;
  function trimToByteCap(arr, maxBytes = TYPE_BYTE_CAP) {
    // Assumes arr is ordered oldest-first (push-appended). Converges in a handful of
    // iterations by estimating how many records to drop from the size overshoot, rather
    // than shifting one at a time and re-stringifying the whole array each try.
    if (!Array.isArray(arr) || arr.length < 2) return arr;
    let out = arr;
    let size = new Blob([JSON.stringify(out)]).size;
    let guard = 0;
    while (size > maxBytes && out.length > 1 && guard < 25) {
      const avg = size / out.length;
      const excess = size - maxBytes;
      const drop = Math.min(out.length - 1, Math.max(1, Math.ceil(excess / avg)));
      out = out.slice(drop);
      size = new Blob([JSON.stringify(out)]).size;
      guard++;
    }
    return out;
  }

  // ── Structure trajectory ("the wave") ──
  // A reading isn't just where the market is now — it's where it came from. We
  // track the recent path of the structure lean and read its direction, then
  // fold an *inherent* oscillation prior (markets swing strongly bullish ⇄
  // strongly bearish) into the decision. History stays primary; the inherent
  // wave only takes the helm when the learned profile is thin.
  const WAVE_TTL_MS    = 7 * 24 * 3600 * 1000; // wave retains as much structure history as we have, up to ~a week
  const WAVE_CAP       = 2000;              // hard cap on stored wave points
  const WAVE_MIN_PTS   = 3;                 // readings needed before a trajectory is meaningful
  const W_LEAN         = 0.6;               // inherent-score weight on the current structure level
  const W_SLOPE        = 0.4;               // inherent-score weight on the trajectory (where it's heading)
  const W_FIO          = 0.15;               // inherent-score weight on collective FIO (funding-derived) sentiment (direct)
  const SLOPE_REF      = 0.3;               // lean change over the window that counts as full-scale
  const DIR            = -1;                // PseudoWinter shorts → favourable structure is bearish/falling

  window.__BotPlugin = {
    id:        'permafrost-winter',
    name:      'Permafrost (Winter)',
    version:   VERSION,
    targetBot: 'pseudowinter',
    after:     ['everwinter'],
    before:    [],
    conflicts: [],
    requires:  [],
    touches:   ['init', 'persist', 'runScan', 'pseudoClosePosition', '_checkDrawdownThrottle', '_checkGainsLock', 'activateManualHalt'],

    css: `
      .pfr-hint { font-size:9px; color:var(--text-lo); margin-top:3px; line-height:1.5; }
      .pfr-stat { font-family:var(--mono); font-size:9px; color:var(--text-mid); line-height:1.7; }
      .pfr-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
      .pfr-tab { font-family:var(--mono); font-size:9px; padding:3px 9px; border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,color .12s,background .12s; letter-spacing:.5px; }
      .pfr-tab.on { border-color:rgba(96,210,255,.6); color:var(--ice); background:rgba(96,210,255,.08); }
      .pfr-tab:not(.on) { border-color:rgba(255,255,255,.15); color:var(--text-lo); }
      .pfr-zone { margin-top:8px; padding:8px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; }
      .pfr-opt { padding:5px 7px; font-size:9px; font-family:var(--mono); border-radius:2px; border:1px solid; cursor:pointer; background:none; transition:border-color .12s,background .12s,color .12s; }
    `,

    slots: {
      'mode-label-extra': `<span x-show="cfg.permafrostEnabled"> + Permafrost</span>`,
      // Accordion header emoji follows the host-family convention: ♨ for Chaser plugins,
      // ❄ for Winter plugins (set by Ashfall/Permafrost) — keep all plugin accordions matching.
      'strategy-accordions': `
        <div x-data="{ open: false, tC: false, tS: false, tW: false }">
          <button class="cfg-acc-hd" @click="open=!open" :class="open?'open':''">
            <div style="display:flex;align-items:center;gap:7px">
              <span>❄ Permafrost</span>
              <span x-show="cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(96,210,255,.15);border:1px solid rgba(96,210,255,.3);border-radius:2px;color:var(--ice);letter-spacing:1px">ON</span>
              <span x-show="!cfg.permafrostEnabled" style="font-size:8px;padding:1px 5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:var(--text-lo);letter-spacing:1px">OFF</span>
            </div>
            <span class="cfg-acc-arrow" :class="open?'open':''">▶</span>
          </button>
          <div x-show="open" x-transition.opacity class="cfg-acc-body">
            <label class="tog">
              <div class="tog-t" :class="cfg.permafrostEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.permafrostEnabled=!cfg.permafrostEnabled;persist()}"><div class="tog-k"></div></div>
              <div>
                <div class="tog-l">Permafrost Mode</div>
                <div class="pfr-hint">Learns from historical market conditions and outcomes to adapt halt timing and entry behavior.</div>
              </div>
            </label>
            <div class="pfr-tabs" style="margin-top:10px">
              <button class="pfr-tab" :class="tC?'on':''" @click="tC=!tC">CROSS</button>
              <button class="pfr-tab" :class="tS?'on':''" @click="tS=!tS">SCORE</button>
              <button class="pfr-tab" :class="tW?'on':''" @click="tW=!tW">WAVE</button>
            </div>
            <div class="pfr-zone" x-show="tC">
              <label class="tog">
                <div class="tog-t" :class="cfg.permafrostCrossEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.permafrostCrossEnabled=!cfg.permafrostCrossEnabled;persist()}"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Cross Broadcast (Ashfall)</div>
                  <div class="pfr-hint">Broadcasts cascade/sacrifice on close and DDH/gains-lock transitions to Ashfall.</div>
                </div>
              </label>
              <div x-show="cfg.permafrostCrossEnabled" style="margin-top:6px">
                <label class="tog">
                  <div class="tog-t" :class="cfg.permafrostMutualDdLiftEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.permafrostMutualDdLiftEnabled=!cfg.permafrostMutualDdLiftEnabled;persist()}"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Mutual DDH Lift</div>
                    <div class="pfr-hint">When Ashfall is also in drawdown halt, lifts this bot's halt. Checked every 15 s.</div>
                  </div>
                </label>
              </div>
              <div x-show="cfg.permafrostCrossEnabled && pfCrossEvents.length" class="pfr-hint" style="margin-top:5px" x-text="pfCrossEvents.slice().reverse().slice(0,3).map(e=>(e.kind==='cascade'?'⚡ Cascade':'🩸 Sacrifice')+' from Chaser — '+new Date(e.ts).toISOString().slice(11,19)+' UTC').join(' · ')"></div>
            </div>
            <div class="pfr-zone" x-show="tS">
              <label class="tog">
                <div class="tog-t" :class="cfg.permafrostScorecardEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.permafrostScorecardEnabled=!cfg.permafrostScorecardEnabled;_pfScoreBuild();persist()}"><div class="tog-k"></div></div>
                <div>
                  <div class="tog-l">Slot Scorecard</div>
                  <div class="pfr-hint">Cumulative PnL per MIW slot combo across both bots. Partner closes are direction-inverted. Best → worst, left to right.</div>
                </div>
              </label>
              <div x-show="cfg.permafrostScorecardEnabled" style="margin-top:8px">
                <div class="g">
                  <div class="lbl">Sponge Quota <b x-text="cfg.pfSpongeQuota??30"></b> closes/criterion</div>
                  <input type="range" min="10" max="200" step="10" x-model.number="cfg.pfSpongeQuota" @change="_pfScoreBuild();persist()">
                  <div class="pfr-hint">Max recent closes per criterion used to compute scores. Older records beyond this count are ignored. Lower = faster adaptation.</div>
                </div>
                <div class="g" style="margin-top:8px">
                  <div class="lbl">Stale Purge <b x-text="cfg.pfStaleSlotDays??7"></b> days</div>
                  <input type="number" min="1" step="1" x-model.number="cfg.pfStaleSlotDays" @change="_pfScoreTrim();_pfScoreBuild();persist()" style="width:70px;font-family:var(--mono);font-size:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.12);border-radius:3px;color:var(--text-hi);padding:2px 6px">
                  <div class="pfr-hint">Slots with no new closes in this many days are fully removed from the scorecard.</div>
                </div>
                <label class="tog" style="margin-top:8px">
                  <div class="tog-t" :class="cfg.pfRegimeScoringEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.pfRegimeScoringEnabled=!cfg.pfRegimeScoringEnabled;pfRegimeViewType=null;pfRegimeDisplayType=_pfRegimeCurrentType();_pfScoreBuild();persist()}"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Regime Based Scoring</div>
                    <div class="pfr-hint">Splits non-regime criteria scores into 6 buckets by which regime was active at open. Needs regime criteria selected in MIW.</div>
                  </div>
                </label>
                <div x-show="cfg.pfRegimeScoringEnabled" class="g" style="margin-top:8px">
                  <div class="lbl">Regime Min Sample <b x-text="cfg.pfRegimeMinSample??5"></b> closes</div>
                  <input type="range" min="1" max="30" step="1" x-model.number="cfg.pfRegimeMinSample" @change="_pfScoreBuild();persist()">
                  <div class="pfr-hint">Below this many closes, a regime bucket falls back to the flat score for entry blocking/ranking — display still shows the raw regime figure.</div>
                </div>
                <div class="g" style="margin-top:8px">
                  <div class="lbl">Partner Score Push</div>
                  <button @click="cfg.pfPartnerScoreMode=cfg.pfPartnerScoreMode==='wins'?'losses':cfg.pfPartnerScoreMode==='losses'?'both':'wins';_pfScoreBuild();persist()" style="font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:3px;border:1px solid rgba(96,210,255,.35);background:rgba(96,210,255,.08);color:rgba(96,210,255,.9);cursor:pointer;letter-spacing:.5px;margin-top:4px" x-text="cfg.pfPartnerScoreMode==='wins'?'Only Wins':cfg.pfPartnerScoreMode==='losses'?'Only Losses':'Wins/Losses'"></button>
                  <div class="pfr-hint">Which partner outcomes move a criterion's score. Excluded outcomes still keep the criterion fresh.</div>
                </div>
                <label class="tog" style="margin-top:8px">
                  <div class="tog-t" :class="cfg.pfCoQualPenaltyEnabled?'on':''" @click.prevent="if(!cfgLocked){cfg.pfCoQualPenaltyEnabled=!cfg.pfCoQualPenaltyEnabled;persist()}"><div class="tog-k"></div></div>
                  <div>
                    <div class="tog-l">Co-Qualifying Penalty</div>
                    <div class="pfr-hint">Tickers also matching slots with negative collapsed scores are ranked lower. Each additional bad co-qualifying slot deducts from the ticker's sort score.</div>
                  </div>
                </label>
                <div class="g" x-show="cfg.pfCoQualPenaltyEnabled" style="margin-top:8px">
                  <div class="lbl">Depth Multiplier <b x-text="(cfg.pfCoQualDepthPct??10)+'%'"></b> per tier</div>
                  <input type="range" min="0" max="50" step="1" x-model.number="cfg.pfCoQualDepthPct" @change="persist()">
                  <div class="pfr-hint">Scales a criterion's collapsed score by how deep the ticker qualifies at — a good score gets better with depth, a bad score gets worse. E.g. at 10%, a criterion scoring +$0.50 is applied as +$0.70 for a ticker qualifying 4 tiers deep.</div>
                </div>
              </div>
            </div>
            <div class="pfr-zone" x-show="tW">
              <div x-data="{sm:null}">
              <div style="margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:6px">
                <div style="font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--text-lo);margin-bottom:4px">SAMPLING BARS</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px 16px">
                  <label class="tog">
                    <div class="tog-t" :class="(cfg.pfShowStructure??false)?'on':''" @click.prevent="if(!cfgLocked){cfg.pfShowStructure=!(cfg.pfShowStructure??false);persist()}"><div class="tog-k"></div></div>

                  <label class="tog">
                    <div class="tog-t" :class="(cfg.pfShowFunding??false)?'on':''" @click.prevent="if(!cfgLocked){cfg.pfShowFunding=!(cfg.pfShowFunding??false);persist()}"><div class="tog-k"></div></div>

                    <div class="tog-t" :class="(cfg.pfShowLiq??true)?'on':''" @click.prevent="if(!cfgLocked){cfg.pfShowLiq=!(cfg.pfShowLiq??true);persist()}"><div class="tog-k"></div></div>

                  <label class="tog">
                    <div class="tog-t" :class="(cfg.pfShowVol??true)?'on':''" @click.prevent="if(!cfgLocked){cfg.pfShowVol=!(cfg.pfShowVol??true);persist()}"><div class="tog-k"></div></div>

              <div class="g">
                <div class="lbl">Slope Window <b x-text="(cfg.permafrostSlopeWindowHours??6)+'h'"></b></div>
                <input type="range" min="1" max="24" step="1" x-model.number="cfg.permafrostSlopeWindowHours" @change="persist()">
                <div class="pfr-hint">Timeframe for the directional comparison — "turning bullish/bearish" means the avg lean over the last N hours has shifted vs the N hours before it. Default 6h; raise to 12h for a slower, less reactive signal.</div>
              </div>

    transform(def) {

      const _origScan  = def.runScan;

      let _pfWasHalted               = false;
      let _pfWasGainsLocked          = false;
      let _pfWasRegimeType           = null;

      return Object.assign({}, def, {

        pfEvents:     [],   // { ts, kind:'drawdown'|'gainslock', skew, breadth } — kept for import compat, not scored
        pfCloses:     [],   // { ts, pnl, skew, breadth } — per-close PnL paired with structure at close time
        pfWave:       [],   // { ts, lean } — structure-lean trajectory, retained up to ~a week (the "wave")
        pfScoreboard: [],   // sorted scorecard entries built from SCORE_KEY records
        pfScorecardView: null,         // persisted in cfg; init below
        pfScorecardExpanded: null,     // key of currently expanded chip, or null
        pfRegimeViewType: null,        // regime key ('regimeslo' etc) currently shown by the segment
                                        // cycle button; null = not yet picked, falls back to live current regime
        pfRegimeCritStats: null,       // {[regimeType]: {[collapsedCrit]: stats}} — built in _pfScoreBuild
        pfRegimeActiveTypes: [],       // which of the 6 regime types are currently selected in MIW config
        pfRegimeLiveRanks: null,       // {[collapsedCrit]: pnl} for the currently prevailing regime — read by MIW
        pfRegimeDisplayType: null,     // the auto-follow segment shown when no manual pin is set —
                                        // only updates on an actual Liq-skew threshold cross or app
                                        // reload (see the setInterval loop), not on every render
        pfKlineBar:   { bearSum: 0, bullSum: 0, max: 50 }, // merged (own + partner) kline bar for display
        _pfOwnKlineBar: null,                       // own-only kline bar before partner merge
        _pfKlineBarAt: 0,                           // hourly candle timestamp of last own kline sample
        _pfStructureList: null, _pfStructureAt: 0, // own 3h ticker cache independent of host
        pfStatus:  { skew: null, breadth: null, score: null, mass: 0, count: 0, lean: 0, slope: 0, inherent: 0, eff: null, fioScore: null, at: 0 },
        pfCrossEvents: [],
        _liqBatches: [],
        _liqLastBatchSyms: [], // tickers picked for liq surveillance on the most recent scan only
        _liqMessageHooks: [], // plugins push (batch, sym) => void here to react to live liq turnover, e.g. Liquid-Diver
        _liqCloseHooks: [], // plugins push (results, batch) => void here to react to a closed cycle's final per-symbol snapshot, e.g. Liquid-Diver's 0-liq detection
        _liqPersistPending: false, // debounce guard for _liqPersistBatches
        _liqResults: {},
        _liqResultsVersion: 0,
        _liqCycleHistory: [],
        // Symbols whose most recently closed batch read clean (zero combined liq turnover).
        // Map of symbol -> { qualifiedAt }, refreshed every time a clean close reconfirms it,
        // deleted the moment a close shows any liquidation. Drives sequestered priority picks
        // in _liqLaunchBatch so a calm ticker keeps getting resurveilled instead of aging out
        // of the >6%/-6% mover pool and going dark. See _liqCloseBatch / _liqLaunchBatch.
        _liqSequester: {},
        _liqLatestResults: [],
        _liqCycleCounter: 0,
        _liqAvgYPx: null,
        _liqYAxisHtml: '',
        _liqHighlightedCycleTs: null, // ts of a clicked cycle in the LIQUIDATION SAMPLE chart; null = follow latest
        _liqAvgSTurnover: 0, // avg sell-liq $ across all recorded cycles — see _liqUpdateAvgTurnover
        _liqAvgBTurnover: 0, // avg buy-liq $ across all recorded cycles

        async init() {
          await _origInit.call(this);
          // Sync to the actual restored halt/gains-lock state instead of leaving these at their
          // false initial value. Without this, reloading the tab mid-halt made the very next
          // tick see a false→true "transition" that never really happened, rewriting the
          // cross-event start timestamp to "now" — which silently made an already-old halt look
          // freshly started, breaking the Mutual DDH Lift age comparison below (it picks the
          // *older* halt to lift, so an inflated timestamp can flip which side loses the halt).
          _pfWasHalted      = this._isDrawdownHalted?.() ?? false;

          // Fall back to the old key so an existing user's toggle choice survives the rename.
          if (this.cfg.permafrostFioEnabled        === undefined) this.cfg.permafrostFioEnabled        = this.cfg.permafrostIoEnabled ?? true;
          if (this.cfg.permafrostWaveShowMain      === undefined) this.cfg.permafrostWaveShowMain      = true;
          if (this.cfg.permafrostWaveShowFio        === undefined) this.cfg.permafrostWaveShowFio        = this.cfg.permafrostWaveShowIo ?? true;
          if (!Array.isArray(this.cfg.megacapExclude)) this.cfg.megacapExclude = [...DEFAULT_MEGACAP_EXCLUDE];
          if (this.cfg.pfShowScore                 === undefined) this.cfg.pfShowScore                 = true;
          if (this.cfg.pfShowStructure            === undefined) this.cfg.pfShowStructure            = false;
          if (this.cfg.pfShowLiq                  === undefined) this.cfg.pfShowLiq                  = true;
          if (this.cfg.pfShowFunding              === undefined) this.cfg.pfShowFunding              = false;
          if (this.cfg.pfShowVol                  === undefined) this.cfg.pfShowVol                  = true;
          if (this.cfg.permafrostCrossEnabled        === undefined) this.cfg.permafrostCrossEnabled        = true;
          if (this.cfg.permafrostMutualDdLiftEnabled          === undefined) this.cfg.permafrostMutualDdLiftEnabled          = true;
          if (this.cfg.permafrostScorecardEnabled        === undefined) this.cfg.permafrostScorecardEnabled        = true;
          if (this.cfg.pfCoQualPenaltyEnabled           === undefined) this.cfg.pfCoQualPenaltyEnabled           = true;
          if (this.cfg.pfCoQualDepthPct                 === undefined) this.cfg.pfCoQualDepthPct                 = 10;
          if (this.cfg.pfScorecardView                   === undefined) this.cfg.pfScorecardView                   = 'combined';
          // pfScorecardSource ('hist'/'traded'/'both') retired — no longer read anywhere;

          if (this.cfg.pfRegimeMinSample                 === undefined) this.cfg.pfRegimeMinSample                 = 5;
          if (this.cfg.pfSpongeQuota                     === undefined) this.cfg.pfSpongeQuota                     = 30;
          if (this.cfg.pfStaleSlotDays                   === undefined) this.cfg.pfStaleSlotDays                   = 7;
          if (this.cfg.pfPartnerScoreMode                === undefined) this.cfg.pfPartnerScoreMode                = 'wins';
          if (this.cfg.pfLiqEnabled      === undefined) this.cfg.pfLiqEnabled      = true;
          if (this.cfg.pfLiqBatchSize    === undefined) this.cfg.pfLiqBatchSize    = 25;
          if (this.cfg.pfLiqThresholdPct === undefined) this.cfg.pfLiqThresholdPct = 50;
          if (this.cfg.pfLiqSequesterEnabled === undefined) this.cfg.pfLiqSequesterEnabled = true;
          if (this.cfg.pfLiqSequesterCap     === undefined) this.cfg.pfLiqSequesterCap     = 12;
          if (this.cfg.pfLiqPrescreenEnabled === undefined) this.cfg.pfLiqPrescreenEnabled = false;
          if (this.cfg.pfPecPrescreenEnabled === undefined) this.cfg.pfPecPrescreenEnabled = false;
          if (this.cfg.pfPecBatchSize        === undefined) this.cfg.pfPecBatchSize        = 25;
          if (this.cfg.pfPecBatchDelayMs     === undefined) this.cfg.pfPecBatchDelayMs     = 2000;
          if (this.cfg.pfOcEnabled            === undefined) this.cfg.pfOcEnabled            = true;
          if (this.cfg.pfOcOrderLimit         === undefined) this.cfg.pfOcOrderLimit         = 100;
          try {
            const saved = JSON.parse(localStorage.getItem(PFR_LIQ_KEY) || 'null');
            if (Array.isArray(saved) && this.cfg.pfLiqEnabled) {
              const valid = saved.filter(s => s.endsAt > Date.now());
              if (valid.length) {
                this._liqCycleCounter = Math.max(this._liqCycleCounter, ...valid.map(s => s.id));
                for (const s of valid) this._liqResumeBatch(s);
              }
            }
          } catch(_) {}
          try {
            const hist = JSON.parse(localStorage.getItem(PFR_LIQ_HISTORY_KEY) || 'null');
            if (Array.isArray(hist) && hist.length) {
              this._liqCycleHistory = hist.slice(-25);
              const last = hist[hist.length - 1];
              this._liqLatestResults = last.results || [];
              for (const r of last.results || [])
                this._liqResults[r.sym] = { sLiqPct: r.sLiqPct, bLiqPct: r.bLiqPct, sLiqRaw: r.sLiqRaw, bLiqRaw: r.bLiqRaw, cycleId: last.id, ts: last.ts };
              this._liqCycleCounter = Math.max(this._liqCycleCounter, last.id || 0);
            }
          } catch(_) {}
          try {
            const seq = JSON.parse(localStorage.getItem(PFR_LIQ_SEQUESTER_KEY) || 'null');
            if (seq && typeof seq === 'object') this._liqSequester = seq;
          } catch(_) {}
          this._liqUpdateAvgTurnover();
          try {
            const _sharedLiq = this._sharedRead?.('liqResults');
            if (_sharedLiq && Object.keys(_sharedLiq).length) this._liqResults = { ...this._liqResults, ..._sharedLiq };
          } catch(_) {}
          try {
            const _ocHist = JSON.parse(localStorage.getItem(PFR_OC_HIST_KEY) || 'null');
            if (Array.isArray(_ocHist) && _ocHist.length) {

              if (_purged > 0) {
                this.log(`[PFR] 🧹 Purged ${_purged} legacy OC record(s) from stored history (pre-redesign raw-count schema).`, 'info');
                this._ocPersistHistory();
              }
              // Latest cycle by timestamp, not array position — a slower concurrent fetch
              // finishing after a newer one has already pushed would otherwise leave a stale
              // batch sitting last in the array.

              if (_last?.results) for (const r of _last.results) { if (r && typeof r.sym === 'string') this.pfOcResults[r.sym] = { bc: r.bc, sc: r.sc, avgMs: r.avgMs, n: r.n }; }
              this._pfOcCycleCounter = Math.max(this._pfOcCycleCounter, _last?.id || 0);
            }

          this._pfScoreBuild();
          try {
            const raw = localStorage.getItem(PFR_KEY);

              const s = JSON.parse(raw);
              if (Array.isArray(s.events)) this.pfEvents  = s.events.slice(-EVENTS_CAP);
              if (Array.isArray(s.closes)) this.pfCloses  = s.closes.slice(-CLOSES_CAP);
              if (Array.isArray(s.wave))      this.pfWave      = s.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              if (s.pfKlineBar?.bearSum != null) this.pfKlineBar = s.pfKlineBar;
            }
          } catch(e) {}
          this.log(`[PFR] Permafrost (Winter) v${VERSION} loaded — ${this.cfg.permafrostEnabled ? 'enabled' : 'disabled'} | ${this.pfCloses.length} closes on record`, 'info');

            if (this.cfg.permafrostCrossEnabled) this._pfCheckCross().catch(() => {});
            // Regime scorecard auto-follow — only updates pfRegimeDisplayType (what the segment
            // view shows when nothing is manually pinned) on an actual Liq-skew threshold cross,
            // not on every render; _pfScorecardHtml reads the cached value rather than recomputing
            // it live, so browsing doesn't jitter if skew is hovering right at a band edge.
            if (this.cfg.pfRegimeScoringEnabled) {
              const _curRegimeType = this._pfRegimeCurrentType();
              if (_curRegimeType !== _pfWasRegimeType) {
                _pfWasRegimeType = _curRegimeType;
                this.pfRegimeDisplayType = _curRegimeType;
              }
            }
            // _pfScoreBuild() is NOT called here on a timer — its source data (scorecard
            // records) only changes on a trade close, a config change affecting the
            // computation, or an import, and it's called from each of those directly. A
            // periodic rebuild here would just recompute the identical result between those
            // events for no reason, on every tick's worth of ticks (up to a few thousand
            // records, twice-sorted) whether or not the Score panel is even open.
            if (this.cfg.permafrostCrossEnabled) {
              const _halted  = this._isDrawdownHalted?.() ?? false;
              const _glocked = this._isGainsLocked?.()    ?? false;
              if (_halted !== _pfWasHalted) {
                _pfWasHalted = _halted;
                this._pfCrossWrite(_halted ? 'ddh-start' : 'ddh-end');
              }
              if (_glocked !== _pfWasGainsLocked) {
                _pfWasGainsLocked = _glocked;
                this._pfCrossWrite(_glocked ? 'glk-start' : 'glk-end');
              }
              if (this.cfg.permafrostMutualDdLiftEnabled && _halted) {
                const _allEvents   = this._pfCrossRead();
                const _fromPartner = _allEvents.filter(e => e.source === 'chaser');
                const _fromSelf    = _allEvents.filter(e => e.source === 'winter');
                const _partnerDdh  = _fromPartner.filter(e => e.kind === 'ddh-start' || e.kind === 'ddh-end').at(-1);
                const _selfDdh     = _fromSelf.filter(e => e.kind === 'ddh-start').at(-1);
                if (_partnerDdh?.kind === 'ddh-start' && _selfDdh) {
                  if (_selfDdh.ts < _partnerDdh.ts) {
                    this._drawdownHaltUntil = null;
                    this._haltLoggedKind = null;
                    this.persist();
                    this.log('[PFR] ❄ Mutual DDH lift — own halt is older; cleared.', 'info');
                  }
                }
              }
            }
            if (this.cfg.permafrostEnabled && (this._isDrawdownHalted?.() ?? false)) {
              const _cdMs = (this.cfg.bulkTickerCooldownHours ?? 3) * 3600 * 1000;
              if ((Date.now() - (this._pfStructureAt || 0)) >= _cdMs) {
                this._pfFetchStructure().then(r => {
                  if (!r) return;
                  this._pfAddSample(r);
                  if (!r._fresh) return;
                  const { score, mass, count } = this.pfStatus;
                  const _d = this._pfDescribe(r, score, mass, count);
                  this.log(`[PFR] ❄ Structure check (halted) — ${_d.desc} — ${_d.bias}`, 'info');
                }).catch(() => {});
              }
            }
            // Partner sample: keep wave chart and sampling bars alive using Ashfall's latest data
            if (this.cfg.permafrostEnabled) {
              const _ps = this._pfReadPartnerSample();
              this._pfMergeKlineBar();
              if (_ps) {
                // During own halt: adopt partner's sampling metrics so bars stay current
                if (this._isDrawdownHalted?.() || this._isGainsLocked?.()) {
                  if (_ps.fundSkew) this._miwFundSkew = _ps.fundSkew;
                  if (_ps.volSkew)  this._miwVolSkew  = _ps.volSkew;
                }
                // Merge partner liq history — add entries not already in own history (by ts), sort, cap
                if (Array.isArray(_ps.liqHistory) && _ps.liqHistory.length) {
                  const _ownTs = new Set((this._liqCycleHistory || []).map(e => e.ts));
                  const _added = _ps.liqHistory.filter(e => e.ts && !_ownTs.has(e.ts));
                  if (_added.length) {
                    this._liqCycleHistory = [...(this._liqCycleHistory || []), ..._added]
                      .sort((a, b) => a.ts - b.ts).slice(-25);
                    this._liqPersistHistory();
                  }
                }
                const _lwTs = this.pfWave.length ? this.pfWave[this.pfWave.length - 1].ts : 0;
                if (_ps.ts > _lwTs + 60_000) {
                  this.pfWave.push({ ts: _ps.ts, lean: +(_ps.lean ?? 0).toFixed(4), vol: +(_ps.vol ?? 0).toFixed(4), volAbs: _ps.volAbs ?? 0, fio: _ps.fioScore != null ? +_ps.fioScore.toFixed(4) : null, score: null });
                  const _cut = Date.now() - WAVE_TTL_MS;
                  if (this.pfWave.length && this.pfWave[0].ts < _cut) this.pfWave = this.pfWave.filter(p => p.ts >= _cut);
                  if (this.pfWave.length > WAVE_CAP) this.pfWave = this.pfWave.slice(-WAVE_CAP);
                }
              }
            }
          }, 15000);
        },

        persist() {
          _origPers.call(this);
          try {
            // Each array is its own atomized data type — capped independently so an
            // oversized one (e.g. volume history) can't crowd out another (e.g. wave).
            this.pfEvents     = trimToByteCap(this.pfEvents);
            this.pfCloses     = trimToByteCap(this.pfCloses);
            this.pfWave       = trimToByteCap(this.pfWave);
            localStorage.setItem(PFR_KEY, JSON.stringify({
              events: this.pfEvents, closes: this.pfCloses, wave: this.pfWave,
              pfKlineBar: this.pfKlineBar,
            }));
          } catch(e) {}
        },

        // ── Market structure reading — full ticker universe, not the curated pools ──
        async _pfFetchStructure() {
          try {
            // Reuse the host scan's bulk ticker response when fresh (slow-tick
            // sampling during halts falls back to fetching — scans don't run then)
            const cooldownMs = (this.cfg.bulkTickerCooldownHours ?? 3) * 3600 * 1000;
            let list, _freshData = false;
            if (this._pfStructureList?.length && (Date.now() - (this._pfStructureAt || 0)) < cooldownMs) {
              list = this._pfStructureList; // own cache within cooldown
            } else if (this._lastAllTickers?.length && (Date.now() - (this._lastAllTickersAt || 0)) < 60000) {
              list = this._lastAllTickers;  // host just fetched this tick — piggyback
              this._pfStructureList = list;
              this._pfStructureAt   = this._lastAllTickersAt;
              _freshData = true;
            } else {
              const _shared = this._sharedRead?.('bulkTickers');
              if (_shared?.data?.tickers?.length && (Date.now() - (_shared.ts || 0)) < cooldownMs) {
                list = _shared.data.tickers; // partner fetched recently — adopt
                this._pfStructureList = list;
                this._pfStructureAt   = _shared.ts;
                _freshData = true;
              } else {
                const r = await fetch(`${this.base}/v5/market/tickers?category=linear`);
                const d = await r.json();
                if (d.retCode !== 0) return null;
                list = d.result?.list || [];
                this._pfStructureList = list;
                this._pfStructureAt   = Date.now();
                _freshData = true;
              }
            }
            let gSum = 0, lSum = 0, gCount = 0, lCount = 0;
            let gTurnover = 0, lTurnover = 0;
            let frSum = 0, frCount = 0;
            for (const t of list) {
              if (!t.symbol.endsWith('USDT') || (this.cfg.megacapExclude || DEFAULT_MEGACAP_EXCLUDE).includes(t.symbol)) continue;
              if (parseFloat(t.lastPrice || 0) < 0.001) continue;
              const ch  = parseFloat(t.price24hPcnt || 0) * 100;
              const tvr = parseFloat(t.turnover24h  || 0);
              if (ch > 0)      { gSum += ch; gCount++; gTurnover += tvr; }
              else if (ch < 0) { lSum += Math.abs(ch); lCount++; lTurnover += tvr; }
              const fr = parseFloat(t.fundingRate || 0);
              if (!isNaN(fr)) { frSum += fr * 100; frCount++; } // accumulate as %
            }
            const sumT   = gSum + lSum, cntT = gCount + lCount;
            const totalTvr = gTurnover + lTurnover;
            const vol    = totalTvr > 0 ? +((gTurnover - lTurnover) / totalTvr).toFixed(4) : 0;
            const volAbs = +(totalTvr / 1e9).toFixed(2); // USD billions

            // Collective FIO from aggregate funding rate: positive funding = longs paying = crowd net long.
            // Normalised against 0.05% reference (≈5× the typical 0.01%/8h baseline) → [-1, 1].
            const fioScore = frCount > 0
              ? +Math.max(-1, Math.min(1, (frSum / frCount) / 0.05)).toFixed(4)
              : null;

            return {
              ts: Date.now(),
              skew:    sumT > 0 ? (gSum - lSum) / sumT : 0,
              breadth: cntT > 0 ? (gCount - lCount) / cntT : 0,
              gCount, lCount,
              gSum: +gSum.toFixed(1), lSum: +lSum.toFixed(1),
              vol, volAbs, fioScore, _fresh: _freshData,
            };
          } catch(e) { return null; }
        },

        // ── Human-readable structure + historical-bias phrasing for the activity log ──
        // Intensity ranges over mildly / moderately / strongly bullish (or bearish). The
        // tiers are entirely relative to this installation's own history: thresholds are
        _pfDescribe(reading, score, mass, count) {
          const lean = (reading.skew + reading.breadth) / 2;
          const hist = this.pfCloses.map(x => Math.abs((x.skew + x.breadth) / 2)).sort((a, b) => a - b);
          const q = p => hist[Math.min(hist.length - 1, Math.floor(p * hist.length))];
          const [tFlat, tModerate, tStrong] = hist.length >= 30 ? [q(0.25), q(0.5), q(0.8)] : [0.08, 0.20, 0.40];
          const mag    = Math.abs(lean);
          const adverb = mag >= tStrong ? 'strongly ' : mag >= tModerate ? 'moderately ' : 'mildly ';
          const struct = mag <= tFlat ? 'flat/mixed' : `${adverb}${lean > 0 ? 'bullish' : 'bearish'}`;
          const slope  = this._pfTrajectory().slope;
          const trend  = slope > 0.05 ? ', rising' : slope < -0.05 ? ', falling' : '';
          const desc   = `${struct}${trend}`;
          const inherent = this._pfInherent(lean, slope, reading.fioScore ?? null);
          const eff    = this._pfEffectiveScore(score, mass, inherent);
          let bias;
          if (score === null || mass < MIN_MASS) {
            bias = 'thin history';
          } else {
            const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
            const avgPnl = score * entryMargin;
            const sign = avgPnl >= 0 ? '+' : '-';
            bias = `avg ${sign}${Math.abs(avgPnl).toFixed(2)}/position (${count} similar close${count === 1 ? '' : 's'})`;
          }
          return { desc, bias, eff };
        },

        // ── Hostility score: kernel-weighted, recency-decayed, normalized by entry margin.
        // score ∈ [−1,1]; mass = evidence weight; count = closes within kernel radius.
        _pfScore(reading) {
          const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const now = Date.now();
          let num = 0, mass = 0, count = 0;
          for (const c of this.pfCloses) {
            const ds = reading.skew - c.skew, db = reading.breadth - c.breadth;
            const k  = Math.exp(-(ds * ds + db * db) / (2 * KERNEL_H * KERNEL_H));
            const dec = Math.pow(0.5, (now - c.ts) / HALF_LIFE_MS);
            const norm = Math.max(-1, Math.min(1, c.pnl / entryMargin));
            num  += norm * k * dec;
            mass += k * dec;
            if (k > 0.1) count++;
          }
          return { score: mass > 0 ? num / mass : null, mass, count };
        },

        // ── The wave: recent path of the structure lean (oldest → newest) ──
        // lean = (skew + breadth) / 2 ∈ [−1,1]: +1 strongly bullish, −1 strongly bearish.
        _pfWaveSeries() {
          const cut = Date.now() - WAVE_TTL_MS;
          return this.pfWave.filter(p => p.ts >= cut);
        },

        _pfScoreNet() {
          const cs = this.miwCollapsedCritStats || {};
          const vals = Object.values(cs);
          const net = vals.reduce((a,c)=>a+c.pnl,0);
          const abs = vals.reduce((a,c)=>a+Math.abs(c.pnl),0);
          return { net: -net, abs };
        },

        // Append a structure-lean point to the wave and prune by age / cap. Kept
        // separate from pfCloses (which track realized PnL) so the wave
        // retains the full trajectory for as long as we have data, up to ~a week.
        _pfPushWave(reading) {
          const { net: _scNet, abs: _scAbs } = this._pfScoreNet();
          const _score  = _scAbs > 0 ? +((_scNet / _scAbs).toFixed(4)) : null;
          this.pfWave.push({ ts: reading.ts, lean: +(((reading.skew + reading.breadth) / 2)).toFixed(4), vol: reading.vol ?? 0, volAbs: reading.volAbs ?? 0, fio: reading.fioScore ?? null, score: _score });
          const cut = Date.now() - WAVE_TTL_MS;
          if (this.pfWave.length && this.pfWave[0].ts < cut) this.pfWave = this.pfWave.filter(p => p.ts >= cut);
          if (this.pfWave.length > WAVE_CAP) this.pfWave = this.pfWave.slice(-WAVE_CAP);
        },

        // Current lean plus its trajectory (slope = avg lean over last N hours − avg lean N–2N hours ago).
        // Using a fixed time window (cfg.permafrostSlopeWindowHours, default 6h) so "turning bullish/bearish"
        // always reflects the same timeframe regardless of how much wave history has accumulated.
        // slope > 0 → drifting bullish; slope < 0 → drifting bearish.
        _pfTrajectory() {
          const wave = this._pfWaveSeries();
          const n    = wave.length;
          const lean = n ? wave[n - 1].lean : (((this.pfStatus.skew ?? 0) + (this.pfStatus.breadth ?? 0)) / 2);
          if (n < WAVE_MIN_PTS) return { lean, slope: 0, n };
          const winMs     = (this.cfg.permafrostSlopeWindowHours ?? 6) * 3600 * 1000;
          const now       = Date.now();
          const recentPts = wave.filter(p => p.ts >= now - winMs);
          const olderPts  = wave.filter(p => p.ts >= now - 2 * winMs && p.ts < now - winMs);
          if (!recentPts.length || !olderPts.length) return { lean, slope: 0, n };
          const recent = recentPts.reduce((a, p) => a + p.lean, 0) / recentPts.length;
          const older  = olderPts.reduce((a, p) => a + p.lean, 0) / olderPts.length;
          return { lean, slope: recent - older, n };
        },

        // Inherent favourability for this bot's direction (DIR), from the wave alone:
        // a short bot likes bearish *and* falling structure; longing likes bullish/rising.
        // The slope term is what stops us shorting into the start of a pump (mildly
        // bearish but turning up) or longing into the start of a dump.
        _pfInherent(lean, slope, fioScore) {
          const slopeN = Math.max(-1, Math.min(1, (slope || 0) / SLOPE_REF));
          // FIO is direct: crowd-long pressure is bullish, crowd-short pressure is bearish.
          // W_FIO is additive alongside lean/slope — the outer clamp keeps the result in [-1, 1].
          const fioN = fioScore != null ? Math.max(-1, Math.min(1, fioScore)) : 0;
          return Math.max(-1, Math.min(1, DIR * (W_LEAN * (lean || 0) + W_SLOPE * slopeN + W_FIO * fioN)));
        },

        // Effective score: learned history is primary, the inherent wave is the
        // fallback — blended by how much evidence the profile actually has.
        _pfEffectiveScore(score, mass, inherent) {
          const massFrac = Math.max(0, Math.min(1, (mass || 0) / STRONG_MASS));
          return score === null ? inherent : massFrac * score + (1 - massFrac) * inherent;
        },

        async _pfUpdateKlineBar() {
          const lastHourStart = Math.floor(Date.now() / 3_600_000) * 3_600_000 - 3_600_000;
          // Piggyback on MIW's cache when it's populated for the right hour
          const cache = this._miwKlineCache;
          if (cache && Object.keys(cache).length > 0) {
            let bearSum = 0, bullSum = 0;
            for (const e of Object.values(cache)) {
              if (e.candleStart !== lastHourStart || !e.open) continue;
              const pct = (e.close - e.open) / e.open * 100;
              if (pct < 0) bearSum += -pct;
              else if (pct > 0) bullSum += pct;
            }
            if (bearSum > 0 || bullSum > 0) {
              this.pfKlineBar = { bearSum, bullSum, max: this.cfg.miwKlineScanCap ?? 20 };
              this._pfOwnKlineBar = { ...this.pfKlineBar };
              this._pfMergeKlineBar();
              return;
            }
          }
          // MIW didn't fetch klines this cycle — own sample, cached per completed hourly candle
          if (this._pfKlineBarAt === lastHourStart && (this.pfKlineBar.bearSum > 0 || this.pfKlineBar.bullSum > 0)) {
            this._pfMergeKlineBar(); return;
          }
          try {
            const allTickers = this._lastAllTickers || [];
            const cap = this.cfg.miwKlineScanCap ?? 20;
            let syms = allTickers
              .filter(t => t.symbol.endsWith('USDT') && !(this.cfg.megacapExclude || DEFAULT_MEGACAP_EXCLUDE).includes(t.symbol) && parseFloat(t.lastPrice || 0) >= 0.001)
              .map(t => t.symbol);
            if (!syms.length) return;
            for (let i = syms.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [syms[i], syms[j]] = [syms[j], syms[i]];
            }
            syms = syms.slice(0, cap);
            let bearSum = 0, bullSum = 0;
            await Promise.all(syms.map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                const d = await r.json();
                if (d.retCode !== 0) return;
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                if (parseInt(candle[0]) !== lastHourStart) return;
                const open = parseFloat(candle[1]), close = parseFloat(candle[4]);
                if (!open) return;
                const pct = (close - open) / open * 100;
                if (pct < 0) bearSum += -pct;
                else if (pct > 0) bullSum += pct;
              } catch(e) {}
            }));
            this._pfKlineBarAt = lastHourStart;
            this.pfKlineBar = { bearSum, bullSum, max: cap };
            this._pfOwnKlineBar = { ...this.pfKlineBar };
            this._pfMergeKlineBar();
          } catch(e) {}
        },

        _pfWriteSample(reading) {
          try {
            const raw = localStorage.getItem(SAMPLE_STATE_KEY);
            const state = raw ? JSON.parse(raw) : {};
            // liqHistory duplicates data already fully persisted under its own key
            // (PFR_LIQ_HISTORY_KEY) — it's shared here only so a halted partner can
            // backfill cycles it missed. Cap it as its own atomized type rather than
            // embedding the full (already independently-capped) history verbatim.
            state.winter = {
              ts: reading.ts,
              klineBar: this._pfOwnKlineBar ?? this.pfKlineBar,
              fundSkew: this._miwFundSkew ?? null,
              volSkew: this._miwVolSkew ?? null,
              vol: reading.vol ?? 0,
              volAbs: reading.volAbs ?? 0,
              fioScore: reading.fioScore ?? null,
              lean: +((reading.skew + reading.breadth) / 2).toFixed(4),
              liqHistory: trimToByteCap(this._liqCycleHistory ?? []),
            };
            localStorage.setItem(SAMPLE_STATE_KEY, JSON.stringify(state));
          } catch(e) {}
        },

        _pfReadPartnerSample() {
          try {
            const raw = localStorage.getItem(SAMPLE_STATE_KEY);
            if (!raw) return null;
            const s = JSON.parse(raw)?.chaser ?? null;
            return (s && s.ts >= Date.now() - 7_200_000) ? s : null;
          } catch(e) { return null; }
        },

        _pfMergeKlineBar() {
          const own = this._pfOwnKlineBar ?? this.pfKlineBar;
          const partner = this._pfReadPartnerSample();
          const pb = partner?.klineBar;
          if (!pb || (!pb.bearSum && !pb.bullSum)) return;
          this.pfKlineBar = {
            bearSum: own.bearSum + pb.bearSum,
            bullSum: own.bullSum + pb.bullSum,
            max: (own.max || 50) + (pb.max || 50),
          };
        },

        _pfScoreRead() {
          try {
            const raw = localStorage.getItem(SCORE_KEY);
            if (!raw) return [];
            const cut = Date.now() - SCORE_SAFETY_TTL;
            return (JSON.parse(raw) || []).filter(r => r.ts >= cut && Array.isArray(r.criteria) && r.criteria.length);
          } catch(e) { return []; }
        },
        _pfScoreTrim() {
          try {
            const records   = this._pfScoreRead();
            const quota     = this.cfg.pfSpongeQuota   ?? 30;
            const staleDays = this.cfg.pfStaleSlotDays ?? 7;
            const staleMs   = staleDays * 24 * 3600 * 1000;
            const now       = Date.now();
            // +fund/-fund are NOT legacy — Blind-Entry and Liquid-Diver actively write them as
            // their primary criteria tags. Only the genuinely dead pre-tiered criteria purge here.
            const LEGACY    = new Set(['>10pct','<10pct','lsa','lba','rasl','rabl']);
            const isLegacy  = r => r.criteria.some(c => LEGACY.has(c));
            // Regime scoring splits every combo 6 ways, so exact-combo freshness (below) would
            // purge far more aggressively — while it's on, freshness is shared per individual
            // criterion instead: any record touching a criterion refreshes every combo that
            // criterion appears in, not just its own exact combo. Off: unchanged, per-combo as before.
            const regimeMode = !!this.cfg.pfRegimeScoringEnabled;
            let critLastSeen = null;
            if (regimeMode) {
              critLastSeen = {};
              for (const r of records) {
                if (isLegacy(r)) continue;
                for (const c of r.criteria) {
                  const ck = collapseCrit(c);
                  if (!critLastSeen[ck] || r.ts > critLastSeen[ck]) critLastSeen[ck] = r.ts;
                }
              }
            }
            const bySlot = {};
            for (const r of records) {
              if (isLegacy(r)) continue;
              const k = collapseKey(r.criteria);
              if (!bySlot[k]) bySlot[k] = [];
              bySlot[k].push(r);
            }
            const trimmed = [];
            for (const recs of Object.values(bySlot)) {
              recs.sort((a, b) => b.ts - a.ts);
              const kept = recs.slice(0, quota);
              if (!kept.length) continue;
              const freshTs = regimeMode
                ? Math.max(...[...new Set(kept[0].criteria.map(collapseCrit))].map(ck => critLastSeen[ck] ?? 0))
                : kept[0].ts;
              if (now - freshTs < staleMs) trimmed.push(...kept);
            }
            const GLOBAL_CAP = 5000;
            const capped = trimmed.sort((a, b) => b.ts - a.ts).slice(0, GLOBAL_CAP);
            // Per-slot quota + GLOBAL_CAP bound the record *count*, but with enough
            // distinct auto-generated slot buckets the total byte size can still run
            // large — apply the same atomized byte cap as a final safety net, oldest first.
            const byteCapped = trimToByteCap([...capped].reverse()).reverse();
            localStorage.setItem(SCORE_KEY, JSON.stringify(byteCapped));
          } catch(e) {}
        },
        _pfScoreWrite(criteria, pnl, hist = false) {
          try {
            const records = this._pfScoreRead();
            const rec = { ts: Date.now(), criteria, pnl, source: 'winter' };
            if (hist) rec.hist = true;
            records.push(rec);
            const quota = this.cfg.pfSpongeQuota ?? 30;
            const bySlot = {};
            for (const r of records) {
              const k = collapseKey(r.criteria);
              if (!bySlot[k]) bySlot[k] = [];
              bySlot[k].push(r);
            }
            const trimmed = [];
            for (const recs of Object.values(bySlot)) {
              recs.sort((a, b) => b.ts - a.ts);
              trimmed.push(...recs.slice(0, quota));
            }
            const byteCapped = trimToByteCap([...trimmed].reverse()).reverse();
            localStorage.setItem(SCORE_KEY, JSON.stringify(byteCapped));
            return byteCapped;
          } catch(e) { return null; }
        },
        // `records`, when passed, skips the internal _pfScoreRead() — callers on the
        // trade-close hot path already have the just-written result from _pfScoreWrite()
        // in hand, so re-reading and re-parsing the same data straight back out of
        // localStorage would be pure duplicate work.
        // Gates whether a partner-sourced record's PnL is allowed to move a criterion's score,
        // per cfg.pfPartnerScoreMode. pnl here is the partner's own realized pnl (positive =
        // partner won that trade) — not the inverted effectivePnl used downstream. Own-sourced
        // records are never gated; this only concerns the seesaw between own and partner.
        _pfPartnerCounts(pnl) {
          const mode = this.cfg.pfPartnerScoreMode || 'wins';
          if (mode === 'both') return true;
          if (mode === 'losses') return pnl < 0;
          return pnl > 0; // 'wins' (default)
        },
        _pfScoreBuild(records) {
          records = records || this._pfScoreRead();
          const exclude = new Set(this.cfg.miwAutoSlotExclude || []);
          const quota = this.cfg.pfSpongeQuota ?? 30;
          const critBase = c => /^sliq/.test(c) ? 'sliq' : /^bliq/.test(c) ? 'bliq' : c;
          // Sorted once and reused by both passes below — they use the identical sort
          // criteria (newest-first), so sorting twice was pure duplicate work.
          const sortedRecords = [...records].sort((a, b) => b.ts - a.ts);
          const slotCount = {};
          const map = {};
          for (const r of sortedRecords) {
            if (exclude.size && r.criteria.some(c => exclude.has(critBase(c)))) continue;
            const key = [...r.criteria].sort().join(',');
            if ((slotCount[key] = (slotCount[key] ?? 0) + 1) > quota) continue;
            if (!map[key]) map[key] = { criteria: r.criteria, ownPnl: 0, ownWins: 0, ownLosses: 0, ownLossSum: 0, partnerPnl: 0, partnerWins: 0, partnerLosses: 0, partnerWinSum: 0, hasHist: false, hasTrade: false };
            if (r.hist) map[key].hasHist = true; else map[key].hasTrade = true;
            const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
            if (r.source === 'winter') {
              map[key].ownPnl += pnl;
              if (pnl > 0) map[key].ownWins++; else { map[key].ownLosses++; map[key].ownLossSum += -pnl; }
            } else if (this._pfPartnerCounts(pnl)) {
              const inv = -pnl;
              map[key].partnerPnl += inv;
              if (inv > 0) map[key].partnerWins++; else { map[key].partnerLosses++; map[key].partnerWinSum += pnl; }
            }
          }
          for (const s of Object.values(map)) s.totalPnl = s.ownPnl + s.partnerPnl;
          this.pfScoreboard = Object.values(map).sort((a, b) => b.totalPnl - a.totalPnl);
          const collapse = collapseCrit;
          const critCount = {}, collapsedRanks = {}, critStats = {};
          for (const r of sortedRecords) {
            if (exclude.size && r.criteria.some(c => exclude.has(critBase(c)))) continue;
            const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
            const isPartner = r.source !== 'winter';
            const counts = !isPartner || this._pfPartnerCounts(pnl);
            const effectivePnl = isPartner ? -pnl : pnl;
            for (const c of r.criteria) {
              const key = collapse(c);
              if ((critCount[key] = (critCount[key] ?? 0) + 1) > quota) continue;
              if (!critStats[key]) critStats[key] = { pnl: 0, wins: 0, losses: 0, ownPnl: 0, ownWins: 0, ownLosses: 0, hasHist: false, hasTrade: false };
              const cs = critStats[key];
              if (counts) {
                collapsedRanks[key] = (collapsedRanks[key] ?? 0) + effectivePnl;
                cs.pnl += effectivePnl;
                if (effectivePnl > 0) cs.wins++; else cs.losses++;
              }
              if (!isPartner) { cs.ownPnl += pnl; if (pnl > 0) cs.ownWins++; else cs.ownLosses++; }
              if (r.hist) cs.hasHist = true; else cs.hasTrade = true;
            }
          }
          this.miwCollapsedSlotRanks = collapsedRanks;
          this.miwCollapsedCritStats = critStats;
          // Regime-based scoring — splits the same non-regime criteria into 6 buckets by which
          // regime type (regimeslo/blo/smid/bmid/shi/bhi) was tagged on each record. A record
          // carries at most one regime tag (the six bands are mutually exclusive at any instant),
          // so no record double-buckets. Records with no regime tag carry no regime information
          // and are simply skipped here — see Regime.md. The regime criterion itself is excluded
          // from its own bucket's chip list since it's tautologically true for every member.
          const REGIME_TYPES = ['regimeslo','regimeblo','regimesmid','regimebmid','regimeshi','regimebhi'];
          const regimeStats = {};
          for (const t of REGIME_TYPES) regimeStats[t] = {};
          if (this.cfg.pfRegimeScoringEnabled) {
            const regimeOfRec = r => { for (const c of r.criteria) { const t = REGIME_TYPES.find(rt => c.startsWith(rt)); if (t) return t; } return null; };
            const regimeCount = {};
            for (const r of sortedRecords) {
              if (exclude.size && r.criteria.some(c => exclude.has(critBase(c)))) continue;
              const rt = regimeOfRec(r);
              if (!rt) continue;
              const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
              const isPartner = r.source !== 'winter';
              const counts = !isPartner || this._pfPartnerCounts(pnl);
              const effectivePnl = isPartner ? -pnl : pnl;
              const bucket = regimeStats[rt];
              for (const c of r.criteria) {
                const key = collapse(c);
                if (REGIME_TYPES.some(t => key.startsWith(t))) continue;
                const ck = rt + '|' + key;
                if ((regimeCount[ck] = (regimeCount[ck] ?? 0) + 1) > quota) continue;
                if (!bucket[key]) bucket[key] = { pnl: 0, wins: 0, losses: 0, ownPnl: 0, ownWins: 0, ownLosses: 0, hasHist: false, hasTrade: false };
                const cs = bucket[key];
                if (counts) {
                  cs.pnl += effectivePnl;
                  if (effectivePnl > 0) cs.wins++; else cs.losses++;
                }
                if (!isPartner) { cs.ownPnl += pnl; if (pnl > 0) cs.ownWins++; else cs.ownLosses++; }
                if (r.hist) cs.hasHist = true; else cs.hasTrade = true;
              }
            }
          }
          this.pfRegimeCritStats = regimeStats;
          this.pfRegimeActiveTypes = this._pfRegimeActiveTypes();
          // pfRegimeLiveRanks — a plain key->pnl map for the *currently prevailing* regime, with
          // per-key fallback to the flat aggregate below cfg.pfRegimeMinSample samples. This is
          // what MIW's own _miwCritScore/_miwScaledRank read (see MultiIndicator-Winter.html) so
          // slot blocking and ticker ordering follow the live regime — miwCollapsedCritStats/
          // miwCollapsedSlotRanks themselves stay the flat aggregate, unambiguously, so the two
          // concepts (flat vs regime-live) never get silently conflated under one property name.
          this.pfRegimeLiveRanks = null;
          if (this.cfg.pfRegimeScoringEnabled && this.pfRegimeActiveTypes.length) {
            const curType = this._pfRegimeCurrentType();
            if (curType && this.pfRegimeActiveTypes.includes(curType)) {
              const minSample = this.cfg.pfRegimeMinSample ?? 5;
              const curBucket = regimeStats[curType] || {};
              const mergedRanks = {};
              const allKeys = new Set([...Object.keys(critStats), ...Object.keys(curBucket)]);
              for (const key of allKeys) {
                const rb = curBucket[key];
                const useRegime = rb && (rb.wins + rb.losses) >= minSample;
                mergedRanks[key] = useRegime ? rb.pnl : (collapsedRanks[key] || 0);
              }
              this.pfRegimeLiveRanks = mergedRanks;
            }
          }
          // Blind-Entry / Liquid-Diver bucket — a *separate* pass over the same records, not a
          // filter of critStats above. Their bare-sign tags (+fund/-fund, +ocs/-ocs) collapse to
          // the exact same keys MIW's own tiered criteria collapse to (e.g. '+fund' and 'fund>5'
          // both become 'fund>'), so once folded into critStats they're no longer separable —
          // this has to be built independently, straight from the raw records. MIW's own
          // critStats/collapsedRanks above are left untouched since real trading logic
          // (co-qualification ranking, _pfScoreNet) reads them.
          const isBlindRec = r => Array.isArray(r.criteria) && r.criteria.some(c => c === '+fund' || c === '-fund' || c === '+ocs' || c === '-ocs');
          const blindCritCount = {}, blindCritStats = {};
          for (const r of sortedRecords) {
            if (!isBlindRec(r)) continue;
            const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
            const isPartner = r.source !== 'winter';
            const counts = !isPartner || this._pfPartnerCounts(pnl);
            const effectivePnl = isPartner ? -pnl : pnl;
            for (const c of r.criteria) {
              const key = collapse(c);
              if ((blindCritCount[key] = (blindCritCount[key] ?? 0) + 1) > quota) continue;
              if (!blindCritStats[key]) blindCritStats[key] = { pnl: 0, wins: 0, losses: 0, ownPnl: 0, ownWins: 0, ownLosses: 0, hasHist: false, hasTrade: false };
              const cs = blindCritStats[key];
              if (counts) {
                cs.pnl += effectivePnl;
                if (effectivePnl > 0) cs.wins++; else cs.losses++;
              }
              if (!isPartner) { cs.ownPnl += pnl; if (pnl > 0) cs.ownWins++; else cs.ownLosses++; }
              if (r.hist) cs.hasHist = true; else cs.hasTrade = true;
            }
          }
          this.blindCollapsedCritStats = blindCritStats;
        },
        // cfg.miwEnabled is a persisted toggle value — it survives MIW being removed via the
        // Plugin Manager, so it alone can't tell us whether MIW is actually loaded right now.
        // Cross-check against the live plugin list so the MIW scorecard section disappears the
        // moment MIW is unloaded, not just when its own toggle happens to be off.
        _miwPluginLoaded() {
          return (this._pluginList || []).some(p => p.id === 'multiindicator-winter');
        },
        _bewPluginLoaded() {
          return (this._pluginList || []).some(p => p.id === 'blindentry-winter');
        },
        _ldwPluginLoaded() {
          return (this._pluginList || []).some(p => p.id === 'liquiddiver-winter');
        },
        // Liquid-Diver's OC fetch is single-symbol, triggered per reactive entry — its samples are
        // almost always one bar of 0.0s and drown out a real batch-fetched sample. Only show the
        // chart when a plugin doing proper batch OC sampling (MIW or Blind-Entry) is loaded; if
        // Liquid-Diver is the only OC consumer, hide it rather than let its noise dominate.
        _ocChartViable() {
          return this._miwPluginLoaded() || this._bewPluginLoaded();
        },
        // Pure display — unlike _pfScoreBuild() (which miwCollapsedCritStats/miwCollapsedSlotRanks
        // come from and which real trading logic reads), this chip-rendering step has no
        // consumer besides this panel, so it's safe to skip while the panel isn't visible.
        // Mirrors MIW's actual Slot Blocking decision (_miwIsCritBlocked/_miwIsEntryBlocked) so
        // the scorecard can show, at a glance, which chips are currently contributing to a block.
        // Only meaningful for the MIW/MIC bucket — Slot Blocking is an MIW/MIC mechanism, the
        // Blind-Entry/Liquid-Diver bucket has no equivalent concept.
        // Liq-anchor types (sliq/bliq/msliq/mbliq/0liq) are always eligible, matching
        // _miwIsEntryBlocked's unconditional anchor check; their score is the sign-combined total
        // (matching _miwCritScore, which sums the '+' and '-' buckets for a bare anchor name —
        // blocking is per anchor TYPE, not per sign, so both a type's chips share one verdict).
        // Past-1 is a path, not a criterion — it never appears as a collapsed key here, so there's
        // nothing to match it against.
        // User-selected Blockable Criteria (cfg.miwSlotBlockCriteria) are eligible when
        // miwSlotBlockTags is on. This now mirrors the strategy plugin's configurable
        // blockable criteria picker instead of the old hardcoded kline/PEC-only list, so
        // fund/vm/iot/iom/ocs/ocx chips can turn purple once opted in and below threshold.
        // ranksOverride lets the scorecard highlight a specific *viewed* regime segment's own
        // blocked status (see _pfScorecardHtml) rather than always reflecting live/flat data —
        // defaults to the flat aggregate, matching pre-regime-scoring behavior.
        _pfIsCritBlocked(key, ranksOverride) {
          if (!this.cfg.miwSlotBlockEnabled) return false;
          const ranks = ranksOverride ?? (this.miwCollapsedSlotRanks || {});
          const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const threshold  = baseMargin * ((this.cfg.miwSlotBlockPct ?? 25) / 100);
          const anchorM = key.match(/^(sliq|bliq|msliq|mbliq)[+-]/);
          if (anchorM || key === '0liq') {
            const base = anchorM ? anchorM[1] : '0liq'; // '0liq' is bare, never sign-tagged
            const score = (ranks[base] ?? 0) + (ranks[base + '+'] ?? 0) + (ranks[base + '-'] ?? 0);
            return score <= -threshold;
          }
          if (!this.cfg.miwSlotBlockTags) return false;
          const blockable = (this.cfg.miwSlotBlockCriteria || []).filter(Boolean);
          if (!blockable.length) return false;
          const esc = v => String(v).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const rx = new RegExp('^(' + blockable.map(esc).join('|') + ')[+-]');
          return rx.test(key) && (ranks[key] ?? 0) <= -threshold;
        },

        // Friendly label for the regime cycle button / empty-state text.
        _pfRegimeSegmentLabel(type) {
          return REGIME_SEGMENT_LABEL[type] || '—';
        },
        _pfScorecardHtml(shown, bucket) {
          if (!shown) return '';
          // Regime segment replaces the flat MIW view whenever regime scoring is on and at
          // least one regime type is active — raw per-segment figures, no min-sample fallback
          // (that fallback only protects live blocking/ranking, see _pfScoreBuild; display shows
          // the segment honestly, thin or not). Blind-Entry/Liquid-Diver bucket never regime-splits.
          const regimeActive = bucket !== 'blind' && this.cfg.pfRegimeScoringEnabled && (this.pfRegimeActiveTypes || []).length;
          const viewType = regimeActive ? (this.pfRegimeViewType || this.pfRegimeDisplayType || this.pfRegimeActiveTypes[0]) : null;
          const stats = regimeActive ? ((this.pfRegimeCritStats || {})[viewType] || {}) : ((bucket === 'blind' ? this.blindCollapsedCritStats : this.miwCollapsedCritStats) || {});
          if (!Object.keys(stats).length) {
            const label = regimeActive ? `${this._pfRegimeSegmentLabel(viewType)} regime` : (bucket === 'blind' ? 'Blind-Entry/Liquid-Diver' : 'MIW');
            return `<span style="font-size:9px;color:var(--text-lo)">No ${label} closes recorded yet.</span>`;
          }
          const own = (this.cfg.pfScorecardView || 'combined') === 'own';
          const expanded = this.pfScorecardExpanded;
          const _chipHtml = (key, emoji, title, val, wins, losses, isExpanded, expandedInner, blocked) => {
            let clr, bg, bdr;
            if (blocked) {
              clr = 'rgba(190,130,255,.95)'; bg = 'rgba(160,90,255,.14)'; bdr = 'rgba(190,130,255,.55)';
            } else {
              clr = val > 0 ? 'rgba(100,220,150,.9)' : val < 0 ? 'var(--short)' : 'var(--text-lo)';
              bg  = val > 0 ? 'rgba(100,220,150,.08)' : val < 0 ? 'rgba(255,80,80,.08)' : 'rgba(255,255,255,.04)';
              bdr = val > 0 ? 'rgba(100,220,150,.35)' : val < 0 ? 'rgba(255,80,80,.35)' : 'rgba(255,255,255,.12)';
            }
            const inner = isExpanded ? expandedInner : `<b>${(val >= 0 ? '+$' : '-$') + Math.abs(val).toFixed(2)}</b> <span style="opacity:.55;font-size:8px">${wins}W ${losses}L</span>`;
            const titleFull = blocked ? title + ' (blocked)' : title;
            return `<span data-slot="${key}" title="${titleFull}" style="cursor:pointer;font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:2px;border:1px solid ${bdr};background:${bg};color:${clr};white-space:nowrap">${emoji || '?'} ${inner}</span>`;
          };
          // When viewing a regime segment, the blocked highlight reflects THAT segment's own
          // score (built straight from the stats already being rendered) — not the live
          // prevailing regime, which may differ from the segment currently being browsed.
          const segRanksOverride = regimeActive ? Object.fromEntries(Object.entries(stats).map(([k, cs]) => [k, cs.pnl])) : undefined;
          const sorted = Object.entries(stats).sort(([,a],[,b]) => own ? b.ownPnl-a.ownPnl : b.pnl-a.pnl);
          return sorted.map(([key, cs]) => {
            const val = own ? cs.ownPnl : cs.pnl;
            const wins = own ? cs.ownWins : cs.wins;
            const losses = own ? cs.ownLosses : cs.losses;
            const expandedInner = `<span style="opacity:.55;font-size:8px">${wins}W ${losses}L of ${wins+losses} recorded</span>`;
            const blocked = bucket !== 'blind' && this._pfIsCritBlocked(key, segRanksOverride);
            return _chipHtml(key, pfCritEmoji(key), key, val, wins, losses, expanded===key, expandedInner, blocked);
          }).join('');
        },

        _pfCrossRead() {
          try {
            const raw = localStorage.getItem(CROSS_KEY);
            if (!raw) return [];
            const cut = Date.now() - CROSS_TTL;
            return (JSON.parse(raw).events || []).filter(e => e.ts >= cut);
          } catch(e) { return []; }
        },

        _pfCrossWrite(kind, symbol, extra) {
          try {
            const events = this._pfCrossRead();
            const rec = { ts: Date.now(), kind, source: 'winter' };
            if (symbol) rec.symbol = symbol;
            if (extra) Object.assign(rec, extra);
            events.push(rec);
            localStorage.setItem(CROSS_KEY, JSON.stringify({ events }));
          } catch(e) {}
        },

        async _pfCheckCross() {
          if (!this.cfg.permafrostCrossEnabled) return;
          const fromChaser = this._pfCrossRead().filter(e => e.source === 'chaser');
          this.pfCrossEvents = fromChaser.slice(-10);
        },

        // Inline SVG wave plot — time-based 1-week window, bins data into pixel columns so
        // the chart compacts automatically as history grows (no index stretching).
        // `shown` comes from the caller's own x-show chain (accordion open + relevant cfg
        // toggle) — Alpine still evaluates x-html bindings on hidden elements every reactive
        // tick, so without this the rebuild below would run every time `pfWave` changes even
        // while the panel is collapsed. No artificial tick dependency here: Alpine already
        // re-runs this whenever a property it actually reads (pfWave, cfg.*) changes, so it
        // naturally recomputes only when new data arrives — not on a timer.
        _pfWaveSvg(shown) {
          if (!shown) return '';
          const wave = this._pfWaveSeries();
