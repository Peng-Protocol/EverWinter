      `,
    },

    transform(def) {
      const _origInit  = def.init;
      const _origPers  = def.persist;
      const _origScan  = def.runScan;
      const _origClose = def.pseudoClosePosition;

      let _pfWasHalted               = false;
      let _pfWasGainsLocked          = false;
      let _pfLastGainsContinuationTs = 0;

      return Object.assign({}, def, {

        pfEvents:     [],   // { ts, kind:'drawdown'|'gainslock', skew, breadth } — kept for import compat, not scored
        pfCloses:     [],   // { ts, pnl, skew, breadth } — per-close PnL paired with structure at close time
        pfWave:       [],   // { ts, lean } — structure-lean trajectory, retained up to ~a week (the "wave")
        pfScoreboard: [],   // sorted scorecard entries built from SCORE_KEY records
        pfScorecardView: 'combined',   // 'combined' | 'own'
        pfScorecardSource: 'both',     // 'both' | 'hist' | 'traded'
        pfScorecardExpanded: null,     // key of currently expanded chip, or null
        pfKlineBar:   { bearSum: 0, bullSum: 0, max: 50 }, // last-cycle aggregate % change sums
        _pfKlineBarAt: 0,                           // hourly candle timestamp of last own kline sample
        _pfStructureList: null, _pfStructureAt: 0, // own 3h ticker cache independent of host
        pfStatus:  { skew: null, breadth: null, score: null, mass: 0, count: 0, lean: 0, slope: 0, inherent: 0, eff: null, ioScore: null, at: 0 },
        pfCrossEvents: [],
        _liqBatches: [],
        _liqResults: {},
        _liqResultsVersion: 0,
        _liqCycleHistory: [],
        _liqLatestResults: [],
        _liqCycleCounter: 0,
        _liqAvgYPx: null,
        _liqYAxisHtml: '',

        async init() {
          await _origInit.call(this);
          if (this.cfg.permafrostEnabled          === undefined) this.cfg.permafrostEnabled          = false;
          if (this.cfg.permafrostSlopeWindowHours === undefined) this.cfg.permafrostSlopeWindowHours = 6;
          if (this.cfg.permafrostIoEnabled        === undefined) this.cfg.permafrostIoEnabled        = true;
          if (this.cfg.permafrostWaveShowMain     === undefined) this.cfg.permafrostWaveShowMain     = true;
          if (this.cfg.permafrostWaveShowVol      === undefined) this.cfg.permafrostWaveShowVol      = true;
          if (this.cfg.permafrostWaveShowIo       === undefined) this.cfg.permafrostWaveShowIo       = true;
          if (this.cfg.pfShowStructure            === undefined) this.cfg.pfShowStructure            = true;
          if (this.cfg.pfShowLiq                  === undefined) this.cfg.pfShowLiq                  = true;
          if (this.cfg.pfShowFunding              === undefined) this.cfg.pfShowFunding              = true;
          if (this.cfg.pfShowVol                  === undefined) this.cfg.pfShowVol                  = true;
          if (this.cfg.pfShowOi                   === undefined) this.cfg.pfShowOi                   = true;
          if (this.cfg.pfScoreMetrics             === undefined) this.cfg.pfScoreMetrics             = { funding: 1, liq: 1, vol: 1 };
          if (this.cfg.permafrostCrossEnabled        === undefined) this.cfg.permafrostCrossEnabled        = true;
          if (this.cfg.permafrostMutualDdLiftEnabled          === undefined) this.cfg.permafrostMutualDdLiftEnabled          = false;
          if (this.cfg.permafrostGainsContinuationEnabled     === undefined) this.cfg.permafrostGainsContinuationEnabled     = true;
          if (this.cfg.permafrostScorecardEnabled        === undefined) this.cfg.permafrostScorecardEnabled        = false;
          if (this.cfg.pfCollapsedRanks                 === undefined) this.cfg.pfCollapsedRanks                 = true;
          if (this.cfg.pfCollapsedSort                  === undefined) this.cfg.pfCollapsedSort                  = true;
          if (this.cfg.pfCoQualPenaltyEnabled           === undefined) this.cfg.pfCoQualPenaltyEnabled           = true;
          if (this.cfg.permafrostAutoBlock               === undefined) this.cfg.permafrostAutoBlock               = false;
          if (this.cfg.pfThresholdBlock                  === undefined) this.cfg.pfThresholdBlock                  = true;
          if (this.cfg.pfCombinedBlock                   === undefined) this.cfg.pfCombinedBlock                   = false;
          if (this.cfg.permafrostSlotLossThreshold       === undefined) this.cfg.permafrostSlotLossThreshold       = 0.25;
          if (this.cfg.pfSpongeQuota                     === undefined) this.cfg.pfSpongeQuota                     = 30;
          if (this.cfg.pfStaleSlotDays                   === undefined) this.cfg.pfStaleSlotDays                   = 7;
          if (this.cfg.pfHistScoringEnabled              === undefined) this.cfg.pfHistScoringEnabled              = true;
          if (this.cfg.pfCollapsedBlockEnabled           === undefined) this.cfg.pfCollapsedBlockEnabled           = false;
          if (this.cfg.pfCollapsedBlockThreshold         === undefined) this.cfg.pfCollapsedBlockThreshold         = 0.25;
          if (this.cfg.pfCollapsedBlockScaleFactor       === undefined) this.cfg.pfCollapsedBlockScaleFactor       = 0.01;
          if (this.cfg.pfCollapsedBlockTierCap           === undefined) this.cfg.pfCollapsedBlockTierCap           = 50;
          if (this.cfg.pfCollapsedBlockManual            === undefined) this.cfg.pfCollapsedBlockManual            = false;
          if (this.cfg.pfLiveCollapsedBlock              === undefined) this.cfg.pfLiveCollapsedBlock              = false;
          if (this.cfg.pfLiqEnabled      === undefined) this.cfg.pfLiqEnabled      = false;
          if (this.cfg.pfLiqBatchSize    === undefined) this.cfg.pfLiqBatchSize    = 25;
          if (this.cfg.pfLiqThresholdPct === undefined) this.cfg.pfLiqThresholdPct = 50;
          try {
            const saved = JSON.parse(localStorage.getItem(PFR_LIQ_KEY) || 'null');
            if (Array.isArray(saved) && this.cfg.pfLiqEnabled) {
              const valid = saved.filter(s => s.endsAt > Date.now());
              if (valid.length) {
                this._liqCycleCounter = Math.max(this._liqCycleCounter, ...valid.map(s => s.id));
                for (const s of valid) this._liqResumeBatch(s);
              }
            }
          } catch(_) {}
          try {
            const hist = JSON.parse(localStorage.getItem(PFR_LIQ_HISTORY_KEY) || 'null');
            if (Array.isArray(hist) && hist.length) {
              this._liqCycleHistory = hist.slice(-25);
              const last = hist[hist.length - 1];
              this._liqLatestResults = last.results || [];
              for (const r of last.results || [])
                this._liqResults[r.sym] = { sLiqPct: r.sLiqPct, bLiqPct: r.bLiqPct, sLiqRaw: r.sLiqRaw, bLiqRaw: r.bLiqRaw, cycleId: last.id, ts: last.ts };
              this._liqCycleCounter = Math.max(this._liqCycleCounter, last.id || 0);
            }
          } catch(_) {}
          try {
            const _sharedLiq = this._sharedRead?.('liqResults');
            if (_sharedLiq && Object.keys(_sharedLiq).length) this._liqResults = { ...this._liqResults, ..._sharedLiq };
          } catch(_) {}
          this._pfScoreTrim();
          this._pfScoreBuild();
          try {
            const raw = localStorage.getItem(PFR_KEY);
            if (raw) {
              const s = JSON.parse(raw);
              if (Array.isArray(s.events)) this.pfEvents  = s.events.slice(-EVENTS_CAP);
              if (Array.isArray(s.closes)) this.pfCloses  = s.closes.slice(-CLOSES_CAP);
              if (Array.isArray(s.wave))   this.pfWave    = s.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              if (s.pfKlineBar?.bearSum != null) this.pfKlineBar = s.pfKlineBar;
            }
          } catch(e) {}
          this.log(`[PFR] Permafrost (Winter) v${VERSION} loaded — ${this.cfg.permafrostEnabled ? 'enabled' : 'disabled'} | ${this.pfCloses.length} closes on record`, 'info');
          setInterval(() => {
            if (this.cfg.permafrostCrossEnabled) this._pfCheckCross().catch(() => {});
            if (this.cfg.permafrostScorecardEnabled) this._pfScoreBuild();
            if (this.cfg.permafrostCrossEnabled) {
              const _halted  = this._isDrawdownHalted?.() ?? false;
              const _glocked = this._isGainsLocked?.()    ?? false;
              if (_halted !== _pfWasHalted) {
                _pfWasHalted = _halted;
                this._pfCrossWrite(_halted ? 'ddh-start' : 'ddh-end');
              }
              if (_glocked !== _pfWasGainsLocked) {
                _pfWasGainsLocked = _glocked;
                this._pfCrossWrite(_glocked ? 'glk-start' : 'glk-end');
              }
              if (this.cfg.permafrostMutualDdLiftEnabled && _halted) {
                const _fromPartner = this._pfCrossRead().filter(e => e.source === 'chaser');
                const _lastDdh = _fromPartner.filter(e => e.kind === 'ddh-start' || e.kind === 'ddh-end').at(-1);
                if (_lastDdh?.kind === 'ddh-start') {
                  this._drawdownHaltUntil = null;
                  this._haltLoggedKind = null;
                  this.persist();
                  this.log('[PFR] ❄ Mutual DDH lift — Ashfall also in drawdown halt; own halt cleared.', 'info');
                }
              }
              if (this.cfg.permafrostGainsContinuationEnabled && this.cfg.drawdownThrottleEnabled !== false) {
                const _fromPartner = this._pfCrossRead().filter(e => e.source === 'chaser');
                const _lastGlk = _fromPartner.filter(e => e.kind === 'glk-start').at(-1);
                if (_lastGlk && _lastGlk.ts > _pfLastGainsContinuationTs) {
                  _pfLastGainsContinuationTs = _lastGlk.ts;
                  const _gcMs = (this.cfg.drawdownHaltHours ?? 6) * 3600 * 1000;
                  this._drawdownHaltUntil = Date.now() + _gcMs;
                  this.persist();
                  this.log('[PFR] ❄ Gains Continuation — Ashfall locked gains; drawdown throttle restarted.', 'warn');
                }
              }
            }
            if (this.cfg.permafrostEnabled && (this._isDrawdownHalted?.() ?? false)) {
              const _cdMs = (this.cfg.bulkTickerCooldownHours ?? 3) * 3600 * 1000;
              if ((Date.now() - (this._pfStructureAt || 0)) >= _cdMs) {
                this._pfFetchStructure().then(r => {
                  if (!r) return;
                  this._pfAddSample(r);
                  if (!r._fresh) return;
                  const { score, mass, count } = this.pfStatus;
                  const _d = this._pfDescribe(r, score, mass, count);
                  this.log(`[PFR] ❄ Structure check (halted) — ${_d.desc} — ${_d.bias}`, 'info');
                }).catch(() => {});
              }
            }
          }, 15000);
        },

        persist() {
          _origPers.call(this);
          try {
            localStorage.setItem(PFR_KEY, JSON.stringify({
              events: this.pfEvents, closes: this.pfCloses, wave: this.pfWave,
              pfKlineBar: this.pfKlineBar,
            }));
          } catch(e) {}
        },

        // ── Market structure reading — full ticker universe, not the curated pools ──
        async _pfFetchStructure() {
          try {
            // Reuse the host scan's bulk ticker response when fresh (slow-tick
            // sampling during halts falls back to fetching — scans don't run then)
            const cooldownMs = (this.cfg.bulkTickerCooldownHours ?? 3) * 3600 * 1000;
            let list, _freshData = false;
            if (this._pfStructureList?.length && (Date.now() - (this._pfStructureAt || 0)) < cooldownMs) {
              list = this._pfStructureList; // own cache within cooldown
            } else if (this._lastAllTickers?.length && (Date.now() - (this._lastAllTickersAt || 0)) < 60000) {
              list = this._lastAllTickers;  // host just fetched this tick — piggyback
              this._pfStructureList = list;
              this._pfStructureAt   = this._lastAllTickersAt;
              _freshData = true;
            } else {
              const _shared = this._sharedRead?.('bulkTickers');
              if (_shared?.data?.tickers?.length && (Date.now() - (_shared.ts || 0)) < cooldownMs) {
                list = _shared.data.tickers; // partner fetched recently — adopt
                this._pfStructureList = list;
                this._pfStructureAt   = _shared.ts;
                _freshData = true;
              } else {
                const r = await fetch(`${this.base}/v5/market/tickers?category=linear`);
                const d = await r.json();
                if (d.retCode !== 0) return null;
                list = d.result?.list || [];
                this._pfStructureList = list;
                this._pfStructureAt   = Date.now();
                _freshData = true;
              }
            }
            let gSum = 0, lSum = 0, gCount = 0, lCount = 0;
            let gTurnover = 0, lTurnover = 0;
            let frSum = 0, frCount = 0;
            for (const t of list) {
              if (!t.symbol.endsWith('USDT') || t.symbol === 'BTCUSDT') continue;
              if (parseFloat(t.lastPrice || 0) < 0.001) continue;
              const ch  = parseFloat(t.price24hPcnt || 0) * 100;
              const tvr = parseFloat(t.turnover24h  || 0);
              if (ch > 0)      { gSum += ch; gCount++; gTurnover += tvr; }
              else if (ch < 0) { lSum += Math.abs(ch); lCount++; lTurnover += tvr; }
              const fr = parseFloat(t.fundingRate || 0);
              if (!isNaN(fr)) { frSum += fr * 100; frCount++; } // accumulate as %
            }
            const sumT   = gSum + lSum, cntT = gCount + lCount;
            const totalTvr = gTurnover + lTurnover;
            const vol    = totalTvr > 0 ? +((gTurnover - lTurnover) / totalTvr).toFixed(4) : 0;
            const volAbs = +(totalTvr / 1e9).toFixed(2); // USD billions

            // Collective IO from aggregate funding rate: positive funding = longs paying = crowd net long.
            // Normalised against 0.05% reference (≈5× the typical 0.01%/8h baseline) → [-1, 1].
            const ioScore = frCount > 0
              ? +Math.max(-1, Math.min(1, (frSum / frCount) / 0.05)).toFixed(4)
              : null;

            return {
              ts: Date.now(),
              skew:    sumT > 0 ? (gSum - lSum) / sumT : 0,
              breadth: cntT > 0 ? (gCount - lCount) / cntT : 0,
              gCount, lCount,
              gSum: +gSum.toFixed(1), lSum: +lSum.toFixed(1),
              vol, volAbs, ioScore, _fresh: _freshData,
            };
          } catch(e) { return null; }
        },

        // ── Human-readable structure + historical-bias phrasing for the activity log ──
        // Intensity ranges over mildly / moderately / strongly bullish (or bearish). The
        // tiers are entirely relative to this installation's own history: thresholds are
        _pfDescribe(reading, score, mass, count) {
          const lean = (reading.skew + reading.breadth) / 2;
          const hist = this.pfCloses.map(x => Math.abs((x.skew + x.breadth) / 2)).sort((a, b) => a - b);
          const q = p => hist[Math.min(hist.length - 1, Math.floor(p * hist.length))];
          const [tFlat, tModerate, tStrong] = hist.length >= 30 ? [q(0.25), q(0.5), q(0.8)] : [0.08, 0.20, 0.40];
          const mag    = Math.abs(lean);
          const adverb = mag >= tStrong ? 'strongly ' : mag >= tModerate ? 'moderately ' : 'mildly ';
          const struct = mag <= tFlat ? 'flat/mixed' : `${adverb}${lean > 0 ? 'bullish' : 'bearish'}`;
          const slope  = this._pfTrajectory().slope;
          const trend  = slope > 0.05 ? ', rising' : slope < -0.05 ? ', falling' : '';
          const desc   = `${struct}${trend}`;
          const inherent = this._pfInherent(lean, slope, reading.ioScore ?? null);
          const eff    = this._pfEffectiveScore(score, mass, inherent);
          let bias;
          if (score === null || mass < MIN_MASS) {
            bias = 'thin history';
          } else {
            const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
            const avgPnl = score * entryMargin;
            const sign = avgPnl >= 0 ? '+' : '-';
            bias = `avg ${sign}${Math.abs(avgPnl).toFixed(2)}/position (${count} similar close${count === 1 ? '' : 's'})`;
          }
          return { desc, bias, eff };
        },

        // ── Hostility score: kernel-weighted, recency-decayed, normalized by entry margin.
        // score ∈ [−1,1]; mass = evidence weight; count = closes within kernel radius.
        _pfScore(reading) {
          const entryMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
          const now = Date.now();
          let num = 0, mass = 0, count = 0;
          for (const c of this.pfCloses) {
            const ds = reading.skew - c.skew, db = reading.breadth - c.breadth;
            const k  = Math.exp(-(ds * ds + db * db) / (2 * KERNEL_H * KERNEL_H));
            const dec = Math.pow(0.5, (now - c.ts) / HALF_LIFE_MS);
            const norm = Math.max(-1, Math.min(1, c.pnl / entryMargin));
            num  += norm * k * dec;
            mass += k * dec;
            if (k > 0.1) count++;
          }
          return { score: mass > 0 ? num / mass : null, mass, count };
        },

        // ── The wave: recent path of the structure lean (oldest → newest) ──
        // lean = (skew + breadth) / 2 ∈ [−1,1]: +1 strongly bullish, −1 strongly bearish.
        _pfWaveSeries() {
          const cut = Date.now() - WAVE_TTL_MS;
          return this.pfWave.filter(p => p.ts >= cut);
        },

        // Append a structure-lean point to the wave and prune by age / cap. Kept
        // separate from pfCloses (which track realized PnL) so the wave
        // retains the full trajectory for as long as we have data, up to ~a week.
        _pfPushWave(reading) {
          this.pfWave.push({ ts: reading.ts, lean: +(((reading.skew + reading.breadth) / 2)).toFixed(4), vol: reading.vol ?? 0, volAbs: reading.volAbs ?? 0, io: reading.ioScore ?? null, score: this._miwWaveScore != null ? +((this._miwWaveScore / 100).toFixed(4)) : null });
          const cut = Date.now() - WAVE_TTL_MS;
          if (this.pfWave.length && this.pfWave[0].ts < cut) this.pfWave = this.pfWave.filter(p => p.ts >= cut);
          if (this.pfWave.length > WAVE_CAP) this.pfWave = this.pfWave.slice(-WAVE_CAP);
        },

        // Current lean plus its trajectory (slope = avg lean over last N hours − avg lean N–2N hours ago).
        // Using a fixed time window (cfg.permafrostSlopeWindowHours, default 6h) so "turning bullish/bearish"
        // always reflects the same timeframe regardless of how much wave history has accumulated.
        // slope > 0 → drifting bullish; slope < 0 → drifting bearish.
        _pfTrajectory() {
          const wave = this._pfWaveSeries();
          const n    = wave.length;
          const lean = n ? wave[n - 1].lean : (((this.pfStatus.skew ?? 0) + (this.pfStatus.breadth ?? 0)) / 2);
          if (n < WAVE_MIN_PTS) return { lean, slope: 0, n };
          const winMs     = (this.cfg.permafrostSlopeWindowHours ?? 6) * 3600 * 1000;
          const now       = Date.now();
          const recentPts = wave.filter(p => p.ts >= now - winMs);
          const olderPts  = wave.filter(p => p.ts >= now - 2 * winMs && p.ts < now - winMs);
          if (!recentPts.length || !olderPts.length) return { lean, slope: 0, n };
          const recent = recentPts.reduce((a, p) => a + p.lean, 0) / recentPts.length;
          const older  = olderPts.reduce((a, p) => a + p.lean, 0) / olderPts.length;
          return { lean, slope: recent - older, n };
        },

        // Inherent favourability for this bot's direction (DIR), from the wave alone:
        // a short bot likes bearish *and* falling structure; longing likes bullish/rising.
        // The slope term is what stops us shorting into the start of a pump (mildly
        // bearish but turning up) or longing into the start of a dump.
        _pfInherent(lean, slope, ioScore) {
          const slopeN = Math.max(-1, Math.min(1, (slope || 0) / SLOPE_REF));
          // IO is direct: crowd-long pressure is bullish, crowd-short pressure is bearish.
          // W_IO is additive alongside lean/slope — the outer clamp keeps the result in [-1, 1].
          const ioN = ioScore != null ? Math.max(-1, Math.min(1, ioScore)) : 0;
          return Math.max(-1, Math.min(1, DIR * (W_LEAN * (lean || 0) + W_SLOPE * slopeN + W_IO * ioN)));
        },

        // Effective score: learned history is primary, the inherent wave is the
        // fallback — blended by how much evidence the profile actually has.
        _pfEffectiveScore(score, mass, inherent) {
          const massFrac = Math.max(0, Math.min(1, (mass || 0) / STRONG_MASS));
          return score === null ? inherent : massFrac * score + (1 - massFrac) * inherent;
        },

        async _pfUpdateKlineBar() {
          const lastHourStart = Math.floor(Date.now() / 3_600_000) * 3_600_000 - 3_600_000;
          // Piggyback on MIW's cache when it's populated for the right hour
          const cache = this._miwKlineCache;
          if (cache && Object.keys(cache).length > 0) {
            let bearSum = 0, bullSum = 0;
            for (const e of Object.values(cache)) {
              if (e.candleStart !== lastHourStart || !e.open) continue;
              const pct = (e.close - e.open) / e.open * 100;
              if (pct < 0) bearSum += -pct;
              else if (pct > 0) bullSum += pct;
            }
            if (bearSum > 0 || bullSum > 0) {
              this.pfKlineBar = { bearSum, bullSum, max: this.cfg.miwKlineScanCap ?? 50 };
              return;
            }
          }
          // MIW didn't fetch klines this cycle — own sample, cached per completed hourly candle
          if (this._pfKlineBarAt === lastHourStart && (this.pfKlineBar.bearSum > 0 || this.pfKlineBar.bullSum > 0)) return;
          try {
            const allTickers = this._lastAllTickers || [];
            const cap = this.cfg.miwKlineScanCap ?? 50;
            let syms = allTickers
              .filter(t => t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT' && parseFloat(t.lastPrice || 0) >= 0.001)
              .map(t => t.symbol);
            if (!syms.length) return;
            for (let i = syms.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [syms[i], syms[j]] = [syms[j], syms[i]];
            }
            syms = syms.slice(0, cap);
            let bearSum = 0, bullSum = 0;
            await Promise.all(syms.map(async sym => {
              try {
                const r = await fetch(`${this.base}/v5/market/kline?category=linear&symbol=${sym}&interval=60&limit=2`);
                const d = await r.json();
                if (d.retCode !== 0) return;
                const list = d?.result?.list;
                if (!list || list.length < 2) return;
                const candle = list[1];
                if (parseInt(candle[0]) !== lastHourStart) return;
                const open = parseFloat(candle[1]), close = parseFloat(candle[4]);
                if (!open) return;
                const pct = (close - open) / open * 100;
                if (pct < 0) bearSum += -pct;
                else if (pct > 0) bullSum += pct;
              } catch(e) {}
            }));
            this._pfKlineBarAt = lastHourStart;
            this.pfKlineBar = { bearSum, bullSum, max: cap };
          } catch(e) {}
        },

        _pfScoreRead() {
          try {
            const raw = localStorage.getItem(SCORE_KEY);
            if (!raw) return [];
            const cut = Date.now() - SCORE_SAFETY_TTL;
            return (JSON.parse(raw) || []).filter(r => r.ts >= cut && Array.isArray(r.criteria) && r.criteria.length);
          } catch(e) { return []; }
        },
        _pfScoreTrim() {
          try {
            const records   = this._pfScoreRead();
            const quota     = this.cfg.pfSpongeQuota   ?? 30;
            const staleDays = this.cfg.pfStaleSlotDays ?? 7;
            const staleMs   = staleDays * 24 * 3600 * 1000;
            const now       = Date.now();
            const LEGACY    = new Set(['+fund','-fund','>10pct','<10pct','lsa','lba','rasl','rabl']);
            const isLegacy  = r => r.criteria.some(c => LEGACY.has(c));
            const bySlot = {};
            for (const r of records) {
              if (isLegacy(r)) continue;
              const k = [...r.criteria].sort().join(',');
              if (!bySlot[k]) bySlot[k] = [];
              bySlot[k].push(r);
            }
            const trimmed = [];
            for (const recs of Object.values(bySlot)) {
              recs.sort((a, b) => b.ts - a.ts);
              const kept = recs.slice(0, quota);
              if (kept.length && now - kept[0].ts < staleMs) trimmed.push(...kept);
            }
            localStorage.setItem(SCORE_KEY, JSON.stringify(trimmed));
          } catch(e) {}
        },
        _pfScoreWrite(criteria, pnl, hist = false) {
          try {
            const records = this._pfScoreRead();
            const rec = { ts: Date.now(), criteria, pnl, source: 'winter' };
            if (hist) rec.hist = true;
            records.push(rec);
            const quota = this.cfg.pfSpongeQuota ?? 30;
            const bySlot = {};
            for (const r of records) {
              const k = [...r.criteria].sort().join(',');
              if (!bySlot[k]) bySlot[k] = [];
              bySlot[k].push(r);
            }
            const trimmed = [];
            for (const recs of Object.values(bySlot)) {
              recs.sort((a, b) => b.ts - a.ts);
              trimmed.push(...recs.slice(0, quota));
            }
            localStorage.setItem(SCORE_KEY, JSON.stringify(trimmed));
          } catch(e) {}
        },
        _pfScoreBuild() {
          const records = this._pfScoreRead();
          const exclude = new Set(this.cfg.miwAutoSlotExclude || []);
          const quota = this.cfg.pfSpongeQuota ?? 30;
          const includeHist = this.cfg.pfHistScoringEnabled ?? true;
          const critBase = c => /^sliq/.test(c) ? 'sliq' : /^bliq/.test(c) ? 'bliq' : c;
          const slotCount = {};
          const map = {};
          for (const r of [...records].sort((a, b) => b.ts - a.ts)) {
            if (r.hist && !includeHist) continue;
            if (exclude.size && r.criteria.some(c => exclude.has(critBase(c)))) continue;
            const key = [...r.criteria].sort().join(',');
            if ((slotCount[key] = (slotCount[key] ?? 0) + 1) > quota) continue;
            if (!map[key]) map[key] = { criteria: r.criteria, ownPnl: 0, ownWins: 0, ownLosses: 0, ownLossSum: 0, partnerPnl: 0, partnerWins: 0, partnerLosses: 0, partnerWinSum: 0, hasHist: false, hasTrade: false };
            if (r.hist) map[key].hasHist = true; else map[key].hasTrade = true;
            const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
            if (r.source === 'winter') {
              map[key].ownPnl += pnl;
              if (pnl > 0) map[key].ownWins++; else { map[key].ownLosses++; map[key].ownLossSum += -pnl; }
            } else {
              const inv = -pnl;
              map[key].partnerPnl += inv;
              if (inv > 0) map[key].partnerWins++; else { map[key].partnerLosses++; map[key].partnerWinSum += pnl; }
            }
          }
          for (const s of Object.values(map)) s.totalPnl = s.ownPnl + s.partnerPnl;
          this.pfScoreboard = Object.values(map).sort((a, b) => b.totalPnl - a.totalPnl);
          if (this.cfg.permafrostAutoBlock) {
            const baseMargin = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
            const lossThresh = baseMargin * (this.cfg.permafrostSlotLossThreshold ?? 0.25);
            const useThresh   = this.cfg.pfThresholdBlock ?? true;
            const useCombined = this.cfg.pfCombinedBlock  ?? false;
            const blocks = {};
            for (const s of this.pfScoreboard) {
              const key = [...s.criteria].sort().join(',');
              const threshHit   = useThresh   && (s.ownLossSum >= lossThresh || s.partnerWinSum >= lossThresh);
              const combinedHit = useCombined && (s.totalPnl <= -lossThresh);
              if (threshHit || combinedHit) blocks[key] = 'blocked';
            }
            this.miwBlockedSlots = blocks;
          } else {
            this.miwBlockedSlots = {};
          }
          const ranks = {};
          for (const s of this.pfScoreboard) {
            const key = [...s.criteria].sort().join(',');
            if (!this.miwBlockedSlots[key]) ranks[key] = s.totalPnl;
          }
          this.miwSlotRanks = ranks;
          const collapse = c => {
            if (c === '+fund') return 'fund>';
            if (c === '-fund') return 'fund<';
            if (/^(?:sliq|bliq)/.test(c)) return c.replace(/\d+$/, '');
            return c.replace(/-?\d+$/, '');
          };
          const collapsedRanks = {};
          for (const r of records) {
            if (exclude.size && r.criteria.some(c => exclude.has(critBase(c)))) continue;
            const pnl = typeof r.pnl === 'number' ? r.pnl : (r.win ? 1 : -1);
            const effectivePnl = r.source === 'winter' ? pnl : -pnl;
            for (const c of r.criteria) {
              const key = collapse(c);
              collapsedRanks[key] = (collapsedRanks[key] ?? 0) + effectivePnl;
            }
          }
          this.miwCollapsedSlotRanks = collapsedRanks;
          if (this.cfg.permafrostAutoBlock && this.cfg.pfCollapsedBlockEnabled) {
            const scaleFactor = this.cfg.pfCollapsedBlockScaleFactor ?? 0.01;
            const tierCap     = this.cfg.pfCollapsedBlockTierCap     ?? 50;
            const baseMargin  = (this.cfg.minNotional || 6) / (this.cfg.leverage || 6);
            const threshold   = baseMargin * (this.cfg.pfCollapsedBlockThreshold ?? 0.25);
            const extractTier = c => { const m = c.match(/([+-]?\d+)$/); return m ? Math.abs(parseInt(m[1], 10)) : 0; };
            const applyManual = this.cfg.pfCollapsedBlockManual ?? false;
            let slotsToCheck;
            if (this.cfg.miwAutoSlots) {
              slotsToCheck = Object.values(map).map(s => s.criteria);
            } else if (applyManual) {
              slotsToCheck = (this.cfg.miwSlots || []).filter(s => s.length > 0);
            } else {
              slotsToCheck = [];
            }
            for (const slot of slotsToCheck) {
              let netScaled = 0;
              for (const c of slot) {
                const key     = collapse(c);
                const basePnl = collapsedRanks[key] ?? 0;
                const tier    = extractTier(c);
                netScaled    += basePnl * (1 + scaleFactor * Math.min(tier, tierCap));
              }
              if (netScaled < -threshold) {
                this.miwBlockedSlots[[...slot].sort().join(',')] = 'blocked';
              }
            }
          }
        },
        _pfScorecardHtml() {
          if (!this.pfScoreboard.length) return '<span style="font-size:9px;color:var(--text-lo)">No MIW closes recorded yet.</span>';
          const own = (this.pfScorecardView || 'combined') === 'own';
          const expanded = this.pfScorecardExpanded;
          const blocks = this.miwBlockedSlots || {};
          const _chipHtml = (key, emoji, title, val, wins, losses, isExpanded, expandedInner, isBlocked) => {
            let clr, bg, bdr;
            if (isBlocked) {
              clr = 'rgba(180,100,255,.9)'; bg = 'rgba(180,100,255,.08)'; bdr = 'rgba(180,100,255,.7)';
            } else {
              clr = val > 0 ? 'rgba(100,220,150,.9)' : val < 0 ? 'var(--short)' : 'var(--text-lo)';
              bg  = val > 0 ? 'rgba(100,220,150,.08)' : val < 0 ? 'rgba(255,80,80,.08)' : 'rgba(255,255,255,.04)';
              bdr = val > 0 ? 'rgba(100,220,150,.35)' : val < 0 ? 'rgba(255,80,80,.35)' : 'rgba(255,255,255,.12)';
            }
            const inner = isExpanded ? expandedInner : `<b>${(val >= 0 ? '+$' : '-$') + Math.abs(val).toFixed(2)}</b> <span style="opacity:.55;font-size:8px">${wins}W ${losses}L</span>`;
            return `<span data-slot="${key}" title="${title}" style="cursor:pointer;font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:2px;border:1px solid ${bdr};background:${bg};color:${clr};white-space:nowrap">${emoji || '?'} ${inner}</span>`;
          };
          const _srcFilter = s => { const src = this.pfScorecardSource || 'both'; if (src === 'hist') return s.hasHist; if (src === 'traded') return s.hasTrade; return true; };
          if (this.cfg.pfCollapsedRanks) {
            const collapse = c => {
              if (c === '+fund') return 'fund>';
              if (c === '-fund') return 'fund<';
              if (/^fund/.test(c)) return c.replace(/\d+$/, '');
              if (/^(?:sliq|bliq)/.test(c)) return c.replace(/\d+$/, '');
              return c.replace(/-?\d+$/, '');
            };
            const cm = {};
            for (const s of this.pfScoreboard.filter(_srcFilter)) {
              for (const c of s.criteria) {
                const key = collapse(c);
                if (!cm[key]) cm[key] = { totalPnl:0, ownPnl:0, ownWins:0, ownLosses:0, ownLossSum:0, partnerPnl:0, partnerWins:0, partnerLosses:0, partnerWinSum:0 };
                const e = cm[key];
                e.totalPnl+=s.totalPnl; e.ownPnl+=s.ownPnl; e.ownWins+=s.ownWins; e.ownLosses+=s.ownLosses; e.ownLossSum+=s.ownLossSum;
                e.partnerPnl+=s.partnerPnl; e.partnerWins+=s.partnerWins; e.partnerLosses+=s.partnerLosses; e.partnerWinSum+=s.partnerWinSum;
              }
            }
            const sorted = Object.entries(cm).sort(([,a],[,b]) => own ? b.ownPnl-a.ownPnl : b.totalPnl-a.totalPnl);
            return sorted.map(([key, s]) => {
              const val = own ? s.ownPnl : s.totalPnl;
              const wins = own ? s.ownWins : s.ownWins+s.partnerWins;
              const losses = own ? s.ownLosses : s.ownLosses+s.partnerLosses;
              const expandedInner = own
                ? `<b>-$${s.ownLossSum.toFixed(2)}</b> <span style="opacity:.55;font-size:8px">${s.ownLosses}L</span>`
                : `<b>+$${s.partnerWinSum.toFixed(2)}</b> <span style="opacity:.55;font-size:8px">${s.partnerWins}W</span>`;
              return _chipHtml(key, pfCritEmoji(key), key, val, wins, losses, expanded===key, expandedInner, false);
            }).join('');
          }
          const sorted = (own ? [...this.pfScoreboard].sort((a, b) => b.ownPnl - a.ownPnl) : this.pfScoreboard).filter(_srcFilter);
          return sorted.map(s => {
            const key = [...s.criteria].sort().join(',');
            const isBlocked = blocks[key] === 'blocked';
            const val = own ? s.ownPnl : s.totalPnl;
            const wins   = own ? s.ownWins   : s.ownWins   + s.partnerWins;
            const losses = own ? s.ownLosses : s.ownLosses + s.partnerLosses;
            const expandedInner = own
              ? `<b>-$${s.ownLossSum.toFixed(2)}</b> <span style="opacity:.55;font-size:8px">${s.ownLosses}L</span>`
              : `<b>+$${s.partnerWinSum.toFixed(2)}</b> <span style="opacity:.55;font-size:8px">${s.partnerWins}W</span>`;
            return _chipHtml(key, s.criteria.map(pfCritEmoji).join(''), s.criteria.join(' + '), val, wins, losses, expanded===key, expandedInner, isBlocked);
          }).join('');
        },

        _pfCrossRead() {
          try {
            const raw = localStorage.getItem(CROSS_KEY);
            if (!raw) return [];
            const cut = Date.now() - CROSS_TTL;
            return (JSON.parse(raw).events || []).filter(e => e.ts >= cut);
          } catch(e) { return []; }
        },

        _pfCrossWrite(kind) {
          try {
            const events = this._pfCrossRead();
            events.push({ ts: Date.now(), kind, source: 'winter' });
            localStorage.setItem(CROSS_KEY, JSON.stringify({ events }));
          } catch(e) {}
        },

        async _pfCheckCross() {
          if (!this.cfg.permafrostCrossEnabled) return;
          const fromChaser = this._pfCrossRead().filter(e => e.source === 'chaser');
          this.pfCrossEvents = fromChaser.slice(-10);
        },

        // Inline SVG wave plot — time-based 1-week window, bins data into pixel columns so
        // the chart compacts automatically as history grows (no index stretching).
        _pfWaveSvg() {
          void this.tick;
          const wave = this._pfWaveSeries();
          const W = 260, H = 64, labelH = 12, pad = 6;
          const y = lean => pad + ((1 - lean) / 2) * (H - 2 * pad);
          const mid = y(0);
          const placeholder = `<svg width="100%" viewBox="0 0 ${W} ${H + labelH}" preserveAspectRatio="none" style="display:block"><line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="rgba(255,255,255,.15)" stroke-dasharray="3 3"/><text x="${W/2}" y="${H/2+3}" fill="rgba(255,255,255,.35)" font-size="9" font-family="monospace" text-anchor="middle">gathering structure history…</text></svg>`;
          if (wave.length < 2) return placeholder;
          const now = Date.now();
          const tMin = now - WAVE_TTL_MS;
          const plotW = W - 2 * pad;
          const BINS = Math.floor(plotW);
          const bins = new Array(BINS).fill(null).map(() => ({ sum: 0, n: 0 }));
          for (const p of wave) {
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            bins[bi].sum += p.lean; bins[bi].n++;
          }
          const pts = [];
          for (let i = 0; i < BINS; i++) {
            if (!bins[i].n) continue;
            pts.push({ x: pad + i + 0.5, lean: bins[i].sum / bins[i].n });
          }
          if (pts.length < 2) return placeholder;

          // Volume line: bin vol and volAbs alongside lean; opacity reflects absolute volume level.
          const vBins = new Array(BINS).fill(null).map(() => ({ vSum: 0, aSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.vol == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            vBins[bi].vSum += p.vol; vBins[bi].aSum += (p.volAbs ?? Math.abs(p.vol)); vBins[bi].n++;
          }
          const volPts = [];
          for (let i = 0; i < BINS; i++) {
            if (!vBins[i].n) continue;
            volPts.push({ x: pad + i + 0.5, v: vBins[i].vSum / vBins[i].n, abs: vBins[i].aSum / vBins[i].n });
          }
          const maxAbs = Math.max(...volPts.map(p => p.abs), 0.001);
          // Draw vol as individual segments so each can carry its own opacity (low vol → faint).
          let volSvg = '';
          for (let i = 1; i < volPts.length; i++) {
            const p1 = volPts[i-1], p2 = volPts[i];
            const relAbs = ((p1.abs + p2.abs) / 2) / maxAbs;
            const op = (0.12 + relAbs * 0.55).toFixed(2);
            volSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.v).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.v).toFixed(1)}" stroke="rgba(255,185,50,${op})" stroke-width="1"/>`;
          }

          // IO line: crowd funding-rate sentiment; only present in newer wave entries (guard p.io != null)
          const ioBins = new Array(BINS).fill(null).map(() => ({ iSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.io == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            ioBins[bi].iSum += p.io; ioBins[bi].n++;
          }
          const ioPts = [];
          for (let i = 0; i < BINS; i++) {
            if (!ioBins[i].n) continue;
            ioPts.push({ x: pad + i + 0.5, io: ioBins[i].iSum / ioBins[i].n });
          }
          let ioSvg = '';
          for (let i = 1; i < ioPts.length; i++) {
            const p1 = ioPts[i-1], p2 = ioPts[i];
            ioSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.io).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.io).toFixed(1)}" stroke="rgba(200,150,255,0.5)" stroke-width="1" stroke-dasharray="3 2"/>`;
          }

          // Score line: equal-weighted scorecard-gated signal aggregate, stored in [-1,+1]
          const sBins = new Array(BINS).fill(null).map(() => ({ sSum: 0, n: 0 }));
          for (const p of wave) {
            if (p.score == null) continue;
            const bi = Math.min(BINS - 1, Math.max(0, Math.floor(((p.ts - tMin) / WAVE_TTL_MS) * BINS)));
            sBins[bi].sSum += p.score; sBins[bi].n++;
          }
          const scorePts = [];
          for (let i = 0; i < BINS; i++) {
            if (!sBins[i].n) continue;
            scorePts.push({ x: pad + i + 0.5, s: sBins[i].sSum / sBins[i].n });
          }
          let scoreSvg = '';
          for (let i = 1; i < scorePts.length; i++) {
            const p1 = scorePts[i-1], p2 = scorePts[i];
            const avg = (p1.s + p2.s) / 2;
            const gv = Math.round(50 + (avg + 1) / 2 * 160);
            scoreSvg += `<line x1="${p1.x.toFixed(1)}" y1="${y(p1.s).toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${y(p2.s).toFixed(1)}" stroke="rgba(${gv},${gv},${gv},.8)" stroke-width="1.5"/>`;
          }

          const showMain = this.cfg.permafrostWaveShowMain ?? true;
          const showVol = this.cfg.permafrostWaveShowVol ?? true;
          const showIo  = this.cfg.permafrostWaveShowIo  ?? true;
          const showScore = this.cfg.pfShowScore ?? true;
          const cur = pts[pts.length - 1].lean;
          const col = cur > 0.05 ? 'var(--profit)' : cur < -0.05 ? 'var(--short)' : 'var(--ice)';
          const polyPts = pts.map(p => `${p.x.toFixed(1)},${y(p.lean).toFixed(1)}`).join(' ');
          const cx = pts[pts.length - 1].x, cy = y(cur);
          return `<svg width="100%" viewBox="0 0 ${W} ${H + labelH}" preserveAspectRatio="none" style="display:block">`
            + `<line x1="0" y1="${pad}" x2="${W}" y2="${pad}" stroke="rgba(0,229,160,.12)"/>`
            + `<line x1="0" y1="${(H-pad).toFixed(1)}" x2="${W}" y2="${(H-pad).toFixed(1)}" stroke="rgba(255,69,96,.12)"/>`
            + `<line x1="0" y1="${mid.toFixed(1)}" x2="${W}" y2="${mid.toFixed(1)}" stroke="rgba(255,255,255,.18)" stroke-dasharray="3 3"/>`
            + (showVol ? volSvg : '')
            + (showIo  ? ioSvg  : '')
            + (showScore ? scoreSvg : '')
            + (showMain ? `<polyline points="${polyPts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>` : '')
            + (showMain ? `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.5" fill="${col}"/>` : '')
            + `<text x="2" y="${pad+7}" fill="rgba(0,229,160,.5)" font-size="8" font-family="monospace">bull</text>`
            + `<text x="2" y="${(H-pad-1).toFixed(1)}" fill="rgba(255,69,96,.5)" font-size="8" font-family="monospace">bear</text>`
            + (showVol ? `<text x="${pad}" y="${H + 9}" fill="rgba(255,185,50,.55)" font-size="8" font-family="monospace">vol</text>` : '')
            + (showIo && ioPts.length >= 2 ? `<text x="${W / 2}" y="${H + 9}" fill="rgba(200,150,255,.55)" font-size="8" font-family="monospace" text-anchor="middle">io</text>` : '')
            + (showScore && scorePts.length >= 2 ? `<text x="${W - pad}" y="${H + 9}" fill="rgba(180,180,180,.55)" font-size="8" font-family="monospace" text-anchor="end">score</text>` : '')
            + `</svg>`;
        },

        _pfAddSample(reading) {
          this._pfPushWave(reading);
          const { score, mass, count } = this._pfScore(reading);
          const { lean, slope } = this._pfTrajectory();
          const inherent = this._pfInherent(lean, slope, reading.ioScore ?? null);
          const eff = this._pfEffectiveScore(score, mass, inherent);
          this.pfStatus = { skew: reading.skew, breadth: reading.breadth, score, mass, count, lean, slope, inherent, eff, ioScore: reading.ioScore ?? null, at: reading.ts };
        },

        _pfDownload(filename, data) {
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
        },
        pfExportWave() {
          this._pfDownload(`permafrost-wave-${new Date().toISOString().slice(0, 10)}.json`, { exportedAt: Date.now(), events: this.pfEvents, closes: this.pfCloses, wave: this.pfWave });
        },
        pfExportScorecard() {
          try {
            const raw = localStorage.getItem(SCORE_KEY);
            this._pfDownload(`permafrost-scorecard-${new Date().toISOString().slice(0, 10)}.json`, { exportedAt: Date.now(), scorecard: raw ? JSON.parse(raw) : [] });
          } catch(e) { this.log('[PFR] Scorecard export failed', 'warn'); }
        },
        pfExportLiq() {
          try {
            const raw = localStorage.getItem(PFR_LIQ_HISTORY_KEY);
            this._pfDownload(`permafrost-liq-${new Date().toISOString().slice(0, 10)}.json`, { exportedAt: Date.now(), liqHistory: raw ? JSON.parse(raw) : [] });
          } catch(e) { this.log('[PFR] Liq export failed', 'warn'); }
        },

        pfImport(e) {
          const file = e.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const d = JSON.parse(ev.target.result);
              if (Array.isArray(d.events)) this.pfEvents = d.events.slice(-EVENTS_CAP);
              if (Array.isArray(d.closes)) this.pfCloses = d.closes.slice(-CLOSES_CAP);
              if (Array.isArray(d.wave))   this.pfWave   = d.wave.filter(p => Date.now() - p.ts < WAVE_TTL_MS).slice(-WAVE_CAP);
              this.persist();
              this.log(`[PFR] Profile imported — ${this.pfCloses.length} closes, ${this.pfWave.length} wave points`, 'info');
            } catch(err) {
              this.log('[PFR] Import failed — file could not be parsed as a valid Permafrost profile', 'warn');
            }
            e.target.value = '';
          };
          reader.readAsText(file);
        },

        async runScan() {
          await _origScan.call(this);
          if (this.cfg.pfLiqEnabled) this._liqLaunchBatch();
          if (!this.cfg.permafrostEnabled) return;
          this._pfCheckCross().catch(() => {});
          // Deferred so MIW's _miwRunScan (which fetches klines) finishes first —
          // MIW wraps after PF, so _origScan returns before MIW's own kline fetch runs.
          setTimeout(() => this._pfUpdateKlineBar(), 0);
          this._pfFetchStructure().then(r => {
            if (!r) return;
            this._pfAddSample(r);
            if (!r._fresh) return;
            const { score, mass, count } = this.pfStatus;
            const _d = this._pfDescribe(r, score, mass, count);
            this.log(`[PFR] 🧊 Market structure: ${_d.desc} — ${_d.bias}`, 'info');
            this.persist();
          }).catch(() => {});
        },

        async pseudoClosePosition(pos, reason, fillPrice) {
          const prevLen = this.closedTrades?.length ?? 0;
          await _origClose.call(this, pos, reason, fillPrice);
          if ((this.closedTrades?.length ?? 0) > prevLen) {
            // totalPnl (incl. funding) is what the base feeds its halt windows
            const t   = this.closedTrades[0];
            const pnl = t?.totalPnl ?? t?.pnl;
            if (typeof pnl === 'number' && this.pfStatus.skew !== null && this.pfStatus.skew !== undefined) {
              const now = Date.now();
              this.pfCloses.push({ ts: now, pnl, skew: this.pfStatus.skew, breadth: this.pfStatus.breadth });
              if (this.pfCloses.length > CLOSES_CAP) this.pfCloses = this.pfCloses.slice(-CLOSES_CAP);
            }
          }
          if (this.cfg.permafrostCrossEnabled) {
            if (reason === 'cascade' || reason === 'sacrifice') this._pfCrossWrite(reason);
            if (reason === 'sl') this._pfCrossWrite('sacrifice');
            else if (reason === 'tp') this._pfCrossWrite('cascade');
          }
          if (this.cfg.permafrostScorecardEnabled && pos._miw && pos._miwCriteria?.length) {
            const _t = this.closedTrades?.[0];
            const _pnl = _t?.totalPnl ?? _t?.pnl;
            if (typeof _pnl === 'number') {
              this._pfScoreWrite(pos._miwCriteria, _pnl);
              this._pfScoreBuild();
            }
          }
        },

        // ── Liquidation surveillance ──

        _liqCloseAll() {
          for (const b of (this._liqBatches || [])) {
            if (b._endTimer) clearTimeout(b._endTimer);
            try { if (b.ws && b.ws.readyState !== WebSocket.CLOSED) b.ws.close(); } catch(_) {}
          }
          this._liqBatches = [];
          try { localStorage.removeItem(PFR_LIQ_KEY); } catch(_) {}
        },

        _liqFeedWatcherHtml() {
          void this.tick;
          const batches = this._liqBatches || [];
          if (!batches.length) return '';
          const fmt = v => v >= 1e6 ? (v / 1e6).toFixed(2) + 'M' : v >= 1e3 ? (v / 1e3).toFixed(1) + 'K' : v.toFixed(0);
          return batches.map(b => {
            const rem  = Math.max(0, b.endsAt - Date.now());
            const remM = Math.floor(rem / 60000);
            const remS = Math.floor((rem % 60000) / 1000);
            let totalS = 0, totalB = 0;
            for (const s of b.symbols) { totalS += b.sLiqTurnover[s] || 0; totalB += b.bLiqTurnover[s] || 0; }
            const dom  = totalS > totalB ? 'S' : totalB > totalS ? 'B' : '·';
            const clr  = dom === 'S' ? 'rgba(100,220,150,.9)' : dom === 'B' ? 'rgba(255,80,80,.9)' : 'var(--text-lo)';
            return `<div style="display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)">` +
              `<span style="color:var(--text-lo);min-width:18px">#${b.id}</span>` +
              `<span style="color:var(--text-lo)">${b.symbols.length}t</span>` +
              `<span style="color:rgba(100,220,150,.8)">S:${fmt(totalS)}</span>` +
              `<span style="color:rgba(255,80,80,.8)">B:${fmt(totalB)}</span>` +
              `<span style="color:${clr};font-weight:bold">${dom}</span>` +
              `<span style="margin-left:auto;color:var(--text-lo)">${remM}m${String(remS).padStart(2, '0')}s</span>` +
              `</div>`;
          }).join('');
        },

        _liqPersistBatches() {
          try {
            const snapshots = (this._liqBatches || []).map(b => ({
              id: b.id, startedAt: b.startedAt, endsAt: b.endsAt, symbols: b.symbols,
              sLiqTurnover: { ...b.sLiqTurnover }, bLiqTurnover: { ...b.bLiqTurnover }, avgHourlyTurnover: { ...(b.avgHourlyTurnover || {}) }
            }));
            localStorage.setItem(PFR_LIQ_KEY, JSON.stringify(snapshots));
          } catch(_) {}
        },

        _liqPersistHistory() {
          try { localStorage.setItem(PFR_LIQ_HISTORY_KEY, JSON.stringify(this._liqCycleHistory)); } catch(_) {}
        },

        _liqResumeBatch(snapshot) {
          const remaining = snapshot.endsAt - Date.now();
          if (remaining <= 0) return;
          const batch = {
            id: snapshot.id, startedAt: snapshot.startedAt, endsAt: snapshot.endsAt,
            symbols: snapshot.symbols,
            sLiqTurnover: { ...snapshot.sLiqTurnover },
            bLiqTurnover: { ...snapshot.bLiqTurnover },
            avgHourlyTurnover: { ...(snapshot.avgHourlyTurnover || {}) },
            ws: null, _endTimer: null
          };
          this._liqBatches.push(batch);
          const id = batch.id;
          const handleMsg = (ev) => {
            try {
              const msg = JSON.parse(ev.data);
              if (!msg.data) return;
              const events = Array.isArray(msg.data) ? msg.data : [msg.data];
              for (const e of events) {
                const sym  = e.symbol || e.s;
                const side = e.side   || e.S;
                if (!sym || !Object.prototype.hasOwnProperty.call(batch.sLiqTurnover, sym)) continue;
                const turnover = parseFloat(e.size || e.v || 0) * parseFloat(e.price || e.p || 0);
                if (!isFinite(turnover) || turnover <= 0) continue;
                if (side === 'Sell')      batch.sLiqTurnover[sym] += turnover;
                else if (side === 'Buy')  batch.bLiqTurnover[sym] += turnover;
              }
              this._liqPersistBatches();
            } catch(_) {}
          };
          const openWs = () => {
            try {
              const ws = new WebSocket('wss://stream.bybit.com/v5/public/linear');
              batch.ws = ws;
              ws.onopen    = () => ws.send(JSON.stringify({ op: 'subscribe', args: batch.symbols.map(s => `allLiquidation.${s}`) }));
              ws.onmessage = handleMsg;
              ws.onerror   = () => {};
              ws.onclose   = () => {
                if (Date.now() >= batch.endsAt || !this._liqBatches.some(b => b.id === id)) return;
                setTimeout(openWs, 5000);
              };
            } catch(_) {}
          };
          openWs();
          batch._endTimer = setTimeout(() => this._liqCloseBatch(batch), remaining);
          this.log(`[PFR] 💧 Liq cycle #${id} resumed — ${batch.symbols.length} tickers, ${Math.round(remaining / 60000)}m remaining`, 'info');
        },

        _liqLaunchBatch() {
          const allTickers = this._lastAllTickers || [];
          if (!allTickers.length) return;
          const activeSyms = new Set((this._liqBatches || []).flatMap(b => b.symbols));
          const base = t => t.symbol.endsWith('USDT') && t.symbol !== 'BTCUSDT'
            && parseFloat(t.lastPrice || 0) >= 0.001 && !activeSyms.has(t.symbol);
          const gainers = allTickers.filter(t => base(t) && parseFloat(t.price24hPcnt || 0) >  0.06);
          const losers  = allTickers.filter(t => base(t) && parseFloat(t.price24hPcnt || 0) < -0.06);
          if (!gainers.length && !losers.length) {
            this.log('[PFR] 💧 Liq batch skipped — no eligible tickers (>6% or <-6% 24h move, not already surveilled)', 'info');
            return;
          }
          const shuffle = arr => { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } };
          shuffle(gainers); shuffle(losers);
          const half    = Math.floor((this.cfg.pfLiqBatchSize ?? 25) / 2);
          const symbols = [...gainers.slice(0, half), ...losers.slice(0, half)].map(t => t.symbol);
          this._liqCycleCounter = (this._liqCycleCounter % 25) + 1;
          const id        = this._liqCycleCounter;
          const startedAt = Date.now();
          const avgHourlyTurnover = Object.fromEntries(symbols.map(s => {
            const tk = allTickers.find(t => t.symbol === s);
            return [s, tk ? parseFloat(tk.turnover24h || 0) / 24 : 0];
          }));
          const batch     = { id, startedAt, endsAt: startedAt + 3600000, symbols,
            sLiqTurnover: Object.fromEntries(symbols.map(s => [s, 0])),
            bLiqTurnover: Object.fromEntries(symbols.map(s => [s, 0])),
            avgHourlyTurnover,
            ws: null, _endTimer: null };
          this._liqBatches.push(batch);
          this._liqPersistBatches();
          const handleMsg = (ev) => {
            try {
              const msg = JSON.parse(ev.data);
              if (!msg.data) return;
              const events = Array.isArray(msg.data) ? msg.data : [msg.data];
              for (const e of events) {
                const sym  = e.symbol || e.s;
                const side = e.side   || e.S;
                if (!sym || !Object.prototype.hasOwnProperty.call(batch.sLiqTurnover, sym)) continue;
                const turnover = parseFloat(e.size || e.v || 0) * parseFloat(e.price || e.p || 0);
                if (!isFinite(turnover) || turnover <= 0) continue;
                if (side === 'Sell')      batch.sLiqTurnover[sym] += turnover;
                else if (side === 'Buy')  batch.bLiqTurnover[sym] += turnover;
              }
              this._liqPersistBatches();
            } catch(_) {}
          };
          const openWs = () => {
            try {
              const ws = new WebSocket('wss://stream.bybit.com/v5/public/linear');
              batch.ws = ws;
              ws.onopen    = () => ws.send(JSON.stringify({ op: 'subscribe', args: symbols.map(s => `allLiquidation.${s}`) }));
              ws.onmessage = handleMsg;
              ws.onerror   = () => {};
              ws.onclose   = () => {
                if (Date.now() >= batch.endsAt || !this._liqBatches.some(b => b.id === id)) return;
                setTimeout(openWs, 5000);
              };
            } catch(_) {}
          };
          openWs();
          batch._endTimer = setTimeout(() => this._liqCloseBatch(batch), 3600000);
          this.log(`[PFR] 💧 Liq cycle #${id} started — ${symbols.length} tickers (${symbols.map(s => s.replace('USDT', '')).join(', ')})`, 'info');
        },

        _liqCloseBatch(batch) {
          this._liqBatches = (this._liqBatches || []).filter(b => b.id !== batch.id);
          this._liqPersistBatches();
          if (batch._endTimer) { clearTimeout(batch._endTimer); batch._endTimer = null; }
          try { if (batch.ws && batch.ws.readyState !== WebSocket.CLOSED) batch.ws.close(); } catch(_) {}
          batch.ws = null;
          const calcDepth  = (raw, avg) => avg > 0 ? Math.max(-25, Math.min(25, Math.trunc((raw / avg - 1) * 10))) : 0;
          const threshold  = this.cfg.pfLiqThresholdPct ?? 50;
          const results    = batch.symbols.map(sym => {
            const sLiqRaw  = batch.sLiqTurnover[sym] || 0;
            const bLiqRaw  = batch.bLiqTurnover[sym] || 0;
            const avgHrly  = (batch.avgHourlyTurnover || {})[sym] || 0;
            const liqTotal = sLiqRaw + bLiqRaw;
            const sLiqPct  = liqTotal > 0 ? (sLiqRaw / liqTotal) * 100 : 0;
            const bLiqPct  = liqTotal > 0 ? (bLiqRaw / liqTotal) * 100 : 0;
            const sDepth   = calcDepth(sLiqRaw, avgHrly);
            const bDepth   = calcDepth(bLiqRaw, avgHrly);
            return { sym, sLiqPct, bLiqPct, sLiqRaw, bLiqRaw, sDepth, bDepth, sPass: liqTotal > 0 && sLiqPct >= threshold, bPass: liqTotal > 0 && bLiqPct >= threshold };
          });
          const _now = Date.now();
          const _liqPatch = {};
          for (const r of results) {
            const _entry = { sLiqPct: r.sLiqPct, bLiqPct: r.bLiqPct, sLiqRaw: r.sLiqRaw, bLiqRaw: r.bLiqRaw, sDepth: r.sDepth, bDepth: r.bDepth, cycleId: batch.id, ts: _now };
            this._liqResults[r.sym] = _entry;
            _liqPatch[r.sym] = _entry;
          }
          this._liqResultsVersion = (this._liqResultsVersion || 0) + 1;
          const _prevSharedVer = this._sharedRead?.('liqResults')?.ver ?? 0;
          this._sharedMerge?.('liqResults', _liqPatch, { ver: Math.max(this._liqResultsVersion, _prevSharedVer + 1) });
          const entry = { id: batch.id, ts: _now, results };
          this._liqCycleHistory.push(entry);
          if (this._liqCycleHistory.length > 25) this._liqCycleHistory = this._liqCycleHistory.slice(-25);
          this._liqPersistHistory();
          this._liqLatestResults = results;
          const _totS = results.reduce((s, r) => s + r.sLiqRaw, 0);
          const _totB = results.reduce((s, r) => s + r.bLiqRaw, 0);
          const _tot  = _totS + _totB;
          const _fmt  = v => v >= 1e6 ? `$${(v/1e6).toFixed(1)}M` : v >= 1e3 ? `$${(v/1e3).toFixed(0)}k` : `$${v.toFixed(0)}`;
          const _skew = _tot > 0 ? `B ${(_totB/_tot*100).toFixed(0)}% / S ${(_totS/_tot*100).toFixed(0)}%` : 'no turnover';
          this.log(`[PFR] 💧 Liq #${batch.id} — ${_fmt(_tot)} · ${_skew}`, 'info');
        },

        _liqChartSvg() {
          void this.tick;
          const history = this._liqCycleHistory || [];
          if (!history.length) return '';
          const cycleW = 28, dayGapW = 38, H = 80, padL = 28, padB = 16, padT = 6, padR = 4;
          const plotH = H - padT - padB;
          const DATE_CLR = 'rgba(80,160,255,.65)';
          const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const localDay = ts => { const d = new Date(ts); return d.getFullYear() * 1000 + d.getMonth() * 32 + d.getDate(); };
          // Pre-compute x positions, reserving extra space at day boundaries
          const xPos = [];
          let xCur = padL;
          for (let ci = 0; ci < history.length; ci++) {
            if (ci > 0 && localDay(history[ci].ts) !== localDay(history[ci - 1].ts)) xCur += dayGapW;
            xPos.push(xCur);
            xCur += cycleW;
          }
          const W = xCur + padR;
          let maxRaw = 0;
          for (const cycle of history) for (const r of cycle.results) maxRaw = Math.max(maxRaw, (r.sLiqRaw || 0) + (r.bLiqRaw || 0));
          if (maxRaw <= 0) maxRaw = 1;
          const allTotals = history.flatMap(c => c.results.map(r => (r.sLiqRaw||0) + (r.bLiqRaw||0))).filter(v => v > 0);
          const avgRef = allTotals.length ? allTotals.reduce((a, b) => a + b, 0) / allTotals.length : 0;
          const fmt = v => v >= 1e6 ? (v / 1e6).toFixed(1) + 'M' : v >= 1e3 ? (v / 1e3).toFixed(0) + 'K' : v.toFixed(0);
          const yVal = v => padT + plotH - (v / maxRaw) * plotH;
          // Fixed Y-axis overlay SVG (padL=28, wrapPad=6 → overlay width=34, height=H+8=88)
          const _ow = padL + 6, _oh = H + 8, _ax = padL + 6;
          let _yAxis = `<svg width="${_ow}" height="${_oh}" style="display:block"><line x1="${_ax}" y1="${4 + padT}" x2="${_ax}" y2="${4 + padT + plotH}" stroke="rgba(255,255,255,.12)" stroke-width="0.5"/>`;
          for (const f of [0, 0.25, 0.5, 0.75, 1]) {
            const v = maxRaw * f;
            const y = (4 + yVal(v)).toFixed(1);
            _yAxis += `<text x="${_ax - 3}" y="${(parseFloat(y) + 3).toFixed(1)}" fill="rgba(255,255,255,.3)" font-size="7" font-family="monospace" text-anchor="end">${fmt(v)}</text>`;
          }
          this._liqYAxisHtml = _yAxis + '</svg>';
          const grids = [0, 0.25, 0.5, 0.75, 1].map(f => {
            const v = maxRaw * f;
            const y = yVal(v).toFixed(1);
            return `<line x1="${padL}" y1="${y}" x2="${(W - padR).toFixed(1)}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>`;
          }).join('');
          if (avgRef > maxRaw * 0.05 && avgRef < maxRaw * 0.95) {
            this._liqAvgYPx = 4 + yVal(avgRef); // 4px = wrapper top padding
          } else {
            this._liqAvgYPx = null;
          }
          let bars = '';
          history.forEach((cycle, ci) => {
            const cx = xPos[ci];
            const n  = cycle.results.length;
            const bw = Math.max(1, Math.min(4, cycleW * 0.9 / n));
            cycle.results.forEach((r, ri) => {
              const x    = cx + (ri / n) * cycleW * 0.9;
              const bRaw = r.bLiqRaw || 0;
              const sRaw = r.sLiqRaw || 0;
              if (bRaw + sRaw <= 0) return;
              const bH = Math.max(1, (bRaw / maxRaw) * plotH);
              const sH = Math.max(0, (sRaw / maxRaw) * plotH);
              bars += `<rect x="${x.toFixed(1)}" y="${(padT + plotH - bH).toFixed(1)}" width="${bw.toFixed(1)}" height="${bH.toFixed(1)}" fill="rgba(255,80,80,${r.bPass ? 0.85 : 0.35})"/>`;
              if (sH > 0) bars += `<rect x="${x.toFixed(1)}" y="${(padT + plotH - bH - sH).toFixed(1)}" width="${bw.toFixed(1)}" height="${sH.toFixed(1)}" fill="rgba(100,220,150,${r.sPass ? 0.85 : 0.35})"/>`;
            });
            if (ci > 0 && localDay(history[ci].ts) !== localDay(history[ci - 1].ts)) {
              const gx = cx - dayGapW / 2;
              const d  = new Date(history[ci].ts);
              bars += `<line x1="${gx.toFixed(1)}" y1="${padT}" x2="${gx.toFixed(1)}" y2="${(padT + plotH).toFixed(1)}" stroke="${DATE_CLR}" stroke-width="0.5" stroke-dasharray="3 2"/>`;
              bars += `<text x="${gx.toFixed(1)}" y="${H - 2}" fill="${DATE_CLR}" font-size="7" font-family="monospace" text-anchor="middle">${MONTHS[d.getMonth()]} ${d.getDate()}</text>`;
            } else if (ci > 0) {
              bars += `<line x1="${cx.toFixed(1)}" y1="${padT}" x2="${cx.toFixed(1)}" y2="${(padT + plotH).toFixed(1)}" stroke="rgba(255,255,255,.08)" stroke-width="0.5"/>`;
            }
            const d = new Date(cycle.ts);
            const label = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            bars += `<text x="${(cx + cycleW / 2).toFixed(1)}" y="${H - 2}" fill="rgba(255,255,255,.3)" font-size="7" font-family="monospace" text-anchor="middle">${label}</text>`;
          });
          return `<svg width="${W}" height="${H}" style="display:block">`
            + `<line x1="${padL}" y1="${(padT + plotH).toFixed(1)}" x2="${W - padR}" y2="${(padT + plotH).toFixed(1)}" stroke="rgba(255,255,255,.12)" stroke-width="0.5"/>`
            + grids + bars
            + `</svg>`;
        },

        _liqInfoHtml() {
          void this.tick;
          const results   = this._liqLatestResults || [];
          const threshold = this.cfg.pfLiqThresholdPct ?? 50;
          return results.map(r => {
            const sQ  = r.sLiqPct >= threshold, bQ = r.bLiqPct >= threshold;
            const dom = r.sLiqPct >= r.bLiqPct;
            const clr = (sQ || bQ) ? (dom && sQ ? 'rgba(100,220,150,.9)' : !dom && bQ ? 'rgba(255,80,80,.9)' : sQ ? 'rgba(100,220,150,.9)' : 'rgba(255,80,80,.9)') : 'rgba(255,255,255,.3)';
            const bg  = (sQ || bQ) ? (dom && sQ ? 'rgba(100,220,150,.07)' : !dom && bQ ? 'rgba(255,80,80,.07)' : sQ ? 'rgba(100,220,150,.07)' : 'rgba(255,80,80,.07)') : 'rgba(255,255,255,.03)';
            const bdr = (sQ || bQ) ? (dom && sQ ? 'rgba(100,220,150,.4)' : !dom && bQ ? 'rgba(255,80,80,.4)' : sQ ? 'rgba(100,220,150,.4)' : 'rgba(255,80,80,.4)') : 'rgba(255,255,255,.1)';
            const domDepth = dom && sQ ? (r.sDepth ?? 0) : (r.bDepth ?? 0);
            const dSign = domDepth >= 0 ? '+' : '';
            const badge = (sQ || bQ) ? (dom && sQ ? `🥵${dSign}${domDepth}` : `🥶${dSign}${domDepth}`) : '';
            return `<span title="${r.sym}: S-Liq ${r.sLiqPct.toFixed(1)}% (depth ${r.sDepth >= 0 ? '+' : ''}${r.sDepth ?? 0}) / B-Liq ${r.bLiqPct.toFixed(1)}% (depth ${r.bDepth >= 0 ? '+' : ''}${r.bDepth ?? 0})" style="font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid ${bdr};background:${bg};color:${clr};white-space:nowrap">${badge}${r.sym.replace('USDT','')} <span style="opacity:.65">S${r.sLiqPct.toFixed(1)}% B${r.bLiqPct.toFixed(1)}%</span></span>`;
          }).join('');
        },

      });
    },
  };
})();
</script>
